  ja: |-
    このカードを召喚したターンに、自分のデッキのカードが１０枚以上の場合、手札１枚と自分の墓地のモンスター（地属性／ギャラクシー族）１体を好きな順番でデッキの下に戻して発動できる。
  ko: |-
    이 카드를 일반 소환한 턴에, 자신 덱의 카드가 10장 이상일 경우, 패 1장과 자신 묘지의 몬스터(땅 속성 / 갤럭시족) 1장을 좋아하는 순서대로 덱 아래로 되돌리고 발동할 수 있다.
