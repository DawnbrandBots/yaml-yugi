requirement:
  en: |-
    Place 3 other monsters from your Graveyard and/or face-up on your field on the bottom of the owner's Deck in any order.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード以外の自分フィールドの表側表示モンスターまたは自分の墓地のモンスターを合計３体好きな順番で持ち主のデッキの下に戻して発動できる。
  ko: |-
    이 카드 이외의 자신 필드의 앞면 표시 몬스터 또는 자신 묘지의 몬스터를 합계 3장 좋아하는 순서대로 주인의 덱 아래로 되돌리고 발동할 수 있다.
  zh-TW:
  zh-CN:
effect:
  en: |-
    Destroy 1 monster on your opponent's field. Then, if your opponent has 5 or more monsters in their Graveyard, you can destroy 1 Spell/Trap Card on their field.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    相手フィールドのモンスター１体を選んで破壊する。その後、相手の墓地にモンスターが５体以上いる場合、相手フィールドの魔法・罠カード１枚を選んで破壊できる。
  ko: |-
    상대 필드의 몬스터 1장을 고르고 파괴한다. 그 후, 상대 묘지에 몬스터가 5장 이상 있을 경우, 상대 필드의 마법 / 함정 카드 1장을 고르고 파괴할 수 있다.
  zh-TW:
  zh-CN:
