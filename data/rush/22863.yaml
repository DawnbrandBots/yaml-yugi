requirement:
  en: |-
    During your Main Phase that you Fusion Summoned this card, place 1 Level 7 or lower WIND Attribute monster from your Graveyard on the bottom of the Deck.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカードをフュージョン召喚した自分メインフェイズに、自分の墓地のモンスター（レベル７以下／風属性）１体をデッキの下に戻して発動できる。
  ko: |-
    이 카드를 퓨전 소환한 자신 메인 페이즈에, 자신 묘지의 몬스터(레벨 7 이하 / 바람 속성) 1장을 덱 아래로 되돌리고 발동할 수 있다.
  zh-TW:
  zh-CN:
effect:
  en: |-
    This card gains ATK equal to [the Level of the monster placed to meet the requirement] x 500 until the end of this turn. This turn, you can only attack with Galaxy Type monsters.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカードの攻撃力はターン終了時まで、［この効果の条件で戻したモンスターのレベル］×５００アップする。このターン、自分はモンスター（ギャラクシー族）でしか攻撃できない。
  ko: |-
    이 카드의 공격력은 턴 종료시까지, [이 효과의 조건으로 되돌린 몬스터의 레벨] × 500 올린다. 이 턴에, 자신은 몬스터(갤럭시족)로밖에 공격할 수 없다.
