effect:
  en: |-
    This turn, this face-up card can be treated as 2 Tributes for the Tribute Summon of a LIGHT Attribute Insect Type monster in Attack Position. Then, you can make 1 face-up monster on your opponent's field become Insect Type until the end of this turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このターン、モンスター（光属性／昆虫族）を攻撃表示でアドバンス召喚する場合、表側表示のこのカードは２体分のリリースにできる。さらに、相手フィールドの表側表示モンスター１体を選んでその種族をターン終了時まで昆虫族にできる。
  ko: |-
    이 턴에, 몬스터(빛 속성 / 곤충족)를 공격 표시로 어드밴스 소환할 경우, 앞면 표시인 이 카드는 2장만큼의 릴리스로 할 수 있다. 추가로, 상대 필드의 앞면 표시 몬스터 1장을 고르고 그 종족을 턴 종료시까지 곤충족으로 할 수 있다.
