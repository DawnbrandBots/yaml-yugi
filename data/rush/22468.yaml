requirement:
  en: |-
    When your opponent Normal or Special Summons a monster, send 1 face-up Zombie Type monster from your field to the Graveyard.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    相手がモンスターを召喚・特殊召喚した時、自分フィールドの表側表示モンスター（アンデット族）１体を墓地へ送って発動できる。
  ko: |-
    상대가 몬스터를 일반 소환 / 특수 소환했을 때, 자신 필드의 앞면 표시 몬스터(언데드족) 1장을 묘지로 보내고 발동할 수 있다.
  zh-TW:
  zh-CN:
effect:
  en: |-
    Change up to 2 Attack Position monsters on your opponent's field to face-up Defense Position. This turn, your opponent cannot Tribute those monsters for a Tribute Summon, nor use them as material for a Ritual Summon.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    相手フィールドの攻撃表示モンスターを２体まで選んで表側守備表示にする。このターン、相手は選んだモンスターを、アドバンス召喚のためにはリリースできず、リチュアル召喚の素材にできない。
  ko: |-
    상대 필드의 공격 표시 몬스터를 2장까지 고르고 앞면 수비 표시로 한다. 이 턴에, 상대는 고른 몬스터를, 어드밴스 소환을 위해서는 릴리스할 수 없으며, 리추얼 소환의 소재로 할 수 없다.
