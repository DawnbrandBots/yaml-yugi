  ja: |-
    このカードを召喚・特殊召喚した自分メインフェイズに、自分フィールドの元々のレベルが４以下の表側表示モンスター２体を墓地へ送って発動できる。
  ko: |-
    이 카드를 일반 소환 / 특수 소환한 자신 메인 페이즈에, 자신 필드의 원래 레벨이 4 이하인 앞면 표시 몬스터 2장을 묘지로 보내고 발동할 수 있다.
