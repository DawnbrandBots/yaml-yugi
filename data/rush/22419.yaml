effect:
  en: |-
    Special Summon 1 "Necromaid Carriage" or 1 LIGHT Attribute Zombie Type Ritual Monster from your Graveyard face-up to your field. This turn, you can only attack with Zombie Type monsters.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    自分の墓地の「ネクメイド・キャリッジ」またはリチュアルモンスター（光属性／アンデット族）１体を選び、自分フィールドに表側表示で特殊召喚する。このターン、自分はモンスター（アンデット族以外）で攻撃できない。
  ko: |-
    자신 묘지의 "네크메이드 캐리지" 또는 리추얼 몬스터(빛 속성 / 언데드족) 1장을 고르고, 자신 필드에 앞면 표시로 특수 소환한다. 이 턴에, 자신은 몬스터(언데드족 이외)로 공격할 수 없다.
