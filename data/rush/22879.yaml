effect:
  en: |-
    Excavate the top 4 cards of your Deck. You can add 1 excavated "Yorishiro of Isyria", "Monumenthes Festival -The Isyria Seance-", "Offering to Isyria", "Sarcophagus of Isyria", or "Spirit of Isyria" to your hand. Place the other cards on the bottom of your Deck in any order.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    自分のデッキの上からカードを４枚めくり、お互いに確認する。自分はその中から「イシリアの依代」「冥跡祭－イシリアの降霊－」「イシリアの供物」「イシリアの棺」「イシリアの霊魂」のいずれか１枚を選んで手札に加える事ができる。残りのカードを好きな順番でデッキの下に戻す。
  ko: |-
    자신의 덱 위에서 카드를 4장 넘기고, 서로 확인한다. 자신은 그 중에서 "이실리아의 의대" "명적제－이실리아의 강령－" "이실리아의 공물" "이실리아의 관" "이실리아의 영혼" 중 어느 1장을 고르고 패에 넣을 수 있다. 남은 카드를 좋아하는 순서대로 덱 아래로 되돌린다.
