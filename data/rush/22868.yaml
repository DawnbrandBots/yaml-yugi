requirement:
  en: |-
    If you have 5 or less monsters in your Graveyard during your Main Phase that you Special Summoned this card, change the battle position of 1 face-up monster on your field.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカードを特殊召喚した自分メインフェイズに、自分の墓地のモンスターが５体以下の場合、自分フィールドの表側表示モンスター１体の表示形式を変更して発動できる。
  ko: |-
    이 카드를 특수 소환한 자신 메인 페이즈에, 자신 묘지의 몬스터가 5장 이하일 경우, 자신 필드의 앞면 표시 몬스터 1장의 표시 형식을 변경하고 발동할 수 있다.
  zh-TW:
  zh-CN:
effect:
  en: |-
    Until the end of your opponent's next turn, while this card is face-up, your opponent cannot Special Summon Level 5 or lower monsters from the Graveyard face-up.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    次の相手ターン終了時まで、このカードが表側表示の間、相手は墓地からモンスター（レベル５以下）を表側表示で特殊召喚できない。
  ko: |-
    다음 상대 턴 종료시까지, 이 카드가 앞면 표시인 동안, 상대는 묘지에서 몬스터(레벨 5 이하)를 앞면 표시로 특수 소환할 수 없다.
