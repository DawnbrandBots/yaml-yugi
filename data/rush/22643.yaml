  ja: |-
    このカードを召喚したターンに、自分のデッキのカードが１０枚以上の場合に発動できる。
  ko: |-
    이 카드를 일반 소환한 턴에, 자신 덱의 카드가 10장 이상일 경우에 발동할 수 있다.
  zh-TW:
