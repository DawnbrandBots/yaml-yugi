effect:
  en: |-
    Send 2 other cards from your hand and/or field to the Graveyard. Then, if you have "Sparkhearts Girl", "Sparks", or "Curtain of Sparks" in your Graveyard, you can draw 2 cards. This turn, you can only attack with FIRE Attribute Spellcaster Type monsters.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード以外の自分の手札・フィールドのカード２枚を選んで墓地へ送る。その後、自分の墓地に「スパークハーツ・ガール」「火の粉」「火の粉のカーテン」のいずれかがある場合、自分は２枚ドローできる。このターン、自分はモンスター（炎属性／魔法使い族）でしか攻撃できない。
  ko: |-
    이 카드 이외의 자신의 패 / 필드의 카드 2장을 고르고 묘지로 보낸다. 그 후, 자신 묘지에 "스파크하츠 걸" "스파크" "스파크 커튼" 중 어느 것이 있을 경우, 자신은 2장 드로우할 수 있다. 이 턴에, 자신은 몬스터(화염 속성 / 마법사족)로밖에 공격할 수 없다.
