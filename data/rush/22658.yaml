effect:
  en: |-
    Add 1 Level 2 or lower EARTH Attribute Insect Type monster from your Graveyard to your hand. Then, you can Fusion Summon a Level 6 or lower Insect Type monster by sending EARTH Attribute Insect Type monsters from your hand or field to the Graveyard as material.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    自分の墓地のモンスター（レベル２以下／地属性／昆虫族）１体を選んで手札に加える。その後、自分の手札・フィールドのモンスター（地属性／昆虫族）を素材として墓地へ送ってモンスター（レベル６以下／昆虫族）をフュージョン召喚できる。
  ko: |-
    자신 묘지의 몬스터(레벨 2 이하 / 땅 속성 / 곤충족) 1장을 고르고 패에 넣는다. 그 후, 자신의 패 / 필드의 몬스터(땅 속성 / 곤충족)를 소재로서 묘지로 보내고 몬스터(레벨 6 이하 / 곤충족)를 퓨전 소환할 수 있다.
