effect:
  en: |-
    Excavate the top 4 cards of your Deck. You can add 1 non-Level 2 EARTH Attribute Galaxy Type monster and/or 1 "The Eternal Land -Spectrika-" to your hand. Place the other cards on the bottom of your Deck in any order. This turn, you can only attack with EARTH Attribute Galaxy Type monsters.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    自分のデッキの上からカードを４枚めくり、お互いに確認する。自分はその中からモンスター（レベル２以外／地属性／ギャラクシー族）と「悠久の郷－スペクトリカ－」をそれぞれ１枚まで選んで手札に加える事ができる。残りのカードを好きな順番でデッキの下に戻す。このターン、自分はモンスター（地属性／ギャラクシー族）でしか攻撃できない。
  ko: |-
    자신의 덱 위에서 카드를 4장 넘기고, 서로 확인한다. 자신은 그 중에서 몬스터(레벨 2 이외 / 땅 속성 / 갤럭시족)와 "유구의 고향－스펙트리카－"를 각각 1장까지 고르고 패에 넣을 수 있다. 남은 카드를 좋아하는 순서대로 덱 아래로 되돌린다. 이 턴에, 자신은 몬스터(땅 속성 / 갤럭시족)로밖에 공격할 수 없다.
