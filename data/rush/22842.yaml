effect:
  en: |-
    Send the top 2 cards of your opponent's Deck to the Graveyard. Then, if your opponent has 5 or more monsters in their Graveyard, and you have not drawn a card during this Main Phase, you can draw 2 cards. You cannot activate monster effects until the end of this turn, except those of EARTH Attribute Galaxy Type monsters.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    相手のデッキの上からカード２枚を墓地へ送る。その後、相手の墓地にモンスターが５体以上いて、自分がこのメインフェイズにドローしていない場合、自分は２枚ドローできる。この効果の発動後、ターン終了時まで自分はモンスター（地属性／ギャラクシー族）以外のモンスターの効果を発動できない。
  ko: |-
    상대의 덱 위에서 카드 2장을 묘지로 보낸다. 그 후, 상대 묘지에 몬스터가 5장 이상 있고, 자신이 이 메인 페이즈에 드로우하고 있지 않을 경우, 자신은 2장 드로우할 수 있다. 이 효과의 발동 후, 턴 종료시까지 자신은 몬스터(땅 속성 / 갤럭시족) 이외의 몬스터의 효과를 발동할 수 없다.
