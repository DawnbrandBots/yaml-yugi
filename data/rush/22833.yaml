  ko: |-
    이 카드의 카드명은 이 턴에, "보이드알브 헤븐스타"가 된다. 그 후, 자신 묘지의 "마이크로노바"를 2장까지 고르고 패에 넣을 수 있다. 이 효과의 발동 후, 턴 종료시까지 자신은 몬스터(갤럭시족 이외)의 효과를 발동할 수 없다.
