effect:
  en: |-
    Make up to 3 face-up Fairy Type monsters with 0 original ATK on your field gain 1000 ATK until the end of this turn. Then, if you have "All Love Goddess" face-up on your field, you can return 1 monster from your opponent's field to the owner's hand.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    自分フィールドの元々の攻撃力が０の表側表示モンスター（天使族）を３体まで選び、その攻撃力をターン終了時まで１０００アップする。自分フィールドに表側表示の「オールラヴ・ゴッデス」がいる場合、さらに相手フィールドのモンスター１体を選んで持ち主の手札に戻す事ができる。
  ko: |-
    자신 필드의 원래 공격력이 0 인 앞면 표시 몬스터(천사족)를 3장까지 고르고, 그 공격력을 턴 종료시까지 1000 올린다. 자신 필드에 앞면 표시인 "올라브 가디스"가 있을 경우, 추가로 상대 필드의 몬스터 1장을 고르고 주인의 패로 되돌릴 수 있다.
