  en: |-
    Destroy 1 Attack Position Level 3-8 Effect Monster on your opponent's field. Then, if you destroyed a monster whose original Level is 6 by this effect, you can inflict 600 damage to your opponent. This turn, you cannot attack with Level 6 or lower monsters.
