  ja: |-
    相手フィールドの攻撃表示の効果モンスター（レベル３～８）１体を選んで破壊する。この効果で元々のレベルが６のモンスターを破壊した場合、さらに相手に６００ダメージを与える事ができる。このターン、自分はモンスター（レベル６以下）で攻撃できない。
  ko: |-
    상대 필드의 공격 표시인 효과 몬스터(레벨 3~8) 1장을 고르고 파괴한다. 이 효과로 원래의 레벨이 6 인 몬스터를 파괴했을 경우, 추가로 상대에게 600 데미지를 줄 수 있다. 이 턴에, 자신은 몬스터(레벨 6 이하)로 공격할 수 없다.
