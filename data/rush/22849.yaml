  ja: |-
    このカードの攻撃力は次の相手ターン終了時まで１８００アップする。このカードを召喚したターンにこの効果を発動した場合、さらに自分の墓地のモンスター（レベル７以上／天使族／攻撃力０）１体または「ラヴ・クリーン」１枚を選んで手札に加える事ができる。
  ko: |-
    이 카드의 공격력은 다음 상대 턴 종료시까지 1800 올린다. 이 카드를 일반 소환한 턴에 이 효과를 발동했을 경우, 추가로 자신 묘지의 몬스터(레벨 7 이상 / 천사족 / 공격력 0) 1장 또는 "라브 클린" 1장을 고르고 패에 넣을 수 있다.
