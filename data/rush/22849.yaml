  en: |-
    This card gains 1800 ATK until the end of your opponent's next turn. Then, if you activated this effect during the turn you Normal Summoned this card, you can add 1 Level 7 or higher Fairy Type monster with 0 ATK or 1 "Lovely Clean" from your Graveyard to your hand.
