effect:
  en: |-
    Send the bottom card of your Deck to the Graveyard. Then, if you sent a Zombie Type monster to the Graveyard by this effect, you can Special Summon it face-up to your field. If you do, you cannot activate the effect of "Necromaid Carriage" this turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    自分のデッキの一番下のカードを墓地へ送る。この効果でモンスター（アンデット族）が墓地へ送られた場合、さらにそのモンスターを自分フィールドに表側表示で特殊召喚できる。特殊召喚した場合、このターン、自分は「ネクメイド・キャリッジ」の効果を発動できない。
  ko: |-
    자신의 덱 맨 아래의 카드를 묘지로 보낸다. 이 효과로 몬스터(언데드족)가 묘지로 보내졌을 경우, 추가로 그 몬스터를 자신 필드에 앞면 표시로 특수 소환할 수 있다. 특수 소환했을 경우, 이 턴에, 자신은 "네크메이드 캐리지"의 효과를 발동할 수 없다.
