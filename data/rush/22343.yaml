    自分フィールドの表側表示のこのカードを持ち主のデッキの下に戻して発動できる。
  ko: |-
    자신 필드의 앞면 표시인 이 카드를 주인의 덱 아래로 되돌리고 발동할 수 있다.
  zh-TW:
