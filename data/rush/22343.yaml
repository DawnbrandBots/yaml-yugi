effect:
  en: |-
    Special Summon 2 Level 4 or lower Normal Monsters with the same Type from your Graveyard face-up to your field. Destroy the monsters Special Summoned by this effect during the End Phase of this turn. This turn, you cannot activate the effect of "Rescue Rabbit".
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    自分の墓地の同じ種族の通常モンスター（レベル４以下）２体を選び、自分フィールドに表側表示で特殊召喚する。この効果で特殊召喚したモンスターはこのターンのエンドフェイズに破壊される。このターン、自分は「レスキューラビット」の効果を発動できない。
  ko: |-
    자신 묘지의 같은 종족의 일반 몬스터(레벨 4 이하) 2장을 고르고, 자신 필드에 앞면 표시로 특수 소환한다. 이 효과로 특수 소환한 몬스터는 이 턴의 엔드 페이즈에 파괴된다. 이 턴에, 자신은 "레스큐 래빗"의 효과를 발동할 수 없다.
