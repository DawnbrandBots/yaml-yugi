effect:
  en: |-
    Excavate the top 6 cards of your Deck. You can Special Summon 1 excavated Level 5 or lower EARTH Attribute Galaxy Type monster face-up to your field. Place the other cards on the bottom of your Deck in any order. This turn, you can only attack with EARTH Attribute Galaxy Type monsters.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    自分のデッキの上からカードを６枚めくり、お互いに確認する。自分はその中からモンスター（レベル５以下／地属性／ギャラクシー族）１体を選んで自分フィールドに表側表示で特殊召喚できる。残りのカードを好きな順番でデッキの下に戻す。このターン、自分はモンスター（地属性／ギャラクシー族）でしか攻撃できない。
  ko: |-
    자신의 덱 위에서 카드를 6장 넘기고, 서로 확인한다. 자신은 그 중에서 몬스터(레벨 5 이하 / 땅 속성 / 갤럭시족) 1장을 고르고 자신 필드에 앞면 표시로 특수 소환할 수 있다. 남은 카드를 좋아하는 순서대로 덱 아래로 되돌린다. 이 턴에, 자신은 몬스터(땅 속성 / 갤럭시족)로밖에 공격할 수 없다.
