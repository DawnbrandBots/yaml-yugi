  ja: |-
    自分のデッキの上からカードを５枚めくり、お互いに確認する。自分はその中からモンスター（アンデット族）１体またはリチュアル魔法カード１枚を選んで墓地へ送る事ができる。残りのカードを好きな順番でデッキの下に戻す。
  ko: |-
    자신의 덱 위에서 카드를 5장 넘기고, 서로 확인한다. 자신은 그 중에서 몬스터(언데드족) 1장 또는 리추얼 마법 카드 1장을 고르고 묘지로 보낼 수 있다. 남은 카드를 좋아하는 순서대로 덱 아래로 되돌린다.
