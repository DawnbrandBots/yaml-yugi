effect:
  en: |-
    Ritual Summon "Fiend's Mirror" or "Absorbing Fiend's Mirror" by sending face-up Fiend Type monsters from your field to the Graveyard whose total Levels equal 6 or more as material (you cannot use more monsters than necessary as material). Then, if you have "Beastly Mirror Ritual" in your Graveyard, you can destroy 1 card on your opponent's field.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    レベルの合計が６以上になるように、自分フィールドの表側表示モンスター（悪魔族）を素材として墓地へ送り、「デビルズ・ミラー」または「吸収するデビルズ・ミラー」をリチュアル召喚する（余分にモンスターを素材にできない）。その後、自分の墓地に「悪魔鏡の儀式」がある場合、相手フィールドのカード１枚を選んで破壊できる。
