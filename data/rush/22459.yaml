  en: |-
    Place 1 face-up monster from your field on the bottom of the owner's Deck.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    自分フィールドの表側表示モンスター１体を持ち主のデッキの下に戻して発動できる。
  ko: |-
    자신 필드의 앞면 표시 몬스터 1장을 주인의 덱 아래로 되돌리고 발동할 수 있다.
  zh-TW:
  zh-CN:
effect:
  en: |-
    Add 1 LIGHT Attribute Machine Type monster with 800 DEF from your Graveyard to your hand. If you have "Power Capsule Red" in your Graveyard, you can also Fusion Summon a Level 4 Machine Type monster with 800 DEF by sending monsters from your hand or field to the Graveyard as material.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    自分の墓地のモンスター（光属性／機械族／守備力８００）１体を選んで手札に加える。自分の墓地に「パワーカプセル レッド」がある場合、さらに自分の手札・フィールドのモンスターを素材として墓地へ送ってモンスター（レベル４／機械族／守備力８００）をフュージョン召喚できる。
  ko: |-
    자신 묘지의 몬스터(빛 속성 / 기계족 / 수비력 800) 1장을 고르고 패에 넣는다. 자신 묘지에 "파워 캡슐 레드"가 있을 경우, 추가로 자신의 패 / 필드의 몬스터를 소재로서 묘지로 보내고 몬스터(레벨 4 / 기계족 / 수비력 800)를 퓨전 소환할 수 있다.
