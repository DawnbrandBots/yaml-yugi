  ja: |-
    このカードのカード名はこのターン、「ザ☆ドラゴン」になる。自分の墓地のモンスターがハイドラゴン族・ドラゴン族のみの場合、さらに自分の手札・フィールドのモンスターを素材として持ち主のデッキに戻してモンスター（ハイドラゴン族／守備力２０００）をフュージョン召喚できる。
  ko: |-
    【조건】이 카드를 일반 소환한 턴에, 패 1장을 묘지로 보내고 발동할 수 있다.
    【효과】이 카드의 카드명은 이 턴에, "더☆드래곤"이 된다. 자신 묘지의 몬스터가 하이드래곤족 / 드래곤족뿐일 경우, 추가로 자신의 패 / 필드의 몬스터를 소재로서 주인의 덱으로 되돌리고 몬스터(하이드래곤족 / 수비력 2000)를 퓨전 소환할 수 있다.
