effect:
  en: |-
    This turn, this card's name becomes "The Dragon". Then, if the only monsters in your Graveyard are High Dragon and/or Dragon Type monsters, you can Fusion Summon a High Dragon Type monster with 2000 DEF by shuffling monsters from your hand and/or field into the owner's Deck as material.
