  en: |-
    Add 1 EARTH Attribute Insect Type monster with 2000 DEF from your Graveyard to your hand. If you added "Double Cannon Armor" by this effect, you can destroy 1 Spell/Trap Card on your opponent's field.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    自分の墓地のモンスター（地属性／昆虫族／守備力２０００）１体を選んで手札に加える。この効果で「連装砲機甲鎧」を選んだ場合、さらに相手フィールドの魔法・罠カード１枚を選んで破壊できる。
  ko: |-
    자신 묘지의 몬스터(땅 속성 / 곤충족 / 수비력 2000) 1장을 고르고 패에 넣는다. 이 효과로 "더블 캐논 아머"를 고른 경우, 추가로 상대 필드의 마법 / 함정 카드 1장을 고르고 파괴할 수 있다.
