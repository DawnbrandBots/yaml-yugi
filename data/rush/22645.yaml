effect:
  en: |-
    Ritual Summon "Sparkhearts Passion Girl" or "Sparkhearts Passion Anesh" by sending face-up FIRE Attribute Spellcaster Type monsters from your field to the Graveyard as material whose total Levels equal or exceed the Level of the monster you Ritual Summon (you cannot use more monsters than necessary as material). Then, you can destroy 1 face-up Level 6 or lower Fiend or Warrior Type monster on your opponent's field.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    レベルの合計がリチュアル召喚するモンスターのレベル以上になるように、自分フィールドの表側表示モンスター（炎属性／魔法使い族）を素材として墓地へ送り、「スパークハーツ・パッションガール」または「スパークハーツ・パッションアネッシュ」をリチュアル召喚する（余分にモンスターを素材にできない）。その後、相手フィールドの表側表示モンスター（レベル６以下／悪魔族・戦士族）１体を選んで破壊できる。
  ko: |-
    레벨의 합계가 리추얼 소환할 몬스터의 레벨 이상이 되도록, 자신 필드의 앞면 표시 몬스터(화염 속성 / 마법사족)를 소재로서 묘지로 보내고, "스파크하츠 패션걸" 또는 "스파크하츠 패션아넷슈"를 리추얼 소환한다(여분의 몬스터를 소재로 할 수 없다). 그 후, 상대 필드의 앞면 표시 몬스터(레벨 6 이하 / 악마족・전사족) 1장을 고르고 파괴할 수 있다.
