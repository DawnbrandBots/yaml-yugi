  ko: |-
    이 카드의 공격력은 턴 종료시까지 600 올린다. 그 후, 자신의 패 1장을 고르고 묘지로 보낼 수 있다. 이 효과로 묘지로 보냈을 경우, 추가로 상대 필드의 몬스터 1장을 고르고 표시 형식을 변경할 수 있다.
