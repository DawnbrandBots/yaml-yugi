  en: |-
    If you have "Sparks" or "Curtain of Sparks" in your Graveyard, you can Special Summon this card from your hand face-up to your field.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    自分の墓地に「火の粉」または「火の粉のカーテン」がある場合、このカードは手札から自分フィールドに表側表示で特殊召喚できる。
  ko: |-
    자신 묘지에 "스파크" 또는 "스파크 커튼"이 있을 경우, 이 카드는 패에서 자신 필드에 앞면 표시로 특수 소환할 수 있다.
