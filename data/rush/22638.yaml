  es:
  fr:
  it:
  pt:
  ja: |-
    このカードを召喚・特殊召喚した自分メインフェイズに発動できる。
  ko: |-
    이 카드를 일반 소환 / 특수 소환한 자신 메인 페이즈에 발동할 수 있다.
  zh-TW:
  zh-CN:
effect:
  en: |-
    Send the top 3 cards of your Deck to the Graveyard. Then, you can add to your hand 1 FIRE Attribute Spellcaster Type monster from among the cards sent. This turn, you cannot activate the effect of "Sparkhearts Anesh".
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    自分のデッキの上からカード３枚を墓地へ送る。その後、その中からモンスター（炎属性／魔法使い族）１体を選んで手札に加える事ができる。このターン、自分は「スパークハーツ・アネッシュ」の効果を発動できない。
  ko: |-
    자신의 덱 위에서 카드 3장을 묘지로 보낸다. 그 후, 그 중에서 몬스터(화염 속성 / 마법사족) 1장을 고르고 패에 넣을 수 있다. 이 턴에, 자신은 "스파크하츠 아넷슈"의 효과를 발동할 수 없다.
