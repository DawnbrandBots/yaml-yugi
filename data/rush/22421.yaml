  ko: |-
    자신의 덱 위에서 카드 2장을 묘지로 보낸다. 그 중에 몬스터(언데드족)가 있었을 경우, 추가로 자신은 상대 묘지의 마법 / 함정 카드 1장을 고를 수 있다. 고른 경우, 상대는 그 카드를 자신의 필드에 세트한다.
