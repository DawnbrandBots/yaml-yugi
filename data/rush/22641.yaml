  ko: |-
    이 카드의 레벨은 턴 종료시까지 3 올라간다. 그 후, 자신 묘지의 "스파크하츠 걸" 1장 또는 "밭이 엉망이라 곤란해요!" 1장을 고르고 패에 넣을 수 있다. 이 턴에, 자신은 몬스터(화염 속성 / 마법사족)로밖에 공격할 수 없다.
