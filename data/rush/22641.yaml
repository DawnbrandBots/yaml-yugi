    Increase this card's Level by 3 until the end of this turn. Then, you can add 1 "Sparkhearts Girl" or 1 "I'm Having Trouble with My Fields Being Destroyed!" from your Graveyard to your hand. This turn, you can only attack with FIRE Attribute Spellcaster Type monsters.
