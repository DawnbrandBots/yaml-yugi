effect:
  en: |-
    This turn, this card's name becomes "Gradius". Then, you can send up to 2 other monsters from your hand or field to the Graveyard. If you sent a monster to the Graveyard, you can Special Summon "Gradius' Option" from your Graveyard to your field in face-up Defense Position equal to [the number of monsters sent to the Graveyard by this effect].
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカードのカード名はこのターン、「超時空戦闘機ビック・バイパー」になる。その後、このカード以外の自分の手札・フィールドのモンスターを２体まで選んで墓地へ送る事ができる。墓地へ送った場合、さらに自分の墓地の「オプション」を［この効果で墓地へ送ったモンスターの数］だけ選んで自分フィールドに表側守備表示で特殊召喚できる。
  ko: |-
    이 카드의 카드명은 이 턴에, "초시공 전투기 빅 바이퍼"가 된다. 그 후, 이 카드 이외의 자신의 패 / 필드의 몬스터를 2장까지 고르고 묘지로 보낼 수 있다. 묘지로 보냈을 경우, 추가로 자신 묘지의 "옵션"을 [이 효과로 묘지로 보낸 몬스터의 수]만큼 고르고 자신 필드에 앞면 수비 표시로 특수 소환할 수 있다.
