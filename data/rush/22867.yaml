effect:
  en: |-
    This card cannot be destroyed by card effects. When you Normal or Special Summon a Beast-Warrior Type monster face-up, your opponent cannot activate Trap Cards. During your turn, other face-up EARTH Attribute Beast-Warrior Type monsters on your field gain 3000 ATK, and they inflict piercing battle damage.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカードは効果では破壊されない。自分がモンスター（獣戦士族）を表側表示で召喚・特殊召喚した時に相手は罠カードを発動できない。自分ターンの間、このカード以外の自分フィールドの表側表示モンスター（地属性／獣戦士族）の攻撃力は３０００アップし、その攻撃は貫通する。
  ko: |-
    이 카드는 효과로는 파괴되지 않는다. 자신이 몬스터(야수전사족)를 앞면 표시로 일반 소환 / 특수 소환했을 때에 상대는 함정 카드를 발동할 수 없다. 자신 턴 동안, 이 카드 이외의 자신 필드의 앞면 표시 몬스터(땅 속성 / 야수전사족)의 공격력은 3000 올리고, 그 공격은 관통한다.
