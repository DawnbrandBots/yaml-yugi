effect:
  en: |-
    Change 1 face-up monster on your opponent's field to face-down Defense Position. Then, you can choose 1 face-up Level 6 or lower DARK Attribute Warrior Type monster on your field. This turn, that monster's Level is increased by 3, and it inflicts piercing battle damage.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    相手フィールドの表側表示モンスター１体を選んで裏側守備表示にする。その後、自分フィールドの表側表示モンスター（レベル６以下／闇属性／戦士族）１体を選ぶ事ができる。選んだ場合、このターン、そのモンスターのレベルは３上がり、その攻撃は貫通する。
  ko: |-
    상대 필드의 앞면 표시 몬스터 1장을 고르고 뒷면 수비 표시로 한다. 그 후, 자신 필드의 앞면 표시 몬스터(레벨 6 이하 / 어둠 속성 / 전사족) 1장을 고를 수 있다. 고른 경우, 이 턴에, 그 몬스터의 레벨은 3 올라가고, 그 공격은 관통한다.
