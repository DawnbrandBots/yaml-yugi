  ja: |-
    このカードをフュージョン召喚した自分メインフェイズに、モンスター（水属性）を含む自分の墓地のモンスター（ギャラクシー族）３体をデッキに戻して発動できる。
  ko: |-
    이 카드를 퓨전 소환한 자신 메인 페이즈에, 몬스터(물 속성)를 포함하는 자신 묘지의 몬스터(갤럭시족) 3장을 덱으로 되돌리고 발동할 수 있다.
  zh-TW:
  zh-CN:
effect:
  en: |-
    Return up to 3 face-up Level 8 or lower monsters and/or face-down monsters from your opponent's field to the owner's hand. This turn, you can only attack with 1 monster.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    相手フィールドの表側表示モンスター（レベル８以下）または裏側表示モンスターを合計３体まで選んで持ち主の手札に戻す。このターン、自分はモンスター１体でしか攻撃できない。
  ko: |-
    상대 필드의 앞면 표시 몬스터(레벨 8 이하) 또는 뒷면 표시 몬스터를 합계 3장까지 고르고 주인의 패로 되돌린다. 이 턴에, 자신은 몬스터 1장으로밖에 공격할 수 없다.
