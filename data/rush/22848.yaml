requirement:
  en: |-
    If you have 10 or more cards in your Deck, reveal 1 Fairy Type monster with 0 ATK in your hand.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    自分のデッキのカードが１０枚以上の場合、手札のモンスター（天使族／攻撃力０）１体を相手に見せて発動できる。
  ko: |-
    자신 덱의 카드가 10장 이상일 경우, 패의 몬스터(천사족 / 공격력 0) 1장을 상대에게 보여주고 발동할 수 있다.
  zh-TW:
  zh-CN:
effect:
  en: |-
    Draw 1 card. Then, send 1 card from your hand to the Graveyard. Then, if you have a face-up DARK Attribute Fairy Type monster with 0 original ATK on your field, you can make 1 face-up monster on your opponent's field lose 1000 ATK until the end of this turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    自分は１枚ドローする。その後、自分の手札１枚を選んで墓地へ送る。自分フィールドに元々の攻撃力が０の表側表示モンスター（闇属性／天使族）がいる場合、さらに相手フィールドの表側表示モンスター１体を選んでその攻撃力をターン終了時まで１０００ダウンできる。
  ko: |-
    자신은 1장 드로우한다. 그 후, 자신의 패 1장을 고르고 묘지로 보낸다. 자신 필드에 원래 공격력이 0 인 앞면 표시 몬스터(어둠 속성 / 천사족)가 있을 경우, 추가로 상대 필드의 앞면 표시 몬스터 1장을 고르고 그 공격력을 턴 종료시까지 1000 내릴 수 있다.
