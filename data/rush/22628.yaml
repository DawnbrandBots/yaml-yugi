effect:
  en: |-
    Ritual Summon "Gaigustvelgr the Defiant Soulclad Sword" by sending face-up Zombie Type monsters from your field to the Graveyard whose total Levels equal 5 or more as material (you cannot use more monsters than necessary as material). Then, if you sent a monster whose original name is "Gaigust the Defiant Soul" to the Graveyard by this effect, you can destroy 1 face-down card on your opponent's field.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    レベルの合計が５以上になるように、自分フィールドの表側表示モンスター（アンデット族）を素材として墓地へ送り、「叛骨装剣ガイガスベルグ」をリチュアル召喚する（余分にモンスターを素材にできない）。この効果で元々のカード名が「叛骨のガイガスト」のモンスターを墓地へ送った場合、さらに相手フィールドの裏側表示のカード１枚を選んで破壊できる。
  ko: |-
    레벨의 합계가 5 이상이 되도록, 자신 필드의 앞면 표시 몬스터(언데드족)를 소재로서 묘지로 보내고, "반골장검 가이가스베르그"를 리추얼 소환한다(여분의 몬스터를 소재로 할 수 없다). 이 효과로 원래의 카드명이 "반골의 가이가스트"인 몬스터를 묘지로 보냈을 경우, 추가로 상대 필드의 뒷면 표시인 카드 1장을 고르고 파괴할 수 있다.
