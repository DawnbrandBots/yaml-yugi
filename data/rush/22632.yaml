  ko: |-
    상대 필드의 마법 / 함정 카드 1장을 고르고 파괴한다. 그 후, 자신의 필드 / 묘지의 몬스터(언데드족)를 소재로서 주인의 덱으로 되돌리고 몬스터(언데드족 / 수비력 0)를 퓨전 소환할 수 있다.
