requirement:
  en: |-
    You have 10 or more cards in your Deck during the turn you Normal Summoned this card.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカードを召喚したターンに、自分のデッキのカードが１０枚以上の場合に発動できる。
  ko: |-
    이 카드를 일반 소환한 턴에, 자신 덱의 카드가 10장 이상일 경우에 발동할 수 있다.
  zh-TW:
  zh-CN:
effect:
  en: |-
    Excavate the top 3 cards of your Deck. You can add 1 excavated Ritual Spell Card to your hand. Place the other cards on the bottom of your Deck in any order. If you have "Sparks" or "Curtain of Sparks" in your Graveyard, excavate 6 cards instead.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    自分のデッキの上からカードを３枚めくり、お互いに確認する。自分はその中からリチュアル魔法カード１枚を選んで手札に加える事ができる。残りのカードを好きな順番でデッキの下に戻す。自分の墓地に「火の粉」または「火の粉のカーテン」がある場合、この効果でめくる枚数は６枚になる。
  ko: |-
    자신의 덱 위에서 카드를 3장 넘기고, 서로 확인한다. 자신은 그 중에서 리추얼 마법 카드 1장을 고르고 패에 넣을 수 있다. 남은 카드를 좋아하는 순서대로 덱 아래로 되돌린다. 자신 묘지에 "스파크" 또는 "스파크 커튼"이 있을 경우, 이 효과로 넘기는 매수는 6장이 된다.
