effect:
  en: |-
    Choose 1 face-up Level 8 or lower monster on your opponent's field. During your opponent's next turn, your opponent cannot attack with that monster. Then, you can place 1 monster from your Graveyard on the bottom of the Deck. If you do, this card gains 500 DEF until the end of your opponent's next turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    相手フィールドの表側表示モンスター（レベル８以下）１体を選ぶ。次の相手ターン、相手はそのモンスターで攻撃できない。さらに、自分の墓地のモンスター１体を選んでデッキの下に戻す事ができる。戻した場合、このカードの守備力は次の相手ターン終了時まで５００アップする。
  ko: |-
    상대 필드의 앞면 표시 몬스터(레벨 8 이하) 1장을 고른다. 다음 상대 턴에, 상대는 그 몬스터로 공격할 수 없다. 추가로, 자신 묘지의 몬스터 1장을 고르고 덱 아래로 되돌릴 수 있다. 되돌렸을 경우, 이 카드의 수비력은 다음 상대 턴 종료시까지 500 올린다.
