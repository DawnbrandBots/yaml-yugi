effect:
  en: |-
    Destroy 1 face-down Spell/Trap Card on your opponent's field. Then, if your opponent has a non-Normal Spell Card in their Graveyard, you can Special Summon up to 2 monsters from your hand and/or Graveyard face-up to your field.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    相手フィールドの裏側表示の魔法・罠カード１枚を選んで破壊する。その後、相手の墓地に通常魔法カード以外の魔法カードがある場合、自分の手札・墓地のモンスターを２体まで選んで自分フィールドに表側表示で特殊召喚できる。
  ko: |-
    상대 필드의 뒷면 표시인 마법 / 함정 카드 1장을 고르고 파괴한다. 그 후, 상대 묘지에 일반 마법 카드 이외의 마법 카드가 있을 경우, 자신의 패 / 묘지의 몬스터를 2장까지 고르고 자신 필드에 앞면 표시로 특수 소환할 수 있다.
