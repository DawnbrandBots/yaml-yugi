    Send 1 other card from your hand or field to the Graveyard. Then, you can add 1 FIRE Attribute Spellcaster Type monster from your Graveyard to your hand, except a monster with 600 ATK. This turn, you cannot activate the effect of "Sparkhearts Hat".
