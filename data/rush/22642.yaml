  ja: |-
    このカード以外の自分の手札・フィールドのカード１枚を選んで墓地へ送る。その後、自分の墓地のモンスター（炎属性／魔法使い族／攻撃力６００以外）１体を選んで手札に加える事ができる。このターン、自分は「スパークハーツ・ハット」の効果を発動できない。
  ko: |-
    이 카드 이외의 자신의 패 / 필드의 카드 1장을 고르고 묘지로 보낸다. 그 후, 자신 묘지의 몬스터(화염 속성 / 마법사족 / 공격력 600 이외) 1장을 고르고 패에 넣을 수 있다. 이 턴에, 자신은 "스파크하츠 햇"의 효과를 발동할 수 없다.
