effect:
  en: |-
    Send the top 2 cards of your Deck to the Graveyard. Then, you can make all face-up monsters on your field gain ATK equal to [the number of Galaxy Type monsters with different Attributes in your Graveyard] x 100 until the end of this turn. Then, you can Set 1 "Micronova" or "Micronova Fusion" from your Graveyard to your Spell & Trap Zone.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    自分のデッキの上からカード２枚を墓地へ送る。その後、自分フィールドの全ての表側表示モンスターの攻撃力をターン終了時まで、［自分の墓地のモンスター（ギャラクシー族）の属性の種類］×１００アップできる。さらに、自分の墓地の「マイクロノヴァ」または「マイクロノヴァ・フュージョン」１枚を選んで自分の魔法＆罠ゾーンにセットできる。
  ko: |-
    자신의 덱 위에서 카드 2장을 묘지로 보낸다. 그 후, 자신 필드의 모든 앞면 표시 몬스터의 공격력을 턴 종료시까지, [자신 묘지의 몬스터(갤럭시족)의 속성의 종류] × 100 올릴 수 있다. 추가로, 자신 묘지의 "마이크로노바" 또는 "마이크로노바 퓨전" 1장을 고르고 자신의 마법 & 함정 존에 세트할 수 있다.
