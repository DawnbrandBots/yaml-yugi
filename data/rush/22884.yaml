effect:
  en: |-
    Send the top 2 cards of your Deck to the Graveyard. Then, you can add 1 DARK Attribute Fairy Type monster with 0 ATK from your Graveyard to your hand. Then, if you have a face-up LIGHT Attribute Fairy Type monster with 0 original ATK and DEF on your field, you can place 1 face-down card from your opponent's field on the bottom of the owner's Deck.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    自分のデッキの上からカード２枚を墓地へ送る。その後、自分の墓地のモンスター（闇属性／天使族／攻撃力０）１体を選んで手札に加える事ができる。自分フィールドに元々の攻撃力・守備力が０の表側表示モンスター（光属性／天使族）がいる場合、さらに相手フィールドの裏側表示のカード１枚を選んで持ち主のデッキの下に戻す事ができる。
  ko: |-
    자신의 덱 위에서 카드 2장을 묘지로 보낸다. 그 후, 자신 묘지의 몬스터(어둠 속성 / 천사족 / 공격력 0) 1장을 고르고 패에 넣을 수 있다. 자신 필드에 원래의 공격력 / 수비력이 0 인 앞면 표시 몬스터(빛 속성 / 천사족)가 있을 경우, 추가로 상대 필드의 뒷면 표시인 카드 1장을 고르고 주인의 덱 아래로 되돌릴 수 있다.
