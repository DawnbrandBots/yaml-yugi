effect:
  en: |-
    Ritual Summon "Souffraruda the Defiant Soulclad Scripture" by sending face-up Zombie Type monsters from your field to the Graveyard whose total Levels equal 3 or more as material (you cannot use more monsters than necessary as material). Then, if you sent a monster whose original name is "Souffraes the Defiant Soul" to the Graveyard by this effect, you can draw 1 card.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    レベルの合計が３以上になるように、自分フィールドの表側表示モンスター（アンデット族）を素材として墓地へ送り、「叛骨装典スフレルーダ」をリチュアル召喚する（余分にモンスターを素材にできない）。この効果で元々のカード名が「叛骨のスフレース」のモンスターを墓地へ送った場合、さらに自分は１枚ドローできる。
  ko: |-
    레벨의 합계가 3 이상이 되도록, 자신 필드의 앞면 표시 몬스터(언데드족)를 소재로서 묘지로 보내고, "반골장전 스플레루더"를 리추얼 소환한다(여분의 몬스터를 소재로 할 수 없다). 이 효과로 원래의 카드명이 "반골의 스플레이스"인 몬스터를 묘지로 보냈을 경우, 추가로 자신은 1장 드로우할 수 있다.
