    자신의 덱 위에서 카드를 4장 넘기고, 서로 확인한다. 자신은 그 중에서 "초시공 전투기 빅 바이퍼"와 효과 몬스터(빛 속성 / 기계족 / 수비력 800)를 각각 1장까지 고르고 패에 넣을 수 있다. 남은 카드를 좋아하는 순서대로 덱 아래로 되돌린다.
