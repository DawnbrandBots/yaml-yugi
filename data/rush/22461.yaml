  ja: |-
    自分のデッキの上からカードを４枚めくり、お互いに確認する。自分はその中から「超時空戦闘機ビック・バイパー」と効果モンスター（光属性／機械族／守備力８００）をそれぞれ１体まで選んで手札に加える事ができる。残りのカードを好きな順番でデッキの下に戻す。
