  fr:
  it:
  pt:
  ja: |-
    相手フィールドの表側表示モンスター（レベル３以上）１体を選び、そのレベルをターン終了時まで２下げる。このカードが攻撃表示の場合、さらに自分の墓地の「封拳のキョシー」１体を選んで自分フィールドに表側守備表示で特殊召喚できる。
  ko: |-
    상대 필드의 앞면 표시 몬스터(레벨 3 이상) 1장을 고르고, 그 레벨을 턴 종료시까지 2 내린다. 이 카드가 공격 표시일 경우, 추가로 자신 묘지의 "봉권의 쿄시" 1장을 고르고 자신 필드에 앞면 수비 표시로 특수 소환할 수 있다.
