  en: |-
    Reduce the Level of 1 face-up Level 3 or higher monster on your opponent's field by 2 until the end of this turn. Then, if this card is in Attack Position, you can Special Summon 1 "Kyoshee of the Forbidden Fist" from your Graveyard to your field in face-up Defense Position.
