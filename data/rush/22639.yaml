requirement:
  en: |-
    Shuffle 2 FIRE Attribute Spellcaster Type monsters or 4 monsters from your Graveyard into the Deck.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    自分の墓地のモンスター（炎属性／魔法使い族）２体またはモンスター４体をデッキに戻して発動できる。
  ko: |-
    자신 묘지의 몬스터(화염 속성 / 마법사족) 2장 또는 몬스터 4장을 덱으로 되돌리고 발동할 수 있다.
  zh-TW:
  zh-CN:
effect:
  en: |-
    Change the battle position of up to 2 face-up monsters on your field and/or monsters on your opponent's field. Then, if you have 10 or more cards in your Deck, you can add up to 4 "Sparkhearts Girl", "Sparks", and/or "Curtain of Sparks" from your Graveyard to your hand.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    自分フィールドの表側表示モンスターまたは相手フィールドのモンスターを合計２体まで選んで表示形式を変更する。自分のデッキのカードが１０枚以上の場合、さらに自分の墓地の「スパークハーツ・ガール」「火の粉」「火の粉のカーテン」を合計４枚まで選んで手札に加える事ができる。
  ko: |-
    자신 필드의 앞면 표시 몬스터 또는 상대 필드의 몬스터를 합계 2장까지 고르고 표시 형식을 변경한다. 자신 덱의 카드가 10장 이상일 경우, 추가로 자신 묘지의 "스파크하츠 걸" "스파크" "스파크 커튼"을 합계 4장까지 고르고 패에 넣을 수 있다.
