effect:
  en: |-
    Ritual Summon an EARTH Attribute Galaxy Type monster with a different name from the monsters used as material by shuffling face-up Galaxy Type monsters from your field into the owner's Deck as material whose total Levels equal the Level of the monster you Ritual Summon. Then, you can send cards from the top of your opponent's Deck to the Graveyard, up to [the number of monsters used as material by this effect].
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    レベルの合計がリチュアル召喚するモンスターと同じになるように、自分フィールドの表側表示モンスター（ギャラクシー族）を素材として持ち主のデッキに戻し、素材としたモンスターとはカード名が異なるリチュアルモンスター（地属性／ギャラクシー族）をリチュアル召喚する。その後、相手のデッキの上から［この効果で素材としたモンスターの数］までカードを墓地へ送る事ができる。
  ko: |-
    레벨의 합계가 리추얼 소환할 몬스터와 같아지도록, 자신 필드의 앞면 표시 몬스터(갤럭시족)를 소재로서 주인의 덱으로 되돌리고, 소재로 한 몬스터와는 카드명이 다른 리추얼 몬스터(땅 속성 / 갤럭시족)를 리추얼 소환한다. 그 후, 상대의 덱 위에서 [이 효과로 소재로 한 몬스터의 수]까지 카드를 묘지로 보낼 수 있다.
