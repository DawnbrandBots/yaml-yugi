requirement:
  en: |-
    If you have 10 or more cards in your Deck, show up to 2 other cards from your hand and/or field, and place them on the bottom of the owner's Deck in any order.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    自分のデッキのカードが１０枚以上の場合、このカード以外の自分の手札・フィールドのカードを２枚までお互いに確認し、好きな順番で持ち主のデッキの下に戻して発動できる。
  ko: |-
    자신 덱의 카드가 10장 이상일 경우, 이 카드 이외의 자신의 패 / 필드의 카드를 2장까지 서로 확인하여, 좋아하는 순서대로 주인의 덱 아래로 되돌리고 발동할 수 있다.
  zh-TW:
  zh-CN:
effect:
  en: |-
    Draw cards equal to [the number of cards placed to meet the requirement]. You cannot activate monster effects until the end of this turn, except those of EARTH Attribute Galaxy Type monsters.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    自分は［この効果の条件で戻したカードの数］だけドローする。この効果の発動後、ターン終了時まで自分はモンスター（地属性／ギャラクシー族）以外のモンスターの効果を発動できない。
  ko: |-
    자신은 [이 효과의 조건으로 되돌린 카드의 수]만큼 드로우한다. 이 효과의 발동 후, 턴 종료시까지 자신은 몬스터(땅 속성 / 갤럭시족) 이외의 몬스터의 효과를 발동할 수 없다.
  zh-TW:
  zh-CN:
