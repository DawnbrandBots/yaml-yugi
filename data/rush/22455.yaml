effect:
  en: |-
    Ritual Summon a Level 7 LIGHT Attribute Zombie Type monster by sending face-up Zombie Type monsters from your field to the Graveyard whose total Levels equal 7 or more as material (you cannot use more monsters than necessary as material). This turn, you can only attack with Zombie Type monsters.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    レベルの合計が７以上になるように、自分フィールドの表側表示モンスター（アンデット族）を素材として墓地へ送り、モンスター（レベル７／光属性／アンデット族）をリチュアル召喚する（余分にモンスターを素材にできない）。このターン、自分はモンスター（アンデット族以外）で攻撃できない。
  ko: |-
    레벨의 합계가 7 이상이 되도록, 자신 필드의 앞면 표시 몬스터(언데드족)를 소재로서 묘지로 보내고, 몬스터(레벨 7 / 빛 속성 / 언데드족)를 리추얼 소환한다(여분의 몬스터를 소재로 할 수 없다). 이 턴에, 자신은 몬스터(언데드족 이외)로 공격할 수 없다.
