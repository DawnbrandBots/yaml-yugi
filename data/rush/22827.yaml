effect:
  en: |-
    This turn, this card's name becomes "Voidvelg Palerider". Then, excavate 3 cards from the top of your Deck and show them. You can add 1 "Voidvelg Requiem" or 1 DARK Attribute Galaxy Type Normal Monster from those cards to your hand. Place the rest of the cards on the bottom of your Deck in any order.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカードのカード名はこのターン、「ヴォイドヴェルグ・ペイルライダー」になる。その後、自分のデッキの上からカードを３枚めくり、お互いに確認する。自分はその中から「ヴォイドヴェルグ・レクイエム」または通常モンスター（闇属性／ギャラクシー族）１体を選んで手札に加える事ができる。残りのカードを好きな順番でデッキの下に戻す。
  ko: |-
    이 카드의 카드명은 이 턴에, "보이드베르그 페일라이더"가 된다. 그 후, 자신의 덱 위에서 카드를 3장 넘기고, 서로 확인한다. 자신은 그 중에서 "보이드베르그 레퀴엠" 또는 일반 몬스터(어둠 속성 / 갤럭시족) 1장을 고르고 패에 넣을 수 있다. 남은 카드를 좋아하는 순서대로 덱 아래로 되돌린다.
