effect:
  en: |-
    Send the top 3 cards of your Deck to the Graveyard. Then, you can add 1 Aqua Type Normal Monster or 1 Level 4 LIGHT Attribute Aqua Type monster from your Graveyard to your hand. If you added "Grace Princess Kana" by this effect, you can Set 1 Ritual Spell Card from your Graveyard to your Spell & Trap Zone.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    自分のデッキの上からカード３枚を墓地へ送る。その後、自分の墓地の通常モンスター（水族）またはモンスター（レベル４／光属性／水族）１体を選んで手札に加える事ができる。この効果で「いとをかしかなひめ」を選んだ場合、さらに自分の墓地のリチュアル魔法カード１枚を選んで自分の魔法＆罠ゾーンにセットできる。
  ko: |-
    자신의 덱 위에서 카드 3장을 묘지로 보낸다. 그 후, 자신 묘지의 일반 몬스터(물족) 또는 몬스터(레벨 4 / 빛 속성 / 물족) 1장을 고르고 패에 넣을 수 있다. 이 효과로 "앙갱공주"를 고른 경우, 추가로 자신 묘지의 리추얼 마법 카드 1장을 고르고 자신의 마법 & 함정 존에 세트할 수 있다.
