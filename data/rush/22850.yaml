effect:
  en: |-
    Make 1 face-up monster on your opponent's field lose 500 ATK/DEF until the end of this turn. Then, if you have "Grace Princess Kana" face-up on your field, you can change the battle position of up to 2 monsters on your opponent's field.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    相手フィールドの表側表示モンスター１体を選び、その攻撃力・守備力をターン終了時まで５００ダウンする。自分フィールドに表側表示の「いとをかしかなひめ」がいる場合、さらに相手フィールドのモンスターを２体まで選んで表示形式を変更できる。
  ko: |-
    상대 필드의 앞면 표시 몬스터 1장을 고르고, 그 공격력 / 수비력을 턴 종료시까지 500 내린다. 자신 필드에 앞면 표시인 "앙갱공주"가 있을 경우, 추가로 상대 필드의 몬스터를 2장까지 고르고 표시 형식을 변경할 수 있다.
