  ja: |-
    自分フィールドにこのカード以外の表側表示モンスター（光属性／水族）がいる場合、デッキの一番上のカードを墓地へ送って発動できる。
  ko: |-
    자신 필드에 이 카드 이외의 앞면 표시 몬스터(빛 속성 / 물족)가 있을 경우, 덱 맨 위의 카드를 묘지로 보내고 발동할 수 있다.
