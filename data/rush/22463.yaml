effect:
  en: |-
    Ritual Summon "Super War-Lion" by sending face-up Beast Type monsters from your field to the Graveyard whose total Levels equal 7 or more as material (you cannot use more monsters than necessary as material). The monster Special Summoned by this effect gains 2000 ATK until the end of this turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    レベルの合計が７以上になるように、自分フィールドの表側表示モンスター（獣族）を素材として墓地へ送り、「スーパー・ウォー・ライオン」をリチュアル召喚する（余分にモンスターを素材にできない）。この効果で特殊召喚したモンスターの攻撃力はターン終了時まで２０００アップする。
  ko: |-
    레벨의 합계가 7 이상이 되도록, 자신 필드의 앞면 표시 몬스터(야수족)를 소재로서 묘지로 보내고, "슈퍼 워 라이온"을 리추얼 소환한다(여분의 몬스터를 소재로 할 수 없다). 이 효과로 특수 소환한 몬스터의 공격력은 턴 종료시까지 2000 올린다.
