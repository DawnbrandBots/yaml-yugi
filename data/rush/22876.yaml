requirement:
  en: |-
    Send 1 "Offering to Isyria", 1 "Sarcophagus of Isyria", and 1 "Spirit of Isyria" from your hand and/or face-down on your field to the Graveyard.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    手札と自分フィールドの裏側表示のカードの内、「イシリアの供物」「イシリアの棺」「イシリアの霊魂」を１枚ずつ墓地へ送って発動できる。
  ko: |-
    패와 자신 필드의 뒷면 표시인 카드 중, "이실리아의 공물" "이실리아의 관" "이실리아의 영혼"을 1장씩 묘지로 보내고 발동할 수 있다.
  zh-TW:
  zh-CN:
effect:
  en: |-
    Ritual Summon "Isyria, Deity of the Monumenthes" by sending face-up "Yorishiro of Isyria" from your field to the Graveyard whose total Levels equal 4 or more as material (you cannot use more monsters than necessary as material).
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    レベルの合計が４以上になるように、自分フィールドの表側表示の「イシリアの依代」を素材として墓地へ送り、「冥跡神イシリア」をリチュアル召喚する（余分にモンスターを素材にできない）。
  ko: |-
    레벨의 합계가 4 이상이 되도록, 자신 필드의 앞면 표시인 "이실리아의 의대"를 소재로서 묘지로 보내고, "명적신 이실리아"를 리추얼 소환한다(여분의 몬스터를 소재로 할 수 없다).
