name:
  en: R.B. Ga10 Cutter
  de: R.B. Ga10 Säge
  es: R.B. Ga10 Cortador
  fr: Scie Ga10 R.B.
  it: R.B. Ga10 Tagliatore
  pt: Cortador R.B. Ga10
  ja: <ruby>Ｒ．Ｂ．<rt>リボルボット</rt></ruby><ruby>ＧＡ１０<rt>ガテン</rt></ruby>カッター
  ja_romaji: Riboru Botto Gaten Kattā
  ko: R.B.GA10 커터
  ko_rr:
  zh-TW: R.B.GA10 切割機
  zh-CN: R.B.钢天切割机
text:
  en: |-
    If you control no face-up monsters, or the only face-up monsters you control are "R.B." monsters, you can Special Summon this card (from your hand). You can only Special Summon "R.B. Ga10 Cutter" once per turn this way. When your opponent's Spell/Trap Card or effect is activated, and this card is linked to an "R.B." Link Monster (Quick Effect): You can pay 700 LP; destroy this card, and if you do, negate that effect, and if you do that, destroy that card. You can only use this effect of "R.B. Ga10 Cutter" once per turn.
  de: |-
    Falls du keine offenen Monster kontrollierst oder die einzigen offenen Monster, die du kontrollierst, „R.B.“-Monster sind, kannst du diese Karte als Spezialbeschwörung (von deiner Hand) beschwören. Du kannst „R.B. Ga10 Säge“ nur einmal pro Spielzug auf diese Art als Spezialbeschwörung beschwören. Wenn eine Zauber-/Fallenkarte oder ein Zauber-/Falleneffekt deines Gegners aktiviert wird und diese Karte mit einem „R.B.“-Linkmonster verlinkt ist (Schnelleffekt): Du kannst 700 LP zahlen; zerstöre diese Karte und falls du dies tust, annulliere jenen Effekt und falls du dies tust, zerstöre jene Karte. Du kannst diesen Effekt von „R.B. Ga10 Säge“ nur einmal pro Spielzug verwenden.
  es: |-
    Si no controlas monstruos boca arriba, o los únicos monstruos boca arriba que controlas son monstruos "R.B.", puedes Invocar esta carta de Modo Especial (desde tu mano). Sólo puedes Invocar de Modo Especial "R.B. Ga10 Cortador" una vez por turno de esta forma. Cuando es activada una Carta Mágica/de Trampa de tu adversario o su efecto, y esta carta está enlazada a un Monstruo de Enlace "R.B." (Efecto Rápido): puedes pagar 700 LP; destruye esta carta y, si lo haces, niega ese efecto, y si haces eso, destruye esa carta. Sólo puedes usar este efecto de "R.B. Ga10 Cortador" una vez por turno.
  fr: |-
    Si vous ne contrôlez aucun monstre face recto, ou que les seuls monstres face recto que vous contrôlez sont des monstres "R.B.", vous pouvez Invoquer Spécialement cette carte (depuis votre main). Vous ne pouvez Invoquer Spécialement "Scie Ga10 R.B." qu'une fois par tour de cette façon. Lorsqu'une Carte Magie/Piège ou effet de Magie/Piège de votre adversaire est activé, et que cette carte est liée à un Monstre Lien "R.B." (Effet Rapide) : vous pouvez payer 700 LP ; détruisez cette carte, et si vous le faites, annulez l'effet, et si vous faites ça, détruisez la carte. Vous ne pouvez utiliser cet effet de "Scie Ga10 R.B." qu'une fois par tour.
  it: |-
    Se non controlli nessun mostro scoperto, o gli unici mostri scoperti che controlli sono mostri "R.B.", puoi Evocare Specialmente questa carta (dalla tua mano). Puoi Evocare Specialmente "R.B. Ga10 Tagliatore" una sola volta per turno in questo modo. Quando viene attivata una Carta Magia/Trappola del tuo avversario o un suo effetto, e questa carta è linkata a un Mostro Link "R.B." (Effetto Rapido): puoi pagare 700 LP; distruggi questa carta e, se lo fai, annulla quell'effetto e, se fai quello, distruggi quella carta. Puoi utilizzare questo effetto di "R.B. Ga10 Tagliatore" una sola volta per turno.
  pt: |-
    Se você não controlar nenhum monstro com a face para cima, ou os únicos monstros com a face para cima que você controla forem monstros "R.B.", você pode Invocar este card por Invocação-Especial (da sua mão). Você só pode Invocar "Cortador R.B. Ga10" por Invocação-Especial uma vez por turno desta forma. Quando um Card de Magia/Armadilha do seu oponente ou seus efeitos forem ativados, e este card estiver linkado a um Monstro Link "R.B." (Efeito Rápido): você pode pagar 700 PV; destrua este card e, se isso acontecer, negue esse efeito e, se isso acontecer, destrua esse card. Você só pode usar este efeito de "Cortador R.B. Ga10" uma vez por turno.
  ja: |-
    このカード名の、①の方法による特殊召喚は１ターンに１度しかできず、②の効果は１ターンに１度しか使用できない。①：自分フィールドの表側表示モンスターが、存在しない場合または「Ｒ．Ｂ．」モンスターのみの場合、このカードは手札から特殊召喚できる。②：このカードが「Ｒ．Ｂ．」Ｌモンスターとリンク状態の場合、相手が魔法・罠カードの効果を発動した時、７００ＬＰを払って発動できる。このカードを破壊し、その発動した効果を無効にし破壊する。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名以①方法的特殊召唤1回合仅可进行1次，且②效果1回合仅可使用1次。①：自己场上的表侧表示怪兽，不存在的情况下或均为“R.B.”怪兽的情况下，此卡可从手牌特殊召唤。②：此卡和“R.B.”连接怪兽为连接状态的情况下，对手发动魔法・陷阱卡的效果时，支付700LP可以发动。将此卡破坏，将该发动的效果无效并破坏。
