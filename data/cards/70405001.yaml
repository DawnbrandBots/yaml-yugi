name:
  en: Black Luster Soldier - Soldier of Light and Darkness
  de: Schwarz Glänzender Soldat - Soldat des Lichts und der Finsternis
  es: Soldado del Brillo Negro - Soldado de la Luz y la Oscuridad
  fr: Soldat du Lustre Noir - Soldat de la Lumière et des Ténèbres
  it: Glorioso Soldato Nero - Soldato di Luce e Oscurità
  pt: Soldado do Lustro Negro - Soldado da Luz e das Trevas
  ja: <ruby>光<rt>ひかり</rt></ruby>と<ruby>闇<rt>やみ</rt></ruby>の<ruby>戦<rt>せん</rt></ruby><ruby>士<rt>し</rt></ruby>カオス・ソルジャー
  ja_romaji: Hikari to Yami no Senshi Kaosu Sorujā
  ko:
  ko_rr:
  zh-TW:
  zh-CN: 光与暗的战士 混沌士兵
text:
  en: |-
    You can Ritual Summon this card with "Light and Darkness Ritual". Unaffected by your opponent's activated effects, unless they target this card, also cannot be destroyed by battle. You can only use each of the following effects of "Black Luster Soldier - Soldier of Light and Darkness" once per turn. If this card is Special Summoned: You can target 1 card your opponent controls; banish it. When this card destroys an opponent's monster by battle: You can make this card gain 1500 ATK, and if you do, it can make a second attack in a row.
  de: |-
    Du kannst diese Karte mit „Ritual von Licht und Finsternis“ als Ritualbeschwörung beschwören. Bleibt von aktivierten Effekten deines Gegners unberührt, es sei denn, sie wählen diese Karte als Ziel, kann zusätzlich nicht durch Kampf zerstört werden. Du kannst jeden der folgenden Effekte von „Schwarz Glänzender Soldat - Soldat des Lichts und der Finsternis“ nur einmal pro Spielzug verwenden. Falls diese Karte als Spezialbeschwörung beschworen wird: Du kannst 1 Karte wählen, die dein Gegner kontrolliert; verbanne sie. Wenn diese Karte ein Monster eines Gegners durch Kampf zerstört: Du kannst diese Karte 1500 ATK erhalten lassen und falls du dies tust, kann sie sofort einen zweiten Angriff durchführen.
  es: |-
    Puedes Invocar esta carta por Ritual con "Ritual de la Luz y la Oscuridad". No es afectada por los efectos activados de tu adversario, a menos que seleccionen esta carta, y además no puede ser destruida en batalla. Sólo puedes usar cada uno de los siguientes efectos de "Soldado del Brillo Negro - Soldado de la Luz y la Oscuridad" una vez por turno. Si esta carta es Invocada de Modo Especial: puedes seleccionar 1 carta que controle tu adversario; destiérrala. Cuando esta carta destruye un monstruo del adversario en batalla: puedes hacer que esta carta gane 1500 ATK y, si lo haces, ésta puede hacer un segundo ataque inmediatamente después.
  fr: |-
    Vous pouvez Invoquer Rituellement cette carte avec "Rituel de la Lumière et des Ténèbres". Non affectée par les effets activés de votre adversaire, sauf s'ils ciblent cette carte, et aussi, non destructible au combat. Vous ne pouvez utiliser chacun des effets suivants de "Soldat du Lustre Noir - Soldat de la Lumière et des Ténèbres" qu'une fois par tour. Si cette carte est Invoquée Spécialement : vous pouvez cibler 1 carte contrôlée par votre adversaire ; bannissez-la. Lorsque cette carte détruit un monstre de l'adversaire au combat : vous pouvez faire gagner 1500 ATK à cette carte, et si vous le faites, elle peut faire une seconde attaque à la suite.
  it: |-
    Puoi Evocare tramite Rituale questa carta con "Rituale di Luce e Oscurità". Immune agli effetti attivati del tuo avversario, a meno che essi scelgano come bersaglio questa carta, inoltre non può essere distrutto in battaglia. Puoi utilizzare ognuno dei seguenti effetti di "Glorioso Soldato Nero - Soldato di Luce e Oscurità" una sola volta per turno. Se questa carta viene Evocata Specialmente: puoi scegliere come bersaglio 1 carta controllata dal tuo avversario; bandiscila. Quando questa carta distrugge un mostro dell'avversario in battaglia: puoi far guadagnare a questa carta 1500 ATK e, se lo fai, essa può effettuare un secondo attacco di seguito.
  pt: |-
    Você pode Invocar este card por Invocação-Ritual com "Ritual da Luz e das Trevas". Não é afetado pelos efeitos ativados do seu oponente, a não ser que eles escolham este card como alvo e, além disso, não pode ser destruído em batalha. Você só pode usar cada um dos seguintes efeitos de "Soldado do Lustro Negro - Soldado da Luz e das Trevas" uma vez por turno. Se este card for Invocado por Invocação-Especial: você pode escolher 1 card que seu oponente controla; bana-o. Quando este card destruir um monstro do oponente em batalha: você pode fazer com que este card ganhe 1500 de ATK e, se isso acontecer, ele pode realizar um segundo ataque em seguida.
  ja: |-
    「光と闇の儀式」により降臨
    このカード名の①③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが特殊召喚した場合、相手フィールドのカード１枚を対象として発動できる。そのカードを除外する。②：このカードはモンスターゾーンに存在する限り、戦闘では破壊されず、このカードを対象とする効果以外の相手が発動した効果を受けない。③：このカードが戦闘で相手モンスターを破壊した時に発動できる。このカードの攻撃力は１５００アップし、もう１度だけ続けて攻撃できる。
  ko:
  zh-TW:
  zh-CN: |-
    以“光与暗的仪式”降临
    此卡名的①③效果1回合仅可各使用1次。①：此卡特殊召唤的情况下，以对手场上的1张卡为对象可以发动。将该卡除外。②：此卡只要存在于怪兽区域，就不会因战斗被破坏，也不受对手发动的效果影响，除非是以此卡为对象的效果。③：此卡战斗破坏对手怪兽时可以发动。此卡的攻击力上升1500，可继续再攻击仅1次。
