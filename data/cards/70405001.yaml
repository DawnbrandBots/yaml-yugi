text:
  en: |-
    You can Ritual Summon this card with "Ritual of Light and Darkness". Cannot be destroyed by battle. Unaffected by your opponent's activated effects, unless they target this card. You can only use each of the following effects of "Black Luster Soldier - Soldier of Light and Darkness" once per turn. If this card is Special Summoned: You can target 1 card your opponent controls; banish it. When this card destroys an opponent's monster by battle: You can make this card gain 1500 ATK, and if you do, it can make a second attack in a row.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    「光と闇の儀式」により降臨
    このカード名の①③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが特殊召喚した場合、相手フィールドのカード１枚を対象として発動できる。そのカードを除外する。②：このカードはモンスターゾーンに存在する限り、戦闘では破壊されず、このカードを対象とする効果以外の相手が発動した効果を受けない。③：このカードが戦闘で相手モンスターを破壊した時に発動できる。このカードの攻撃力は１５００アップし、もう１度だけ続けて攻撃できる。
  ko:
  zh-TW:
  zh-CN: |-
    以“光与暗的仪式”降临
    此卡名的①③效果1回合仅可各使用1次。①：此卡特殊召唤的情况下，以对手场上的1张卡为对象可以发动。将该卡除外。②：此卡只要存在于怪兽区域，就不会因战斗被破坏，也不受对手发动的效果影响，除非是以此卡为对象的效果。③：此卡战斗破坏对手怪兽时可以发动。此卡的攻击力上升1500，可继续再攻击仅1次。
