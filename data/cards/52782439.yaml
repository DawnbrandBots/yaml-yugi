name:
  en: Exceptional Schedule
  de: Ausnahmefahrplan
  es: Horario Excepcional
  fr: Programme Exceptionnel
  it: Orario Eccezionale
  pt: Escala Excepcional
  ja: <ruby>特<rt>とく</rt></ruby><ruby>別<rt>べつ</rt></ruby>ダイヤ
  ja_romaji: Tokubetsu Daiya
  ko: 특별 다이어
  ko_rr:
  zh-TW:
  zh-CN: 特别时刻表
text:
  en: |-
    Add 1 "Special Schedule" or "Urgent Schedule" from your Deck to your hand, then you can Special Summon 1 "Diagram Token" (Machine/EARTH/Level 10/ATK 3000/DEF 3000) to your opponent's field. You can banish this card from your GY, then target 1 Level 10 Machine monster in your GY or banishment; send 1 card you control to the GY, and if you do, Special Summon that monster. You can only use each effect of "Exceptional Schedule" once per turn.
  de: |-
    Füge deiner Hand 1 „Sonderfahrplan“ oder „Knapper Fahrplan“ von deinem Deck hinzu, dann kannst du 1 „Diagramm-Spielmarke“ (Maschine/ERDE/Stufe 10/ATK 3000/DEF 3000) als Spezialbeschwörung auf die Spielfeldseite deines Gegners beschwören. Du kannst diese Karte von deinem Friedhof verbannen und dann 1 Maschine-Monster der Stufe 10 in deinem Friedhof oder von deinen verbannten Karten wählen; lege 1 Karte, die du kontrollierst, auf den Friedhof und falls du dies tust, beschwöre jenes Monster als Spezialbeschwörung. Du kannst jeden Effekt von „Ausnahmefahrplan“ nur einmal pro Spielzug verwenden.
  es: |-
    Añade a tu mano 1 "Horario Especial" u "Horario Urgente" en tu Deck, y después puedes Invocar de Modo Especial 1 "Ficha Diagrama" (Máquina/TIERRA/Nivel 10/ATK 3000/DEF 3000) al Campo de tu adversario. Puedes desterrar esta carta en tu Cementerio, y después selecciona 1 monstruo Máquina de Nivel 10 en tu Cementerio o destierro; manda al Cementerio 1 carta que controles y, si lo haces, Invoca ese monstruo de Modo Especial. Sólo puedes usar cada efecto de "Horario Excepcional" una vez por turno.
  fr: |-
    Ajoutez 1 "Programme Spécial" ou "Programme Urgent" depuis votre Deck à votre main, puis vous pouvez Invoquer Spécialement 1 "Jeton Diagramme" (Machine/TERRE/Niveau 10/ATK 3000/DEF 3000) sur le Terrain de votre adversaire. Vous pouvez bannir cette carte depuis votre Cimetière, puis ciblez 1 monstre Machine de Niveau 10 dans votre Cimetière ou bannissement ; envoyez 1 carte que vous contrôlez au Cimetière, et si vous le faites, Invoquez Spécialement le monstre. Vous ne pouvez utiliser chaque effet de "Programme Exceptionnel" qu'une fois par tour.
  it: |-
    Aggiungi 1 "Orario Speciale" o "Orario Urgente" dal tuo Deck alla tua mano, poi puoi Evocare Specialmente 1 "Segna-Diagramma" (Macchina/TERRA/Livello 10/ATK 3000/DEF 3000) sul Terreno del tuo avversario. Puoi bandire questa carta dal tuo Cimitero, poi scegliere come bersaglio 1 mostro Macchina di Livello 10 nel tuo Cimitero o carte bandite; manda 1 carta che controlli al Cimitero e, se lo fai, Evoca Specialmente quel mostro. Puoi utilizzare ogni effetto di "Orario Eccezionale" una sola volta per turno.
  pt: |-
    Adicione 1 "Escala Especial" ou "Escala Urgente" do seu Deck à sua mão e, depois, você pode Invocar por Invocação-Especial 1 "Ficha de Diagrama" (Máquina/TERRA/Nível 10/ATK 3000/DEF 3000) no campo do seu oponente. Você pode banir este card do seu Cemitério e, depois, escolha 1 monstro Máquina de Nível 10 no seu Cemitério ou banimento; envie 1 card que você controla para o Cemitério e, se isso acontecer, Invoque esse monstro por Invocação-Especial. Você só pode usar cada efeito de "Escala Excepcional" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：デッキから「臨時ダイヤ」か「緊急ダイヤ」１枚を手札に加える。その後、相手フィールドに「ダイヤグラムトークン」（機械族・地・星１０・攻／守３０００）１体を特殊召喚できる。②：墓地のこのカードを除外し、自分の墓地・除外状態の機械族・レベル１０モンスター１体を対象として発動できる。自分フィールドのカード１枚を墓地へ送り、対象のモンスターを特殊召喚する。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 덱에서 "임시 다이어"나 "긴급 다이어" 1장을 패에 넣는다. 그 후, 상대 필드에 "다이어그램 토큰"(기계족 / 땅 / 레벨 10 / 공 3000 / 수 3000) 1장을 특수 소환할 수 있다. ②: 묘지의 이 카드를 제외하고, 자신의 묘지 / 제외 상태인 기계족 / 레벨 10 몬스터 1장을 대상으로 하여 발동할 수 있다. 자신 필드의 카드 1장을 묘지로 보내고, 대상 몬스터를 특수 소환한다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：从牌组将1张“临时时刻表”或“紧急时刻表”加入手牌。然后，可将1只“时刻表衍生物”（机械族・地・星10・攻/守3000）特殊召唤至对手场上。②：将墓地的此卡除外，以自己墓地・除外状态的1只机械族・等级10怪兽为对象可以发动。将自己场上的1张卡送至墓地，将对象怪兽特殊召唤。
