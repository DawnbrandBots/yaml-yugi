text:
  en: |-
    Thrice per turn: You can send 3 other cards of the same type (Monster, Spell, or Trap) from your hand and/or face-up field to the GY, then you can Special Summon 1 "Sacred Beast" monster from your hand, Deck, GY, or banishment, and if you do, it is unaffected by your opponent's activated Spell/Trap effects. If you control a "Sacred Beast" monster whose original Level is 10: You can draw 2 cards. You can only use this effect of "Fallen Paradise of the Sacred Beasts" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の②の効果は１ターンに１度しか使用できない。①：１ターンに３度まで、自分メインフェイズに発動できる。このカード以外の自分の手札・フィールド（表側表示）の同じ種類（モンスター・魔法・罠）のカード３枚を墓地へ送る。その後、自分の手札・デッキ・墓地・除外状態の「三幻魔」モンスター１体を特殊召喚できる。この効果で特殊召喚したモンスターは、相手が発動した魔法・罠カードの効果を受けない。②：自分フィールドに元々のレベルが１０の「三幻魔」モンスターが存在する場合に発動できる。自分は２枚ドローする。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的②效果1回合仅可使用1次。①：1回合最多3次，在自己的主要阶段可以发动。将此卡以外的自己手牌・场上（表侧表示）的3张种类（怪兽・魔法・陷阱）相同的卡送至墓地。然后，可将自己手牌・牌组・墓地・除外状态的1只“三幻魔”怪兽特殊召唤。以此效果特殊召唤的怪兽，不受对手发动的魔法・陷阱卡效果影响。②：自己场上存在原本等级为10的“三幻魔”怪兽的情况下可以发动。自己抽2张。
