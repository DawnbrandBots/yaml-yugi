name:
  en: Sky Striker Mecha - Adil Saber
  de: Himmelsjäger-Mech - Adil-Säbel
  es: Caza del Cielo Mecha - Sable Adil
  fr: Assaut de l'Air - Mécha - Sabre Adil
  it: Assaltatrice del Cielo Mecha - Sciabola Adil
  pt: Força Celeste - Mecha - Sabre Adil
  ja: <ruby>閃<rt>せん</rt></ruby><ruby>刀<rt>とう</rt></ruby><ruby>機<rt>き</rt></ruby>－アディルセイバー
  ja_romaji: Sentōki - Adiru Seibā
  ko: 섬도기－아딜세이버
  ko_rr:
  zh-TW:
  zh-CN: 闪刀机－正义军刀
text:
  en: |-
    During the Battle Phase (Quick Effect): You can discard this card, then target 1 "Sky Striker" monster on the field; it gains 1500 ATK until the end of this turn. If a monster(s) is Special Summoned, while this card is in your GY (except during the Damage Step): You can target 1 "Sky Striker" Link Monster you control; equip this card to it as an Equip Spell that gives it 1500 ATK. You can only use each effect of "Sky Striker Mecha - Adil Saber" once per turn.
  de: |-
    Während der Battle Phase (Schnelleffekt): Du kannst diese Karte abwerfen und dann 1 „Himmelsjäger“-Monster auf dem Spielfeld wählen; es erhält bis zum Ende dieses Spielzugs 1500 ATK. Falls ein oder mehr Monster als Spezialbeschwörung beschworen werden, solange sich diese Karte in deinem Friedhof befindet (außer während des Damage Steps): Du kannst 1 „Himmelsjäger“-Linkmonster wählen, das du kontrollierst; rüste es mit dieser Karte als Ausrüstungszauber aus, der ihm 1500 ATK gibt. Du kannst jeden Effekt von „Himmelsjäger-Mech - Adil-Säbel“ nur einmal pro Spielzug verwenden.
  es: |-
    Durante la Battle Phase (Efecto Rápido): puedes descartar esta carta, y después seleccionar 1 monstruo "Caza del Cielo" en el Campo; éste gana 1500 ATK hasta el final de este turno. Si uno o más monstruos son Invocados de Modo Especial, mientras esta carta esté en tu Cementerio (excepto durante el Damage Step): puedes seleccionar 1 Monstruo de Enlace "Caza del Cielo" que controles; equípale esta carta como una Mágica de Equipo que le da 1500 ATK. Sólo puedes usar cada efecto de "Caza del Cielo Mecha - Sable Adil" una vez por turno.
  fr: |-
    Durant la Battle Phase (Effet Rapide) : vous pouvez défausser cette carte, puis ciblez 1 monstre "Assaut de l'Air" sur le Terrain ; jusqu'à la fin de ce tour, il gagne 1500 ATK. Si un ou plusieurs monstres sont Invoqués Spécialement, tant que cette carte est dans votre Cimetière (sauf durant la Damage Step) : vous pouvez cibler 1 Monstre Lien "Assaut de l'Air" que vous contrôlez ; équipez-lui cette carte comme Magie d'Équipement qui lui donne 1500 ATK. Vous ne pouvez utiliser chaque effet de "Assaut de l'Air - Mécha - Sabre Adil" qu'une fois par tour.
  it: |-
    Durante la Battle Phase (Effetto Rapido): puoi scartare questa carta, poi scegliere come bersaglio 1 mostro "Assaltatrice del Cielo" sul Terreno; esso guadagna 1500 ATK fino alla fine di questo turno. Se uno o più mostri vengono Evocati Specialmente, mentre questa carta è nel tuo Cimitero (eccetto durante il Damage Step): puoi scegliere come bersaglio 1 Mostro Link "Assaltatrice del Cielo" che controlli; equipaggia questa carta a esso come una Magia Equipaggiamento che gli dà 1500 ATK. Puoi utilizzare ogni effetto di "Assaltatrice del Cielo Mecha - Sciabola Adil" una sola volta per turno.
  pt: |-
    Durante a Fase de Batalha (Efeito Rápido): você pode descartar este card e, depois, escolha 1 monstro "Força Celeste" no campo; ele ganha 1500 de ATK até o final deste turno. Se um ou mais monstros forem Invocados por Invocação-Especial, enquanto este card estiver no seu Cemitério (exceto durante a Etapa de Dano): você pode escolher 1 Monstro Link "Força Celeste" que você controla; equipe este card a ele como uma Magia de Equipamento que concede a ele 1500 de ATK. Você só pode usar cada efeito de "Força Celeste - Mecha - Sabre Adil" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分・相手のバトルフェイズに、このカードを手札から捨て、フィールドの「閃刀」モンスター１体を対象として発動できる。そのモンスターの攻撃力はターン終了時まで１５００アップする。②：このカードが墓地に存在する状態で、モンスターが特殊召喚された場合、自分フィールドの「閃刀」Ｌモンスター１体を対象として発動できる。このカードを攻撃力１５００アップの装備魔法カード扱いでそのモンスターに装備する。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신 / 상대의 배틀 페이즈에, 이 카드를 패에서 버리고, 필드의 "섬도" 몬스터 1장을 대상으로 하여 발동할 수 있다. 그 몬스터의 공격력은 턴 종료시까지 1500 올린다. ②: 이 카드가 묘지에 존재하는 상태에서, 몬스터가 특수 소환되었을 경우, 자신 필드의 "섬도" 링크 몬스터 1장을 대상으로 하고 발동할 수 있다. 이 카드를 공격력 1500 올리는 장착 마법 카드로 취급하고 그 몬스터에 장착한다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：在自己・对手的战斗阶段中，从手牌将此卡舍弃，以场上的1只“闪刀”怪兽为对象可以发动。该怪兽的攻击力直至回合结束时为止上升1500。②：此卡存在于墓地的状态下，且怪兽被特殊召唤的情况下，以自己场上的1只“闪刀”连接怪兽为对象可以发动。将此卡视为攻击力上升1500的装备魔法卡，装备于该怪兽。
