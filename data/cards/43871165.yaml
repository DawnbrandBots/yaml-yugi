pendulum_scale: 1
pendulum_effect:
  en: |-
    During your Main Phase: You can destroy this card and 1 "Power Patron" or "DoomZ" monster in your hand or face-up field, then you can destroy 1 card on the field. You can only use this effect of "Jupredo the Shademachine Power Patron" once per turn.
  de: |-
    Während deiner Main Phase: Du kannst diese Karte und 1 „Machtpatron“- oder „UntergangZ“-Monster in deiner Hand oder offen auf deiner Spielfeldseite zerstören, dann kannst du 1 Karte auf dem Spielfeld zerstören. Du kannst diesen Effekt von „Jupredo der Schattenmaschinen-Machtpatron“ nur einmal pro Spielzug verwenden.
  es: |-
    Durante tu Main Phase: puedes destruir esta carta y 1 monstruo "Modelo de Poder" o "DoomZ" en tu mano o Campo boca arriba, y después puedes destruir 1 carta en el Campo. Sólo puedes usar este efecto de "Jupredo la Máquina Sombra Modelo de Poder" una vez por turno.
  fr: |-
    Durant votre Main Phase : vous pouvez détruire cette carte et 1 monstre "Mécène du Pouvoir" ou "DoomZ" dans votre main ou Terrain face recto, puis vous pouvez détruire 1 carte sur le Terrain. Vous ne pouvez utiliser cet effet de "Jupredo le Mécène du Pouvoir de la Machine Obscure" qu'une fois par tour.
  it: |-
    Durante la tua Main Phase: puoi distruggere questa carta e 1 mostro "Patrono Potente" o "DoomZ" nella tua mano o Terreno scoperto, poi puoi distruggere 1 carta sul Terreno. Puoi utilizzare questo effetto di "Jupredo l'Ombramacchina Patrono Potente" una sola volta per turno.
  pt: |-
    Durante sua Fase Principal: você pode destruir este card e 1 monstro "Patrono(a) do Poder" ou "DoomZ" na sua mão ou no campo com a face para cima e, depois, você pode destruir 1 card no campo. Você só pode usar este efeito de "Jupredo, o Patrono do Poder Máquina Sombria" uma vez por turno.
  ja: |-
    このカード名のＰ効果は１ターンに１度しか使用できない。①：自分メインフェイズに発動できる。このカードと自分の手札・フィールド（表側表示）の「獄神」モンスターか「ドゥームズ」モンスター１体を破壊する。その後、フィールドのカード１枚を破壊できる。
  ko: |-
    이 카드명의 펜듈럼 효과는 1턴에 1번밖에 사용할 수 없다. ①: 자신 메인 페이즈에 발동할 수 있다. 이 카드와 자신의 패 / 필드(앞면 표시)의 "감옥신" 몬스터나 "둠즈" 몬스터 1장을 파괴한다. 그 후, 필드의 카드 1장을 파괴할 수 있다.
  zh-TW:
  zh-CN: |-
    此卡名的灵摆效果1回合仅可使用1次。①：在自己的主要阶段可以发动。将此卡与自己手牌・场上（表侧表示）的1只“狱神”怪兽或“终刻”怪兽破坏。然后，可将场上的1张卡破坏。
