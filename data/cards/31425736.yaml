text:
  en: |-
    If you control a Link-1 monster or a Level 2 Synchro Monster, you can Special Summon this card (from your hand). You can only Special Summon "CupsyвҳҶYummy" once per turn this way. If this card is Normal or Special Summoned: You can add 1 "Yummy" card from your Deck to your hand, except "CupsyвҳҶYummy", or, if this card was Special Summoned by the effect of a Synchro Monster, you can draw 1 card instead. You can only use this effect of "CupsyвҳҶYummy" once per turn.
  de: |-
    Falls du ein Monster mit Link-1 oder ein Synchromonster der Stufe 2 kontrollierst, kannst du diese Karte als SpezialbeschwГ¶rung (von deiner Hand) beschwГ¶ren. Du kannst вҖһBecherkatzeвҳҶLeckerвҖң nur einmal pro Spielzug auf diese Art als SpezialbeschwГ¶rung beschwГ¶ren. Falls diese Karte als Normal- oder SpezialbeschwГ¶rung beschworen wird: Du kannst deiner Hand 1 вҖһLeckerвҖң-Karte von deinem Deck hinzufГјgen, auГҹer вҖһBecherkatzeвҳҶLeckerвҖң, oder falls diese Karte durch den Effekt eines Synchromonsters als SpezialbeschwГ¶rung beschworen wurde, kannst du stattdessen 1 Karte ziehen. Du kannst diesen Effekt von вҖһBecherkatzeвҳҶLeckerвҖң nur einmal pro Spielzug verwenden.
  es: |-
    Si controlas un monstruo Link-1 o un Monstruo de SincronГӯa de Nivel 2, puedes Invocar esta carta de Modo Especial (desde tu mano). SГіlo puedes Invocar de Modo Especial "CupsyвҳҶYummy" una vez por turno de esta forma. Si esta carta es Invocada de Modo Normal o Especial: puedes aГұadir a tu mano 1 carta "Yummy" en tu Deck, excepto "CupsyвҳҶYummy" o, si esta carta fue Invocada de Modo Especial por el efecto de un Monstruo de SincronГӯa, puedes robar 1 carta en su lugar. SГіlo puedes usar este efecto de "CupsyвҳҶYummy" una vez por turno.
  fr: |-
    Si vous contrГҙlez un monstre Link-1 ou un Monstre Synchro de Niveau 2, vous pouvez Invoquer SpГ©cialement cette carte (depuis votre main). Vous ne pouvez Invoquer SpГ©cialement "CoupyвҳҶMiammy" qu'une fois par tour de cette faГ§on. Si cette carte est InvoquГ©e Normalement ou SpГ©cialement : vous pouvez ajouter 1 carte "Miammy" ("CoupyвҳҶMiammy" exclu) depuis votre Deck Г  votre main, ou, si cette carte a Г©tГ© InvoquГ©e SpГ©cialement par l'effet d'un Monstre Synchro, vous pouvez piocher 1 carte Г  la place. Vous ne pouvez utiliser cet effet de "CoupyвҳҶMiammy" qu'une fois par tour.
  it: |-
    Se controlli un mostro Link-1 o un Mostro Synchro di Livello 2, puoi Evocare Specialmente questa carta (dalla tua mano). Puoi Evocare Specialmente "CupsyвҳҶYummy" una sola volta per turno in questo modo. Se questa carta viene Evocata Normalmente o Specialmente: puoi aggiungere 1 carta "Yummy" dal tuo Deck alla tua mano, eccetto "CupsyвҳҶYummy" o, se questa carta ГЁ stata Evocata Specialmente dall'effetto di un Mostro Synchro, puoi invece pescare 1 carta. Puoi utilizzare questo effetto di "CupsyвҳҶYummy" una sola volta per turno.
  pt: |-
    Se vocГӘ controlar um monstro de Link-1 ou um Monstro Sincro de NГӯvel 2, vocГӘ pode Invocar este card por InvocaГ§ГЈo-Especial (da sua mГЈo). VocГӘ sГі pode Invocar "CopinhoвҳҶNhamy" por InvocaГ§ГЈo-Especial uma vez por turno desta forma. Se este card for Invocado por InvocaГ§ГЈo-Normal ou Especial: vocГӘ pode adicionar 1 card "Nhamy" do seu Deck Г  sua mГЈo, exceto "CopinhoвҳҶNhamy", ou, se este card foi Invocado por InvocaГ§ГЈo-Especial pelo efeito de um Monstro Sincro, em vez disso, vocГӘ pode comprar 1 card. VocГӘ sГі pode usar este efeito de "CopinhoвҳҶNhamy" uma vez por turno.
  ja: |-
