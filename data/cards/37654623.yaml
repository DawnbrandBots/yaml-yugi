name:
  en: Hideout in the Sky, Coulomb
  de: Versteck im Himmel, Coulomb
  es: Guarida en el Cielo, Coulomb
  fr: Planque dans le Ciel, Coulomb
  it: Rifugio nel Cielo, Coulomb
  pt: Esconderijo no Céu, Coulomb
  ja: <ruby>天<rt>てん</rt></ruby><ruby>空<rt>くう</rt></ruby><ruby>城<rt>じょう</rt></ruby><ruby>塞<rt>さい</rt></ruby>クーロン
  ja_romaji: Tenkūjōsai Kūron
  ko: 천공성새 쿨롱
  ko_rr:
  zh-TW:
  zh-CN: 天空城塞 库龙
text:
  en: |-
    Monsters you control that were Normal or Special Summoned from the hand gain 500 ATK/DEF. You can only use each of the following effects of "Hideout in the Sky, Coulomb" once per turn. During your Main Phase: You can Special Summon 1 "Mech Beast Token" (Machine/EARTH/Level 6/ATK 2000/DEF 2000) to your opponent's field, and if you do, add 1 "Blitzclique" monster from your Deck to your hand. If a card(s) is destroyed by your "Blitzclique" card's effect, while this card is in your GY (except during the Damage Step): You can add this card to your hand.
  de: |-
    Monster, die du kontrollierst und die als Normal- oder Spezialbeschwörung von der Hand beschworen wurden, erhalten 500 ATK/DEF. Du kannst jeden der folgenden Effekte von „Versteck im Himmel, Coulomb“ nur einmal pro Spielzug verwenden. Während deiner Main Phase: Du kannst 1 „Mech-Ungeheuer-Spielmarke“ (Maschine/ERDE/Stufe 6/ATK 2000/DEF 2000) als Spezialbeschwörung auf die Spielfeldseite deines Gegners beschwören und falls du dies tust, füge deiner Hand 1 „Blitzclique“-Monster von deinem Deck hinzu. Falls eine oder mehr Karten durch einen Effekt deiner „Blitzclique“-Karte zerstört werden, solange sich diese Karte in deinem Friedhof befindet (außer während des Damage Steps): Du kannst diese Karte deiner Hand hinzufügen.
  es: |-
    Los monstruos que controlas que fueron Invocados de Modo Normal o Especial desde la mano ganan 500 ATK/DEF. Sólo puedes usar cada uno de los siguientes efectos de "Guarida en el Cielo, Coulomb" una vez por turno. Durante tu Main Phase: puedes Invocar de Modo Especial 1 "Ficha Mecha Bestia" (Máquina/TIERRA/Nivel 6/ATK 2000/DEF 2000) al Campo de tu adversario y, si lo haces, añade a tu mano 1 monstruo "Blitzclique" en tu Deck. Si una o más cartas son destruidas por el efecto de tu carta "Blitzclique", mientras esta carta está en tu Cementerio (excepto durante el Damage Step): puedes añadir esta carta a tu mano.
  fr: |-
    Les monstres que vous contrôlez qui ont été Invoqués Normalement ou Spécialement depuis la main gagnent 500 ATK/DEF. Vous ne pouvez utiliser chacun des effets suivants de "Planque dans le Ciel, Coulomb" qu'une fois par tour. Durant votre Main Phase : vous pouvez Invoquer Spécialement 1 "Jeton Bête Méca" (Machine/TERRE/Niveau 6/ATK 2000/DEF 2000) sur le Terrain de votre adversaire, et si vous le faites, ajoutez 1 monstre "Blitzclique" depuis votre Deck à votre main. Si une ou plusieurs cartes sont détruites par un effet de votre carte "Blitzclique", tant que cette carte est dans votre Cimetière (sauf durant la Damage Step) : vous pouvez ajouter cette carte à votre main.
  it: |-
    I mostri che controlli che sono stati Evocati Normalmente o Specialmente dalla mano guadagnano 500 ATK/DEF. Puoi utilizzare ognuno dei seguenti effetti di "Rifugio nel Cielo, Coulomb" una sola volta per turno. Durante la tua Main Phase: puoi Evocare Specialmente 1 "Segna-Bestia Mech" (Macchina/TERRA/Livello 6/ATK 2000/DEF 2000) sul Terreno del tuo avversario e, se lo fai, aggiungi 1 mostro "Blitzclique" dal tuo Deck alla tua mano. Se una o più carte vengono distrutte dall'effetto di una tua carta "Blitzclique", mentre questa carta è nel tuo Cimitero (eccetto durante il Damage Step): puoi aggiungere questa carta alla tua mano.
  pt: |-
    Monstros que você controla que foram Invocados por Invocação-Normal ou Especial da mão ganham 500 de ATK/DEF. Você só pode usar cada um dos seguintes efeitos de "Esconderijo no Céu, Coulomb" uma vez por turno. Durante sua Fase Principal: você pode Invocar por Invocação-Especial 1 "Ficha de Besta Mech" (Máquina/TERRA/Nível 6/ATK 2000/DEF 2000) no campo do seu oponente e, se isso acontecer, adicione 1 monstro "Blitzclique" do seu Deck à sua mão. Se um ou mais cards forem destruídos por um efeito de card "Blitzclique" seu, enquanto este card estiver no seu Cemitério (exceto durante a Etapa de Dano): você pode adicionar este card à sua mão.
  ja: |-
    このカード名の②③の効果はそれぞれ１ターンに１度しか使用できない。①：手札から召喚・特殊召喚された自分フィールドのモンスターの攻撃力・守備力は５００アップする。②：自分メインフェイズに発動できる。相手フィールドに「機獣トークン」（機械族・地・星６・攻／守２０００）１体を特殊召喚し、デッキから「ブリッツクリーク」モンスター１体を手札に加える。③：このカードが墓地に存在する状態で、自分の「ブリッツクリーク」カードの効果でカードを破壊した場合に発動できる。このカードを手札に加える。
  ko: |-
    이 카드명의 ②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 패에서 일반 소환 / 특수 소환된 자신 필드의 몬스터의 공격력 / 수비력은 500 올린다. ②: 자신 메인 페이즈에 발동할 수 있다. 상대 필드에 "기수 토큰"(기계족 / 땅 / 레벨 6 / 공 2000 / 수 2000) 1장을 특수 소환하고, 덱에서 "블리츠크리크" 몬스터 1장을 패에 넣는다. ③: 이 카드가 묘지에 존재하는 상태에서, 자신의 "블리츠크리크" 카드의 효과로 카드를 파괴했을 경우에 발동할 수 있다. 이 카드를 패에 넣는다.
  zh-TW:
  zh-CN: |-
    此卡名的②③效果1回合仅可各使用1次。①：被从手牌召唤・特殊召唤的自己场上的怪兽的攻击力・守备力上升500。②：在自己的主要阶段可以发动。将1只“机兽衍生物”（机械族・地・星6・攻/守2000）特殊召唤至对手场上，从牌组将1只“雷盟”怪兽加入手牌。③：此卡存在于墓地的状态下，以自己的“雷盟”卡的效果破坏了卡的情况下可以发动。将此卡加入手牌。
