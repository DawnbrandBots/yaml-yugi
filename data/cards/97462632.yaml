text:
  en: |-
    (Quick Effect): You can discard this card, then activate 1 of these effects;
    ● The next battle or effect damage you take this turn will become 0.
    ● Set 1 Quick-Play Spell or Trap that mentions "Ritual of Light and Darkness" from your Deck. It can be activated this turn.
    You can only use this effect of "Gurifoh" once per turn. For the Ritual Summon of exactly 1 Level 8 Ritual Monster with a card effect that requires use of monsters, this card can be used as the entire Tribute.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①の効果は１ターンに１度しか使用できない。①：自分・相手ターンに、このカードを手札から捨て、以下の効果から１つを選択して発動できる。●このターン、自分が受ける戦闘・効果ダメージは１度だけ０になる。●デッキから「光と闇の儀式」のカード名が記された速攻魔法・罠カード１枚を自分フィールドにセットする。この効果でセットしたカードはセットしたターンでも発動できる。②：レベル８儀式モンスター１体を儀式召喚する場合、このカード１枚で儀式召喚に必要な分のリリースとして使用できる。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①效果1回合仅可使用1次。①：在自己・对手回合中，从手牌将此卡舍弃，可从以下效果中选择1个发动。●此回合，自己受到的战斗・效果伤害仅1次变为0。●从牌组将1张记载有“光与暗的仪式”卡名的速攻魔法・陷阱卡放置在自己场上。以此效果放置的卡在放置的回合也可以发动。②：要仪式召唤1只等级8仪式怪兽的情况下，使用1张此卡即可作为仪式召唤所必需的解放。
