  pt: Força-S Apanhador Noturno
  ja: <ruby>Ｓ－Ｆｏｒｃｅ<rt>セキュリティ・フォース</rt></ruby> ナイトスレイヤー
  ja_romaji: Sekyuriti Fōsu Naitosureiyā
