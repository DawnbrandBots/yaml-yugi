    2 monsters, including an "S-Force" monster
    If this card is Special Summoned: You can add 1 "S-Force" Spell/Trap from your Deck to your hand. (Quick Effect): You can banish this card you control and 1 "S-Force" card from your hand; Special Summon 1 "S-Force" monster from your Deck or Extra Deck, except "S-Force Nightslayer". You can only use each effect of "S-Force Nightslayer" once per turn.
