  fr: Débarquement sur Scène R.B.
  it: Atterraggio sulla Scena R.B.
  pt: Plataforma de Aterrissagem R.B.
  ja: <ruby>Ｒ．Ｂ．<rt>リボルボット</rt></ruby>ジャンプ・ナンバー
  ja_romaji: Riborubotto Janpu Nanbā
  ko: R.B.점프 넘버
