text:
  en: |-
    (This card is always treated as a "Witchcrafter" card.)
    Gains 2300 ATK while you have "Regulus, the Prince of Endymion" in your field or GY. You can only use each of the following effects of "Verre, the Maid of Endymion" once per turn. During your Main Phase, if a Spell Card or effect was activated this turn: You can Special Summon this card from your hand. If this card is Special Summoned: You can add 1 "Witchcrafter" Spell/Trap or "Magical Dimension" from your Deck to your hand.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名はルール上「ウィッチクラフト」カードとしても扱う。このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：魔法カードの効果が発動したターンの自分メインフェイズに発動できる。このカードを手札から特殊召喚する。②：このカードが特殊召喚した場合に発動できる。デッキから「ウィッチクラフト」魔法・罠カードか「ディメンション・マジック」１枚を手札に加える。③：自分のフィールドか墓地に「聖月の皇太子レグルス」が存在する限り、このカードの攻撃力は２３００アップする。
  ko: |-
    이 카드명은 룰상 "위치크래프트" 카드로도 취급한다. 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 마법 카드의 효과가 발동한 턴의 자신 메인 페이즈에 발동할 수 있다. 이 카드를 패에서 특수 소환한다. ②: 이 카드를 특수 소환했을 경우에 발동할 수 있다. 덱에서 "위치크래프트" 마법 / 함정 카드나 "디멘션 매직" 1장을 패에 넣는다. ③: 자신의 필드나 묘지에 "프린스 오브 엔디미온 레굴루스"가 존재하는 한, 이 카드의 공격력은 2300 올린다.
  zh-TW:
  zh-CN: |-
    此卡名在规则上也视为“魔女工艺”卡。此卡名的①②效果1回合仅可各使用1次。①：在发动过魔法卡效果的回合的、自己的主要阶段可以发动。从手牌将此卡特殊召唤。②：此卡特殊召唤的情况下可以发动。从牌组将1张“魔女工艺”魔法・陷阱卡或“次元魔法”加入手牌。③：只要自己场上或墓地存在“恩底弥翁之圣月皇太子 雷格鲁斯”，此卡的攻击力上升2300。
