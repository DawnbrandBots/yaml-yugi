text:
  en: |-
    During either player's turn: You can add 1 monster that mentions "Light and Darkness Ritual" from your Deck to your hand, then discard 1 card. You can only use this effect of "Mind Shuffle" once per turn. When your opponent activates a card or effect: You can return 1 Level 7 or higher monster you control to the hand; Special Summon 1 monster with a different name from your hand that mentions "Light and Darkness Ritual", ignoring its Summoning conditions. You cannot activate these effects of "Mind Shuffle" in the same Chain.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の、①の効果は１ターンに１度しか使用できず、①②の効果は同一チェーン上では発動できない。①：自分・相手ターンに発動できる。デッキから「光と闇の儀式」のカード名が記されたモンスター１体を手札に加える。その後、自分の手札を１枚選んで捨てる。②：相手がカードの効果を発動した時、自分フィールドのレベル７以上のモンスター１体を手札に戻して発動できる。戻したモンスターとはカード名が異なる、「光と闇の儀式」のカード名が記されたモンスター１体を手札から召喚条件を無視して特殊召喚する。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①效果1回合仅可使用1次，①②的效果不可在同一连锁上发动。①：在自己・对手回合中可以发动。从牌组将1只记载有“光与暗的仪式”卡名的怪兽加入手牌。然后，挑选自己的1张手牌舍弃。②：对手发动卡的效果时，将自己场上的1只等级7以上的怪兽放回手牌可以发动。从手牌将1只卡名与所放回怪兽不同的、记载有“光与暗的仪式”卡名的怪兽无视召唤条件特殊召唤。
