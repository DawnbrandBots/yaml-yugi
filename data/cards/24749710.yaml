name:
  en: Mind Shuffle
  de: Gedankenvermischung
  es: Mezcla Mental
  fr: Mélange d'Esprit
  it: Mischiata della Mente
  pt: Embaralhamento Mental
  ja: <ruby>二つの心<rt>マインド・シャッフル</rt></ruby>
  ja_romaji: Maindo Shaffuru
  ko:
  ko_rr:
  zh-TW:
  zh-CN: 双心切换
text:
  en: |-
    During either player's turn: You can add 1 monster that mentions "Light and Darkness Ritual" from your Deck to your hand, then discard 1 card. You can only use this effect of "Mind Shuffle" once per turn. When your opponent activates a card or effect: You can return 1 Level 7 or higher monster you control to the hand; Special Summon 1 monster that mentions "Light and Darkness Ritual" from your hand, with a different name than the returned monster, ignoring its Summoning conditions. You cannot activate these effects of "Mind Shuffle" in the same Chain.
  de: |-
    Während des Spielzugs eines beliebigen Spielers: Du kannst deiner Hand 1 Monster, das „Ritual von Licht und Finsternis“ erwähnt, von deinem Deck hinzufügen, dann wirf 1 Karte ab. Du kannst diesen Effekt von „Gedankenvermischung“ nur einmal pro Spielzug verwenden. Wenn dein Gegner eine Karte oder einen Effekt aktiviert: Du kannst 1 Monster der Stufe 7 oder höher, das du kontrollierst, auf die Hand zurückgeben; beschwöre 1 Monster, das „Ritual von Licht und Finsternis“ erwähnt und einen unterschiedlichen Namen als das zurückgegebene Monster hat, als Spezialbeschwörung von deiner Hand, ungeachtet seiner Beschwörungsbedingungen. Du kannst diese Effekte von „Gedankenvermischung“ nicht in derselben Kette aktivieren.
  es: |-
    Durante el turno de cualquier jugador: puedes añadir a tu mano 1 monstruo que mencione "Ritual de la Luz y la Oscuridad" en tu Deck, y después descarta 1 carta. Sólo puedes usar este efecto de "Mezcla Mental" una vez por turno. Cuando tu adversario activa una carta o efecto: puedes devolver a la mano 1 monstruo de Nivel 7 o mayor que controles; Invoca de Modo Especial 1 monstruo que mencione "Ritual de la Luz y la Oscuridad" desde tu mano, con un nombre diferente al del monstruo devuelto, ignorando sus condiciones de Invocación. No puedes activar estos efectos de "Mezcla Mental" en la misma Cadena.
  fr: |-
    Durant le tour de chaque joueur : vous pouvez ajouter 1 monstre qui mentionne "Rituel de la Lumière et des Ténèbres" depuis votre Deck à votre main, puis défaussez 1 carte. Vous ne pouvez utiliser cet effet de "Mélange d'Esprit" qu'une fois par tour. Lorsque votre adversaire active une carte ou un effet : vous pouvez renvoyer 1 monstre de min. Niveau 7 que vous contrôlez à la main ; Invoquez Spécialement 1 monstre qui mentionne "Rituel de la Lumière et des Ténèbres" depuis votre main, de nom différent du monstre renvoyé, en ignorant ses conditions d'Invocation. Vous ne pouvez pas activer ces effets de "Mélange d'Esprit" dans la même Chaîne.
  it: |-
    Durante il turno di qualsiasi giocatore: puoi aggiungere 1 mostro che menziona "Rituale di Luce e Oscurità" dal tuo Deck alla tua mano, poi scartare 1 carta. Puoi utilizzare questo effetto di "Mischiata della Mente" una sola volta per turno. Quando il tuo avversario attiva una carta o un effetto: puoi far ritornare 1 mostro di Livello 7 o superiore che controlli nella mano; Evoca Specialmente dalla tua mano 1 mostro che menziona "Rituale di Luce e Oscurità", con un nome diverso dal mostro fatto ritornare, ignorando le sue condizioni di Evocazione. Non puoi attivare questi effetti di "Mischiata della Mente" nella stessa Catena.
  pt: |-
    Durante o turno de qualquer duelista: você pode adicionar 1 monstro que mencione "Ritual da Luz e das Trevas" do seu Deck à sua mão e, depois, descarte 1 card. Você só pode usar este efeito de "Embaralhamento Mental" uma vez por turno. Quando seu oponente ativar um card ou efeito: você pode devolver 1 monstro de Nível 7 ou mais que você controla para a mão; Invoque por Invocação-Especial 1 monstro que mencione "Ritual da Luz e das Trevas" da sua mão, com um nome diferente que o do monstro devolvido, ignorando suas condições de Invocação. Você não pode ativar esses efeitos de "Embaralhamento Mental" na mesma Corrente.
  ja: |-
    このカード名の、①の効果は１ターンに１度しか使用できず、①②の効果は同一チェーン上では発動できない。①：自分・相手ターンに発動できる。デッキから「光と闇の儀式」のカード名が記されたモンスター１体を手札に加える。その後、自分の手札を１枚選んで捨てる。②：相手がカードの効果を発動した時、自分フィールドのレベル７以上のモンスター１体を手札に戻して発動できる。戻したモンスターとはカード名が異なる、「光と闇の儀式」のカード名が記されたモンスター１体を手札から召喚条件を無視して特殊召喚する。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①效果1回合仅可使用1次，①②的效果不可在同一连锁上发动。①：在自己・对手回合中可以发动。从牌组将1只记载有“光与暗的仪式”卡名的怪兽加入手牌。然后，挑选自己的1张手牌舍弃。②：对手发动卡的效果时，将自己场上的1只等级7以上的怪兽放回手牌可以发动。从手牌将1只卡名与所放回怪兽不同的、记载有“光与暗的仪式”卡名的怪兽无视召唤条件特殊召唤。
