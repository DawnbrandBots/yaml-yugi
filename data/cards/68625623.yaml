  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分フィールドのカードを３枚まで対象として発動できる。そのカードを破壊し、このカードを手札から特殊召喚する。その後、破壊したカードの元々の種類によって以下の効果をそれぞれ適用できる。●モンスター：自分は１枚ドローする。●魔法：フィールドのモンスター１体の表示形式を変更する。●罠：フィールドの他のカード１枚を破壊する。②：フィールドのこのカードが効果で破壊された場合に発動できる。フィールドのモンスターを全て破壊する。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：以自己场上最多3张卡为对象可以发动。将该卡破坏，从手牌将此卡特殊召唤。然后，根据所破坏的卡的原本的种类，可分别适用以下效果。●怪兽：自己抽1张。●魔法：变更场上的1只怪兽的表示形式。●陷阱：将场上的1张其他卡破坏。②：场上的此卡因效果被破坏的情况下可以发动。将场上的怪兽全部破坏。
