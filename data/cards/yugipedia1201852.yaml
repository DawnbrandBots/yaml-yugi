text:
  en: |-
    You can Special Summon this card (from your hand) by revealing 1 face-down card you control and returning it to the hand/Extra Deck. You can only Special Summon "Kuzuha the Bewitching Deity Asutra" once per turn this way. You can only use each of the following effects of "Kuzuha the Bewitching Deity Asutra" once per turn. You can target up to 1 card on the field for every 2 face-down cards on the field; destroy them. During your End Phase: You can target 1 "Asutra" Trap in your GY; Set it.
