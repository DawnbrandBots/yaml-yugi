text:
  en: |-
    Once per turn, during the Standby Phase: Roll a six-sided die and place counters on this card up to the result (max. 6). When a monster effect is activated on your opponent's field, or once per battle, during damage calculation, if an opponent's monster attacks: You can remove 1 counter from this card, then target 1 of those monsters; toss a coin and call it. If you call it right, you can Special Summon 1 monster that mentions "Dark Time Wizard" from your Deck, and if you do, until the end of this turn, change the targeted monster's ATK to 0, also its effects are negated.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    ①：自分・相手のスタンバイフェイズに発動する。サイコロを１回振り、出た目の数までこのカードにカウンターを置く（最大６つまで）。②：相手モンスターが攻撃するダメージ計算時に１度、または相手フィールドのモンスターの効果が発動した時に、このカードのカウンターを１つ取り除き、その内の１体を対象として発動できる。コイントスを１回行い、裏表を当てる。当たった場合、デッキから「時の黒魔術師」のカード名が記されたモンスター１体を特殊召喚し、対象のモンスターはターン終了時まで、攻撃力が０になり、効果は無効化される。
  ko:
  zh-TW:
  zh-CN: |-
    ①：在自己・对手的准备阶段发动。掷1次骰子，以掷出的数字为上限在此卡上放计数物（最多6个）。②：每次对手怪兽攻击的伤害计算时有1次，或对手场上的怪兽的效果发动时，去除此卡的1个计数物，以其中1只为对象可以发动。掷1次硬币，猜正反。猜对的情况下，从牌组将1只记载有“时间黑魔术师”卡名的怪兽特殊召唤，对象怪兽直至回合结束时为止，攻击力变为0，效果无效化。
