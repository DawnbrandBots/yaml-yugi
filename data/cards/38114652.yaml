text:
  en: |-
    You can Special Summon this card (from your hand) by revealing 1 face-down card you control and returning it to the hand/Extra Deck. You can only Special Summon "Mikumari the Sealing Deity Ashtra" once per turn this way. You can only use each of the following effects of "Mikumari the Sealing Deity Ashtra" once per turn. During your Main Phase: You can add 1 non-Wyrm "Ashtra" monster from your Deck to your hand. If this card is sent to the GY as Synchro Material for an "Ashtra" monster: You can target 1 Normal Trap in your GY; Set it.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の、①の方法による特殊召喚は１ターンに１度しかできず、②③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードは自分フィールドの裏側表示カード１枚を相手に見せて手札・ＥＸデッキに戻し、手札から特殊召喚できる。②：自分メインフェイズに発動できる。デッキから幻竜族以外の「アシュトラ」モンスター１体を手札に加える。③：このカードが「アシュトラ」ＳモンスターのＳ素材として墓地へ送られた場合、自分の墓地の通常罠カード１枚を対象として発動できる。そのカードを自分フィールドにセットする。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名以①方法的特殊召唤1回合仅可进行1次，且②③效果1回合仅可各使用1次。①：此卡可通过将自己场上的1张里侧表示卡出示给对手并放回手牌・额外牌组，来从手牌特殊召唤。②：在自己的主要阶段可以发动。从牌组将1只幻龙族以外的“艮鬼”怪兽加入手牌。③：此卡作为“艮鬼”同步怪兽的同步素材被送至墓地的情况下，以自己墓地的1张通常陷阱卡为对象可以发动。将该卡放置在自己场上。
