text:
  en: |-
    This card's name becomes "Umi" while in the Monster Zone. You can only use each of the following effects of "Monstrous Arms of Atlantis" once per turn. If this card is Normal or Special Summoned: You can target 1 monster in your GY that mentions "Atlantis, City of the Sea Dragon"; Special Summon it in Defense Position. When your opponent activates a monster effect (Quick Effect): You can banish this card from your field or GY and send 1 face-up "Umi" you control to the GY; negate that effect.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが召喚・特殊召喚した場合、「竜都アトランティス」のカード名が記された自分の墓地のモンスター１体を対象として発動できる。そのモンスターを守備表示で特殊召喚する。②：このカードはモンスターゾーンに存在する限り、カード名を「海」として扱う。③：相手がモンスターの効果を発動した時、フィールド・墓地のこのカードを除外し、自分フィールドの表側表示の「海」１枚を墓地へ送って発動できる。その発動した効果を無効にする。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①③效果1回合仅可各使用1次。①：此卡召唤・特殊召唤的情况下，以自己墓地的1只记载有“龙都 亚特兰蒂斯”卡名的怪兽为对象可以发动。将该怪兽以守备表示特殊召唤。②：此卡只要存在于怪兽区域，卡名视为“海”。③：对手发动怪兽的效果时，将场上・墓地的此卡除外，并将自己场上的1张表侧表示的“海”送至墓地可以发动。将该发动的效果无效。
