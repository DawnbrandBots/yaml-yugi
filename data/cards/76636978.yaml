text:
  en: |-
    1 Tuner + 1+ non-Tuners
    When your opponent activates a card or effect in response to your card or effect activation (Quick Effect): You can Tribute this card; negate that opponent's effect, and if you do, destroy that card. If a monster(s) in your possession was Tributed this turn (Quick Effect): You can banish this card from your GY; Special Summon 1 "Stardust" Synchro Monster from your Extra Deck. You can only use each effect of "Stardust Dragon - Victim Sanctuary" once per turn, and cannot activate more than 1 in the same Chain.
  de:
