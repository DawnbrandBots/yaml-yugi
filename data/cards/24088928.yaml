name:
  en: Skull Archfiend of Chaos
  de: Schädel-Erzunterweltler des Chaos
  es: Archidemonio Cráneo del Caos
  fr: Crâne Archdémon du Chaos
  it: Arcidemone Teschio del Chaos
  pt: Caveira Arquidemônio do Caos
  ja: <ruby>混<rt>こん</rt></ruby><ruby>沌<rt>とん</rt></ruby>の<ruby>魔<rt>ま</rt></ruby><ruby>王<rt>おう</rt></ruby>－スカル・デーモン
  ja_romaji: Konton no Maō - Sukaru Dēmon
  ko:
  ko_rr:
  zh-TW:
  zh-CN: 混沌之魔王－骷髅恶魔
text:
  en: |-
    If this card is in your hand or GY: You can target 3 other cards in the GYs and/or face-up banishment, including a card that mentions "Light and Darkness Ritual"; place them on the bottom of the Deck in any order, and if you do, Special Summon this card. If this card is sent to the GY: You can send 1 Ritual Spell from your hand or Deck to the GY; add 1 Ritual Monster whose name is mentioned on that card from your Deck to your hand. You can only use each effect of "Skull Archfiend of Chaos" once per turn.
  de: |-
    Falls sich diese Karte in deiner Hand oder deinem Friedhof befindet: Du kannst 3 andere Karten in den Friedhöfen und/oder von den offen verbannten Karten wählen, darunter eine Karte, die „Ritual von Licht und Finsternis“ erwähnt; lege sie in beliebiger Reihenfolge unters Deck und falls du dies tust, beschwöre diese Karte als Spezialbeschwörung. Falls diese Karte auf den Friedhof gelegt wird: Du kannst 1 Ritualzauber von deiner Hand oder deinem Deck auf den Friedhof legen; füge deiner Hand 1 Ritualmonster, dessen Name auf jener Karte erwähnt ist, von deinem Deck hinzu. Du kannst jeden Effekt von „Schädel-Erzunterweltler des Chaos“ nur einmal pro Spielzug verwenden.
  es: |-
    Si esta carta está en tu mano o Cementerio: puedes seleccionar otras 3 cartas en los Cementerios y/o destierro boca arriba, incluyendo una carta que mencione "Ritual de la Luz y la Oscuridad"; ponlas en la parte inferior del Deck en cualquier orden y, si lo haces, Invoca esta carta de Modo Especial. Si esta carta es mandada al Cementerio: puedes mandar al Cementerio 1 Mágica de Ritual en tu mano o Deck; añade a tu mano 1 Monstruo de Ritual en tu Deck cuyo nombre sea mencionado en esa carta. Sólo puedes usar cada efecto de "Archidemonio Cráneo del Caos" una vez por turno.
  fr: |-
    Si cette carte est dans votre main ou Cimetière : vous pouvez cibler 3 autres cartes (une carte qui mentionne "Rituel de la Lumière et des Ténèbres" incluse) dans les Cimetières et/ou bannissement face recto ; placez-les au-dessous du Deck dans l'ordre de votre choix, et si vous le faites, Invoquez Spécialement cette carte. Si cette carte est envoyée au Cimetière : vous pouvez envoyer 1 Magie Rituelle depuis votre main ou Deck au Cimetière ; ajoutez 1 Monstre Rituel dont le nom est mentionné sur la carte depuis votre Deck à votre main. Vous ne pouvez utiliser chaque effet de "Crâne Archdémon du Chaos" qu'une fois par tour.
  it: |-
    Se questa carta è nella tua mano o Cimitero: puoi scegliere come bersaglio altre 3 carte nei Cimiteri e/o carte bandite scoperte, compresa una carta che menziona "Rituale di Luce e Oscurità"; mettile in fondo al Deck in qualsiasi ordine e, se lo fai, Evoca Specialmente questa carta. Se questa carta viene mandata al Cimitero: puoi mandare 1 Magia Rituale dalla tua mano o Deck al Cimitero; aggiungi 1 Mostro Rituale il cui nome è menzionato su quella carta dal tuo Deck alla tua mano. Puoi utilizzare ogni effetto di "Arcidemone Teschio del Chaos" una sola volta per turno.
  pt: |-
    Se este card estiver na sua mão ou no Cemitério: você pode escolher 3 outros cards nos Cemitérios e/ou no banimento com a face para cima, incluindo um card que mencione "Ritual da Luz e das Trevas"; coloque-os no fundo do Deck em qualquer ordem e, se isso acontecer, Invoque este card por Invocação-Especial. Se este card for enviado para o Cemitério: você pode enviar 1 Magia de Ritual da sua mão ou do Deck para o Cemitério; adicione 1 Monstro de Ritual cujo nome seja mencionado nesse card, do seu Deck à sua mão. Você só pode usar cada efeito de "Caveira Arquidemônio do Caos" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが手札・墓地に存在する場合、このカードを除く、「光と闇の儀式」のカード名が記されたカードを含む自分・相手の墓地・除外状態（表側）のカードを合計３枚対象として発動できる。そのカードを好きな順番でデッキの下に戻し、このカードを特殊召喚する。②：このカードが墓地へ送られた場合、手札・デッキから儀式魔法カード１枚を墓地へ送って発動できる。そのカードにカード名が記された儀式モンスター１体をデッキから手札に加える。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：此卡存在于手牌・墓地的情况下，以除此卡以外的、包含记载有“光与暗的仪式”卡名的卡在内的、自己・对手的、墓地・除外状态（表侧）的合计3张卡为对象可以发动。将该卡以喜欢的顺序放回牌组下面，将此卡特殊召唤。②：此卡被送至墓地的情况下，从手牌・牌组将1张仪式魔法卡送至墓地可以发动。从牌组将1只卡名记载于该卡的仪式怪兽加入手牌。
