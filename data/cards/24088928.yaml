text:
  en: |-
    If this card is in your hand or GY: You can target 3 other cards in the GYs and/or face-up banishment, including a card that mentions "Ritual of Light and Darkness"; place them on the bottom of the Deck in any order, and if you do, Special Summon this card. If this card is sent to the GY: You can send 1 Ritual Spell from your hand or Deck to the GY; add 1 Ritual Monster mentioned on that card from your Deck to your hand. You can only use each effect of "Skull Archfiend of Chaos" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが手札・墓地に存在する場合、このカードを除く、「光と闇の儀式」のカード名が記されたカードを含む自分・相手の墓地・除外状態（表側）のカードを合計３枚対象として発動できる。そのカードを好きな順番でデッキの下に戻し、このカードを特殊召喚する。②：このカードが墓地へ送られた場合、手札・デッキから儀式魔法カード１枚を墓地へ送って発動できる。そのカードにカード名が記された儀式モンスター１体をデッキから手札に加える。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：此卡存在于手牌・墓地的情况下，以除此卡以外的、包含记载有“光与暗的仪式”卡名的卡在内的、自己・对手的、墓地・除外状态（表侧）的合计3张卡为对象可以发动。将该卡以喜欢的顺序放回牌组下面，将此卡特殊召唤。②：此卡被送至墓地的情况下，从手牌・牌组将1张仪式魔法卡送至墓地可以发动。从牌组将1只卡名记载于该卡的仪式怪兽加入手牌。
