text:
  en: |-
    Cannot be Normal Summoned if you control a monster. You can Tribute this card; Special Summon 1 Machine monster from your Deck whose ATK equals its own DEF, but return it to the hand during the End Phase. You can banish this card from your GY and discard 1 card; Special Summon 1 "Iron Rubble Token" (Machine/EARTH/Level 1/ATK 0/DEF 0), but it cannot be used as material for a Fusion, Synchro, or Link Summon. You can only use each effect of "Checkker" once per turn.
  de: |-
    Kann nicht als Normalbeschwörung beschworen werden, falls du ein Monster kontrollierst. Du kannst diese Karte als Tribut anbieten; beschwöre 1 Maschine-Monster, dessen ATK seinen eigenen DEF entsprechen, als Spezialbeschwörung von deinem Deck, aber gib es während der End Phase auf die Hand zurück. Du kannst diese Karte von deinem Friedhof verbannen und 1 Karte abwerfen; beschwöre 1 „Eisenmüll-Spielmarke“ (Maschine/ERDE/Stufe 1/ATK 0/DEF 0) als Spezialbeschwörung, aber sie kann nicht als Material für eine Fusions-, Synchro- oder Linkbeschwörung verwendet werden. Du kannst jeden Effekt von „Tester“ nur einmal pro Spielzug verwenden.
  es: |-
    No puede ser Invocado de Modo Normal si controlas un monstruo. Puedes Sacrificar esta carta; Invoca de Modo Especial, desde tu Deck, 1 monstruo Máquina cuyo ATK sea igual a su propia DEF, pero devuélvelo a la mano durante la End Phase. Puedes desterrar esta carta en tu Cementerio y descartar 1 carta; Invoca de Modo Especial 1 "Ficha Escombro de Hierro" (Máquina/TIERRA/Nivel 1/ATK 0/DEF 0), pero no puede ser usada como material para una Invocación por Fusión, Sincronía o Enlace. Sólo puedes usar cada efecto de "Verificador" una vez por turno.
  fr: |-
    Non Invocable Normalement si vous contrôlez un monstre. Vous pouvez Sacrifier cette carte ; Invoquez Spécialement 1 monstre Machine depuis votre Deck dont l'ATK est égale à sa propre DEF, mais renvoyez-le à la main durant la End Phase. Vous pouvez bannir cette carte depuis votre Cimetière, et défaussez 1 carte ; Invoquez Spécialement 1 "Jeton Gravats de Fer" (Machine/TERRE/Niveau 1/ATK 0/DEF 0), mais il ne peut pas être utilisé comme Matériel pour une Invocation Fusion, Synchro ou Lien. Vous ne pouvez utiliser chaque effet de "Vérificateur" qu'une fois par tour.
  it: |-
    Non può essere Evocato Normalmente se controlli un mostro. Puoi offrire come Tributo questa carta; Evoca Specialmente dal tuo Deck 1 mostro Macchina con ATK pari al suo stesso DEF, ma fallo ritornare nella mano durante la End Phase. Puoi bandire questa carta dal tuo Cimitero e scartare 1 carta; Evoca Specialmente 1 "Segna-Detriti di Ferro" (Macchina/TERRA/Livello 1/ATK 0/DEF 0), ma esso non può essere utilizzato come materiale per un'Evocazione tramite Fusione, Synchro o Link. Puoi utilizzare ogni effetto di "Controllore" una sola volta per turno.
  pt: |-
    Não pode ser Invocado por Invocação-Normal se você controlar um monstro. Você pode oferecer este card como Tributo; Invoque por Invocação-Especial 1 monstro Máquina do seu Deck cujo ATK seja igual à sua própria DEF, mas devolva-o para a mão durante a Fase Final. Você pode banir este card do seu Cemitério e descartar 1 card; Invoque por Invocação-Especial 1 "Ficha de Entulho de Ferro" (Máquina/TERRA/Nível 1/ATK 0/DEF 0), mas ela não pode ser usada como matéria para uma Invocação-Fusão, Sincro ou Link. Você só pode usar cada efeito de "Verificador" uma vez por turno.
