  ja: |-
    このカード名の②の効果は１ターンに１度しか使用できない。①：モンスターが戦闘・効果で破壊される度に、１体につき１つこのカードに月輪カウンターを置く。②：このカードの月輪カウンターを以下の数だけ取り除き、その効果を発動できる。
    ●１つ：自分の手札・墓地からレベル６以下の悪魔族・天使族モンスター１体を特殊召喚する。
    ●３つ：デッキから闇属性・レベル１０モンスター１体を手札に加える。
    ●５つ：自分の手札・墓地からレベル１０モンスター１体を特殊召喚する。
