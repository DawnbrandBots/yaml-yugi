name:
  en: Sandwich Day
  de: Sandwich-Tag
  es: Día de Sándwich
  fr: Journée du Sandwich
  it: Giorno del Panino
  pt: Dia do Sanduíche
  ja: ドローパン
  ja_romaji: Dorōpan
  ko: 드로우빵
  ko_rr:
  zh-TW:
  zh-CN: 抽牌面包
text:
  en: |-
    If you have a monster in your GY: Pay 200 LP; draw 1 card and reveal it, then, if it is a monster, apply this effect based on its Attribute.
    ● An Attribute not in your GY: Draw 1 card.
    ● An Attribute in your GY: Discard 1 card.
    You can only activate 1 "Sandwich Day" per turn.
  de: |-
    Falls du ein Monster in deinem Friedhof hast: Zahle 200 LP; ziehe 1 Karte und zeige sie vor, dann, falls es ein Monster ist, führe diesen Effekt aus, basierend auf seiner Eigenschaft.
    ● Eine Eigenschaft nicht in deinem Friedhof: Ziehe 1 Karte.
    ● Eine Eigenschaft in deinem Friedhof: Wirf 1 Karte ab.
    Du kannst nur 1 „Sandwich-Tag“ pro Spielzug aktivieren.
  es: |-
    Si tienes un monstruo en tu Cementerio: paga 200 LP; roba 1 carta y muéstrala y después, si es un monstruo, aplica este efecto basado en su Atributo.
    ● Un Atributo que no está en tu Cementerio: Roba 1 carta.
    ● Un Atributo que está en tu Cementerio: Descarta 1 carta.
    Sólo puedes activar 1 "Día de Sándwich" por turno.
  fr: |-
    Si vous avez un monstre dans votre Cimetière : payez 200 LP ; piochez 1 carte et révélez-la, puis, si c'est un monstre, appliquez cet effet selon son Attribut.
    ● Un Attribut non dans votre Cimetière : Piochez 1 carte.
    ● Un Attribut dans votre Cimetière : Défaussez 1 carte.
    Vous ne pouvez activer qu'1 "Journée du Sandwich" par tour.
  it: |-
    Se hai un mostro nel tuo Cimitero: paga 200 LP; pesca 1 carta e rivelala, poi, se è un mostro, applica questo effetto a seconda del suo Attributo.
    ● Un Attributo non nel tuo Cimitero: Pesca 1 carta.
    ● Un Attributo nel tuo Cimitero: Scarta 1 carta.
    Puoi attivare solo 1 "Giorno del Panino" per turno.
  pt: |-
    Se você tiver um monstro no seu Cemitério: pague 200 PV; compre 1 card e revele-o e, depois, se for um monstro, aplique este efeito de acordo com o Atributo dele.
    ● Um Atributo que não estiver no seu Cemitério: Compre 1 card.
    ● Um Atributo no seu Cemitério: Descarte 1 card.
    Você só pode ativar 1 "Dia do Sanduíche" por turno.
  ja: |-
    このカード名のカードは１ターンに１枚しか発動できない。①：自分の墓地にモンスターが存在する場合、２００ＬＰを払って発動できる。自分は１枚ドローし、お互いに確認する。それがモンスターだった場合、さらにその属性によって以下の効果を適用する。
    ●自分の墓地に存在しない属性：自分は１枚ドローする。
    ●自分の墓地に存在する属性：自分の手札を１枚選んで捨てる。
  ko: |-
    이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다. ①: 자신 묘지에 몬스터가 존재할 경우, 200 LP를 지불하고 발동할 수 있다. 자신은 1장 드로우하고, 서로 확인한다. 그것이 몬스터였을 경우, 추가로 그 속성에 따라 이하의 효과를 적용한다.
    ●자신 묘지에 존재하지 않는 속성: 자신은 1장 드로우한다.
    ●자신 묘지에 존재하는 속성: 자신의 패를 1장 고르고 버린다.
  zh-TW:
  zh-CN: |-
    此卡名的卡1回合仅可发动1张。①：自己墓地存在怪兽的情况下，支付200LP可以发动。自己抽1张，给双方确认。其为怪兽的情况下，进而根据其属性适用以下效果。
    ●自己墓地中不存在的属性：自己抽1张。
    ●自己墓地中存在的属性：挑选自己的1张手牌舍弃。
