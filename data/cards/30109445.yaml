text:
  en: |-
    2 Ritual, Fusion, Synchro, Xyz, and/or Pendulum Monsters
    Your Tribute Summoned monsters can make a second attack during each Battle Phase. If this card is Tributed: You can activate 1 of these effects (but you can only use each effect of "Clown Crew Drish" once per turn);
    ● Return all Link Monsters from the field and the GYs to the Extra Deck.
    ● Each player shuffles their entire hand into the Deck, then they draw the same number of cards they shuffled.
