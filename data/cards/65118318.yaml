text:
  en: |-
    Send 1 card that mentions "Dark Time Wizard" from your Deck to the GY, except "Foolish Graverobber", then you can Special Summon 1 monster from either GY to your field. You can banish this card from your GY; Set to your field, 1 Spell/Trap that mentions "Dark Time Wizard" from your GY, except "Foolish Graverobber", or 1 Spell/Trap from your opponent's GY. You can only use each effect of "Foolish Graverobber" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：「おろかな墓荒らし」を除く、「時の黒魔術師」のカード名が記されたカード１枚をデッキから墓地へ送る。その後、自分か相手の墓地のモンスター１体を自分フィールドに特殊召喚できる。②：墓地のこのカードを除外して発動できる。以下のいずれかのカード１枚を自分フィールドにセットする。
    ●「おろかな墓荒らし」を除く、「時の黒魔術師」のカード名が記された自分の墓地の魔法・罠カード
    ●相手の墓地の魔法・罠カード
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：从牌组将除“愚蠢的盗墓者”以外的、1张记载有“时间黑魔术师”卡名的卡送至墓地。然后，可将自己或对手墓地的1只怪兽特殊召唤至自己场上。②：将墓地的此卡除外可以发动。将以下的任意1张卡放置在自己场上。
    ●除“愚蠢的盗墓者”以外的、记载有“时间黑魔术师”卡名的自己墓地的魔法・陷阱卡。
    ●对手墓地的魔法・陷阱卡。
