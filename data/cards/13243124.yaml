    このカード名はルール上「Ｅ・ＨＥＲＯ」カードとしても扱う。このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが攻撃力２２００以上のモンスターと戦闘を行う攻撃宣言時に発動できる。このカードの攻撃力は１０００アップする。その後、手札からレベル４以下のモンスター１体を守備表示で特殊召喚できる。②：モンスターが戦闘で破壊された自分・相手ターンに発動できる。自分の手札・フィールドのモンスターを融合素材とし、融合モンスター１体を融合召喚する。
