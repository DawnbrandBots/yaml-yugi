text:
  en: |-
    2 monsters with the same Type but different Attributes
    (This card is always treated as an "Elemental HERO" card.)
    When an attack is declared involving this card and a monster with 2200 or more ATK: You can make this card gain 1000 ATK, then you can Special Summon 1 Level 4 or lower monster from your hand in Defense Position. If a monster(s) was destroyed by battle this turn (Quick Effect): You can Fusion Summon 1 Fusion Monster from your Extra Deck, using monsters from your hand or field. You can only use each effect of "Favorite HERO Flame Wingman" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    同じ種族で属性が異なるモンスター×２
    このカード名はルール上「Ｅ・ＨＥＲＯ」カードとしても扱う。このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが攻撃力２２００以上のモンスターと戦闘を行う攻撃宣言時に発動できる。このカードの攻撃力は１０００アップする。その後、手札からレベル４以下のモンスター１体を守備表示で特殊召喚できる。②：モンスターが戦闘で破壊された自分・相手ターンに発動できる。自分の手札・フィールドのモンスターを融合素材とし、融合モンスター１体を融合召喚する。
  ko: |-
    같은 종족으로 속성이 다른 몬스터 × 2
    이 카드명은 룰상 "엘리멘틀 히어로" 카드로도 취급한다. 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드가 공격력 2200 이상의 몬스터와 전투를 실행하는 공격 선언시에 발동할 수 있다. 이 카드의 공격력은 1000 올린다. 그 후, 패에서 레벨 4 이하의 몬스터 1장을 수비 표시로 특수 소환할 수 있다. ②: 몬스터가 전투로 파괴된 자신 / 상대 턴에 발동할 수 있다. 자신의 패 / 필드의 몬스터를 융합 소재로 하고, 융합 몬스터 1장을 융합 소환한다.
  zh-TW:
  zh-CN: |-
    种族相同而属性不同的怪兽×2
    此卡名在规则上也视为“元素－英雄”卡。此卡名的①②效果1回合仅可各使用1次。①：此卡与攻击力2200以上的怪兽进行战斗的攻击宣言时可以发动。此卡的攻击力上升1000。然后，可从手牌将1只等级4以下的怪兽以守备表示特殊召唤。②：有怪兽因战斗被破坏的自己・对手回合可以发动。将自己手牌・场上的怪兽作为融合素材，将1只融合怪兽融合召唤。
