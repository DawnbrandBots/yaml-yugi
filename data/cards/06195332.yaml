  es: Exestelcaballero Constelación Ptolomeo Ω7
  fr: Exstellchevalier Ptolemy Ω7 de la Constellée
  it: Exstellcavaliere Costellazione Ptolemy Ω7
  pt: Excavaleirostelar Constelar Ptolomeu Ω7
  ja: <ruby>超神星輝士<rt>エクステラナイト</rt></ruby> セイクリッド・トレミス<ruby>Ω<rt>オメガ</rt></ruby><ruby>７<rt>セブン</rt></ruby>
  ja_romaji: Ekusuteranaito Seikuriddo Toremisu Omega Sebun
  ko: 엑스테라나이트 세이크리드 트레미스Ω7
  ko_rr:
  zh-TW:
  zh-CN: 超神辉星骑士 星圣 托勒密星团欧米伽7
text:
  en: |-
    3 Level 7 monsters
    Once per turn, during your Main Phase 2, you can also Xyz Summon "Exstellarknight Constellar Ptolemy Ω7" by using 1 "tellarknight" or "Constellar" Xyz Monster you control (transfer its materials). While you have 7 or more "tellarknight" monsters with different names in your GY and/or banishment, this card gains 2700 ATK/DEF, also it is unaffected by your opponent's activated effects. Once per turn (Quick Effect): You can detach any number of materials from this card, then target that many monsters your opponent controls; shuffle them into the Deck.
  de: |-
    3 Monster der Stufe 7
    Einmal pro Spielzug, während deiner Main Phase 2, kannst du „Ex-Wandelsternritter Sternzeichen-Kundler Ptolemy Ω7“ auch als Xyz-Beschwörung beschwören, indem du 1 „Sternritter“- oder „Sternzeichen“-Xyz-Monster verwendest, das du kontrollierst (transferiere sein Material). Solange du 7 oder mehr „Sternritter“-Monster mit unterschiedlichen Namen in deinem Friedhof und/oder unter deinen verbannten Karten hast, erhält diese Karte 2700 ATK/DEF, zusätzlich bleibt sie von aktivierten Effekten deines Gegners unberührt. Einmal pro Spielzug (Schnelleffekt): Du kannst eine beliebige Anzahl Material von dieser Karte abhängen und dann ebenso viele Monster wählen, die dein Gegner kontrolliert; mische sie ins Deck.
  es: |-
    3 monstruos de Nivel 7
    Una vez por turno, durante tu Main Phase 2, puedes también Invocar Xyz "Exestelcaballero Constelación Ptolomeo Ω7" usando 1 Monstruo Xyz "telcaballero" o "Constelación" que controles (transfiere sus materiales). Mientras tengas 7 o más monstruos "telcaballero" con nombres diferentes en tu Cementerio y/o destierro, esta carta gana 2700 ATK/DEF, y además no es afectada por los efectos activados de tu adversario. Una vez por turno (Efecto Rápido): puedes desacoplar cualquier número de materiales de esta carta, y después seleccionar ese mismo número de monstruos que controle tu adversario; barájalos al Deck.
  fr: |-
    3 monstres de Niveau 7
    Une fois par tour, durant votre Main Phase 2, vous pouvez aussi Invoquer par Xyz "Exstellchevalier Ptolemy Ω7 de la Constellée" en utilisant 1 Monstre Xyz "tellchevalier" ou "Constellée" que vous contrôlez (transférez ses Matériels). Tant que vous avez min. 7 monstres "tellchevalier" de noms différents dans votre Cimetière et/ou bannissement, cette carte gagne 2700 ATK/DEF, et aussi, elle n'est pas affectée par les effets activés de votre adversaire. Une fois par tour (Effet Rapide) : vous pouvez détacher un nombre de votre choix de Matériels de cette carte, puis ciblez autant de monstres contrôlés par votre adversaire ; mélangez-les dans le Deck.
  it: |-
    3 mostri di Livello 7
    Una volta per turno, durante la tua Main Phase 2, puoi anche Evocare Xyz "Exstellcavaliere Costellazione Ptolemy Ω7" utilizzando 1 Mostro Xyz "tellcavaliere" o "Costellazione" che controlli (trasferisci i suoi materiali). Mentre hai 7 o più mostri "tellcavaliere" con nomi diversi nel tuo Cimitero e/o carte bandite, questa carta guadagna 2700 ATK/DEF, inoltre essa è immune agli effetti attivati del tuo avversario. Una volta per turno (Effetto Rapido): puoi staccare un qualsiasi numero di materiali da questa carta, poi scegliere come bersaglio quel numero di mostri controllati dal tuo avversario; mischiali nel Deck.
  pt: |-
    3 monstros de Nível 7
    Uma vez por turno, durante sua Fase Principal 2, você também pode Invocar por Invocação-Xyz "Excavaleirostelar Constelar Ptolomeu Ω7" ao usar 1 Monstro Xyz "Cavaleirost" ou "Constelar" que você controla (transfira as matérias dele). Enquanto você tiver 7 ou mais monstros "Cavaleirost" com nomes diferentes no seu Cemitério e/ou banimento, este card ganha 2700 de ATK/DEF e, além disso, ele não é afetado pelos efeitos ativados do seu oponente. Uma vez por turno (Efeito Rápido): você pode desassociar qualquer número de matérias deste card e, depois, escolha esse número de monstros que seu oponente controla; embaralhe-os no Deck.
  ja: |-
    レベル７モンスター×３
    「超神星輝士 セイクリッド・トレミスΩ７」は自分メインフェイズ２に１度、自分フィールドの「テラナイト」、「セイクリッド」Ｘモンスターの上に重ねてＸ召喚する事もできる。①：このカードは自分の墓地・除外状態の「テラナイト」モンスターが７種類以上である限り、攻撃力・守備力が２７００アップし、相手が発動した効果を受けない。②：自分・相手ターンに１度、このカードのＸ素材を任意の数だけ取り除き、その数だけ相手フィールドのモンスターを対象として発動できる。そのモンスターをデッキに戻す。
  ko: |-
    레벨 7 몬스터 × 3
    "엑스테라나이트 세이크리드 트레미스Ω7"은 자신 메인 페이즈 2 에 1번, 자신 필드의 "테라나이트", "세이크리드" 엑시즈 몬스터 위에 겹쳐 엑시즈 소환할 수도 있다. ①: 이 카드는 자신의 묘지 / 제외 상태인 "테라나이트" 몬스터가 7종류 이상인 한, 공격력 / 수비력을 2700 올리고, 상대가 발동한 효과를 받지 않는다. ②: 자신 / 상대 턴에 1번, 이 카드의 엑시즈 소재를 임의의 수만큼 제거하고, 그 수만큼 상대 필드의 몬스터를 대상으로 하여 발동할 수 있다. 그 몬스터를 덱으로 되돌린다.
  zh-TW:
  zh-CN: |-
    等级7怪兽×3
    “超神辉星骑士 星圣 托勒密星团欧米伽7”1回合1次，在自己的主要阶段2，也可重叠在自己场上的“星骑士”、“星圣”超量怪兽上面来超量召唤。①：只要自己墓地・除外状态的“星骑士”怪兽为7种以上，此卡的攻击力・守备力就上升2700，且不受对手发动的效果影响。②：在每个自己・对手回合中1次，去除此卡的任意数量的超量素材，依其数量以对手场上的怪兽为对象可以发动。将该怪兽放回牌组。
