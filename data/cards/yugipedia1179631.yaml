  en: |-
    Monsters your opponent controls lose 300 ATK/DEF for each Thunder monster you control. You can only use each of the following effects of "Blitzclique - Alternator" once per turn. You can shuffle 1 other "Blitzclique" card from your hand or face-up field into the Deck; add 1 Thunder monster with a different name from your Deck to your hand. You can banish this card from your GY; add 1 "Blitzclique" Spell or "Kowloon, Citadel of the Sky" from your Deck to your hand.
