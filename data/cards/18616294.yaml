text:
  en: |-
    You can Tribute this card, then reveal 1 Machine monster in your hand; add 1 Machine monster with a different Attribute from your Deck to your hand, then if you added a monster with 1200 or less ATK, you can Special Summon 1 Machine monster from your hand. If a monster(s) in your possession is destroyed by card effect, while this card is in your GY (except during the Damage Step): You can banish this card; destroy 1 card on the field. You can only use each effect of "Gray Layer" once per turn.
  de: |-
    Du kannst diese Karte als Tribut anbieten und dann 1 Maschine-Monster in deiner Hand vorzeigen; füge deiner Hand 1 Maschine-Monster mit einer unterschiedlichen Eigenschaft von deinem Deck hinzu, dann, falls du ein Monster mit 1200 oder weniger ATK hinzugefügt hast, kannst du 1 Maschine-Monster als Spezialbeschwörung von deiner Hand beschwören. Falls ein oder mehr Monster, die dir gehören, durch einen Karteneffekt zerstört werden, solange sich diese Karte in deinem Friedhof befindet (außer während des Damage Steps): Du kannst diese Karte verbannen; zerstöre 1 Karte auf dem Spielfeld. Du kannst jeden Effekt von „Gray Layer“ nur einmal pro Spielzug verwenden.
  es: |-
    Puedes Sacrificar esta carta, y después muestra 1 monstruo Máquina en tu mano; añade a tu mano 1 monstruo Máquina con un Atributo diferente en tu Deck y después, si añadiste un monstruo con 1200 ATK o menos, puedes Invocar de Modo Especial 1 monstruo Máquina desde tu mano. Si uno o más monstruos en tu posesión son destruidos por el efecto de una carta, mientras esta carta está en tu Cementerio (excepto durante el Damage Step): puedes desterrar esta carta; destruye 1 carta en el Campo. Sólo puedes usar cada efecto de "Gray Layer" una vez por turno.
  fr: |-
    Vous pouvez Sacrifier cette carte, puis révélez 1 monstre Machine dans votre main ; ajoutez 1 monstre Machine d'Attribut différent depuis votre Deck à votre main, puis si vous avez ajouté un monstre avec max. 1200 ATK, vous pouvez Invoquer Spécialement 1 monstre Machine depuis votre main. Si un ou plusieurs monstres en votre possession sont détruits par un effet de carte, tant que cette carte est dans votre Cimetière (sauf durant la Damage Step) : vous pouvez bannir cette carte ; détruisez 1 carte sur le Terrain. Vous ne pouvez utiliser chaque effet de "Gray Layer" qu'une fois par tour.
  it: |-
    Puoi offrire come Tributo questa carta, poi rivelare 1 mostro Macchina nella tua mano; aggiungi 1 mostro Macchina con un Attributo diverso dal tuo Deck alla tua mano, poi se hai aggiunto un mostro con ATK 1200 o inferiore, puoi Evocare Specialmente 1 mostro Macchina dalla tua mano. Se uno o più mostri sotto il tuo comando vengono distrutti dall'effetto di una carta, mentre questa carta è nel tuo Cimitero (eccetto durante il Damage Step): puoi bandire questa carta; distruggi 1 carta sul Terreno. Puoi utilizzare ogni effetto di "Gray Layer" una sola volta per turno.
  pt: |-
    Você pode oferecer este card como Tributo e, depois, revele 1 monstro Máquina na sua mão; adicione 1 monstro Máquina com um Atributo diferente do seu Deck à sua mão e, depois, se você adicionou um monstro com 1200 ou menos de ATK, você pode Invocar por Invocação-Especial 1 monstro Máquina da sua mão. Se um ou mais monstros em sua posse forem destruídos por um efeito de card, enquanto este card estiver no seu Cemitério (exceto durante a Etapa de Dano): você pode banir este card; destrua 1 card no campo. Você só pode usar cada efeito de "Gray Layer" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードをリリースし、手札の機械族モンスター１体を相手に見せて発動できる。見せたモンスターとは属性が異なる機械族モンスター１体をデッキから手札に加える。この効果で攻撃力１２００以下のモンスターを手札に加えた場合、さらに手札から機械族モンスター１体を特殊召喚できる。②：このカードが墓地に存在する状態で、自分のモンスターが効果で破壊された場合、このカードを除外して発動できる。フィールドのカード１枚を破壊する。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：解放此卡，向对手出示手牌的1只机械族怪兽可以发动。从牌组将1只属性与所出示怪兽不同的机械族怪兽加入手牌。以此效果将攻击力1200以下的怪兽加入了手牌的情况下，进而可从手牌将1只机械族怪兽特殊召唤。②：此卡存在于墓地的状态下，自己的怪兽因效果被破坏的情况下，将此卡除外可以发动。将场上的1张卡破坏。
