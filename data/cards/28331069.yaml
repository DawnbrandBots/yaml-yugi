text:
  en: |-
    3 Level 8 monsters
    Once per turn, you can also Xyz Summon "Neo Galaxy-Eyes Photon Dragon - Photon Howling" by using 1 Rank 8 Xyz Monster you control (transfer its materials). If this card is Xyz Summoned: You can take 1 "Photon" monster from your Deck, and either Special Summon it in Defense Position or attach it to this card as material. (Quick Effect): You can detach 3 materials from this card; Tribute 1 other Xyz Monster, and if you do, negate the effects of all other face-up cards currently on the field until the end of this turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    レベル８モンスター×３
    「超銀河眼の光子龍－フォトン・ハウリング」は１ターンに１度、自分フィールドのランク８のＸモンスターの上に重ねてＸ召喚する事もできる。①：このカードがＸ召喚した場合に発動できる。デッキから「フォトン」モンスター１体を選び、守備表示で特殊召喚するか、このカードのＸ素材にする。②：自分・相手ターンに、このカードのＸ素材を３つ取り除いて発動できる。自分フィールドの他のＸモンスター１体をリリースし、このカード以外のフィールドの全ての表側表示カードの効果はターン終了時まで無効化される。
  ko: |-
    레벨 8 몬스터 × 3
    "네오 갤럭시아이즈 포톤 드래곤－포톤 하울링"은 1턴에 1번, 자신 필드의 랭크 8 인 엑시즈 몬스터 위에 겹쳐 엑시즈 소환할 수도 있다. ①: 이 카드를 엑시즈 소환했을 경우에 발동할 수 있다. 덱에서 "포톤" 몬스터 1장을 고르고, 수비 표시로 특수 소환하거나, 이 카드의 엑시즈 소재로 한다. ②: 자신 / 상대 턴에, 이 카드의 엑시즈 소재를 3개 제거하고 발동할 수 있다. 자신 필드의 다른 엑시즈 몬스터 1장을 릴리스하고, 이 카드 이외의 필드의 모든 앞면 표시 카드의 효과는 턴 종료시까지 무효화된다.
  zh-TW:
  zh-CN: |-
    等级8怪兽×3
    “超银河眼光子龙－光子咆哮”1回合1次，也可重叠在自己场上的阶级8的超量怪兽上面来超量召唤。①：此卡超量召唤的情况下可以发动。从牌组挑选1只“光子”怪兽，以守备表示特殊召唤，或作为此卡的超量素材。②：在自己・对手回合中，去除此卡的3个超量素材可以发动。解放自己场上1只其他的超量怪兽，此卡以外的、场上所有表侧表示的卡的效果直至回合结束时为止无效化。
