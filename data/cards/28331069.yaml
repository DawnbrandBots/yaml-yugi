  ja: |-
    レベル８モンスター×３
    「超銀河眼の光子龍－フォトン・ハウリング」は１ターンに１度、自分フィールドのランク８のＸモンスターの上に重ねてＸ召喚する事もできる。①：このカードがＸ召喚した場合に発動できる。デッキから「フォトン」モンスター１体を選び、守備表示で特殊召喚するか、このカードのＸ素材にする。②：自分・相手ターンに、このカードのＸ素材を３つ取り除いて発動できる。自分フィールドの他のＸモンスター１体をリリースし、このカード以外のフィールドの全ての表側表示カードの効果はターン終了時まで無効化される。
