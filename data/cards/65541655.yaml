text:
  en: |-
    2 Tuners + 1 non-Tuner
    Must be either Synchro Summoned, or Special Summoned (from your Extra Deck) by banishing 2 Tuners and 1 "Red Dragon Archfiend" from your GY. If this card is Special Summoned: You can add 1 card from your GY to your hand, and if you do, this card gains 2000 ATK. You can only use this effect of "Red Nova Dragon - Burning Soul" once per Duel, and only during a Duel you Synchro Summoned "Red Dragon Archfiend". Cannot be destroyed by card effects.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    チューナー２体＋チューナー以外のモンスター１体
    このカードはＳ召喚及び以下の方法でのみ特殊召喚できる。●自分の墓地からチューナー２体と「レッド・デーモンズ・ドラゴン」１体を除外した場合にＥＸデッキから特殊召喚できる。このカード名の①の効果は自分が「レッド・デーモンズ・ドラゴン」をＳ召喚したデュエル中に１度だけ使用できる。①：このカードが特殊召喚した場合に発動できる。自分の墓地からカード１枚を手札に加え、このカードの攻撃力は２０００アップする。②：フィールドのこのカードは効果では破壊されない。
  ko:
  zh-TW:
  zh-CN: |-
    协调2只＋协调以外的怪兽1只
    此卡仅可通过同步召唤及以下方法特殊召唤。●从自己墓地将2只协调和1只“暗红恶魔龙”除外的情况下，可从额外牌组特殊召唤。此卡名的①效果在决斗中仅可使用1次，且仅可在自己同步召唤过“暗红恶魔龙”的决斗中使用。①：此卡特殊召唤的情况下可以发动。从自己墓地将1张卡加入手牌，此卡的攻击力上升2000。②：场上的此卡不会因效果被破坏。
