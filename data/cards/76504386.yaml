  ja: |-
    レベル４モンスター×２
    ①：このカードは「Ｎｏ．」モンスター以外のモンスターとの戦闘では破壊されない。②：自分・相手ターンに、このカードのＸ素材を１つ取り除き、自分フィールドのモンスター１体を対象として発動できる。そのモンスターはこのターンに１度だけ戦闘・効果では破壊されない。③：このターンの２回目の攻撃宣言時に発動できる。このカードは攻撃力が２５００アップし、以下の効果を得る。●このカードが戦闘でモンスターを破壊し墓地へ送った時に発動できる。そのモンスターを自分フィールドに特殊召喚する。
  ko:
  zh-TW:
  zh-CN: |-
    等级4怪兽×2
    ①：此卡不会因与“编号”怪兽以外的怪兽的战斗被破坏。②：在自己・对手回合中，去除此卡的1个超量素材，以自己场上的1只怪兽为对象可以发动。该怪兽在此回合仅1次，不会因战斗・效果被破坏。③：此回合的第2次攻击宣言时可以发动。此卡的攻击力上升2500，获得以下效果。●此卡战斗破坏怪兽并将其送至墓地时可以发动。将该怪兽特殊召唤至自己场上。
