  ja: |-
    このカード名のカードは１ターンに１枚しか発動できない。①：以下の効果から１つを選択して発動できる。
    ●相手フィールドの表側表示の魔法カードを全て破壊する。
    ●相手フィールドの表側表示モンスター１体を対象として発動できる。自分の手札・墓地の「光と闇の儀式」１枚を選び、お互いに確認する。その後、対象のモンスターの攻撃力は０になり、効果は無効化される。
    ②：このカードが相手によって破壊された場合に発動できる。相手の手札・フィールドのカード１枚を破壊する（手札からはランダムに選ぶ）。
