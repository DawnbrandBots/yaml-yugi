name:
  en: Penetration Fusion
  de: Durchdringungsfusion
  es: Fusión de Entrada
  fr: Fusion Perçante
  it: Fusione Penetrazione
  pt: Fusão de Penetração
  ja: ペネトレーション・フュージョン
  ja_romaji: Penetorēshon Fyūjon
  ko: 페니트레이션 퓨전
  ko_rr:
  zh-TW:
  zh-CN: 贯穿结合
text:
  en: |-
    If a monster(s) was destroyed by battle this turn: Fusion Summon 1 Fusion Monster from your Extra Deck, using monsters from your hand or field, and if you do, it gains this effect.
    ● (Quick Effect): You can Tribute this card, then target 1 face-up monster you control; it gains 500 ATK.
    You can only activate 1 "Penetration Fusion" per turn.
  de: |-
    Falls ein oder mehr Monster in diesem Spielzug durch Kampf zerstört wurden: Beschwöre 1 Fusionsmonster als Fusionsbeschwörung von deinem Extra Deck, indem du Monster von deiner Hand oder Spielfeldseite verwendest, und falls du dies tust, erhält es diesen Effekt.
    ● (Schnelleffekt): Du kannst diese Karte als Tribut anbieten und dann 1 offenes Monster wählen, das du kontrollierst; es erhält 500 ATK.
    Du kannst nur 1 „Durchdringungsfusion“ pro Spielzug aktivieren.
  es: |-
    Si uno o más monstruos fueron destruidos en batalla este turno: Invoca por Fusión 1 Monstruo de Fusión desde tu Deck Extra, usando monstruos en tu mano o Campo y, si lo haces, éste gana este efecto.
    ● (Efecto Rápido): puedes Sacrificar esta carta, y después seleccionar 1 monstruo boca arriba que controles; éste gana 500 ATK.
    Sólo puedes activar 1 "Fusión de Entrada" por turno.
  fr: |-
    Ce tour, si un ou plusieurs monstres ont été détruits au combat : Invoquez par Fusion 1 Monstre Fusion depuis votre Extra Deck, en utilisant des monstres depuis votre main ou Terrain, et si vous le faites, il gagne cet effet.
    ● (Effet Rapide) : vous pouvez Sacrifier cette carte, puis ciblez 1 monstre face recto que vous contrôlez ; il gagne 500 ATK.
    Vous ne pouvez activer qu'1 "Fusion Perçante" par tour.
  it: |-
    Se uno o più mostri sono stati distrutti in battaglia in questo turno: Evoca tramite Fusione 1 Mostro Fusione dal tuo Extra Deck, utilizzando mostri dalla tua mano o Terreno e, se lo fai, esso guadagna questo effetto.
    ● (Effetto Rapido): puoi offrire come Tributo questa carta, poi scegliere come bersaglio 1 mostro scoperto che controlli; esso guadagna 500 ATK.
    Puoi attivare solo 1 "Fusione Penetrazione" per turno.
  pt: |-
    Se um ou mais monstros foram destruídos em batalha neste turno: Invoque por Invocação-Fusão 1 Monstro de Fusão do seu Deck Adicional, usando monstros da sua mão ou do campo e, se isso acontecer, ele ganha este efeito.
    ● (Efeito Rápido): você pode oferecer este card como Tributo e, depois, escolha 1 monstro com a face para cima que você controla; ele ganha 500 de ATK.
    Você só pode ativar 1 "Fusão de Penetração" por turno.
  ja: |-
    このカード名のカードは１ターンに１枚しか発動できない。①：モンスターが戦闘で破壊されたターンに発動できる。自分の手札・フィールドのモンスターを融合素材とし、融合モンスター１体を融合召喚する。この効果で特殊召喚したモンスターは以下の効果を得る。●自分・相手ターンに、このカードをリリースし、自分フィールドの表側表示モンスター１体を対象として発動できる。そのモンスターの攻撃力は５００アップする。
  ko: |-
    이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다. ①: 몬스터가 전투로 파괴된 턴에 발동할 수 있다. 자신의 패 / 필드의 몬스터를 융합 소재로 하고, 융합 몬스터 1장을 융합 소환한다. 이 효과로 특수 소환한 몬스터는 이하의 효과를 얻는다. ●자신 / 상대 턴에, 이 카드를 릴리스하고, 자신 필드의 앞면 표시 몬스터 1장을 대상으로 하여 발동할 수 있다. 그 몬스터의 공격력은 500 올린다.
  zh-TW:
  zh-CN: |-
    此卡名的卡1回合仅可发动1张。①：有怪兽因战斗被破坏的回合可以发动。将自己手牌・场上的怪兽作为融合素材，将1只融合怪兽融合召唤。以此效果特殊召唤的怪兽获得以下效果。
    ●在自己・对手回合中，解放此卡，以自己场上的1只表侧表示怪兽为对象可以发动。该怪兽的攻击力上升500。
