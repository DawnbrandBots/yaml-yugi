text:
  en: |-
    If you have an "Aleister" monster in your field or GY: You can Special Summon this card from your hand. If this card is Special Summoned: You can Set 1 "Invocation", or 1 Spell that mentions it, from your Deck. When your opponent activates a card or effect in response to the activation of your Fusion Monster's effect (Quick Effect): You can banish this card from the field, and if you do, negate that opponent's effect, and if you do that, banish that card. You can only use each effect of "Virakam the Artificial Spirit" once per turn.
