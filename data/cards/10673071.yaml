text:
  en: |-
    If you have an "Aleister" monster in your field or GY: You can Special Summon this card from your hand. If this card is Special Summoned: You can Set 1 "Invocation", or 1 Spell that mentions it, from your Deck. When your opponent activates a card or effect in response to your Fusion Monster's effect activation (Quick Effect): You can banish this card you control, and if you do, negate that opponent's effect, and if you do that, banish it. You can only use each effect of "Virakam, the Divine Spirit of Artifice" once per turn.
  de: |-
    Falls du ein „Aleister“-Monster auf deiner Spielfeldseite oder in deinem Friedhof hast: Du kannst diese Karte als Spezialbeschwörung von deiner Hand beschwören. Falls diese Karte als Spezialbeschwörung beschworen wird: Du kannst 1 „Beschwörung“ oder 1 Zauber, der sie erwähnt, von deinem Deck setzen. Wenn dein Gegner eine Karte oder einen Effekt als Reaktion auf die Effektaktivierung deines Fusionsmonsters aktiviert (Schnelleffekt): Du kannst diese Karte verbannen, die du kontrollierst, und falls du dies tust, annulliere jenen Effekt des Gegners und falls du dies tust, verbanne sie. Du kannst jeden Effekt von „Virakam, der göttliche Geist der Kunstfertigkeit“ nur einmal pro Spielzug verwenden.
  es: |-
    Si tienes un monstruo "Aleister" en tu Campo o Cementerio: puedes Invocar esta carta de Modo Especial desde tu mano. Si esta carta es Invocada de Modo Especial: puedes Colocar, desde tu Deck, 1 "Invokación" o 1 Mágica que lo mencione. Cuando tu adversario activa una carta o efecto en respuesta a la activación del efecto de tu Monstruo de Fusión (Efecto Rápido): puedes desterrar esta carta que controlas y, si lo haces, niega ese efecto del adversario y, si haces eso, destiérralo. Sólo puedes usar cada efecto de "Virakam, el Espíritu Divino de Artificio" una vez por turno.
  fr: |-
    Si vous avez un monstre "Aleister" dans votre Terrain ou Cimetière : vous pouvez Invoquer Spécialement cette carte depuis votre main. Si cette carte est Invoquée Spécialement : vous pouvez Poser 1 "Invokhation" ou 1 Magie qui le mentionne depuis votre Deck. Lorsque votre adversaire active une carte ou un effet en réponse à l'activation d'effet de votre Monstre Fusion (Effet Rapide) : vous pouvez bannir cette carte que vous contrôlez, et si vous le faites, annulez l'effet de l'adversaire, et si vous faites ça, bannissez-la. Vous ne pouvez utiliser chaque effet de "Virakam, l'Esprit Divin de l'Artifice" qu'une fois par tour.
  it: |-
    Se hai un mostro "Aleister" nel tuo Terreno o Cimitero: puoi Evocare Specialmente questa carta dalla tua mano. Se questa carta viene Evocata Specialmente: puoi Posizionare 1 "Invokazione", o 1 Magia che la menziona, dal tuo Deck. Quando il tuo avversario attiva una carta o un effetto in risposta all'attivazione dell'effetto di un tuo Mostro Fusione (Effetto Rapido): puoi bandire questa carta che controlli e, se lo fai, annulla quell'effetto dell'avversario e, se fai quello, bandiscila. Puoi utilizzare ogni effetto di "Virakam, lo Spirito Divino dell'Artificio" una sola volta per turno.
  pt: |-
    Se você tiver um monstro "Aleister" no seu campo ou Cemitério: você pode Invocar este card por Invocação-Especial da sua mão. Se este card for Invocado por Invocação-Especial: você pode Baixar 1 "Invokação", ou 1 Magia que o mencione, do seu Deck. Quando seu oponente ativar um card ou efeito em resposta à ativação de um efeito de um Monstro de Fusão seu (Efeito Rápido): você pode banir este card que você controla e, se isso acontecer, negue esse efeito do oponente e, se isso acontecer, bana-o. Você só pode usar cada efeito de "Virakam, o Espírito Divino do Artifício" uma vez por turno.
  ja: |-
    このカード名の①②③の効果はそれぞれ１ターンに１度しか使用できない。①：自分のフィールドか墓地に「アレイスター」モンスターが存在する場合に発動できる。このカードを手札から特殊召喚する。②：このカードが特殊召喚した場合に発動できる。「召喚魔術」またはそのカード名が記された魔法カード１枚をデッキから自分フィールドにセットする。③：自分の融合モンスターの効果の発動にチェーンして、相手がカードの効果を発動した時に発動できる。フィールドのこのカードを除外し、その相手の効果を無効にし除外する。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②③效果1回合仅可各使用1次。①：自己场上或墓地存在“阿莱斯特”怪兽的情况下可以发动。从手牌将此卡特殊召唤。②：此卡特殊召唤的情况下可以发动。从牌组将1张“召唤魔术”或记载有该卡名的魔法卡放置在自己场上。③：对手连锁自己的融合怪兽的效果的发动，来发动卡的效果时可以发动。将场上的此卡除外，将该对手的效果无效并除外。
