text:
  en: |-
    You can activate this card the turn it was Set, by revealing 1 other face-down Trap you control. When a Spell/Trap Card is activated: You can activate 1 of these effects;
    ● Pay 1500 LP; negate the activation, and if you do, destroy it, and if you do that, neither player can activate cards, or the effects of cards, with the same original name as that destroyed card for the rest of this turn.
    ● Pay 3000 LP; negate the activation, and if you do, banish it, then your opponent banishes all cards from their hand and Deck with the same original name as that banished card.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカードは自分フィールドの他の裏側表示の罠カード１枚を相手に見せ、セットしたターンに発動する事もできる。①：魔法・罠カードが発動した時、以下から１つを選択して発動できる。●１５００ＬＰを払って発動できる。その発動を無効にし破壊する。このターン、破壊したそのカード及びそのカードと元々のカード名が同じカードの効果をお互いに発動できない。●３０００ＬＰを払って発動できる。その発動を無効にし除外する。その後、相手はこの効果で除外したカードと元々のカード名が同じカードを自身の手札・デッキから全て除外する。
  ko: |-
    이 카드는 자신 필드의 다른 뒷면 표시의 함정 카드 1장을 상대에게 보여주고, 세트한 턴에 발동할 수도 있다. ①: 마법 / 함정 카드가 발동했을 때, 이하에서 1개를 선택하고 발동할 수 있다. ●1500 LP를 지불하고 발동할 수 있다. 그 발동을 무효로 하고 파괴한다. 이 턴에, 파괴한 그 카드 및 그 카드와 원래의 카드명이 같은 카드의 효과를 서로 발동할 수 없다. ●3000 LP를 지불하고 발동할 수 있다. 그 발동을 무효로 하고 제외한다. 그 후, 상대는 이 효과로 제외한 카드와 원래의 카드명이 같은 카드를 자신의 패 / 덱에서 전부 제외한다.
  zh-TW:
  zh-CN: |-
    此卡也可通过将自己场上的1张其他里侧表示陷阱卡出示给对手，来在放置的回合发动。①：魔法・陷阱卡发动时，可从以下效果中选择1个发动。
    ●支付1500LP可以发动。将该发动无效并破坏。此回合，双方不可发动所破坏的卡及与该卡原本卡名相同的卡的效果。
    ●支付3000LP可以发动。将该发动无效并除外。然后，对手从自身手牌・牌组将与以此效果所除外的卡原本卡名相同的卡全部除外。
