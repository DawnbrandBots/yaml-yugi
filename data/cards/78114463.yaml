name:
  en: Solemn Accusation
  de: Feierliche Anschuldigung
  es: Acusación Solemne
  fr: Accusation Solennelle
  it: Accusa Solenne
  pt: Acusação Solene
  ja: <ruby>神<rt>かみ</rt></ruby>の<ruby>密<rt>みっ</rt></ruby><ruby>告<rt>こく</rt></ruby>
