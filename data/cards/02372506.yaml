  zh-CN: 混沌礼帽
text:
  en: |-
    When your opponent activates a monster effect, or a Normal Spell/Trap Card: Choose 3 Spells/Traps with different names from your Deck and 1 monster in your Main Monster Zone that mentions "Light and Darkness Ritual". Special Summon the Spells/Traps as Normal Monsters (Spellcaster/DARK/Level 8/ATK 0/DEF 0) in face-down Defense Position (their names become "Chaos Magical Hats" even while face-down), Set the chosen monster if it is face-up, and shuffle them on the field. Then your opponent's activated effect becomes "Destroy 1 monster your opponent controls in face-down Defense Position".
  de: |-
    Wenn dein Gegner einen Monstereffekt oder eine Normale Zauber-/Fallenkarte aktiviert: Bestimme 3 Zauber/Fallen mit unterschiedlichen Namen von deinem Deck und 1 Monster, das „Ritual von Licht und Finsternis“ erwähnt, in deiner Main-Monsterzone. Beschwöre die Zauber/Fallen als Spezialbeschwörung als Normale Monster (Hexer/FINSTERNIS/Stufe 8/ATK 0/DEF 0) in die verdeckte Verteidigungsposition (ihre Namen werden zu „Magische Chaoshüte“, selbst solange sie verdeckt sind), setze das bestimmte Monster, falls es offen liegt, und mische sie auf dem Spielfeld. Dann wird der aktivierte Effekt deines Gegners zu „Zerstöre 1 Monster in verdeckter Verteidigungsposition, das dein Gegner kontrolliert.“
  es: |-
    Cuando tu adversario activa un efecto de monstruo, o una Carta Mágica/de Trampa Normal: elige 3 Mágicas/Trampas con nombres diferentes en tu Deck y 1 monstruo en tu Zona de Monstruos Principal que mencione "Ritual de la Luz y la Oscuridad". Invoca de Modo Especial las Mágicas/Trampas como Monstruos Normales (Lanzador de Conjuros/OSCURIDAD/Nivel 8/ATK 0/DEF 0) en Posición de Defensa boca abajo (sus nombres se convierten en "Sombreros Mágicos del Caos" aun mientras estén boca abajo), Coloca el monstruo elegido si está boca arriba, y mézclalos en el Campo. Después el efecto activado de tu adversario se convierte en "Destruye 1 monstruo que controle tu adversario en Posición de Defensa boca abajo".
  fr: |-
    Lorsque votre adversaire active un effet de monstre ou une Carte Magie Normale/Piège Normal : choisissez 3 Magies/Pièges de noms différents depuis votre Deck et 1 monstre dans votre Zone Monstre Main qui mentionne "Rituel de la Lumière et des Ténèbres". Invoquez Spécialement les Magies/Pièges comme Monstres Normaux (Magicien/TÉNÈBRES/Niveau 8/ATK 0/DEF 0) en Position de Défense face verso (leur nom devient "Chapeaux Magiques du Chaos" même tant qu'ils sont face verso), Posez le monstre choisi s'il est face recto, et mélangez-les sur le Terrain. Puis l'effet activé de votre adversaire devient "Détruisez 1 monstre contrôlé par votre adversaire en Position de Défense face verso".
  it: |-
    Quando il tuo avversario attiva l'effetto di un mostro, o una Carta Magia/Trappola Normale: seleziona 3 Magie/Trappole con nomi diversi dal tuo Deck e 1 mostro nella tua Zona Mostri Main che menziona "Rituale di Luce e Oscurità". Evoca Specialmente le Magie/Trappole come Mostri Normali (Incantatore/OSCURITÀ/Livello 8/ATK 0/DEF 0) coperte in Posizione di Difesa (i loro nomi diventano "Cappelli Magici del Chaos" anche mentre sono coperte), Posiziona il mostro selezionato se è scoperto, e mischiali sul Terreno. Poi l'effetto attivato del tuo avversario diventa "Distruggi 1 mostro controllato dal tuo avversario coperto in Posizione di Difesa".
  pt: |-
    Quando seu oponente ativar um efeito de monstro, ou um Card de Magia/Armadilha Normal: selecione 3 Magias/Armadilhas com nomes diferentes do seu Deck e 1 monstro na sua Zona de Monstros Principal que mencione "Ritual da Luz e das Trevas". Invoque as Magias/Armadilhas por Invocação-Especial como Monstros Normais (Mago/TREVAS/Nível 8/ATK 0/DEF 0) com a face para baixo em Posição de Defesa (seus nomes se tornam "Cartolas Mágicas do Caos" mesmo enquanto estiverem com a face para baixo), Baixe o monstro selecionado se ele estiver com a face para cima e embaralhe-os no campo. Então, o efeito ativado do seu oponente se torna "Destrua 1 monstro que seu oponente controla com a face para baixo em Posição de Defesa".
  ja: |-
    ①：相手がモンスターの効果・通常魔法・通常罠カードを発動した時に発動できる。デッキからカード名が異なる魔法・罠カード３枚を、カード名を「カオスシルクハット」として扱う通常モンスター（魔法使い族・闇・星８・攻／守０）として、「光と闇の儀式」のカード名が記された自分のメインモンスターゾーンのモンスター１体と合わせてシャッフルして裏側守備表示でセットする。その後、その相手が発動した効果は「相手フィールドの裏側守備表示モンスター１体を破壊する」となる。
  ko:
  zh-TW:
  zh-CN: |-
    ①：对手发动怪兽的效果・通常魔法・通常陷阱卡时可以发动。从牌组将3张卡名不同的魔法・陷阱卡，视为卡名为“混沌礼帽”的通常怪兽（魔法师族・暗・星8・攻/守0），和自己主要怪兽区域的1只记载有“光与暗的仪式”卡名的怪兽一起洗牌并以里侧守备表示放置。然后，该对手发动的效果变为“将对手场上的1只里侧守备表示怪兽破坏”。
