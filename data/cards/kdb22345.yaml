text:
  en: |-
    If you control "Call of the Haunted" and this card is in your hand or GY: You can Special Summon this card. If this card is sent to the GY: You can target 1 "Call of the Haunted" in your GY; Set it. You can only use each effect of "Army of the Haunted" once per turn.
  de: |-
    Falls du „Ruf der Gejagten“ kontrollierst und sich diese Karte in deiner Hand oder deinem Friedhof befindet: Du kannst diese Karte als Spezialbeschwörung beschwören. Falls diese Karte auf den Friedhof gelegt wird: Du kannst 1 „Ruf der Gejagten“ in deinem Friedhof wählen; setze ihn. Du kannst jeden Effekt von „Armee der Gejagten“ nur einmal pro Spielzug verwenden.
  es: |-
    Si controlas "Llamada de los Condenados" y esta carta está en tu mano o Cementerio: puedes Invocar esta carta de Modo Especial. Si esta carta es mandada al Cementerio: puedes seleccionar 1 "Llamada de los Condenados" en tu Cementerio; Colócala. Sólo puedes usar cada efecto de "Ejército de los Condenados" una vez por turno.
  fr: |-
    Si vous contrôlez "Appel de l'Être Hanté" et que cette carte est dans votre main ou Cimetière : vous pouvez Invoquer Spécialement cette carte. Si cette carte est envoyée au Cimetière : vous pouvez cibler 1 "Appel de l'Être Hanté" dans votre Cimetière ; Posez-le. Vous ne pouvez utiliser chaque effet de "Armée de l'Être Hanté" qu'une fois par tour.
  it: |-
    Se controlli "Richiamo del Posseduto" e questa carta è nella tua mano o Cimitero: puoi Evocare Specialmente questa carta. Se questa carta viene mandata al Cimitero: puoi scegliere come bersaglio 1 "Richiamo del Posseduto" nel tuo Cimitero; Posizionalo. Puoi utilizzare ogni effetto di "Armata del Posseduto" una sola volta per turno.
  pt: |-
    Se você controlar "Chamado dos Assombrados" e este card estiver na sua mão ou no Cemitério: você pode Invocar este card por Invocação-Especial. Se este card for enviado para o Cemitério: você pode escolher 1 "Chamado dos Assombrados" no seu Cemitério; Baixe-o. Você só pode usar cada efeito de "Exército dos Assombrados" uma vez por turno.
