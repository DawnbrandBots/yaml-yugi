  zh-TW: 百臂無形手 馬基卜揶爾
  zh-CN: 百臂无形手 马基卜揶尔
text:
  en: |-
    If this card battles a monster, neither can be destroyed by that battle. You can only use each of the following effects of "Hecahands Mankibuel" once per turn. You can reveal this card in your hand; Fusion Summon 1 "Hecahands" Fusion Monster from your Extra Deck, using monsters from your hand or field, including this card in your hand. If an Illusion Fusion Monster(s) is sent to your GY, while this card is in your GY (except during the Damage Step): You can add this card to your hand.
  de: |-
    Falls diese Karte gegen ein Monster kämpft, können beide durch jenen Kampf nicht zerstört werden. Du kannst jeden der folgenden Effekte von „Hekahände Mankibuel“ nur einmal pro Spielzug verwenden. Du kannst diese Karte in deiner Hand vorzeigen; beschwöre 1 „Hekahände“-Fusionsmonster als Fusionsbeschwörung von deinem Extra Deck, indem du Monster von deiner Hand oder Spielfeldseite verwendest, darunter diese Karte von deiner Hand. Falls ein oder mehr Illusion-Fusionsmonster auf deinen Friedhof gelegt werden, solange sich diese Karte in deinem Friedhof befindet (außer während des Damage Steps): Du kannst diese Karte deiner Hand hinzufügen.
  es: |-
    Si esta carta batalla con un monstruo, ninguno puede ser destruido en esa batalla. Sólo puedes usar cada uno de los siguientes efectos de "Hecamanos Mankibuel" una vez por turno. Puedes mostrar esta carta en tu mano; Invoca por Fusión 1 Monstruo de Fusión "Hecamanos" desde tu Deck Extra, usando monstruos en tu mano o Campo, incluyendo esta carta en tu mano. Si uno o más Monstruos de Fusión Ilusión son mandados a tu Cementerio, mientras esta carta está en tu Cementerio (excepto durante el Damage Step): puedes añadir esta carta a tu mano.
  fr: |-
    Si cette carte combat un monstre, aucun de ces 2 monstres ne peut être détruit par ce combat. Vous ne pouvez utiliser chacun des effets suivants de "Hécamains Mankibuel" qu'une fois par tour. Vous pouvez révéler cette carte dans votre main ; Invoquez par Fusion 1 Monstre Fusion "Hécamains" depuis votre Extra Deck, en utilisant des monstres (cette carte dans votre main incluse) depuis votre main ou Terrain. Si un ou plusieurs Monstres Fusion Illusion sont envoyés à votre Cimetière, tant que cette carte est dans votre Cimetière (sauf durant la Damage Step) : vous pouvez ajouter cette carte à votre main.
  it: |-
    Se questa carta combatte con un mostro, nessuno dei due può essere distrutto in quella battaglia. Puoi utilizzare ognuno dei seguenti effetti di "Hecamani Mankibuel" una sola volta per turno. Puoi rivelare questa carta nella tua mano; Evoca tramite Fusione 1 Mostro Fusione "Hecamani" dal tuo Extra Deck, utilizzando mostri dalla tua mano o Terreno, compresa questa carta nella tua mano. Se uno o più Mostri Fusione Illusione vengono mandati al tuo Cimitero, mentre questa carta è nel tuo Cimitero (eccetto durante il Damage Step): puoi aggiungere questa carta alla tua mano.
  pt: |-
    Se este card batalhar um monstro, nenhum dos dois pode ser destruído nessa batalha. Você só pode usar cada um dos seguintes efeitos de "Hecamãos Mankibuel" uma vez por turno. Você pode revelar este card na sua mão; Invoque por Invocação-Fusão 1 Monstro de Fusão "Hecamãos" do seu Deck Adicional, usando monstros da sua mão ou do campo, incluindo este card na sua mão. Se um ou mais Monstros de Fusão Ilusão forem enviados para o seu Cemitério, enquanto este card estiver no seu Cemitério (exceto durante a Etapa de Dano): você pode adicionar este card à sua mão.
  ja: |-
    このカード名の①③の効果はそれぞれ１ターンに１度しか使用できない。①：手札のこのカードを相手に見せて発動できる。手札のこのカードを含む自分の手札・フィールドのモンスターを融合素材とし、「ヘカトンケイル」融合モンスター１体を融合召喚する。②：このカードがモンスターと戦闘を行う場合、その２体はその戦闘では破壊されない。③：このカードが墓地に存在する状態で、幻想魔族の融合モンスターが自分の墓地へ送られた場合に発動できる。このカードを手札に加える。
  ko: |-
    이 카드명의 ①③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 패의 이 카드를 상대에게 보여주고 발동할 수 있다. 패의 이 카드를 포함하는 자신의 패 / 필드의 몬스터를 융합 소재로 하고, "헤카톤케일" 융합 몬스터 1장을 융합 소환한다. ②: 이 카드가 몬스터와 전투를 실행할 경우, 그 2장은 그 전투로는 파괴되지 않는다. ③: 이 카드가 묘지에 존재하는 상태에서, 환상마족 융합 몬스터가 자신 묘지로 보내졌을 경우에 발동할 수 있다. 이 카드를 패에 넣는다.
  zh-TW:
  zh-CN: |-
    此卡名的①③效果1回合仅可各使用1次。①：向对手出示手牌的此卡可以发动。将包含手牌的此卡在内的、自己手牌・场上的怪兽作为融合素材，将1只“百臂无形”融合怪兽融合召唤。②：此卡与怪兽进行战斗的情况下，该2只不会因该战斗被破坏。③：此卡存在于墓地的状态下，幻想魔族的融合怪兽被送至自己墓地的情况下可以发动。将此卡加入手牌。
