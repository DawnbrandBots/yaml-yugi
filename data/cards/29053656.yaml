text:
  en: |-
    1 Tuner + 1+ non-Tuners
    Gains ATK equal to the total original ATK of all other Synchro Monsters you control. You can only use each of the following effects of "Crimson Dragon Quetzacoatl" once per turn. If this card is Synchro Summoned: You can Special Summon as many Dragon Synchro Monsters from your GY as possible, also you cannot Special Summon for the rest of this turn. When your opponent activates a monster effect (Quick Effect): You can return 1 other Dragon Synchro Monster you control to the Extra Deck, and if you do, negate that activation.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    チューナー＋チューナー以外のモンスター１体以上
    このカード名の①③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードがＳ召喚した場合に発動できる。自分の墓地からドラゴン族Ｓモンスターを可能な限り特殊召喚する。このターン、自分はモンスターを特殊召喚できない。②：このカードの攻撃力は、自分フィールドの他のＳモンスターの元々の攻撃力の合計分アップする。③：相手がモンスターの効果を発動した時に発動できる。自分フィールドの他のドラゴン族Ｓモンスター１体をＥＸデッキに戻し、その発動を無効にする。
  ko: |-
    튜너 ＋ 튜너 이외의 몬스터 1장 이상
    이 카드명의 ①③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드를 싱크로 소환했을 경우에 발동할 수 있다. 자신 묘지에서 드래곤족 싱크로 몬스터를 가능한 한 특수 소환한다. 이 턴에, 자신은 몬스터를 특수 소환할 수 없다. ②: 이 카드의 공격력은, 자신 필드의 다른 싱크로 몬스터의 원래 공격력의 합계만큼 올린다. ③: 상대가 몬스터의 효과를 발동했을 때에 발동할 수 있다. 자신 필드의 다른 드래곤족 싱크로 몬스터 1장을 엑스트라 덱으로 되돌리고, 그 발동을 무효로 한다.
  zh-TW:
  zh-CN: |-
    协调＋协调以外的怪兽1只以上
    此卡名的①③效果1回合仅可各使用1次。①：此卡同步召唤的情况下可以发动。从自己墓地将龙族同步怪兽尽可能地特殊召唤。此回合，自己不可特殊召唤怪兽。②：此卡的攻击力上升相当于自己场上其他的同步怪兽原本攻击力的合计数值。③：对手发动怪兽的效果时可以发动。将自己场上的1只其他的龙族同步怪兽放回额外牌组，将该发动无效。
