  en: |-
    You can reveal this card and 1 Spell/Trap in your hand; neither player can activate cards or effects in response to the card or effect activation of a card with the same name as the revealed Spell/Trap until the end of the next turn. If this card is sent from the hand or field to the GY by Spell/Trap effect: You can Special Summon this card. If this card is Special Summoned from the GY: You can take control of the 1 monster your opponent controls with the highest ATK (your choice, if tied). You can only use each effect of "Phara, the Goddess of the Beginning" once per turn.
