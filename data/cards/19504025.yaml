text:
  en: |-
    Place 1 "Enneapolis" from your Deck or GY face-up in your Field Zone, or if you control "Enneapolis", you can negate the effects of face-up cards your opponent controls up to the number of cards in your Pendulum Zones instead. If your opponent activates a card or effect while this card is in your GY (except during the Damage Step): You can banish this card; change "Enneacraft" monsters you control to face-down Defense Position up to the number of cards in your Pendulum Zones. You can only activate 1 "Enneacraft Reset" per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名のカードは１ターンに１枚しか発動できない。①：自分のデッキ・墓地から「糾罪都市－エニアポリス」１枚を自分のフィールドゾーンに表側表示で置く。自分フィールドに「糾罪都市－エニアポリス」が存在する場合、代わりに自分のＰゾーンのカードの数まで相手フィールドの表側表示カードの効果を無効にできる。②：このカードが墓地に存在する状態で、相手がカードの効果を発動した場合、このカードを除外して発動できる。自分のＰゾーンのカードの数まで、自分フィールドの「糾罪巧」モンスターを裏側守備表示にする。
  ko: |-
    이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다. ①: 자신의 덱 / 묘지에서 "규죄도시－에니아폴리스" 1장을 자신의 필드 존에 앞면 표시로 놓는다. 자신 필드에 "규죄도시－에니아폴리스"가 존재할 경우, 대신에 자신의 펜듈럼 존의 카드의 수까지 상대 필드의 앞면 표시 카드의 효과를 무효로 할 수 있다. ②: 이 카드가 묘지에 존재하는 상태에서, 상대가 카드의 효과를 발동했을 경우, 이 카드를 제외하고 발동할 수 있다. 자신의 펜듈럼 존의 카드의 수까지, 자신 필드의 "에니아크래프트" 몬스터를 뒷면 수비 표시로 한다.
  zh-TW:
  zh-CN: |-
    此卡名的卡1回合仅可发动1张。①：从自己牌组・墓地将1张“纠罪都市”以表侧表示放在自己的场地区域。自己场上存在“纠罪都市”的情况下，作为代替可以自己灵摆区域的卡的数量为上限，将对手场上的表侧表示卡的效果无效。②：此卡存在于墓地的状态下，对手发动卡的效果的情况下，将此卡除外可以发动。以自己灵摆区域的卡的数量为上限，将自己场上的“纠罪巧”怪兽改成里侧守备表示。
