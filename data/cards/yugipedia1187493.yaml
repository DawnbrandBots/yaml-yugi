  zh-CN: |-
    兽族等级2怪兽×3只以上
    “梅尔菲教母・玛咪”1回合1次，也可重叠在自己场上的“梅尔菲・玛咪”上面来超量召唤。①：此卡特殊召唤的情况下可以发动。从自己牌组・墓地将1张“梅尔菲”魔法・陷阱卡加入手牌。②：此卡的攻击力上升相当于此卡持有的超量素材中“梅尔菲”怪兽的攻击力・守备力的合计数值。③：去除此卡的5个超量素材可以发动。将对手场上的卡全部放回手牌。
