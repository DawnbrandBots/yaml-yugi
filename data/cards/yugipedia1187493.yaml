text:
  en: |-
    3+ Level 2 Beast monsters
    Once per turn, you can also Xyz Summon "Melffy God Mommy" by using "Melffy Mommy" you control (transfer its materials). If this card is Special Summoned: You can add 1 "Melffy" Spell/Trap from your Deck or GY to your hand. Gains ATK equal to the combined ATK and DEF of all "Melffy" monsters attached to it. You can detach 5 materials from this card; return all cards your opponent controls to the hand.
