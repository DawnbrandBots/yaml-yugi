name:
  en: H.E.R.O. Flash!
  de: H.E.R.O.-Blitz!
  es: ¡Flash H.E.R.O.!
  fr: Flash H.E.R.O. !
  it: Lampo H.E.R.O.!
  pt: Lampejo H.E.R.O.!
  ja: <ruby>Ｈ<rt>エイチ</rt></ruby>・<ruby>Ｅ<rt>イー</rt></ruby>・<ruby>Ｒ<rt>アール</rt></ruby>・<ruby>Ｏ<rt>オー</rt></ruby> フラッシュ！
  ja_romaji: Eichi Ī Āru Ō Furasshu!
  ko: H·E·R·O 플래시!
  ko_rr:
  zh-TW:
  zh-CN: H・E・R・O 闪光！
text:
  en: |-
    Activate 1 of these effects;
    ● If your "Elemental HERO" monster attacks a Defense Position monster this turn, inflict piercing battle damage to your opponent.
    ● Target cards your opponent controls, up to the number of "Elemental HERO" monsters you control; destroy those cards.
    ● Add to your hand or Special Summon 1 "Elemental HERO" monster from your GY.
    ● "Elemental HERO" monsters can attack directly this turn.
    You can only activate 1 "H.E.R.O. Flash!" per turn.
  de: |-
    Aktiviere 1 dieser Effekte;
    ● Falls dein „Elementar-HELD“-Monster in diesem Spielzug ein Monster in Verteidigungsposition angreift, füge deinem Gegner durchschlagenden Kampfschaden zu.
    ● Wähle Karten, die dein Gegner kontrolliert, bis zur Anzahl der „Elementar-HELD“-Monster, die du kontrollierst; zerstöre jene Karten.
    ● Füge deiner Hand 1 „Elementar-HELD“-Monster von deinem Friedhof hinzu oder beschwöre es als Spezialbeschwörung.
    ● „Elementar-HELD“-Monster können in diesem Spielzug direkt angreifen.
    Du kannst nur 1 „H.E.R.O.-Blitz!“ pro Spielzug aktivieren.
  es: |-
    Activa 1 de estos efectos;
    ● Si tu monstruo "HÉROE Elemental" ataca a un monstruo en Posición de Defensa este turno, inflige daño de batalla de penetración a tu adversario.
    ● Selecciona cartas que controle tu adversario, hasta el número de monstruos "HÉROE Elemental" que controlas; destruye esas cartas.
    ● Añade a tu mano o Invoca de Modo Especial 1 monstruo "HÉROE Elemental" desde tu Cementerio.
    ● Los monstruos "HÉROE Elemental" pueden atacar directamente este turno.
    Sólo puedes activar 1 "¡Flash H.E.R.O.!" por turno.
  fr: |-
    Activez 1 de ces effets ;
    ● Si votre monstre "HÉROS Élémentaire" attaque un monstre en Position de Défense ce tour, infligez des dommages de combat perçants à votre adversaire.
    ● Ciblez un nombre de cartes contrôlées par votre adversaire, inférieur ou égal au nombre de monstres "HÉROS Élémentaire" que vous contrôlez ; détruisez ces cartes.
    ● Ajoutez à votre main ou Invoquez Spécialement 1 monstre "HÉROS Élémentaire" depuis votre Cimetière.
    ● Ce tour, les monstres "HÉROS Élémentaire" peuvent attaquer directement.
    Vous ne pouvez activer qu'1 "Flash H.E.R.O. !" par tour.
  it: |-
    Attiva 1 di questi effetti;
    ● Se un tuo mostro "EROE Elementale" attacca un mostro in Posizione di Difesa in questo turno, infliggi danno da combattimento perforante al tuo avversario.
    ● Scegli come bersaglio carte controllate dal tuo avversario, fino al numero di mostri "EROE Elementale" che controlli; distruggi quelle carte.
    ● Aggiungi alla tua mano o Evoca Specialmente 1 mostro "EROE Elementale" dal tuo Cimitero.
    ● I mostri "EROE Elementale" possono attaccare direttamente in questo turno.
    Puoi attivare solo 1 "Lampo H.E.R.O.!" per turno.
  pt: |-
    Ative 1 desses efeitos;
    ● Se um monstro "HERÓI do Elemento" seu atacar um monstro em Posição de Defesa neste turno, cause dano de batalha perfurante ao seu oponente.
    ● Escolha cards que seu oponente controla, até o número de monstros "HERÓI do Elemento" que você controla; destrua esses cards.
    ● Adicione à sua mão ou Invoque por Invocação-Especial 1 monstro "HERÓI do Elemento" do seu Cemitério.
    ● Monstros "HERÓI do Elemento" podem atacar diretamente neste turno.
    Você só pode ativar 1 "Lampejo H.E.R.O.!" por turno.
  ja: |-
    このカード名のカードは１ターンに１枚しか発動できない。①：以下から１つを選択して発動できる。●このターン中、自分の「Ｅ・ＨＥＲＯ」モンスターが守備表示モンスターを攻撃した場合、その守備力を攻撃力が超えた分だけ相手に戦闘ダメージを与える。●自分フィールドの「Ｅ・ＨＥＲＯ」モンスターの数まで、相手フィールドのカードを対象として発動できる。そのカードを破壊する。●自分の墓地から「Ｅ・ＨＥＲＯ」モンスター１体を選び、手札に加えるか特殊召喚する。●このターン中、「Ｅ・ＨＥＲＯ」モンスターは直接攻撃できる。
  ko: |-
    이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다. ①: 이하에서 1개를 선택하고 발동할 수 있다. ●이 턴 중에, 자신의 "엘리멘틀 히어로" 몬스터가 수비 표시 몬스터를 공격했을 경우, 그 수비력을 공격력이 넘은 만큼만 상대에게 전투 데미지를 준다. ●자신 필드의 "엘리멘틀 히어로" 몬스터의 수까지, 상대 필드의 카드를 대상으로 하고 발동할 수 있다. 그 카드를 파괴한다. ●자신 묘지에서 "엘리멘틀 히어로" 몬스터 1장을 고르고, 패에 넣거나 특수 소환한다. ●이 턴 중에, "엘리멘틀 히어로" 몬스터는 직접 공격할 수 있다.
  zh-TW:
  zh-CN: |-
    此卡名的卡1回合仅可发动1张。①：可从以下效果中选择1个发动。
    ●此回合中，自己的“元素－英雄”怪兽攻击守备表示怪兽的情况下，依攻击力超出该怪兽守备力的数值来给予对手战斗伤害。
    ●以自己场上的“元素－英雄”怪兽的数量为上限，以对手场上的卡为对象可以发动。将该卡破坏。
    ●从自己墓地挑选1只“元素－英雄”怪兽，加入手牌或特殊召唤。
    ●此回合中，“元素－英雄”怪兽可直接攻击。
