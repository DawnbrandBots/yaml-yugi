text:
  en: |-
    Activate 1 of these effects;
    ● If your "Elemental HERO" monster attacks a Defense Position monster this turn, inflict piercing battle damage to your opponent.
    ● Target cards your opponent controls up to the number of "Elemental HERO" monsters you control; destroy them.
    ● Add to your hand, or Special Summon, 1 "Elemental HERO" monster from your GY.
    ● "Elemental HERO" monsters can attack directly this turn.
    You can only activate 1 "H-E-R-O Flash!" per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名のカードは１ターンに１枚しか発動できない。①：以下から１つを選択して発動できる。●このターン中、自分の「Ｅ・ＨＥＲＯ」モンスターが守備表示モンスターを攻撃した場合、その守備力を攻撃力が超えた分だけ相手に戦闘ダメージを与える。●自分フィールドの「Ｅ・ＨＥＲＯ」モンスターの数まで、相手フィールドのカードを対象として発動できる。そのカードを破壊する。●自分の墓地から「Ｅ・ＨＥＲＯ」モンスター１体を選び、手札に加えるか特殊召喚する。●このターン中、「Ｅ・ＨＥＲＯ」モンスターは直接攻撃できる。
  ko: |-
    이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다. ①: 이하에서 1개를 선택하고 발동할 수 있다. ●이 턴 중에, 자신의 "엘리멘틀 히어로" 몬스터가 수비 표시 몬스터를 공격했을 경우, 그 수비력을 공격력이 넘은 만큼만 상대에게 전투 데미지를 준다. ●자신 필드의 "엘리멘틀 히어로" 몬스터의 수까지, 상대 필드의 카드를 대상으로 하고 발동할 수 있다. 그 카드를 파괴한다. ●자신 묘지에서 "엘리멘틀 히어로" 몬스터 1장을 고르고, 패에 넣거나 특수 소환한다. ●이 턴 중에, "엘리멘틀 히어로" 몬스터는 직접 공격할 수 있다.
  zh-TW:
  zh-CN: |-
    此卡名的卡1回合仅可发动1张。①：可从以下效果中选择1个发动。
    ●此回合中，自己的“元素－英雄”怪兽攻击守备表示怪兽的情况下，依攻击力超出该怪兽守备力的数值来给予对手战斗伤害。
    ●以自己场上的“元素－英雄”怪兽的数量为上限，以对手场上的卡为对象可以发动。将该卡破坏。
    ●从自己墓地挑选1只“元素－英雄”怪兽，加入手牌或特殊召唤。
    ●此回合中，“元素－英雄”怪兽可直接攻击。
