text:
  en: |-
    After this card is Normal or Special Summoned, you can Normal Summon 1 monster that mentions "Toon World" during your Main Phase this turn, in addition to your Normal Summon/Set (you can only gain this effect once per turn). This card is treated as a Toon monster while "Toon World" is on the field. Once per turn: You can add to your hand or place face-up on your field, 1 "Toon" Field or Continuous Spell from your Deck.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    ①：このカードが召喚・特殊召喚した時に適用する。このターン、自分は通常召喚に加えて１度だけ、自分メインフェイズに「トゥーン・ワールド」のカード名が記されたモンスター１体を召喚できる。②：フィールドに「トゥーン・ワールド」が存在する限り、このカードはトゥーンモンスターとして扱う。③：１ターンに１度、自分メインフェイズに発動できる。デッキから「トゥーン」フィールド・永続魔法カード１枚を選び、手札に加えるか自分フィールドに表側表示で置く。
  ko:
  zh-TW:
  zh-CN: |-
    ①：此卡召唤・特殊召唤时适用。此回合，自己在通常召唤之外，可在自己的主要阶段追加1次召唤1只记载有“卡通世界”卡名的怪兽。②：只要场上存在“卡通世界”，此卡就视为卡通怪兽。③：1回合1次，在自己的主要阶段可以发动。从牌组挑选1张“卡通”场地・永续魔法卡，加入手牌或以表侧表示放在自己场上。
