text:
  en: |-
    Fusion Summon 1 Dinosaur Fusion Monster from your Extra Deck using monsters from your hand or field. If your opponent controls a monster, you can also use 1 "GMX" monster in your Deck as material. During your Main Phase: You can banish this card from your GY; excavate the top cards of your Deck until you excavate a "GMX" card, add that "GMX" card to your hand, also shuffle the rest into the Deck. You can only use 1 "GMX 55th Experiment Report" effect per turn, and only once that turn.
  de: |-
    Beschwöre 1 Dinosaurier-Fusionsmonster als Fusionsbeschwörung von deinem Extra Deck, indem du Monster von deiner Hand oder Spielfeldseite verwendest. Falls dein Gegner ein Monster kontrolliert, kannst du auch 1 „GMX“-Monster von deinem Deck als Material verwenden. Während deiner Main Phase: Du kannst diese Karte von deinem Friedhof verbannen; grabe die obersten Karten deines Decks aus, bis du eine „GMX“-Karte ausgräbst, füge jene „GMX“-Karte deiner Hand hinzu, zusätzlich mische die restlichen ins Deck. Du kannst nur 1 Effekt von „55. GMX-Experimentbericht“ pro Spielzug verwenden und in jenem Spielzug nur einmal.
  es: |-
    Invoca por Fusión 1 Monstruo de Fusión Dinosaurio desde tu Deck Extra usando monstruos en tu mano o Campo. Si tu adversario controla un monstruo, también puedes usar 1 monstruo "GMX" en tu Deck como material. Durante tu Main Phase: puedes desterrar esta carta en tu Cementerio; excava las cartas de la parte superior de tu Deck hasta que excaves una carta "GMX", añade a tu mano esa carta "GMX", y además baraja el resto al Deck. Sólo puedes usar 1 efecto de "Informe del Experimento de GMX 55.º" por turno, y sólo una vez ese turno.
  fr: |-
    Invoquez par Fusion 1 Monstre Fusion Dinosaure depuis votre Extra Deck en utilisant des monstres depuis votre main ou Terrain. Si votre adversaire contrôle un monstre, vous pouvez aussi utiliser 1 monstre "GMX" dans votre Deck comme Matériel. Durant votre Main Phase : vous pouvez bannir cette carte depuis votre Cimetière ; dévoilez les cartes du dessus de votre Deck jusqu'à dévoiler une carte "GMX", ajoutez la carte "GMX" à votre main, et aussi, mélangez les cartes restantes dans le Deck. Vous ne pouvez utiliser qu'1 effet de "Rapport de l'Expérience 55 GMX" par tour, et uniquement une fois le tour.
  it: |-
    Evoca tramite Fusione 1 Mostro Fusione Dinosauro dal tuo Extra Deck utilizzando mostri dalla tua mano o Terreno. Se il tuo avversario controlla un mostro, puoi anche utilizzare 1 mostro "GMX" nel tuo Deck come materiale. Durante la tua Main Phase: puoi bandire questa carta dal tuo Cimitero; dissotterra carte dalla cima del tuo Deck fino a quando dissotterri una carta "GMX", aggiungi quella carta "GMX" alla tua mano, inoltre mischia il resto nel Deck. Puoi utilizzare solo 1 effetto di "GMX Rapporto Esperimento 55º" per turno, e solo una volta in quel turno.
  pt: |-
    Invoque por Invocação-Fusão 1 Monstro de Fusão Dinossauro do seu Deck Adicional usando monstros da sua mão ou do campo. Se seu oponente controlar um monstro, você também pode usar 1 monstro "GMX" no seu Deck como matéria. Durante sua Fase Principal: você pode banir este card do seu Cemitério; escave cards do topo do seu Deck até escavar um card "GMX", adicione esse card "GMX" à sua mão e, além disso, embaralhe o resto no Deck. Você só pode usar 1 efeito de "Relatório do Experimento 55º GMX" por turno e apenas uma vez por turno.
