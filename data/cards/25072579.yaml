  pt: Protótipo de Força Celeste - Ás - Amatsu
  ja: <ruby>試<rt>し</rt></ruby><ruby>号<rt>ごう</rt></ruby><ruby>閃<rt>せん</rt></ruby><ruby>刀<rt>とう</rt></ruby><ruby>姫<rt>き</rt></ruby>－アマツ
