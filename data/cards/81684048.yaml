  de: Pumpking, Gräbergeisterkönig
  es: Pumpking el Rey de los Fantasmas Lúgubres
  fr: Pumpking le Roi des Fantômes de la Tombe
  it: Pumpking il Re dei Tomba Fantasmi
  pt: Pumpking, o Rei dos Fantasmas do Túmulo
  ja: <ruby>墓<rt>はか</rt></ruby><ruby>場<rt>ば</rt></ruby>のゴースト<ruby>王<rt>おう</rt></ruby>－パンプキング－
