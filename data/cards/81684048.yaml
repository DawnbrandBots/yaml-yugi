  zh-TW:
  zh-CN: 墓场的鬼魂王－南瓜王－
text:
  en: |-
    You can reveal this card in your hand; Set 1 "Call of the Haunted" from your Deck or GY, and if you do, discard 1 card. That Set card can be activated this turn. If this card is Special Summoned: You can Special Summon 1 Level 6 Zombie monster from your Deck, except with 1950 ATK, also you cannot Special Summon from the hand or GY for the rest of this turn, except Zombie monsters. You can only use each effect of "Pumpking the King of Grave Ghosts" once per turn.
  de: |-
    Du kannst diese Karte in deiner Hand vorzeigen; setze 1 „Ruf der Gejagten“ von deinem Deck oder Friedhof und falls du dies tust, wirf 1 Karte ab. Jene gesetzte Karte kann in diesem Spielzug aktiviert werden. Falls diese Karte als Spezialbeschwörung beschworen wird: Du kannst 1 Zombie-Monster der Stufe 6 als Spezialbeschwörung von deinem Deck beschwören, außer mit 1950 ATK, zusätzlich kannst du für den Rest dieses Spielzugs keine Spezialbeschwörungen von der Hand oder vom Friedhof durchführen, außer von Zombie-Monstern. Du kannst jeden Effekt von „Pumpking, Gräbergeisterkönig“ nur einmal pro Spielzug verwenden.
  es: |-
    Puedes mostrar esta carta en tu mano; Coloca 1 "Llamada de los Condenados" desde tu Deck o Cementerio y, si lo haces, descarta 1 carta. Esa carta Colocada puede ser activada este turno. Si esta carta es Invocada de Modo Especial: puedes Invocar de Modo Especial, desde tu Deck, 1 monstruo Zombi de Nivel 6, excepto con 1950 ATK, y además no puedes Invocar de Modo Especial desde la mano o Cementerio por el resto de este turno, excepto monstruos Zombi. Sólo puedes usar cada efecto de "Pumpking el Rey de los Fantasmas Lúgubres" una vez por turno.
  fr: |-
    Vous pouvez révéler cette carte dans votre main ; Posez 1 "Appel de l'Être Hanté" depuis votre Deck ou Cimetière, et si vous le faites, défaussez 1 carte. Ce tour, la carte Posée peut être activée. Si cette carte est Invoquée Spécialement : vous pouvez Invoquer Spécialement 1 monstre Zombie de Niveau 6 (monstres avec 1950 ATK exclus) depuis votre Deck, et aussi, vous ne pouvez pas Invoquer Spécialement (monstres Zombie exclus) depuis la main ou Cimetière le reste de ce tour. Vous ne pouvez utiliser chaque effet de "Pumpking le Roi des Fantômes de la Tombe" qu'une fois par tour.
  it: |-
    Puoi rivelare questa carta nella tua mano; Posiziona 1 "Richiamo del Posseduto" dal tuo Deck o Cimitero e, se lo fai, scarta 1 carta. Quella carta Posizionata può essere attivata in questo turno. Se questa carta viene Evocata Specialmente: puoi Evocare Specialmente 1 mostro Zombie di Livello 6 dal tuo Deck, eccetto con 1950 ATK, inoltre non puoi Evocare Specialmente dalla mano o Cimitero per il resto di questo turno, eccetto mostri Zombie. Puoi utilizzare ogni effetto di "Pumpking il Re dei Tomba Fantasmi" una sola volta per turno.
  pt: |-
    Você pode revelar este card na sua mão; Baixe 1 "Chamado dos Assombrados" do seu Deck ou Cemitério e, se isso acontecer, descarte 1 card. Esse card Baixado pode ser ativado neste turno. Se este card for Invocado por Invocação-Especial: você pode Invocar por Invocação-Especial 1 monstro Zumbi de Nível 6 do seu Deck, exceto com 1950 de ATK e, além disso, você não pode Invocar por Invocação-Especial da mão ou do Cemitério pelo resto deste turno, exceto monstros Zumbi. Você só pode usar cada efeito de "Pumpking, o Rei dos Fantasmas do Túmulo" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：手札のこのカードを相手に見せて発動できる。自分のデッキ・墓地から「リビングデッドの呼び声」１枚を自分フィールドにセットし、自分の手札を１枚選んで捨てる。この効果でセットしたカードはセットしたターンでも発動できる。②：このカードが特殊召喚した場合に発動できる。デッキから攻撃力１９５０以外のアンデット族・レベル６モンスター１体を特殊召喚する。このターン、自分はアンデット族モンスターしか手札・墓地から特殊召喚できない。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：向对手出示手牌的此卡可以发动。从自己牌组・墓地将1张“活死人的呼唤”放置在自己场上，挑选自己的1张手牌舍弃。以此效果放置的卡在放置的回合也可以发动。②：此卡特殊召唤的情况下可以发动。从牌组将1只攻击力1950以外的不死族・等级6怪兽特殊召唤。此回合，自己从手牌・墓地仅可特殊召唤不死族怪兽。
