  en: |-
    You can send 3 face-up "Divine Abyss of the Sacred Beast" you control to the GY, including this card, then target 1 face-up monster your opponent controls; change it to face-down Defense Position. You can only use each of the following effects of "Divine Abyss of the Sacred Beast" once per turn. During the Main Phase: You can place 2 "Divine Abyss of the Sacred Beast" from your hand, Deck, and/or GY face-up on your field. During your opponent's End Phase, if this card is in your GY: You can place it on the bottom of the Deck.
