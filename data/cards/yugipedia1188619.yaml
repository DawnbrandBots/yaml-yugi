text:
  en: |-
    If you have a card in your Pendulum Zone and this card is in your hand: You can Special Summon this card. You can pay 1000 LP; destroy 1 Pendulum Monster Card in your hand or face-up field, then you can add 1 Pendulum Monster from your Deck to your face-up Extra Deck. You can only use each effect of "Shade the Obscure" once per turn.
  de: |-
    Falls du eine Karte in deiner Pendelzone hast und sich diese Karte in deiner Hand befindet: Du kannst diese Karte als Spezialbeschwörung beschwören. Du kannst 1000 LP zahlen; zerstöre 1 Pendelmonsterkarte in deiner Hand oder offen auf deiner Spielfeldseite, dann kannst du deinem Extra Deck 1 Pendelmonster von deinem Deck offen hinzufügen. Du kannst jeden Effekt von „Schatten der Unberühmte“ nur einmal pro Spielzug verwenden.
  es: |-
    Si tienes una carta en tu Zona de Péndulo y esta carta está en tu mano: puedes Invocar esta carta de Modo Especial. Puedes pagar 1000 LP; destruye 1 Carta de Monstruo de Péndulo en tu mano o Campo boca arriba, y después puedes añadir a tu Deck Extra boca arriba 1 Monstruo de Péndulo en tu Deck. Sólo puedes usar cada efecto de "Sombra el Oscuro" una vez por turno.
  fr: |-
    Si vous avez une carte dans votre Zone Pendule et que cette carte est dans votre main : vous pouvez Invoquer Spécialement cette carte. Vous pouvez payer 1000 LP ; détruisez 1 Carte Monstre Pendule dans votre main ou Terrain face recto, puis vous pouvez ajouter 1 Monstre Pendule depuis votre Deck à votre Extra Deck face recto. Vous ne pouvez utiliser chaque effet de "Ombre l'Obscur" qu'une fois par tour.
  it: |-
    Se hai una carta nella tua Zona Pendulum e questa carta è nella tua mano: puoi Evocare Specialmente questa carta. Puoi pagare 1000 LP; distruggi 1 Carta Mostro Pendulum nella tua mano o Terreno scoperto, poi puoi aggiungere 1 Mostro Pendulum dal tuo Deck al tuo Extra Deck scoperto. Puoi utilizzare ogni effetto di "Shade l'Oscuro" una sola volta per turno.
  pt: |-
    Se você tiver um card na sua Zona de Pêndulo e este card estiver na sua mão: você pode Invocar este card por Invocação-Especial. Você pode pagar 1000 PV; destrua 1 Card de Monstro Pêndulo na sua mão ou no campo com a face para cima e, depois, você pode adicionar 1 Monstro Pêndulo do seu Deck ao seu Deck Adicional com a face para cima. Você só pode usar cada efeito de "Sombra, o Obscuro" uma vez por turno.
