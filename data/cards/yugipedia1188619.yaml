pendulum_effect:
  en: |-
    You cannot Pendulum Summon, except Pendulum Monsters (this effect cannot be negated). If a monster(s) with 1000 ATK or less is Special Summoned (except during the Damage Step): You can return this card to the hand. You can only use this effect of "Shade the Obscure" once per turn.
  de: |-
    Du kannst keine Pendelbeschwörungen durchführen, außer von Pendelmonstern (dieser Effekt kann nicht annulliert werden). Falls ein oder mehr Monster mit 1000 oder weniger ATK als Spezialbeschwörung beschworen werden (außer während des Damage Steps): Du kannst diese Karte auf die Hand zurückgeben. Du kannst diesen Effekt von „Schatten der Unberühmte“ nur einmal pro Spielzug verwenden.
  es: |-
    No puedes Invocar por Péndulo, excepto Monstruos de Péndulo (este efecto no puede ser negado). Si uno o más monstruos con 1000 ATK o menos son Invocados de Modo Especial (excepto durante el Damage Step): puedes devolver esta carta a la mano. Sólo puedes usar este efecto de "Sombra el Oscuro" una vez por turno.
  fr: |-
    Vous ne pouvez pas Invoquer par Pendulation (Monstres Pendule exclus) (cet effet ne peut pas être annulé). Si un ou plusieurs monstres avec max. 1000 ATK sont Invoqués Spécialement (sauf durant la Damage Step) : vous pouvez renvoyer cette carte à la main. Vous ne pouvez utiliser cet effet de "Ombre l'Obscur" qu'une fois par tour.
  it: |-
    Non puoi Evocare Pendulum, eccetto Mostri Pendulum (questo effetto non può essere annullato). Se uno o più mostri con 1000 ATK o inferiore vengono Evocati Specialmente (eccetto durante il Damage Step): puoi far ritornare questa carta nella mano. Puoi utilizzare questo effetto di "Shade l'Oscuro" una sola volta per turno.
  pt: |-
    Você não pode Invocar por Invocação-Pêndulo, exceto Monstros Pêndulo (este efeito não pode ser negado). Se um ou mais monstros com 1000 ou menos de ATK forem Invocados por Invocação-Especial (exceto durante a Etapa de Dano): você pode devolver este card para a mão. Você só pode usar este efeito de "Sombra, o Obscuro" uma vez por turno.
