text:
  en: |-
    If this card is in your hand or GY: You can discard 1 other Spellcaster monster or 1 Spell/Trap; Special Summon this card, but banish it when it leaves the field. If this card is Normal or Special Summoned: You can banish 1 Level 4 Spellcaster monster from your Deck, and if you do, during the End Phase of this turn, add it to your hand or Special Summon it. You can only use each effect of "Misstic Call" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが手札・墓地に存在する場合、手札から他の魔法使い族モンスター１体か魔法・罠カード１枚を捨てて発動できる。このカードを特殊召喚する。この効果で特殊召喚したこのカードは、フィールドから離れた場合に除外される。②：このカードが召喚・特殊召喚した場合に発動できる。デッキから魔法使い族・レベル４モンスター１体を除外する。このターンのエンドフェイズに、除外したそのモンスターを手札に加えるか特殊召喚する。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：此卡存在于手牌・墓地的情况下，从手牌将1只其他的魔法师族怪兽或1张魔法・陷阱卡舍弃可以发动。将此卡特殊召唤。以此效果特殊召唤的此卡从场上离开的情况下将被除外。②：此卡召唤・特殊召唤的情况下可以发动。从牌组将1只魔法师族・等级4怪兽除外。在此回合的结束阶段，将所除外的该怪兽加入手牌或特殊召唤。
