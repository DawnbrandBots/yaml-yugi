text:
  en: |-
    Give control of 1 "Angelechy" monster you control to your opponent (until the End Phase), then if your opponent controls a face-up card(s) in its adjacent Monster Zones and/or Spell & Trap Zones, their effects are negated. You can banish this card from your GY; add 1 "Angelechy" Spell/Trap from your Deck to your hand, except "Angelechy Disturbance". You can only use each effect of "Angelechy Disturbance" once per turn.
  de: |-
    Übergib die Kontrolle über 1 „Engelechy“-Monster, das du kontrollierst, (bis zur End Phase) an deinen Gegner, dann, falls dein Gegner eine oder mehr offene Karten in seinen benachbarten Monsterzonen und/oder Zauber- & Fallenzonen kontrolliert, werden ihre Effekte annulliert. Du kannst diese Karte von deinem Friedhof verbannen; füge deiner Hand 1 „Engelechy“-Zauber/Falle von deinem Deck hinzu, außer „Engelechy-Störung“. Du kannst jeden Effekt von „Engelechy-Störung“ nur einmal pro Spielzug verwenden.
  es: |-
    Da a tu adversario el control de 1 monstruo "Angelequia" que controles (hasta la End Phase) y después, si tu adversario controla una o más cartas boca arriba en sus Zonas de Monstruos y/o Zonas de Magia y Trampas adyacentes, sus efectos son negados. Puedes desterrar esta carta en tu Cementerio; añade a tu mano 1 Mágica/Trampa "Angelequia" en tu Deck, excepto "Perturbación Angelequia". Sólo puedes usar cada efecto de "Perturbación Angelequia" una vez por turno.
  fr: |-
    Donnez le contrôle d'1 monstre "Angetélité" que vous contrôlez à votre adversaire (jusqu'à la End Phase), puis si votre adversaire contrôle une ou plusieurs cartes face recto dans ses Zones Monstres et/ou Zones Magie & Piège adjacentes, leurs effets sont annulés. Vous pouvez bannir cette carte depuis votre Cimetière ; ajoutez 1 Magie/Piège "Angetélité" ("Perturbation Angetélité" exclu) depuis votre Deck à votre main. Vous ne pouvez utiliser chaque effet de "Perturbation Angetélité" qu'une fois par tour.
  it: |-
    Dai il controllo di 1 mostro "Angelechy" che controlli al tuo avversario (fino alla End Phase), poi se il tuo avversario controlla una o più carte scoperte nelle sue Zone Mostri e/o Zone Magie & Trappole adiacenti, i loro effetti sono annullati. Puoi bandire questa carta dal tuo Cimitero; aggiungi 1 Magia/Trappola "Angelechy" dal tuo Deck alla tua mano, eccetto "Perturbazione Angelechy". Puoi utilizzare ogni effetto di "Perturbazione Angelechy" una sola volta per turno.
  pt: |-
    Conceda o controle de 1 monstro "Anjoléquia" que você controla ao seu oponente (até a Fase Final) e, depois, se seu oponente controlar um ou mais cards com a face para cima em suas Zonas de Monstros e/ou Zonas de Magias & Armadilhas adjacentes, seus efeitos são negados. Você pode banir este card do seu Cemitério; adicione 1 Magia/Armadilha "Anjoléquia" do seu Deck à sua mão, exceto "Distúrbio de Anjoléquia". Você só pode usar cada efeito de "Distúrbio de Anjoléquia" uma vez por turno.
