name:
  en: Commander Souza, Swordmaster
  de: Kommandant Souza, Schwertmeister
  es: Comandante Souza, Maestro de la Espada
  fr: Commandant Souza, Maître de l'Épée
  it: Comandante Souza, Spadaccino
  pt: Comandante Souza, Mestre da Espada
  ja: <ruby>総<rt>そう</rt></ruby><ruby>剣<rt>けん</rt></ruby><ruby>司<rt>し</rt></ruby><ruby>令<rt>れい</rt></ruby> ソウザ
  ja_romaji: Sōkenshirei Souza
  ko: 총검사령 소우저
  ko_rr:
  zh-TW: 總劍司令 索扎
  zh-CN: 总剑司令 索扎
text:
  en: |-
    1 Tuner + 1+ EARTH monsters
    (This card is always treated as an "X-Saber" card.)
    Gains 200 ATK for each banished monster. When this card destroys a monster by battle: You can draw 1 card. Once per turn, when your opponent activates a card or effect (Quick Effect): You can Tribute 1 "X-Saber" monster; destroy 1 card your opponent controls. If this card would be destroyed by battle or card effect, you can banish 1 "Saber" card from your GY instead.
  de: |-
    1 Empfänger + 1+ ERDE Monster
    (Diese Karte wird immer als „X-Säbel“-Karte behandelt.)
    Erhält für jedes verbannte Monster 200 ATK. Wenn diese Karte ein Monster durch Kampf zerstört: Du kannst 1 Karte ziehen. Einmal pro Spielzug, wenn dein Gegner eine Karte oder einen Effekt aktiviert (Schnelleffekt): Du kannst 1 „X-Säbel“-Monster als Tribut anbieten; zerstöre 1 Karte, die dein Gegner kontrolliert. Falls diese Karte durch Kampf oder einen Karteneffekt zerstört würde, kannst du stattdessen 1 „Säbel“-Karte von deinem Friedhof verbannen.
  es: |-
    1 Cantante + 1+ monstruos de TIERRA
    (Esta carta se trata siempre como una carta "Sable-X").
    Gana 200 ATK por cada monstruo desterrado. Cuando esta carta destruye un monstruo en batalla: puedes robar 1 carta. Una vez por turno, cuando tu adversario activa una carta o efecto (Efecto Rápido): puedes Sacrificar 1 monstruo "Sable-X"; destruye 1 carta que controle tu adversario. Si esta carta fuera a ser destruida en batalla o por el efecto de una carta, puedes desterrar 1 carta "Sable" en tu Cementerio en su lugar.
  fr: |-
    1 Syntoniseur + 1+ monstre TERRE
    (Cette carte est toujours traitée comme carte "Sabre X".)
    Gagne 200 ATK pour chaque monstre banni. Lorsque cette carte détruit un monstre au combat : vous pouvez piocher 1 carte. Une fois par tour, lorsque votre adversaire active une carte ou un effet (Effet Rapide) : vous pouvez Sacrifier 1 monstre "Sabre X" ; détruisez 1 carte contrôlée par votre adversaire. Si cette carte va être détruite au combat ou par un effet de carte, vous pouvez bannir 1 carte "Sabre" depuis votre Cimetière à la place.
  it: |-
    1 Tuner + 1+ mostri TERRA
    (Questa carta viene sempre considerata come una carta "Sciabola-X".)
    Guadagna 200 ATK per ogni mostro bandito. Quando questa carta distrugge un mostro in battaglia: puoi pescare 1 carta. Una volta per turno, quando il tuo avversario attiva una carta o un effetto (Effetto Rapido): puoi offrire come Tributo 1 mostro "Sciabola-X"; distruggi 1 carta controllata dal tuo avversario. Se questa carta sta per essere distrutta in battaglia o dall'effetto di una carta, puoi invece bandire 1 carta "Sciabola" dal tuo Cimitero.
  pt: |-
    1 Regulador + 1+ monstros de TERRA
    (Este card deve ser sempre considerado como um card "Sabre-X".)
    Ganha 200 de ATK para cada monstro banido. Quando este card destruir um monstro em batalha: você pode comprar 1 card. Uma vez por turno, quando seu oponente ativar um card ou efeito (Efeito Rápido): você pode oferecer como Tributo 1 monstro "Sabre-X"; destrua 1 card que seu oponente controla. Se este card seria destruído em batalha ou por um efeito de card, em vez disso, você pode banir 1 card "Sabre" do seu Cemitério.
  ja: |-
    チューナー＋地属性モンスター１体以上
    このカード名はルール上「Ｘ－セイバー」カードとしても扱う。①：このカードの攻撃力は、除外状態のモンスターの数×２００アップする。②：このカードが戦闘でモンスターを破壊した時に発動できる。自分は１枚ドローする。③：１ターンに１度、相手が効果を発動した時、自分フィールドの「Ｘ－セイバー」モンスター１体をリリースして発動できる。相手フィールドのカード１枚を破壊する。④：このカードが戦闘・効果で破壊される場合、代わりに自分の墓地の「セイバー」カード１枚を除外できる。
  ko: |-
    튜너 ＋ 땅 속성 몬스터 1장 이상
    이 카드명은 룰상 "X－세이버" 카드로도 취급한다. ①: 이 카드의 공격력은, 제외 상태인 몬스터의 수 × 200 올린다. ②: 이 카드가 전투로 몬스터를 파괴했을 때에 발동할 수 있다. 자신은 1장 드로우한다. ③: 1턴에 1번, 상대가 효과를 발동했을 때, 자신 필드의 "X－세이버" 몬스터 1장을 릴리스하고 발동할 수 있다. 상대 필드의 카드 1장을 파괴한다. ④: 이 카드가 전투 / 효과로 파괴될 경우, 대신에 자신 묘지의 "세이버" 카드 1장을 제외할 수 있다.
  zh-TW:
  zh-CN: |-
    协调＋地属性怪兽1只以上
    此卡名在规则上也视为“X－军刀”卡。①：此卡的攻击力上升除外状态的怪兽数量×200的数值。②：此卡战斗破坏怪兽时可以发动。自己抽1张。③：1回合1次，对手发动效果时，解放自己场上的1只“X－军刀”怪兽可以发动。将对手场上的1张卡破坏。④：此卡将被战斗・效果破坏的情况下，作为代替可将自己墓地的1张“军刀”卡除外。
