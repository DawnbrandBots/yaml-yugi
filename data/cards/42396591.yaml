    ①：自分・相手ターンに１度、このカードのＸ素材を１つ取り除き、相手フィールドのカード１枚を対象として発動できる。そのカードを破壊する。②：このカードが相手モンスターと戦闘を行うダメージ計算時に発動する。このカードの攻撃力・守備力はそのダメージ計算時のみ、その相手モンスターの攻撃力と守備力の内、高い方の数値＋１００になる。③：このカードが戦闘でモンスターを破壊した場合に発動する。相手の手札をランダムに１枚墓地へ送り、相手のＬＰを半分にする。
