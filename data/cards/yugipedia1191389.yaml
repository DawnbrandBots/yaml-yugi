  en: |-
    If you control a "Destiny HERO" monster or a face-up Field Spell: You can Special Summon this card from your hand, then you can destroy 1 card you control, and if you do, add 1 "Polymerization" from your Deck to your hand. If you Special Summon a Level 8 "Destiny HERO" monster(s): You can banish this card from your GY, then target 1 card your opponent controls; place it on top of the Deck. You can only use each effect of "Destiny HERO - Dreadnought Servant" once per turn.
