  ja: |-
    このカード名のカードは１ターンに１枚しか発動できない。①：以下の効果から１つを選択して発動できる。
    ●このカードは通常モンスター（水族・チューナー・水・星１・攻／守０）となり、モンスターゾーンに特殊召喚する（罠カードとしては扱わない）。その後、Ｓモンスター１体のＳ召喚を行う事ができる。
    ●相手が魔法・罠カードの効果を発動した時、相手フィールドに裏側表示カードが存在しなければ発動できる。その効果を無効にする。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的卡1回合仅可发动1张。①：可从以下效果中选择1个发动。
    ●此卡变为通常怪兽（水族・协调・水・星1・攻/守0），特殊召唤至怪兽区域（不视为陷阱卡）。然后，可进行1只同步怪兽的同步召唤。
    ●对手发动魔法・陷阱卡的效果时，如果对手场上不存在里侧表示卡则可以发动。将该效果无效。
