pendulum_scale: 1
pendulum_effect:
  en: |-
    You can negate a monster effect activated by your opponent in response to the activation of a "Power Patron" or "Artmage" monster effect, then destroy this card. You can only use this effect of "Nervedo the Shadebeast Power Patron" once per turn.
  de: |-
    Du kannst einen Monstereffekt annullieren, der von deinem Gegner als Reaktion auf die Aktivierung eines „Machtpatron“- oder „Kunstmagus“-Monstereffekts aktiviert wurde, dann zerstöre diese Karte. Du kannst diesen Effekt von „Nervedo der Schattenungeheuer-Machtpatron“ nur einmal pro Spielzug verwenden.
  es: |-
    Puedes negar un efecto de monstruo activado por tu adversario en respuesta a la activación de un efecto de monstruo "Modelo de Poder" o "Artmagia", y después destruye esta carta. Sólo puedes usar este efecto de "Nervedo la Bestia Sombra Modelo de Poder" una vez por turno.
  fr: |-
    Vous pouvez annuler un effet de monstre activé par votre adversaire en réponse à l'activation d'un effet de monstre "Mécène du Pouvoir" ou "Artmage", puis détruisez cette carte. Vous ne pouvez utiliser cet effet de "Nervedo le Mécène du Pouvoir de la Bête Obscure" qu'une fois par tour.
  it: |-
    Puoi annullare l'effetto di un mostro attivato dal tuo avversario in risposta all'attivazione dell'effetto di un mostro "Patrono Potente" o "Artmage", poi distruggere questa carta. Puoi utilizzare questo effetto di "Nervedo l'Ombrabestia Patrono Potente" una sola volta per turno.
  pt: |-
    Você pode negar um efeito de monstro ativado pelo seu oponente em resposta à ativação de um efeito de monstro "Patrono(a) do Poder" ou "Artmage" e, depois, destrua este card. Você só pode usar este efeito de "Nervedo, o Patrono do Poder Besta Sombria" uma vez por turno.
  ja: |-
    このカード名のＰ効果は１ターンに１度しか使用できない。①：「獄神」モンスターか「アルトメギア」モンスターの効果の発動にチェーンして相手が発動したモンスターの効果の処理時に、その効果を無効にできる。その後、このカードを破壊する。
  ko: |-
    이 카드명의 펜듈럼 효과는 1턴에 1번밖에 사용할 수 없다. ①: "감옥신" 몬스터나 "아르토메기아" 몬스터의 효과 발동에 체인하여 상대가 발동한 몬스터의 효과 처리시에, 그 효과를 무효로 할 수 있다. 그 후, 이 카드를 파괴한다.
  zh-TW:
  zh-CN: |-
    此卡名的灵摆效果1回合仅可使用1次。①：连锁“狱神”怪兽或“神艺”怪兽的效果的发动，对手发动怪兽的效果的处理时，可将该效果无效。然后，将此卡破坏。
