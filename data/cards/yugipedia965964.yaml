  en: |-
    1 "Melffy" monster + 1 Beast monster
    If this card is Fusion Summoned: You can target an equal number of "Melffy" cards you control and cards your opponent controls; return them to the hand. If your opponent Normal or Special Summons a monster(s) (except during the Damage Step), or if an opponent's monster targets this card for an attack: You can target 1 Beast monster in your GY; decrease this card's Level by 2, and if you do, Special Summon that monster. You can only use each effect of "Excited Melffys" once per turn.
