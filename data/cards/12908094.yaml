  ja: |-
    このカード名の効果は１ターンに１度しか使用できない。①：このカードが手札に存在する場合に発動できる。「ガガガマジシャン－ガガガマジック」以外の自分の手札・墓地の「ズババ」、「ガガガ」、「ゴゴゴ」、「ドドド」モンスター１体と、このカードを特殊召喚し、その２体のみを素材として「ズババ」、「ガガガ」、「ゴゴゴ」、「ドドド」、「魔人」、「Ｈ－Ｃ」、「Ｎｏ．」、「ＺＷ」、「ＺＳ」Ｘモンスター１体のＸ召喚を行う。その際、Ｘ素材とするモンスター１体のレベルは、もう１体のモンスターと同じレベルとして扱う。
