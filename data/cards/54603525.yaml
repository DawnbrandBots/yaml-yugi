text:
  en: |-
    1 Tuner + 1+ non-Tuners
    (This card is always treated as a "Speedroid" card.)
    If this card is Special Summoned: You can destroy 1 Effect Monster your opponent controls, and if you do, this card gains ATK equal to that monster's original ATK. When your opponent activates a card or effect (Quick Effect): You can Special Summon 1 Level 4 or lower WIND Tuner from your hand or GY (but negate its effects), then immediately after this effect resolves, you can Synchro Summon 1 WIND Synchro Monster. You can only use each effect of "Clear Wing Synchro Dragon of the Four Heavenly Dragons" once per turn.
  de:
