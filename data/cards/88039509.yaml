text:
  en: |-
    If this card is destroyed by battle or card effect: You can send 2 Level 4 or lower Machine monsters from your Deck to the GY. You can only use this effect of "Einroid" once per turn.
  de: |-
    Falls diese Karte durch Kampf oder einen Karteneffekt zerstört wird: Du kannst 2 Maschine-Monster der Stufe 4 oder niedriger von deinem Deck auf den Friedhof legen. Du kannst diesen Effekt von „Einroid“ nur einmal pro Spielzug verwenden.
  es: |-
    Si esta carta es destruida en batalla o por el efecto de una carta: puedes mandar al Cementerio 2 monstruos Máquina de Nivel 4 o menor en tu Deck. Sólo puedes usar este efecto de "Einroid" una vez por turno.
  fr: |-
    Si cette carte est détruite au combat ou par un effet de carte : vous pouvez envoyer 2 monstres Machine de max. Niveau 4 depuis votre Deck au Cimetière. Vous ne pouvez utiliser cet effet de "Einroid" qu'une fois par tour.
  it: |-
    Se questa carta viene distrutta in battaglia o dall'effetto di una carta: puoi mandare 2 mostri Macchina di Livello 4 o inferiore dal tuo Deck al Cimitero. Puoi utilizzare questo effetto di "Einroid" una sola volta per turno.
  pt: |-
    Se este card for destruído em batalha ou por um efeito de card: você pode enviar 2 monstros Máquina de Nível 4 ou menos do seu Deck para o Cemitério. Você só pode usar este efeito de "Einroide" uma vez por turno.
  ja: |-
    このカード名の効果は１ターンに１度しか使用できない。①：このカードが戦闘・効果で破壊された場合に発動できる。デッキからレベル４以下の機械族モンスター２体を墓地へ送る。
