text:
  en: |-
    When your opponent activates a monster effect, or an opponent's monster declares an attack (Quick Effect): You can Special Summon this card from your hand. You can only use this effect of "Multiplying Kuriboh!" once per turn. Once per turn, when your opponent activates a monster effect on the field, or during damage calculation, when an opponent's monster attacks (Quick Effect): You can add to your hand, or Special Summon, 1 "Dark Magician" or 1 monster with 300 ATK/200 DEF from your Deck or GY, then you can change that opponent's monster's ATK to 0.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①の効果は１ターンに１度しか使用できない。①：相手がモンスターの効果を発動した時、または相手モンスターの攻撃宣言時に発動できる。このカードを手札から特殊召喚する。②：１ターンに１度、相手がフィールドのモンスターの効果を発動した時、または相手モンスターが攻撃するダメージ計算時に発動できる。「ブラック・マジシャン」または攻撃力３００／守備力２００のモンスター１体を自分のデッキ・墓地から選び、手札に加えるか特殊召喚する。その後、その相手モンスターの攻撃力を０にできる。
  ko: |-
    이 카드명의 ①의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 상대가 몬스터의 효과를 발동했을 때, 또는 상대 몬스터의 공격 선언시에 발동할 수 있다. 이 카드를 패에서 특수 소환한다. ②: 1턴에 1번, 상대가 필드의 몬스터의 효과를 발동했을 때, 또는 상대 몬스터가 공격하는 데미지 계산시에 발동할 수 있다. "블랙 매지션" 또는 공격력 300 / 수비력 200 의 몬스터 1장을 자신의 덱 / 묘지에서 고르고, 패에 넣거나 특수 소환한다. 그 후, 그 상대 몬스터의 공격력을 0 으로 할 수 있다.
  zh-TW:
  zh-CN: |-
    此卡名的①效果1回合仅可使用1次。①：对手发动怪兽的效果时，或对手怪兽攻击宣言时可以发动。从手牌将此卡特殊召唤。②：1回合1次，对手发动场上的怪兽的效果时，或对手怪兽攻击的伤害计算时可以发动。从自己牌组・墓地挑选1只“黑魔导”或攻击力300/守备力200的怪兽，加入手牌或特殊召唤。然后，可将该对手怪兽的攻击力改成0。
