name:
  en: Glitch Clutch Nullgainer
  de: Glitchgriff-Nullgainer
  es: Nulobtenedor Aferrado a Glitch
  fr: Captezéro la Poigne de l'Anomalie
  it: Nullgainer Afferra Glitch
  pt: Agarra-Glitch do Ganho-Nulo
  ja: <ruby>無現壊収<rt>グリッチ・クラッチ</rt></ruby> ヌルゲイナー
