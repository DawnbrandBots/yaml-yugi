text:
  en: |-
    Your opponent cannot target Synchro Monsters you control with "Warrior" or "Stardust" in their original names, with card effects. You can only use each of the following effects of "Junk Armor" once per turn. If this card is added to your hand, except by drawing it: You can Special Summon it. You can Tribute this card; Special Summon 1 "Junk" or "Synchron" monster from your Deck in Defense Position, except "Junk Armor".
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードがドロー以外の方法で手札に加わった場合に発動できる。このカードを特殊召喚する。②：このカードがモンスターゾーンに存在する限り、元々のカード名に「ウォリアー」か「スターダスト」を含む自分フィールドのＳモンスターを相手は効果の対象にできない。③：このカードをリリースして発動できる。デッキから「ジャンク・アーマー」以外の「ジャンク」モンスターか「シンクロン」モンスター１体を守備表示で特殊召喚する。
  ko: |-
    이 카드명의 ①③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드가 드로우 이외의 방법으로 패에 넣어졌을 경우에 발동할 수 있다. 이 카드를 특수 소환한다. ②: 이 카드가 몬스터 존에 존재하는 한, 원래의 카드명에 "워리어"나 "스타더스트"를 포함하는 자신 필드의 싱크로 몬스터를 상대는 효과의 대상으로 할 수 없다. ③: 이 카드를 릴리스하고 발동할 수 있다. 덱에서 "정크 아머" 이외의 "정크" 몬스터나 "싱크론" 몬스터 1장을 수비 표시로 특수 소환한다.
  zh-TW:
  zh-CN: |-
    此卡名的①③效果1回合仅可各使用1次。①：用抽牌以外的方法将此卡加入手牌的情况下可以发动。将此卡特殊召唤。②：只要此卡存在于怪兽区域，对手不可将原本卡名包含“战士”或“星尘”的、自己场上的同步怪兽作为效果的对象。③：解放此卡可以发动。从牌组将“废品装甲”以外的1只“废品”怪兽或“同步士”怪兽以守备表示特殊召唤。
