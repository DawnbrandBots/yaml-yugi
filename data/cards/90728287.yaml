    このカード名の①②の効果は１ターンに１度、いずれか１つしか使用できない。①：自分のフィールド・墓地の「アルス＝マグナ」モンスターを３体まで対象として発動できる。そのモンスターを除外する。その後、その数までフィールドの他の表側表示カードの効果をターン終了時まで無効にできる。②：墓地のこのカードを除外して発動できる。自分の墓地から「獄神」Ｌモンスター１体をＥＸデッキに戻す。その後、そのモンスターを特殊召喚できる。
