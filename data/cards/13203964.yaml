  ja: |-
    Ｌモンスター１体以上
    ①：このカードがＬ召喚した場合、またはこのカードが戦闘を行ったダメージステップ終了時に発動する。相手フィールドのモンスターを全て破壊する。その後、自分の墓地のＬモンスターの数×３００ダメージを相手に与える。②：このカードはモンスターゾーンに存在する限り、属性を「光」「水」「炎」「風」としても扱い、自身と同じ属性のモンスターが発動した効果を受けない。③：攻撃力１０００以上のこのカードが戦闘・効果で破壊される場合、代わりにこのカードの攻撃力を１０００下げた数値にできる。
