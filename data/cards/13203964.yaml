text:
  en: |-
    1+ Link Monsters
    If this card is Link Summoned, or at the end of the Damage Step if this card battled: Destroy as many monsters your opponent controls as possible, then inflict 300 damage to your opponent for each Link Monster in your GY. While face-up on the field, this card is also LIGHT, WATER, FIRE, and WIND-Attribute. Unaffected by the activated effects of monsters that share an Attribute with this card. If this card with 1000 or more ATK would be destroyed by battle or card effect, you can make its ATK become reduced by 1000 instead.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    Ｌモンスター１体以上
    ①：このカードがＬ召喚した場合、またはこのカードが戦闘を行ったダメージステップ終了時に発動する。相手フィールドのモンスターを全て破壊する。その後、自分の墓地のＬモンスターの数×３００ダメージを相手に与える。②：このカードはモンスターゾーンに存在する限り、属性を「光」「水」「炎」「風」としても扱い、自身と同じ属性のモンスターが発動した効果を受けない。③：攻撃力１０００以上のこのカードが戦闘・効果で破壊される場合、代わりにこのカードの攻撃力を１０００下げた数値にできる。
  ko: |-
    링크 몬스터 1장 이상
    ①: 이 카드를 링크 소환했을 경우, 또는 이 카드가 전투를 실행한 데미지 스텝 종료시에 발동한다. 상대 필드의 몬스터를 전부 파괴한다. 그 후, 자신 묘지의 링크 몬스터의 수 × 300 데미지를 상대에게 준다. ②: 이 카드는 몬스터 존에 존재하는 한, 속성을 "빛" "물" "화염" "바람"으로도 취급하고, 자신과 같은 속성의 몬스터가 발동한 효과를 받지 않는다. ③: 공격력 1000 이상의 이 카드가 전투 / 효과로 파괴될 경우, 대신에 이 카드의 공격력을 1000 내린 수치로 할 수 있다.
  zh-TW:
  zh-CN: |-
    连接怪兽1只以上
    ①：此卡连接召唤的情况下，或此卡进行战斗的伤害步骤结束时发动。将对手场上的怪兽全部破坏。然后，给予对手相当于自己墓地的连接怪兽的数量×300的伤害。②：此卡只要存在于怪兽区域，属性也视为“光”、“水”、“炎”、“风”，不受与自身相同属性的怪兽发动的效果影响。③：攻击力1000以上的此卡将被战斗・效果破坏的情况下，作为代替可将此卡的攻击力改成下降了1000的数值。
