    このカード名の①②の効果は１ターンに１度、いずれか１つしか使用できない。①：「ＣＸ」モンスターまたは「ＣＮｏ．１０１」～「ＣＮｏ．１０７」のいずれかの「ＣＮｏ．」モンスターが自分フィールドに存在し、相手がモンスターの効果・魔法・罠カードを発動した時に発動できる。その発動を無効にする。その後、自分か相手のフィールド・墓地からモンスター１体を自分フィールドのＸモンスター１体のＸ素材にできる。②：墓地のこのカードを除外して発動できる。自分の墓地から「アンブラル」モンスター２体を特殊召喚する。
