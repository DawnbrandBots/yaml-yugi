  ja: |-
    このカード名のＰ効果は１ターンに１度しか使用できない。①：自分メインフェイズに発動できる。このカードをＥＸデッキに戻す。その後、自分のデッキ・ＥＸデッキ（表側）からレベル７のＰモンスター１体を手札に加える事ができる。
  ko: |-
    이 카드명의 펜듈럼 효과는 1턴에 1번밖에 사용할 수 없다. ①: 자신 메인 페이즈에 발동할 수 있다. 이 카드를 엑스트라 덱으로 되돌린다. 그 후, 자신의 덱 / 엑스트라 덱(앞면)에서 레벨 7 의 펜듈럼 몬스터 1장을 패에 넣을 수 있다.
  zh-TW:
  zh-CN: |-
    此卡名的灵摆效果1回合仅可使用1次。①：在自己的主要阶段可以发动。将此卡放回额外牌组。然后，可从自己牌组・额外牌组（表侧）将1只等级7的灵摆怪兽加入手牌。
