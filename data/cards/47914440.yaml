text:
  en: |-
    When this card is activated: You can Special Summon 1 of your banished monsters to your rightmost Main Monster Zone. If your opponent would Normal or Special Summon a monster(s) in their Main Monster Zone, they must use their leftmost zone(s) that can be used.
  de: |-
    Wenn diese Karte aktiviert wird: Du kannst 1 deiner verbannten Monster als Spezialbeschwörung in deine ganz rechte Main-Monsterzone beschwören. Falls dein Gegner ein oder mehr Monster als Normal- oder Spezialbeschwörung in seine Main-Monsterzonen beschwören würde, muss er seine ganz linken Zonen verwenden, die verwendet werden können.
  es: |-
    Cuando esta carta es activada: puedes Invocar de Modo Especial 1 de tus monstruos desterrados al extremo derecho de tu Zona de Monstruos Principal. Si tu adversario fuera a Invocar de Modo Normal o Especial uno o más monstruos en su Zona de Monstruos Principal, debe usar su zona o zonas del extremo izquierdo que puedan ser usadas.
  fr: |-
    Lorsque cette carte est activée : vous pouvez Invoquer Spécialement 1 de vos monstres bannis dans votre Zone Monstre Main la plus à droite. Si votre adversaire va Invoquer Normalement ou Spécialement un ou plusieurs monstres dans sa Zone Monstre Main, il doit utiliser ses zones les plus à gauche qui peuvent être utilisées.
  it: |-
    Quando questa carta viene attivata: puoi Evocare Specialmente 1 dei tuoi mostri banditi nella tua Zona Mostri Main più a destra. Se il tuo avversario sta per Evocare Normalmente o Specialmente uno o più mostri nella sua Zona Mostri Main, deve utilizzare le sue zone più a sinistra che possono essere utilizzate.
  pt: |-
    Quando este card for ativado: você pode Invocar por Invocação-Especial 1 dos seus monstros banidos na sua Zona de Monstros Principal mais à direita. Se seu oponente Invocaria um ou mais monstros por Invocação-Normal ou Especial na Zona de Monstros Principal dele, ele deve usar sua(s) zona(s) mais à esquerda que possa(m) ser usadas.
  ja: |-
    ①：このカードの発動時の効果処理として、自分の除外状態のモンスター１体を自分の右端のメインモンスターゾーンに特殊召喚できる。②：相手は自身のメインモンスターゾーンにモンスターを召喚・特殊召喚する場合、使用可能な一番左のゾーンから順に使用しなければならない。
  ko:
  zh-TW:
  zh-CN: |-
    ①：作为此卡发动时的效果处理，可将自己除外状态的1只怪兽特殊召唤至自己右端的主要怪兽区域。②：对手要在自身的主要怪兽区域召唤・特殊召唤怪兽的情况下，必须从可以使用的最左侧区域依序使用。
