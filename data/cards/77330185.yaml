text:
  en: |-
    Gains 200 ATK for each "X-Saber" monster you control. If this card on the field is destroyed by card effect and sent to the GY: Add 1 "X-Saber" monster from your Deck to your hand.
  de: |-
    Erhält für jedes „X-Säbel“-Monster, das du kontrollierst, 200 ATK. Falls diese Karte auf dem Spielfeld durch einen Karteneffekt zerstört und auf den Friedhof gelegt wird: Füge deiner Hand 1 „X-Säbel“-Monster von deinem Deck hinzu.
  es: |-
    Gana 200 ATK por cada monstruo "Sable-X" que controles. Si esta carta en el Campo es destruida por el efecto de una carta y mandada al Cementerio: añade a tu mano 1 monstruo "Sable-X" en tu Deck.
  fr: |-
    Gagne 200 ATK pour chaque monstre "Sabre X" que vous contrôlez. Si cette carte sur le Terrain est détruite par un effet de carte et envoyée au Cimetière : ajoutez 1 monstre "Sabre X" depuis votre Deck à votre main.
  it: |-
    Guadagna 200 ATK per ogni mostro "Sciabola-X" che controlli. Se questa carta sul Terreno viene distrutta dall'effetto di una carta e mandata al Cimitero: aggiungi 1 mostro "Sciabola-X" dal tuo Deck alla tua mano.
  pt: |-
    Ganha 200 de ATK para cada monstro "Sabre-X" que você controla. Se este card no campo for destruído por um efeito de card e enviado para o Cemitério: adicione 1 monstro "Sabre-X" do seu Deck à sua mão.
  ja: |-
    フィールド上に存在するこのカードがカードの効果によって破壊され墓地へ送られた時、自分のデッキから「Ｘ－セイバー」と名のついたモンスター１体を手札に加える。このカードの攻撃力は、自分フィールド上に表側表示で存在する「Ｘ－セイバー」と名のついたモンスターの数×２００ポイントアップする。
  ko: |-
    필드 위에 존재하는 이 카드가 카드의 효과에 의해서 파괴되어 묘지로 보내졌을 때, 자신의 덱에서 "X－세이버"라는 이름이 붙은 몬스터 1장을 패에 넣는다. 이 카드의 공격력은 자신 필드 위에 앞면 표시로 존재하는 "X－세이버"라는 이름이 붙은 몬스터의 수 × 200 포인트 올린다.
  zh-TW:
  zh-CN: |-
    ①：此卡的攻击力上升自己场上的“X－军刀”怪兽数量×200的数值。②：场上的此卡因效果被破坏并被送至墓地的情况下发动。从牌组将1只“X－军刀”怪兽加入手牌。
