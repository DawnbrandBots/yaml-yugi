text:
  en: |-
    Cannot be Normal Summoned/Set. Must be Special Summoned (from your hand) by banishing 1 LIGHT Warrior and 1 DARK Fiend monster from your GY. This card's Special Summon cannot be negated. Neither player can activate cards or effects when this card is Special Summoned. If you control this card that was Summoned its own way: You can pay 1000 LP; banish as many cards from your opponent's field and GY as possible, then inflict 500 damage to your opponent for each card banished by this effect. You can only use this effect of "Chaos End Ruler - Ruler of the Beginning and the End" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカードは通常召喚できない。自分の墓地から戦士族・光属性と悪魔族・闇属性のモンスターを１体ずつ除外した場合のみ特殊召喚できる。このカード名の③の効果は１ターンに１度しか使用できない。①：このカードの特殊召喚は無効化されない。②：このカードの特殊召喚成功時にお互いはカードの効果を発動できない。③：このカードが上記の方法で特殊召喚されている場合、１０００ＬＰを払って発動できる。相手のフィールド・墓地のカードを全て除外する。その後、この効果で除外した数×５００ダメージを相手に与える。
  ko: |-
    이 카드는 통상 소환할 수 없다. 자신 묘지에서 전사족 / 빛 속성과 악마족 / 어둠 속성인 몬스터를 1장씩 제외했을 경우에만 특수 소환할 수 있다. 이 카드명의 ③의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 이 카드의 특수 소환은 무효화되지 않는다. ②: 이 카드의 특수 소환 성공시에 양쪽 플레이어는 카드의 효과를 발동할 수 없다. ③: 이 카드가 상기의 방법으로 특수 소환되어 있을 경우, 1000 LP를 지불하고 발동할 수 있다. 상대의 필드 / 묘지의 카드를 전부 제외한다. 그 후, 이 효과로 제외한 수 × 500 데미지를 상대에게 준다.
  zh-TW:
  zh-CN: |-
    此卡不可通常召唤。仅可在从自己墓地将战士族・光属性和恶魔族・暗属性的怪兽各1只除外的情况下特殊召唤。此卡名的③效果1回合仅可使用1次。①：此卡的特殊召唤不会被无效化。②：此卡特殊召唤成功时双方不可发动卡的效果。③：此卡是以上述方法被特殊召唤的情况下，支付1000LP可以发动。将对手场上・墓地的卡全部除外。然后，给予对手以此效果除外的数量×500的伤害。
