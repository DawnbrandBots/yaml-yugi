  ja: |-
    このカードは通常召喚できない。自分の墓地から戦士族・光属性と悪魔族・闇属性のモンスターを１体ずつ除外した場合のみ特殊召喚できる。このカード名の③の効果は１ターンに１度しか使用できない。①：このカードの特殊召喚は無効化されない。②：このカードの特殊召喚成功時にお互いはカードの効果を発動できない。③：このカードが上記の方法で特殊召喚されている場合、１０００ＬＰを払って発動できる。相手のフィールド・墓地のカードを全て除外する。その後、この効果で除外した数×５００ダメージを相手に与える。
