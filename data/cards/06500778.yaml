  de: Chaos Destillation
  es: Destilación del Caos
  fr: Distillation du Chaos
  it: Distillazione del Chaos
  pt: Destilador do Caos
  ja: <ruby>錬<rt>れん</rt></ruby><ruby>金<rt>きん</rt></ruby><ruby>釜<rt>がま</rt></ruby>－カオス・ディスティル
  ja_romaji: Renkingama - Kaosu Disutiru
  ko: 연금가마－카오스 디스틸
  ko_rr:
  zh-TW: 鍊金釜－混沌蒸餾
  zh-CN: 炼金釜－混沌蒸馏
text:
  en: |-
    While this card is face-up on the field, any card sent to your GY is banished instead. You can activate 1 of these effects;
    ● Add 1 "Macro Cosmos", or 1 card that mentions it, from your Deck to your hand, except "Chaos Distill".
    ● If "Macro Cosmos" is on the field: Banish this face-up card from the Spell & Trap Zone; add 1 LIGHT monster with ? ATK from your Deck to your hand.
    You can only use this effect of "Chaos Distill" once per turn.
  de: |-
    Solange diese Karte offen auf dem Spielfeld liegt, wird jede Karte, die auf deinen Friedhof gelegt wird, stattdessen verbannt. Du kannst 1 dieser Effekte aktivieren;
    ● Füge deiner Hand 1 „Makrokosmos“ oder 1 Karte, die ihn erwähnt, von deinem Deck hinzu, außer „Chaos Destillation“.
    ● Falls sich „Makrokosmos“ auf dem Spielfeld befindet: Verbanne diese offene Karte von der Zauber- & Fallenzone; füge deiner Hand 1 LICHT Monster mit ? ATK von deinem Deck hinzu.
    Du kannst diesen Effekt von „Chaos Destillation“ nur einmal pro Spielzug verwenden.
  es: |-
    Mientras esta carta esté boca arriba en el Campo, cualquier carta mandada a tu Cementerio es desterrada en su lugar. Puedes activar 1 de estos efectos;
    ● Añade a tu mano 1 "Macro Cosmos", o 1 carta que lo mencione, en tu Deck, excepto "Destilación del Caos".
    ● Si "Macro Cosmos" está en el Campo: destierra esta carta boca arriba en la Zona de Magia y Trampas; añade a tu mano 1 monstruo de LUZ con ? ATK en tu Deck.
    Sólo puedes usar este efecto de "Destilación del Caos" una vez por turno.
  fr: |-
    Tant que cette carte est face recto sur le Terrain, les cartes envoyées à votre Cimetière sont bannies à la place. Vous pouvez activer 1 de ces effets ;
    ● Ajoutez 1 "Macro Cosmos" ou 1 carte qui le mentionne ("Distillation du Chaos" exclu) depuis votre Deck à votre main.
    ● Si "Macro Cosmos" est sur le Terrain : bannissez cette carte face recto depuis la Zone Magie & Piège ; ajoutez 1 monstre LUMIÈRE avec ? ATK depuis votre Deck à votre main.
    Vous ne pouvez utiliser cet effet de "Distillation du Chaos" qu'une fois par tour.
  it: |-
    Mentre questa carta è scoperta sul Terreno, qualsiasi carta mandata al tuo Cimitero viene invece bandita. Puoi attivare 1 di questi effetti;
    ● Aggiungi 1 "Macro Cosmo", o 1 carta che lo menziona, dal tuo Deck alla tua mano, eccetto "Distillazione del Chaos".
    ● Se "Macro Cosmo" è sul Terreno: bandisci questa carta scoperta dalla Zona Magie & Trappole; aggiungi 1 mostro LUCE con ? ATK dal tuo Deck alla tua mano.
    Puoi utilizzare questo effetto di "Distillazione del Chaos" una sola volta per turno.
  pt: |-
    Enquanto este card estiver com a face para cima no campo, qualquer card enviado para o seu Cemitério, em vez disso, é banido. Você pode ativar 1 desses efeitos;
    ● Adicione 1 "Macrocosmo", ou 1 card que o mencione, do seu Deck à sua mão, exceto "Destilador do Caos".
    ● Se "Macrocosmo" estiver no campo: bana este card com a face para cima da Zona de Magias & Armadilhas; adicione 1 monstro de LUZ com ATK ? do seu Deck à sua mão.
    Você só pode usar este efeito de "Destilador do Caos" uma vez por turno.
  ja: |-
    このカード名の②の効果は１ターンに１度しか使用できない。①：このカードが魔法＆罠ゾーンに存在する限り、自分の墓地へ送られるカードは墓地へは行かず除外される。②：以下の効果から１つを選択して発動できる。
    ●「錬金釜－カオス・ディスティル」を除く、「マクロコスモス」またはそのカード名が記されたカード１枚をデッキから手札に加える。
    ●フィールドに「マクロコスモス」が存在する場合、魔法＆罠ゾーンの表側表示のこのカードを除外して発動できる。デッキから攻撃力？の光属性モンスター１体を手札に加える。
  ko: |-
    이 카드명의 ②의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 이 카드가 마법 & 함정 존에 존재하는 한, 자신 묘지로 보내지는 카드는 묘지로는 가지 않으며 제외된다. ②: 이하의 효과에서 1개를 선택하고 발동할 수 있다.
    ●"연금가마－카오스 디스틸"이 아닌, "매크로 코스모스" 또는 그 카드명이 쓰여진 카드 1장을 덱에서 패에 넣는다.
    ●필드에 "매크로 코스모스"가 존재할 경우, 마법 & 함정 존의 앞면 표시의 이 카드를 제외하고 발동할 수 있다. 덱에서 공격력 ? 인 빛 속성 몬스터 1장을 패에 넣는다.
  zh-TW:
  zh-CN: |-
    此卡名的②效果1回合仅可使用1次。①：只要此卡存在于魔法与陷阱区域，被送往自己墓地的卡不去墓地而直接被除外。②：可从以下效果中选择1个发动。
    ●从牌组将除“炼金釜－混沌蒸馏”以外的、1张“宏观宇宙”或记载有该卡名的卡加入手牌。
    ●场上存在“宏观宇宙”的情况下，将魔法与陷阱区域的表侧表示的此卡除外可以发动。从牌组将1只攻击力？的光属性怪兽加入手牌。
