  en: |-
    2+ Effect Monsters
    You can also use 1 monster in your hand as material to Link Summon this card. If this card is Link Summoned: You can send 1 monster from your Deck to the GY, or if this card was Link Summoned using only monsters you control, you can send 1 monster from your Extra Deck to the GY instead. During your next Standby Phase after this card was sent from the field to the GY: You can add 1 monster from your GY to your hand. You can only use each effect of "Zenna-no-Tsuinagihime" once per turn.
