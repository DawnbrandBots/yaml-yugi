name:
  en: Predaplant Longinephila
  de: Raubpflanze Longinephila
  es: Predaplanta Longinephila
  fr: Longinephila Prédaplante
  it: Predapianta Longinephila
  pt: Predaplanta Longinephila
  ja: <ruby>捕食植物<rt>プレデター・プランツ</rt></ruby>ロンギネフィラ
  ja_romaji: Puredetā Purantsu Ronginefira
  ko: 프레데터 플랜츠 롱기네필라
  ko_rr:
  zh-TW: 捕食植物 長葉狸藻新婦蛛
  zh-CN: 捕食植物 长叶狸藻新妇蛛
text:
  en: |-
    If this card is Normal or Special Summoned: You can add 1 "Predap" card from your Deck to your hand, except "Predaplant Longinephila". You can banish this card from your GY, then activate 1 of these effects;
    ● Place 1 Predator Counter on 1 face-up monster on the field, and if you do, any of those monsters that are Level 2 or higher become Level 1 as long as they have a Predator Counter.
    ● Set 1 "Polymerization" from your GY or banishment.
    You can only use each effect of "Predaplant Longinephila" once per turn.
  de: |-
    Falls diese Karte als Normal- oder Spezialbeschwörung beschworen wird: Du kannst deiner Hand 1 „Raubp“-Karte von deinem Deck hinzufügen, außer „Raubpflanze Longinephila“. Du kannst diese Karte von deinem Friedhof verbannen und dann 1 dieser Effekte aktivieren;
    ● Lege 1 Raubtier-Zählmarke auf 1 offenes Monster auf dem Spielfeld und falls du dies tust, werden alle jener Monster, die Stufe 2 oder höher sind, zu Stufe 1, solange sie eine Raubtier-Zählmarke haben.
    ● Setze 1 „Polymerisation“ von deinem Friedhof oder deinen verbannten Karten.
    Du kannst jeden Effekt von „Raubpflanze Longinephila“ nur einmal pro Spielzug verwenden.
  es: |-
    Si esta carta es Invocada de Modo Normal o Especial: puedes añadir a tu mano 1 carta "Predap" en tu Deck, excepto "Predaplanta Longinephila". Puedes desterrar esta carta en tu Cementerio, y después activa 1 de estos efectos;
    ● Pon 1 Contador de Predador en 1 monstruo boca arriba en el Campo y, si lo haces, cualquiera de esos monstruos que sean de Nivel 2 o mayor se convierten en Nivel 1 mientras tengan un Contador de Predador.
    ● Coloca 1 "Polimerización" desde tu Cementerio o destierro.
    Sólo puedes usar cada efecto de "Predaplanta Longinephila" una vez por turno.
  fr: |-
    Si cette carte est Invoquée Normalement ou Spécialement : vous pouvez ajouter 1 carte "Prédap" ("Longinephila Prédaplante" exclu) depuis votre Deck à votre main. Vous pouvez bannir cette carte depuis votre Cimetière, puis activez 1 de ces effets ;
    ● Placez 1 Compteur Prédateur sur 1 monstre face recto sur le Terrain, et si vous le faites, chacun de ces monstres de min. Niveau 2 devient Niveau 1 tant qu'il a un Compteur Prédateur.
    ● Posez 1 "Polymérisation" depuis votre Cimetière ou bannissement.
    Vous ne pouvez utiliser chaque effet de "Longinephila Prédaplante" qu'une fois par tour.
  it: |-
    Se questa carta viene Evocata Normalmente o Specialmente: puoi aggiungere 1 carta "Predap" dal tuo Deck alla tua mano, eccetto "Predapianta Longinephila". Puoi bandire questa carta dal tuo Cimitero, poi attivare 1 di questi effetti;
    ● Metti 1 Segnalino Predatore su 1 mostro scoperto sul Terreno e, se lo fai, qualsiasi di quei mostri che sono di Livello 2 o superiore diventano di Livello 1 fino a quando hanno un Segnalino Predatore.
    ● Posiziona 1 "Polimerizzazione" dal tuo Cimitero o carte bandite.
    Puoi utilizzare ogni effetto di "Predapianta Longinephila" una sola volta per turno.
  pt: |-
    Se este card for Invocado por Invocação-Normal ou Especial: você pode adicionar 1 card "Predap" do seu Deck à sua mão, exceto "Predaplanta Longinephila". Você pode banir este card do seu Cemitério e, depois, ative 1 desses efeitos;
    ● Coloque 1 Marcador de Predador em 1 monstro com a face para cima no campo e, se isso acontecer, quaisquer desses monstros que forem de Nível 2 ou mais se tornam de Nível 1 enquanto tiverem um Marcador de Predador.
    ● Baixe 1 "Polimerização" do seu Cemitério ou banimento.
    Você só pode usar cada efeito de "Predaplanta Longinephila" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが召喚・特殊召喚した場合に発動できる。デッキから「捕食植物ロンギネフィラ」以外の「プレデター」カード１枚を手札に加える。②：墓地のこのカードを除外し、以下の効果から１つを選択して発動できる。●フィールドの表側表示モンスター１体に捕食カウンターを１つ置く。捕食カウンターが置かれたレベル２以上のモンスターのレベルは１になる。●自分の墓地・除外状態の「融合」１枚を自分フィールドにセットする。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드를 일반 소환 / 특수 소환했을 경우에 발동할 수 있다. 덱에서 "프레데터 플랜츠 롱기네필라" 이외의 "프레데터" 카드 1장을 패에 넣는다. ②: 묘지의 이 카드를 제외하고, 이하의 효과에서 1개를 선택하여 발동할 수 있다. ●필드의 앞면 표시 몬스터 1장에 포식 카운터를 1개 놓는다. 포식 카운터가 놓여진 레벨 2 이상의 몬스터의 레벨은 1 이 된다. ●자신의 묘지 / 제외 상태인 "융합" 1장을 자신 필드에 세트한다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：此卡召唤・特殊召唤的情况下可以发动。从牌组将“捕食植物 长叶狸藻新妇蛛”以外的1张“捕食”卡加入手牌。②：将墓地的此卡除外，可从以下效果中选择1个发动。
    ●在场上的1只表侧表示怪兽上放1个捕食计数物。放有捕食计数物的等级2以上怪兽的等级变为1。
    ●将自己墓地・除外状态的1张“融合”放置在自己场上。
