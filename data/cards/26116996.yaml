  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分フィールドのモンスター１体と相手フィールドの表側表示カード１枚を対象として発動できる。その自分のモンスターを破壊し、その相手のカードの効果をターン終了時まで無効にする。②：セットされているこのカードが墓地へ送られた場合、相手フィールドの表側表示カード１枚を対象として発動できる。そのカードの効果を無効にする。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：以自己场上的1只怪兽和对手场上的1张表侧表示卡为对象可以发动。将该自己的怪兽破坏，将该对手的卡的效果直至回合结束时为止无效。②：被放置的此卡被送至墓地的情况下，以对手场上的1张表侧表示卡为对象可以发动。将该卡的效果无效。
