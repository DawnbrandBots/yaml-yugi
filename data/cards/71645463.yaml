name:
  en: Dragunity Quirinus
  de: Dracheneinheit Quirinus
  es: Dracounidad Quirinus
  fr: Quirinus Dragunité
  it: Quirino Dragunità
  pt: Quirinus Dragunidade
  ja: ドラグニティ－クイリヌス
  ja_romaji: Doraguniti - Kuirinusu
  ko: 드래그니티－쿠이리누스
  ko_rr:
  zh-TW: 龍盟－奎里納斯
  zh-CN: 龙骑兵团－奎里纳斯
text:
  en: |-
    While this card is equipped with an Equip Card, your "Dragunity" monsters cannot be destroyed by battle. You can only use each of the following effects of "Dragunity Quirinus" once per turn. If this card is Normal or Special Summoned: You can add 1 "Dragunity" Spell/Trap from your Deck to your hand. You can target 1 other "Dragunity" Monster Card you control; return it to the hand/Extra Deck, then you can Special Summon 1 "Dragunity" monster from your hand.
  de: |-
    Solange diese Karte mit einer Ausrüstungskarte ausgerüstet ist, können deine „Dracheneinheit“-Monster nicht durch Kampf zerstört werden. Du kannst jeden der folgenden Effekte von „Dracheneinheit Quirinus“ nur einmal pro Spielzug verwenden. Falls diese Karte als Normal- oder Spezialbeschwörung beschworen wird: Du kannst deiner Hand 1 „Dracheneinheit“-Zauber/Falle von deinem Deck hinzufügen. Du kannst 1 andere „Dracheneinheit“-Monsterkarte wählen, die du kontrollierst; gib sie auf die Hand / lege sie ins Extra Deck zurück, dann kannst du 1 „Dracheneinheit“-Monster als Spezialbeschwörung von deiner Hand beschwören.
  es: |-
    Mientras esta carta esté equipada con una Carta de Equipo, tus monstruos "Dracounidad" no pueden ser destruidos en batalla. Sólo puedes usar cada uno de los siguientes efectos de "Dracounidad Quirinus" una vez por turno. Si esta carta es Invocada de Modo Normal o Especial: puedes añadir a tu mano 1 Mágica/Trampa "Dracounidad" en tu Deck. Puedes seleccionar otra Carta de Monstruo "Dracounidad" que controles; devuélvela a la mano/Deck Extra, y después puedes Invocar de Modo Especial, desde tu mano, 1 monstruo "Dracounidad".
  fr: |-
    Tant que cette carte est équipée avec une Carte d'Équipement, vos monstres "Dragunité" ne peuvent pas être détruits au combat. Vous ne pouvez utiliser chacun des effets suivants de "Quirinus Dragunité" qu'une fois par tour. Si cette carte est Invoquée Normalement ou Spécialement : vous pouvez ajouter 1 Magie/Piège "Dragunité" depuis votre Deck à votre main. Vous pouvez cibler 1 autre Carte Monstre "Dragunité" que vous contrôlez ; renvoyez-la à la main/Extra Deck, puis vous pouvez Invoquer Spécialement 1 monstre "Dragunité" depuis votre main.
  it: |-
    Mentre questa carta è equipaggiata con una Carta Equipaggiamento, i tuoi mostri "Dragunità" non possono essere distrutti in battaglia. Puoi utilizzare ognuno dei seguenti effetti di "Quirino Dragunità" una sola volta per turno. Se questa carta viene Evocata Normalmente o Specialmente: puoi aggiungere 1 Magia/Trappola "Dragunità" dal tuo Deck alla tua mano. Puoi scegliere come bersaglio 1 altra Carta Mostro "Dragunità" che controlli; falla ritornare nella mano/Extra Deck, poi puoi Evocare Specialmente 1 mostro "Dragunità" dalla tua mano.
  pt: |-
    Enquanto este card estiver equipado com um Card de Equipamento, seus monstros "Dragunidade" não podem ser destruídos em batalha. Você só pode usar cada um dos seguintes efeitos de "Quirinus Dragunidade" uma vez por turno. Se este card for Invocado por Invocação-Normal ou Especial: você pode adicionar 1 Magia/Armadilha "Dragunidade" do seu Deck à sua mão. Você pode escolher 1 outro Card de Monstro "Dragunidade" que você controla; devolva-o para a mão/Deck Adicional e, depois, você pode Invocar por Invocação-Especial 1 monstro "Dragunidade" da sua mão.
  ja: |-
    このカード名の①③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが召喚・特殊召喚した場合に発動できる。デッキから「ドラグニティ」魔法・罠カード１枚を手札に加える。②：このカードが装備カードを装備している限り、自分の「ドラグニティ」モンスターは戦闘では破壊されない。③：自分フィールドの他の「ドラグニティ」モンスターカード１枚を対象として発動できる。そのカードを手札・ＥＸデッキに戻す。その後、手札から「ドラグニティ」モンスター１体を特殊召喚できる。
  ko: |-
    이 카드명의 ①③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드를 일반 소환 / 특수 소환했을 경우에 발동할 수 있다. 덱에서 "드래그니티" 마법 / 함정 카드 1장을 패에 넣는다. ②: 이 카드가 장착 카드를 장착하고 있는 한, 자신의 "드래그니티" 몬스터는 전투로는 파괴되지 않는다. ③: 자신 필드의 다른 "드래그니티" 몬스터 카드 1장을 대상으로 하고 발동할 수 있다. 그 카드를 패 / 엑스트라 덱으로 되돌린다. 그 후, 패에서 "드래그니티" 몬스터 1장을 특수 소환할 수 있다.
  zh-TW:
  zh-CN: |-
    此卡名的①③效果1回合仅可各使用1次。①：此卡召唤・特殊召唤的情况下可以发动。从牌组将1张“龙骑兵团”魔法・陷阱卡加入手牌。②：只要此卡装备有装备卡，自己的“龙骑兵团”怪兽不会因战斗被破坏。③：以自己场上的1张其他的“龙骑兵团”怪兽卡为对象可以发动。将该卡放回手牌・额外牌组。然后，可从手牌将1只“龙骑兵团”怪兽特殊召唤。
