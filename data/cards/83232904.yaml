text:
  en: |-
    Special Summon up to 2 "Clown Crew" monsters from your Deck and/or Extra Deck, ignoring their Summoning conditions, also you cannot activate the effects of monsters Special Summoned from the Deck or Extra Deck until the end of the next turn after this card resolves. During your Main Phase, if this card in your GY, except the turn it was sent there: You can banish it and Tribute 1 monster from your hand or field, then target 1 card on the field; return it to the hand. You can only use each effect of "Clown Crew Malabarisme" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：デッキ・ＥＸデッキから「道化の一座」モンスターを２体まで召喚条件を無視して特殊召喚する。このカードの発動後、次のターンの終了時まで自分はデッキ・ＥＸデッキから特殊召喚されたモンスターの効果を発動できない。②：自分メインフェイズに、このターンに墓地へ送られていないこのカードを墓地から除外し、自分の手札・フィールドのモンスター１体をリリースし、フィールドのカード１枚を対象として発動できる。そのカードを手札に戻す。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 덱 / 엑스트라 덱에서 "크라운 클랜" 몬스터를 2장까지 소환 조건을 무시하고 특수 소환한다. 이 카드의 발동 후, 다음 턴의 종료시까지 자신은 덱 / 엑스트라 덱에서 특수 소환된 몬스터의 효과를 발동할 수 없다. ②: 자신 메인 페이즈에, 이 턴에 묘지로 보내져 있지 않은 이 카드를 묘지에서 제외하고, 자신의 패 / 필드의 몬스터 1장을 릴리스하고, 필드의 카드 1장을 대상으로 하여 발동할 수 있다. 그 카드를 패로 되돌린다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：从牌组・额外牌组将最多2只“小丑戏帮”怪兽无视召唤条件特殊召唤。此卡发动后，直至下个回合结束时为止，自己不可发动被从牌组・额外牌组特殊召唤的怪兽的效果。②：在自己的主要阶段，从墓地将不是在此回合被送至墓地的此卡除外，解放自己手牌・场上的1只怪兽，以场上的1张卡为对象可以发动。将该卡放回手牌。
