text:
  en: |-
    Add 3 "Sacred Beast" monsters with different names from your Deck to your hand, then discard 2 cards. If this card is in your GY, except the turn it was sent there: You can banish it; add 1 Level 10 Pyro, Thunder, or Fiend monster that cannot be Normal Summoned/Set from your Deck to your hand. You can only use each effect of "Unleashing the Sacred Beasts" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：デッキからカード名が異なる「三幻魔」モンスター３体を手札に加える。その後、自分の手札を２枚選んで捨てる。②：このターンに墓地へ送られていないこのカードを墓地から除外して発動できる。通常召喚できないレベル１０の炎族・雷族・悪魔族モンスター１体をデッキから手札に加える。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：从牌组将卡名不同的3只“三幻魔”怪兽加入手牌。然后，挑选自己的2张手牌舍弃。②：从墓地将不是在此回合被送至墓地的此卡除外可以发动。从牌组将1只不可通常召唤的等级10的炎族・雷族・恶魔族怪兽加入手牌。
