name:
  en: Sacred Beasts Released
  de: Befreiung der heiligen Ungeheuer
  es: Bestias Sagradas Liberadas
  fr: Libération des Bêtes Sacrées
  it: Rilascio Bestie Sacre
  pt: Bestas Sagradas Liberadas
  ja: <ruby>三<rt>さん</rt></ruby><ruby>幻<rt>げん</rt></ruby><ruby>魔<rt>ま</rt></ruby><ruby>解<rt>かい</rt></ruby><ruby>放<rt>ほう</rt></ruby>
  ja_romaji: Sangenma Kaihō
  ko: 삼환마해방
  ko_rr:
  zh-TW:
  zh-CN: 三幻魔解放
text:
  en: |-
    Add 3 "Sacred Beast" monsters with different names from your Deck to your hand, then discard 2 cards. If this card is in your GY, except the turn it was sent there: You can banish it; add 1 Level 10 Pyro, Thunder, or Fiend monster that cannot be Normal Summoned/Set, from your Deck to your hand. You can only use each effect of "Sacred Beasts Released" once per turn.
  de: |-
    Füge deiner Hand 3 „Heiligen Ungeheuer“-Monster mit unterschiedlichen Namen von deinem Deck hinzu, dann wirf 2 Karten ab. Falls sich diese Karte in deinem Friedhof befindet, außer in dem Spielzug, in dem sie dorthin gelegt wurde: Du kannst sie verbannen; füge deiner Hand 1 Pyro-, Donner- oder Unterweltler-Monster der Stufe 10, das nicht als Normalbeschwörung beschworen/gesetzt werden kann, von deinem Deck hinzu. Du kannst jeden Effekt von „Befreiung der heiligen Ungeheuer“ nur einmal pro Spielzug verwenden.
  es: |-
    Añade a tu mano 3 monstruos "Bestias Sagradas" con nombres diferentes en tu Deck, y después descarta 2 cartas. Si esta carta está en tu Cementerio, excepto en el turno en el que ésta fue mandada allí: puedes desterrarla; añade a tu mano 1 monstruo Piro, Trueno o Demonio de Nivel 10 en tu Deck que no pueda ser Invocado de Modo Normal/Colocado. Sólo puedes usar cada efecto de "Bestias Sagradas Liberadas" una vez por turno.
  fr: |-
    Ajoutez 3 monstres "Bêtes Sacrées" de noms différents depuis votre Deck à votre main, puis défaussez 2 cartes. Si cette carte est dans votre Cimetière, sauf le tour où elle y a été envoyée : vous pouvez la bannir ; ajoutez 1 monstre Pyro, Tonnerre ou Démon de Niveau 10 qui ne peut pas être Invoqué/Posé Normalement, depuis votre Deck à votre main. Vous ne pouvez utiliser chaque effet de "Libération des Bêtes Sacrées" qu'une fois par tour.
  it: |-
    Aggiungi 3 mostri "Bestia Sacra" con nomi diversi dal tuo Deck alla tua mano, poi scarta 2 carte. Se questa carta è nel tuo Cimitero, eccetto nel turno in cui è stata mandata lì: puoi bandirla; aggiungi 1 mostro Pyro, Tuono o Demone di Livello 10 che non può essere Evocato Normalmente/Posizionato, dal tuo Deck alla tua mano. Puoi utilizzare ogni effetto di "Rilascio Bestie Sacre" una sola volta per turno.
  pt: |-
    Adicione 3 monstros "Bestas Sagradas" com nomes diferentes do seu Deck à sua mão e, depois, descarte 2 cards. Se este card estiver no seu Cemitério, exceto no turno em que foi enviado para lá: você pode bani-lo; adicione 1 monstro Piro, Trovão ou Demônio de Nível 10 que não pode ser Invocado por Invocação-Normal/Baixado, do seu Deck à sua mão. Você só pode usar cada efeito de "Bestas Sagradas Liberadas" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：デッキからカード名が異なる「三幻魔」モンスター３体を手札に加える。その後、自分の手札を２枚選んで捨てる。②：このターンに墓地へ送られていないこのカードを墓地から除外して発動できる。通常召喚できないレベル１０の炎族・雷族・悪魔族モンスター１体をデッキから手札に加える。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 덱에서 카드명이 다른 "삼환마" 몬스터 3장을 패에 넣는다. 그 후, 자신의 패를 2장 고르고 버린다. ②: 이 턴에 묘지로 보내져 있지 않은 이 카드를 묘지에서 제외하고 발동할 수 있다. 통상 소환할 수 없는 레벨 10 의 화염족 / 번개족 / 악마족 몬스터 1장을 덱에서 패에 넣는다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：从牌组将卡名不同的3只“三幻魔”怪兽加入手牌。然后，挑选自己的2张手牌舍弃。②：从墓地将不是在此回合被送至墓地的此卡除外可以发动。从牌组将1只不可通常召唤的等级10的炎族・雷族・恶魔族怪兽加入手牌。
