text:
  en: |-
    You can Special Summon this card (from your hand) by revealing 1 face-down card you control and returning it to the hand/Extra Deck. You can only Special Summon "Yoa the Plague Deity Ashtra" once per turn this way. You can only use each of the following effects of "Yoa the Plague Deity Ashtra" once per turn. During your Main Phase: You can Set 1 "Ashtra" Spell/Trap from your Deck. During your opponent's turn (Quick Effect): You can target 1 face-up monster on the field; increase or decrease its Level by 1.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の、①の方法による特殊召喚は１ターンに１度しかできず、②③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードは自分フィールドの裏側表示カード１枚を相手に見せて手札・ＥＸデッキに戻し、手札から特殊召喚できる。②：自分メインフェイズに発動できる。デッキから「アシュトラ」魔法・罠カード１枚を自分フィールドにセットする。③：相手ターンに、フィールドの表側表示モンスター１体を対象として発動できる。そのモンスターのレベルを１つ上げるか下げる。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名以①方法的特殊召唤1回合仅可进行1次，且②③效果1回合仅可各使用1次。①：此卡可通过将自己场上的1张里侧表示卡出示给对手并放回手牌・额外牌组，来从手牌特殊召唤。②：在自己的主要阶段可以发动。从牌组将1张“艮鬼”魔法・陷阱卡放置在自己场上。③：在对手回合中，以场上的1只表侧表示怪兽为对象可以发动。该怪兽的等级上升或下降1。
