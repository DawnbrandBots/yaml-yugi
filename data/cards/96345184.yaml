  ko_rr:
  zh-TW:
  zh-CN: 无穷之三幻魔－幻魔皇拉比艾尔
text:
  en: |-
    Cannot be Normal Summoned/Set. Must be Special Summoned with the effect of a "Sacred Beast" card. You can reveal this card in your hand; add 1 "Sacred Beast" monster from your Deck to your hand, except "Infinity of the Sacred Beasts - Raviel, Lord of Phantasms", then discard 1 card. You can only use this effect of "Infinity of the Sacred Beasts - Raviel, Lord of Phantasms" once per turn. Once per turn (Quick Effect): You can Tribute 2 other "Sacred Beast" monsters; destroy as many monsters your opponent controls as possible, and if you do, this card gains 1000 ATK for each card destroyed.
  de: |-
    Kann nicht als Normalbeschwörung beschworen/gesetzt werden. Muss durch den Effekt einer „Heiligen Ungeheuer“-Karte als Spezialbeschwörung beschworen werden. Du kannst diese Karte in deiner Hand vorzeigen; füge deiner Hand 1 „Heiligen Ungeheuer“-Monster von deinem Deck hinzu, außer „Unendlichkeit der heiligen Ungeheuer - Raviel, Herr der Phantome“, dann wirf 1 Karte ab. Du kannst diesen Effekt von „Unendlichkeit der heiligen Ungeheuer - Raviel, Herr der Phantome“ nur einmal pro Spielzug verwenden. Einmal pro Spielzug (Schnelleffekt): Du kannst 2 andere „Heiligen Ungeheuer“-Monster als Tribut anbieten; zerstöre so viele Monster, die dein Gegner kontrolliert, wie möglich und falls du dies tust, erhält diese Karte für jede zerstörte Karte 1000 ATK.
  es: |-
    No puede ser Invocado de Modo Normal/Colocado. Debe ser Invocado de Modo Especial con el efecto de una carta "Bestias Sagradas". Puedes mostrar esta carta en tu mano; añade a tu mano 1 monstruo "Bestias Sagradas" en tu Deck excepto "Infinito de las Bestias Sagradas - Raviel, Señor de Fantasmas", y después descarta 1 carta. Sólo puedes usar este efecto de "Infinito de las Bestias Sagradas - Raviel, Señor de Fantasmas" una vez por turno. Una vez por turno (Efecto Rápido): puedes Sacrificar otros 2 monstruos "Bestias Sagradas"; destruye tantos monstruos que controle tu adversario como sea posible y, si lo haces, esta carta gana 1000 ATK por cada carta destruida.
  fr: |-
    Ni Invocable Normalement ni Posable Normalement. Uniquement Invocable Spécialement avec l'effet d'une carte "Bêtes Sacrées". Vous pouvez révéler cette carte dans votre main ; ajoutez 1 monstre "Bêtes Sacrées" ("Infini des Bêtes Sacrées - Raviel, Empereur des Phantasmes" exclu) depuis votre Deck à votre main, puis défaussez 1 carte. Vous ne pouvez utiliser cet effet de "Infini des Bêtes Sacrées - Raviel, Empereur des Phantasmes" qu'une fois par tour. Une fois par tour (Effet Rapide) : vous pouvez Sacrifier 2 autres monstres "Bêtes Sacrées" ; détruisez autant de monstres contrôlés par votre adversaire que possible, et si vous le faites, cette carte gagne 1000 ATK pour chaque carte détruite.
  it: |-
    Non può essere Evocato Normalmente/Posizionato. Deve essere Evocato Specialmente con l'effetto di una carta "Bestia Sacra". Puoi rivelare questa carta nella tua mano; aggiungi 1 mostro "Bestia Sacra" dal tuo Deck alla tua mano eccetto "Infinità delle Bestie Sacre - Raviel, il Signore dei Fantasmi", poi scarta 1 carta. Puoi utilizzare questo effetto di "Infinità delle Bestie Sacre - Raviel, il Signore dei Fantasmi" una sola volta per turno. Una volta per turno (Effetto Rapido): puoi offrire come Tributo 2 altri mostri "Bestia Sacra"; distruggi tanti mostri controllati dal tuo avversario quanti possibile e, se lo fai, questa carta guadagna 1000 ATK per ogni carta distrutta.
  pt: |-
    Não pode ser Invocado por Invocação-Normal/Baixado. Deve ser Invocado por Invocação-Especial com o efeito de um card "Bestas Sagradas". Você pode revelar este card na sua mão; adicione 1 monstro "Bestas Sagradas" do seu Deck à sua mão, exceto "Infinito das Bestas Sagradas - Raviel, o Senhor dos Fantasmas" e, depois, descarte 1 card. Você só pode usar este efeito de "Infinito das Bestas Sagradas - Raviel, o Senhor dos Fantasmas" uma vez por turno. Uma vez por turno (Efeito Rápido): você pode oferecer como Tributo 2 outros monstros "Bestas Sagradas"; destrua tantos monstros que seu oponente controla quanto possível e, se isso acontecer, este card ganha 1000 de ATK para cada card destruído.
  ja: |-
    このカードは通常召喚できず、「三幻魔」カードの効果でのみ特殊召喚できる。このカード名の①の効果は１ターンに１度しか使用できない。①：手札のこのカードを相手に見せて発動できる。デッキから「無窮の三幻魔－幻魔皇ラビエル」以外の「三幻魔」モンスター１体を手札に加える。その後、自分の手札を１枚選んで捨てる。②：自分・相手ターンに１度、自分フィールドの他の「三幻魔」モンスター２体をリリースして発動できる。相手フィールドのモンスターを全て破壊し、このカードの攻撃力は破壊した数×１０００アップする。
  ko:
  zh-TW:
  zh-CN: |-
    此卡不可通常召唤，仅可通过“三幻魔”卡的效果特殊召唤。此卡名的①效果1回合仅可使用1次。①：向对手出示手牌的此卡可以发动。从牌组将“无穷之三幻魔－幻魔皇拉比艾尔”以外的1只“三幻魔”怪兽加入手牌。然后，挑选自己的1张手牌舍弃。②：在每个自己・对手回合中1次，解放自己场上的其他2只“三幻魔”怪兽可以发动。将对手场上的怪兽全部破坏，此卡的攻击力上升所破坏的数量×1000的数值。
