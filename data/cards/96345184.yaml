text:
  en: |-
    Cannot be Normal Summoned/Set. Must be Special Summoned with a "Sacred Beast" card. You can reveal this card in your hand; add 1 "Sacred Beast" monster from your Deck to your hand, except "Raviel, Lord of Phantasms - Sacred Beast of Endless Eternity", then discard 1 card. You can only use this effect of "Raviel, Lord of Phantasms - Sacred Beast of Endless Eternity" once per turn. Once per turn (Quick Effect): You can Tribute 2 other "Sacred Beast" monsters; destroy as many monsters your opponent controls as possible, and if you do, this card gains 1000 ATK for each card destroyed by this effect.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカードは通常召喚できず、「三幻魔」カードの効果でのみ特殊召喚できる。このカード名の①の効果は１ターンに１度しか使用できない。①：手札のこのカードを相手に見せて発動できる。デッキから「無窮の三幻魔－幻魔皇ラビエル」以外の「三幻魔」モンスター１体を手札に加える。その後、自分の手札を１枚選んで捨てる。②：自分・相手ターンに１度、自分フィールドの他の「三幻魔」モンスター２体をリリースして発動できる。相手フィールドのモンスターを全て破壊し、このカードの攻撃力は破壊した数×１０００アップする。
  ko:
  zh-TW:
  zh-CN: |-
    此卡不可通常召唤。仅可通过“三幻魔”卡的效果特殊召唤。此卡名的①效果1回合仅可使用1次。①：向对手出示手牌的此卡可以发动。从牌组将“无穷之三幻魔－幻魔皇拉比艾尔”以外的1只“三幻魔”怪兽加入手牌。然后，挑选自己的1张手牌舍弃。②：在每个自己・对手回合中1次，解放自己场上的其他2只“三幻魔”怪兽可以发动。将对手场上的怪兽全部破坏，此卡的攻击力上升所破坏的数量×1000的数值。
