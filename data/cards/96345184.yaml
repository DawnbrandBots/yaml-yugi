  en: Infinity of the Sacred Beasts - Raviel, Lord of Phantasms
  de: Unendlichkeit der heiligen Ungeheuer - Raviel, Herr der Phantome
  es: Infinito de las Bestias Sagradas - Raviel, Señor de Fantasmas
  fr: Infini des Bêtes Sacrées - Raviel, Empereur des Phantasmes
  it: Infinità delle Bestie Sacre - Raviel, il Signore dei Fantasmi
  pt: Infinito das Bestas Sagradas - Raviel, o Senhor dos Fantasmas
  ja: <ruby>無<rt>む</rt></ruby><ruby>窮<rt>きゅう</rt></ruby>の<ruby>三<rt>さん</rt></ruby><ruby>幻<rt>げん</rt></ruby><ruby>魔<rt>ま</rt></ruby>－<ruby>幻<rt>げん</rt></ruby><ruby>魔<rt>ま</rt></ruby><ruby>皇<rt>おう</rt></ruby>ラビエル
