text:
  en: |-
    2 monsters with the same Attribute but different Types
    If your Tribute Summoned monster attacks a Defense Position monster, inflict double piercing battle damage to your opponent. If this card is Tributed: You can activate 1 of these effects (but you can only use each of these effects of "Clown Crew Diabolo" once per turn);
    ● Return all Fusion Monsters on the field and in the GYs to the Extra Deck.
    ● Set 1 "Clown Crew" Trap from your Deck.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    同じ属性で種族が異なるモンスター×２
    ①：Ａ召喚した自分のモンスターが守備表示モンスターを攻撃した場合、その守備力を攻撃力が超えた分の倍の数値だけ相手に戦闘ダメージを与える。②：このカードがリリースされた場合、以下の効果から１つを選択して発動できる（このカード名の以下の効果はそれぞれ１ターンに１度しか選択できない）。●お互いのフィールド・墓地の融合モンスターを全てＥＸデッキに戻す。●デッキから「道化の一座」罠カード１枚を自分フィールドにセットする。
  ko: |-
    같은 속성으로 종족이 다른 몬스터 × 2
    ①: 어드밴스 소환한 자신 몬스터가 수비 표시 몬스터를 공격했을 경우, 그 수비력을 공격력이 넘은 만큼의 배의 수치만큼 상대에게 전투 데미지를 준다. ②: 이 카드가 릴리스되었을 경우, 이하의 효과에서 1개를 선택하고 발동할 수 있다(이 카드명의 이하의 효과는 각각 1턴에 1번밖에 선택할 수 없다). ●서로의 필드 / 묘지의 융합 몬스터를 전부 엑스트라 덱으로 되돌린다. ●덱에서 "크라운 클랜" 함정 카드 1장을 자신 필드에 세트한다.
  zh-TW:
  zh-CN: |-
    属性相同而种族不同的怪兽×2
    ①：上级召唤的自己的怪兽攻击守备表示怪兽的情况下，依攻击力超出该怪兽守备力的数值的两倍来给予对手战斗伤害。②：此卡被解放的情况下，可从以下效果中选择1个发动（此卡名的以下效果1回合仅可各选择1次）。
    ●将双方场上・墓地的融合怪兽全部放回额外牌组。
    ●从牌组将1张“小丑戏帮”陷阱卡放置在自己场上。
