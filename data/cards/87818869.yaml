text:
  en: |-
    Target 1 Rank 9 or lower "Utopia" or "Utopic" Xyz Monster you control whose original Attribute is LIGHT; Special Summon 1 Rank 10 or higher "Number" Xyz Monster from your Extra Deck, by using that Xyz Monster you control (this is treated as an Xyz Summon, transfer its materials), and if you do, attach this card to it. A "Number 99" Xyz Monster that has this card as material gains this effect.
    ● Once per Chain, when your opponent activates a monster effect during the Battle Phase (Quick Effect): Detach all materials from this card, and if you do, destroy all monsters your opponent controls.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    ①：自分フィールドの元々の属性が光属性でランク９以下の「ホープ」Ｘモンスター１体を対象として発動できる。ランク１０以上の「Ｎｏ．」Ｘモンスター１体を、対象の自分のＸモンスターの上に重ねてＸ召喚扱いでＥＸデッキから特殊召喚し、このカードをそのＸ素材にする。②：このカードをＸ素材としている「Ｎｏ．９９」Ｘモンスターは以下の効果を得る。●相手がバトルフェイズにモンスターの効果を発動した時に発動する（同一チェーン上では１度まで）。このカードのＸ素材を全て取り除き、相手フィールドのモンスターを全て破壊する。
  ko: |-
    ①: 자신 필드의 원래의 속성이 빛 속성이고 랭크 9 이하의 "유토피아"나 "호프" 엑시즈 몬스터 1장을 대상으로 하여 발동할 수 있다. 랭크 10 이상의 "No." 엑시즈 몬스터 1장을, 대상의 자신 엑시즈 몬스터 위에 겹치고 엑시즈 소환으로 취급하여 엑스트라 덱에서 특수 소환하고, 이 카드를 그 엑시즈 소재로 한다. ②: 이 카드를 엑시즈 소재로 하고 있는 "No.99" 엑시즈 몬스터는 이하의 효과를 얻는다. ●상대가 배틀 페이즈에 몬스터의 효과를 발동했을 때에 발동한다(동일한 체인 위에서는 1번까지). 이 카드의 엑시즈 소재를 전부 제거하고, 상대 필드의 몬스터를 전부 파괴한다.
  zh-TW:
  zh-CN: |-
    ①：以自己场上1只原本属性为光属性的、阶级9以下的“霍普”超量怪兽为对象可以发动。从额外牌组将1只阶级10以上的“编号”超量怪兽重叠在对象的自己的超量怪兽上面，视为超量召唤特殊召唤，将此卡作为其超量素材。②：持有此卡作为超量素材的“编号99”超量怪兽获得以下效果。
    ●对手在战斗阶段发动怪兽的效果时发动（同一连锁上最多1次）。将此卡的超量素材全部去除，将对手场上的怪兽全部破坏。
