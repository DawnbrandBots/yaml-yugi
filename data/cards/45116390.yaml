name:
  en: Heavy Armored Knight Babeldecker
  de: Schwer gepanzerter Ritter Babeldecker
  es: Caballero Blindado Pesado Babelpisos
  fr: Babelétage Chevalier Blindé Lourd
  it: Cavaliere Corazzato Pesante Babelpiani
  pt: Cavaleiro de Armadura Pesada Babeldares
  ja: <ruby>重<rt>じゅう</rt></ruby><ruby>装<rt>そう</rt></ruby><ruby>騎<rt>き</rt></ruby><ruby>士<rt>し</rt></ruby>バベルデッカー
  ja_romaji: Jūsōkishi Baberu Dekkā
  ko: 중장기사 바벨데커
  ko_rr:
  zh-TW: 重裝騎士 巴別雙層列車
  zh-CN: 重装骑士 巴别双层列车
text:
  en: |-
    You can Normal Summon this card without Tributing. You can only use each of the following effects of "Heavy Armored Knight Babeldecker" once per turn. If this card is Normal or Special Summoned: You can Special Summon 1 EARTH Machine monster from your hand. During your Main Phase, if your opponent activated a card or effect this turn: You can Special Summon 1 Rank 10 EARTH Machine Xyz Monster from your Extra Deck using this card you control as material (this is treated as an Xyz Summon).
  de: |-
    Du kannst diese Karte als Normalbeschwörung beschwören, ohne Tribut anzubieten. Du kannst jeden der folgenden Effekte von „Schwer gepanzerter Ritter Babeldecker“ nur einmal pro Spielzug verwenden. Falls diese Karte als Normal- oder Spezialbeschwörung beschworen wird: Du kannst 1 ERDE Maschine-Monster als Spezialbeschwörung von deiner Hand beschwören. Während deiner Main Phase, falls dein Gegner in diesem Spielzug eine Karte oder einen Effekt aktiviert hat: Du kannst 1 ERDE Maschine-Xyz-Monster des Rangs 10 als Spezialbeschwörung von deinem Extra Deck beschwören, indem du diese Karte, die du kontrollierst, als Material verwendest (dies wird als Xyz-Beschwörung behandelt).
  es: |-
    Puedes Invocar esta carta de Modo Normal sin Sacrificar. Sólo puedes usar cada uno de los siguientes efectos de "Caballero Blindado Pesado Babelpisos" una vez por turno. Si esta carta es Invocada de Modo Normal o Especial: puedes Invocar de Modo Especial, desde tu mano, 1 monstruo Máquina de TIERRA. Durante tu Main Phase, si tu adversario activó una carta o efecto este turno: puedes Invocar de Modo Especial 1 Monstruo Xyz Máquina de TIERRA de Rango 10 desde tu Deck Extra usando esta carta que controlas como material (esto se trata como una Invocación Xyz).
  fr: |-
    Vous pouvez Invoquer Normalement cette carte sans Sacrifices. Vous ne pouvez utiliser chacun des effets suivants de "Babelétage Chevalier Blindé Lourd" qu'une fois par tour. Si cette carte est Invoquée Normalement ou Spécialement : vous pouvez Invoquer Spécialement 1 monstre TERRE Machine depuis votre main. Durant votre Main Phase, si votre adversaire a activé une carte ou un effet ce tour : vous pouvez Invoquer Spécialement 1 Monstre Xyz TERRE Machine de Rang 10 depuis votre Extra Deck en utilisant cette carte que vous contrôlez comme Matériel (ceci est traité comme Invocation Xyz).
  it: |-
    Puoi Evocare Normalmente questa carta senza offrire Tributi. Puoi utilizzare ognuno dei seguenti effetti di "Cavaliere Corazzato Pesante Babelpiani" una sola volta per turno. Se questa carta viene Evocata Normalmente o Specialmente: puoi Evocare Specialmente 1 mostro TERRA Macchina dalla tua mano. Durante la tua Main Phase, se il tuo avversario ha attivato una carta o un effetto in questo turno: puoi Evocare Specialmente 1 Mostro Xyz TERRA Macchina di Rango 10 dal tuo Extra Deck utilizzando questa carta che controlli come materiale (questa viene considerata come un'Evocazione Xyz).
  pt: |-
    Você pode Invocar este card por Invocação-Normal sem oferecer Tributo. Você só pode usar cada um dos seguintes efeitos de "Cavaleiro de Armadura Pesada Babeldares" uma vez por turno. Se este card for Invocado por Invocação-Normal ou Especial: você pode Invocar por Invocação-Especial 1 monstro Máquina de TERRA da sua mão. Durante sua Fase Principal, se seu oponente ativou um card ou efeito neste turno: você pode Invocar por Invocação-Especial 1 Monstro Xyz Máquina de TERRA de Classe 10 do seu Deck Adicional usando este card que você controla como matéria (isso é considerado uma Invocação-Xyz).
  ja: |-
    このカード名の②③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードはリリースなしで召喚できる。②：このカードが召喚・特殊召喚した場合に発動できる。手札から機械族・地属性モンスター１体を特殊召喚する。③：相手がカードの効果を発動したターンの自分メインフェイズに発動できる。機械族・地属性・ランク１０のＸモンスター１体を自分フィールドのこのカードの上に重ねてＸ召喚扱いでＥＸデッキから特殊召喚する。
  ko: |-
    이 카드명의 ②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드는 릴리스 없이 일반 소환할 수 있다. ②: 이 카드를 일반 소환 / 특수 소환했을 경우에 발동할 수 있다. 패에서 기계족 / 땅 속성 몬스터 1장을 특수 소환한다. ③: 상대가 카드의 효과를 발동한 턴의 자신 메인 페이즈에 발동할 수 있다. 기계족 / 땅 속성 / 랭크 10 인 엑시즈 몬스터 1장을 자신 필드의 이 카드 위에 겹쳐 엑시즈 소환으로 취급하고 엑스트라 덱에서 특수 소환한다.
  zh-TW:
  zh-CN: |-
    此卡名的②③效果1回合仅可各使用1次。①：此卡无需解放即可召唤。②：此卡召唤・特殊召唤的情况下可以发动。从手牌将1只机械族・地属性怪兽特殊召唤。③：在对手发动过卡的效果的回合的、自己的主要阶段可以发动。从额外牌组将1只机械族・地属性・阶级10的超量怪兽重叠在自己场上的此卡上面，视为超量召唤特殊召唤。
