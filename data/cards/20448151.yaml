name:
  en: Clown Crew Rehearsal
  de: Clowntrupp-Probe
  es: Ensayo de la Compañía de Payasos
  fr: Répétition de la Troupe des Clowns
  it: Prova Compagnia di Clown
  pt: Ensaio da Companhia de Palhaços
  ja: <ruby>道化の一座<rt>クラウン・クラン</rt></ruby>『<ruby>下稽古<rt>リハーサル</rt></ruby>』
  ja_romaji: Kuraun Kuran "Rihāsaru"
  ko: 크라운 클랜 『리허설』
  ko_rr:
  zh-TW:
  zh-CN: 小丑戏帮《排练》
text:
  en: |-
    Tribute 1 monster from your hand or field; add 1 "Clown Crew Biancaviso" and 1 "Clown Crew" Spell/Trap, except "Clown Crew Rehearsal", from your Deck to your hand. You can banish this card from your GY; Ritual Summon 1 "Clown Crew" Ritual Monster from your hand, by Tributing monsters from your hand or field whose total Levels equal or exceed its Level. You can only use each effect of "Clown Crew Rehearsal" once per turn.
  de: |-
    Biete 1 Monster von deiner Hand oder Spielfeldseite als Tribut an; füge deiner Hand 1 „Clowntrupp Biancaviso“ und 1 „Clowntrupp“-Zauber/Falle, außer „Clowntrupp-Probe“, von deinem Deck hinzu. Du kannst diese Karte von deinem Friedhof verbannen; beschwöre 1 „Clowntrupp“-Ritualmonster als Ritualbeschwörung von deiner Hand, indem du Monster von deiner Hand oder Spielfeldseite als Tribut anbietest, deren gemeinsame Stufe größer oder gleich seiner Stufe ist. Du kannst jeden Effekt von „Clowntrupp-Probe“ nur einmal pro Spielzug verwenden.
  es: |-
    Sacrifica 1 monstruo en tu mano o Campo; añade a tu mano 1 "Biancaviso de la Compañía de Payasos" y 1 Mágica/Trampa "Compañía de Payasos", excepto "Ensayo de la Compañía de Payasos", en tu Deck. Puedes desterrar esta carta en tu Cementerio; Invoca por Ritual 1 Monstruo de Ritual "Compañía de Payasos" desde tu mano, Sacrificando monstruos en tu mano o Campo cuyos Niveles totales sean iguales o superen su Nivel. Sólo puedes usar cada efecto de "Ensayo de la Compañía de Payasos" una vez por turno.
  fr:
  it: |-
    Offri come Tributo 1 mostro dalla tua mano o Terreno; aggiungi 1 "Compagnia di Clown Biancaviso" e 1 Magia/Trappola "Compagnia di Clown", eccetto "Prova Compagnia di Clown", dal tuo Deck alla tua mano. Puoi bandire questa carta dal tuo Cimitero; Evoca tramite Rituale 1 Mostro Rituale "Compagnia di Clown" dalla tua mano, offrendo come Tributo mostri dalla tua mano o Terreno con Livello totale pari o superiore al suo Livello. Puoi utilizzare ogni effetto di "Prova Compagnia di Clown" una sola volta per turno.
  pt: |-
    Ofereça como Tributo 1 monstro da sua mão ou do campo; adicione 1 "Companhia de Palhaços Biancaviso" e 1 Magia/Armadilha "Companhia de Palhaços", exceto "Ensaio da Companhia de Palhaços", do seu Deck à sua mão. Você pode banir este card do seu Cemitério; Invoque por Invocação-Ritual 1 Monstro de Ritual "Companhia de Palhaços" da sua mão, ao oferecer como Tributo monstros da sua mão ou do campo cuja soma dos Níveis seja igual ou exceda seu Nível. Você só pode usar cada efeito de "Ensaio da Companhia de Palhaços" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分の手札・フィールドのモンスター１体をリリースして発動できる。デッキから「道化の一座『下稽古』」以外の「道化の一座」魔法・罠カード１枚と「道化の一座 ホワイトフェイス」１体を手札に加える。②：墓地のこのカードを除外して発動できる。レベルの合計が儀式召喚するモンスターのレベル以上になるように、自分の手札・フィールドのモンスターをリリースし、手札から「道化の一座」儀式モンスター１体を儀式召喚する。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신의 패 / 필드의 몬스터 1장을 릴리스하고 발동할 수 있다. 덱에서 "크라운 클랜 『리허설』" 이외의 "크라운 클랜" 마법 / 함정 카드 1장과 "크라운 클랜 화이트페이스" 1장을 패에 넣는다. ②: 묘지의 이 카드를 제외하고 발동할 수 있다. 레벨의 합계가 의식 소환할 몬스터의 레벨 이상이 되도록, 자신의 패 / 필드의 몬스터를 릴리스하고, 패에서 "크라운 클랜" 의식 몬스터 1장을 의식 소환한다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：解放自己手牌・场上的1只怪兽可以发动。从牌组将“小丑戏帮《排练》”以外的1张“小丑戏帮”魔法・陷阱卡与1只“小丑戏帮 白脸”加入手牌。②：将墓地的此卡除外可以发动。为使合计等级达到仪式召唤的怪兽的等级以上，解放自己的手牌・场上的怪兽，从手牌将1只“小丑戏帮”仪式怪兽仪式召唤。
