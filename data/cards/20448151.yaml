text:
  en: |-
    Tribute 1 monster from your hand or field; add 1 "Clown Clan Whiteface" and 1 "Clown Clan" Spell/Trap from your Deck to your hand, except "Clown Clan "Rehearsal"". You can banish this card from your GY; Ritual Summon 1 "Clown Clan" Ritual Monster from your hand, by Tributing monsters from your hand or field whose total Levels equal or exceed its Level. You can only use each effect of "Clown Clan "Rehearsal"" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分の手札・フィールドのモンスター１体をリリースして発動できる。デッキから「道化の一座『下稽古』」以外の「道化の一座」魔法・罠カード１枚と「道化の一座 ホワイトフェイス」１体を手札に加える。②：墓地のこのカードを除外して発動できる。レベルの合計が儀式召喚するモンスターのレベル以上になるように、自分の手札・フィールドのモンスターをリリースし、手札から「道化の一座」儀式モンスター１体を儀式召喚する。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신의 패 / 필드의 몬스터 1장을 릴리스하고 발동할 수 있다. 덱에서 "크라운 클랜 『리허설』" 이외의 "크라운 클랜" 마법 / 함정 카드 1장과 "크라운 클랜 화이트페이스" 1장을 패에 넣는다. ②: 묘지의 이 카드를 제외하고 발동할 수 있다. 레벨의 합계가 의식 소환할 몬스터의 레벨 이상이 되도록, 자신의 패 / 필드의 몬스터를 릴리스하고, 패에서 "크라운 클랜" 의식 몬스터 1장을 의식 소환한다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：解放自己手牌・场上的1只怪兽可以发动。从牌组将“小丑戏帮《排练》”以外的1张“小丑戏帮”魔法・陷阱卡与1只“小丑戏帮 白脸”加入手牌。②：将墓地的此卡除外可以发动。为使合计等级达到仪式召唤的怪兽的等级以上，解放自己的手牌・场上的怪兽，从手牌将1只“小丑戏帮”仪式怪兽仪式召唤。
