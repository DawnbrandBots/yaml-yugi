name:
  en: Pot of Sloth
  de: Topf der Faulheit
  es: Olla de la Pereza
  fr: Pot de Paresse
  it: Giara dell'Accidia
  pt: Pote da Preguiça
  ja: <ruby>怠<rt>たい</rt></ruby><ruby>慢<rt>まん</rt></ruby>な<ruby>壺<rt>つぼ</rt></ruby>
  ja_romaji: Taiman na Tsubo
  ko:
  ko_rr:
  zh-TW:
  zh-CN: 怠慢之壶
text:
  en: |-
    Draw cards equal to the number of cards your opponent controls, then if you drew 2 or more cards, place cards from your hand on the bottom of the Deck in any order, equal to the number you drew -1. For the rest of this turn after this card resolves, you cannot activate "Pot of Sloth".
  de: |-
    Ziehe Karten in Höhe der Anzahl der Karten, die dein Gegner kontrolliert, dann, falls du 2 oder mehr Karten gezogen hast, lege Karten in Höhe der Anzahl der gezogenen Karten -1 von deiner Hand in beliebiger Reihenfolge unters Deck. Für den Rest dieses Spielzugs, nachdem diese Karte aufgelöst wurde, kannst du keinen „Topf der Faulheit“ aktivieren.
  es: |-
    Roba cartas igual al número de cartas que controle tu adversario y después, si robaste 2 o más cartas, pon en la parte inferior del Deck, en cualquier orden, cartas en tu mano igual al número de las que robaste -1. Por el resto de este turno después de que esta carta se resuelva, no puedes activar "Olla de la Pereza".
  fr: |-
    Piochez un nombre de cartes égal au nombre de cartes contrôlées par votre adversaire, puis si vous avez pioché min. 2 cartes, placez un nombre de cartes depuis votre main au-dessous du Deck dans l'ordre de votre choix, égal au nombre que vous avez pioché -1. Le reste de ce tour après la résolution de cette carte, vous ne pouvez pas activer "Pot de Paresse".
  it: |-
    Pesca carte pari al numero di carte controllate dal tuo avversario, poi se hai pescato 2 o più carte, metti carte dalla tua mano in fondo al Deck in qualsiasi ordine, pari al numero che hai pescato -1. Per il resto di questo turno dopo che questa carta si è risolta, non puoi attivare "Giara dell'Accidia".
  pt: |-
    Compre cards igual ao número de cards que seu oponente controla e, depois, se você comprou 2 ou mais cards, coloque cards da sua mão no fundo do Deck em qualquer ordem, igual ao número que você comprou -1. Pelo resto deste turno depois que este card resolver, você não pode ativar "Pote da Preguiça".
  ja: |-
    ①：相手フィールドのカードの数だけ自分はドローする。２枚以上ドローした場合、さらにその数－１枚だけ、自分の手札を選んで好きな順番でデッキの下に戻す。このカードの発動後、ターン終了時まで自分は「怠慢な壺」を発動できない。
  ko:
  zh-TW:
  zh-CN: |-
    ①：自己依对手场上卡的数量抽牌。抽2张以上的情况下，进而依该数量-1，挑选自己手牌以喜欢的顺序放回牌组下面。此卡发动后，直至回合结束时为止自己不可发动“怠慢之壶”。
