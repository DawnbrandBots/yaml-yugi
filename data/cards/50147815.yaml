text:
  en: |-
    Special Summon 1 "Sacred Beast" monster from your hand or GY in Defense Position, then if you control 2 or more "Sacred Beast" monsters whose original Levels are 10, you can negate the effects of 1 face-up card your opponent controls, and if you do, destroy it. You can banish this card from your GY; Fusion Summon 1 "Phantasm" Fusion Monster from your Extra Deck, using monsters from your hand or field. You can only use each effect of "Destruction Chant of the Sacred Beast" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分の手札・墓地から「三幻魔」モンスター１体を守備表示で特殊召喚する。その後、自分フィールドに元々のレベルが１０の「三幻魔」モンスターが２体以上存在する場合、相手フィールドの表側表示カード１枚の効果を無効にし破壊できる。②：墓地のこのカードを除外して発動できる。自分の手札・フィールドのモンスターを融合素材とし、「幻魔」融合モンスター１体を融合召喚する。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：从自己手牌・墓地将1只“三幻魔”怪兽以守备表示特殊召唤。然后，自己场上存在2只以上原本等级为10的“三幻魔”怪兽的情况下，可将对手场上的1张表侧表示卡的效果无效并破坏。②：将墓地的此卡除外可以发动。将自己手牌・场上的怪兽作为融合素材，将1只“幻魔”融合怪兽融合召唤。
