name:
  en: Sacred Beasts Combined Assault
  de: Gemeinsamer Angriff der heiligen Ungeheuer
  es: Ataque Combinado de Bestias Sagradas
  fr: Attaque Combinée des Bêtes Sacrées
  it: Assalto Combinato Bestie Sacre
  pt: Ataque Combinado das Bestas Sagradas
  ja: <ruby>三<rt>さん</rt></ruby><ruby>幻<rt>げん</rt></ruby><ruby>魔<rt>ま</rt></ruby><ruby>合<rt>ごう</rt></ruby><ruby>殺<rt>さつ</rt></ruby>
  ja_romaji: Sangenma Gōsatsu
  ko: 삼환마합살
  ko_rr:
  zh-TW:
  zh-CN: 三幻魔合杀
text:
  en: |-
    Special Summon 1 "Sacred Beast" monster from your hand or GY in Defense Position, then if you control 2 or more "Sacred Beast" monsters whose original Levels are 10, you can negate the effects of 1 face-up card your opponent controls, and if you do, destroy it. You can banish this card from your GY; Fusion Summon 1 "Phantasm" Fusion Monster from your Extra Deck, using monsters from your hand or field. You can only use each effect of "Sacred Beasts Combined Assault" once per turn.
  de: |-
    Beschwöre 1 „Heiligen Ungeheuer“-Monster als Spezialbeschwörung von deiner Hand oder deinem Friedhof in die Verteidigungsposition, dann, falls du 2 oder mehr „Heiligen Ungeheuer“-Monster kontrollierst, deren Grund-Stufen 10 sind, kannst du die Effekte von 1 offenen Karte annullieren, die dein Gegner kontrolliert, und falls du dies tust, zerstöre sie. Du kannst diese Karte von deinem Friedhof verbannen; beschwöre 1 „Phantasma“-Fusionsmonster als Fusionsbeschwörung von deinem Extra Deck, indem du Monster von deiner Hand oder Spielfeldseite verwendest. Du kannst jeden Effekt von „Gemeinsamer Angriff der heiligen Ungeheuer“ nur einmal pro Spielzug verwenden.
  es: |-
    Invoca de Modo Especial, desde tu mano o Cementerio, 1 monstruo "Bestias Sagradas" en Posición de Defensa y después, si controlas 2 o más monstruos "Bestias Sagradas" cuyos Niveles originales sean 10, puedes negar los efectos de 1 carta boca arriba que controle tu adversario y, si lo haces, destrúyela. Puedes desterrar esta carta en tu Cementerio; Invoca por Fusión 1 Monstruo de Fusión "Fantasma" desde tu Deck Extra, usando monstruos en tu mano o Campo. Sólo puedes usar cada efecto de "Ataque Combinado de Bestias Sagradas" una vez por turno.
  fr: |-
    Invoquez Spécialement 1 monstre "Bêtes Sacrées" depuis votre main ou Cimetière en Position de Défense, puis si vous contrôlez min. 2 monstres "Bêtes Sacrées" dont le Niveau d'origine est 10, vous pouvez annuler les effets d'1 carte face recto contrôlée par votre adversaire, et si vous le faites, détruisez-la. Vous pouvez bannir cette carte depuis votre Cimetière ; Invoquez par Fusion 1 Monstre Fusion "Spectre" depuis votre Extra Deck, en utilisant des monstres depuis votre main ou Terrain. Vous ne pouvez utiliser chaque effet de "Attaque Combinée des Bêtes Sacrées" qu'une fois par tour.
  it: |-
    Evoca Specialmente 1 mostro "Bestia Sacra" dalla tua mano o Cimitero in Posizione di Difesa, poi se controlli 2 o più mostri "Bestia Sacra" i cui Livelli originali sono 10, puoi annullare gli effetti di 1 carta scoperta controllata dal tuo avversario e, se lo fai, distruggila. Puoi bandire questa carta dal tuo Cimitero; Evoca tramite Fusione 1 Mostro Fusione "Fantasma" dal tuo Extra Deck, utilizzando mostri dalla tua mano o Terreno. Puoi utilizzare ogni effetto di "Assalto Combinato Bestie Sacre" una sola volta per turno.
  pt: |-
    Invoque por Invocação-Especial 1 monstro "Bestas Sagradas" da sua mão ou do Cemitério em Posição de Defesa e, depois, se você controlar 2 ou mais monstros "Bestas Sagradas" cujos Níveis originais sejam 10, você pode negar os efeitos de 1 card com a face para cima que seu oponente controla e, se isso acontecer, destrua-o. Você pode banir este card do seu Cemitério; Invoque por Invocação-Fusão 1 Monstro de Fusão "Fantasma" do seu Deck Adicional, usando monstros da sua mão ou do campo. Você só pode usar cada efeito de "Ataque Combinado das Bestas Sagradas" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分の手札・墓地から「三幻魔」モンスター１体を守備表示で特殊召喚する。その後、自分フィールドに元々のレベルが１０の「三幻魔」モンスターが２体以上存在する場合、相手フィールドの表側表示カード１枚の効果を無効にし破壊できる。②：墓地のこのカードを除外して発動できる。自分の手札・フィールドのモンスターを融合素材とし、「幻魔」融合モンスター１体を融合召喚する。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신의 패 / 묘지에서 "삼환마" 몬스터 1장을 수비 표시로 특수 소환한다. 그 후, 자신 필드에 원래의 레벨이 10 인 "삼환마" 몬스터가 2장 이상 존재할 경우, 상대 필드의 앞면 표시 카드 1장의 효과를 무효로 하고 파괴할 수 있다. ②: 묘지의 이 카드를 제외하고 발동할 수 있다. 자신의 패 / 필드의 몬스터를 융합 소재로 하고, "환마" 융합 몬스터 1장을 융합 소환한다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：从自己手牌・墓地将1只“三幻魔”怪兽以守备表示特殊召唤。然后，自己场上存在2只以上原本等级为10的“三幻魔”怪兽的情况下，可将对手场上的1张表侧表示卡的效果无效并破坏。②：将墓地的此卡除外可以发动。将自己手牌・场上的怪兽作为融合素材，将1只“幻魔”融合怪兽融合召唤。
