  zh-CN: |-
    “魔女工艺”怪兽＋魔法师族怪兽
    此卡名的①②效果1回合仅可各使用1次。①：在自己・对手的主要阶段及战斗阶段，可从以下效果中选择1个发动。●从牌组将1张“魔女工艺”魔法卡加入手牌。●向对手出示手牌的1张“魔女工艺”通常・速攻魔法卡可以发动。适用该魔法卡发动时的效果。②：在自己的结束阶段可以发动。将自己除外状态的1张“魔女工艺”卡放回墓地。
