  ja: |-
    「ウィッチクラフト」モンスター＋魔法使い族モンスター
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分・相手のメインフェイズ及びバトルフェイズに、以下の効果から１つを選択して発動できる。●デッキから「ウィッチクラフト」魔法カード１枚を手札に加える。●手札の「ウィッチクラフト」通常・速攻魔法カード１枚を相手に見せて発動できる。その魔法カード発動時の効果を適用する。②：自分エンドフェイズに発動できる。自分の除外状態の「ウィッチクラフト」カード１枚を墓地に戻す。
