  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：手札・フィールドのこのカードをリリースして発動できる。デッキから「フォトン」モンスター１体と「ギャラクシー」モンスター１体を選び、その内の１体を手札に加え、もう１体を墓地へ送る。このターン、自分は光属性モンスターしか特殊召喚できない。②：自分フィールドに「ギャラクシーアイズ」モンスターが特殊召喚された場合に発動できる。このカードを墓地から特殊召喚する。この効果で特殊召喚したこのカードは、フィールドから離れた場合に除外される。
