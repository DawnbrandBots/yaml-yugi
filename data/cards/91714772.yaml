text:
  en: |-
    You can Tribute this card from your hand or field; take 1 "Photon" monster and 1 "Galaxy" monster from your Deck, add 1 of them to your hand, and send the other to the GY, also you cannot Special Summon for the rest of this turn, except LIGHT monsters. If a "Galaxy-Eyes" monster(s) is Special Summoned to your field (except during the Damage Step): You can Special Summon this card from your GY, but banish it when it leaves the field. You can only use each effect of "Galaxy Defense Robot Orbital 7" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：手札・フィールドのこのカードをリリースして発動できる。デッキから「フォトン」モンスター１体と「ギャラクシー」モンスター１体を選び、その内の１体を手札に加え、もう１体を墓地へ送る。このターン、自分は光属性モンスターしか特殊召喚できない。②：自分フィールドに「ギャラクシーアイズ」モンスターが特殊召喚された場合に発動できる。このカードを墓地から特殊召喚する。この効果で特殊召喚したこのカードは、フィールドから離れた場合に除外される。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 패 / 필드의 이 카드를 릴리스하고 발동할 수 있다. 덱에서 "포톤" 몬스터 1장과 "갤럭시" 몬스터 1장을 골라, 그 중의 1장을 패에 넣고, 나머지 1장을 묘지로 보낸다. 이 턴에, 자신은 빛 속성 몬스터밖에 특수 소환할 수 없다. ②: 자신 필드에 "갤럭시아이즈" 몬스터가 특수 소환되었을 경우에 발동할 수 있다. 이 카드를 묘지에서 특수 소환한다. 이 효과로 특수 소환한 이 카드는, 필드에서 벗어났을 경우에 제외된다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：解放手牌・场上的此卡可以发动。从牌组挑选1只“光子”怪兽和1只“银河”怪兽，将其中1只加入手牌，另1只送至墓地。此回合，自己仅可特殊召唤光属性怪兽。②：“银河眼”怪兽被特殊召唤至自己场上的情况下可以发动。从墓地将此卡特殊召唤。以此效果特殊召唤的此卡从场上离开的情况下，将其除外。
