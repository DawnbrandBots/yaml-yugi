text:
  en: |-
    1 "Aleister" monster + 1 LIGHT or EARTH monster
    If this card is Special Summoned: You can add 1 "Virakam the Artificial Spirit" or "Magical Name - "Rosa Mundi"" from your Deck to your hand, then you can banish 1 monster from either GY. You can banish this card from your GY, then target 1 Fusion Monster you control; all monsters your opponent currently controls lose ATK equal to that monster's until the end of this turn. You can only use each effect of "Invoked Babalon" once per turn.
