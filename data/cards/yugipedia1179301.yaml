  en: |-
    Cannot be Normal Summoned/Set. Must be Special Summoned with a "Sacred Beast" card. You can reveal this card in your hand; add 1 "Sacred Beast" Trap from your Deck to your hand, then discard 1 card. You can only use this effect of "Uria, Lord of Searing Flames - Sacred Beast of Cataclysmic Fire" once per turn. Gains 1000 ATK/DEF for each Trap in the GYs. Once per turn (Quick Effect): You can target 1 Spell/Trap on the field; destroy it. Neither player can activate cards or effects in response to this effect's activation.
