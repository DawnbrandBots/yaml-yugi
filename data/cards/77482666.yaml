  zh-CN: |-
    此卡名的①效果1回合仅可使用1次。①：在自己・对手的主要阶段，解放场上的此卡以外的、自己手牌・场上的1只怪兽，可从以下效果中选择1个发动。●从手牌・牌组将除“疾风的豹战士”以外的、1只记载有“时间黑魔术师”卡名的怪兽特殊召唤。●从牌组将1张记载有“时间黑魔术师”卡名的魔法・陷阱卡送至墓地。②：此卡必须在有怪兽被解放的回合才可以攻击宣言。
