  ja: |-
    このカード名の①の効果は１ターンに１度しか使用できない。①：自分・相手のメインフェイズに、フィールドのこのカード以外の自分の手札・フィールドのモンスター１体をリリースし、以下の効果から１つを選択して発動できる。●「疾風の豹戦士パンサーウォリアー」を除く、「時の黒魔術師」のカード名が記されたモンスター１体を手札・デッキから特殊召喚する。●デッキから「時の黒魔術師」のカード名が記された魔法・罠カード１枚を墓地へ送る。②：このカードはモンスターがリリースされたターンでなければ攻撃宣言できない。
  ko:
