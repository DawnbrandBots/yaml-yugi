text:
  en: |-
    Fusion Summon 1 Fusion Monster from your Extra Deck, using monsters you control. If Summoning an "Invoked" Fusion Monster this way, you can also return banished monsters to the GY as material. During your Main Phase, if this card is in your GY: You can target 1 "Aleister" monster or "Invocation" in your GY; shuffle this card into the Deck, and if you do, add the targeted card to your hand. You can only use each effect of "Invocation "Sword"" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分フィールドのモンスターを融合素材とし、融合モンスター１体を融合召喚する。「召喚獣」融合モンスターを融合召喚する場合、自分・相手の除外状態のモンスターを墓地に戻して融合素材とする事もできる。②：自分メインフェイズにこのカードが墓地に存在する場合、自分の墓地の「アレイスター」モンスター１体か「召喚魔術」１枚を対象として発動できる。このカードをデッキに戻し、対象のカードを手札に加える。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：以自己场上的怪兽作为融合素材，将1只融合怪兽融合召唤。要融合召唤“召唤兽”融合怪兽的情况下，也可将自己・对手除外状态的怪兽放回墓地来作为融合素材。②：在自己的主要阶段，此卡存在于墓地的情况下，以自己墓地的1只“阿莱斯特”怪兽或1张“召唤魔术”为对象可以发动。将此卡放回牌组，将对象卡加入手牌。
