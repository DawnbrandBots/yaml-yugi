  de: Beschwörung - „Schwert“
  es: Invokación - "Espada"
  fr: Invokhation - "Épée"
  it: Invokazione - "Spada"
  pt: Invokação - "Espada"
  ja: <ruby>召<rt>しょう</rt></ruby><ruby>喚<rt>かん</rt></ruby><ruby>魔<rt>ま</rt></ruby><ruby>術<rt>じゅつ</rt></ruby>－「<ruby>剣<rt>つるぎ</rt></ruby>」
  ja_romaji: Shōkan Majutsu - "Tsurugi"
  ko: 소환마술－「검」
  ko_rr:
  zh-TW:
  zh-CN: 召唤魔术－“剑”
text:
  en: |-
    Fusion Summon 1 Fusion Monster from your Extra Deck, using monsters you control. If Summoning an "Invoked" Fusion Monster this way, you can also return monsters from any banishment to the GY as material. During your Main Phase, if this card is in your GY: You can target 1 "Aleister" monster or "Invocation" in your GY; shuffle this card into the Deck, and if you do, add that target to your hand. You can only use each effect of "Invocation - "Sword"" once per turn.
  de: |-
    Beschwöre 1 Fusionsmonster als Fusionsbeschwörung von deinem Extra Deck, indem du Monster verwendest, die du kontrollierst. Falls du ein „Beschworen“-Fusionsmonster auf diese Art beschwörst, kannst du auch verbannte Monster als Material auf den Friedhof zurücklegen. Während deiner Main Phase, falls sich diese Karte in deinem Friedhof befindet: Du kannst 1 „Aleister“-Monster oder „Beschwörung“ in deinem Friedhof wählen; mische diese Karte ins Deck und falls du dies tust, füge jenes gewählte Ziel deiner Hand hinzu. Du kannst jeden Effekt von „Beschwörung - „Schwert““ nur einmal pro Spielzug verwenden.
  es: |-
    Invoca por Fusión 1 Monstruo de Fusión desde tu Deck Extra, usando monstruos que controlas. Si Invocas un Monstruo de Fusión "Invokado/a" de esta forma, también puedes devolver al Cementerio monstruos en cualquier destierro como material. Durante tu Main Phase, si esta carta está en tu Cementerio: puedes seleccionar 1 monstruo "Aleister" o "Invokación" en tu Cementerio; baraja esta carta al Deck y, si lo haces, añade ese objetivo a tu mano. Sólo puedes usar cada efecto de "Invokación - "Espada"" una vez por turno.
  fr: |-
    Invoquez par Fusion 1 Monstre Fusion depuis votre Extra Deck, en utilisant des monstres que vous contrôlez. Si vous Invoquez un Monstre Fusion "Invokhé" de cette façon, vous pouvez aussi renvoyer des monstres depuis les bannissements au Cimetière comme Matériel. Durant votre Main Phase, si cette carte est dans votre Cimetière : vous pouvez cibler 1 monstre "Aleister" ou "Invokhation" dans votre Cimetière ; mélangez cette carte dans le Deck, et si vous le faites, ajoutez la cible à votre main. Vous ne pouvez utiliser chaque effet de "Invokhation - "Épée"" qu'une fois par tour.
  it: |-
    Evoca tramite Fusione 1 Mostro Fusione dal tuo Extra Deck, utilizzando mostri che controlli. Se stai Evocando un Mostro Fusione "Invokato" in questo modo, puoi anche far ritornare nel Cimitero mostri da qualsiasi carte bandite come materiale. Durante la tua Main Phase, se questa carta è nel tuo Cimitero: puoi scegliere come bersaglio 1 mostro "Aleister" o "Invokazione" nel tuo Cimitero; mischia questa carta nel Deck e, se lo fai, aggiungi quel bersaglio alla tua mano. Puoi utilizzare ogni effetto di "Invokazione - "Spada"" una sola volta per turno.
  pt: |-
    Invoque por Invocação-Fusão 1 Monstro de Fusão do seu Deck Adicional, usando monstros que você controla. Se estiver Invocando um Monstro de Fusão "Invokado(a)" desta forma, você também pode devolver monstros de qualquer banimento para o Cemitério como matéria. Durante sua Fase Principal, se este card estiver no seu Cemitério: você pode escolher 1 monstro "Aleister" ou "Invokação" no seu Cemitério; embaralhe este card no Deck e, se isso acontecer, adicione o alvo à sua mão. Você só pode usar cada efeito de "Invokação - "Espada"" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分フィールドのモンスターを融合素材とし、融合モンスター１体を融合召喚する。「召喚獣」融合モンスターを融合召喚する場合、自分・相手の除外状態のモンスターを墓地に戻して融合素材とする事もできる。②：自分メインフェイズにこのカードが墓地に存在する場合、自分の墓地の「アレイスター」モンスター１体か「召喚魔術」１枚を対象として発動できる。このカードをデッキに戻し、対象のカードを手札に加える。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신 필드의 몬스터를 융합 소재로 하고, 융합 몬스터 1장을 융합 소환한다. "소환수" 융합 몬스터를 융합 소환할 경우, 자신 / 상대의 제외 상태인 몬스터를 묘지로 되돌리고 융합 소재로 할 수도 있다. ②: 자신 메인 페이즈에 이 카드가 묘지에 존재할 경우, 자신 묘지의 "알레이스터" 몬스터 1장이나 "소환마술" 1장을 대상으로 하고 발동할 수 있다. 이 카드를 덱으로 되돌리고, 대상의 카드를 패에 넣는다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：以自己场上的怪兽作为融合素材，将1只融合怪兽融合召唤。要融合召唤“召唤兽”融合怪兽的情况下，也可将自己・对手除外状态的怪兽放回墓地来作为融合素材。②：在自己的主要阶段，此卡存在于墓地的情况下，以自己墓地的1只“阿莱斯特”怪兽或1张“召唤魔术”为对象可以发动。将此卡放回牌组，将对象卡加入手牌。
