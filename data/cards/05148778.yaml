  fr: Dragon Ailé Venin Affamé
  it: Drago Ala Veleno Affamato
  pt: Dragão Alado de Peçonha Insaciável
  ja: <ruby>覇<rt>は</rt></ruby><ruby>王<rt>おう</rt></ruby><ruby>暴<rt>ぼう</rt></ruby><ruby>竜<rt>りゅう</rt></ruby>スターヴ・ヴェノム・ウィング・ドラゴン
  ja_romaji: Haōbōryū Sutāvu Venomu Wingu Doragon
  ko: 패왕폭룡 스타브 베놈 윙 드래곤
  ko_rr:
  zh-TW: 霸王暴龍 凶餓猛毒透翼龍
  zh-CN: 霸王暴龙 凶饿猛毒透翼龙
text:
  en: |-
    1 Fusion Monster + 1 "Clear Wing" monster
    Once per turn, if your opponent Special Summons a monster(s) face-up (except during the Damage Step): You can target 1 of them; this card gains ATK equal to that monster's ATK, and if it does, that monster's effects are negated. These changes last until the end of this turn. Once per turn, when another card or their effect is activated on the field (Quick Effect): You can destroy 1 card on the field. If this card in the Monster Zone is destroyed: You can place this card in your Pendulum Zone.
  de: |-
    1 Fusionsmonster + 1 „Glasflügel“-Monster
    Einmal pro Spielzug, falls dein Gegner ein oder mehr Monster offen als Spezialbeschwörung beschwört (außer während des Damage Steps): Du kannst 1 von ihnen wählen; diese Karte erhält ATK in Höhe der ATK jenes Monsters und falls sie dies tut, werden die Effekte jenes Monsters annulliert. Diese Änderungen dauern bis zum Ende dieses Spielzugs an. Einmal pro Spielzug, wenn eine andere Karte oder ihr Effekt auf dem Spielfeld aktiviert wird (Schnelleffekt): Du kannst 1 Karte auf dem Spielfeld zerstören. Falls diese Karte in der Monsterzone zerstört wird: Du kannst diese Karte in deine Pendelzone legen.
  es: |-
    1 Monstruo de Fusión + 1 monstruo "Ala Transparente"
    Una vez por turno, si tu adversario Invoca de Modo Especial uno o más monstruos boca arriba (excepto durante el Damage Step): puedes seleccionar 1 de ellos; esta carta gana ATK igual al ATK de ese monstruo y, si lo hace, los efectos de ese monstruo son negados. Estos cambios duran hasta el final de este turno. Una vez por turno, cuando otra carta o su efecto es activado en el Campo (Efecto Rápido): puedes destruir 1 carta en el Campo. Si esta carta en la Zona de Monstruos es destruida: puedes poner esta carta en tu Zona de Péndulo.
  fr: |-
    1 Monstre Fusion + 1 monstre "Aile Claire"
    Une fois par tour, si votre adversaire Invoque Spécialement face recto un ou plusieurs monstres (sauf durant la Damage Step) : vous pouvez en cibler 1 ; cette carte gagne une ATK égale à l'ATK du monstre, et si elle le fait, les effets du monstre sont annulés. Ces changements durent jusqu'à la fin de ce tour. Une fois par tour, lorsqu'une autre carte ou son effet est activé sur le Terrain (Effet Rapide) : vous pouvez détruire 1 carte sur le Terrain. Si cette carte dans la Zone Monstre est détruite : vous pouvez placer cette carte dans votre Zone Pendule.
  it: |-
    1 Mostro Fusione + 1 mostro "Ala Chiara"
    Una volta per turno, se il tuo avversario Evoca Specialmente uno o più mostri scoperti (eccetto durante il Damage Step): puoi scegliere 1 di essi come bersaglio; questa carta guadagna ATK pari all'ATK di quel mostro e, se lo fa, gli effetti di quel mostro sono annullati. Questi cambi durano fino alla fine di questo turno. Una volta per turno, quando un'altra carta o un suo effetto viene attivato sul Terreno (Effetto Rapido): puoi distruggere 1 carta sul Terreno. Se questa carta nella Zona Mostri viene distrutta: puoi mettere questa carta nella tua Zona Pendulum.
  pt: |-
    1 Monstro de Fusão + 1 monstro "Asas Transparentes"
    Uma vez por turno, se seu oponente Invocar por Invocação-Especial um ou mais monstros com a face para cima (exceto durante a Etapa de Dano): você pode escolher 1 deles; este card ganha ATK igual ao ATK desse monstro e, se isso acontecer, os efeitos desse monstro são negados. Essas mudanças duram até o final deste turno. Uma vez por turno, quando outro card ou seus efeitos forem ativados no campo (Efeito Rápido): você pode destruir 1 card no campo. Se este card na Zona de Monstros for destruído: você pode colocar este card na sua Zona de Pêndulo.
  ja: |-
    融合モンスター＋「クリアウィング」モンスター
    ①：１ターンに１度、相手がモンスターを表側表示で特殊召喚した場合、その内の１体を対象として発動できる。ターン終了時まで、そのモンスターの攻撃力分だけこのカードの攻撃力をアップし、そのモンスターの効果は無効化される。②：１ターンに１度、このカード以外のカードの効果がフィールドで発動した時に発動できる。フィールドのカード１枚を破壊する。③：モンスターゾーンのこのカードが破壊された場合に発動できる。このカードを自分のＰゾーンに置く。
  ko: |-
    융합 몬스터 ＋ "클리어윙" 몬스터
    ①: 1턴에 1번, 상대가 몬스터를 앞면 표시로 특수 소환했을 경우, 그 중의 1장을 대상으로 하고 발동할 수 있다. 턴 종료시까지, 그 몬스터의 공격력만큼만 이 카드의 공격력을 올리고, 그 몬스터의 효과는 무효화된다. ②: 1턴에 1번, 이 카드 이외의 카드의 효과가 필드에서 발동했을 때에 발동할 수 있다. 필드의 카드 1장을 파괴한다. ③: 몬스터 존의 이 카드가 파괴되었을 경우에 발동할 수 있다. 이 카드를 자신의 펜듈럼 존에 놓는다.
  zh-TW:
  zh-CN: |-
    融合怪兽＋“清透翼”怪兽
    ①：1回合1次，对手将怪兽以表侧表示特殊召唤的情况下，以其中1只为对象可以发动。直至回合结束时为止，此卡的攻击力上升相当于该怪兽攻击力的数值，该怪兽的效果无效化。②：1回合1次，此卡以外的卡的效果在场上发动时可以发动。将场上的1张卡破坏。③：怪兽区域的此卡被破坏的情况下可以发动。将此卡放在自己的灵摆区域。
