pendulum_effect:
  en: |-
    Each time a monster(s) is Special Summoned to your opponent's field, place 1 Predator Counter on it, and if it is Level 2 or higher, it becomes Level 1 as long as it has a Predator Counter.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    ①：このカードがＰゾーンに存在する限り、相手フィールドにモンスターが特殊召喚される度に、そのモンスターに捕食カウンターを１つ置く。捕食カウンターが置かれたレベル２以上のモンスターのレベルは１になる。
  ko: |-
    ①: 이 카드가 펜듈럼 존에 존재하는 한, 상대 필드에 몬스터가 특수 소환될 때마다, 그 몬스터에 포식 카운터를 1개 놓는다. 포식 카운터가 놓여진 레벨 2 이상의 몬스터의 레벨은 1 이 된다.
  zh-TW:
  zh-CN: |-
    ①：只要此卡存在于灵摆区域，每当有怪兽被特殊召唤至对手场上，就在该怪兽上放1个捕食计数物。放有捕食计数物的等级2以上怪兽的等级变为1。
