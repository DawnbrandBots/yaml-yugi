pendulum_scale: 10
pendulum_effect:
  en: |-
    Each time a monster(s) is Special Summoned to your opponent's field, place 1 Predator Counter on it, and if it is Level 2 or higher, it becomes Level 1 as long as it has a Predator Counter.
  de: |-
    Jedes Mal, wenn ein oder mehr Monster als Spezialbeschwörung auf die Spielfeldseite deines Gegners beschworen werden, lege 1 Raubtier-Zählmarke darauf und falls sie Stufe 2 oder höher sind, werden sie zu Stufe 1, solange sie eine Raubtier-Zählmarke haben.
  es: |-
    Cada vez que uno o más monstruos son Invocados de Modo Especial al Campo de tu adversario, pon 1 Contador de Predador en él y, si es de Nivel 2 o mayor, éste se convierte en Nivel 1 mientras tenga un Contador de Predador.
  fr: |-
    Chaque fois qu'un ou plusieurs monstres sont Invoqués Spécialement sur le Terrain de votre adversaire, placez 1 Compteur Prédateur sur celui-ci, et s'il est min. Niveau 2, il devient Niveau 1 tant qu'il a un Compteur Prédateur.
  it: |-
    Ogni volta che uno o più mostri vengono Evocati Specialmente sul Terreno del tuo avversario, metti 1 Segnalino Predatore su di essi e, se sono di Livello 2 o superiore, essi diventano di Livello 1 fino a quando hanno un Segnalino Predatore.
  pt: |-
    Sempre que um ou mais monstros forem Invocados por Invocação-Especial no campo do seu oponente, coloque 1 Marcador de Predador nele e, se ele for de Nível 2 ou mais, ele se torna de Nível 1 enquanto tiver um Marcador de Predador.
  ja: |-
    ①：このカードがＰゾーンに存在する限り、相手フィールドにモンスターが特殊召喚される度に、そのモンスターに捕食カウンターを１つ置く。捕食カウンターが置かれたレベル２以上のモンスターのレベルは１になる。
  ko: |-
    ①: 이 카드가 펜듈럼 존에 존재하는 한, 상대 필드에 몬스터가 특수 소환될 때마다, 그 몬스터에 포식 카운터를 1개 놓는다. 포식 카운터가 놓여진 레벨 2 이상의 몬스터의 레벨은 1 이 된다.
  zh-TW: |-
    ①：只要此卡存在於鐘擺區域，每當有怪獸被特殊召喚至對手場上，就在該怪獸上放1個捕食計數物。放有捕食計數物的等級2以上怪獸的等級變為1。
  zh-CN: |-
    ①：只要此卡存在于灵摆区域，每当有怪兽被特殊召唤至对手场上，就在该怪兽上放1个捕食计数物。放有捕食计数物的等级2以上怪兽的等级变为1。
