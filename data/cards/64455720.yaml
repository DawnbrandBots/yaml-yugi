  ja: |-
    このカード名のカードは１ターンに１枚しか発動できない。①：以下の効果から１つを選択して発動できる。
    ●このカードは通常モンスター（昆虫族・チューナー・闇・星１・攻／守０）となり、モンスターゾーンに特殊召喚する（罠カードとしては扱わない）。その後、Ｓモンスター１体のＳ召喚を行う事ができる。
    ●自分の墓地の「アシュトラ」モンスター１体を対象として発動できる。そのモンスターを特殊召喚する。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的卡1回合仅可发动1张。①：可从以下效果中选择1个发动。
    ●此卡变为通常怪兽（昆虫族・协调・暗・星1・攻/守0），特殊召唤至怪兽区域（不视为陷阱卡）。然后，可进行1只同步怪兽的同步召唤。
    ●以自己墓地的1只“艮鬼”怪兽为对象可以发动。将该怪兽特殊召唤。
