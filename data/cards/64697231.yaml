  zh-TW: 垃圾滑槽
  zh-CN: 垃圾滑槽
text:
  en: |-
    Activate only if your opponent has 4 or more cards in their hand. Look at your opponent's hand, select 1 Monster Card in it, and return that card to its owner's Deck.
  de: |-
    Falls dein Gegner 4 oder mehr Karten in seiner Hand hat: Sieh dir die Hand deines Gegners an und bestimme 1 Monster davon, das ins Deck gemischt wird.
  es: |-
    Si tu adversario tiene 4 o más cartas en su mano: mira la mano de tu adversario y elige 1 monstruo de ella para que lo baraje al Deck.
  fr: |-
    Si votre adversaire a min. 4 cartes dans sa main : regardez la main de votre adversaire et choisissez-en 1 monstre à mélanger dans le Deck.
  it: |-
    Se il tuo avversario ha 4 o più carte nella sua mano: guarda la mano del tuo avversario e seleziona 1 mostro da essa da mischiare nel Deck.
  pt: |-
    Se seu oponente tiver 4 ou mais cards na mão dele: olhe a mão do seu oponente e selecione 1 monstro dela para embaralhar no Deck.
  ja: |-
    相手の手札が４枚以上の場合に発動する事ができる。相手の手札を確認してモンスターカード１枚を選択し、そのカードを持ち主のデッキに戻す。
  ko: |-
    상대의 패가 4장 이상 있을 때, 발동할 수 있다. 상대의 패를 확인하고 몬스터 카드 1장을 선택하여, 그 카드의 주인의 덱으로 되돌리고 셔플한다.
  zh-TW:
  zh-CN: |-
    对方手卡是4张以上的场合才能发动。把对方手卡确认并选择1张怪兽卡，那张卡回到持有者的卡组。
