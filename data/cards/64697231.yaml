  de: Bodenklappenfalle
  es: Trampa de Tobogán
  fr: Chausse-Trape
  it: Trappola Botola
  pt: Trap Dustshoot
  ja: ダスト・シュート
  ja_romaji: Dasuto Shūto
  ko: 더스트 슛
