  ja: <ruby>糾罪巧<rt>エニアクラフト</rt></ruby><ruby>γ’<rt>トゥリト</rt></ruby>－「<ruby>ｅｘａｐａｔｉｓＩＡ<rt>エクサパティシア</rt></ruby>」
  ja_romaji: Eniakurafuto Turito - "Ekusapatishia"
  ko: 에니아크래프트γ’－「exapatisIA」
