    此卡名以①方法的特殊召唤1回合仅可进行1次，且②③效果1回合仅可各使用1次。①：此卡可通过将自己场上的最多2只怪兽放回手牌，来从手牌特殊召唤。②：此卡特殊召唤的情况下，向对手出示任意数量的手牌的怪兽（相同等级最多1只），依其数量以对手场上的表侧表示卡为对象可以发动。将该卡的效果无效。③：场上的此卡因效果被破坏并被送至墓地的情况下可以发动。将此卡加入手牌。
