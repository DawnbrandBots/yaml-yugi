text:
  en: |-
    You can Special Summon this card (from your hand) by returning up to 2 monsters you control to the hand. You can only Special Summon "Astrolasma Urania" once per turn this way. You can only use each of the following effects of "Astrolasma Urania" once per turn. If this card is Special Summoned: You can reveal any number of monsters with different Levels in your hand, then target that many face-up cards your opponent controls; negate their effects. If this card on the field is destroyed by card effect and sent to the GY: You can add this card to your hand.
