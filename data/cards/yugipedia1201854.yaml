text:
  en: |-
    You can Special Summon this card (from your hand) by revealing 1 face-down card you control and returning it to the hand/Extra Deck. You can only Special Summon "Mikumari the Sealing Deity Asutra" once per turn this way. You can only use each of the following effects of "Mikumari the Sealing Deity Asutra once per turn. During your Main Phase: You can add 1 non-Wyrm "Asutra" monster from your Deck to your hand. If this card is sent to the GY as Synchro Material for an "Asutra" monster: You can target 1 Normal Trap in your GY; Set it.
