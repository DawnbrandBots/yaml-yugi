text:
  en: |-
    Each time a non-Thunder monster(s) is Special Summoned face-up, while this card is in the Monster Zone: That monster(s) cannot attack this turn, also destroy it during the End Phase. If this card is in your GY: You can target 1 face-up card you control; destroy it, and if you do, add this card to your hand. You can only use this effect of "Thundercrash Snarecrow" once per turn.
  de: |-
    Jedes Mal, wenn ein oder mehr Nichtdonner-Monster offen als Spezialbeschwörung beschworen werden, solange diese Karte in der Monsterzone liegt: Jene Monster können in diesem Spielzug nicht angreifen, zusätzlich zerstöre sie während der End Phase. Falls sich diese Karte in deinem Friedhof befindet: Du kannst 1 offene Karte wählen, die du kontrollierst; zerstöre sie und falls du dies tust, füge diese Karte deiner Hand hinzu. Du kannst diesen Effekt von „Donnerschlag-Strickscheuche“ nur einmal pro Spielzug verwenden.
  es: |-
    Cada vez que uno o más monstruos no Trueno sean Invocados de Modo Especial boca arriba, mientras esta carta está en la Zona de Monstruos: ese monstruo o monstruos no pueden atacar este turno, y además destrúyelos durante la End Phase. Si esta carta está en tu Cementerio: puedes seleccionar 1 carta boca arriba que controles; destrúyela y, si lo haces, añade esta carta a tu mano. Sólo puedes usar este efecto de "Espantrampájaros del Estallido de Trueno" una vez por turno.
  fr: |-
    Chaque fois qu'un ou plusieurs monstres non-Tonnerre sont Invoqués Spécialement face recto, tant que cette carte est dans la Zone Monstre : ces monstres ne peuvent pas attaquer ce tour, et aussi, détruisez-les durant la End Phase. Si cette carte est dans votre Cimetière : vous pouvez cibler 1 carte face recto que vous contrôlez ; détruisez-la, et si vous le faites, ajoutez cette carte à votre main. Vous ne pouvez utiliser cet effet de "Piègevantail du Tonnerre Fracassant" qu'une fois par tour.
  it: |-
    Ogni volta che uno o più mostri non-Tuono vengono Evocati Specialmente scoperti, mentre questa carta è nella Zona Mostri: quei mostri non possono attaccare in questo turno, inoltre distruggili durante la End Phase. Se questa carta è nel tuo Cimitero: puoi scegliere come bersaglio 1 carta scoperta che controlli; distruggila e, se lo fai, aggiungi questa carta alla tua mano. Puoi utilizzare questo effetto di "Intrappolapasseri Tuonoschianto" una sola volta per turno.
  pt: |-
    Sempre que um ou mais monstros não-Trovão forem Invocados por Invocação-Especial com a face para cima, enquanto este card estiver na Zona de Monstros: esse(s) monstro(s) não pode(m) atacar neste turno e, além disso, destrua-o(s) durante a Fase Final. Se este card estiver no seu Cemitério: você pode escolher 1 card com a face para cima que você controla; destrua-o e, se isso acontecer, adicione este card à sua mão. Você só pode usar este efeito de "Trovão Estrondoso Esbustalho" uma vez por turno.
