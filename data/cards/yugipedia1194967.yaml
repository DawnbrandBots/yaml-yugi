    此卡名的卡1回合仅可发动1张。①：作为此卡发动时的效果处理，可从牌组将“破械转生”以外的、1张“破械”魔法卡或“双王之械”加入手牌。②：1回合1次，以“破械转生”以外的、自己墓地的最多3张“破械”卡为对象可以发动。将该卡放回牌组。然后，依所放回的数量为上限，可将自己场上的其他卡破坏。
