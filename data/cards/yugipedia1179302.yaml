  en: |-
    Cannot be Normal Summoned/Set. Must be Special Summoned with a "Sacred Beast" card. You can reveal this card in your hand; add 1 "Sacred Beast" Spell from your Deck to your hand, then discard 1 card. You can only use this effect of "Hamon, Lord of Striking Thunder - Sacred Beast of Sinful Catastrophe" once per turn. Once per turn, if a monster(s) is sent to your opponent's GY: Inflict 1000 damage to your opponent. If this card is destroyed by battle or card effect: You can activate this effect; you take no damage this turn.
