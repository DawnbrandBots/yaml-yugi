text:
  en: |-
    If you control an "Artmage", "DoomZ", or "Elfnote" card: Special Summon 1 "Medius the Pure" from your hand or Deck, also your opponent cannot activate cards or effects when that monster is Special Summoned. You can banish this card from your GY, then target 1 Fusion, Synchro, or Xyz Monster in your GY; Special Summon it to your zone a Link Monster points to. You can only use 1 "Pasto-Ral Theorealize" effect per turn, and only once that turn.
  de:
  es:
  fr:
