  ja: |-
    このカードは通常召喚できず、「バスター・モード」の効果でのみ特殊召喚できる。このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：手札のこのカードを相手に見せて発動できる。このカードをデッキに戻し、フィールドのモンスター１体の攻撃力を０にする。②：このカードが特殊召喚した場合、または相手フィールドにモンスターが特殊召喚された場合に発動できる。フィールドのカードを全て破壊する。③：このカードが破壊された場合に発動できる。自分の墓地から「ブラック・ローズ・ドラゴン」１体を特殊召喚する。
