text:
  en: |-
    Cannot be Normal Summoned/Set. Must be Special Summoned with "Assault Mode Activate". If this card is destroyed: You can Special Summon 1 "Black Rose Dragon" from your GY. You can only use each of the following effects of "Black Rose Dragon/Assault Mode" once per turn. You can reveal this card in your hand; shuffle it into the Deck, and if you do, change the ATK of 1 face-up monster on the field to 0. If this card is Special Summoned, or a monster(s) is Special Summoned to your opponent's field: You can destroy all cards on the field.
