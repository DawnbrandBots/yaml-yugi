name:
  en: Regulus, the Prince of Endymion
  de: Regulus, der Prinz von Endymion
  es: Regulus, el Príncipe de Endimión
  fr: Regulus, le Prince d'Endymion
  it: Regulus, il Principe di Endymion
  pt: Regulus, o Príncipe de Endymion
  ja: <ruby>聖月の皇太子<rt>プリンス・オブ・エンディミオン</rt></ruby>レグルス
  ja_romaji: Purinsu Obu Endimion Regurusu
  ko: 프린스 오브 엔디미온 레굴루스
  ko_rr:
  zh-TW:
  zh-CN: 恩底弥翁之圣月皇太子 雷格鲁斯
text:
  en: |-
    The first time this card would be destroyed by battle each turn, it is not destroyed. You can only use each of the following effects of "Regulus, the Prince of Endymion" once per turn. If this card is in your hand: You can reveal 1 other Spellcaster monster in your hand; you lose LP equal to the revealed monster's Level x 300, and if you do, Special Summon this card. If this card is Special Summoned: You can add 1 Spell that mentions "Regulus, the Prince of Endymion" from your Deck to your hand.
  de: |-
    Das erste Mal in jedem Spielzug, dass diese Karte durch Kampf zerstört würde, wird sie nicht zerstört. Du kannst jeden der folgenden Effekte von „Regulus, der Prinz von Endymion“ nur einmal pro Spielzug verwenden. Falls sich diese Karte in deiner Hand befindet: Du kannst 1 anderes Hexer-Monster in deiner Hand vorzeigen; du verlierst LP in Höhe der Stufe des vorgezeigten Monsters x 300 und falls du dies tust, beschwöre diese Karte als Spezialbeschwörung. Falls diese Karte als Spezialbeschwörung beschworen wird: Du kannst deiner Hand 1 Zauber, der „Regulus, der Prinz von Endymion“ erwähnt, von deinem Deck hinzufügen.
  es: |-
    La primera vez que esta carta fuera a ser destruida en batalla cada turno, no es destruida. Sólo puedes usar cada uno de los siguientes efectos de "Regulus, el Príncipe de Endimión" una vez por turno. Si esta carta está en tu mano: puedes mostrar otro monstruo Lanzador de Conjuros en tu mano; pierdes LP iguales al Nivel del monstruo mostrado x 300 y, si lo haces, Invoca esta carta de Modo Especial. Si esta carta es Invocada de Modo Especial: puedes añadir a tu mano 1 Mágica en tu Deck que mencione "Regulus, el Príncipe de Endimión".
  fr: |-
    La première fois que cette carte va être détruite au combat chaque tour, elle n'est pas détruite. Vous ne pouvez utiliser chacun des effets suivants de "Regulus, le Prince d'Endymion" qu'une fois par tour. Si cette carte est dans votre main : vous pouvez révéler 1 autre monstre Magicien dans votre main ; vous perdez des LP égaux au Niveau du monstre révélé x 300, et si vous le faites, Invoquez Spécialement cette carte. Si cette carte est Invoquée Spécialement : vous pouvez ajouter 1 Magie qui mentionne "Regulus, le Prince d'Endymion" depuis votre Deck à votre main.
  it: |-
    La prima volta che questa carta sta per essere distrutta in battaglia ogni turno, essa non viene distrutta. Puoi utilizzare ognuno dei seguenti effetti di "Regulus, il Principe di Endymion" una sola volta per turno. Se questa carta è nella tua mano: puoi rivelare 1 altro mostro Incantatore nella tua mano; perdi LP pari al Livello del mostro rivelato x 300 e, se lo fai, Evoca Specialmente questa carta. Se questa carta viene Evocata Specialmente: puoi aggiungere 1 Magia che menziona "Regulus, il Principe di Endymion" dal tuo Deck alla tua mano.
  pt: |-
    Na primeira vez que este card seria destruído em batalha a cada turno, ele não é destruído. Você só pode usar cada um dos seguintes efeitos de "Regulus, o Príncipe de Endymion" uma vez por turno. Se este card estiver na sua mão: você pode revelar 1 outro monstro Mago na sua mão; você perde PV igual ao Nível do monstro revelado x 300 e, se isso acontecer, Invoque este card por Invocação-Especial. Se este card for Invocado por Invocação-Especial: você pode adicionar 1 Magia que mencione "Regulus, o Príncipe de Endymion" do seu Deck à sua mão.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが手札に存在する場合、手札の他の魔法使い族モンスター１体を相手に見せて発動できる。自分は見せたモンスターのレベル×３００ＬＰを失い、このカードを特殊召喚する。②：このカードが特殊召喚した場合に発動できる。デッキから「聖月の皇太子レグルス」のカード名が記された魔法カード１枚を手札に加える。③：このカードは１ターンに１度だけ戦闘では破壊されない。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드가 패에 존재할 경우, 패의 다른 마법사족 몬스터 1장을 상대에게 보여주고 발동할 수 있다. 자신은 보여준 몬스터의 레벨 × 300 LP를 상실하고, 이 카드를 특수 소환한다. ②: 이 카드를 특수 소환했을 경우에 발동할 수 있다. 덱에서 "프린스 오브 엔디미온 레굴루스"의 카드명이 쓰여진 마법 카드 1장을 패에 넣는다. ③: 이 카드는 1턴에 1번만 전투로는 파괴되지 않는다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：此卡存在于手牌的情况下，向对手出示手牌的1只其他魔法师族怪兽可以发动。自己失去所出示的怪兽的等级×300LP，将此卡特殊召唤。②：此卡特殊召唤的情况下可以发动。从牌组将1张记载有“恩底弥翁之圣月皇太子 雷格鲁斯”卡名的魔法卡加入手牌。③：此卡1回合仅1次，不会因战斗被破坏。
