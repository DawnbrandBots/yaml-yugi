name:
  en: Fifty Fifty?
  de: Fünfzig-fünfzig?
  es: ¿Cincuenta Cincuenta?
  fr: Cinquante Cinquante ?
  it: Cinquanta Cinquanta?
  pt: Meio a Meio?
  ja: ２つに１つ
  ja_romaji: Futatsu ni Hitotsu
  ko: 둘 중 하나
  ko_rr:
  zh-TW:
  zh-CN: 二选一
text:
  en: |-
    Take 1 monster and 2 Traps from your Deck and reveal them, your opponent randomly picks 1 and you look at the remaining 2 to banish 1 Trap from it, then your opponent chooses 1 of these effects for you to apply.
    ● Reveal the card picked by your opponent, and if it was a monster, add it to your hand or Special Summon it, or if it wasn't, banish it, also shuffle the rest into the Deck.
    ● Reveal the card that was not picked by your opponent nor banished by you, and if it was a monster, add it to your hand, or if it wasn't, banish it, also shuffle the rest into the Deck.
  de: |-
    Nimm 1 Monster und 2 Fallen von deinem Deck und zeige sie vor, dein Gegner bestimmt zufällig 1 und du siehst dir die übrigen 2 an, um 1 Falle davon zu verbannen, dann bestimmt dein Gegner 1 dieser Effekte, den du ausführst.
    ● Zeige die von deinem Gegner bestimmte Karte vor und falls es ein Monster war, füge es deiner Hand hinzu oder beschwöre es als Spezialbeschwörung, oder falls es keins war, verbanne sie, zusätzlich mische die restlichen ins Deck.
    ● Zeige die Karte vor, die weder von deinem Gegner bestimmt noch von dir verbannt wurde, und falls es ein Monster war, füge es deiner Hand hinzu, oder falls es keins war, verbanne sie, zusätzlich mische die restlichen ins Deck.
  es: |-
    Toma 1 monstruo y 2 Trampas en tu Deck y muéstralos, tu adversario elige 1 al azar y tú miras los 2 restantes para desterrar 1 Trampa de ellos, y después tu adversario elige 1 de estos efectos para que lo apliques.
    ● Muestra la carta elegida por tu adversario y, si era un monstruo, añádela a tu mano o Invócala de Modo Especial o, si no lo era, destiérrala, y además baraja el resto al Deck.
    ● Muestra la carta que no fue elegida por tu adversario ni desterrada por ti y, si era un monstruo, añádela a tu mano, o si no lo era, destiérrala, y además baraja el resto al Deck.
  fr: |-
    Prenez 1 monstre et 2 Pièges depuis votre Deck et révélez-les, votre adversaire en prend 1 au hasard et vous regardez les 2 restants pour en bannir 1 Piège, puis votre adversaire choisit 1 de ces effets pour vous à appliquer.
    ● Révélez la carte prise par votre adversaire, et si c'était un monstre, ajoutez-la à votre main ou Invoquez-la Spécialement, ou si ce ne l'était pas, bannissez-la, et aussi, mélangez les cartes restantes dans le Deck.
    ● Révélez la carte qui n'a ni été prise par votre adversaire ni été bannie par vous, et si c'était un monstre, ajoutez-la à votre main, ou si ce ne l'était pas, bannissez-la, et aussi, mélangez les cartes restantes dans le Deck.
  it: |-
    Prendi 1 mostro e 2 Trappole dal tuo Deck e rivelali, il tuo avversario ne prende 1 a caso e tu guardi i 2 rimanenti per bandire 1 Trappola da essi, poi il tuo avversario seleziona 1 di questi effetti da farti applicare.
    ● Rivela la carta presa dal tuo avversario e, se era un mostro, aggiungilo alla tua mano o Evocalo Specialmente o, se non lo era, bandiscila, inoltre mischia il resto nel Deck.
    ● Rivela la carta che non è stata presa dal tuo avversario né bandita da te e, se era un mostro, aggiungilo alla tua mano o, se non lo era, bandiscila, inoltre mischia il resto nel Deck.
  pt: |-
    Pegue 1 monstro e 2 Armadilhas do seu Deck e revele-os, seu oponente elege 1 aleatoriamente e você olha os 2 restantes para banir 1 Armadilha dali e, depois, seu oponente seleciona 1 desses efeitos para que você aplique.
    ● Revele o card que seu oponente elegeu e, se era um monstro, adicione-o à sua mão ou Invoque-o por Invocação-Especial, ou, se não era, bana-o e, além disso, embaralhe o resto no Deck.
    ● Revele o card que não foi eleito pelo seu oponente nem banido por você e, se era um monstro, adicione-o à sua mão, ou, se não era, bana-o e, além disso, embaralhe o resto no Deck.
  ja: |-
    ①：モンスター１体と罠カード２枚をデッキから相手に見せ、相手はその中からランダムに１枚選ぶ。自分は残りのカードを確認し、その内の罠カード１枚を除外する。その後、相手は以下から１つを選び、自分はその効果を適用する。
    ●相手が選んだカードをお互いに確認し、モンスターだった場合、手札に加えるか特殊召喚する。違った場合、除外する。残りをデッキに戻す。
    ●相手が選ばなかったカードの内、除外しなかったカードをお互いに確認し、モンスターだった場合、手札に加える。違った場合、除外する。残りをデッキに戻す。
  ko: |-
    ①: 몬스터 1장과 함정 카드 2장을 덱에서 상대에게 보여주고, 상대는 그 중에서 무작위로 1장 고른다. 자신은 남은 카드를 확인하고, 그 중의 함정 카드 1장을 제외한다. 그 후, 상대는 이하에서 1개를 고르고, 자신은 그 효과를 적용한다.
    ●상대가 고른 카드를 서로 확인하고, 몬스터였을 경우, 패에 넣거나 특수 소환한다. 다를 경우, 제외한다. 나머지를 덱으로 되돌린다.
    ●상대가 고르지 않은 카드 중, 제외하지 않은 카드를 서로 확인하고, 몬스터였을 경우, 패에 넣는다. 다를 경우, 제외한다. 나머지를 덱으로 되돌린다.
  zh-TW:
  zh-CN: |-
    ①：从牌组将1只怪兽与2张陷阱卡出示给对手，对手从其中随机挑选1张。自己确认剩余的卡，将其中的1张陷阱卡除外。然后，对手从以下挑选1个，自己适用该效果。
    ●对手将所挑选的卡给双方确认，是怪兽的情况下，将其加入手牌或特殊召唤。不是的情况下，将其除外。将剩余的放回牌组。
    ●对手将未挑选的卡中未除外的卡给双方确认，是怪兽的情况下，将其加入手牌。不是的情况下，将其除外。将剩余的放回牌组。
