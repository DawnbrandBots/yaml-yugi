text:
  en: |-
    When a monster effect is activated on your opponent's field, during a turn your opponent has Special Summoned: Destroy the monster that activated its effect, then if your opponent controls a card(s) in its adjacent Monster Zones and/or Spell & Trap Zones, destroy them.
  de: |-
    Wenn ein Monstereffekt auf der Spielfeldseite deines Gegners während eines Spielzugs aktiviert wird, in dem dein Gegner eine Spezialbeschwörung durchgeführt hat: Zerstöre das Monster, dessen Effekt aktiviert wurde, dann, falls dein Gegner eine oder mehr Karten in seinen benachbarten Monsterzonen und/oder Zauber- & Fallenzonen kontrolliert, zerstöre sie.
  es: |-
    Cuando es activado un efecto de monstruo en el Campo de tu adversario, durante un turno en el que tu adversario ha Invocado de Modo Especial: destruye el monstruo que activó su efecto y después, si tu adversario controla una o más cartas en sus Zonas de Monstruos y/o Zonas de Magia y Trampas adyacentes, destrúyelas.
  fr: |-
    Lorsqu'un effet de monstre est activé sur le Terrain de votre adversaire, durant un tour où votre adversaire a Invoqué Spécialement : détruisez le monstre qui a activé son effet, puis si votre adversaire contrôle une ou plusieurs cartes dans ses Zones Monstres et/ou Zones Magie & Piège adjacentes, détruisez-les.
  it: |-
    Quando viene attivato l'effetto di un mostro sul Terreno del tuo avversario, durante un turno in cui il tuo avversario ha Evocato Specialmente: distruggi il mostro che ha attivato il suo effetto, poi se il tuo avversario controlla una o più carte nelle sue Zone Mostri e/o Zone Magie & Trappole adiacenti, distruggile.
  pt: |-
    Quando um efeito de monstro for ativado no campo do seu oponente, durante um turno em que seu oponente tiver Invocado por Invocação-Especial: destrua o monstro que ativou seu efeito e, depois, se seu oponente controlar um ou mais cards em suas Zonas de Monstros e/ou Zonas de Magias & Armadilhas adjacentes, destrua-os.
  ja: |-
    ①：相手がモンスターを特殊召喚したターンに、相手フィールドのモンスターの効果が発動した時に発動できる。その効果を発動したモンスターを破壊する。その後、そのモンスターが存在していたゾーンの前・後・隣のゾーン（モンスターゾーン・魔法＆罠ゾーン）に相手のカードが存在する場合、それらを全て破壊する。
  ko: |-
    ①: 상대가 몬스터를 특수 소환한 턴에, 상대 필드의 몬스터의 효과가 발동했을 때에 발동할 수 있다. 그 효과를 발동한 몬스터를 파괴한다. 그 후, 그 몬스터가 존재하고 있던 존의 앞 / 뒤 / 옆의 존(몬스터 존 / 마법 & 함정 존)에 상대의 카드가 존재할 경우, 그 카드들을 전부 파괴한다.
  zh-TW:
  zh-CN: |-
    ①：对手特殊召唤过怪兽的回合，对手场上的怪兽发动效果时可以发动。将发动该效果的怪兽破坏。然后，该怪兽存在的区域的前・后・相邻区域（怪兽区域・魔法与陷阱区域）有对手的卡存在的情况下，将其全部破坏。
