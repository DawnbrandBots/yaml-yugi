text:
  en: |-
    2 "Hecahands" monsters
    You can target 1 monster your opponent controls; take control of it. You can only use this effect of "Hecahands Dandalos" once per turn. Your "Hecahands" Fusion Monsters and your monsters that are owned by your opponent can attack directly. If this card battles a monster, neither can be destroyed by that battle.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    「ヘカトンケイル」モンスター×２
    このカード名の①の効果は１ターンに１度しか使用できない。①：相手フィールドのモンスター１体を対象として発動できる。そのモンスターのコントロールを得る。②：このカードがモンスターゾーンに存在する限り、自分の「ヘカトンケイル」融合モンスター及び元々の持ち主が相手である自分のモンスターは直接攻撃できる。③：このカードがモンスターと戦闘を行う場合、その２体はその戦闘では破壊されない。
  ko: |-
    "헤카톤케일" 몬스터 × 2
    이 카드명의 ①의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 상대 필드의 몬스터 1장을 대상으로 하고 발동할 수 있다. 그 몬스터의 컨트롤을 얻는다. ②: 이 카드가 몬스터 존에 존재하는 한, 자신의 "헤카톤케일" 융합 몬스터 및 원래의 주인이 상대인 자신 몬스터는 직접 공격할 수 있다. ③: 이 카드가 몬스터와 전투를 실행할 경우, 그 2장은 그 전투로는 파괴되지 않는다.
  zh-TW:
  zh-CN: |-
    “百臂无形”怪兽×2
    此卡名的①效果1回合仅可使用1次。①：以对手场上的1只怪兽为对象可以发动。获得该怪兽的控制权。②：只要此卡存在于怪兽区域，自己的“百臂无形”融合怪兽及原本持有者为对手的自己怪兽可直接攻击。③：此卡与怪兽进行战斗的情况下，该2只不会因该战斗被破坏。
