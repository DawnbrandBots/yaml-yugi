name:
  en: Armament Reincarnation
  de: Bewaffnungs-Reinkarnation
  es: Armamento Reencarnado
  fr: Réincarnation d'Armement
  it: Armamento Reincarnato
  pt: Reencarnação do Armamento
  ja: <ruby>武<rt>ぶ</rt></ruby><ruby>装<rt>そう</rt></ruby><ruby>転<rt>てん</rt></ruby><ruby>生<rt>せい</rt></ruby>
