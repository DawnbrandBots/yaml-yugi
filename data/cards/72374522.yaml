text:
  en: |-
    (This card is always treated as a "Predap" card.)
    Target 1 "Starving Venom Fusion Dragon" in your Monster Zone; it cannot attack this turn, also destroy as many monsters your opponent controls as possible with less ATK than that monster, then you can discard your entire hand, and if you do, inflict damage to your opponent equal to the combined original ATK of monsters destroyed by this effect.
  de: |-
    (Diese Karte wird immer als вҖһRaubpвҖң-Karte behandelt.)
    WГӨhle 1 вҖһHungergift-FusionsdracheвҖң in deiner Monsterzone; er kann in diesem Spielzug nicht angreifen, zusГӨtzlich zerstГ¶re so viele Monster, die dein Gegner kontrolliert und die weniger ATK als jenes Monster haben, wie mГ¶glich, dann kannst du deine gesamte Hand abwerfen und falls du dies tust, fГјge deinem Gegner Schaden in HГ¶he der kombinierten Grund-ATK der durch diesen Effekt zerstГ¶rten Monster zu.
  es: |-
    (Esta carta se trata siempre como una carta "Predap").
    Selecciona 1 "DragГіn de FusiГіn Hambriento Venenoso" en tu Zona de Monstruos; este turno, Г©ste no puede atacar, y ademГЎs destruye tantos monstruos que controle tu adversario con menos ATK que ese monstruo como sea posible, y despuГ©s puedes descartar toda tu mano y, si lo haces, inflige daГұo a tu adversario igual al ATK original combinado de los monstruos destruidos por este efecto.
  fr: |-
    (Cette carte est toujours traitГ©e comme carte "PrГ©dap".)
    Ciblez 1 "Dragon Fusion Venin AffamГ©" dans votre Zone Monstre ; il ne peut pas attaquer ce tour, et aussi, dГ©truisez autant de monstres contrГҙlГ©s par votre adversaire que possible avec une ATK infГ©rieure au monstre, puis vous pouvez dГ©fausser toute votre main, et si vous le faites, infligez des dommages Г  votre adversaire Г©gaux Г  la somme des ATK d'origine des monstres dГ©truits par cet effet.
  it: |-
    (Questa carta viene sempre considerata come una carta "Predap".)
    Scegli come bersaglio 1 "Drago Fusione Veleno Affamato" nella tua Zona Mostri; esso non puГІ attaccare in questo turno, inoltre distruggi tanti mostri controllati dal tuo avversario con ATK inferiore a quel mostro quanti possibile, poi puoi scartare tutta la tua mano e, se lo fai, infliggi al tuo avversario danno pari alla somma degli ATK originali dei mostri distrutti da questo effetto.
  pt: |-
    (Este card deve ser sempre considerado como um card "Predap".)
    Escolha 1 "DragГЈo FusГЈo de PeГ§onha InsaciГЎvel" na sua Zona de Monstros; ele nГЈo pode atacar neste turno e, alГ©m disso, destrua tantos monstros que seu oponente controla quanto possГӯvel com ATK menor que o desse monstro e, depois, vocГӘ pode descartar toda a sua mГЈo e, se isso acontecer, cause dano ao seu oponente igual ao ATK original combinado dos monstros destruГӯdos por este efeito.
