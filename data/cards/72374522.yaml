name:
  en: Thorns of Violet Poison
  de: Dornen des violetten Toxins
  es: Espinas de Veneno Violeta
  fr: Épines de Poison Violet
  it: Spine della Tossina Viola
  pt: Espinhos de Veneno Violeta
  ja: <ruby>紫<rt>し</rt></ruby><ruby>毒<rt>どく</rt></ruby>の<ruby>茨<rt>し</rt></ruby><ruby>牙<rt>が</rt></ruby>
