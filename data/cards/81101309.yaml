name:
  en: Night Train Blue Traveler
  de: Nachtzug Blauer Reisender
  es: Viajero de Tren Nocturno Azul
  fr: Train de Nuit Voyageur Bleu
  it: Treno Notturno Viaggiatore Blu
  pt: Trem Noturno Viajante Azul
  ja: <ruby>夜<rt>や</rt></ruby><ruby>光<rt>こう</rt></ruby><ruby>列<rt>れっ</rt></ruby><ruby>車<rt>しゃ</rt></ruby>ブルートラベラー
  ja_romaji: Yakōressha Burū Toraberā
  ko: 야광열차 블루트래블러
  ko_rr:
  zh-TW:
  zh-CN: 夜光列车 蓝色旅人
text:
  en: |-
    You can discard this card; add 1 "Train Connection" or "Revolving Switchyard" from your Deck or GY to your hand. If this card is in your GY: You can target 1 other EARTH Machine monster in your GY; Special Summon both it and this card, also you cannot Special Summon from the Extra Deck for the rest of this turn, except Machine monsters. You can only use this effect of "Night Train Blue Traveler" once per Duel, and its previous effect only once per turn.
  de: |-
    Du kannst diese Karte abwerfen; füge deiner Hand 1 „Wagenkupplung“ oder „Drehscheiben-Bahnhof“ von deinem Deck oder Friedhof hinzu. Falls sich diese Karte in deinem Friedhof befindet: Du kannst 1 anderes ERDE Maschine-Monster in deinem Friedhof wählen; beschwöre sowohl es als auch diese Karte als Spezialbeschwörung, zusätzlich kannst du für den Rest dieses Spielzugs keine Spezialbeschwörungen vom Extra Deck durchführen, außer von Maschine-Monstern. Du kannst diesen Effekt von „Nachtzug Blauer Reisender“ nur einmal pro Duell und seinen vorherigen Effekt nur einmal pro Spielzug verwenden.
  es: |-
    Puedes descartar esta carta; añade a tu mano 1 "Acoplador de Trenes" o "Estación Clasificadora Giratoria" en tu Deck o Cementerio. Si esta carta está en tu Cementerio: puedes seleccionar otro monstruo Máquina de TIERRA en tu Cementerio; Invoca ambos de Modo Especial, ése y esta carta, y además no puedes Invocar de Modo Especial desde el Deck Extra por el resto de este turno, excepto monstruos Máquina. Sólo puedes usar este efecto de "Viajero de Tren Nocturno Azul" una vez por Duelo, y su efecto previo sólo una vez por turno.
  fr: |-
    Vous pouvez défausser cette carte ; ajoutez 1 "Correspondance" ou "Rotonde Ferroviaire" depuis votre Deck ou Cimetière à votre main. Si cette carte est dans votre Cimetière : vous pouvez cibler 1 autre monstre TERRE Machine dans votre Cimetière ; Invoquez-le Spécialement ainsi que cette carte, et aussi, vous ne pouvez pas Invoquer Spécialement (monstres Machine exclus) depuis l'Extra Deck le reste de ce tour. Vous ne pouvez utiliser cet effet de "Train de Nuit Voyageur Bleu" qu'une fois par Duel, et son effet précédent qu'une fois par tour.
  it: |-
    Puoi scartare questa carta; aggiungi 1 "Gancio Ferroviario" o "Piattaforma di Scambio Rotante" dal tuo Deck o Cimitero alla tua mano. Se questa carta è nel tuo Cimitero: puoi scegliere come bersaglio 1 altro mostro TERRA Macchina nel tuo Cimitero; Evoca Specialmente sia esso che questa carta, inoltre non puoi Evocare Specialmente dall'Extra Deck per il resto di questo turno, eccetto mostri Macchina. Puoi utilizzare questo effetto di "Treno Notturno Viaggiatore Blu" una sola volta per Duello, e il suo precedente effetto una sola volta per turno.
  pt: |-
    Você pode descartar este card; adicione 1 "Acoplar Vagão" ou "Pátio de Manobras Giratório" do seu Deck ou Cemitério à sua mão. Se este card estiver no seu Cemitério: você pode escolher 1 outro monstro Máquina de TERRA no seu Cemitério; Invoque por Invocação-Especial tanto ele quanto este card e, além disso, você não pode Invocar por Invocação-Especial do Deck Adicional pelo resto deste turno, exceto monstros Máquina. Você só pode usar este efeito de "Trem Noturno Viajante Azul" uma vez por Duelo, e seu efeito anterior apenas uma vez por turno.
  ja: |-
    このカード名の、①の効果は１ターンに１度しか使用できず、②の効果はデュエル中に１度しか使用できない。①：このカードを手札から捨てて発動できる。自分のデッキ・墓地から「機関連結」か「転回操車」１枚を手札に加える。②：このカードが墓地に存在する場合、自分の墓地の他の機械族・地属性モンスター１体を対象として発動できる。そのモンスターとこのカードを特殊召喚する。この効果の発動後、ターン終了時まで自分は機械族モンスターしかＥＸデッキから特殊召喚できない。
  ko: |-
    이 카드명의, ①의 효과는 1턴에 1번밖에 사용할 수 없으며, ②의 효과는 듀얼 중에 1번밖에 사용할 수 없다. ①: 이 카드를 패에서 버리고 발동할 수 있다. 자신의 덱 / 묘지에서 "기관 연결"이나 "전회조차" 1장을 패에 넣는다. ②: 이 카드가 묘지에 존재할 경우, 자신 묘지의 다른 기계족 / 땅 속성 몬스터 1장을 대상으로 하고 발동할 수 있다. 그 몬스터와 이 카드를 특수 소환한다. 이 효과의 발동 후, 턴 종료시까지 자신은 기계족 몬스터밖에 엑스트라 덱에서 특수 소환할 수 없다.
  zh-TW:
  zh-CN: |-
    此卡名的①效果1回合仅可使用1次，且②效果在决斗中仅可使用1次。①：从手牌将此卡舍弃可以发动。从自己牌组・墓地将1张“机关连结”或“回转调车”加入手牌。②：此卡存在于墓地的情况下，以自己墓地的1只其他的机械族・地属性怪兽为对象可以发动。将该怪兽和此卡特殊召唤。此效果发动后，直至回合结束时为止，自己从额外牌组仅可特殊召唤机械族怪兽。
