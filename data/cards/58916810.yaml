  en: Crackle Blitzclique
  de: Knister Blitzclique
  es: Crujido Blitzclique
  fr: Crackle Blitzclique
  it: Crackle Blitzclique
  pt: Trepidação Blitzclique
  ja: クラック・ブリッツクリーク
