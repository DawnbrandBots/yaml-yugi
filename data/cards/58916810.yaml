  zh-CN: 克拉克・雷盟
text:
  en: |-
    During your opponent's turn, when your opponent activates a monster effect on the field (Quick Effect): You can reveal this card in your hand; destroy that monster, and if you do, Special Summon 1 Thunder monster from your hand, also for the rest of this turn, you cannot Special Summon Effect Monsters, except from the hand. If another card(s) is destroyed by card effect, while this card is in the Monster Zone (except during the Damage Step): You can send 1 "Blitzclique" Spell/Trap from your Deck to the GY. You can only use each effect of "Crackle Blitzclique" once per turn.
  de: |-
    Während des Spielzugs deines Gegners, wenn dein Gegner einen Monstereffekt auf dem Spielfeld aktiviert (Schnelleffekt): Du kannst diese Karte in deiner Hand vorzeigen; zerstöre jenes Monster und falls du dies tust, beschwöre 1 Donner-Monster als Spezialbeschwörung von deiner Hand, zusätzlich kannst du für den Rest dieses Spielzugs keine Effektmonster als Spezialbeschwörung beschwören, außer von der Hand. Falls eine oder mehr andere Karten durch einen Karteneffekt zerstört werden, solange sich diese Karte in der Monsterzone befindet (außer während des Damage Steps): Du kannst 1 „Blitzclique“-Zauber/Falle von deinem Deck auf den Friedhof legen. Du kannst jeden Effekt von „Knister Blitzclique“ nur einmal pro Spielzug verwenden.
  es: |-
    Durante el turno de tu adversario, cuando tu adversario activa el efecto de un monstruo en el Campo (Efecto Rápido): puedes mostrar esta carta en tu mano; destruye ese monstruo y, si lo haces, Invoca de Modo Especial 1 monstruo Trueno desde tu mano, y además por el resto de este turno, no puedes Invocar de Modo Especial Monstruos de Efecto, excepto desde la mano. Si otra u otras cartas son destruidas por el efecto de una carta, mientras esta carta está en la Zona de Monstruos (excepto durante el Damage Step): puedes mandar al Cementerio 1 Mágica/Trampa "Blitzclique" en tu Deck. Sólo puedes usar cada efecto de "Crujido Blitzclique" una vez por turno.
  fr: |-
    Durant le tour de votre adversaire, lorsque votre adversaire active un effet de monstre sur le Terrain (Effet Rapide) : vous pouvez révéler cette carte dans votre main ; détruisez le monstre, et si vous le faites, Invoquez Spécialement 1 monstre Tonnerre depuis votre main, et aussi, vous ne pouvez pas Invoquer Spécialement de Monstres à Effet, sauf depuis la main, le reste de ce tour. Si une ou plusieurs autres cartes sont détruites par un effet de carte, tant que cette carte est dans la Zone Monstre (sauf durant la Damage Step) : vous pouvez envoyer 1 Magie/Piège "Blitzclique" depuis votre Deck au Cimetière. Vous ne pouvez utiliser chaque effet de "Crackle Blitzclique" qu'une fois par tour.
  it: |-
    Durante il turno del tuo avversario, quando il tuo avversario attiva l'effetto di un mostro sul Terreno (Effetto Rapido): puoi rivelare questa carta nella tua mano; distruggi quel mostro e, se lo fai, Evoca Specialmente 1 mostro Tuono dalla tua mano, inoltre per il resto di questo turno, non puoi Evocare Specialmente Mostri con Effetto, eccetto dalla mano. Se una o più altre carte vengono distrutte dall'effetto di una carta, mentre questa carta è nella Zona Mostri (eccetto durante il Damage Step): puoi mandare 1 Magia/Trappola "Blitzclique" dal tuo Deck al Cimitero. Puoi utilizzare ogni effetto di "Crackle Blitzclique" una sola volta per turno.
  pt: |-
    Durante o turno do seu oponente, quando seu oponente ativar um efeito de monstro no campo (Efeito Rápido): você pode revelar este card na sua mão; destrua esse monstro e, se isso acontecer, Invoque por Invocação-Especial 1 monstro Trovão da sua mão e, além disso, pelo resto deste turno, você não pode Invocar Monstros de Efeito por Invocação-Especial, exceto da mão. Se um ou mais outros cards forem destruídos por um efeito de card, enquanto este card estiver na Zona de Monstros (exceto durante a Etapa de Dano): você pode enviar 1 Magia/Armadilha "Blitzclique" do seu Deck para o Cemitério. Você só pode usar cada efeito de "Trepidação Blitzclique" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：相手ターンに、相手がフィールドのモンスターの効果を発動した時、手札のこのカードを相手に見せて発動できる。そのモンスターを破壊し、手札から雷族モンスター１体を特殊召喚する。このターン、自分は手札からしか効果モンスターを特殊召喚できない。②：このカードがモンスターゾーンに存在する状態で、このカード以外のカードが効果で破壊された場合に発動できる。デッキから「ブリッツクリーク」魔法・罠カード１枚を墓地へ送る。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：在对手回合中，对手发动场上的怪兽的效果时，向对手出示手牌的此卡可以发动。将该怪兽破坏，从手牌将1只雷族怪兽特殊召唤。此回合，自己不可从手牌以外的地方特殊召唤效果怪兽。②：此卡存在于怪兽区域的状态下，此卡以外的卡因效果被破坏的情况下可以发动。从牌组将1张“雷盟”魔法・陷阱卡送至墓地。
