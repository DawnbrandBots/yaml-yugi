  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが召喚・特殊召喚した場合、自分フィールドに「ウィッチクラフト・シード」以外の「ウィッチクラフト」モンスターか「聖月の皇太子レグルス」が存在していれば、フィールドの表側表示カード１枚を対象として発動できる。そのカードを手札に戻す。②：墓地のこのカードを除外して発動できる。魔法カードを含む手札のカードを任意の数だけ相手に見せ、デッキに戻す。その後、自分は戻した数だけドローする。
