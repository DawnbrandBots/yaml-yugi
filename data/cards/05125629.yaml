text:
  en: |-
    You can activate this card from your hand by paying half your LP. Add to your hand, or place face-up in your Field Zone, 1 "Malefic World" from your Deck or GY, then Special Summon 1 "Malefic" monster from your Deck or Extra Deck in Defense Position, ignoring its Summoning conditions, then if your opponent controls a monster with 2500 or more ATK, all face-up monsters they currently control lose 2500 ATK until the end of this turn. You can only activate 1 "Malefic Paradigm Shift" per turn.
  de:
  es:
