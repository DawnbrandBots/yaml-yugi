  ja: |-
    このカード名のカードは１ターンに１枚しか発動できない。このカードはＬＰを半分払って手札から発動する事もできる。①：自分のデッキ・墓地から「Ｓｉｎ Ｗｏｒｌｄ」１枚を選び、手札に加えるか自分のフィールドゾーンに表側表示で置く。その後、デッキ・ＥＸデッキから「Ｓｉｎ」モンスター１体を召喚条件を無視して守備表示で特殊召喚する。その後、相手フィールドに攻撃力２５００以上のモンスターが存在する場合、相手フィールドの全てのモンスターの攻撃力はターン終了時まで２５００ダウンする。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的卡1回合仅可发动1张。此卡也可通过支付一半LP来从手牌发动。①：从自己牌组・墓地挑选1张“Sin 世界”，加入手牌或以表侧表示放在自己的场地区域。然后，从牌组・额外牌组将1只“Sin”怪兽无视召唤条件以守备表示特殊召唤。然后，对手场上存在攻击力2500以上的怪兽的情况下，对手场上的所有怪兽的攻击力直至回合结束时为止下降2500。
