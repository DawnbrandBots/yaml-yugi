name:
  en: Mutiny in the Sky
  de: Meuterei am Himmel
  es: Motín en el Cielo
  fr: Mutinerie Céleste
  it: Ammutinamento nel Cielo
  pt: Motim no Céu
  ja: <ruby>天<rt>てん</rt></ruby><ruby>至<rt>いた</rt></ruby>る<ruby>叛<rt>はん</rt></ruby><ruby>逆<rt>ぎゃく</rt></ruby>
  ja_romaji: Ten Itaru Hangyaku
  ko: 하늘에 이르는 반역
  ko_rr:
  zh-TW: 天至的反叛
  zh-CN: 至天的叛逆
text:
  en: |-
    Fusion Summon 1 Fiend or Fairy Fusion Monster from your Extra Deck, by shuffling Fiend and/or Fairy monsters from your GY into the Deck as material. If this card is in your GY: You can send 1 Fiend or Fairy monster from your hand or face-up field to the GY; add this card to your hand. You can only use each effect of "Mutiny in the Sky" once per turn.
  de: |-
    Beschwöre 1 Unterweltler- oder Fee-Fusionsmonster als Fusionsbeschwörung von deinem Extra Deck, indem du Unterweltler- und/oder Fee-Monster von deinem Friedhof als Material ins Deck mischst. Falls sich diese Karte in deinem Friedhof befindet: Du kannst 1 Unterweltler- oder Fee-Monster von deiner Hand oder offen von deiner Spielfeldseite auf den Friedhof legen; füge diese Karte deiner Hand hinzu. Du kannst jeden Effekt von „Meuterei am Himmel“ nur einmal pro Spielzug verwenden.
  es: |-
    Invoca por Fusión, desde tu Deck Extra, 1 Monstruo de Fusión Demonio o Hada barajando al Deck monstruos Demonio y/o Hada en tu Cementerio como material. Si esta carta está en tu Cementerio: puedes mandar al Cementerio 1 monstruo Demonio o Hada en tu mano o Campo boca arriba; añade esta carta a tu mano. Sólo puedes usar cada efecto de "Motín en el Cielo" una vez por turno.
  fr: |-
    Invoquez par Fusion 1 Monstre Fusion Démon ou Elfe depuis votre Extra Deck, en mélangeant des monstres Démon et/ou Elfe depuis votre Cimetière dans le Deck comme Matériel. Si cette carte est dans votre Cimetière : vous pouvez envoyer 1 monstre Démon ou Elfe depuis votre main ou Terrain face recto au Cimetière ; ajoutez cette carte à votre main. Vous ne pouvez utiliser chaque effet de "Mutinerie Céleste" qu'une fois par tour.
  it: |-
    Evoca tramite Fusione 1 Mostro Fusione Demone o Fata dal tuo Extra Deck, mischiando mostri Demone e/o Fata dal tuo Cimitero nel Deck come materiale. Se questa carta è nel tuo Cimitero: puoi mandare 1 mostro Demone o Fata dalla tua mano o Terreno scoperto al Cimitero; aggiungi questa carta alla tua mano. Puoi utilizzare ogni effetto di "Ammutinamento nel Cielo" una sola volta per turno.
  pt: |-
    Invoque por Invocação-Fusão 1 Monstro de Fusão Demônio ou Fada do seu Deck Adicional, ao embaralhar no Deck monstros Demônio e/ou Fada do seu Cemitério como matéria. Se este card estiver no seu Cemitério: você pode enviar 1 monstro Demônio ou Fada da sua mão ou do campo com a face para cima para o Cemitério; adicione este card à sua mão. Você só pode usar cada efeito de "Motim no Céu" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分の墓地の悪魔族・天使族モンスターを融合素材としてデッキに戻し、悪魔族・天使族の融合モンスター１体を融合召喚する。②：このカードが墓地に存在する場合、自分の手札・フィールド（表側表示）から悪魔族・天使族モンスター１体を墓地へ送って発動できる。このカードを手札に加える。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：将自己墓地的恶魔族・天使族怪兽作为融合素材放回牌组，将1只恶魔族・天使族的融合怪兽融合召唤。②：此卡存在于墓地的情况下，从自己手牌・场上（表侧表示）将1只恶魔族・天使族怪兽送至墓地可以发动。将此卡加入手牌。
