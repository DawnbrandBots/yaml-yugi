  en: |-
    If this card is added to your hand, except by drawing it: You can reveal it, then target 1 card on the field; destroy it, and if you do, Special Summon 1 Thunder monster from your hand, also you cannot Special Summon Effect Monsters for the rest of this turn, except from the hand. If another card(s) is destroyed by card effect, while this card is in the Monster Zone: You can add 1 "Blitzclique" Trap from your Deck to your hand. You can only use each effect of "Emi Blitzclique" once per turn.
