text:
  en: |-
    When a monster effect that was activated on your opponent's field by targeting a card(s) on the field resolves, if any of those targets are in a different column than that opponent's monster, they can banish 1 card from their GY. If they did not, negate the activated effect. You can banish 1 monster from your GY; Special Summon 1 "Imposter Token" (Psychic/EARTH/ATK 800/DEF 800) with the same Level as that monster. You can only use this effect of "Imposter Shift" once per turn.
  de: |-
    Wenn ein Monstereffekt aufgelöst wird, der auf der Spielfeldseite deines Gegners aktiviert wurde, indem eine oder mehr Karten auf dem Spielfeld gewählt wurden, falls eins jener gewählten Ziele in einer unterschiedlichen Spalte als jenes Monster des Gegners liegt, kann er 1 Karte von seinem Friedhof verbannen. Falls er dies nicht tut, annulliere den aktivierten Effekt. Du kannst 1 Monster von deinem Friedhof verbannen; beschwöre 1 „Hochstapler-Spielmarke“ (Psi/ERDE/ATK 800/DEF 800) mit derselben Stufe wie jenes Monster als Spezialbeschwörung. Du kannst diesen Effekt von „Hochstaplerverschiebung“ nur einmal pro Spielzug verwenden.
  es: |-
    Cuando se resuelve un efecto de monstruo que fue activado en el Campo de tu adversario seleccionando una o más cartas en el Campo, si alguno de esos objetivos está en una columna diferente a la de ese monstruo del adversario, puede desterrar 1 carta en su Cementerio. Si no lo hace, niega el efecto activado. Puedes desterrar 1 monstruo en tu Cementerio; Invoca de Modo Especial 1 "Ficha Impostor" (Psíquico/TIERRA/ATK 800/DEF 800) con el mismo Nivel que ese monstruo. Sólo puedes usar este efecto de "Cambio Impostor" una vez por turno.
  fr: |-
    Lorsqu'un effet de monstre qui a été activé sur le Terrain de votre adversaire en ciblant une ou plusieurs cartes sur le Terrain est résolu, si une des cibles est dans une colonne différente du monstre de l'adversaire, il peut bannir 1 carte depuis son Cimetière. S'il ne l'a pas fait, annulez l'effet activé. Vous pouvez bannir 1 monstre depuis votre Cimetière ; Invoquez Spécialement 1 "Jeton Imposteur" (Psychique/TERRE/ATK 800/DEF 800) du même Niveau que le monstre. Vous ne pouvez utiliser cet effet de "Imposteur-Morphe" qu'une fois par tour.
  it: |-
    Quando l'effetto di un mostro che è stato attivato sul Terreno del tuo avversario scegliendo come bersaglio una o più carte sul Terreno si risolve, se qualsiasi di quei bersagli sono in una colonna diversa da quel mostro dell'avversario, lui può bandire 1 carta dal suo Cimitero. Se non lo fa, annulla l'effetto attivato. Puoi bandire 1 mostro dal tuo Cimitero; Evoca Specialmente 1 "Segna-Impostore" (Psichico/TERRA/ATK 800/DEF 800) con lo stesso Livello di quel mostro. Puoi utilizzare questo effetto di "Mutamento Impostore" una sola volta per turno.
  pt: |-
    Quando um efeito de monstro que foi ativado no campo do seu oponente ao escolher como alvo um ou mais cards no campo resolver, se qualquer desses alvos estava em uma coluna diferente da do monstro do oponente, ele pode banir 1 card do Cemitério dele. Se ele não o fez, negue o efeito ativado. Você pode banir 1 monstro do seu Cemitério; Invoque por Invocação-Especial 1 "Ficha de Impostor" (Psíquico/TERRA/ATK 800/DEF 800) com o mesmo Nível que o desse monstro. Você só pode usar este efeito de "Troca do Impostor" uma vez por turno.
