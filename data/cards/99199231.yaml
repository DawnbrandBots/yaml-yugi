name:
  en: S-Force Origin
  de: S-Kraft-Ursprung
  es: Origen Fuerza-S
  fr: Origine de la Force-S
  it: Origine S-Forza
  pt: Origem da Força-S
  ja: <ruby>Ｓ－Ｆｏｒｃｅ<rt>セキュリティ・フォース</rt></ruby> オリジン
  ja_romaji: Sekyuriti Fōsu Orijin
  ko: S－Force 오리진
  ko_rr:
  zh-TW:
  zh-CN: 超元特防队 本源
text:
  en: |-
    Special Summon 1 "S-Force" monster from your hand, GY, or banishment, but banish it when it leaves the field. If another card is banished, while this card is in your GY (except during the Damage Step): You can banish this card; take 2 "S-Force" cards from your Deck, except "S-Force Origin", banish 1 of them, and send the other to the GY. You can only use each effect of "S-Force Origin" once per turn.
  de: |-
    Beschwöre 1 „S-Kraft“-Monster als Spezialbeschwörung von deiner Hand, deinem Friedhof oder deinen verbannten Karten, aber verbanne es, wenn es das Spielfeld verlässt. Falls eine andere Karte verbannt wird, solange sich diese Karte in deinem Friedhof befindet (außer während des Damage Steps): Du kannst diese Karte verbannen; nimm 2 „S-Kraft“-Karten von deinem Deck, außer „S-Kraft-Ursprung“, verbanne 1 von ihnen und lege die andere auf den Friedhof. Du kannst jeden Effekt von „S-Kraft-Ursprung“ nur einmal pro Spielzug verwenden.
  es: |-
    Invoca de Modo Especial, desde tu mano, Cementerio o destierro, 1 monstruo "Fuerza-S", pero destiérralo cuando deje el Campo. Si otra carta es desterrada, mientras esta carta está en tu Cementerio (excepto durante el Damage Step): puedes desterrar esta carta; toma 2 cartas "Fuerza-S" en tu Deck, excepto "Origen Fuerza-S", destierra 1 de ellas y manda la otra al Cementerio. Sólo puedes usar cada efecto de "Origen Fuerza-S" una vez por turno.
  fr: |-
    Invoquez Spécialement 1 monstre "Force-S" depuis votre main, Cimetière ou bannissement, mais bannissez-le lorsqu'il quitte le Terrain. Si une autre carte est bannie, tant que cette carte est dans votre Cimetière (sauf durant la Damage Step) : vous pouvez bannir cette carte ; prenez 2 cartes "Force-S" ("Origine de la Force-S" exclu) depuis votre Deck, bannissez-en 1 et envoyez l'autre au Cimetière. Vous ne pouvez utiliser chaque effet de "Origine de la Force-S" qu'une fois par tour.
  it: |-
    Evoca Specialmente 1 mostro "S-Forza" dalla tua mano, Cimitero o carte bandite, ma bandiscilo quando lascia il Terreno. Se un'altra carta viene bandita, mentre questa carta è nel tuo Cimitero (eccetto durante il Damage Step): puoi bandire questa carta; prendi 2 carte "S-Forza" dal tuo Deck, eccetto "Origine S-Forza", bandisci 1 di esse e manda l'altra al Cimitero. Puoi utilizzare ogni effetto di "Origine S-Forza" una sola volta per turno.
  pt: |-
    Invoque por Invocação-Especial 1 monstro "Força-S" da sua mão, do Cemitério ou do banimento, mas bana-o quando ele deixar o campo. Se outro card for banido, enquanto este card estiver no seu Cemitério (exceto durante a Etapa de Dano): você pode banir este card; pegue 2 cards "Força-S" do seu Deck, exceto "Origem da Força-S", bana 1 deles e envie o outro para o Cemitério. Você só pode usar cada efeito de "Origem da Força-S" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分の手札・墓地・除外状態の「Ｓ－Ｆｏｒｃｅ」モンスター１体を特殊召喚する。この効果で特殊召喚したモンスターは、フィールドから離れた場合に除外される。②：このカードが墓地に存在する状態で、他のカードが除外された場合、このカードを除外して発動できる。デッキから「Ｓ－Ｆｏｒｃｅ オリジン」以外の「Ｓ－Ｆｏｒｃｅ」カード２枚を選び、その内の１枚を除外し、もう１枚を墓地へ送る。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신의 패 / 묘지 / 제외 상태인 "S－Force(시큐리티 포스)" 몬스터 1장을 특수 소환한다. 이 효과로 특수 소환한 몬스터는, 필드에서 벗어났을 경우에 제외된다. ②: 이 카드가 묘지에 존재하는 상태에서, 다른 카드가 제외되었을 경우, 이 카드를 제외하고 발동할 수 있다. 덱에서 "S－Force(시큐리티 포스) 오리진" 이외의 "S－Force(시큐리티 포스)" 카드 2장을 골라, 그 중의 1장을 제외하고, 나머지 1장을 묘지로 보낸다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：将自己手牌・墓地・除外状态的1只“超元特防队”怪兽特殊召唤。以此效果特殊召唤的怪兽从场上离开的情况下，将其除外。②：此卡存在于墓地的状态下，且其他卡被除外的情况下，将此卡除外可以发动。从牌组挑选2张“超元特防队 本源”以外的“超元特防队”卡，将其中1张除外，另1张送至墓地。
