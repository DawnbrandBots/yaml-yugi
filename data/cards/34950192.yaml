name:
  en: Lev Shaddoll Fusion
  de: Lev-Schattenpuppen-Fusion
  es: Fusión Lev Sombrañeca
  fr: Fusion Marionnette de l'Ombre Lev
  it: Fusione Lev Bambolaombra
  pt: Fusão Lev Sombraneco
  ja: <ruby>凍てし心が映す神影<rt>レヴシャドール・フュージョン</rt></ruby>
  ja_romaji: Revushadōru Fyūjon
  ko: 레브섀도르 퓨전
  ko_rr:
  zh-TW:
  zh-CN: 心影依结合
text:
  en: |-
    When this card is activated: Send 1 Fusion Monster from your Extra Deck to the GY. You can Tribute 1 Fusion Monster; Special Summon 1 "Shaddoll" Fusion Monster with a different Attribute from your Extra Deck (this is treated as a Fusion Summon), but its ATK becomes 0. You can only use each effect of "Lev Shaddoll Fusion" once per turn, also you cannot Special Summon from the Extra Deck the turn you activate either of this card's effects, except "Shaddoll" monsters.
  de: |-
    Wenn diese Karte aktiviert wird: Lege 1 Fusionsmonster von deinem Extra Deck auf den Friedhof. Du kannst 1 Fusionsmonster als Tribut anbieten; beschwöre 1 „Schattenpuppe“-Fusionsmonster mit einer unterschiedlichen Eigenschaft als Spezialbeschwörung von deinem Extra Deck (dies wird als Fusionsbeschwörung behandelt), aber seine ATK werden zu 0. Du kannst jeden Effekt von „Lev-Schattenpuppen-Fusion“ nur einmal pro Spielzug verwenden, zusätzlich kannst du in dem Spielzug, in dem du einen der Effekte dieser Karte aktivierst, keine Spezialbeschwörungen vom Extra Deck durchführen, außer von „Schattenpuppe“-Monstern.
  es: |-
    Cuando esta carta es activada: manda al Cementerio 1 Monstruo de Fusión en tu Deck Extra. Puedes Sacrificar 1 Monstruo de Fusión; Invoca de Modo Especial 1 Monstruo de Fusión "Sombrañeca" con un Atributo diferente desde tu Deck Extra (esto se trata como una Invocación por Fusión), pero su ATK se convierte en 0. Sólo puedes usar cada efecto de "Fusión Lev Sombrañeca" una vez por turno, y además no puedes Invocar de Modo Especial desde el Deck Extra el turno en el que activas cualquiera de los efectos de esta carta, excepto monstruos "Sombrañeca".
  fr: |-
    Lorsque cette carte est activée : envoyez 1 Monstre Fusion depuis votre Extra Deck au Cimetière. Vous pouvez Sacrifier 1 Monstre Fusion ; Invoquez Spécialement 1 Monstre Fusion "Marionnette de l'Ombre" d'Attribut différent depuis votre Extra Deck (ceci est traité comme Invocation Fusion), mais son ATK devient 0. Vous ne pouvez utiliser chaque effet de "Fusion Marionnette de l'Ombre Lev" qu'une fois par tour, et aussi, vous ne pouvez pas Invoquer Spécialement (monstres "Marionnette de l'Ombre" exclus) depuis l'Extra Deck le tour où vous activez un effet de cette carte.
  it: |-
    Quando questa carta viene attivata: manda 1 Mostro Fusione dal tuo Extra Deck al Cimitero. Puoi offrire come Tributo 1 Mostro Fusione; Evoca Specialmente 1 Mostro Fusione "Bambolaombra" con un Attributo diverso dal tuo Extra Deck (questa viene considerata come un'Evocazione tramite Fusione), ma il suo ATK diventa 0. Puoi utilizzare ogni effetto di "Fusione Lev Bambolaombra" una sola volta per turno, inoltre non puoi Evocare Specialmente dall'Extra Deck nel turno in cui attivi uno dei due effetti di questa carta, eccetto mostri "Bambolaombra".
  pt: |-
    Quando este card for ativado: envie 1 Monstro de Fusão do seu Deck Adicional para o Cemitério. Você pode oferecer como Tributo 1 Monstro de Fusão; Invoque por Invocação-Especial 1 Monstro de Fusão "Sombraneco" com um Atributo diferente do seu Deck Adicional (isso é considerado uma Invocação-Fusão), mas o ATK dele se torna 0. Você só pode usar cada efeito de "Fusão Lev Sombraneco" uma vez por turno e, além disso, você não pode Invocar por Invocação-Especial do Deck Adicional no turno em que ativar qualquer um dos efeitos deste card, exceto monstros "Sombraneco".
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できず、この効果を発動するターン、自分は「シャドール」モンスターしかＥＸデッキから特殊召喚できない。①：このカードの発動時の効果処理として、ＥＸデッキから融合モンスター１体を墓地へ送る。②：自分フィールドの融合モンスター１体をリリースして発動できる。そのモンスターとは属性が異なる「シャドール」融合モンスター１体をＥＸデッキから融合召喚扱いで特殊召喚する。この効果で特殊召喚したモンスターの攻撃力は０になる。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없으며, 이 효과를 발동하는 턴에, 자신은 "섀도르" 몬스터밖에 엑스트라 덱에서 특수 소환할 수 없다. ①: 이 카드의 발동시의 효과 처리로서, 엑스트라 덱에서 융합 몬스터 1장을 묘지로 보낸다. ②: 자신 필드의 융합 몬스터 1장을 릴리스하고 발동할 수 있다. 그 몬스터와는 속성이 다른 "섀도르" 융합 몬스터 1장을 엑스트라 덱에서 융합 소환으로 취급하고 특수 소환한다. 이 효과로 특수 소환한 몬스터의 공격력은 0 이 된다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次，发动此效果的回合中，自己从额外牌组仅可特殊召唤“影依”怪兽。①：作为此卡发动时的效果处理，从额外牌组将1只融合怪兽送至墓地。②：解放自己场上的1只融合怪兽可以发动。从额外牌组将1只属性与该怪兽不同的“影依”融合怪兽视为融合召唤特殊召唤。以此效果特殊召唤的怪兽攻击力变为0。
