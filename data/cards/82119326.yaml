name:
  en: Tails of the Fairy Tails
  de: Schweife der Märchenschweife
  es: Colas de los Colacuentos
  fr: Animaux de l'Animal Féérique
  it: Code dei Codafavola
  pt: Caudas da Cauda de Fadas
  ja: テールズオブ<ruby>妖精伝姫<rt>フェアリーテイル</rt></ruby>
  ja_romaji: Tēruzu Obu Fearī Teiru
  ko: 테일즈오브 페어리테일
  ko_rr:
  zh-TW:
  zh-CN: 妖精传姬之尾
text:
  en: |-
    The equipped monster gains 1000 ATK. Once per turn, during your Main Phase: You can Fusion Summon 1 Spellcaster Fusion Monster from your Extra Deck, using monsters from your hand, field, and/or "Prince of Fairies" your opponent controls as material. If this card is in your GY: You can equip this card to 1 "Fairy Tail" monster on the field, then immediately after this effect resolves, you can Normal Summon 1 Spellcaster monster with 1850 ATK. You can only use this effect of "Tails of the Fairy Tails" once per turn.
  de: |-
    Das ausgerüstete Monster erhält 1000 ATK. Einmal pro Spielzug, während deiner Main Phase: Du kannst 1 Hexer-Fusionsmonster als Fusionsbeschwörung von deinem Extra Deck beschwören, indem du Monster von deiner Hand, deiner Spielfeldseite und/oder „Prinz der Feen“, den dein Gegner kontrolliert, als Material verwendest. Falls sich diese Karte in deinem Friedhof befindet: Du kannst 1 „Märchenschweif“-Monster auf dem Spielfeld mit dieser Karte ausrüsten, dann, sofort nachdem dieser Effekt aufgelöst wurde, kannst du 1 Hexer-Monster mit 1850 ATK als Normalbeschwörung beschwören. Du kannst diesen Effekt von „Schweife der Märchenschweife“ nur einmal pro Spielzug verwenden.
  es: |-
    El monstruo equipado gana 1000 ATK. Una vez por turno, durante tu Main Phase: puedes Invocar por Fusión 1 Monstruo de Fusión Lanzador de Conjuros desde tu Deck Extra, usando monstruos en tu mano, Campo y/o "Príncipe de las Hadas" que controle tu adversario como material. Si esta carta está en tu Cementerio: puedes equipar esta carta a 1 monstruo "Colacuento" en el Campo, e inmediatamente después de que se resuelva este efecto, puedes Invocar de Modo Normal 1 monstruo Lanzador de Conjuros con 1850 ATK. Sólo puedes usar este efecto de "Colas de los Colacuentos" una vez por turno.
  fr: |-
    Le monstre équipé gagne 1000 ATK. Une fois par tour, durant votre Main Phase : vous pouvez Invoquer par Fusion 1 Monstre Fusion Magicien depuis votre Extra Deck, en utilisant des monstres depuis votre main, Terrain et/ou "Prince des Fées" contrôlé par votre adversaire comme Matériel. Si cette carte est dans votre Cimetière : vous pouvez équiper cette carte à 1 monstre "Animal Féérique" sur le Terrain, puis immédiatement après la résolution de cet effet, vous pouvez Invoquer Normalement 1 monstre Magicien avec 1850 ATK. Vous ne pouvez utiliser cet effet de "Animaux de l'Animal Féérique" qu'une fois par tour.
  it: |-
    Il mostro equipaggiato guadagna 1000 ATK. Una volta per turno, durante la tua Main Phase: puoi Evocare tramite Fusione 1 Mostro Fusione Incantatore dal tuo Extra Deck, utilizzando mostri dalla tua mano, Terreno e/o "Principe delle Fate" controllati dal tuo avversario come materiale. Se questa carta è nel tuo Cimitero: puoi equipaggiare questa carta a 1 mostro "Codafavola" sul Terreno, poi immediatamente dopo che questo effetto si è risolto, puoi Evocare Normalmente 1 mostro Incantatore con 1850 ATK. Puoi utilizzare questo effetto di "Code dei Codafavola" una sola volta per turno.
  pt: |-
    O monstro equipado ganha 1000 de ATK. Uma vez por turno, durante sua Fase Principal: você pode Invocar por Invocação-Fusão 1 Monstro de Fusão Mago do seu Deck Adicional, usando monstros da sua mão, do campo e/ou "Príncipe das Fadas" que seu oponente controla como matéria. Se este card estiver no seu Cemitério: você pode equipar este card a 1 monstro "Cauda de Fadas" no campo e, depois, imediatamente depois que este efeito resolver, você pode Invocar por Invocação-Normal 1 monstro Mago com 1850 de ATK. Você só pode usar este efeito de "Caudas da Cauda de Fadas" uma vez por turno.
  ja: |-
    このカード名の③の効果は１ターンに１度しか使用できない。①：装備モンスターの攻撃力は１０００アップする。②：１ターンに１度、自分メインフェイズに発動できる。自分の手札・フィールドのモンスターを融合素材とし、魔法使い族の融合モンスター１体を融合召喚する。その際、相手フィールドの「妖精の王子様」も融合素材とする事ができる。③：このカードが墓地に存在する場合に発動できる。このカードをフィールドの「妖精伝姫」モンスター１体に装備する。その後、攻撃力１８５０の魔法使い族モンスター１体の召喚を行う事ができる。
  ko: |-
    이 카드명의 ③의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 장착 몬스터의 공격력은 1000 올린다. ②: 1턴에 1번, 자신 메인 페이즈에 발동할 수 있다. 자신의 패 / 필드의 몬스터를 융합 소재로 하고, 마법사족 융합 몬스터 1장을 융합 소환한다. 그 시기에, 상대 필드의 "요정의 왕자님"도 융합 소재로 할 수 있다. ③: 이 카드가 묘지에 존재할 경우에 발동할 수 있다. 이 카드를 필드의 "페어리테일" 몬스터 1장에 장착한다. 그 후, 공격력 1850 인 마법사족 몬스터 1장의 일반 소환을 실행할 수 있다.
  zh-TW:
  zh-CN: |-
    此卡名的③效果1回合仅可使用1次。①：装备怪兽的攻击力上升1000。②：1回合1次，在自己的主要阶段可以发动。将自己手牌・场上的怪兽作为融合素材，将1只魔法师族的融合怪兽融合召唤。在此之际，也可将对手场上的“妖精的王子大人”作为融合素材。③：此卡存在于墓地的情况下可以发动。将此卡装备于场上的1只“妖精传姬”怪兽。然后，可进行1只攻击力1850的魔法师族怪兽的召唤。
