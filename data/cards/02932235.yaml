  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分・相手ターンに、手札・フィールドのこのカードを墓地へ送って発動できる。手札・デッキから「七皇の冀望郷」１枚を自分のフィールドゾーンに表側表示で置く。この効果の発動後、次の自分ターンの終了時まで、自分はＸモンスターしかＥＸデッキから特殊召喚できない。②：このカードが墓地に存在する状態で、Ｘモンスターが特殊召喚された場合に発動できる。このカードを特殊召喚する。このターン、自分の効果で発生する自分への効果ダメージは０になる。
