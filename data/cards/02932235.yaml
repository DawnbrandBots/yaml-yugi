text:
  en: |-
    (Quick Effect): You can send this card from your hand or field to the GY; place 1 "Seventh Barian's" from your hand or Deck face-up in your Field Zone, also you cannot Special Summon from the Extra Deck until the end of your next turn, except Xyz Monsters. If an Xyz Monster(s) is Special Summoned while this card is in your GY (except during the Damage Step): You can Special Summon this card, also you take no effect damage from your card effects for the rest of this turn. You can only use each effect of "Thousand Umbral Horror" once per turn.
