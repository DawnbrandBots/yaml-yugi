text:
  en: |-
    If this card battles a monster, neither can be destroyed by that battle. If this card is Normal or Special Summoned: You can send 1 Fiend, Illusion, or Spellcaster monster from your Deck to the GY, then you can make this card's Type become the original Type of that sent monster. If this card is in your GY: You can banish 1 Spell from your GY; Special Summon this card. You can only use this effect of "Fleeting Phantom Mask Master" once per Duel, and its previous effect only once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の、①の効果は１ターンに１度しか使用できず、③の効果はデュエル中に１度しか使用できない。①：このカードが召喚・特殊召喚した場合に発動できる。デッキから悪魔族・幻想魔族・魔法使い族モンスター１体を墓地へ送る。その後、このカードの種族をこの効果で墓地へ送ったモンスターの元々の種族と同じにできる。②：このカードがモンスターと戦闘を行う場合、その２体はその戦闘では破壊されない。③：このカードが墓地に存在する場合、自分の墓地から魔法カード１枚を除外して発動できる。このカードを特殊召喚する。
  ko: |-
    이 카드명의, ①의 효과는 1턴에 1번밖에 사용할 수 없으며, ③의 효과는 듀얼 중에 1번밖에 사용할 수 없다. ①: 이 카드를 일반 소환 / 특수 소환했을 경우에 발동할 수 있다. 덱에서 악마족 / 환상마족 / 마법사족 몬스터 1장을 묘지로 보낸다. 그 후, 이 카드의 종족을 이 효과로 묘지로 보낸 몬스터의 원래의 종족과 같게 할 수 있다. ②: 이 카드가 몬스터와 전투를 실행할 경우, 그 2장은 그 전투로는 파괴되지 않는다. ③: 이 카드가 묘지에 존재할 경우, 자신 묘지에서 마법 카드 1장을 제외하고 발동할 수 있다. 이 카드를 특수 소환한다.
  zh-TW:
  zh-CN: |-
    此卡名的①效果1回合仅可使用1次，③效果在决斗中仅可使用1次。①：此卡召唤・特殊召唤的情况下可以发动。从牌组将1只恶魔族・幻想魔族・魔法师族怪兽送至墓地。然后，可将此卡的种族改成与以此效果被送至墓地的怪兽的原本种族相同。②：此卡与怪兽进行战斗的情况下，该2只不会因该战斗被破坏。③：此卡存在于墓地的情况下，从自己墓地将1张魔法卡除外可以发动。将此卡特殊召唤。
