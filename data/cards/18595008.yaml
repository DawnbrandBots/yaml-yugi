name:
  en: Predaplant Lilizard
  de: Raubpflanze Lilieneidechse
  es: Predaplanta Lagartijazucena
  fr: Lyslézard Prédaplante
  it: Predapianta Gigliucertola
  pt: Predaplanta Lirilagarto
  ja: <ruby>捕食植物<rt>プレデター・プランツ</rt></ruby>テッポウリザード
  ja_romaji: Puredetā Purantsu Teppourizādo
  ko: 프레데터 플랜츠 텟포우리저드
  ko_rr:
  zh-TW:
  zh-CN: 捕食植物 铁炮瓜蜥蜴
text:
  en: |-
    If you control a "Predaplant" or "Starving Venom" monster and this card is in your hand: You can Special Summon this card, then you can add 1 "Polymerization" from your Deck to your hand. You can target 1 face-up monster on the field; it becomes DARK until the end of this turn. If this card is Special Summoned from the GY: You can draw 1 card. You can only use each effect of "Predaplant Lilizard" once per turn.
  de: |-
    Falls du ein „Raubpflanze“- oder „Hungergift“-Monster kontrollierst und diese Karte sich in deiner Hand befindet: Du kannst diese Karte als Spezialbeschwörung beschwören, dann kannst du deiner Hand 1 „Polymerisation“ von deinem Deck hinzufügen. Du kannst 1 offenes Monster auf dem Spielfeld wählen; es wird bis zum Ende dieses Spielzugs zu FINSTERNIS. Falls diese Karte als Spezialbeschwörung vom Friedhof beschworen wird: Du kannst 1 Karte ziehen. Du kannst jeden Effekt von „Raubpflanze Lilieneidechse“ nur einmal pro Spielzug verwenden.
  es: |-
    Si controlas un monstruo "Predaplanta" o "Hambriento Venenoso" y esta carta está en tu mano: puedes Invocar esta carta de Modo Especial, y después puedes añadir a tu mano 1 "Polimerización" en tu Deck. Puedes seleccionar 1 monstruo boca arriba en el Campo; éste se convierte en de OSCURIDAD hasta el final de este turno. Si esta carta es Invocada de Modo Especial desde el Cementerio: puedes robar 1 carta. Sólo puedes usar cada efecto de "Predaplanta Lagartijazucena" una vez por turno.
  fr: |-
    Si vous contrôlez un monstre "Prédaplante" ou "Venin Affamé", et que cette carte est dans votre main : vous pouvez Invoquer Spécialement cette carte, puis vous pouvez ajouter 1 "Polymérisation" depuis votre Deck à votre main. Vous pouvez cibler 1 monstre face recto sur le Terrain ; jusqu'à la fin de ce tour, il devient TÉNÈBRES. Si cette carte est Invoquée Spécialement depuis le Cimetière : vous pouvez piocher 1 carte. Vous ne pouvez utiliser chaque effet de "Lyslézard Prédaplante" qu'une fois par tour.
  it: |-
    Se controlli un mostro "Predapianta" o "Veleno Affamato" e questa carta è nella tua mano: puoi Evocare Specialmente questa carta, poi puoi aggiungere 1 "Polimerizzazione" dal tuo Deck alla tua mano. Puoi scegliere come bersaglio 1 mostro scoperto sul Terreno; esso diventa OSCURITÀ fino alla fine di questo turno. Se questa carta viene Evocata Specialmente dal Cimitero: puoi pescare 1 carta. Puoi utilizzare ogni effetto di "Predapianta Gigliucertola" una sola volta per turno.
  pt: |-
    Se você controlar um monstro "Predaplanta" ou "Peçonha Insaciável" e este card estiver na sua mão: você pode Invocar este card por Invocação-Especial e, depois, você pode adicionar 1 "Polimerização" do seu Deck à sua mão. Você pode escolher 1 monstro com a face para cima no campo; ele se torna de TREVAS até o final deste turno. Se este card for Invocado por Invocação-Especial do Cemitério: você pode comprar 1 card. Você só pode usar cada efeito de "Predaplanta Lirilagarto" uma vez por turno.
  ja: |-
    このカード名の①②③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが手札に存在し、自分フィールドに「捕食植物」モンスターか「スターヴ・ヴェノム」モンスターが存在する場合に発動できる。このカードを特殊召喚する。その後、デッキから「融合」１枚を手札に加える事ができる。②：フィールドの表側表示モンスター１体を対象として発動できる。そのモンスターの属性をターン終了時まで闇属性にする。③：このカードが墓地から特殊召喚した場合に発動できる。自分は１枚ドローする。
  ko: |-
    이 카드명의 ①②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드가 패에 존재하고, 자신 필드에 "프레데터 플랜츠" 몬스터나 "스타브 베놈" 몬스터가 존재할 경우에 발동할 수 있다. 이 카드를 특수 소환한다. 그 후, 덱에서 "융합" 1장을 패에 넣을 수 있다. ②: 필드의 앞면 표시 몬스터 1장을 대상으로 하고 발동할 수 있다. 그 몬스터의 속성을 턴 종료시까지 어둠 속성으로 한다. ③: 이 카드를 묘지에서 특수 소환했을 경우에 발동할 수 있다. 자신은 1장 드로우한다.
  zh-TW:
  zh-CN: |-
    此卡名的①②③效果1回合仅可各使用1次。①：此卡存在于手牌，且自己场上存在“捕食植物”怪兽或“凶饿猛毒”怪兽的情况下可以发动。将此卡特殊召唤。然后，可从牌组将1张“融合”加入手牌。②：以场上的1只表侧表示怪兽为对象可以发动。将该怪兽的属性直至回合结束时为止改成暗属性。③：此卡从墓地特殊召唤的情况下可以发动。自己抽1张。
