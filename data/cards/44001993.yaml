text:
  en: |-
    You can Ritual Summon this card with "Light and Darkness Ritual". Unaffected by your opponent's activated effects, unless they target this card. Spells/Traps you control cannot be destroyed, or banished, by your opponent's card effects. You can only use each of the following effects of "Magician of Dark Chaos - Black Chaos" once per turn. If this card is Special Summoned: You can add 1 Spell from your GY to your hand. You can target 1 card your opponent controls; banish it (face-down).
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    「光と闇の儀式」により降臨
    このカード名の①③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが特殊召喚した場合に発動できる。自分の墓地から魔法カード１枚を手札に加える。②：このカードがモンスターゾーンに存在する限り、自分フィールドの魔法・罠カードは相手の効果では破壊されず、相手の効果では除外できず、このカードはこのカードを対象とする効果以外の相手が発動した効果を受けない。③：相手フィールドのカード１枚を対象として発動できる。そのカードを裏側で除外する。
  ko:
  zh-TW:
  zh-CN: |-
    以“光与暗的仪式”降临
    此卡名的①③效果1回合仅可各使用1次。①：此卡特殊召唤的情况下可以发动。从自己墓地将1张魔法卡加入手牌。②：只要此卡存在于怪兽区域，自己场上的魔法・陷阱卡就不会因对手的效果被破坏、不可因对手的效果除外，此卡不受对手发动的效果影响，除非是以此卡为对象的效果。③：以对手场上的1张卡为对象可以发动。将该卡以里侧除外。
