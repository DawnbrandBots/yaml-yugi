name:
  en: Magician of Dark Chaos - Black Chaos
  de: Magier des dunklen Chaos - Schwarzes Chaos
  es: Mago del Caos Oscuro - Caos Negro
  fr: Magicien du Chaos des Ténèbres - Chaos Sombre
  it: Mago del Chaos Nero - Chaos Oscuro
  pt: Mago do Caos Negro - Caos das Trevas
  ja: <ruby>黒<rt>くろ</rt></ruby>き<ruby>混<rt>こん</rt></ruby><ruby>沌<rt>とん</rt></ruby>の<ruby>魔<rt>ま</rt></ruby><ruby>術<rt>じゅつ</rt></ruby><ruby>師<rt>し</rt></ruby>ブラック・カオス
  ja_romaji: Kuroki Konton no Majutsushi Burakku Kaosu
  ko:
  ko_rr:
  zh-TW:
  zh-CN: 黑色混元之魔术师 黑暗混沌
text:
  en: |-
    You can Ritual Summon this card with "Light and Darkness Ritual". Unaffected by your opponent's activated effects, unless they target this card, also Spells/Traps you control cannot be destroyed, or banished, by your opponent's card effects. You can only use each of the following effects of "Magician of Dark Chaos - Black Chaos" once per turn. If this card is Special Summoned: You can add 1 Spell from your GY to your hand. You can target 1 card your opponent controls; banish it face-down.
  de: |-
    Du kannst diese Karte mit „Ritual von Licht und Finsternis“ als Ritualbeschwörung beschwören. Bleibt von aktivierten Effekten deines Gegners unberührt, es sei denn, sie wählen diese Karte als Ziel, zusätzlich können Zauber/Fallen, die du kontrollierst, durch Karteneffekte deines Gegners weder zerstört noch verbannt werden. Du kannst jeden der folgenden Effekte von „Magier des dunklen Chaos - Schwarzes Chaos“ nur einmal pro Spielzug verwenden. Falls diese Karte als Spezialbeschwörung beschworen wird: Du kannst deiner Hand 1 Zauber von deinem Friedhof hinzufügen. Du kannst 1 Karte wählen, die dein Gegner kontrolliert; verbanne sie verdeckt.
  es: |-
    Puedes Invocar esta carta por Ritual con "Ritual de la Luz y la Oscuridad". No es afectada por los efectos activados de tu adversario, a menos que seleccionen esta carta, y además las Mágicas/Trampas que controlas no pueden ser destruidas, o desterradas, por efectos de cartas de tu adversario. Sólo puedes usar cada uno de los siguientes efectos de "Mago del Caos Oscuro - Caos Negro" una vez por turno. Si esta carta es Invocada de Modo Especial: puedes añadir a tu mano 1 Mágica en tu Cementerio. Puedes seleccionar 1 carta que controle tu adversario; destiérrala boca abajo.
  fr: |-
    Vous pouvez Invoquer Rituellement cette carte avec "Rituel de la Lumière et des Ténèbres". Non affectée par les effets activés de votre adversaire, sauf s'ils ciblent cette carte, et aussi, les Magies/Pièges que vous contrôlez ne peuvent être ni détruits ni bannis par des effets de carte de votre adversaire. Vous ne pouvez utiliser chacun des effets suivants de "Magicien du Chaos des Ténèbres - Chaos Sombre" qu'une fois par tour. Si cette carte est Invoquée Spécialement : vous pouvez ajouter 1 Magie depuis votre Cimetière à votre main. Vous pouvez cibler 1 carte contrôlée par votre adversaire ; bannissez-la face verso.
  it: |-
    Puoi Evocare tramite Rituale questa carta con "Rituale di Luce e Oscurità". Immune agli effetti attivati del tuo avversario, a meno che essi scelgano come bersaglio questa carta, inoltre le Magie/Trappole che controlli non possono essere distrutte, o bandite, dagli effetti delle carte del tuo avversario. Puoi utilizzare ognuno dei seguenti effetti di "Mago del Chaos Nero - Chaos Oscuro" una sola volta per turno. Se questa carta viene Evocata Specialmente: puoi aggiungere 1 Magia dal tuo Cimitero alla tua mano. Puoi scegliere come bersaglio 1 carta controllata dal tuo avversario; bandiscila coperta.
  pt: |-
    Você pode Invocar este card por Invocação-Ritual com "Ritual da Luz e das Trevas". Não é afetado pelos efeitos ativados do seu oponente, a não ser que eles escolham este card como alvo e, além disso, Magias/Armadilhas que você controla não podem ser destruídas, ou banidas, pelos efeitos de card do seu oponente. Você só pode usar cada um dos seguintes efeitos de "Mago do Caos Negro - Caos das Trevas" uma vez por turno. Se este card for Invocado por Invocação-Especial: você pode adicionar 1 Magia do seu Cemitério à sua mão. Você pode escolher 1 card que seu oponente controla; bana-o com a face para baixo.
  ja: |-
    「光と闇の儀式」により降臨
    このカード名の①③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが特殊召喚した場合に発動できる。自分の墓地から魔法カード１枚を手札に加える。②：このカードがモンスターゾーンに存在する限り、自分フィールドの魔法・罠カードは相手の効果では破壊されず、相手の効果では除外できず、このカードはこのカードを対象とする効果以外の相手が発動した効果を受けない。③：相手フィールドのカード１枚を対象として発動できる。そのカードを裏側で除外する。
  ko:
  zh-TW:
  zh-CN: |-
    以“光与暗的仪式”降临
    此卡名的①③效果1回合仅可各使用1次。①：此卡特殊召唤的情况下可以发动。从自己墓地将1张魔法卡加入手牌。②：只要此卡存在于怪兽区域，自己场上的魔法・陷阱卡就不会因对手的效果被破坏、不可因对手的效果除外，此卡不受对手发动的效果影响，除非是以此卡为对象的效果。③：以对手场上的1张卡为对象可以发动。将该卡以里侧除外。
