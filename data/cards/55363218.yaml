text:
  en: |-
    Cannot be Normal Summoned/Set. Must be Special Summoned (from your hand) while a face-up monster that cannot be Normal Summoned/Set is on the field. You can only Special Summon "Cartoon Shade" once per turn this way. If this card is Special Summoned: You can add 1 monster with 2000 ATK or DEF that cannot be Normal Summoned/Set from your Deck to your hand. If this card on the field is Tributed: You can target 1 card on the field, or you can target 2 if you control a monster with 2000 ATK or DEF; return that card(s) to the hand.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカードは通常召喚できない。「カートゥーン・シェード」は１ターンに１度、通常召喚できないモンスターがフィールドに表側表示で存在する場合のみ特殊召喚できる。①：このカードが特殊召喚した場合に発動できる。攻撃力か守備力が２０００の通常召喚できないモンスター１体をデッキから手札に加える。②：フィールドのこのカードがリリースされた場合、フィールドのカード１枚を対象として発動できる（自分フィールドに攻撃力か守備力が２０００のモンスターが存在する場合、この効果の対象を２枚にできる）。そのカードを手札に戻す。
  ko:
  zh-TW:
  zh-CN: |-
    此卡不可通常召唤。“剪影卡通”1回合1次，仅可在有不可通常召唤的怪兽以表侧表示存在于场上的情况下特殊召唤。①：此卡特殊召唤的情况下可以发动。从牌组将1只攻击力或守备力为2000的、不可通常召唤的怪兽加入手牌。②：场上的此卡被解放的情况下，以场上的1张卡为对象可以发动（自己场上存在攻击力或守备力为2000的怪兽的情况下，可将此效果的对象改成2张）。将该卡放回手牌。
