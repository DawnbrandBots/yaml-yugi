name:
  en: Dark Sage
  de: Dunkler Gelehrter
  es: Sabio Oscuro
  fr: Sage des Ténèbres
  it: Saggio Oscuro
  pt: Sábio Negro
  ja: <ruby>黒<rt>こく</rt></ruby><ruby>衣<rt>い</rt></ruby>の<ruby>大<rt>だい</rt></ruby><ruby>賢<rt>けん</rt></ruby><ruby>者<rt>じゃ</rt></ruby>
  ja_romaji: Kokui no Daikenja
  ko: 검은 옷의 대현자
  ko_rr:
  zh-TW: 黑衣大賢者
  zh-CN: 黑衣大贤者
text:
  en: |-
    Cannot be Normal Summoned/Set. Must first be Special Summoned by its own effect. If you called the coin toss right for the effect of "Time Wizard": You can Tribute 1 "Dark Magician" in your Monster Zone; Special Summon this card from your hand or Deck. If Special Summoned this way: Add 1 Spell from your Deck to your hand.
  de: |-
    Kann nicht als Normalbeschwörung beschworen/gesetzt werden. Diese Karte muss erst durch ihren eigenen Effekt als Spezialbeschwörung beschworen werden. Falls du den Münzwurf für den Effekt von „Zeitzauberer“ richtig vorausgesagt hast: Du kannst 1 „Dunkler Magier“ in deiner Monsterzone als Tribut anbieten; beschwöre diese Karte als Spezialbeschwörung von deiner Hand oder deinem Deck. Falls sie auf diese Art als Spezialbeschwörung beschworen wird: Füge deiner Hand 1 Zauber von deinem Deck hinzu.
  es: |-
    No puede ser Invocado de Modo Normal/Colocado. Debe ser primero Invocado de Modo Especial por su propio efecto. Si acertaste en el lanzamiento de moneda del efecto de "Mago del Tiempo": puedes Sacrificar 1 "Mago Oscuro" en tu Zona de Monstruos; Invoca esta carta de Modo Especial desde tu mano o Deck. Si es Invocada de Modo Especial de esta forma: añade a tu mano 1 Mágica en tu Deck.
  fr: |-
    Ni Invocable Normalement ni Posable Normalement. Doit d'abord être Invoquée Spécialement par son propre effet. Si vous avez gagné à pile ou face pour l'effet de "Magicien du Temps" : vous pouvez Sacrifier 1 "Magicien Sombre" dans votre Zone Monstre ; Invoquez Spécialement cette carte depuis votre main ou Deck. Si elle est Invoquée Spécialement de cette façon : ajoutez 1 Magie depuis votre Deck à votre main.
  it: |-
    Non può essere Evocato Normalmente/Posizionato. Deve prima essere Evocato Specialmente dal suo stesso effetto. Se hai indovinato il lancio della moneta per l'effetto di "Stregone del Tempo": puoi offrire come Tributo 1 "Mago Nero" nella tua Zona Mostri; Evoca Specialmente questa carta dalla tua mano o Deck. Se viene Evocato Specialmente in questo modo: aggiungi 1 Magia dal tuo Deck alla tua mano.
  pt:
  ja: |-
    このカードは通常召喚できない。自分の「時の魔術師」のコイントスを当てた時、自分フィールド上に存在する「ブラック・マジシャン」１体をリリースして手札またはデッキから特殊召喚する事ができる。この方法で特殊召喚に成功した時、自分のデッキから魔法カード１枚を手札に加える。
  ko: |-
    이 카드는 일반 소환/세트할 수 없다. "시간의 마술사"의 효과 성공시, 필드 위의 "블랙 매지션" 1장을 제물로 바치는 것으로, 패 또는 덱에서 이 몬스터 1장을 특수 소환한다. 그때, 덱에서 마법 카드를 1장 선택하고 패에 넣어 덱을 셔플한다.
  zh-TW:
  zh-CN: |-
    这张卡不能通常召唤。猜中自己的「时间魔术师」的投掷硬币时，可以把自己场上存在的1只「黑魔术师」解放从手卡或者卡组特殊召唤。这个方法特殊召唤成功时，从自己卡组把1张魔法卡加入手卡。
