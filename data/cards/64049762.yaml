name:
  en: Blitzclique - Breakaway
  de: Blitzclique - Zerschmettern
  es: Blitzclique - Fragmentación
  fr: Blitzclique - Rupture
  it: Blitzclique - Rottura
  pt: Blitzclique - Destruição
  ja: <ruby>雷盟<rt>ブリッツクリーク</rt></ruby>－ブレイクアウェイ
  ja_romaji: Burittsukurīku - Bureikuawei
  ko: 블리츠크리크－브레이크어웨이
  ko_rr:
  zh-TW:
  zh-CN: 雷盟－断离粉碎
text:
  en: |-
    Activate 1 of these effects;
    ● Place 1 "Blitzclique" Continuous Trap from your Deck, face-up on your field.
    ● Return 1 Thunder monster you control to the hand, then target 1 card on the field; destroy it.
    If a card(s) is destroyed by your "Blitzclique" card's effect, while this card is in your GY (except during the Damage Step): You can add this card to your hand. You can only use each effect of "Blitzclique - Breakaway" once per turn.
  de: |-
    Aktiviere 1 dieser Effekte;
    ● Lege 1 Permanente „Blitzclique“-Falle von deinem Deck offen auf deine Spielfeldseite.
    ● Gib 1 Donner-Monster, das du kontrollierst, auf die Hand zurück und wähle dann 1 Karte auf dem Spielfeld; zerstöre sie.
    Falls eine oder mehr Karten durch einen Effekt deiner „Blitzclique“-Karte zerstört werden, solange sich diese Karte in deinem Friedhof befindet (außer während des Damage Steps): Du kannst diese Karte deiner Hand hinzufügen. Du kannst jeden Effekt von „Blitzclique - Zerschmettern“ nur einmal pro Spielzug verwenden.
  es: |-
    Activa 1 de estos efectos;
    ● Pon boca arriba en tu Campo 1 Trampa Continua "Blitzclique" en tu Deck.
    ● Devuelve a la mano 1 monstruo Trueno que controles, y después selecciona 1 carta en el Campo; destrúyela.
    Si una o más cartas son destruidas por el efecto de tu carta "Blitzclique", mientras esta carta está en tu Cementerio (excepto durante el Damage Step): puedes añadir esta carta a tu mano. Sólo puedes usar cada efecto de "Blitzclique - Fragmentación" una vez por turno.
  fr: |-
    Activez 1 de ces effets ;
    ● Placez face recto 1 Piège Continu "Blitzclique" depuis votre Deck sur votre Terrain.
    ● Renvoyez 1 monstre Tonnerre que vous contrôlez à la main, puis ciblez 1 carte sur le Terrain ; détruisez-la.
    Si une ou plusieurs cartes sont détruites par un effet de votre carte "Blitzclique", tant que cette carte est dans votre Cimetière (sauf durant la Damage Step) : vous pouvez ajouter cette carte à votre main. Vous ne pouvez utiliser chaque effet de "Blitzclique - Rupture" qu'une fois par tour.
  it: |-
    Attiva 1 di questi effetti;
    ● Metti 1 Trappola Continua "Blitzclique" dal tuo Deck, scoperta sul tuo Terreno.
    ● Fai ritornare 1 mostro Tuono che controlli nella mano, poi scegli come bersaglio 1 carta sul Terreno; distruggila.
    Se una o più carte vengono distrutte dall'effetto di una tua carta "Blitzclique", mentre questa carta è nel tuo Cimitero (eccetto durante il Damage Step): puoi aggiungere questa carta alla tua mano. Puoi utilizzare ogni effetto di "Blitzclique - Rottura" una sola volta per turno.
  pt: |-
    Ative 1 desses efeitos;
    ● Coloque 1 Armadilha Contínua "Blitzclique" do seu Deck, com a face para cima no seu campo.
    ● Devolva 1 monstro Trovão que você controla para a mão e, depois, escolha 1 card no campo; destrua-o.
    Se um ou mais cards forem destruídos por um efeito de card "Blitzclique" seu, enquanto este card estiver no seu Cemitério (exceto durante a Etapa de Dano): você pode adicionar este card à sua mão. Você só pode usar cada efeito de "Blitzclique - Destruição" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：以下の効果から１つを選択して発動できる。
    ●デッキから「ブリッツクリーク」永続罠カード１枚を自分フィールドに表側表示で置く。
    ●自分フィールドの雷族モンスター１体を手札に戻し、フィールドのカード１枚を対象として発動できる。そのカードを破壊する。
    ②：このカードが墓地に存在する状態で、自分の「ブリッツクリーク」カードの効果でカードを破壊した場合に発動できる。このカードを手札に加える。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이하의 효과에서 1개를 선택하고 발동할 수 있다.
    ●덱에서 "블리츠크리크" 지속 함정 카드 1장을 자신 필드에 앞면 표시로 놓는다.
    ●자신 필드의 번개족 몬스터 1장을 패로 되돌리고, 필드의 카드 1장을 대상으로 하여 발동할 수 있다. 그 카드를 파괴한다.
    ②: 이 카드가 묘지에 존재하는 상태에서, 자신의 "블리츠크리크" 카드의 효과로 카드를 파괴했을 경우에 발동할 수 있다. 이 카드를 패에 넣는다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：可从以下效果中选择1个发动。
    ●从牌组将1张“雷盟”永续陷阱卡以表侧表示放在自己场上。
    ●将自己场上的1只雷族怪兽放回手牌，以场上的1张卡为对象可以发动。将该卡破坏。
    ②：此卡存在于墓地的状态下，以自己的“雷盟”卡的效果破坏了卡的情况下可以发动。将此卡加入手牌。
