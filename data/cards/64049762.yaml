text:
  en: |-
    Activate 1 of these effects;
    ● Place 1 "Blitzclique" Continuous Trap from your Deck, face-up on your field.
    ● Return 1 Thunder monster you control to the hand, then target 1 card on the field; destroy it.
    If a card(s) is destroyed by your "Blitzclique" card's effect, while this card is in your GY (except during the Damage Step): You can add this card to your hand. You can only use each effect of "Blitzclique - Breakaway" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：以下の効果から１つを選択して発動できる。
    ●デッキから「ブリッツクリーク」永続罠カード１枚を自分フィールドに表側表示で置く。
    ●自分フィールドの雷族モンスター１体を手札に戻し、フィールドのカード１枚を対象として発動できる。そのカードを破壊する。
    ②：このカードが墓地に存在する状態で、自分の「ブリッツクリーク」カードの効果でカードを破壊した場合に発動できる。このカードを手札に加える。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：可从以下效果中选择1个发动。
    ●从牌组将1张“雷盟”永续陷阱卡以表侧表示放在自己场上。
    ●将自己场上的1只雷族怪兽放回手牌，以场上的1张卡为对象可以发动。将该卡破坏。
    ②：此卡存在于墓地的状态下，以自己的“雷盟”卡的效果破坏了卡的情况下可以发动。将此卡加入手牌。
