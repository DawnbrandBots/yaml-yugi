text:
  en: |-
    You can Normal Summon this card without Tributing. You can only use each of the following effects of "Hublot the Dark Directory of Death" once per turn. If this card is Normal or Special Summoned: You can send 1 Level 6 or higher Zombie monster from your Deck to the GY, except "Hublot the Dark Directory of Death", then you can add 1 Level 6 or higher Zombie monster from your GY to your hand. If a monster(s) is Special Summoned from the GY while this card is in the Monster Zone, you can (except during the Damage Step): Immediately after this effect resolves, Xyz Summon 1 Zombie Xyz Monster.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の②③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードはリリースなしで召喚できる。②：このカードが召喚・特殊召喚した場合に発動できる。「死相の冥鑑ヒュブロ」を除く、レベル６以上のアンデット族モンスター１体をデッキから墓地へ送る。その後、自分の墓地からレベル６以上のアンデット族モンスター１体を手札に加える事ができる。③：このカードがモンスターゾーンに存在する状態で、墓地からモンスターが特殊召喚された場合に発動できる。アンデット族Ｘモンスター１体のＸ召喚を行う。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的②③效果1回合仅可各使用1次。①：此卡无需解放即可召唤。②：此卡召唤・特殊召唤的情况下可以发动。从牌组将除“死相之冥鉴 修布罗”以外的、1只等级6以上的不死族怪兽送至墓地。然后，可从自己墓地将1只等级6以上的不死族怪兽加入手牌。③：此卡存在于怪兽区域的状态下，有怪兽从墓地被特殊召唤的情况下可以发动。进行1只不死族超量怪兽的超量召唤。
