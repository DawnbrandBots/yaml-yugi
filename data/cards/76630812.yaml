text:
  en: |-
    Roll a six-sided die twice and apply these effects for the rest of this turn.
    ● Monsters you control that mention "Dark Time Wizard" gain ATK/DEF equal to the total x 200.
    ● Monsters your opponent controls lose ATK/DEF equal to the total x 200.
    If your opponent Normal or Special Summons a monster(s) while this card is in your GY (except during the Damage Step): You can banish this card, then target 1 of those monsters; roll a six-sided die twice, and if the total is 6 or more, destroy that monster.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    ①：サイコロを２回振り、このターン中、以下の効果をそれぞれ適用する。●「時の黒魔術師」のカード名が記された自分フィールドのモンスターの攻撃力・守備力は、出た目の合計×２００アップする。●相手フィールドのモンスターの攻撃力・守備力は、出た目の合計×２００ダウンする。②：このカードが墓地に存在する状態で、相手がモンスターを召喚・特殊召喚した場合、このカードを除外し、その内の１体を対象として発動できる。サイコロを２回振り、出た目の合計が６以上だった場合、対象のモンスターを破壊する。
  ko:
  zh-TW:
  zh-CN: |-
    ①：掷2次骰子，此回合中，分别适用以下效果。
    ●记载有“时间黑魔术师”卡名的、自己场上的怪兽的攻击力・守备力上升掷出的数字合计×200的数值。
    ●对手场上的怪兽的攻击力・守备力下降掷出的数字合计×200的数值。
    ②：此卡存在于墓地的状态下，对手将怪兽召唤・特殊召唤的情况下，将此卡除外，以其中1只为对象可以发动。掷2次骰子，掷出的数字合计在6以上的情况下，将对象怪兽破坏。
