name:
  en: Archfiend's Usurpation
  de: Machtergreifung des Erzunterweltlers
  es: Usurpación del Archidemonio
  fr: Usurpation de l'Archdémon
  it: Usurpazione dell'Arcidemone
  pt: Usurpação do Arquidemônio
  ja: デーモンの<ruby>簒<rt>さん</rt></ruby><ruby>奪<rt>だつ</rt></ruby>
  ja_romaji: Dēmon no Sandatsu
  ko: 데몬의 찬탈
  ko_rr:
  zh-TW:
  zh-CN: 恶魔的篡夺
text:
  en: |-
    Activate 1 of these effects;
    ● Set 1 "Archfiend" Trap from your Deck or GY. It can be activated this turn.
    ● Ritual Summon 1 "Archfiend" Ritual Monster from your hand or face-up Extra Deck, by Tributing monsters from your hand or field whose total Levels equal or exceed its Level.
    You can only activate 1 "Archfiend's Usurpation" per turn.
  de: |-
    Aktiviere 1 dieser Effekte;
    ● Setze 1 „Erzunterweltler“-Falle von deinem Deck oder Friedhof. Sie kann in diesem Spielzug aktiviert werden.
    ● Beschwöre 1 „Erzunterweltler“-Ritualmonster als Ritualbeschwörung von deiner Hand oder offen von deinem Extra Deck, indem du Monster von deiner Hand oder Spielfeldseite als Tribut anbietest, deren gemeinsame Stufe größer oder gleich seiner Stufe ist.
    Du kannst nur 1 „Machtergreifung des Erzunterweltlers“ pro Spielzug aktivieren.
  es: |-
    Activa 1 de estos efectos;
    ● Coloca 1 Trampa "Archidemonio" desde tu Deck o Cementerio. Ésta puede ser activada este turno.
    ● Invoca por Ritual 1 Monstruo de Ritual "Archidemonio" desde tu mano o Deck Extra boca arriba, Sacrificando monstruos en tu mano o Campo cuyos Niveles totales sean iguales o superen su Nivel.
    Sólo puedes activar 1 "Usurpación del Archidemonio" por turno.
  fr: |-
    Activez 1 de ces effets ;
    ● Posez 1 Piège "Archdémon" depuis votre Deck ou Cimetière. Il peut être activé ce tour.
    ● Invoquez Rituellement 1 Monstre Rituel "Archdémon" depuis votre main ou Extra Deck face recto, en Sacrifiant des monstres depuis votre main ou Terrain dont la somme des Niveaux est supérieure ou égale à son Niveau.
    Vous ne pouvez activer qu'1 "Usurpation de l'Archdémon" par tour.
  it: |-
    Attiva 1 di questi effetti;
    ● Posiziona 1 Trappola "Arcidemone" dal tuo Deck o Cimitero. Essa può essere attivata in questo turno.
    ● Evoca tramite Rituale 1 Mostro Rituale "Arcidemone" dalla tua mano o Extra Deck scoperto, offrendo come Tributo mostri dalla tua mano o Terreno con Livello totale pari o superiore al suo Livello.
    Puoi attivare solo 1 "Usurpazione dell'Arcidemone" per turno.
  pt: |-
    Ative 1 desses efeitos;
    ● Baixe 1 Armadilha "Arquidemônio" do seu Deck ou Cemitério. Ela pode ser ativada neste turno.
    ● Invoque por Invocação-Ritual 1 Monstro de Ritual "Arquidemônio" da sua mão ou do Deck Adicional com a face para cima, ao oferecer monstros como Tributo da sua mão ou do campo cuja soma dos Níveis seja igual ou exceda seu Nível.
    Você só pode ativar 1 "Usurpação do Arquidemônio" por turno.
  ja: |-
    このカード名のカードは１ターンに１枚しか発動できない。①：以下の効果から１つを選択して発動できる。
    ●自分のデッキ・墓地から「デーモン」罠カード１枚を自分フィールドにセットする。この効果でセットしたカードはセットしたターンでも発動できる。
    ●レベルの合計が儀式召喚するモンスターのレベル以上になるように、自分の手札・フィールドのモンスターをリリースし、自分の手札・ＥＸデッキ（表側）から「デーモン」儀式モンスター１体を儀式召喚する。
  ko: |-
    이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다. ①: 이하의 효과에서 1개를 선택하고 발동할 수 있다.
    ●자신의 덱 / 묘지에서 "데몬" 함정 카드 1장을 자신 필드에 세트한다. 이 효과로 세트한 카드는 세트한 턴에도 발동할 수 있다.
    ●레벨의 합계가 의식 소환할 몬스터의 레벨 이상이 되도록, 자신의 패 / 필드의 몬스터를 릴리스하고, 자신의 패 / 엑스트라 덱(앞면)에서 "데몬" 의식 몬스터 1장을 의식 소환한다.
  zh-TW:
  zh-CN: |-
    此卡名的卡1回合仅可发动1张。①：可从以下效果中选择1个发动。
    ●从自己牌组・墓地将1张“恶魔”陷阱卡放置在自己场上。以此效果放置的卡在放置的回合也可以发动。
    ●为使合计等级达到仪式召唤的怪兽的等级以上，解放自己手牌・场上的怪兽，从自己手牌・额外牌组（表侧）将1只“恶魔”仪式怪兽仪式召唤。
