text:
  en: |-
    3+ Level 2 Beast monsters
    Once per turn, you can also Xyz Summon "Melffy Godmommy" by using "Melffy Mommy" you control (transfer its materials). If this card is Special Summoned: You can add 1 "Melffy" Spell/Trap from your Deck or GY to your hand. Gains ATK equal to the combined ATK and DEF of "Melffy" monsters attached to it. You can detach 5 materials from this card; return all cards your opponent controls to the hand.
  de: |-
    3+ Ungeheuer-Monster der Stufe 2
    Einmal pro Spielzug kannst du „Melffy-Patenmami“ auch als Xyz-Beschwörung beschwören, indem du „Melffy-Mami“ verwendest, die du kontrollierst (transferiere ihr Material). Falls diese Karte als Spezialbeschwörung beschworen wird: Du kannst deiner Hand 1 „Melffy“-Zauber/Falle von deinem Deck oder Friedhof hinzufügen. Diese Karte erhält ATK in Höhe der kombinierten ATK und DEF der „Melffy“-Monster, die an sie angehängt sind. Du kannst 5 Material von dieser Karte abhängen; gib alle Karten, die dein Gegner kontrolliert, auf die Hand zurück.
  es: |-
    3+ monstruos Bestia de Nivel 2
    Una vez por turno, también puedes Invocar Xyz "Madrinita Melffy" usando "Mami Melffy" que controles (transfiere sus materiales). Si esta carta es Invocada de Modo Especial: puedes añadir a tu mano 1 Mágica/Trampa "Melffy" en tu Deck o Cementerio. Gana ATK igual al ATK y DEF combinados de los monstruos "Melffy" acoplados a él. Puedes desacoplar 5 materiales de esta carta; devuelve a la mano todas las cartas que controle tu adversario.
  fr: |-
    3+ monstres Bête de Niveau 2
    Une fois par tour, vous pouvez aussi Invoquer par Xyz "Marraimommy Melffy" en utilisant "Mommy Melffy" que vous contrôlez (transférez ses Matériels). Si cette carte est Invoquée Spécialement : vous pouvez ajouter 1 Magie/Piège "Melffy" depuis votre Deck ou Cimetière à votre main. Gagne une ATK égale à la somme des ATK/DEF des monstres "Melffy" qui lui sont attachés. Vous pouvez détacher 5 Matériels de cette carte ; renvoyez toutes les cartes contrôlées par votre adversaire à la main.
  it: |-
    3+ mostri Bestia di Livello 2
    Una volta per turno, puoi anche Evocare Xyz "Melffy Madrina" utilizzando una "Melffy Mammina" che controlli (trasferisci i suoi materiali). Se questa carta viene Evocata Specialmente: puoi aggiungere 1 Magia/Trappola "Melffy" dal tuo Deck o Cimitero alla tua mano. Guadagna ATK pari alla somma degli ATK e DEF dei mostri "Melffy" attaccati a esso. Puoi staccare 5 materiali da questa carta; fai ritornare tutte le carte controllate dal tuo avversario nella mano.
  pt: |-
    3+ monstros Besta de Nível 2
    Uma vez por turno, você também pode Invocar "Melffy Godmommy" por Invocação-Xyz ao usar "Melffy Mommy" que você controla (transfira as matérias dele). Se este card for Invocado por Invocação-Especial: você pode adicionar 1 Magia/Armadilha "Melffy" do seu Deck ou Cemitério à sua mão. Ganha ATK igual ao ATK e DEF combinados dos monstros "Melffy" associados a ele. Você pode desassociar 5 matérias deste card; devolva todos os cards que seu oponente controla para a mão.
  ja: |-
    獣族レベル２モンスター×３体以上
    「メルフィーゴッド・マミィ」は１ターンに１度、自分フィールドの「メルフィー・マミィ」の上に重ねてＸ召喚する事もできる。①：このカードが特殊召喚した場合に発動できる。自分のデッキ・墓地から「メルフィー」魔法・罠カード１枚を手札に加える。②：このカードの攻撃力は、このカードがＸ素材としている「メルフィー」モンスターの攻撃力・守備力の合計分アップする。③：このカードのＸ素材を５つ取り除いて発動できる。相手フィールドのカードを全て手札に戻す。
  ko:
  zh-TW:
  zh-CN: |-
    兽族等级2怪兽×3只以上
    “梅尔菲教母・玛咪”1回合1次，也可重叠在自己场上的“梅尔菲・玛咪”上面来超量召唤。①：此卡特殊召唤的情况下可以发动。从自己牌组・墓地将1张“梅尔菲”魔法・陷阱卡加入手牌。②：此卡的攻击力上升相当于此卡持有的超量素材中“梅尔菲”怪兽的攻击力・守备力的合计的数值。③：去除此卡的5个超量素材可以发动。将对手场上的卡全部放回手牌。
