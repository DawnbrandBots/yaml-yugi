text:
  en: |-
    You can Special Summon this card (from your hand) by revealing 1 face-down card you control and returning it to the hand/Extra Deck. You can only Special Summon "Kuzuha the Bewitching Deity Ashtra" once per turn this way. You can only use each of the following effects of "Kuzuha the Bewitching Deity Ashtra" once per turn. You can target up to 1 card on the field for every 2 face-down cards on the field; destroy them. During your End Phase: You can target 1 "Ashtra" Trap in your GY; Set it.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の、①の方法による特殊召喚は１ターンに１度しかできず、②③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードは自分フィールドの裏側表示カード１枚を相手に見せて手札・ＥＸデッキに戻し、手札から特殊召喚できる。②：フィールドの裏側表示カード２枚につき１枚まで、フィールドのカードを対象として発動できる。そのカードを破壊する。③：自分エンドフェイズに、自分の墓地の「アシュトラ」罠カード１枚を対象として発動できる。そのカードを自分フィールドにセットする。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名以①方法的特殊召唤1回合仅可进行1次，且②③效果1回合仅可各使用1次。①：此卡可通过将自己场上的1张里侧表示卡出示给对手并放回手牌・额外牌组，来从手牌特殊召唤。②：场上的里侧表示卡每有2张，就以场上的最多1张卡为对象可以发动。将该卡破坏。③：在自己的结束阶段，以自己墓地的1张“艮鬼”陷阱卡为对象可以发动。将该卡放置在自己场上。
