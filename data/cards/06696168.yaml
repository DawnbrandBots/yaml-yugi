text:
  en: |-
    If this card battles a monster, neither can be destroyed by that battle. Each time a monster declares an attack, this card gains 1000 ATK. During your Main Phase: You can make this card lose exactly 5000 ATK, and if you do, destroy all other cards on the field. You can only use this effect of "Festiballoon" once per turn.
  de: |-
    Falls diese Karte gegen ein Monster kämpft, können beide durch jenen Kampf nicht zerstört werden. Jedes Mal, wenn ein Monster einen Angriff deklariert, erhält diese Karte 1000 ATK. Während deiner Main Phase: Du kannst diese Karte genau 5000 ATK verlieren lassen und falls du dies tust, zerstöre alle anderen Karten auf dem Spielfeld. Du kannst diesen Effekt von „Festiballon“ nur einmal pro Spielzug verwenden.
  es: |-
    Si esta carta batalla con un monstruo, ninguno puede ser destruido en esa batalla. Cada vez que un monstruo declare un ataque, esta carta gana 1000 ATK. Durante tu Main Phase: puedes hacer que esta carta pierda exactamente 5000 ATK y, si lo haces, destruye todas las demás cartas en el Campo. Sólo puedes usar este efecto de "Globofestival" una vez por turno.
  fr: |-
    Si cette carte combat un monstre, aucun de ces 2 monstres ne peut être détruit par ce combat. Chaque fois qu'un monstre déclare une attaque, cette carte gagne 1000 ATK. Durant votre Main Phase : vous pouvez faire perdre exactement 5000 ATK à cette carte, et si vous le faites, détruisez toutes les autres cartes sur le Terrain. Vous ne pouvez utiliser cet effet de "Festiballon" qu'une fois par tour.
  it: |-
    Se questa carta combatte con un mostro, nessuno dei due può essere distrutto in quella battaglia. Ogni volta che un mostro dichiara un attacco, questa carta guadagna 1000 ATK. Durante la tua Main Phase: puoi far perdere a questa carta esattamente 5000 ATK e, se lo fai, distruggi tutte le altre carte sul Terreno. Puoi utilizzare questo effetto di "Festipalloncino" una sola volta per turno.
  pt: |-
    Se este card batalhar um monstro, nenhum dos dois pode ser destruído nessa batalha. Sempre que um monstro declarar um ataque, este card ganha 1000 de ATK. Durante sua Fase Principal: você pode fazer com que este card perca exatamente 5000 de ATK e, se isso acontecer, destrua todos os outros cards no campo. Você só pode usar este efeito de "Festibalão" uma vez por turno.
  ja: |-
    このカード名の③の効果は１ターンに１度しか使用できない。①：このカードがモンスターと戦闘を行う場合、その２体はその戦闘では破壊されない。②：このカードがモンスターゾーンに存在する限り、自分か相手のモンスターが攻撃宣言する度に、このカードの攻撃力は１０００アップする。③：自分メインフェイズに発動できる。このカードの攻撃力を５０００ダウンし、フィールドの他のカードを全て破壊する。
