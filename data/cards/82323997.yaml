text:
  en: |-
    Cannot be Normal Summoned/Set. Must be Special Summoned with "Assault Mode Activate". When your opponent activates a card or effect (Quick Effect): You can banish this card you control until the End Phase; banish cards your opponent controls up to the number of Tuners in your GY. When an opponent's monster declares an attack: You can banish this card you control until the End Phase; negate the attack, then end the Battle Phase. If this card is destroyed: You can Special Summon 1 "Red Nova Dragon" from your GY.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカードは通常召喚できず、「バスター・モード」の効果でのみ特殊召喚できる。①：相手がカードの効果を発動した時、フィールドのこのカードをエンドフェイズまで除外して発動できる。自分の墓地のチューナーの数まで相手フィールドのカードを除外する。②：相手モンスターの攻撃宣言時、フィールドのこのカードをエンドフェイズまで除外して発動できる。その攻撃を無効にする。その後、バトルフェイズを終了する。③：このカードが破壊された場合に発動できる。自分の墓地から「スカーレッド・ノヴァ・ドラゴン」１体を特殊召喚する。
  ko: |-
    이 카드는 통상 소환할 수 없으며, "버스터 모드"의 효과로만 특수 소환할 수 있다. ①: 상대가 카드의 효과를 발동했을 때, 필드의 이 카드를 엔드 페이즈까지 제외하고 발동할 수 있다. 자신 묘지의 튜너의 수까지 상대 필드의 카드를 제외한다. ②: 상대 몬스터의 공격 선언시, 필드의 이 카드를 엔드 페이즈까지 제외하고 발동할 수 있다. 그 공격을 무효로 한다. 그 후, 배틀 페이즈를 종료한다. ③: 이 카드가 파괴되었을 경우에 발동할 수 있다. 자신 묘지에서 "스카레드 노바 드래곤" 1장을 특수 소환한다.
  zh-TW:
  zh-CN: |-
    此卡不可通常召唤，仅可通过“爆裂模式”的效果特殊召唤。①：对手发动卡的效果时，将场上的此卡直至结束阶段为止除外可以发动。以自己墓地的协调数量为上限，将对手场上的卡除外。②：对手怪兽攻击宣言时，将场上的此卡直至结束阶段为止除外可以发动。将该攻击无效。然后，结束战斗阶段。③：此卡被破坏的情况下可以发动。从自己墓地将1只“绯暗红新星龙”特殊召唤。
