name:
  en: Red Nova Dragon/Assault Mode
  de: Roter Nova-Drache/Angriffsmodus
  es: Dragón de Nova Roja/Modo de Ataque
  fr: Dragon Nova Rouge/Mode Assaut
  it: Drago Nova Rossa/Assalto
  pt: Dragão Vermelho Nova/Modo de Ataque
  ja: スカーレッド・ノヴァ・ドラゴン<ruby>／<rt>スラッシュ</rt></ruby>バスター
  ja_romaji: Sukāreddo Nova Doragon Surasshu Basutā
  ko: 스카레드 노바 드래곤 / 버스터
  ko_rr:
  zh-TW:
  zh-CN: 绯暗红新星龙／爆裂
text:
  en: |-
    Cannot be Normal Summoned/Set. Must be Special Summoned with "Assault Mode Activate". When your opponent activates a card or effect (Quick Effect): You can banish this card you control until the End Phase; banish cards your opponent controls up to the number of Tuners in your GY. When an opponent's monster declares an attack: You can banish this card you control until the End Phase; negate the attack, then end the Battle Phase. If this card is destroyed: You can Special Summon 1 "Red Nova Dragon" from your GY.
  de: |-
    Kann nicht als Normalbeschwörung beschworen/gesetzt werden. Muss mit „Angriffsmodus aktivieren“ als Spezialbeschwörung beschworen werden. Wenn dein Gegner eine Karte oder einen Effekt aktiviert (Schnelleffekt): Du kannst diese Karte, die du kontrollierst, bis zur End Phase verbannen; verbanne Karten, die dein Gegner kontrolliert, bis zur Anzahl der Empfänger in deinem Friedhof. Wenn ein Monster eines Gegners einen Angriff deklariert: Du kannst diese Karte, die du kontrollierst, bis zur End Phase verbannen; annulliere den Angriff, dann beende die Battle Phase. Falls diese Karte zerstört wird: Du kannst 1 „Roter Nova-Drache“ als Spezialbeschwörung von deinem Friedhof beschwören.
  es: |-
    No puede ser Invocado de Modo Normal/Colocado. Debe ser Invocado de Modo Especial con "Activar Modo de Ataque". Cuando tu adversario activa una carta o efecto (Efecto Rápido): puedes desterrar esta carta que controlas hasta la End Phase; destierra cartas que controle tu adversario hasta el número de Cantantes en tu Cementerio. Cuando un monstruo del adversario declara un ataque: puedes desterrar esta carta que controlas hasta la End Phase; niega el ataque, y después termina la Battle Phase. Si esta carta es destruida: puedes Invocar de Modo Especial 1 "Dragón de Nova Roja" desde tu Cementerio.
  fr: |-
    Ni Invocable Normalement ni Posable Normalement. Uniquement Invocable Spécialement avec "Activation Mode Assaut". Lorsque votre adversaire active une carte ou un effet (Effet Rapide) : jusqu'à la End Phase, vous pouvez bannir cette carte que vous contrôlez ; bannissez un nombre de cartes contrôlées par votre adversaire, inférieur ou égal au nombre de Syntoniseurs dans votre Cimetière. Lorsqu'un monstre de l'adversaire déclare une attaque : jusqu'à la End Phase, vous pouvez bannir cette carte que vous contrôlez ; annulez l'attaque, puis terminez la Battle Phase. Si cette carte est détruite : vous pouvez Invoquer Spécialement 1 "Dragon Nova Rouge" depuis votre Cimetière.
  it: |-
    Non può essere Evocato Normalmente/Posizionato. Deve essere Evocato Specialmente con "Attivazione Modalità Assalto". Quando il tuo avversario attiva una carta o un effetto (Effetto Rapido): puoi bandire questa carta che controlli fino alla End Phase; bandisci carte controllate dal tuo avversario fino al numero di Tuner nel tuo Cimitero. Quando un mostro dell'avversario dichiara un attacco: puoi bandire questa carta che controlli fino alla End Phase; annulla l'attacco, poi termina la Battle Phase. Se questa carta viene distrutta: puoi Evocare Specialmente 1 "Drago Nova Rossa" dal tuo Cimitero.
  pt: |-
    Não pode ser Invocado por Invocação-Normal/Baixado. Deve ser Invocado por Invocação-Especial com "Ativar Modo de Ataque". Quando seu oponente ativar um card ou efeito (Efeito Rápido): você pode banir este card que você controla até a Fase Final; bana cards que seu oponente controla até o número de Reguladores no seu Cemitério. Quando um monstro do oponente declarar um ataque: você pode banir este card que você controla até a Fase Final; negue o ataque e, depois, encerre a Fase de Batalha. Se este card for destruído: você pode Invocar por Invocação-Especial 1 "Dragão Vermelho Nova" do seu Cemitério.
  ja: |-
    このカードは通常召喚できず、「バスター・モード」の効果でのみ特殊召喚できる。①：相手がカードの効果を発動した時、フィールドのこのカードをエンドフェイズまで除外して発動できる。自分の墓地のチューナーの数まで相手フィールドのカードを除外する。②：相手モンスターの攻撃宣言時、フィールドのこのカードをエンドフェイズまで除外して発動できる。その攻撃を無効にする。その後、バトルフェイズを終了する。③：このカードが破壊された場合に発動できる。自分の墓地から「スカーレッド・ノヴァ・ドラゴン」１体を特殊召喚する。
  ko: |-
    이 카드는 통상 소환할 수 없으며, "버스터 모드"의 효과로만 특수 소환할 수 있다. ①: 상대가 카드의 효과를 발동했을 때, 필드의 이 카드를 엔드 페이즈까지 제외하고 발동할 수 있다. 자신 묘지의 튜너의 수까지 상대 필드의 카드를 제외한다. ②: 상대 몬스터의 공격 선언시, 필드의 이 카드를 엔드 페이즈까지 제외하고 발동할 수 있다. 그 공격을 무효로 한다. 그 후, 배틀 페이즈를 종료한다. ③: 이 카드가 파괴되었을 경우에 발동할 수 있다. 자신 묘지에서 "스카레드 노바 드래곤" 1장을 특수 소환한다.
  zh-TW:
  zh-CN: |-
    此卡不可通常召唤，仅可通过“爆裂模式”的效果特殊召唤。①：对手发动卡的效果时，将场上的此卡直至结束阶段为止除外可以发动。以自己墓地的协调数量为上限，将对手场上的卡除外。②：对手怪兽攻击宣言时，将场上的此卡直至结束阶段为止除外可以发动。将该攻击无效。然后，结束战斗阶段。③：此卡被破坏的情况下可以发动。从自己墓地将1只“绯暗红新星龙”特殊召唤。
