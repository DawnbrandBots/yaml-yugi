  de: UntergangZ-Kommando „A.D.R.A.S.T.E.I.A.“
  es: Mando DoomZ "A.D.R.A.S.T.E.I.A."
  fr: Activation DoomZ "A.D.R.A.S.T.E.I.A."
  it: '"A.D.R.A.S.T.E.I.A." Comando DoomZ'
  pt: Comando DoomZ "A.D.R.A.S.T.E.I.A"
  ja: <ruby>終刻反転<rt>ドゥームズ・コマンド</rt></ruby>『<ruby>Ａ．Ｄ．Ｒ．Ａ．Ｓ．Ｔ．Ｅ．Ｉ．Ａ．<rt>アドラステイア</rt></ruby>』
  ja_romaji: Dūmuzu Komando "Adorasuteia"
  ko: 둠즈 커맨드 『A.D.R.A.S.T.E.I.A.』
  ko_rr:
  zh-TW:
  zh-CN: 终刻反转《A.D.R.A.S.T.E.I.A.》
text:
  en: |-
    The first time the equipped monster would be destroyed by battle each turn, it is not destroyed. You can only use each of the following effects of "DoomZ Command "A.D.R.A.S.T.E.I.A."" once per turn. During your Main Phase: You can destroy the equipped monster, and if you do, Special Summon 1 "DoomZ" monster in Defense Position, except the destroyed monster, from your hand, GY, or banishment. If this card is in your GY: You can target 1 face-up monster you control; equip it with this card, then take damage equal to the equipped monster's Level/Rank x 100.
  de: |-
    Das erste Mal, dass das ausgerüstete Monster in jedem Spielzug durch Kampf zerstört würde, wird es nicht zerstört. Du kannst jeden der folgenden Effekte von „UntergangZ-Kommando „A.D.R.A.S.T.E.I.A.““ nur einmal pro Spielzug verwenden. Während deiner Main Phase: Du kannst das ausgerüstete Monster zerstören und falls du dies tust, beschwöre 1 „UntergangZ“-Monster als Spezialbeschwörung von deiner Hand, deinem Friedhof oder deinen verbannten Karten in die Verteidigungsposition, außer dem zerstörten Monster. Falls sich diese Karte in deinem Friedhof befindet: Du kannst 1 offenes Monster wählen, das du kontrollierst; rüste es mit dieser Karte aus, dann erhältst du Schaden in Höhe der Stufe / des Rangs des ausgerüsteten Monsters x 100.
  es: |-
    La primera vez que el monstruo equipado fuera a ser destruido en batalla cada turno, no es destruido. Sólo puedes usar cada uno de los siguientes efectos de "Mando DoomZ "A.D.R.A.S.T.E.I.A."" una vez por turno. Durante tu Main Phase: puedes destruir el monstruo equipado y, si lo haces, Invoca de Modo Especial 1 monstruo "DoomZ" en Posición de Defensa, excepto el monstruo destruido, desde tu mano, Cementerio o destierro. Si esta carta está en tu Cementerio: puedes seleccionar 1 monstruo boca arriba que controles; equípalo con esta carta, y después recibes daño igual al Nivel/Rango del monstruo equipado x 100.
  fr: |-
    La première fois que le monstre équipé va être détruit au combat chaque tour, il n'est pas détruit. Vous ne pouvez utiliser chacun des effets suivants de "Activation DoomZ "A.D.R.A.S.T.E.I.A."" qu'une fois par tour. Durant votre Main Phase : vous pouvez détruire le monstre équipé, et si vous le faites, Invoquez Spécialement 1 monstre "DoomZ" (le monstre détruit exclu) en Position de Défense depuis votre main, Cimetière ou bannissement. Si cette carte est dans votre Cimetière : vous pouvez cibler 1 monstre face recto que vous contrôlez ; équipez-le avec cette carte, puis recevez des dommages égaux au Niveau/Rang du monstre équipé x 100.
  it: |-
    La prima volta che il mostro equipaggiato sta per essere distrutto in battaglia ogni turno, non viene distrutto. Puoi utilizzare ognuno dei seguenti effetti di ""A.D.R.A.S.T.E.I.A." Comando DoomZ" una sola volta per turno. Durante la tua Main Phase: puoi distruggere il mostro equipaggiato e, se lo fai, Evoca Specialmente 1 mostro "DoomZ" in Posizione di Difesa, eccetto il mostro distrutto, dalla tua mano, Cimitero o carte bandite. Se questa carta è nel tuo Cimitero: puoi scegliere come bersaglio 1 mostro scoperto che controlli; equipaggialo con questa carta, poi subisci danno pari al Livello/Rango del mostro equipaggiato x 100.
  pt: |-
    Na primeira vez que o monstro equipado seria destruído em batalha a cada turno, ele não é destruído. Você só pode usar cada um dos seguintes efeitos de "Comando DoomZ "A.D.R.A.S.T.E.I.A"" uma vez por turno. Durante sua Fase Principal: você pode destruir o monstro equipado e, se isso acontecer, Invoque por Invocação-Especial 1 monstro "DoomZ" em Posição de Defesa, exceto o monstro destruído, da sua mão, do Cemitério ou do banimento. Se este card estiver no seu Cemitério: você pode escolher 1 monstro com a face para cima que você controla; equipe-o com este card e, depois, sofra dano igual ao Nível/Classe do monstro equipado x 100.
  ja: |-
    このカード名の②③の効果はそれぞれ１ターンに１度しか使用できない。①：装備モンスターは１ターンに１度だけ戦闘では破壊されない。②：自分メインフェイズに発動できる。装備モンスターを破壊し、破壊したモンスター以外の自分の手札・墓地・除外状態の「ドゥームズ」モンスター１体を守備表示で特殊召喚する。③：このカードが墓地に存在する場合、自分フィールドの表側表示モンスター１体を対象として発動できる。このカードをそのモンスターに装備する。その後、自分は装備モンスターのレベル・ランク×１００ダメージを受ける。
  ko: |-
    이 카드명의 ②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 장착 몬스터는 1턴에 1번만 전투로는 파괴되지 않는다. ②: 자신 메인 페이즈에 발동할 수 있다. 장착 몬스터를 파괴하고, 파괴한 몬스터 이외의 자신의 패 / 묘지 / 제외 상태인 "둠즈" 몬스터 1장을 수비 표시로 특수 소환한다. ③: 이 카드가 묘지에 존재할 경우, 자신 필드의 앞면 표시 몬스터 1장을 대상으로 하고 발동할 수 있다. 이 카드를 그 몬스터에 장착한다. 그 후, 자신은 장착 몬스터의 레벨 / 랭크 × 100 데미지를 받는다.
  zh-TW:
  zh-CN: |-
    此卡名的②③效果1回合仅可各使用1次。①：装备怪兽1回合仅1次，不会因战斗被破坏。②：在自己的主要阶段可以发动。破坏装备怪兽，将所破坏怪兽以外的、自己手牌・墓地・除外状态的1只“终刻”怪兽以守备表示特殊召唤。③：此卡存在于墓地的情况下，以自己场上的1只表侧表示怪兽为对象可以发动。将此卡装备于该怪兽。然后，自己受到装备怪兽的等级・阶级×100的伤害。
