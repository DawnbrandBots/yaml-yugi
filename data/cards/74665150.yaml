text:
  en: |-
    2+ Effect Monsters
    While this card is in the Extra Monster Zone, it gains 500 ATK for every other Link Monster in the field and GYs, also your opponent cannot target it with card effects. (Quick Effect): You can Tribute 1 monster this card points to; send 1 Cyberse monster from your Extra Deck to the GY, also this card can make up to 2 attacks on monsters during each Battle Phase this turn. You can only use this effect of "Decode Talker Integration" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    効果モンスター２体以上
    このカード名の②の効果は１ターンに１度しか使用できない。①：このカードがＥＸモンスターゾーンに存在する限り、このカードの攻撃力はこのカード以外のお互いのフィールド・墓地のＬモンスターの数×５００アップし、相手はこのカードを効果の対象にできない。②：自分・相手ターンに、このカードのリンク先の自分のモンスター１体をリリースして発動できる。ＥＸデッキからサイバース族モンスター１体を墓地へ送る。このターン、このカードは１度のバトルフェイズ中に２回までモンスターに攻撃できる。
