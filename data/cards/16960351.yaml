text:
  en: |-
    Once per turn: You can Tribute 1 Dragon-Type monster that has a Level; Special Summon, from your Deck, 1 Wyrm-Type monster with the same Level as the Tributed monster's original Level, and if you do, any monster destroyed by battle with that monster is shuffled into the Deck instead of going to the Graveyard.
  de: |-
    Einmal pro Spielzug: Du kannst 1 Monster vom Typ Drache, das eine Stufe hat, als Tribut anbieten; beschwГ¶re 1 Monster vom Typ Wyrm mit derselben Stufe wie die Grundstufe des als Tribut angebotenen Monsters als SpezialbeschwГ¶rung von deinem Deck und falls du dies tust, werden alle Monster, die durch Kampf mit dem Monster zerstГ¶rt werden, ins Deck gemischt, anstatt auf den Friedhof gelegt zu werden.
  es: |-
    Una vez por turno: puedes Sacrificar 1 monstruo de Tipo DragГіn que tenga Nivel; Invoca de Modo Especial, desde tu Deck, 1 monstruo de Tipo Wyrm con el mismo Nivel que el Nivel original del monstruo Sacrificado y, si lo haces, cualquier monstruo destruido en batalla con ese monstruo se baraja al Deck en vez de ir al Cementerio.
  fr: |-
    Une fois par tour : vous pouvez Sacrifier 1 monstre de Type Dragon qui a un Niveau ; Invoquez SpГ©cialement 1 monstre de Type Wyrm du mГӘme Niveau que le Niveau d'origine du monstre SacrifiГ© depuis votre Deck, et si vous le faites, les monstres dГ©truits au combat avec le monstre sont mГ©langГ©s dans le Deck au lieu d'ГӘtre envoyГ©s au CimetiГЁre.
  it: |-
    Una volta per turno: puoi offrire come Tributo 1 mostro di Tipo Drago che ha un Livello; Evoca Specialmente, dal tuo Deck, 1 mostro di Tipo Wyrm con Livello pari al Livello originale del mostro offerto come Tributo e, se lo fai, qualsiasi mostro distrutto in battaglia con quel mostro viene mischiato nel Deck invece di andare al Cimitero.
  pt: |-
    Uma vez por turno: vocГӘ pode oferecer como Tributo 1 monstro do Tipo DragГЈo que tenha NГӯvel; Invoque por InvocaГ§ГЈo-Especial do seu Deck 1 monstro do Tipo Wyrm com o mesmo NГӯvel que o NГӯvel original do monstro oferecido como Tributo e, se isso acontecer, quaisquer monstros destruГӯdos em batalha com esse monstro sГЈo embaralhados no Deck em vez de serem enviados para o CemitГ©rio.
