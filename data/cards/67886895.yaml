text:
  en: |-
    (This card is always treated as a "Blue-Eyes" card.)
    You can discard this card; add 1 Level 1 LIGHT Tuner from your Deck to your hand. If a "Blue-Eyes" Ritual Monster(s) and/or "Blue-Eyes White Dragon" is sent to your GY (except during the Damage Step): You can target 1 of them; Special Summon this card from your GY (if it was there when the monster was sent) or hand (even if not), and if you do, its ATK becomes that monster's, also banish it when it leaves the field. You can only use each effect of "Deep-Eyes White Dragon, the Blue Abyss" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名はルール上「ブルーアイズ」カードとしても扱う。このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードを手札から捨てて発動できる。デッキから光属性・レベル１チューナー１体を手札に加える。②：「ブルーアイズ」儀式モンスターか「青眼の白龍」が自分の墓地へ送られた場合、その内の１体を対象として発動できる。このカードを手札・墓地から特殊召喚する。この効果で特殊召喚したこのカードは、攻撃力が対象のモンスターと同じになり、フィールドから離れた場合に除外される。
  ko: |-
    이 카드명은 룰상 "푸른 눈" 카드로도 취급한다. 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드를 패에서 버리고 발동할 수 있다. 덱에서 빛 속성 / 레벨 1 튜너 1장을 패에 넣는다. ②: "푸른 눈" 의식 몬스터나 "푸른 눈의 백룡"이 자신 묘지로 보내졌을 경우, 그 중의 1장을 대상으로 하고 발동할 수 있다. 이 카드를 패 / 묘지에서 특수 소환한다. 이 효과로 특수 소환한 이 카드는, 공격력이 대상 몬스터와 같아지고, 필드에서 벗어났을 경우에 제외된다.
  zh-TW:
  zh-CN: |-
    此卡名在规则上也视为“青眼”卡。此卡名的①②效果1回合仅可各使用1次。①：从手牌将此卡舍弃可以发动。从牌组将1只光属性・等级1协调加入手牌。②：有“青眼”仪式怪兽或“青眼白龙”被送至自己墓地的情况下，以其中1只为对象可以发动。从手牌・墓地将此卡特殊召唤。以此效果特殊召唤的此卡，攻击力变为与对象怪兽相同、从场上离开的情况下，将其除外。
