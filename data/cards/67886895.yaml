  ja: |-
    このカード名はルール上「ブルーアイズ」カードとしても扱う。このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードを手札から捨てて発動できる。デッキから光属性・レベル１チューナー１体を手札に加える。②：「ブルーアイズ」儀式モンスターか「青眼の白龍」が自分の墓地へ送られた場合、その内の１体を対象として発動できる。このカードを手札・墓地から特殊召喚する。この効果で特殊召喚したこのカードは、攻撃力が対象のモンスターと同じになり、フィールドから離れた場合に除外される。
