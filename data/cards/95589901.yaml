name:
  en: Mischief of the Wolves
  de: Übermut der Wölfe
  es: Travesuras de los Lobos
  fr: Espièglerie des Loups
  it: Dispetto dei Lupi
  pt: Travessuras dos Lobos
  ja: <ruby>大狼<rt>おおかみ</rt></ruby>のいたずら
  ja_romaji: Ōkami no Itazura
