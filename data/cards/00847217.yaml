text:
  en: |-
    The equipped monster's effects are negated. If you have a card in your Field Zone: You can target 1 Effect Monster you control; that Effect Monster gains this effect until the end of your opponent's turn. You can only use the previous effect of "Orichalcos Sword of Sealing" once per turn.
    ● Once per turn (Quick Effect): You can send 1 card from your hand to the GY, then target 1 face-up card on the field; destroy that target.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の②の効果は１ターンに１度しか使用できない。①：装備モンスターの効果は無効化される。②：自分のフィールドゾーンにカードが存在する場合、自分フィールドの効果モンスター１体を対象として発動できる。その効果モンスターは相手ターン終了時まで以下の効果を得る。●自分・相手ターンに１度、手札を１枚墓地へ送り、フィールドの表側表示カード１枚を対象として発動できる。その表側表示カードを破壊する。
  ko: |-
    이 카드명의 ②의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 장착 몬스터의 효과는 무효화된다. ②: 자신의 필드 존에 카드가 존재할 경우, 자신 필드의 효과 몬스터 1장을 대상으로 하고 발동할 수 있다. 그 효과 몬스터는 상대 턴 종료시까지 이하의 효과를 얻는다. ●자신 / 상대 턴에 1번, 패를 1장 묘지로 보내고, 필드의 앞면 표시 카드 1장을 대상으로 하여 발동할 수 있다. 그 앞면 표시 카드를 파괴한다.
  zh-TW:
  zh-CN: |-
    此卡名的②效果1回合仅可使用1次。①：装备怪兽的效果无效化。②：自己的场地区域存在卡的情况下，以自己场上的1只效果怪兽为对象可以发动。该效果怪兽直至对手回合结束时为止获得以下效果。
    ●在每个自己・对手回合中1次，将1张手牌送至墓地，以场上的1张表侧表示卡为对象可以发动。将该表侧表示卡破坏。
