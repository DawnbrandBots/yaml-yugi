  ja: |-
    このカード名の①②の効果は１ターンに１度、いずれか１つしか使用できない。①：以下の効果から１つを選択して発動できる。●自分フィールドの「ウィッチクラフト」モンスター１体と相手フィールドのカード１枚を破壊する。●自分の墓地・除外状態の魔法使い族モンスターを融合素材としてデッキに戻し、「ウィッチクラフト」融合モンスター１体を融合召喚する。②：自分エンドフェイズに、このカードが墓地に存在し、自分フィールドに「ウィッチクラフト」モンスターが存在する場合に発動できる。このカードを手札に加える。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合1次，仅可使用其中1个。①：可从以下效果中选择1个发动。
    ●将自己场上的1只“魔女工艺”怪兽和对手场上的1张卡破坏。
    ●将自己墓地・除外状态的魔法师族怪兽作为融合素材放回牌组，将1只“魔女工艺”融合怪兽融合召唤。
    ②：在自己的结束阶段，此卡存在于墓地，且自己场上存在“魔女工艺”怪兽的情况下可以发动。将此卡加入手牌。
