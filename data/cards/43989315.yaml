text:
  en: |-
    1 "Aleister" monster + 1 FIRE or WIND monster
    During the Main Phase (Quick Effect): You can target 1 Level 6 or lower monster in either GY; Special Summon it to your field in Defense Position, but negate its effects. If this card is in your GY: You can Fusion Summon 1 "Invoked" Fusion Monster from your Extra Deck, by banishing its materials from your field and/or GY, including this card in the GY. You can only use each effect of "Invoked Sorath" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    「アレイスター」モンスター＋炎・風属性モンスター
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分・相手のメインフェイズに、自分か相手の墓地のレベル６以下のモンスター１体を対象として発動できる。そのモンスターを自分フィールドに守備表示で特殊召喚する。この効果で特殊召喚したモンスターの効果は無効化される。②：このカードが墓地に存在する場合に発動できる。墓地のこのカードを含む自分のフィールド・墓地のモンスターを融合素材として除外し、「召喚獣」融合モンスター１体を融合召喚する。
  ko:
  zh-TW:
  zh-CN: |-
    “阿莱斯特”怪兽＋炎・风属性怪兽
    此卡名的①②效果1回合仅可各使用1次。①：在自己・对手的主要阶段，以自己或对手墓地的1只等级6以下的怪兽为对象可以发动。将该怪兽以守备表示特殊召唤至自己场上。以此效果特殊召唤的怪兽的效果无效化。②：此卡存在于墓地的情况下可以发动。将包含墓地的此卡在内的、自己场上・墓地的怪兽作为融合素材除外，将1只“召唤兽”融合怪兽融合召唤。
