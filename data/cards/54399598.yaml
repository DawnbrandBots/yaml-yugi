name:
  en: Fleeting Flower of the Magician
  de: Flüchtige Blume des Magiers
  es: Flor Fugaz del Mago
  fr: Fleur Éphémère du Magicien
  it: Fiore Effimero del Mago
  pt: Flor Fugaz do Mago
  ja: <ruby>魔<rt>ま</rt></ruby><ruby>術<rt>じゅつ</rt></ruby><ruby>師<rt>し</rt></ruby>の<ruby>空<rt>くう</rt></ruby><ruby>華<rt>げ</rt></ruby>
