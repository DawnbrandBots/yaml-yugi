  de: Prima Licht
  es: Luz Prima
  fr: Première Lueur
  it: Luce Prima
  pt: Luz Prima
  ja: プリマの<ruby>光<rt>ひかり</rt></ruby>
  ja_romaji: Purima no Hikari
