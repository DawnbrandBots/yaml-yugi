name:
  en: Surprise Fusion
  de: Überraschungsfusion
  es: Fusión Sorpresa
  fr: Fusion Surprise
  it: Fusione Sorpresa
  pt: Fusão Surpresa
  ja: サプライズ・フュージョン
  ja_romaji: Sapuraizu Fyūjon
  ko: 서프라이즈 퓨전
  ko_rr:
  zh-TW: 驚喜結合
  zh-CN: 惊喜结合
text:
  en: |-
    Target 1 face-up monster you control, then declare 1 Monster Type and 1 Attribute; that monster becomes that Type and Attribute, then you can Fusion Summon 1 Fusion Monster from your Extra Deck, using monsters you control, including that monster. You can banish this card from your GY; Tribute 1 Fusion Monster, and if you do, Special Summon 2 "Surprise Tokens" (Spellcaster/DARK/ATK 0/DEF 0) with the same Level as the Tributed monster had on the field. You can only use this effect of "Surprise Fusion" once per turn.
  de: |-
    Wähle 1 offenes Monster, das du kontrollierst, und deklariere dann 1 Monstertyp und 1 Eigenschaft; jenes Monster wird zu jenem Typ und jener Eigenschaft, dann kannst du 1 Fusionsmonster als Fusionsbeschwörung von deinem Extra Deck beschwören, indem du Monster verwendest, die du kontrollierst, darunter jenes Monster. Du kannst diese Karte von deinem Friedhof verbannen; biete 1 Fusionsmonster als Tribut an und falls du dies tust, beschwöre 2 „Überraschungs-Spielmarken“ (Hexer/FINSTERNIS/ATK 0/DEF 0) mit derselben Stufe, die das als Tribut angebotene Monster auf dem Spielfeld hatte, als Spezialbeschwörung. Du kannst diesen Effekt von „Überraschungsfusion“ nur einmal pro Spielzug verwenden.
  es: |-
    Selecciona 1 monstruo boca arriba que controles, y después declara 1 Tipo de Monstruo y 1 Atributo; ese monstruo se convierte en ese Tipo y con ese Atributo, y después puedes Invocar por Fusión 1 Monstruo de Fusión desde tu Deck Extra, usando monstruos que controles, incluyendo ese monstruo. Puedes desterrar esta carta en tu Cementerio; Sacrifica 1 Monstruo de Fusión y, si lo haces, Invoca de Modo Especial 2 "Ficha Sorpresa" (Lanzador de Conjuros/OSCURIDAD/ATK 0/DEF 0) con el mismo Nivel que el monstruo Sacrificado tenía en el Campo. Sólo puedes usar este efecto de "Fusión Sorpresa" una vez por turno.
  fr: |-
    Ciblez 1 monstre face recto que vous contrôlez, puis déclarez 1 Type de Monstre et 1 Attribut ; le monstre devient ce Type et Attribut, puis vous pouvez Invoquer par Fusion 1 Monstre Fusion depuis votre Extra Deck, en utilisant des monstres que vous contrôlez (le monstre inclus). Vous pouvez bannir cette carte depuis votre Cimetière ; Sacrifiez 1 Monstre Fusion, et si vous le faites, Invoquez Spécialement 2 "Jeton Surprise" (Magicien/TÉNÈBRES/ATK 0/DEF 0) du même Niveau que le monstre Sacrifié avait sur le Terrain. Vous ne pouvez utiliser cet effet de "Fusion Surprise" qu'une fois par tour.
  it: |-
    Scegli come bersaglio 1 mostro scoperto che controlli, poi dichiara 1 Tipo di Mostro e 1 Attributo; quel mostro diventa di quel Tipo e Attributo, poi puoi Evocare tramite Fusione 1 Mostro Fusione dal tuo Extra Deck, utilizzando mostri che controlli, compreso quel mostro. Puoi bandire questa carta dal tuo Cimitero; offri come Tributo 1 Mostro Fusione e, se lo fai, Evoca Specialmente 2 "Segna-Sorpresa" (Incantatore/OSCURITÀ/ATK 0/DEF 0) con lo stesso Livello che il mostro offerto come Tributo aveva sul Terreno. Puoi utilizzare questo effetto di "Fusione Sorpresa" una sola volta per turno.
  pt: |-
    Escolha 1 monstro com a face para cima que você controla e, depois, declare 1 Tipo de Monstro e 1 Atributo; esse monstro se torna desse Tipo e Atributo e, depois, você pode Invocar por Invocação-Fusão 1 Monstro de Fusão do seu Deck Adicional, usando monstros que você controla, incluindo esse monstro. Você pode banir este card do seu Cemitério; ofereça como Tributo 1 Monstro de Fusão e, se isso acontecer, Invoque por Invocação-Especial 2 "Ficha de Surpresa" (Mago/TREVAS/ATK 0/DEF 0) com o mesmo Nível que o monstro oferecido como Tributo tinha no campo. Você só pode usar este efeito de "Fusão Surpresa" uma vez por turno.
  ja: |-
    このカード名の②の効果は１ターンに１度しか使用できない。①：自分フィールドの表側表示モンスター１体を対象とし、種族と属性を１つずつ宣言して発動できる。そのモンスターは宣言した種族・属性になる。その後、そのモンスターを含む自分フィールドのモンスターを融合素材とし、融合モンスター１体を融合召喚できる。②：墓地のこのカードを除外して発動できる。自分フィールドの融合モンスター１体をリリースし、そのレベルと同じレベルを持つ「サプライズトークン」（魔法使い族・闇・攻／守０）２体を自分フィールドに特殊召喚する。
  ko: |-
    이 카드명의 ②의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 자신 필드의 앞면 표시 몬스터 1장을 대상으로 하고, 종족과 속성을 1개씩 선언하여 발동할 수 있다. 그 몬스터는 선언한 종족 / 속성이 된다. 그 후, 그 몬스터를 포함하는 자신 필드의 몬스터를 융합 소재로 하고, 융합 몬스터 1장을 융합 소환할 수 있다. ②: 묘지의 이 카드를 제외하고 발동할 수 있다. 자신 필드의 융합 몬스터 1장을 릴리스하고, 그 레벨과 같은 레벨을 가지는 "서프라이즈 토큰"(마법사족 / 어둠 / 공 0 / 수 0) 2장을 자신 필드에 특수 소환한다.
  zh-TW:
  zh-CN: |-
    此卡名的②效果1回合仅可使用1次。①：以自己场上的1只表侧表示怪兽为对象，宣言种族和属性各1个可以发动。该怪兽变为宣言的种族・属性。然后，可将包含该怪兽在内的、自己场上的怪兽作为融合素材，将1只融合怪兽融合召唤。②：将墓地的此卡除外可以发动。解放自己场上的1只融合怪兽，将2只等级与其等级相同的“惊喜衍生物”（魔法师族・暗・攻/守0）特殊召唤至自己场上。
