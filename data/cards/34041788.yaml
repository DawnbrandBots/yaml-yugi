name:
  en: Empire of Endymion
  de: Reich von Endymion
  es: Imperio de Endimión
  fr: Empire d'Endymion
  it: Impero di Endymion
  pt: Império de Endymion
  ja: エンディミオン<ruby>皇<rt>こう</rt></ruby><ruby>国<rt>こく</rt></ruby>
  ja_romaji: Endimion Kōkoku
  ko: 엔디미온 황국
  ko_rr:
  zh-TW:
  zh-CN: 恩底弥翁皇国
text:
  en: |-
    When this card is activated: Add 1 "Regulus, the Prince of Endymion" or 1 monster that mentions it from your Deck to your hand, then if your opponent controls a monster, you can Special Summon 1 Spellcaster monster from your hand. If a card(s) you control would be destroyed by battle or card effect, you can destroy 1 "Regulus, the Prince of Endymion" in your hand or face-up field instead. You can only use this effect of "Empire of Endymion" once per turn. You can only activate 1 "Empire of Endymion" per turn.
  de: |-
    Wenn diese Karte aktiviert wird: Füge deiner Hand 1 „Regulus, der Prinz von Endymion“ oder 1 Monster, das ihn erwähnt, von deinem Deck hinzu, dann, falls dein Gegner ein Monster kontrolliert, kannst du 1 Hexer-Monster als Spezialbeschwörung von deiner Hand beschwören. Falls eine oder mehr Karten, die du kontrollierst, durch Kampf oder einen Karteneffekt zerstört würden, kannst du stattdessen 1 „Regulus, der Prinz von Endymion“ in deiner Hand oder offen auf deiner Spielfeldseite zerstören. Du kannst diesen Effekt von „Reich von Endymion“ nur einmal pro Spielzug verwenden. Du kannst nur 1 „Reich von Endymion“ pro Spielzug aktivieren.
  es: |-
    Cuando esta carta es activada: añade a tu mano 1 "Regulus, el Príncipe de Endimión" o 1 monstruo que lo mencione en tu Deck y después, si tu adversario controla un monstruo, puedes Invocar de Modo Especial, desde tu mano, 1 monstruo Lanzador de Conjuros. Si una o más cartas que controlas fueran a ser destruidas en batalla o por el efecto de una carta, puedes destruir 1 "Regulus, el Príncipe de Endimión" en tu mano o Campo boca arriba en su lugar. Sólo puedes usar este efecto de "Imperio de Endimión" una vez por turno. Sólo puedes activar 1 "Imperio de Endimión" por turno.
  fr: |-
    Lorsque cette carte est activée : ajoutez 1 "Regulus, le Prince d'Endymion" ou 1 monstre qui le mentionne depuis votre Deck à votre main, puis si votre adversaire contrôle un monstre, vous pouvez Invoquer Spécialement 1 monstre Magicien depuis votre main. Si une ou plusieurs cartes que vous contrôlez vont être détruites au combat ou par un effet de carte, vous pouvez détruire 1 "Regulus, le Prince d'Endymion" dans votre main ou Terrain face recto à la place. Vous ne pouvez utiliser cet effet de "Empire d'Endymion" qu'une fois par tour. Vous ne pouvez activer qu'1 "Empire d'Endymion" par tour.
  it: |-
    Quando questa carta viene attivata: aggiungi 1 "Regulus, il Principe di Endymion" o 1 mostro che lo menziona dal tuo Deck alla tua mano, poi se il tuo avversario controlla un mostro, puoi Evocare Specialmente 1 mostro Incantatore dalla tua mano. Se una o più carte che controlli stanno per essere distrutte in battaglia o dall'effetto di una carta, puoi invece distruggere 1 "Regulus, il Principe di Endymion" nella tua mano o Terreno scoperto. Puoi utilizzare questo effetto di "Impero di Endymion" una sola volta per turno. Puoi attivare solo 1 "Impero di Endymion" per turno.
  pt: |-
    Quando este card for ativado: adicione 1 "Regulus, o Príncipe de Endymion" ou 1 monstro que o mencione do seu Deck à sua mão e, depois, se seu oponente controlar um monstro, você pode Invocar por Invocação-Especial 1 monstro Mago da sua mão. Se um ou mais cards que você controla seriam destruídos em batalha ou por um efeito de card, em vez disso, você pode destruir 1 "Regulus, o Príncipe de Endymion" na sua mão ou no campo com a face para cima. Você só pode usar este efeito de "Império de Endymion" uma vez por turno. Você só pode ativar 1 "Império de Endymion" por turno.
  ja: |-
    このカード名のカードは１ターンに１枚しか発動できず、このカード名の②の効果は１ターンに１度しか使用できない。①：このカードの発動時の効果処理として、「聖月の皇太子レグルス」またはそのカード名が記されたモンスター１体をデッキから手札に加える。相手フィールドにモンスターが存在する場合、さらに手札から魔法使い族モンスター１体を特殊召喚できる。②：自分フィールドのカードが戦闘・効果で破壊される場合、代わりに自分の手札・フィールド（表側表示）の「聖月の皇太子レグルス」１体を破壊できる。
  ko: |-
    이 카드명의 카드는 1턴에 1장밖에 발동할 수 없으며, 이 카드명의 ②의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 이 카드의 발동시의 효과 처리로서, "프린스 오브 엔디미온 레굴루스" 또는 그 카드명이 쓰여진 몬스터 1장을 덱에서 패에 넣는다. 상대 필드에 몬스터가 존재할 경우, 추가로 패에서 마법사족 몬스터 1장을 특수 소환할 수 있다. ②: 자신 필드의 카드가 전투 / 효과로 파괴될 경우, 대신에 자신의 패 / 필드(앞면 표시)의 "프린스 오브 엔디미온 레굴루스" 1장을 파괴할 수 있다.
  zh-TW:
  zh-CN: |-
    此卡名的卡1回合仅可发动1张，此卡名的②效果1回合仅可使用1次。①：作为此卡发动时的效果处理，从牌组将1只“恩底弥翁之圣月皇太子 雷格鲁斯”或记载有该卡名的怪兽加入手牌。对手场上存在怪兽的情况下，进而可从手牌将1只魔法师族怪兽特殊召唤。②：自己场上的卡将被战斗・效果破坏的情况下，作为代替可将自己手牌・场上（表侧表示）的1只“恩底弥翁之圣月皇太子 雷格鲁斯”破坏。
