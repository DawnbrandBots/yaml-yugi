text:
  en: |-
    When this card is activated: Add 1 "Regulus, the Prince of Endymion" or 1 monster that mentions it from your Deck to your hand, then if your opponent controls a monster, you can Special Summon 1 Spellcaster monster from your hand. If a card(s) you control would be destroyed by battle or card effect, you can destroy 1 "Regulus, the Prince of Endymion" in your hand or face-up Monster Zone instead. You can only use this effect of "Endymion Empire" once per turn. You can only activate 1 "Endymion Empire" per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名のカードは１ターンに１枚しか発動できず、このカード名の②の効果は１ターンに１度しか使用できない。①：このカードの発動時の効果処理として、「聖月の皇太子レグルス」またはそのカード名が記されたモンスター１体をデッキから手札に加える。相手フィールドにモンスターが存在する場合、さらに手札から魔法使い族モンスター１体を特殊召喚できる。②：自分フィールドのカードが戦闘・効果で破壊される場合、代わりに自分の手札・フィールド（表側表示）の「聖月の皇太子レグルス」１体を破壊できる。
  ko: |-
    이 카드명의 카드는 1턴에 1장밖에 발동할 수 없으며, 이 카드명의 ②의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 이 카드의 발동시의 효과 처리로서, "프린스 오브 엔디미온 레굴루스" 또는 그 카드명이 쓰여진 몬스터 1장을 덱에서 패에 넣는다. 상대 필드에 몬스터가 존재할 경우, 추가로 패에서 마법사족 몬스터 1장을 특수 소환할 수 있다. ②: 자신 필드의 카드가 전투 / 효과로 파괴될 경우, 대신에 자신의 패 / 필드(앞면 표시)의 "프린스 오브 엔디미온 레굴루스" 1장을 파괴할 수 있다.
  zh-TW:
  zh-CN: |-
    此卡名的卡1回合仅可发动1张，此卡名的②效果1回合仅可使用1次。①：作为此卡发动时的效果处理，从牌组将1只“恩底弥翁之圣月皇太子 雷格鲁斯”或记载有该卡名的怪兽加入手牌。对手场上存在怪兽的情况下，进而可从手牌将1只魔法师族怪兽特殊召唤。②：自己场上的卡将被战斗・效果破坏的情况下，作为代替可将自己手牌・场上（表侧表示）的1只“恩底弥翁之圣月皇太子 雷格鲁斯”破坏。
