name:
  en: Crimson Call
  de: Blutroter Ruf
  es: Llamada Carmesí
  fr: Appel Cramoisi
  it: Richiamo Cremisi
  pt: Chamado Carmesim
  ja: クリムゾン・ヘルコール
  ja_romaji: Kurimuzon Herukōru
  ko: 크림즌 헬콜
  ko_rr:
  zh-TW:
  zh-CN: 深红地狱呼唤
text:
  en: |-
    Add 1 Level 4 or lower Fiend monster from your GY to your hand, or if you control "Red Dragon Archfiend" or a Synchro Monster that mentions it, you can add 1 such monster from your Deck instead. At the end of the Damage Step, if your "/Assault Mode" monster or "Red Dragon Archfiend" attacked: You can banish this card from your GY; the attacking monster can make a second attack in a row. You can only activate 1 "Crimson Call" per turn.
  de: |-
    Füge deiner Hand 1 Unterweltler-Monster der Stufe 4 oder niedriger von deinem Friedhof hinzu oder falls du „Rotdrachen-Erzunterweltler“ oder ein Synchromonster kontrollierst, das ihn erwähnt, kannst du ihr stattdessen 1 solches Monster von deinem Deck hinzufügen. Am Ende des Damage Steps, falls dein „/Angriffsmodus“-Monster oder „Rotdrachen-Erzunterweltler“ angegriffen hat: Du kannst diese Karte von deinem Friedhof verbannen; das angreifende Monster kann sofort einen zweiten Angriff durchführen. Du kannst nur 1 „Blutroter Ruf“ pro Spielzug aktivieren.
  es: |-
    Añade a tu mano 1 monstruo Demonio de Nivel 4 o menor en tu Cementerio o, si controlas "Dragón Rojo Archidemonio" o un Monstruo de Sincronía que lo mencione, puedes añadir 1 de esos monstruos en tu Deck en su lugar. Al final del Damage Step, si tu monstruo "/Modo de Ataque" o "Dragón Rojo Archidemonio" atacó: puedes desterrar esta carta en tu Cementerio; el monstruo atacante puede hacer un segundo ataque inmediatamente después. Sólo puedes activar 1 "Llamada Carmesí" por turno.
  fr: |-
    Ajoutez 1 monstre Démon de max. Niveau 4 depuis votre Cimetière à votre main, ou si vous contrôlez "Dragon Rouge Archdémon" ou un Monstre Synchro qui le mentionne, vous pouvez ajouter 1 tel monstre depuis votre Deck à la place. À la fin de la Damage Step, si votre "Dragon Rouge Archdémon" ou monstre "/Mode Assaut" a attaqué : vous pouvez bannir cette carte depuis votre Cimetière ; le monstre attaquant peut faire une seconde attaque à la suite. Vous ne pouvez activer qu'1 "Appel Cramoisi" par tour.
  it: |-
    Aggiungi 1 mostro Demone di Livello 4 o inferiore dal tuo Cimitero alla tua mano o, se controlli "Arcidemone Drago Rosso" o un Mostro Synchro che lo menziona, puoi invece aggiungere 1 tale mostro dal tuo Deck. Alla fine del Damage Step, se un tuo mostro "/Assalto" o "Arcidemone Drago Rosso" ha attaccato: puoi bandire questa carta dal tuo Cimitero; il mostro attaccante può effettuare un secondo attacco di seguito. Puoi attivare solo 1 "Richiamo Cremisi" per turno.
  pt: |-
    Adicione 1 monstro Demônio de Nível 4 ou menos do seu Cemitério à sua mão ou, se você controlar "Dragão Vermelho Arquidemônio" ou um Monstro Sincro que o mencione, em vez disso, você pode adicionar 1 desses monstros do seu Deck. No final da Etapa de Dano, se um monstro "/Modo de Ataque" ou "Dragão Vermelho Arquidemônio" seu atacou: você pode banir este card do seu Cemitério; o monstro atacante pode realizar um segundo ataque em seguida. Você só pode ativar 1 "Chamado Carmesim" por turno.
  ja: |-
    このカード名のカードは１ターンに１枚しか発動できない。①：自分の墓地からレベル４以下の悪魔族モンスター１体を手札に加える。自分フィールドに「レッド・デーモンズ・ドラゴン」またはそのカード名が記されたＳモンスターが存在する場合、手札に加えるモンスターをデッキから選ぶ事もできる。②：自分の「／バスター」モンスターか「レッド・デーモンズ・ドラゴン」が攻撃したダメージステップ終了時、墓地のこのカードを除外して発動できる。その攻撃モンスターはもう１度だけ続けて攻撃できる。
  ko: |-
    이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다. ①: 자신 묘지에서 레벨 4 이하의 악마족 몬스터 1장을 패에 넣는다. 자신 필드에 "레드 데몬즈 드래곤" 또는 그 카드명이 쓰여진 싱크로 몬스터가 존재할 경우, 패에 넣는 몬스터를 덱에서 고를 수도 있다. ②: 자신의 "/ 버스터" 몬스터나 "레드 데몬즈 드래곤"이 공격한 데미지 스텝 종료시, 묘지의 이 카드를 제외하고 발동할 수 있다. 그 공격 몬스터는 1번만 더 이어서 공격할 수 있다.
  zh-TW:
  zh-CN: |-
    此卡名的卡1回合仅可发动1张。①：从自己墓地将1只等级4以下的恶魔族怪兽加入手牌。自己场上存在“暗红恶魔龙”或记载有该卡名的同步怪兽的情况下，要加入手牌的怪兽也可从牌组挑选。②：自己的“／爆裂”怪兽或“暗红恶魔龙”攻击的伤害步骤结束时，将墓地的此卡除外可以发动。该攻击怪兽可继续再攻击仅1次。
