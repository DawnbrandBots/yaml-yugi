  fr: Statue de Motif d'Angoisse
  it: Statua dello Schema della Pena
  pt: Estátua do Padrão Angustiante
  ja: <ruby>苦<rt>く</rt></ruby><ruby>紋<rt>もん</rt></ruby><ruby>様<rt>よう</rt></ruby>の<ruby>土<rt>ど</rt></ruby><ruby>像<rt>ぞう</rt></ruby>
  ja_romaji: Kumon'yō no Dozō
  ko: 고문양의 토상
  ko_rr:
  zh-TW: 苦紋土偶
  zh-CN: 苦纹样的土像
text:
  en: |-
    Special Summon this card as an Effect Monster (Rock-Type/EARTH/Level 7/ATK 0/DEF 2500). (This card is also still a Trap Card.) If Summoned this way, this card cannot be targeted by an opponent's card effects while you control another Trap Card that is a monster. If a card is Special Summoned from your Spell & Trap Zone to the Monster Zone while this card is a monster: You can target 1 card on the field; destroy it.
  de: |-
    Beschwöre diese Karte als Spezialbeschwörung als Effektmonster (Fels/ERDE/Stufe 7/ATK 0/DEF 2500) (diese Karte ist zusätzlich weiterhin eine Falle). Falls diese Karte auf diese Art beschworen wird, kann dein Gegner sie nicht als Ziel für Karteneffekte wählen, solange eine andere Fallenkarte, die ein Monster ist, in der Monsterzone liegt. Falls eine oder mehr Karten als Spezialbeschwörung von deiner Zauber- & Fallenzone in die Monsterzone beschworen werden, solange du diese Karte kontrollierst, die auf diese Art beschworen wurde (außer während des Damage Steps): Du kannst 1 Karte auf dem Spielfeld wählen; zerstöre sie.
  es: |-
    Invoca esta carta de Modo Especial como un Monstruo de Efecto (Roca/TIERRA/Nivel 7/ATK 0/DEF 2500) (esta carta también sigue siendo una Trampa). Si es Invocada de esta forma, tu adversario no puede seleccionar esta carta con efectos de cartas mientras otra Carta de Trampa que sea un monstruo esté en la Zona de Monstruos. Si una o más cartas son Invocadas de Modo Especial desde tu Zona de Magia y Trampas a la Zona de Monstruos, mientras controles esta carta Invocada de esta forma (excepto durante el Damage Step): puedes seleccionar 1 carta en el Campo; destrúyela.
  fr: |-
    Invoquez Spécialement cette carte comme Monstre à Effet (Rocher/TERRE/Niveau 7/ATK 0/DEF 2500) (cette carte est toujours aussi un Piège). Si elle est Invoquée de cette façon, votre adversaire ne peut pas cibler cette carte avec des effets de carte tant qu'une autre Carte Piège qui est un monstre est dans la Zone Monstre. Si une ou plusieurs cartes sont Invoquées Spécialement depuis votre Zone Magie & Piège dans la Zone Monstre, tant que vous contrôlez cette carte Invoquée de cette façon (sauf durant la Damage Step) : vous pouvez cibler 1 carte sur le Terrain ; détruisez-la.
  it: |-
    Evoca Specialmente questa carta come un Mostro con Effetto (Roccia/TERRA/Livello 7/ATK 0/DEF 2500) (questa carta è ancora anche una Trappola). Se viene Evocata in questo modo, il tuo avversario non può scegliere questa carta come bersaglio con gli effetti delle carte mentre un'altra Carta Trappola che è un mostro è nella Zona Mostri. Se una o più carte vengono Evocate Specialmente dalla tua Zona Magie & Trappole nella Zona Mostri, mentre controlli questa carta Evocata in questo modo (eccetto durante il Damage Step): puoi scegliere come bersaglio 1 carta sul Terreno; distruggila.
  pt: |-
    Invoque este card por Invocação-Especial como um Monstro de Efeito (Rocha/TERRA/Nível 7/ATK 0/DEF 2500) (este card ainda é considerado uma Armadilha). Se Invocado desta forma, seu oponente não pode escolher este card como alvo de efeitos de card enquanto outro Card de Armadilha que seja um monstro estiver na Zona de Monstros. Se um ou mais cards forem Invocados por Invocação-Especial da sua Zona de Magias & Armadilhas para a Zona de Monstros, enquanto você controlar este card Invocado desta forma (exceto durante a Etapa de Dano): você pode escolher 1 card no campo; destrua-o.
  ja: |-
    ①：このカードは発動後、効果モンスター（岩石族・地・星７・攻０／守２５００）となり、モンスターゾーンに特殊召喚する（罠カードとしても扱う）。②：このカード以外のモンスター扱いの罠カードがモンスターゾーンに存在する限り、相手はこのカードの効果で特殊召喚したこのカードを効果の対象にできない。③：このカードの効果で特殊召喚したこのカードが存在する状態で、自分の魔法＆罠ゾーンのカードがモンスターゾーンに特殊召喚される度に、フィールドのカード１枚を対象として発動できる。そのカードを破壊する。
  ko: |-
    ①: 이 카드는 발동 후, 효과 몬스터(암석족 / 땅 / 레벨 7 / 공 0 / 수 2500)가 되고, 몬스터 존에 특수 소환한다(함정 카드로도 취급한다). ②: 이 카드 이외의 몬스터 취급의 함정 카드가 몬스터 존에 존재하는 한, 상대는 이 카드의 효과로 특수 소환한 이 카드를 효과의 대상으로 할 수 없다. ③: 이 카드의 효과로 특수 소환된 이 카드가 존재하는 상태에서, 자신의 마법 & 함정 존의 카드가 몬스터 존에 특수 소환될 때마다, 필드의 카드 1장을 대상으로 하여 발동할 수 있다. 그 카드를 파괴한다.
  zh-TW:
  zh-CN: |-
    ①：此卡发动后变为效果怪兽（岩石族・地・星７・攻０／守２５００），特殊召唤至怪兽区域（也视为陷阱卡）。②：只要此卡以外的、视为怪兽的陷阱卡存在于怪兽区域，对手不可将以此卡的效果特殊召唤的此卡作为效果的对象。③：以此卡的效果特殊召唤的此卡存在，且自己的魔法与陷阱区域的卡被特殊召唤至怪兽区域的情况下，以场上的１张卡为对象可以发动。将该卡破坏。
