name:
  en: Aiwass, Divine Spirit of the Law
  de: Aiwass, göttlicher Geist des Gesetzes
  es: Aiwass, Espíritu Divino de la Ley
  fr: Aiwass, Esprit Divin de la Loi
  it: Aiwass, Spirito Divino della Legge
  pt: Aiwass, o Espírito Divino da Lei
  ja: <ruby>法<rt>ほう</rt></ruby>の<ruby>神<rt>しん</rt></ruby><ruby>霊<rt>れい</rt></ruby>アイワス
  ja_romaji: Hō no Shinrei Aiwasu
  ko:
  ko_rr:
  zh-TW:
  zh-CN: 法之神灵 爱华斯
text:
  en: |-
    You can banish this card from your hand or field; add 1 "Aleister" monster from your Deck to your hand, then if this effect was activated on the field, immediately after this effect resolves, you can Normal Summon 1 Spellcaster monster. If a face-up Fusion Monster(s) you control is sent to the GY, except by battle, while this card is in your GY (except during the Damage Step): You can Special Summon this card, then you can Fusion Summon 1 "Invoked" monster from your Extra Deck, using monsters from your hand or field. You can only use each effect of "Aiwass, Divine Spirit of the Law" once per turn.
  de: |-
    Du kannst diese Karte von deiner Hand oder Spielfeldseite verbannen; füge deiner Hand 1 „Aleister“-Monster von deinem Deck hinzu, dann, falls dieser Effekt auf dem Spielfeld aktiviert wurde, kannst du, sofort nachdem dieser Effekt aufgelöst wurde, 1 Hexer-Monster als Normalbeschwörung beschwören. Falls ein oder mehr offene Fusionsmonster, die du kontrollierst, auf den Friedhof gelegt werden, außer durch Kampf, solange sich diese Karte in deinem Friedhof befindet (außer während des Damage Steps): Du kannst diese Karte als Spezialbeschwörung beschwören, dann kannst du 1 „Beschworen“-Monster als Fusionsbeschwörung von deinem Extra Deck beschwören, indem du Monster von deiner Hand oder Spielfeldseite verwendest. Du kannst jeden Effekt von „Aiwass, göttlicher Geist des Gesetzes“ nur einmal pro Spielzug verwenden.
  es: |-
    Puedes desterrar esta carta en tu mano o Campo; añade a tu mano 1 monstruo "Aleister" en tu Deck y después, si este efecto fue activado en el Campo, inmediatamente después de que se resuelva este efecto, puedes Invocar de Modo Normal 1 monstruo Lanzador de Conjuros. Si uno o más Monstruos de Fusión boca arriba que controlas son mandados al Cementerio, excepto en batalla, mientras esta carta está en tu Cementerio (excepto durante el Damage Step): puedes Invocar esta carta de Modo Especial, y después puedes Invocar por Fusión 1 monstruo "Invokado/a" desde tu Deck Extra, usando monstruos en tu mano o Campo. Sólo puedes usar cada efecto de "Aiwass, Espíritu Divino de la Ley" una vez por turno.
  fr: |-
    Vous pouvez bannir cette carte depuis votre main ou Terrain ; ajoutez 1 monstre "Aleister" depuis votre Deck à votre main, puis si cet effet a été activé sur le Terrain, immédiatement après la résolution de cet effet, vous pouvez Invoquer Normalement 1 monstre Magicien. Si un ou plusieurs Monstres Fusion face recto que vous contrôlez sont envoyés au Cimetière, sauf au combat, tant que cette carte est dans votre Cimetière (sauf durant la Damage Step) : vous pouvez Invoquer Spécialement cette carte, puis vous pouvez Invoquer par Fusion 1 monstre "Invokhé" depuis votre Extra Deck, en utilisant des monstres depuis votre main ou Terrain. Vous ne pouvez utiliser chaque effet de "Aiwass, Esprit Divin de la Loi" qu'une fois par tour.
  it: |-
    Puoi bandire questa carta dalla tua mano o Terreno; aggiungi 1 mostro "Aleister" dal tuo Deck alla tua mano, poi se questo effetto è stato attivato sul Terreno, immediatamente dopo che questo effetto si è risolto, puoi Evocare Normalmente 1 mostro Incantatore. Se uno o più Mostri Fusione scoperti che controlli vengono mandati al Cimitero, eccetto in battaglia, mentre questa carta è nel tuo Cimitero (eccetto durante il Damage Step): puoi Evocare Specialmente questa carta, poi puoi Evocare tramite Fusione 1 mostro "Invokato" dal tuo Extra Deck, utilizzando mostri dalla tua mano o Terreno. Puoi utilizzare ogni effetto di "Aiwass, Spirito Divino della Legge" una sola volta per turno.
  pt: |-
    Você pode banir este card da sua mão ou do campo; adicione 1 monstro "Aleister" do seu Deck à sua mão e, depois, se este efeito foi ativado no campo, imediatamente depois que este efeito resolver, você pode Invocar 1 monstro Mago por Invocação-Normal. Se um ou mais Monstros de Fusão com a face para cima que você controla forem enviados para o Cemitério, exceto em batalha, enquanto este card estiver no seu Cemitério (exceto durante a Etapa de Dano): você pode Invocar este card por Invocação-Especial e, depois, você pode Invocar por Invocação-Fusão 1 monstro "Invokado(a)" do seu Deck Adicional, usando monstros da sua mão ou do campo. Você só pode usar cada efeito de "Aiwass, o Espírito Divino da Lei" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：手札・フィールドのこのカードを除外して発動できる。デッキから「アレイスター」モンスター１体を手札に加える。フィールドで発動した場合、さらに魔法使い族モンスター１体の召喚を行う事ができる。②：このカードが墓地に存在する状態で、自分フィールドの表側表示の融合モンスターが戦闘以外で墓地へ送られた場合に発動できる。このカードを特殊召喚する。その後、自分の手札・フィールドのモンスターを融合素材とし、「召喚獣」モンスター１体を融合召喚できる。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：将手牌・场上的此卡除外可以发动。从牌组将1只“阿莱斯特”怪兽加入手牌。在场上发动的情况下，进而可进行1只魔法师族怪兽的召唤。②：此卡存在于墓地的状态下，自己场上的表侧表示融合怪兽因战斗以外的方法被送至墓地的情况下可以发动。将此卡特殊召唤。然后，可将自己手牌・场上的怪兽作为融合素材，将1只“召唤兽”怪兽融合召唤。
