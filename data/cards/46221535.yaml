name:
  en: Drill Armed Dragon
  de: Bohrerbewaffneter Drache
  es: Dragón Armado Perforador
  fr: Dragon Armé Perceur
  it: Drago Armato Trivella
  pt: Dragão Armado Perfurador
  ja: ドリル・アームド・ドラゴン
  ja_romaji: Doriru Āmudo Doragon
