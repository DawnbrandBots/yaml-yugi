  ko_rr:
  zh-TW:
  zh-CN: 星废品同步士
text:
  en: |-
    For a Synchro Summon, you can substitute this card for any 1 "Synchron" Tuner. You can only use each of the following effects of "Starjunk Synchron" once per turn. If this card is in your hand: You can target 1 Level 2 or lower monster in your GY; Special Summon this card, and if you do, Special Summon that monster, but negate its effects, also you cannot Special Summon from the Extra Deck for the rest of this turn, except Synchro Monsters. You can banish this card from your GY; this turn, no "Junk Warrior" you control can be destroyed by your opponent's card effects.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカードは「シンクロン」チューナーの代わりとしてＳ素材にできる。このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが手札に存在する場合、自分の墓地のレベル２以下のモンスター１体を対象として発動できる。このカードを特殊召喚し、対象のモンスターを効果を無効にして特殊召喚する。このターン、自分はＳモンスターしかＥＸデッキから特殊召喚できない。②：墓地のこのカードを除外して発動できる。このターン中、自分フィールドの「ジャンク・ウォリアー」は相手の効果では破壊されない。
  ko: |-
    이 카드는 "싱크론" 튜너 대신 싱크로 소재로 할 수 있다. 이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드가 패에 존재할 경우, 자신 묘지의 레벨 2 이하의 몬스터 1장을 대상으로 하고 발동할 수 있다. 이 카드를 특수 소환하고, 대상 몬스터를 효과를 무효로 하여 특수 소환한다. 이 턴에, 자신은 싱크로 몬스터밖에 엑스트라 덱에서 특수 소환할 수 없다. ②: 묘지의 이 카드를 제외하고 발동할 수 있다. 이 턴 중에, 자신 필드의 "정크 워리어"는 상대 효과로는 파괴되지 않는다.
  zh-TW:
  zh-CN: |-
    此卡可代替“同步士”协调作为同步素材。此卡名的①②效果1回合仅可各使用1次。①：此卡存在于手牌的情况下，以自己墓地的1只等级2以下的怪兽为对象可以发动。将此卡特殊召唤，将对象怪兽的效果无效并特殊召唤。此回合，自己从额外牌组仅可特殊召唤同步怪兽。②：将墓地的此卡除外可以发动。此回合中，自己场上的“废品战士”不会因对手的效果而被破坏。
