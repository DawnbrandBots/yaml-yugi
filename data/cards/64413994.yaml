text:
  en: |-
    A mysterious entity said to be an angel who brings salvation to heretical souls. After "it" passes through, only eternal silence remains - Ange Passe.
  de: |-
    Ein geheimnisvolles Wesen, von dem man sagt, es sei ein Engel, der ketzerischen Seelen Erlösung bringt. Nachdem „es“ vorübergezogen ist, bleibt nur ewige Stille – Ange Passe.
  es: |-
    Una entidad misteriosa que se dice que es un ángel que trae salvación a las almas heréticas. Después de que "eso" pase, sólo queda silencio eterno - Ha pasado un Ángel.
  fr: |-
    Une entité mystérieuse qualifiée d'ange apportant le salut aux âmes hérétiques. Seul un silence éternel subsiste après son passage...
  it: |-
    Un'entità misteriosa che si dice essere un angelo che porta la salvezza alle anime eretiche. Dopo che "esso" è passato, resta solo il silenzio eterno - Ange Passe.
  pt: |-
    Uma entidade misteriosa que dizem ser um anjo que traz a salvação às almas hereges". Depois que "ele" passa, só resta um silêncio eterno. - Ange Passe.
  ja: |-
    “異端なる魂に救いをもたらす天使”と呼ばれる謎多き存在。“それ”が通った後には永遠の静寂だけが残る――アンジュ・パッセ。
  ko: |-
    "이단의 영혼에게 구원을 가져다주는 천사"라 불리는 수수께끼의 존재. "그것"이 지나간 뒤에는 영원한 정적만이 남는다――앙쥬 파세.
