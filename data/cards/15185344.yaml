  zh-CN: |-
    等级3怪兽×2
    “灿冠乘骑 迅快拉维”1回合1次，也可重叠在自己场上的攻击力2000以下的兽族怪兽上面来超量召唤。此卡不可作为超量召唤的素材。①：此卡战斗破坏怪兽的情况下发动。在此卡上放1个冠计数物。然后，根据此卡的冠计数物的数量适用以下效果。●1个：此卡的攻击力上升400。●2个：此卡的攻击力上升600。●3个：将此卡放回额外牌组，自己抽3张。
