  ja: |-
    レベル３モンスター×２
    「燦冠乗騎シックラヴィー」は１ターンに１度、自分フィールドの攻撃力２０００以下の獣族モンスターの上に重ねてＸ召喚する事もできる。このカードはＸ召喚の素材にできない。①：このカードが戦闘でモンスターを破壊した場合に発動する。このカードに冠カウンターを１つ置く。その後、このカードの冠カウンターの数によって以下の効果を適用する。●１つ：このカードの攻撃力は４００アップする。●２つ：このカードの攻撃力は６００アップする。●３つ：このカードをＥＸデッキに戻し、自分は３枚ドローする。
