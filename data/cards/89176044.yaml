text:
  en: |-
    Send 1 "Predap" card from your Deck to the GY, except "Predaprimitive"; add 1 "Polymerization" Spell or "Fusion" Spell from your Deck to your hand, also you cannot Special Summon for the rest of this turn after this card resolves, except Plant or Dragon monsters. If a monster(s) is Special Summoned to your opponent's field (except during the Damage Step): You can banish this card from your GY, then target 1 Fusion Monster you control; destroy it. You can only activate 1 "Predaprimitive" per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名のカードは１ターンに１枚しか発動できない。①：デッキから「捕食原生」以外の「プレデター」カード１枚を墓地へ送って発動できる。デッキから「融合」魔法カードか「フュージョン」魔法カード１枚を手札に加える。このカードの発動後、ターン終了時まで自分はドラゴン族・植物族モンスターしか特殊召喚できない。②：相手フィールドにモンスターが特殊召喚された場合、墓地のこのカードを除外し、自分フィールドの融合モンスター１体を対象として発動できる。そのモンスターを破壊する。
  ko: |-
    이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다. ①: 덱에서 "프레데터 프리미티브" 이외의 "프레데터" 카드 1장을 묘지로 보내고 발동할 수 있다. 덱에서 "융합" 마법 카드나 "퓨전" 마법 카드 1장을 패에 넣는다. 이 카드의 발동 후, 턴 종료시까지 자신은 드래곤족 / 식물족 몬스터밖에 특수 소환할 수 없다. ②: 상대 필드에 몬스터가 특수 소환되었을 경우, 묘지의 이 카드를 제외하고, 자신 필드의 융합 몬스터 1장을 대상으로 하여 발동할 수 있다. 그 몬스터를 파괴한다.
  zh-TW:
  zh-CN: |-
    此卡名的卡1回合仅可发动1张。①：从牌组将“捕食原生”以外的1张“捕食”卡送至墓地可以发动。从牌组将1张“融合”魔法卡或“结合”魔法卡加入手牌。此卡发动后，直至回合结束时为止自己仅可特殊召唤龙族・植物族怪兽。②：怪兽被特殊召唤至对手场上的情况下，将墓地的此卡除外，以自己场上的1只融合怪兽为对象可以发动。将该怪兽破坏。
