  en: |-
    Add 1 monster that mentions "Atlantis, City of the Sea Dragon" from your Deck to your hand, then if you control "Atlantis, City of the Sea Dragon", you can negate the effects of 1 Effect Monster your opponent controls until the end of this turn. If you control "Umi": You can banish this card from your GY; all WATER monsters you currently control gain 500 ATK/DEF. You can only use each effect of "Atlantis Call" once per turn.
