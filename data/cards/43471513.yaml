name:
  en: Convex Knight
  de: Konvexritter
  es: Caballero Convexo
  fr: Chevalier Convexe
  it: Cavaliere Convesso
  pt: Cavaleiro Convexo
  ja: コンベックス・ナイト
  ja_romaji: Konbekkusu Naito
  ko: 콘벡스 나이트
  ko_rr:
  zh-TW:
  zh-CN: 卷尺骑士
text:
  en: |-
    If a Machine monster is on the field and this card is in your hand: You can Special Summon this card in Defense Position, then you can make this card's Level become the Level/Rank of 1 Machine monster on the field. During your Main Phase: You can send 1 EARTH Machine monster from your Deck to the GY, then until the end of this turn, this card gains ATK equal to the Level of the monster sent to the GY x 100. You can only use each effect of "Convex Knight" once per turn.
  de: |-
    Falls sich ein Maschine-Monster auf dem Spielfeld und diese Karte in deiner Hand befindet: Du kannst diese Karte als Spezialbeschwörung in die Verteidigungsposition beschwören, dann kannst du die Stufe dieser Karte gleich der Stufe / dem Rang von 1 Maschine-Monster auf dem Spielfeld werden lassen. Während deiner Main Phase: Du kannst 1 ERDE Maschine-Monster von deinem Deck auf den Friedhof legen, dann erhält diese Karte bis zum Ende dieses Spielzugs ATK in Höhe der Stufe des auf den Friedhof gelegten Monsters x 100. Du kannst jeden Effekt von „Konvexritter“ nur einmal pro Spielzug verwenden.
  es: |-
    Si un monstruo Máquina está en el Campo y esta carta está en tu mano: puedes Invocar esta carta de Modo Especial en Posición de Defensa, y después puedes hacer que el Nivel de esta carta se convierta en el Nivel/Rango de 1 monstruo Máquina en el Campo. Durante tu Main Phase: puedes mandar al Cementerio 1 monstruo Máquina de TIERRA en tu Deck y después, hasta el final de este turno, esta carta gana ATK igual al Nivel del monstruo mandado al Cementerio x 100. Sólo puedes usar cada efecto de "Caballero Convexo" una vez por turno.
  fr: |-
    Si un monstre Machine est sur le Terrain et que cette carte est dans votre main : vous pouvez Invoquer Spécialement cette carte en Position de Défense, puis vous pouvez faire devenir le Niveau de cette carte le Niveau/Rang d'1 monstre Machine sur le Terrain. Durant votre Main Phase : vous pouvez envoyer 1 monstre TERRE Machine depuis votre Deck au Cimetière, puis jusqu'à la fin de ce tour, cette carte gagne une ATK égale au Niveau du monstre envoyé au Cimetière x 100. Vous ne pouvez utiliser chaque effet de "Chevalier Convexe" qu'une fois par tour.
  it: |-
    Se un mostro Macchina è sul Terreno e questa carta è nella tua mano: puoi Evocare Specialmente questa carta in Posizione di Difesa, poi puoi far diventare il Livello di questa carta il Livello/Rango di 1 mostro Macchina sul Terreno. Durante la tua Main Phase: puoi mandare 1 mostro TERRA Macchina dal tuo Deck al Cimitero, poi fino alla fine di questo turno, questa carta guadagna ATK pari al Livello del mostro mandato al Cimitero x 100. Puoi utilizzare ogni effetto di "Cavaliere Convesso" una sola volta per turno.
  pt: |-
    Se um monstro Máquina estiver no campo e este card estiver na sua mão: você pode Invocar este card por Invocação-Especial em Posição de Defesa e, depois, você pode fazer com que o Nível deste card se torne o Nível/Classe de 1 monstro Máquina no campo. Durante sua Fase Principal: você pode enviar 1 monstro Máquina de TERRA do seu Deck para o Cemitério e, depois, até o final deste turno, este card ganha ATK igual ao Nível do monstro enviado para o Cemitério x 100. Você só pode usar cada efeito de "Cavaleiro Convexo" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが手札に存在し、フィールドに機械族モンスターが存在する場合に発動できる。このカードを守備表示で特殊召喚する。その後、このカードのレベルをフィールドの機械族モンスター１体のレベル・ランクの数値と同じにできる。②：自分メインフェイズに発動できる。デッキから機械族・地属性モンスター１体を墓地へ送る。その後、このカードの攻撃力はターン終了時まで、墓地へ送ったモンスターのレベル×１００アップする。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드가 패에 존재하고, 필드에 기계족 몬스터가 존재할 경우에 발동할 수 있다. 이 카드를 수비 표시로 특수 소환한다. 그 후, 이 카드의 레벨을 필드의 기계족 몬스터 1장의 레벨 / 랭크의 수치와 같게 할 수 있다. ②: 자신 메인 페이즈에 발동할 수 있다. 덱에서 기계족 / 땅 속성 몬스터 1장을 묘지로 보낸다. 그 후, 이 카드의 공격력은 턴 종료시까지, 묘지로 보낸 몬스터의 레벨 × 100 올린다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：此卡存在于手牌，且场上存在机械族怪兽的情况下可以发动。将此卡以守备表示特殊召唤。然后，可将此卡的等级改成与场上的1只机械族怪兽的等级・阶级的数值相同。②：在自己的主要阶段可以发动。从牌组将1只机械族・地属性怪兽送至墓地。然后，此卡的攻击力直至回合结束时为止，上升被送至墓地的怪兽等级×100的数值。
