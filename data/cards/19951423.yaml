  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが召喚・特殊召喚した場合に発動できる。デッキから「Ｓ－Ｆｏｒｃｅ シグナス」以外の「Ｓ－Ｆｏｒｃｅ」モンスター１体を手札に加える。このカードの正面に相手モンスターが存在する場合、さらに自分は１枚ドローできる。②：自分フィールドのモンスターの正面の相手モンスターが効果を発動した場合に発動できる。自分フィールドの全ての「Ｓ－Ｆｏｒｃｅ」モンスターの攻撃力は１０００アップする。
  ko:
