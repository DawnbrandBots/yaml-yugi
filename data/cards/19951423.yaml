name:
  en: S-Force Signify
  de: S-Kraft Signify
  es: Fuerza-S Signify
  fr: Signify de la Force-S
  it: S-Forza Signify
  pt: Força-S Signify
  ja: <ruby>Ｓ－Ｆｏｒｃｅ<rt>セキュリティ・フォース</rt></ruby> シグナス
  ja_romaji: Sekyuriti Fōsu Shigunasu
  ko: S－Force 시그너스
  ko_rr:
  zh-TW:
  zh-CN: 超元特防队 征义
text:
  en: |-
    If this card is Normal or Special Summoned: You can add 1 "S-Force" monster from your Deck to your hand, except "S-Force Signify", then if your opponent controls a monster in this card's column, you can draw 1 card. If your opponent activates a monster effect in the same column as a monster you control (except during the Damage Step): You can make all "S-Force" monsters you control gain 1000 ATK. You can only use each effect of "S-Force Signify" once per turn.
  de: |-
    Falls diese Karte als Normal- oder Spezialbeschwörung beschworen wird: Du kannst deiner Hand 1 „S-Kraft“-Monster von deinem Deck hinzufügen, außer „S-Kraft Signify“, dann, falls dein Gegner ein Monster in der Spalte dieser Karte kontrolliert, kannst du 1 Karte ziehen. Falls dein Gegner einen Monstereffekt in derselben Spalte wie ein Monster, das du kontrollierst, aktiviert (außer während des Damage Steps): Du kannst alle „S-Kraft“-Monster, die du kontrollierst, 1000 ATK erhalten lassen. Du kannst jeden Effekt von „S-Kraft Signify“ nur einmal pro Spielzug verwenden.
  es: |-
    Si esta carta es Invocada de Modo Normal o Especial: puedes añadir a tu mano 1 monstruo "Fuerza-S" en tu Deck, excepto "Fuerza-S Signify" y después, si tu adversario controla un monstruo en la columna de esta carta, puedes robar 1 carta. Si tu adversario activa el efecto de un monstruo en la misma columna que un monstruo que controlas (excepto durante el Damage Step): puedes hacer que todos los monstruos "Fuerza-S" que controlas ganen 1000 ATK. Sólo puedes usar cada efecto de "Fuerza-S Signify" una vez por turno.
  fr: |-
    Si cette carte est Invoquée Normalement ou Spécialement : vous pouvez ajouter 1 monstre "Force-S" ("Signify de la Force-S" exclu) depuis votre Deck à votre main, puis si votre adversaire contrôle un monstre dans la colonne de cette carte, vous pouvez piocher 1 carte. Si votre adversaire active un effet de monstre dans la même colonne qu'un monstre que vous contrôlez (sauf durant la Damage Step) : vous pouvez faire gagner 1000 ATK à tous les monstres "Force-S" que vous contrôlez. Vous ne pouvez utiliser chaque effet de "Signify de la Force-S" qu'une fois par tour.
  it: |-
    Se questa carta viene Evocata Normalmente o Specialmente: puoi aggiungere 1 mostro "S-Forza" dal tuo Deck alla tua mano, eccetto "S-Forza Signify", poi se il tuo avversario controlla un mostro nella colonna di questa carta, puoi pescare 1 carta. Se il tuo avversario attiva l'effetto di un mostro nella stessa colonna di un mostro che controlli (eccetto durante il Damage Step): puoi far guadagnare 1000 ATK a tutti i mostri "S-Forza" che controlli. Puoi utilizzare ogni effetto di "S-Forza Signify" una sola volta per turno.
  pt: |-
    Se este card for Invocado por Invocação-Normal ou Especial: você pode adicionar 1 monstro "Força-S" do seu Deck à sua mão, exceto "Força-S Signify" e, depois, se seu oponente controlar um monstro na coluna deste card, você pode comprar 1 card. Se seu oponente ativar um efeito de monstro na mesma coluna que a de um monstro que você controla (exceto durante a Etapa de Dano): você pode fazer com que todos os monstros "Força-S" que você controla ganhem 1000 de ATK. Você só pode usar cada efeito de "Força-S Signify" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが召喚・特殊召喚した場合に発動できる。デッキから「Ｓ－Ｆｏｒｃｅ シグナス」以外の「Ｓ－Ｆｏｒｃｅ」モンスター１体を手札に加える。このカードの正面に相手モンスターが存在する場合、さらに自分は１枚ドローできる。②：自分フィールドのモンスターの正面の相手モンスターが効果を発動した場合に発動できる。自分フィールドの全ての「Ｓ－Ｆｏｒｃｅ」モンスターの攻撃力は１０００アップする。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드를 일반 소환 / 특수 소환했을 경우에 발동할 수 있다. 덱에서 "S－Force(시큐리티 포스) 시그너스" 이외의 "S－Force(시큐리티 포스)" 몬스터 1장을 패에 넣는다. 이 카드의 정면에 상대 몬스터가 존재할 경우, 추가로 자신은 1장 드로우할 수 있다. ②: 자신 필드의 몬스터 정면의 상대 몬스터가 효과를 발동했을 경우에 발동할 수 있다. 자신 필드의 모든 "S－Force(시큐리티 포스)" 몬스터의 공격력은 1000 올린다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：此卡召唤・特殊召唤的情况下可以发动。从牌组将“超元特防队 征义”以外的1只“超元特防队”怪兽加入手牌。此卡的正面存在对手怪兽的情况下，自己可进而抽1张。②：自己场上的怪兽的正面的、对手怪兽发动效果的情况下可以发动。自己场上所有“超元特防队”怪兽的攻击力上升1000。
