text:
  en: |-
    If this card is Normal or Special Summoned: You can add 1 "S-Force" monster from your Deck to your hand, except "S-Force Signus", then if an opponent's monster is in this card's column, you can draw 1 card. If an opponent's monster activates its effect in the same column as your monster (except during the Damage Step): You can make all "S-Force" monsters you currently control gain 1000 ATK. You can only use each effect of "S-Force Signus" once per turn.
