  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：フィールドに魔法使い族モンスターが存在する場合に発動できる。デッキからレベル５以上のドラゴン族モンスター１体を特殊召喚する。相手フィールドにモンスターが２体以上存在する場合、さらに特殊召喚したモンスターの同名モンスター１体をデッキから特殊召喚できる。このターン、自分はドラゴン族・魔法使い族モンスターしか特殊召喚できない。②：自分メインフェイズ２に、このターンに墓地へ送られたこのカードを除外して発動できる。自分は１枚ドローする。
