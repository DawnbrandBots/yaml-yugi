text:
  en: |-
    If a Spellcaster monster is on the field: Special Summon 1 Level 5 or higher Dragon monster from your Deck, then if your opponent controls 2 or more monsters, you can Special Summon 1 monster from your Deck with the same name as the Summoned monster, also you cannot Special Summon for the rest of this turn, except Dragon or Spellcaster monsters. During your Main Phase 2, if this card is in your GY because it was sent there this turn: You can banish it; draw 1 card. You can only use each effect of "The Flute of Guiding Dragon" once per turn.
