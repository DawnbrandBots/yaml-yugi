  zh-TW:
  zh-CN: 劫火之三幻魔－神炎皇乌利亚
text:
  en: |-
    Cannot be Normal Summoned/Set. Must be Special Summoned with the effect of a "Sacred Beast" card. You can reveal this card in your hand; add 1 "Sacred Beast" Trap from your Deck to your hand, then discard 1 card. You can only use this effect of "Inferno of the Sacred Beasts - Uria, Lord of Searing Flames" once per turn. Gains 1000 ATK/DEF for each Trap in the GYs. Once per turn (Quick Effect): You can target 1 Spell/Trap on the field; destroy it. Neither player can activate cards or effects in response to this effect's activation.
  de: |-
    Kann nicht als Normalbeschwörung beschworen/gesetzt werden. Muss durch den Effekt einer „Heiligen Ungeheuer“-Karte als Spezialbeschwörung beschworen werden. Du kannst diese Karte in deiner Hand vorzeigen; füge deiner Hand 1 „Heiligen Ungeheuer“-Falle von deinem Deck hinzu, dann wirf 1 Karte ab. Du kannst diesen Effekt von „Inferno der heiligen Ungeheuer - Uria, Herr der reißenden Flammen“ nur einmal pro Spielzug verwenden. Erhält für jede Falle in den Friedhöfen 1000 ATK/DEF. Einmal pro Spielzug (Schnelleffekt): Du kannst 1 Zauber/Falle auf dem Spielfeld wählen; zerstöre ihn oder sie. Kein Spieler kann Karten oder Effekte als Reaktion auf die Aktivierung dieses Effekts aktivieren.
  es: |-
    No puede ser Invocado de Modo Normal/Colocado. Debe ser Invocado de Modo Especial con el efecto de una carta "Bestias Sagradas". Puedes mostrar esta carta en tu mano; añade a tu mano 1 Trampa "Bestias Sagradas" en tu Deck, y después descarta 1 carta. Sólo puedes usar este efecto de "Infierno de las Bestias Sagradas - Uria, Señor de las Llamas Abrasadoras" una vez por turno. Gana 1000 ATK/DEF por cada Trampa en los Cementerios. Una vez por turno (Efecto Rápido): puedes seleccionar 1 Mágica/Trampa en el Campo; destrúyela. Ningún jugador puede activar cartas o efectos en respuesta a la activación de este efecto.
  fr: |-
    Ni Invocable Normalement ni Posable Normalement. Uniquement Invocable Spécialement avec l'effet d'une carte "Bêtes Sacrées". Vous pouvez révéler cette carte dans votre main ; ajoutez 1 Piège "Bêtes Sacrées" depuis votre Deck à votre main, puis défaussez 1 carte. Vous ne pouvez utiliser cet effet de "Brasier des Bêtes Sacrées - Uria, Seigneur des Flammes Aveuglantes" qu'une fois par tour. Gagne 1000 ATK/DEF pour chaque Piège dans les Cimetières. Une fois par tour (Effet Rapide) : vous pouvez cibler 1 Magie/Piège sur le Terrain ; détruisez-le. Aucun joueur ne peut activer ni de cartes ni d'effets en réponse à l'activation de cet effet.
  it: |-
    Non può essere Evocato Normalmente/Posizionato. Deve essere Evocato Specialmente con l'effetto di una carta "Bestia Sacra". Puoi rivelare questa carta nella tua mano; aggiungi 1 Trappola "Bestia Sacra" dal tuo Deck alla tua mano, poi scarta 1 carta. Puoi utilizzare questo effetto di "Inferno delle Bestie Sacre - Uria, Signore delle Fiamme Ardenti" una sola volta per turno. Guadagna 1000 ATK/DEF per ogni Trappola nei Cimiteri. Una volta per turno (Effetto Rapido): puoi scegliere come bersaglio 1 Magia/Trappola sul Terreno; distruggila. Nessun giocatore può attivare carte o effetti in risposta all'attivazione di questo effetto.
  pt: |-
    Não pode ser Invocado por Invocação-Normal/Baixado. Deve ser Invocado por Invocação-Especial com o efeito de um card "Bestas Sagradas". Você pode revelar este card na sua mão; adicione 1 Armadilha "Bestas Sagradas" do seu Deck à sua mão e, depois, descarte 1 card. Você só pode usar este efeito de "Inferno das Bestas Sagradas - Uria, o Senhor das Chamas Cortantes" uma vez por turno. Ganha 1000 de ATK/DEF para cada Armadilha nos Cemitérios. Uma vez por turno (Efeito Rápido): você pode escolher 1 Magia/Armadilha no campo; destrua-a. Nenhum duelista pode ativar cards ou efeitos em resposta à ativação deste efeito.
  ja: |-
    このカードは通常召喚できず、「三幻魔」カードの効果でのみ特殊召喚できる。このカード名の①の効果は１ターンに１度しか使用できない。①：手札のこのカードを相手に見せて発動できる。デッキから「三幻魔」罠カード１枚を手札に加える。その後、自分の手札を１枚選んで捨てる。②：このカードの攻撃力・守備力は、お互いの墓地の罠カードの数×１０００アップする。③：自分・相手ターンに１度、フィールドの魔法・罠カード１枚を対象として発動できる（この発動に対してお互いは効果を発動できない）。そのカードを破壊する。
  ko:
  zh-TW:
  zh-CN: |-
    此卡不可通常召唤，仅可通过“三幻魔”卡的效果特殊召唤。此卡名的①效果1回合仅可使用1次。①：向对手出示手牌的此卡可以发动。从牌组将1张“三幻魔”陷阱卡加入手牌。然后，挑选自己的1张手牌舍弃。②：此卡的攻击力・守备力上升双方墓地陷阱卡的数量×1000的数值。③：在每个自己・对手回合中1次，以场上的1张魔法・陷阱卡为对象可以发动（应对此发动，双方不可发动效果）。将该卡破坏。
