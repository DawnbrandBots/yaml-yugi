name:
  en: Inferno of the Sacred Beasts - Uria, Lord of Searing Flames
  de: Inferno der heiligen Ungeheuer - Uria, Herr der reißenden Flammen
  es: Infierno de las Bestias Sagradas - Uria, Señor de las Llamas Abrasadoras
  fr: Brasier des Bêtes Sacrées - Uria, Seigneur des Flammes Aveuglantes
  it: Inferno delle Bestie Sacre - Uria, Signore delle Fiamme Ardenti
  pt: Inferno das Bestas Sagradas - Uria, o Senhor das Chamas Cortantes
  ja: <ruby>劫<rt>ごう</rt></ruby><ruby>火<rt>か</rt></ruby>の<ruby>三<rt>さん</rt></ruby><ruby>幻<rt>げん</rt></ruby><ruby>魔<rt>ま</rt></ruby>－<ruby>神<rt>しん</rt></ruby><ruby>炎<rt>えん</rt></ruby><ruby>皇<rt>おう</rt></ruby>ウリア
  ja_romaji: Gōka no Sangenma - Shin'en'ō Uria
  ko:
