  ja: |-
    Ｓモンスターを含む効果モンスター２体
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードがＬ召喚した場合、またはこのカードのリンク先にモンスターが特殊召喚された場合、自分のフィールド・墓地のモンスター１体を対象として発動できる。そのモンスターと同じレベルを持つ「奇石トークン」（岩石族・光・攻／守０）１体を自分フィールドに特殊召喚する。②：このカード以外のフィールドのモンスターの効果が発動した時に発動できる。そのモンスターをデッキの一番上に戻す。
  ko:
  zh-TW:
  zh-CN: |-
    包含同步怪兽在内的效果怪兽2只
    此卡名的①②效果1回合仅可各使用1次。①：此卡连接召唤的情况下，或怪兽被特殊召唤至此卡连接端的情况下，以自己场上・墓地的1只怪兽为对象可以发动。将1只与该怪兽等级相同的“奇石衍生物”（岩石族・光・攻/守0）特殊召唤至自己场上。②：此卡以外的场上的怪兽的效果发动时可以发动。将该怪兽放回牌组最上面。
