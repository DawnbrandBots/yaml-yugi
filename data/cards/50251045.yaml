text:
  en: |-
    Cannot be Normal Summoned/Set. Must be Special Summoned with the effect of a "Sacred Beast" card. You can reveal this card in your hand; add 1 "Sacred Beast" Spell from your Deck to your hand, then discard 1 card. You can only use this effect of "Calamity of the Sacred Beasts - Hamon, Lord of Striking Thunder" once per turn. Once per turn, if a monster(s) is sent to your opponent's GY: Inflict 1000 damage to your opponent. If this card is destroyed by battle or card effect: You can activate this effect; you take no damage this turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカードは通常召喚できず、「三幻魔」カードの効果でのみ特殊召喚できる。このカード名の①の効果は１ターンに１度しか使用できない。①：手札のこのカードを相手に見せて発動できる。デッキから「三幻魔」魔法カード１枚を手札に加える。その後、自分の手札を１枚選んで捨てる。②：１ターンに１度、モンスターが相手の墓地へ送られた場合に発動する。相手に１０００ダメージを与える。③：このカードが戦闘・効果で破壊された場合に発動できる。このターン、自分が受ける全てのダメージは０になる。
  ko:
  zh-TW:
  zh-CN: |-
    此卡不可通常召唤，仅可通过“三幻魔”卡的效果特殊召唤。此卡名的①效果1回合仅可使用1次。①：向对手出示手牌的此卡可以发动。从牌组将1张“三幻魔”魔法卡加入手牌。然后，挑选自己的1张手牌舍弃。②：1回合1次，有怪兽被送至对手墓地的情况下发动。给予对手1000伤害。③：此卡因战斗・效果被破坏的情况下可以发动。此回合，自己受到的所有伤害变为0。
