name:
  en: Calamity of the Sacred Beasts - Hamon, Lord of Striking Thunder
  de: Katastrophe der heiligen Ungeheuer - Hamon, Herr des tosenden Donners
  es: Calamidad de las Bestias Sagradas - Hamon, Señor del Trueno Golpeador
  fr: Calamité des Bêtes Sacrées - Hamon, Seigneur du Tonnerre Fracassant
  it: Calamità delle Bestie Sacre - Hamon, Signore del Tuono Fragoroso
  pt: Calamidade das Bestas Sagradas - Hamon, o Senhor do Trovão Impactante
  ja: <ruby>罪<rt>ざい</rt></ruby><ruby>禍<rt>か</rt></ruby>の<ruby>三<rt>さん</rt></ruby><ruby>幻<rt>げん</rt></ruby><ruby>魔<rt>ま</rt></ruby>－<ruby>降<rt>こう</rt></ruby><ruby>雷<rt>らい</rt></ruby><ruby>皇<rt>おう</rt></ruby>ハモン
