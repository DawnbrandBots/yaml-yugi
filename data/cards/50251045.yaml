  zh-CN: 罪祸之三幻魔－降雷皇哈蒙
text:
  en: |-
    Cannot be Normal Summoned/Set. Must be Special Summoned with the effect of a "Sacred Beast" card. You can reveal this card in your hand; add 1 "Sacred Beast" Spell from your Deck to your hand, then discard 1 card. You can only use this effect of "Calamity of the Sacred Beasts - Hamon, Lord of Striking Thunder" once per turn. Once per turn, if a monster(s) is sent to your opponent's GY: Inflict 1000 damage to your opponent. If this card is destroyed by battle or card effect: You can activate this effect; you take no damage this turn.
  de: |-
    Kann nicht als Normalbeschwörung beschworen/gesetzt werden. Muss durch den Effekt einer „Heiligen Ungeheuer“-Karte als Spezialbeschwörung beschworen werden. Du kannst diese Karte in deiner Hand vorzeigen; füge deiner Hand 1 „Heiligen Ungeheuer“-Zauber von deinem Deck hinzu, dann wirf 1 Karte ab. Du kannst diesen Effekt von „Katastrophe der heiligen Ungeheuer - Hamon, Herr des tosenden Donners“ nur einmal pro Spielzug verwenden. Einmal pro Spielzug, falls ein oder mehr Monster auf den Friedhof deines Gegners gelegt werden: Füge deinem Gegner 1000 Schaden zu. Falls diese Karte durch Kampf oder einen Karteneffekt zerstört wird: Du kannst diesen Effekt aktivieren; du erhältst in diesem Spielzug keinen Schaden.
  es: |-
    No puede ser Invocado de Modo Normal/Colocado. Debe ser Invocado de Modo Especial con el efecto de una carta "Bestias Sagradas". Puedes mostrar esta carta en tu mano; añade a tu mano 1 Mágica "Bestias Sagradas" en tu Deck, y después descarta 1 carta. Sólo puedes usar este efecto de "Calamidad de las Bestias Sagradas - Hamon, Señor del Trueno Golpeador" una vez por turno. Una vez por turno, si uno o más monstruos son mandados al Cementerio de tu adversario: inflige 1000 puntos de daño a tu adversario. Si esta carta es destruida en batalla o por el efecto de una carta: puedes activar este efecto; este turno no recibes daño.
  fr: |-
    Ni Invocable Normalement ni Posable Normalement. Uniquement Invocable Spécialement avec l'effet d'une carte "Bêtes Sacrées". Vous pouvez révéler cette carte dans votre main ; ajoutez 1 Magie "Bêtes Sacrées" depuis votre Deck à votre main, puis défaussez 1 carte. Vous ne pouvez utiliser cet effet de "Calamité des Bêtes Sacrées - Hamon, Seigneur du Tonnerre Fracassant" qu'une fois par tour. Une fois par tour, si un ou plusieurs monstres sont envoyés au Cimetière de votre adversaire : infligez 1000 points de dommages à votre adversaire. Si cette carte est détruite au combat ou par un effet de carte : vous pouvez activer cet effet ; ce tour, vous ne recevez aucun dommage.
  it: |-
    Non può essere Evocato Normalmente/Posizionato. Deve essere Evocato Specialmente con l'effetto di una carta "Bestia Sacra". Puoi rivelare questa carta nella tua mano; aggiungi 1 Magia "Bestia Sacra" dal tuo Deck alla tua mano, poi scarta 1 carta. Puoi utilizzare questo effetto di "Calamità delle Bestie Sacre - Hamon, Signore del Tuono Fragoroso" una sola volta per turno. Una volta per turno, se uno o più mostri vengono mandati al Cimitero del tuo avversario: infliggi 1000 danni al tuo avversario. Se questa carta viene distrutta in battaglia o dall'effetto di una carta: puoi attivare questo effetto; non subisci danno in questo turno.
  pt: |-
    Não pode ser Invocado por Invocação-Normal/Baixado. Deve ser Invocado por Invocação-Especial com o efeito de um card "Bestas Sagradas". Você pode revelar este card na sua mão; adicione 1 Magia "Bestas Sagradas" do seu Deck à sua mão e, depois, descarte 1 card. Você só pode usar este efeito de "Calamidade das Bestas Sagradas - Hamon, o Senhor do Trovão Impactante" uma vez por turno. Uma vez por turno, se um ou mais monstros forem enviados para o Cemitério do seu oponente: cause 1000 de dano ao seu oponente. Se este card for destruído em batalha ou por um efeito de card: você pode ativar este efeito; você não sofre dano neste turno.
  ja: |-
    このカードは通常召喚できず、「三幻魔」カードの効果でのみ特殊召喚できる。このカード名の①の効果は１ターンに１度しか使用できない。①：手札のこのカードを相手に見せて発動できる。デッキから「三幻魔」魔法カード１枚を手札に加える。その後、自分の手札を１枚選んで捨てる。②：１ターンに１度、モンスターが相手の墓地へ送られた場合に発動する。相手に１０００ダメージを与える。③：このカードが戦闘・効果で破壊された場合に発動できる。このターン、自分が受ける全てのダメージは０になる。
  ko:
  zh-TW:
  zh-CN: |-
    此卡不可通常召唤，仅可通过“三幻魔”卡的效果特殊召唤。此卡名的①效果1回合仅可使用1次。①：向对手出示手牌的此卡可以发动。从牌组将1张“三幻魔”魔法卡加入手牌。然后，挑选自己的1张手牌舍弃。②：1回合1次，有怪兽被送至对手墓地的情况下发动。给予对手1000伤害。③：此卡因战斗・效果被破坏的情况下可以发动。此回合，自己受到的所有伤害变为0。
