text:
  en: |-
    This card's name becomes "Jinzo" while in the field or GY. If this card is Normal or Special Summoned: You can destroy as many Traps your opponent controls as possible (if a card is Set, reveal it), then this card gains 300 ATK for each card destroyed this way. You can only use this effect of "Jinzo - Energy Shocker" once per turn. Your opponent cannot activate Trap Cards or effects while you have another monster in your field or GY that mentions "Dark Time Wizard".
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の②の効果は１ターンに１度しか使用できない。①：このカードのカード名は、フィールド・墓地に存在する限り「人造人間－サイコ・ショッカー」として扱う。②：このカードが召喚・特殊召喚した場合に発動できる。相手フィールドの罠カードを全て破壊する（裏側表示カードはめくって確認する）。その後、このカードの攻撃力は破壊した数×３００アップする。③：このカードを除く、「時の黒魔術師」のカード名が記されたモンスターが自分のフィールドか墓地に存在する限り、相手は罠カードの効果を発動できない。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的②效果1回合仅可使用1次。①：此卡只要存在于场上・墓地，卡名视为“人造人－念力震慑者”。②：此卡召唤・特殊召唤的情况下可以发动。将对手场上的陷阱卡全部破坏（里侧表示卡翻开确认）。然后，此卡的攻击力上升所破坏数量×300的数值。③：只要自己场上或墓地存在除此卡以外的、记载有“时间黑魔术师”卡名的怪兽，对手不可发动陷阱卡的效果。
