text:
  en: |-
    This card can be used to Ritual Summon "Magician of Dark Chaos - Black Chaos" or "Black Luster Soldier - Soldier of Light and Darkness". You must also Tribute monsters from your hand or field and/or banish monsters from your GY, whose total Levels equal or exceed the Level of the monster you Ritual Summon. If this card is in your GY: You can add both it and 1 other card that mentions "Ritual of Light and Darkness" from your GY to your hand. You can only use this effect of "Ritual of Light and Darkness" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の②の効果は１ターンに１度しか使用できない。①：レベルの合計が儀式召喚するモンスターのレベル以上になるように、自分の手札・フィールドのモンスターをリリース、またはリリースの代わりに自分の墓地のモンスターを除外し、手札から「黒き混沌の魔術師ブラック・カオス」か「光と闇の戦士カオス・ソルジャー」を儀式召喚する。②：このカードが墓地に存在する場合に発動できる。「光と闇の儀式」のカード名が記されたカード１枚とこのカードを自分の墓地から手札に加える。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的②效果1回合仅可使用1次。①：为使合计等级达到仪式召唤的怪兽的等级以上，解放自己手牌・场上的怪兽，或作为解放的代替将自己墓地的怪兽除外，从手牌将“黑色混元之魔术师 黑暗混沌”或“光与暗的战士 混沌士兵”仪式召唤。②：此卡存在于墓地的情况下可以发动。从自己墓地将1张记载有“光与暗的仪式”卡名的卡和此卡加入手牌。
