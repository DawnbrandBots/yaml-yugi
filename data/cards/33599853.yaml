name:
  en: Light and Darkness Ritual
  de: Ritual von Licht und Finsternis
  es: Ritual de la Luz y la Oscuridad
  fr: Rituel de la Lumière et des Ténèbres
  it: Rituale di Luce e Oscurità
  pt: Ritual da Luz e das Trevas
  ja: <ruby>光<rt>ひかり</rt></ruby>と<ruby>闇<rt>やみ</rt></ruby>の<ruby>儀<rt>ぎ</rt></ruby><ruby>式<rt>しき</rt></ruby>
  ja_romaji: Hikari to Yami no Gishiki
  ko: 빛과 어둠의 의식
  ko_rr:
  zh-TW:
  zh-CN: 光与暗的仪式
text:
  en: |-
    This card can be used to Ritual Summon "Magician of Dark Chaos - Black Chaos" or "Black Luster Soldier - Soldier of Light and Darkness". You must also Tribute monsters from your hand or field, and/or banish monsters from your GY, whose total Levels equal or exceed its Level. If this card is in your GY: You can add this card and 1 card that mentions "Light and Darkness Ritual" from your GY to your hand. You can only use this effect of "Light and Darkness Ritual" once per turn.
  de: |-
    Diese Karte kann verwendet werden, um „Magier des dunklen Chaos - Schwarzes Chaos“ oder „Schwarz Glänzender Soldat - Soldat des Lichts und der Finsternis“ als Ritualbeschwörung zu beschwören. Du musst zusätzlich Monster von deiner Hand oder Spielfeldseite als Tribut anbieten und/oder Monster von deinem Friedhof verbannen, deren gemeinsame Stufe größer oder gleich seiner Stufe ist. Falls sich diese Karte in deinem Friedhof befindet: Du kannst deiner Hand diese Karte und 1 Karte, die „Ritual von Licht und Finsternis“ erwähnt, von deinem Friedhof hinzufügen. Du kannst diesen Effekt von „Ritual von Licht und Finsternis“ nur einmal pro Spielzug verwenden.
  es: |-
    Esta carta puede ser usada para Invocar por Ritual "Mago del Caos Oscuro - Caos Negro" o "Soldado del Brillo Negro - Soldado de la Luz y la Oscuridad". También debes Sacrificar monstruos en tu mano o Campo, y/o desterrar monstruos en tu Cementerio, cuyos Niveles totales sean iguales o superen su Nivel. Si esta carta está en tu Cementerio: puedes añadir a tu mano esta carta y 1 carta que mencione "Ritual de la Luz y la Oscuridad" en tu Cementerio. Sólo puedes usar este efecto de "Ritual de la Luz y la Oscuridad" una vez por turno.
  fr: |-
    Cette carte peut être utilisée pour Invoquer Rituellement "Magicien du Chaos des Ténèbres - Chaos Sombre" ou "Soldat du Lustre Noir - Soldat de la Lumière et des Ténèbres". Vous devez aussi Sacrifier des monstres depuis votre main ou Terrain, et/ou bannir des monstres depuis votre Cimetière, dont la somme des Niveaux est supérieure ou égale à son Niveau. Si cette carte est dans votre Cimetière : vous pouvez ajouter cette carte et 1 carte qui mentionne "Rituel de la Lumière et des Ténèbres" depuis votre Cimetière à votre main. Vous ne pouvez utiliser cet effet de "Rituel de la Lumière et des Ténèbres" qu'une fois par tour.
  it: |-
    Questa carta può essere utilizzata per Evocare tramite Rituale "Mago del Chaos Nero - Chaos Oscuro" o "Glorioso Soldato Nero - Soldato di Luce e Oscurità". Devi anche offrire come Tributo mostri dalla tua mano o Terreno, e/o bandire mostri dal tuo Cimitero, con Livello totale pari o superiore al suo Livello. Se questa carta è nel tuo Cimitero: puoi aggiungere questa carta e 1 carta che menziona "Rituale di Luce e Oscurità" dal tuo Cimitero alla tua mano. Puoi utilizzare questo effetto di "Rituale di Luce e Oscurità" una sola volta per turno.
  pt: |-
    Este card pode ser usado para Invocar por Invocação-Ritual "Mago do Caos Negro - Caos das Trevas" ou "Soldado do Lustro Negro - Soldado da Luz e das Trevas". Você também deve oferecer como Tributo monstros da sua mão ou do campo e/ou banir monstros do seu Cemitério, cuja soma dos Níveis seja igual ou exceda seu Nível. Se este card estiver no seu Cemitério: você pode adicionar este card e 1 card que mencione "Ritual da Luz e das Trevas" do seu Cemitério à sua mão. Você só pode usar este efeito de "Ritual da Luz e das Trevas" uma vez por turno.
  ja: |-
    このカード名の②の効果は１ターンに１度しか使用できない。①：レベルの合計が儀式召喚するモンスターのレベル以上になるように、自分の手札・フィールドのモンスターをリリース、またはリリースの代わりに自分の墓地のモンスターを除外し、手札から「黒き混沌の魔術師ブラック・カオス」か「光と闇の戦士カオス・ソルジャー」を儀式召喚する。②：このカードが墓地に存在する場合に発動できる。「光と闇の儀式」のカード名が記されたカード１枚とこのカードを自分の墓地から手札に加える。
  ko: |-
    이 카드명의 ②의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 레벨의 합계가 의식 소환할 몬스터의 레벨 이상이 되도록, 자신의 패 / 필드의 몬스터를 릴리스, 또는 릴리스 대신에 자신 묘지의 몬스터를 제외하고, 패에서 "검은 혼돈의 마술사 블랙 카오스"나 "빛과 어둠의 전사 카오스 솔저"를 의식 소환한다. ②: 이 카드가 묘지에 존재할 경우에 발동할 수 있다. "빛과 어둠의 의식"의 카드명이 쓰여진 카드 1장과 이 카드를 자신 묘지에서 패에 넣는다.
  zh-TW:
  zh-CN: |-
    此卡名的②效果1回合仅可使用1次。①：为使合计等级达到仪式召唤的怪兽的等级以上，解放自己手牌・场上的怪兽，或作为解放的代替将自己墓地的怪兽除外，从手牌将“黑色混元之魔术师 黑暗混沌”或“光与暗的战士 混沌士兵”仪式召唤。②：此卡存在于墓地的情况下可以发动。从自己墓地将1张记载有“光与暗的仪式”卡名的卡和此卡加入手牌。
