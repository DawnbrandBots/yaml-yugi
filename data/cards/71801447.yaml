text:
  en: |-
    After this card was flipped face-up, while it is in the Monster Zone, your opponent cannot activate cards or effects in response to their card or effect activation. When your opponent activates a card or effect as Chain Link 3 or higher (Quick Effect): You can change this face-down card to face-up Defense Position; negate the activation of your opponent's cards and effects activated before this card in this Chain, and if you do, destroy them. You can reveal this card in your hand; Special Summon 1 monster from your hand in face-down Defense Position. You cannot Special Summon the turn you activate this effect, except in face-down Defense Position.
  de: |-
    Nachdem diese Karte aufgedeckt wurde, solange sie in der Monsterzone liegt, kann dein Gegner weder Karten noch Effekte als Reaktion auf seine Karten- oder Effektaktivierung aktivieren. Wenn dein Gegner eine Karte oder einen Effekt als Kettenglied 3 oder höher aktiviert (Schnelleffekt): Du kannst diese verdeckte Karte in die offene Verteidigungsposition ändern; annulliere die Aktivierung der Karten und Effekte deines Gegners, die vor dieser Karte in dieser Kette aktiviert wurden und falls du dies tust, zerstöre sie. Du kannst diese Karte in deiner Hand vorzeigen; beschwöre 1 Monster als Spezialbeschwörung von deiner Hand in die verdeckte Verteidigungsposition. Du kannst in dem Spielzug, in dem du diesen Effekt aktivierst, keine Spezialbeschwörungen durchführen, außer in die verdeckte Verteidigungsposition.
  es: |-
    Después de que esta carta fuera volteada boca arriba, mientras está en la Zona de Monstruos, tu adversario no puede activar cartas o efectos en respuesta a la activación de su carta o efecto. Cuando tu adversario activa una carta o efecto como Eslabón de Cadena 3 o mayor (Efecto Rápido): puedes cambiar esta carta boca abajo a Posición de Defensa boca arriba; niega la activación de las cartas y efectos de tu adversario activados antes que esta carta en esta Cadena y, si lo haces, destrúyelos. Puedes mostrar esta carta en tu mano; Invoca 1 monstruo de Modo Especial desde tu mano en Posición de Defensa boca abajo. No puedes Invocar de Modo Especial el turno en el que actives este efecto, excepto en Posición de Defensa boca abajo.
  fr: |-
    Après que cette carte a été retournée face recto, tant qu'elle est dans la Zone Monstre, votre adversaire ne peut activer ni de cartes ni d'effets en réponse à l'activation de sa carte ou effet. Lorsque votre adversaire active une carte ou un effet en min. Maillon 3 de la Chaîne (Effet Rapide) : vous pouvez changer cette carte face verso en Position de Défense face recto ; annulez l'activation des cartes et effets de votre adversaire activés avant cette carte dans cette Chaîne, et si vous le faites, détruisez-les. Vous pouvez révéler cette carte dans votre main ; Invoquez Spécialement 1 monstre depuis votre main en Position de Défense face verso. Vous ne pouvez pas Invoquer Spécialement le tour où vous activez cet effet, sauf en Position de Défense face verso.
  it: |-
    Dopo che questa carta è stata scoperta, mentre è nella Zona Mostri, il tuo avversario non può attivare carte o effetti in risposta all'attivazione di una sua carta o effetto. Quando il tuo avversario attiva una carta o un effetto come Anello della Catena 3 o superiore (Effetto Rapido): puoi mettere scoperta in Posizione di Difesa questa carta coperta; annulla l'attivazione delle carte ed effetti del tuo avversario attivati prima di questa carta in questa Catena e, se lo fai, distruggili. Puoi rivelare questa carta nella tua mano; Evoca Specialmente 1 mostro dalla tua mano coperto in Posizione di Difesa. Non puoi Evocare Specialmente nel turno in cui attivi questo effetto, eccetto coperto in Posizione di Difesa.
  pt: |-
    Depois que este card foi virado com a face para cima, enquanto ele estiver na Zona de Monstros, seu oponente não pode ativar cards ou efeitos em resposta à ativação dos cards ou efeitos dele. Quando seu oponente ativar um card ou efeito como Elo de Corrente 3 ou mais (Efeito Rápido): você pode colocar este card que estiver com a face para baixo, com a face para cima em Posição de Defesa; negue a ativação dos cards e efeitos do seu oponente ativados antes deste card nesta Corrente e, se isso acontecer, destrua-os. Você pode revelar este card na sua mão; Invoque por Invocação-Especial 1 monstro da sua mão com a face para baixo em Posição de Defesa. Você não pode Invocar por Invocação-Especial no turno em que ativar este efeito, exceto com a face para baixo em Posição de Defesa.
  ja: |-
    ①：手札のこのカードを相手に見せて発動できる（この効果を発動するターン、自分は裏側守備表示でしかモンスターを特殊召喚できない）。手札からモンスター１体を裏側守備表示で特殊召喚する。②：相手がチェーン３以降にカードの効果を発動した時、裏側表示のこのカードを表側守備表示にして発動できる。この効果の発動時に積まれていたチェーン上の全ての相手の効果の発動を無効にし破壊する。③：リバースしたこのカードがモンスターゾーンに存在する限り、相手は自身のカードの効果の発動に対してカードの効果を発動できない。
  ko: |-
    ①: 패의 이 카드를 상대에게 보여주고 발동할 수 있다(이 효과를 발동하는 턴에, 자신은 뒷면 수비 표시로밖에 몬스터를 특수 소환할 수 없다). 패에서 몬스터 1장을 뒷면 수비 표시로 특수 소환한다. ②: 상대가 체인 3 이후에 카드 효과를 발동했을 때, 뒷면 표시의 이 카드를 앞면 수비 표시로 하고 발동할 수 있다. 이 효과의 발동시에 쌓여있던 체인 위의 모든 상대 효과의 발동을 무효로 하고 파괴한다. ③: 리버스한 이 카드가 몬스터 존에 존재하는 한, 상대는 자신의 카드 효과의 발동에 대하여 카드 효과를 발동할 수 없다.
  zh-TW:
  zh-CN: |-
    ①：向对手出示手牌的此卡可以发动（发动此效果的回合中，自己仅可以里侧守备表示特殊召唤怪兽）。从手牌将1只怪兽以里侧守备表示特殊召唤。②：对手在连锁3以后发动卡的效果时，将里侧表示的此卡改成表侧守备表示可以发动。将此效果发动时积累的连锁上的所有对手的效果的发动无效并破坏。③：只要反转的此卡存在于怪兽区域，对手不可应对自身的卡的效果的发动来发动卡的效果。
