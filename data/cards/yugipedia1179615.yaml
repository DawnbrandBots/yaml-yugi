text:
  en: |-
    When your opponent activates a monster effect on the field during their turn (Quick Effect): You can reveal this card in your hand; destroy that monster, and if you do, Special Summon 1 Thunder monster from your hand, also you cannot Special Summon Effect Monsters for the rest of this turn, except from the hand. If another card(s) is destroyed by card effect, while this card is in the Monster Zone (except during the Damage Step): You can send 1 "Blitzclique" Spell/Trap from your Deck to the GY. You can only use each effect of "Crack Blitzclique" once per turn.
