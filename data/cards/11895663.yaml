text:
  en: |-
    If this card is added to your hand, except by drawing it: You can reveal this card, then target 1 card on the field; destroy it, and if you do, Special Summon 1 Thunder monster from your hand, also for the rest of this turn, you cannot Special Summon Effect Monsters, except from the hand. If another card(s) is destroyed by card effect, while this card is in the Monster Zone (except during the Damage Step): You can add 1 "Blitzclique" Trap from your Deck to your hand. You can only use each effect of "Emi Blitzclique" once per turn.
  de: |-
    Falls diese Karte deiner Hand hinzugefügt wird, außer durch Ziehen: Du kannst diese Karte vorzeigen und dann 1 Karte auf dem Spielfeld wählen; zerstöre sie und falls du dies tust, beschwöre 1 Donner-Monster als Spezialbeschwörung von deiner Hand, zusätzlich kannst du für den Rest dieses Spielzugs keine Effektmonster als Spezialbeschwörung beschwören, außer von der Hand. Falls eine oder mehr andere Karten durch einen Karteneffekt zerstört werden, solange sich diese Karte in der Monsterzone befindet (außer während des Damage Steps): Du kannst deiner Hand 1 „Blitzclique“-Falle von deinem Deck hinzufügen. Du kannst jeden Effekt von „Ems Blitzclique“ nur einmal pro Spielzug verwenden.
  es: |-
    Si esta carta es añadida a tu mano, excepto robándola: puedes mostrar esta carta, y después selecciona 1 carta en el Campo; destrúyela y, si lo haces, Invoca de Modo Especial 1 monstruo Trueno desde tu mano, y además por el resto de este turno, no puedes Invocar de Modo Especial Monstruos de Efecto, excepto desde la mano. Si otra u otras cartas son destruidas por el efecto de una carta, mientras esta carta está en la Zona de Monstruos (excepto durante el Damage Step): puedes añadir a tu mano 1 Trampa "Blitzclique" en tu Deck. Sólo puedes usar cada efecto de "Emi Blitzclique" una vez por turno.
  fr: |-
    Si cette carte est ajoutée à votre main, sauf en la piochant : vous pouvez révéler cette carte, puis ciblez 1 carte sur le Terrain ; détruisez-la, et si vous le faites, Invoquez Spécialement 1 monstre Tonnerre depuis votre main, et aussi, vous ne pouvez pas Invoquer Spécialement de Monstres à Effet, sauf depuis la main, le reste de ce tour. Si une ou plusieurs autres cartes sont détruites par un effet de carte, tant que cette carte est dans la Zone Monstre (sauf durant la Damage Step) : vous pouvez ajouter 1 Piège "Blitzclique" depuis votre Deck à votre main. Vous ne pouvez utiliser chaque effet de "Émi Blitzclique" qu'une fois par tour.
  it: |-
    Se questa carta viene aggiunta alla tua mano, eccetto pescandola: puoi rivelare questa carta, poi scegliere come bersaglio 1 carta sul Terreno; distruggila e, se lo fai, Evoca Specialmente 1 mostro Tuono dalla tua mano, inoltre per il resto di questo turno, non puoi Evocare Specialmente Mostri con Effetto, eccetto dalla mano. Se una o più altre carte vengono distrutte dall'effetto di una carta, mentre questa carta è nella Zona Mostri (eccetto durante il Damage Step): puoi aggiungere 1 Trappola "Blitzclique" dal tuo Deck alla tua mano. Puoi utilizzare ogni effetto di "Emi Blitzclique" una sola volta per turno.
  pt: |-
    Se este card for adicionado à sua mão, exceto ao comprá-lo: você pode revelar este card e, depois, escolha 1 card no campo; destrua-o e, se isso acontecer, Invoque por Invocação-Especial 1 monstro Trovão da sua mão e, além disso, pelo resto deste turno, você não pode Invocar Monstros de Efeito por Invocação-Especial, exceto da mão. Se um ou mais outros cards forem destruídos por um efeito de card, enquanto este card estiver na Zona de Monstros (exceto durante a Etapa de Dano): você pode adicionar 1 Armadilha "Blitzclique" do seu Deck à sua mão. Você só pode usar cada efeito de "Emi Blitzclique" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードがドロー以外の方法で手札に加わった場合、このカードを相手に見せ、フィールドのカード１枚を対象として発動できる。そのカードを破壊し、手札から雷族モンスター１体を特殊召喚する。このターン、自分は手札からしか効果モンスターを特殊召喚できない。②：このカードがモンスターゾーンに存在する状態で、このカード以外のカードが効果で破壊された場合に発動できる。デッキから「ブリッツクリーク」罠カード１枚を手札に加える。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：用抽牌以外的方法将此卡加入手牌的情况下，将此卡出示给对手，以场上的1张卡为对象可以发动。将该卡破坏，从手牌将1只雷族怪兽特殊召唤。此回合，自己不可从手牌以外的地方特殊召唤效果怪兽。②：此卡存在于怪兽区域的状态下，此卡以外的卡因效果被破坏的情况下可以发动。从牌组将1张“雷盟”陷阱卡加入手牌。
