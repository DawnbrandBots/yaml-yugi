  en: |-
    If you control a monster with 0 ATK or DEF: You can Special Summon this card from your hand. You can reveal 3 Xyz Monsters with different Ranks in your Extra Deck, then target 1 other card on the field; destroy both it and this card. You can banish this card from your GY; detach 1 material from a monster you control, then you can Special Summon 1 monster with 0 ATK or DEF from your hand or GY. You can only use each effect of "Garbage Golem" once per turn.
