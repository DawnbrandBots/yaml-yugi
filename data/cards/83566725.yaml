text:
  en: |-
    If you control no monsters, you can Special Summon this card (from your hand). You can only Special Summon "The Phantom Knights of Doomed Solleret" once per turn this way. You can only use each of the following effects of "The Phantom Knights of Doomed Solleret" once per turn. If this card is Normal or Special Summoned: You can Set 1 "The Phantom Knights" Spell/Trap from your Deck. You can banish this card from your GY, then target up to 2 Level/Rank 3 DARK monsters you control; increase their Levels/Ranks by 1.
  de:
