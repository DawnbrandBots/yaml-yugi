  zh-CN: |-
    此卡名的卡1回合仅可发动1张。①：从自己手牌・牌组・墓地将1只通常怪兽以守备表示特殊召唤（从牌组特殊召唤的情况下必须是等级4以下）。自己场上存在通常怪兽卡的情况下，作为代替可从以下效果中挑选1个适用。
    ●将对手场上的怪兽全部破坏。
    ●将对手场上的魔法・陷阱卡全部破坏。
    ●自己抽2张。
    ●从自己或对手墓地将1只怪兽特殊召唤至自己场上。
