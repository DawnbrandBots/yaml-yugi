  de: Säbelloch
  es: Agujero del Sable
  fr: Ravin du Sabre
  it: Buco Sciabola
  pt: Buraco-Sabre
  ja: セイバー・ホール
  ja_romaji: Seibā Hōru
  ko: 세이버 홀
  ko_rr:
  zh-TW: 軍刀空洞
  zh-CN: 军刀空洞
text:
  en: |-
    When a monster(s) would be Summoned, while you control an "X-Saber" monster: Negate the Summon, and if you do, destroy that monster(s).
  de: |-
    Wenn ein oder mehr Monster beschworen würden, solange du ein „X-Säbel“-Monster kontrollierst: Annulliere die Beschwörung und falls du dies tust, zerstöre jene Monster.
  es: |-
    Cuando uno o más monstruos fueran a ser Invocados, mientras controles un monstruo "Sable-X": niega la Invocación y, si lo haces, destruye ese o esos monstruos.
  fr: |-
    Lorsqu'un ou plusieurs monstres vont être Invoqués, tant que vous contrôlez un monstre "Sabre X" : annulez l'Invocation, et si vous le faites, détruisez ces monstres.
  it: |-
    Quando uno o più mostri stanno per essere Evocati, mentre tu controlli un mostro "Sciabola-X": annulla l'Evocazione e, se lo fai, distruggi quei mostri.
  pt: |-
    Quando um ou mais monstros seriam Invocados, enquanto você controlar um monstro "Sabre-X": negue a Invocação e, se isso acontecer, destrua esse(s) monstro(s).
  ja: |-
    ①：自分フィールドに「Ｘ－セイバー」モンスターが存在し、自分か相手がモンスターを召喚・反転召喚・特殊召喚する際に発動できる。それを無効にし、そのモンスターを破壊する。
  ko: |-
    ①: 자신 필드에 "X－세이버" 몬스터가 존재하고, 자신 또는 상대가 몬스터를 일반 소환 / 반전 소환 / 특수 소환할 시기에 발동할 수 있다. 그것을 무효로 하고, 그 몬스터를 파괴한다.
  zh-TW:
  zh-CN: |-
    ①：自己场上存在“X－军刀”怪兽，且自己或对手召唤・反转召唤・特殊召唤怪兽之际可以发动。将其无效，将该怪兽破坏。
