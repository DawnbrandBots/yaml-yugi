name:
  en: Sacred Spirit Sword Aiwass
  de: Heiliges Geisterschwert Aiwass
  es: Espada Aiwass Espíritu Sagrado
  fr: Épée de l'Esprit Sacré Aiwass
  it: Aiwass Spada Spirito Sacro
  pt: Espada do Espírito Sagrado Aiwass
  ja: <ruby>神<rt>しん</rt></ruby><ruby>霊<rt>れい</rt></ruby><ruby>剣<rt>けん</rt></ruby>アイワス
  ja_romaji: Shinreiken Aiwasu
