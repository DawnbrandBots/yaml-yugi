text:
  en: |-
    This card's name becomes "Umi" while in the Monster Zone. You can only use each of the following effects of "Fiendish Vortex of Atlantis" once per turn. If this card is Normal or Special Summoned: You can send 1 card that mentions "Atlantis, City of the Sea Dragon" from your Deck to the GY, except "Fiendish Vortex of Atlantis". If this card is sent to the GY and you control "Umi": You can Special Summon 1 WATER monster from your hand.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが召喚・特殊召喚した場合に発動できる。「アトランティスの妖渦」を除く、「竜都アトランティス」のカード名が記されたカード１枚をデッキから墓地へ送る。②：このカードはモンスターゾーンに存在する限り、カード名を「海」として扱う。③：このカードが墓地へ送られた場合、自分フィールドに「海」が存在していれば発動できる。手札から水属性モンスター１体を特殊召喚する。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①③效果1回合仅可各使用1次。①：此卡召唤・特殊召唤的情况下可以发动。从牌组将除“亚特兰蒂斯的妖涡”以外的、1张记载有“龙都 亚特兰蒂斯”卡名的卡送至墓地。②：此卡只要存在于怪兽区域，卡名视为“海”。③：此卡被送至墓地的情况下，如果自己场上存在“海”则可以发动。从手牌将1只水属性怪兽特殊召唤。
