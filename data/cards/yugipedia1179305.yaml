text:
  en: |-
    If this card is Normal or Special Summoned: You can place 1 "Sacred Beast" Field Spell or "Sacred Beast" Continuous Spell/Trap from your Deck face-up on your field. If you control another "Sacred Beast" monster: You can Special Summon 2 "Martyr of the Sacred Beasts" from your hand, Deck, and/or GY. During your opponent's End Phase, if this card and a Level 10 "Sacred Beast" monster are in your GY: You can add this card to your hand. You can only use each effect of "Martyr of the Sacred Beasts" once per turn.
