name:
  en: Hecahands Bait
  de: Hekahände-Köder
  es: Cebo Hecamanos
  fr: Appât d'Hécamains
  it: Esca Hecamani
  pt: Isca de Hecamãos
  ja: <ruby>見えざる導き手<rt>バイト・アル・ヘカトンケイル</rt></ruby>
  ja_romaji: Baito Aru Hekatonkeiru
  ko: 바이트 알 헤카톤케일
  ko_rr:
  zh-TW: 百臂無形引導手
  zh-CN: 百臂无形引导手
text:
  en: |-
    You can Tribute 1 "Hecahands" monster, or 1 monster you control that is owned by your opponent; take control of 1 monster your opponent controls. You can only use this effect of "Hecahands Bait" once per turn. Once per turn, during your End Phase: Send 1 card you control to the GY.
  de: |-
    Du kannst 1 „Hekahände“-Monster oder 1 Monster, das du kontrollierst und das dein Gegner besitzt, als Tribut anbieten; übernimm die Kontrolle über 1 Monster, das dein Gegner kontrolliert. Du kannst diesen Effekt von „Hekahände-Köder“ nur einmal pro Spielzug verwenden. Einmal pro Spielzug, während deiner End Phase: Lege 1 Karte, die du kontrollierst, auf den Friedhof.
  es: |-
    Puedes Sacrificar 1 monstruo "Hecamanos" o 1 monstruo que controles que sea propiedad de tu adversario; toma el control de 1 monstruo que controle tu adversario. Sólo puedes usar este efecto de "Cebo Hecamanos" una vez por turno. Una vez por turno, durante tu End Phase: manda al Cementerio 1 carta que controles.
  fr: |-
    Vous pouvez Sacrifier 1 monstre "Hécamains", ou 1 monstre que vous contrôlez dont le propriétaire est votre adversaire ; prenez le contrôle d'1 monstre contrôlé par votre adversaire. Vous ne pouvez utiliser cet effet de "Appât d'Hécamains" qu'une fois par tour. Une fois par tour, durant votre End Phase : envoyez 1 carte que vous contrôlez au Cimetière.
  it: |-
    Puoi offrire come Tributo 1 mostro "Hecamani", o 1 mostro che controlli di proprietà del tuo avversario; prendi il controllo di 1 mostro controllato dal tuo avversario. Puoi utilizzare questo effetto di "Esca Hecamani" una sola volta per turno. Una volta per turno, durante la tua End Phase: manda 1 carta che controlli al Cimitero.
  pt: |-
    Você pode oferecer como Tributo 1 monstro "Hecamãos", ou 1 monstro que você controla do qual seu oponente seja dono; tome o controle de 1 monstro que seu oponente controla. Você só pode usar este efeito de "Isca de Hecamãos" uma vez por turno. Uma vez por turno, durante sua Fase Final: envie 1 card que você controla para o Cemitério.
  ja: |-
    このカード名の①の効果は１ターンに１度しか使用できない。①：自分フィールドの、「ヘカトンケイル」モンスターまたは元々の持ち主が相手であるモンスター１体をリリースして発動できる。相手フィールドのモンスター１体のコントロールを得る。②：自分エンドフェイズに発動する。自分フィールドのカード１枚を墓地へ送る。
  ko: |-
    이 카드명의 ①의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 자신 필드의, "헤카톤케일" 몬스터 또는 원래의 주인이 상대인 몬스터 1장을 릴리스하고 발동할 수 있다. 상대 필드의 몬스터 1장의 컨트롤을 얻는다. ②: 자신 엔드 페이즈에 발동한다. 자신 필드의 카드 1장을 묘지로 보낸다.
  zh-TW:
  zh-CN: |-
    此卡名的①效果1回合仅可使用1次。①：解放自己场上的1只“百臂无形”怪兽或原本持有者为对手的怪兽可以发动。获得对手场上的1只怪兽的控制权。②：在自己的结束阶段发动。将自己场上的1张卡送至墓地。
