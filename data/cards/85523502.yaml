text:
  en: |-
    During the turn a card(s) was destroyed by your "Blitzclique" card effect (Quick Effect): You can reveal this card in your hand; Special Summon up to 3 Thunder monsters from your hand, then you can destroy up to that many cards on the field, also for the rest of this turn, you cannot Special Summon Effect Monsters, except from the hand. When a monster effect is activated, except in the hand (Quick Effect): You can return 1 other Thunder monster you control to the hand; negate the activation, and if you do, destroy that monster. You can only use each effect of "Whisker Blitzclique" once per turn.
  de: |-
    Während des Spielzugs, in dem eine oder mehr Karten durch deinen „Blitzclique“-Karteneffekt zerstört wurden (Schnelleffekt): Du kannst diese Karte in deiner Hand vorzeigen; beschwöre bis zu 3 Donner-Monster als Spezialbeschwörung von deiner Hand, dann kannst du bis zu ebenso viele Karten auf dem Spielfeld zerstören, zusätzlich kannst du für den Rest dieses Spielzugs keine Effektmonster als Spezialbeschwörung beschwören, außer von der Hand. Wenn ein Monstereffekt aktiviert wird, außer in der Hand (Schnelleffekt): Du kannst 1 anderes Donner-Monster, das du kontrollierst, auf die Hand zurückgeben; annulliere die Aktivierung und falls du dies tust, zerstöre jenes Monster. Du kannst jeden Effekt von „Whisker Blitzclique“ nur einmal pro Spielzug verwenden.
  es: |-
    Durante el turno en el que una o más cartas fueron destruidas por el efecto de tu carta "Blitzclique" (Efecto Rápido): puedes mostrar esta carta en tu mano; Invoca de Modo Especial hasta 3 monstruos Trueno desde tu mano, y después puedes destruir hasta ese número de cartas en el Campo, y además por el resto de este turno, no puedes Invocar de Modo Especial Monstruos de Efecto, excepto desde la mano. Cuando es activado el efecto de un monstruo, excepto en la mano (Efecto Rápido): puedes devolver a la mano otro monstruo Trueno que controles; niega la activación y, si lo haces, destruye ese monstruo. Sólo puedes usar cada efecto de "Barba Blitzclique" una vez por turno.
  fr: |-
    Durant le tour où une ou plusieurs cartes ont été détruites par votre effet de carte "Blitzclique" (Effet Rapide) : vous pouvez révéler cette carte dans votre main ; Invoquez Spécialement max. 3 monstres Tonnerre depuis votre main, puis vous pouvez détruire max. autant de cartes sur le Terrain, et aussi, vous ne pouvez pas Invoquer Spécialement de Monstres à Effet, sauf depuis la main, le reste de ce tour. Lorsqu'un effet de monstre est activé, sauf dans la main (Effet Rapide) : vous pouvez renvoyer 1 autre monstre Tonnerre que vous contrôlez à la main ; annulez l'activation, et si vous le faites, détruisez le monstre. Vous ne pouvez utiliser chaque effet de "Whisker Blitzclique" qu'une fois par tour.
  it: |-
    Durante il turno in cui una o più carte sono state distrutte dall'effetto di una tua carta "Blitzclique" (Effetto Rapido): puoi rivelare questa carta nella tua mano; Evoca Specialmente fino a 3 mostri Tuono dalla tua mano, poi puoi distruggere fino a quel numero di carte sul Terreno, inoltre per il resto di questo turno, non puoi Evocare Specialmente Mostri con Effetto, eccetto dalla mano. Quando viene attivato l'effetto di un mostro, eccetto nella mano (Effetto Rapido): puoi far ritornare 1 altro mostro Tuono che controlli nella mano; annulla l'attivazione e, se lo fai, distruggi quel mostro. Puoi utilizzare ogni effetto di "Whisker Blitzclique" una sola volta per turno.
  pt: |-
    Durante o turno em que um ou mais cards foram destruídos por um efeito de card "Blitzclique" seu (Efeito Rápido): você pode revelar este card na sua mão; Invoque por Invocação-Especial até 3 monstros Trovão da sua mão e, depois, você pode destruir até esse número de cards no campo e, além disso, pelo resto deste turno, você não pode Invocar Monstros de Efeito por Invocação-Especial, exceto da mão. Quando um efeito de monstro for ativado, exceto na mão (Efeito Rápido): você pode devolver para a mão 1 outro monstro Trovão que você controla; negue a ativação e, se isso acontecer, destrua esse monstro. Você só pode usar cada efeito de "Whisker Blitzclique" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分の「ブリッツクリーク」カードの効果でカードを破壊した自分・相手ターンに、手札のこのカードを相手に見せて発動できる。手札から雷族モンスターを３体まで特殊召喚する。その後、その数までフィールドのカードを破壊できる。このターン、自分は手札からしか効果モンスターを特殊召喚できない。②：手札以外でモンスターの効果が発動した時、自分フィールドの他の雷族モンスター１体を手札に戻して発動できる。その発動を無効にし破壊する。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：在以自己的“雷盟”卡的效果破坏了卡的、自己・对手回合中，向对手出示手牌的此卡可以发动。从手牌将最多3只雷族怪兽特殊召唤。然后，可以其数量为上限，将场上的卡破坏。此回合，自己不可从手牌以外的地方特殊召唤效果怪兽。②：怪兽的效果在手牌以外发动时，将自己场上的1只其他的雷族怪兽放回手牌可以发动。将该发动无效并破坏。
