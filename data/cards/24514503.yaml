text:
  en: |-
    Cannot be destroyed by card effects. You can only use each of the following effects of "Soulicer Crystal" once per turn. If your opponent controls at least 2 more monsters than you do: You can Special Summon this card from your hand. You can target 1 Effect Monster your opponent controls; negate its effects.
  de: |-
    Kann nicht durch Karteneffekte zerstört werden. Du kannst jeden der folgenden Effekte von „Seelengefrier-Kristall“ nur einmal pro Spielzug verwenden. Falls dein Gegner mindestens 2 Monster mehr als du kontrolliert: Du kannst diese Karte als Spezialbeschwörung von deiner Hand beschwören. Du kannst 1 Effektmonster wählen, das dein Gegner kontrolliert; annulliere seine Effekte.
  es: |-
    No puede ser destruido por efectos de cartas. Sólo puedes usar cada uno de los siguientes efectos de "Cristal Hielalmas" una vez por turno. Si tu adversario controla al menos 2 monstruos más que tú: puedes Invocar esta carta de Modo Especial desde tu mano. Puedes seleccionar 1 Monstruo de Efecto que controle tu adversario; niega sus efectos.
  fr: |-
    Non destructible par des effets de carte. Vous ne pouvez utiliser chacun des effets suivants de "Cristal Glaçâme" qu'une fois par tour. Si votre adversaire contrôle min. 2 monstres de plus que vous : vous pouvez Invoquer Spécialement cette carte depuis votre main. Vous pouvez cibler 1 Monstre à Effet contrôlé par votre adversaire ; annulez ses effets.
  it: |-
    Non può essere distrutto dagli effetti delle carte. Puoi utilizzare ognuno dei seguenti effetti di "Cristallo Gelanima" una sola volta per turno. Se il tuo avversario controlla almeno 2 mostri più di te: puoi Evocare Specialmente questa carta dalla tua mano. Puoi scegliere come bersaglio 1 Mostro con Effetto controllato dal tuo avversario; annulla i suoi effetti.
  pt: |-
    Não pode ser destruído por efeitos de card. Você só pode usar cada um dos seguintes efeitos de "Cristal Congelalma" uma vez por turno. Se seu oponente controlar pelo menos 2 monstros a mais que você: você pode Invocar este card por Invocação-Especial da sua mão. Você pode escolher 1 Monstro de Efeito que seu oponente controla; negue seus efeitos.
  ja: |-
    このカード名の①③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが手札に存在し、自分フィールドのモンスターの数が相手フィールドのモンスターより２体以上少ない場合に発動できる。このカードを特殊召喚する。②：フィールドのこのカードは効果では破壊されない。③：相手フィールドの効果モンスター１体を対象として発動できる。そのモンスターの効果を無効にする。
  ko: |-
    이 카드명의 ①③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신 필드의 몬스터의 수가 상대 필드의 몬스터보다 2장 이상 적을 경우에 발동할 수 있다. 이 카드를 패에서 특수 소환한다. ②: 필드의 이 카드는 효과로는 파괴되지 않는다. ③: 상대 필드의 효과 몬스터 1장을 대상으로 하고 발동할 수 있다. 그 몬스터의 효과를 무효로 한다.
