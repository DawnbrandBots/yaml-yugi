text:
  en: |-
    1 "Predaplant" monster + 1 Level 1 monster
    Must first be either Fusion Summoned, or Special Summoned (from your Extra Deck) by Tributing 1 monster on either field with a Predator Counter and 1 "Predaplant" monster. During the Main Phase, if this card was Special Summoned this turn (Quick Effect): You can target Spells/Traps on the field, up to the number of monsters with a Predator Counter; destroy them. You can only use this effect of "Predaplant Daredevil" once per turn.
  de:
  es:
