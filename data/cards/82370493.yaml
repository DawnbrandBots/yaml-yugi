  ja: |-
    「捕食植物」モンスター＋レベル１モンスター
    このカードは融合召喚及び以下の方法でのみＥＸデッキから特殊召喚できる。●自分フィールドの「捕食植物」モンスター１体と自分か相手のフィールドの捕食カウンターが置かれているモンスター１体をリリースした場合に特殊召喚できる。このカード名の効果は１ターンに１度しか使用できない。①：このカードが特殊召喚した自分・相手ターンのメインフェイズに、捕食カウンターが置かれているモンスターの数まで、フィールドの魔法・罠カードを対象として発動できる。そのカードを破壊する。
  ko:
  zh-TW:
  zh-CN: |-
    “捕食植物”怪兽＋等级1怪兽
    此卡从额外牌组仅可通过融合召唤及以下方法特殊召唤。●解放自己场上的1只“捕食植物”怪兽和自己或对手场上1只放有捕食计数物的怪兽的情况下可以特殊召唤。此卡名的效果1回合仅可使用1次。①：在此卡特殊召唤的自己・对手回合的主要阶段，以放有捕食计数物的怪兽数量为上限，以场上的魔法・陷阱卡为对象可以发动。将该卡破坏。
