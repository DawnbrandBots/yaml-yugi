name:
  en: Illusion Gate
  de: Illusionstor
  es: Puerta de las Ilusiones
  fr: Porte des Illusions
  it: Cancello Illusione
  pt: Portão da Ilusão
  ja: <ruby>幻<rt>げん</rt></ruby><ruby>魔<rt>ま</rt></ruby>の<ruby>扉<rt>とびら</rt></ruby>
  ja_romaji: Genma no Tobira
  ko: 환마의 문
  ko_rr:
  zh-TW:
  zh-CN: 幻魔之扉
text:
  en: |-
    Pay half your LP; destroy as many monsters your opponent controls as possible, then you can Special Summon 1 monster from your opponent's GY to your field, ignoring its Summoning conditions. You can only apply this effect of "Illusion Gate" once per Duel.
  de: |-
    Zahle die Hälfte deiner LP; zerstöre so viele Monster, die dein Gegner kontrolliert, wie möglich, dann kannst du 1 Monster als Spezialbeschwörung vom Friedhof deines Gegners auf deine Spielfeldseite beschwören, ungeachtet seiner Beschwörungsbedingungen. Du kannst diesen Effekt von „Illusionstor“ nur einmal pro Duell verwenden.
  es: |-
    Paga la mitad de tus LP; destruye tantos monstruos que controle tu adversario como sea posible, y después puedes Invocar de Modo Especial 1 monstruo desde el Cementerio de tu adversario a tu Campo, ignorando sus condiciones de Invocación. Sólo puedes aplicar este efecto de "Puerta de las Ilusiones" una vez por Duelo.
  fr: |-
    Payez la moitié de vos LP ; détruisez autant de monstres contrôlés par votre adversaire que possible, puis vous pouvez Invoquer Spécialement 1 monstre depuis le Cimetière de votre adversaire sur votre Terrain, en ignorant ses conditions d'Invocation. Vous ne pouvez appliquer cet effet de "Porte des Illusions" qu'une fois par Duel.
  it: |-
    Paga la metà dei tuoi LP; distruggi tanti mostri controllati dal tuo avversario quanti possibile, poi puoi Evocare Specialmente 1 mostro dal Cimitero del tuo avversario sul tuo Terreno, ignorando le sue condizioni di Evocazione. Puoi applicare questo effetto di "Cancello Illusione" una sola volta per Duello.
  pt: |-
    Pague metade dos seus PV; destrua tantos monstros que seu oponente controla quanto possível e, depois, você pode Invocar por Invocação-Especial 1 monstro do Cemitério do seu oponente no seu campo, ignorando suas condições de Invocação. Você só pode aplicar este efeito de "Portão da Ilusão" uma vez por Duelo.
  ja: |-
    このカード名の効果はデュエル中に１度しか適用できない。①：ＬＰを半分払って発動できる。相手フィールドのモンスターを全て破壊する。その後、相手の墓地からモンスター１体を召喚条件を無視して自分フィールドに特殊召喚できる。
  ko: |-
    이 카드명의 효과는 듀얼 중에 1번밖에 적용할 수 없다. ①: LP를 절반 지불하고 발동할 수 있다. 상대 필드의 몬스터를 전부 파괴한다. 그 후, 상대 묘지에서 몬스터 1장을 소환 조건을 무시하고 자신 필드에 특수 소환할 수 있다.
  zh-TW:
  zh-CN: |-
    此卡名的效果在决斗中仅可适用1次。①：支付一半LP可以发动。将对手场上的怪兽全部破坏。然后，可从对手墓地将1只怪兽无视召唤条件特殊召唤至自己场上。
