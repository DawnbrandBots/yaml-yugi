  fr: Mercurium le Mercure Vivant
  it: Mercurium il Mercurio Vivente
  pt: Mercurium, o Mercúrio Vivo
  ja: <ruby>生<rt>せい</rt></ruby><ruby>命<rt>めい</rt></ruby>の<ruby>汞<rt>みずがね</rt></ruby> メルクリウム
