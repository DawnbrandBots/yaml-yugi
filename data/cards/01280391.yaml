text:
  en: |-
    This card's name becomes "Umi" while in the Spell & Trap Zone. You can only use each of the following effects of "Advent of Atlantis" once per turn. During your Main Phase: You can place 1 "Atlantis, City of the Sea Dragon" or "Umi" from your Deck face-up in your Field Zone. If this card is sent to the GY: You can add 1 Level 7 Sea Serpent monster from your Deck to your hand.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の②③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードは魔法＆罠ゾーンに存在する限り、カード名を「海」として扱う。②：自分メインフェイズに発動できる。デッキから「竜都アトランティス」か「海」１枚を自分のフィールドゾーンに表側表示で置く。③：このカードが墓地へ送られた場合に発動できる。デッキから海竜族・レベル７モンスター１体を手札に加える。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的②③效果1回合仅可各使用1次。①：此卡只要存在于魔法与陷阱区域，卡名视为“海”。②：在自己的主要阶段可以发动。从牌组将1张“龙都 亚特兰蒂斯”或“海”以表侧表示放在自己的场地区域。③：此卡被送至墓地的情况下可以发动。从牌组将1只海龙族・等级7怪兽加入手牌。
