name:
  en: Saber Combination
  de: Säbelkombination
  es: Combinación de Sables
  fr: Combinaison de Sabre
  it: Combinazione Sciabola
  pt: Combinação do Sabre
  ja: セイバー・コンビネーション
  ja_romaji: Seibā Konbinēshon
  ko: 세이버 콤비네이션
  ko_rr:
  zh-TW: 軍刀合擊
  zh-CN: 军刀合击
text:
  en: |-
    While 10 or more "X-Saber" monsters are in your field, GY, and/or banishment, "X-Saber" monsters you control gain ATK equal to their original DEF. You can only use each of the following effects of "Saber Combination" once per turn. If you Special Summon an "X-Saber" monster(s) from the Extra Deck (except during the Damage Step): You can Special Summon 1 "X-Saber" monster from your hand or Deck. When an opponent's monster declares an attack: You can Special Summon 1 "X-Saber" monster from your hand.
  de: |-
    Solange sich 10 oder mehr „X-Säbel“-Monster auf deiner Spielfeldseite, in deinem Friedhof und/oder unter deinen verbannten Karten befinden, erhalten „X-Säbel“-Monster, die du kontrollierst, ATK in Höhe ihrer Grund-DEF. Du kannst jeden der folgenden Effekte von „Säbelkombination“ nur einmal pro Spielzug verwenden. Falls du ein oder mehr „X-Säbel“-Monster als Spezialbeschwörung vom Extra Deck beschwörst (außer während des Damage Steps): Du kannst 1 „X-Säbel“-Monster als Spezialbeschwörung von deiner Hand oder deinem Deck beschwören. Wenn ein Monster eines Gegners einen Angriff deklariert: Du kannst 1 „X-Säbel“-Monster als Spezialbeschwörung von deiner Hand beschwören.
  es: |-
    Mientras 10 o más monstruos "Sable-X" estén en tu Campo, Cementerio y/o destierro, los monstruos "Sable-X" que controles ganan ATK igual a su DEF original. Sólo puedes usar cada uno de los siguientes efectos de "Combinación de Sables" una vez por turno. Si Invocas uno o más monstruos "Sable-X" de Modo Especial desde el Deck Extra (excepto durante el Damage Step): puedes Invocar de Modo Especial, desde tu mano o Deck, 1 monstruo "Sable-X". Cuando un monstruo del adversario declara un ataque: puedes Invocar de Modo Especial, desde tu mano, 1 monstruo "Sable-X".
  fr: |-
    Tant que min. 10 monstres "Sabre X" sont dans votre Terrain, Cimetière et/ou bannissement, les monstres "Sabre X" que vous contrôlez gagnent une ATK égale à leur DEF d'origine. Vous ne pouvez utiliser chacun des effets suivants de "Combinaison de Sabre" qu'une fois par tour. Si vous Invoquez Spécialement un ou plusieurs monstres "Sabre X" depuis l'Extra Deck (sauf durant la Damage Step) : vous pouvez Invoquer Spécialement 1 monstre "Sabre X" depuis votre main ou Deck. Lorsqu'un monstre de l'adversaire déclare une attaque : vous pouvez Invoquer Spécialement 1 monstre "Sabre X" depuis votre main.
  it: |-
    Mentre ci sono 10 o più mostri "Sciabola-X" nel tuo Terreno, Cimitero e/o carte bandite, i mostri "Sciabola-X" che controlli guadagnano ATK pari al loro DEF originale. Puoi utilizzare ognuno dei seguenti effetti di "Combinazione Sciabola" una sola volta per turno. Se Evochi Specialmente uno o più mostri "Sciabola-X" dall'Extra Deck (eccetto durante il Damage Step): puoi Evocare Specialmente 1 mostro "Sciabola-X" dalla tua mano o Deck. Quando un mostro dell'avversario dichiara un attacco: puoi Evocare Specialmente 1 mostro "Sciabola-X" dalla tua mano.
  pt: |-
    Enquanto 10 ou mais monstros "Sabre-X" estiverem no seu campo, Cemitério e/ou banimento, monstros "Sabre-X" que você controla ganham ATK igual à sua DEF original. Você só pode usar cada um dos seguintes efeitos de "Combinação do Sabre" uma vez por turno. Se você Invocar por Invocação-Especial um ou mais monstros "Sabre-X" do Deck Adicional (exceto durante a Etapa de Dano): você pode Invocar por Invocação-Especial 1 monstro "Sabre-X" da sua mão ou do Deck. Quando um monstro do oponente declarar um ataque: você pode Invocar por Invocação-Especial 1 monstro "Sabre-X" da sua mão.
  ja: |-
    このカード名の②③の効果はそれぞれ１ターンに１度しか使用できない。①：自分のフィールド・墓地・除外状態の「Ｘ－セイバー」モンスターが１０体以上である限り、自分フィールドの「Ｘ－セイバー」モンスターの攻撃力は、自身の元々の守備力分アップする。②：自分がＥＸデッキから「Ｘ－セイバー」モンスターを特殊召喚した場合に発動できる。手札・デッキから「Ｘ－セイバー」モンスター１体を特殊召喚する。③：相手モンスターの攻撃宣言時に発動できる。手札から「Ｘ－セイバー」モンスター１体を特殊召喚する。
  ko: |-
    이 카드명의 ②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신의 필드 / 묘지 / 제외 상태인 "X－세이버" 몬스터가 10장 이상인 한, 자신 필드의 "X－세이버" 몬스터의 공격력은, 자신의 원래 수비력만큼 올린다. ②: 자신이 엑스트라 덱에서 "X－세이버" 몬스터를 특수 소환했을 경우에 발동할 수 있다. 패 / 덱에서 "X－세이버" 몬스터 1장을 특수 소환한다. ③: 상대 몬스터의 공격 선언시에 발동할 수 있다. 패에서 "X－세이버" 몬스터 1장을 특수 소환한다.
  zh-TW:
  zh-CN: |-
    此卡名的②③效果1回合仅可各使用1次。①：只要自己场上・墓地・除外状态的“X－军刀”怪兽为10只以上，自己场上的“X－军刀”怪兽的攻击力就上升相当于自身原本守备力的数值。②：自己从额外牌组将“X－军刀”怪兽特殊召唤的情况下可以发动。从手牌・牌组将1只“X－军刀”怪兽特殊召唤。③：对手怪兽攻击宣言时可以发动。从手牌将1只“X－军刀”怪兽特殊召唤。
