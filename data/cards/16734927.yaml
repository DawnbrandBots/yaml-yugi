  zh-CN: |-
    此卡名的卡1回合仅可发动1张。①：可从以下效果中选择1个发动。
    ●自己场上不存在怪兽的情况下可以发动。从牌组将1只不死族・等级6怪兽或1张“活尸的呼唤”加入手牌。
    ●自己场上所有的不死族怪兽的攻击力上升400。然后，自己可依自己场上的“活死人的呼唤”的数量抽牌。
