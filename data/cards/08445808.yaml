name:
  en: Maiden in Love
  de: Verliebte Jungfer
  es: Doncella Enamorada
  fr: Jeune Fille Amoureuse
  it: Fanciulla Innamorata
  pt: Donzela Apaixonada
  ja: <ruby>恋<rt>こい</rt></ruby>する<ruby>乙女<rt>おとめ</rt></ruby>
  ja_romaji: Koisuru Otome
