text:
  en: |-
    This card can be used to Ritual Summon "Black Chaos the Dark Chaos Magician" or "Black Luster Soldier - Soldier of Light and Darkness". You must also Tribute monsters from your hand or field and/or banish monsters from your GY, whose total Levels equal or exceed the Level of the monster you Ritual Summon. If this card is in your GY: You can add both it and 1 other card that mentions "Ritual of Light and Darkness" from your GY to your hand. You can only use this effect of "Ritual of Light and Darkness" once per turn.
