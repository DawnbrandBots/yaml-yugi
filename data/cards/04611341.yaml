text:
  en: |-
    2+ monsters, including an "S-Force" monster
    While your opponent controls a monster in this card's column, they cannot target this card with card effects, nor Special Summon by an activated monster effect. (Quick Effect): You can target 1 monster on the field; move it to another Main Monster Zone on its controller's field. You can only use this effect of "S-Force Mystify" once per turn.
  de: |-
    2+ Monster, darunter ein „S-Kraft“-Monster
    Solange dein Gegner ein Monster in der Spalte dieser Karte kontrolliert, kann er weder diese Karte als Ziel für Karteneffekte wählen noch Spezialbeschwörungen durch einen aktivierten Monstereffekt durchführen. (Schnelleffekt): Du kannst 1 Monster auf dem Spielfeld wählen; bewege es in eine andere Main-Monsterzone auf der Spielfeldseite seines Beherrschers. Du kannst diesen Effekt von „S-Kraft Mystify“ nur einmal pro Spielzug verwenden.
  es: |-
    2+ monstruos, incluyendo un monstruo "Fuerza-S"
    Mientras tu adversario controle un monstruo en la columna de esta carta, no puede seleccionar esta carta con efectos de cartas, ni Invocar de Modo Especial por un efecto de monstruo activado. (Efecto Rápido): puedes seleccionar 1 monstruo en el Campo; muévelo a otra Zona de Monstruos Principal en el Campo de su controlador. Sólo puedes usar este efecto de "Fuerza-S Mystify" una vez por turno.
  fr: |-
    2+ monstres (un monstre "Force-S" inclus)
    Tant que votre adversaire contrôle un monstre dans la colonne de cette carte, il ne peut ni cibler cette carte avec des effets de carte ni Invoquer Spécialement par un effet de monstre activé. (Effet Rapide) : vous pouvez cibler 1 monstre sur le Terrain ; déplacez-le dans une autre Zone Monstre Main sur le Terrain de son contrôleur. Vous ne pouvez utiliser cet effet de "Mystify de la Force-S" qu'une fois par tour.
  it: |-
    2+ mostri, compreso un mostro "S-Forza"
    Mentre il tuo avversario controlla un mostro nella colonna di questa carta, non può scegliere questa carta come bersaglio con gli effetti delle carte, né Evocare Specialmente con l'effetto attivato di un mostro. (Effetto Rapido): puoi scegliere come bersaglio 1 mostro sul Terreno; spostalo in un'altra Zona Mostri Main sul Terreno del suo controllore. Puoi utilizzare questo effetto di "S-Forza Mystify" una sola volta per turno.
  pt: |-
    2+ monstros, incluindo um monstro "Força-S"
    Enquanto seu oponente controlar um monstro na coluna deste card, ele não pode escolher este card como alvo de efeitos de card, nem Invocar por Invocação-Especial com um efeito de monstro ativado. (Efeito Rápido): você pode escolher 1 monstro no campo; mova-o para outra Zona de Monstros Principal no campo do seu controlador. Você só pode usar este efeito de "Força-S Mistify" uma vez por turno.
  ja: |-
    「Ｓ－Ｆｏｒｃｅ」モンスターを含むモンスター２体以上
    このカード名の②の効果は１ターンに１度しか使用できない。①：このカードの正面に相手モンスターが存在する限り、相手は、このカードを効果の対象にできず、モンスターが発動した効果でモンスターを特殊召喚できない。②：自分・相手ターンに、フィールドのモンスター１体を対象として発動できる。そのモンスターの位置をそのコントローラーの他のメインモンスターゾーンに移動する。
  ko:
  zh-TW:
  zh-CN: |-
    包含“超元特防队”怪兽在内的怪兽2只以上
    此卡名的②效果1回合仅可使用1次。①：只要此卡的正面存在对手怪兽，对手不可将此卡作为效果的对象，也不可通过怪兽发动的效果来特殊召唤怪兽。②：在自己・对手回合中，以场上的1只怪兽为对象可以发动。将该怪兽的位置移动至其控制者的其他主要怪兽区域。
