text:
  en: |-
    You can Tribute this card and reveal 1 Machine monster in your hand; add 1 Machine monster from your Deck to your hand with a different Attribute than the revealed monster, then if you added a monster with 1200 or less ATK, you can Special Summon 1 Machine monster from your hand. If a monster(s) in your possession is destroyed by card effect, while this card is in your GY: You can banish this card; destroy 1 card on the field. You can only use each effect of "Gray Layer" once per turn.
