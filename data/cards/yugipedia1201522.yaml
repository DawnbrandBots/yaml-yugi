  en: |-
    If this card is Special Summoned by an "Adamancipator" card's effect: You can add 1 "Adamancipator" card from your Deck to your hand, except "Adamancipator Crystal - Tiamite", then you can Special Summon 1 Rock monster from your hand. If this card is in your GY: You can target 1 Rock Synchro Monster in your field or GY; return it to the Extra Deck, and if you do, place this card on top of the Deck. You can only use each effect of "Adamancipator Crystal - Tiamite" once per turn.
