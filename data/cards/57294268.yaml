name:
  en: Aleister the Reminiscent
  de: Aleister der sich Erinnernde
  es: Aleister, el Reminiscente
  fr: Aleister le Réminiscent
  it: Aleister il Reminiscente
  pt: Aleister, o Reminiscente
  ja: <ruby>追<rt>つい</rt></ruby><ruby>憶<rt>おく</rt></ruby>のアレイスター
  ja_romaji: Tsuioku no Areisutā
  ko: 추억의 알레이스터
  ko_rr:
  zh-TW:
  zh-CN: 追忆之阿莱斯特
text:
  en: |-
    If this card is in your hand: You can target 1 Spellcaster monster or 1 Fusion Monster on the field; Special Summon this card, and if you do, the targeted monster gains 1000 ATK until the end of this turn. If this card is Normal or Special Summoned, or flipped face-up: You can banish 1 "Invoked" monster from your Extra Deck; add 1 "Invocation", or 1 Spell that mentions it, from your Deck to your hand. You can only use each effect of "Aleister the Reminiscent" once per turn.
  de: |-
    Falls sich diese Karte in deiner Hand befindet: Du kannst 1 Hexer-Monster oder 1 Fusionsmonster auf dem Spielfeld wählen; beschwöre diese Karte als Spezialbeschwörung und falls du dies tust, erhält das als Ziel gewählte Monster bis zum Ende dieses Spielzugs 1000 ATK. Falls diese Karte als Normal- oder Spezialbeschwörung beschworen oder aufgedeckt wird: Du kannst 1 „Beschworen“-Monster von deinem Extra Deck verbannen; füge deiner Hand 1 „Beschwörung“ oder 1 Zauber, der sie erwähnt, von deinem Deck hinzu. Du kannst jeden Effekt von „Aleister der sich Erinnernde“ nur einmal pro Spielzug verwenden.
  es: |-
    Si esta carta está en tu mano: puedes seleccionar 1 monstruo Lanzador de Conjuros o 1 Monstruo de Fusión en el Campo; Invoca esta carta de Modo Especial y, si lo haces, el monstruo seleccionado gana 1000 ATK hasta el final de este turno. Si esta carta es Invocada de Modo Normal o Especial o volteada boca arriba: puedes desterrar 1 monstruo "Invokado/a" en tu Deck Extra; añade a tu mano 1 "Invokación" o 1 Mágica que lo mencione en tu Deck. Sólo puedes usar cada efecto de "Aleister, el Reminiscente" una vez por turno.
  fr: |-
    Si cette carte est dans votre main : vous pouvez cibler 1 monstre Magicien ou 1 Monstre Fusion sur le Terrain ; Invoquez Spécialement cette carte, et si vous le faites, le monstre ciblé gagne 1000 ATK jusqu'à la fin de ce tour. Si cette carte est Invoquée Normalement ou Spécialement, ou retournée face recto : vous pouvez bannir 1 monstre "Invokhé" depuis votre Extra Deck ; ajoutez 1 "Invokhation" ou 1 Magie qui le mentionne depuis votre Deck à votre main. Vous ne pouvez utiliser chaque effet de "Aleister le Réminiscent" qu'une fois par tour.
  it: |-
    Se questa carta è nella tua mano: puoi scegliere come bersaglio 1 mostro Incantatore o 1 Mostro Fusione sul Terreno; Evoca Specialmente questa carta e, se lo fai, il mostro scelto come bersaglio guadagna 1000 ATK fino alla fine di questo turno. Se questa carta viene Evocata Normalmente o Specialmente, o scoperta: puoi bandire 1 mostro "Invokato" dal tuo Extra Deck; aggiungi 1 "Invokazione", o 1 Magia che la menziona, dal tuo Deck alla tua mano. Puoi utilizzare ogni effetto di "Aleister il Reminiscente" una sola volta per turno.
  pt: |-
    Se este card estiver na sua mão: você pode escolher 1 monstro Mago ou 1 Monstro de Fusão no campo; Invoque este card por Invocação-Especial e, se isso acontecer, o monstro alvo ganha 1000 de ATK até o final deste turno. Se este card for Invocado por Invocação-Normal ou Especial, ou virado com a face para cima: você pode banir 1 monstro "Invokado(a)" do seu Deck Adicional; adicione 1 "Invokação", ou 1 Magia que o mencione, do seu Deck à sua mão. Você só pode usar cada efeito de "Aleister, o Reminiscente" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが手札に存在する場合、フィールドの魔法使い族モンスターか融合モンスター１体を対象として発動できる。このカードを特殊召喚し、対象のモンスターの攻撃力をターン終了時まで１０００アップする。②：このカードが召喚・特殊召喚・リバースした場合、ＥＸデッキから「召喚獣」モンスター１体を除外して発動できる。「召喚魔術」またはそのカード名が記された魔法カード１枚をデッキから手札に加える。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드가 패에 존재할 경우, 필드의 마법사족 몬스터나 융합 몬스터 1장을 대상으로 하고 발동할 수 있다. 이 카드를 특수 소환하고, 대상 몬스터의 공격력을 턴 종료시까지 1000 올린다. ②: 이 카드를 일반 소환 / 특수 소환 / 리버스했을 경우, 엑스트라 덱에서 "소환수" 몬스터 1장을 제외하고 발동할 수 있다. "소환마술" 또는 그 카드명이 쓰여진 마법 카드 1장을 덱에서 패에 넣는다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：此卡存在于手牌的情况下，以场上的1只魔法师族怪兽或融合怪兽为对象可以发动。将此卡特殊召唤，对象怪兽的攻击力直至回合结束时为止上升1000。②：此卡召唤・特殊召唤・反转的情况下，从额外牌组将1只“召唤兽”怪兽除外可以发动。从牌组将1张“召唤魔术”或记载有该卡名的魔法卡加入手牌。
