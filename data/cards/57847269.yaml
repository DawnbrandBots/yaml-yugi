name:
  en: Clown Crew Matinee Operatics
  de: Clowntrupp-Nachmittagsvorstellung
  es: Matiné Operístico de la Compañía de Payasos
  fr: Prestation Matinale de la Troupe des Clowns
  it: Spettacolo Pomeridiano Compagnia di Clown
  pt: Ópera Matinê da Companhia de Palhaços
  ja: <ruby>道化の一座<rt>クラウン・クラン</rt></ruby>『<ruby>開演<rt>マチネ</rt></ruby>』
  ja_romaji: Kuraun Kuran "Machine"
  ko: 크라운 클랜 『마티네』
  ko_rr:
  zh-TW:
  zh-CN: 小丑戏帮《开演》
text:
  en: |-
    During your Main Phase: You can Special Summon 1 "Clown Crew" monster from your Deck or Extra Deck, ignoring its Summoning conditions, also until the end of the next turn after this effect resolves, you cannot activate the effect of monsters Special Summoned from the Deck or Extra Deck. During the End Phase: You can draw cards equal to the number of different card types of monsters Tributed this turn (Ritual, Fusion, Synchro, Xyz, Pendulum, Link), then you can Set 1 Spell/Trap from your hand. You can only use each effect of "Clown Crew Matinee Operatics" once per turn.
  de: |-
    Während deiner Main Phase: Du kannst 1 „Clowntrupp“-Monster als Spezialbeschwörung von deinem Deck oder Extra Deck beschwören, ungeachtet seiner Beschwörungsbedingungen, zusätzlich kannst du bis zum Ende des nächsten Spielzugs, nachdem dieser Effekt aufgelöst wurde, keine Effekte von Monstern aktivieren, die als Spezialbeschwörung vom Deck oder Extra Deck beschworen wurden. Während der End Phase: Du kannst Karten in Höhe der Anzahl der unterschiedlichen Kartentypen der Monster ziehen, die in diesem Spielzug als Tribut angeboten wurden (Ritual, Fusion, Synchro, Xyz, Pendel, Link), dann kannst du 1 Zauber/Falle von deiner Hand setzen. Du kannst jeden Effekt von „Clowntrupp-Nachmittagsvorstellung“ nur einmal pro Spielzug verwenden.
  es: |-
    Durante tu Main Phase: puedes Invocar de Modo Especial 1 monstruo "Compañía de Payasos" desde tu Deck o Deck Extra, ignorando sus condiciones de Invocación y además, hasta el final del próximo turno después de que se resuelva este efecto, no puedes activar el efecto de los monstruos Invocados de Modo Especial desde el Deck o Deck Extra. Durante la End Phase: puedes robar cartas iguales al número de tipos de carta diferentes de monstruos Sacrificados este turno (Ritual, Fusión, Sincronía, Xyz, Péndulo, Enlace), y después puedes Colocar 1 Mágica/Trampa desde tu mano. Sólo puedes usar cada efecto de "Matiné Operístico de la Compañía de Payasos" una vez por turno.
  fr:
  it: |-
    Durante la tua Main Phase: puoi Evocare Specialmente 1 mostro "Compagnia di Clown" dal tuo Deck o Extra Deck, ignorando le sue condizioni di Evocazione, inoltre fino alla fine del prossimo turno dopo che questo effetto si è risolto, non puoi attivare gli effetti dei mostri Evocati Specialmente dal Deck o Extra Deck. Durante la End Phase: puoi pescare carte pari al numero di tipi di carta diversi dei mostri offerti come Tributo in questo turno (Rituale, Fusione, Synchro, Xyz, Pendulum, Link), poi puoi Posizionare 1 Magia/Trappola dalla tua mano. Puoi utilizzare ogni effetto di "Spettacolo Pomeridiano Compagnia di Clown" una sola volta per turno.
  pt: |-
    Durante sua Fase Principal: você pode Invocar por Invocação-Especial 1 monstro "Companhia de Palhaços" do seu Deck ou Deck Adicional, ignorando suas condições de Invocação e, além disso, até o final do próximo turno depois que este efeito resolver, você não pode ativar os efeitos de monstros Invocados por Invocação-Especial do Deck ou Deck Adicional. Durante a Fase Final: você pode comprar cards igual ao número de tipos de cards de monstro diferentes oferecidos como Tributo neste turno (Ritual, Fusão, Sincro, Xyz, Pêndulo, Link) e, depois, você pode Baixar 1 Magia/Armadilha da sua mão. Você só pode usar cada efeito de "Ópera Matinê da Companhia de Palhaços" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分メインフェイズに発動できる。デッキ・ＥＸデッキから「道化の一座」モンスター１体を召喚条件を無視して特殊召喚する。この効果の発動後、次のターンの終了時まで自分はデッキ・ＥＸデッキから特殊召喚されたモンスターの効果を発動できない。②：自分・相手のエンドフェイズに発動できる。このターンにリリースされたモンスターの種類（儀式・融合・Ｓ・Ｘ・Ｐ・Ｌ）の数だけ自分はドローする。その後、手札から魔法・罠カード１枚をセットできる。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신 메인 페이즈에 발동할 수 있다. 덱 / 엑스트라 덱에서 "크라운 클랜" 몬스터 1장을 소환 조건을 무시하고 특수 소환한다. 이 효과의 발동 후, 다음 턴의 종료시까지 자신은 덱 / 엑스트라 덱에서 특수 소환된 몬스터의 효과를 발동할 수 없다. ②: 자신 / 상대의 엔드 페이즈에 발동할 수 있다. 이 턴에 릴리스된 몬스터의 종류(의식 / 융합 / 싱크로 / 엑시즈 / 펜듈럼 / 링크)의 수만큼 자신은 드로우한다. 그 후, 패에서 마법 / 함정 카드 1장을 세트할 수 있다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：在自己的主要阶段可以发动。从牌组・额外牌组将1只“小丑戏帮”怪兽无视召唤条件特殊召唤。此效果发动后，直至下个回合结束时为止，自己不可发动被从牌组・额外牌组特殊召唤的怪兽的效果。②：在自己・对手的结束阶段可以发动。自己依此回合被解放的怪兽种类（仪式・融合・同步・超量・灵摆・连接）的数量抽牌。然后，可从手牌放置1张魔法・陷阱卡。
