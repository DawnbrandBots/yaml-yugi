text:
  en: |-
    If you control "Regulus, the Prince of Endymion": Activate 1 of these effects;
    ● Destroy 1 monster your opponent controls that battled this turn.
    ● When a Normal or Quick-Play Spell Card is activated: Negate that effect.
    During your Main Phase: You can banish this card from your GY, then target 1 "Regulus, the Prince of Endymion" or 1 monster that mentions it in your GY; Special Summon it. You can only use each effect of "Arrow of Regulus" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分フィールドに「聖月の皇太子レグルス」が存在する場合、以下の効果から１つを選択して発動できる。
    ●このターンに戦闘を行った相手フィールドのモンスター１体を破壊する。
    ●通常・速攻魔法カードが発動した時に発動できる。その効果を無効にする。
    ②：自分メインフェイズに墓地のこのカードを除外し、自分の墓地の「聖月の皇太子レグルス」またはそのカード名が記されたモンスター１体を対象として発動できる。そのモンスターを特殊召喚する。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신 필드에 "프린스 오브 엔디미온 레굴루스"가 존재할 경우, 이하의 효과에서 1개를 선택하고 발동할 수 있다.
    ●이 턴에 전투를 실행한 상대 필드의 몬스터 1장을 파괴한다.
    ●일반 / 속공 마법 카드가 발동했을 때에 발동할 수 있다. 그 효과를 무효로 한다.
    ②: 자신 메인 페이즈에 묘지의 이 카드를 제외하고, 자신 묘지의 "프린스 오브 엔디미온 레굴루스" 또는 그 카드명이 쓰여진 몬스터 1장을 대상으로 하여 발동할 수 있다. 그 몬스터를 특수 소환한다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：自己场上存在“恩底弥翁之圣月皇太子 雷格鲁斯”的情况下，可从以下效果中选择1个发动。
    ●将在此回合进行过战斗的对手场上的1只怪兽破坏。
    ●通常・速攻魔法卡发动时可以发动。将该效果无效。
    ②：在自己的主要阶段将墓地的此卡除外，以自己墓地的1只“恩底弥翁之圣月皇太子 雷格鲁斯”或记载有该卡名的怪兽为对象可以发动。将该怪兽特殊召唤。
