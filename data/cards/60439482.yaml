  ko_rr:
  zh-TW:
  zh-CN: 雷格鲁斯之箭
text:
  en: |-
    If you control "Regulus, the Prince of Endymion": Activate 1 of these effects;
    ● Destroy 1 monster your opponent controls that battled this turn.
    ● When a Normal or Quick-Play Spell Card is activated: Negate that effect.
    During your Main Phase: You can banish this card from your GY, then target 1 "Regulus, the Prince of Endymion" or 1 monster that mentions it in your GY; Special Summon it. You can only use each effect of "Arrow of Regulus" once per turn.
  de: |-
    Falls du „Regulus, der Prinz von Endymion“ kontrollierst: Aktiviere 1 dieser Effekte;
    ● Zerstöre 1 Monster, das dein Gegner kontrolliert und das in diesem Spielzug gekämpft hat.
    ● Wenn eine Normale oder Schnellzauberkarte aktiviert wird: Annulliere jenen Effekt.
    Während deiner Main Phase: Du kannst diese Karte von deinem Friedhof verbannen und dann 1 „Regulus, der Prinz von Endymion“ oder 1 Monster, das ihn erwähnt, in deinem Friedhof wählen; beschwöre ihn oder es als Spezialbeschwörung. Du kannst jeden Effekt von „Pfeil von Regulus“ nur einmal pro Spielzug verwenden.
  es: |-
    Si controlas "Regulus, el Príncipe de Endimión": activa 1 de estos efectos;
    ● Destruye 1 monstruo que controle tu adversario que haya batallado este turno.
    ● Cuando es activada una Carta Mágica Normal o de Juego Rápido: niega ese efecto.
    Durante tu Main Phase: puedes desterrar esta carta en tu Cementerio, y después seleccionar 1 "Regulus, el Príncipe de Endimión" o 1 monstruo que lo mencione en tu Cementerio; Invócalo de Modo Especial. Sólo puedes usar cada efecto de "Flecha de Regulus" una vez por turno.
  fr: |-
    Si vous contrôlez "Regulus, le Prince d'Endymion" : activez 1 de ces effets ;
    ● Détruisez 1 monstre contrôlé par votre adversaire qui a combattu ce tour.
    ● Lorsqu'une Carte Magie Normale ou Jeu-Rapide est activée : annulez l'effet.
    Durant votre Main Phase : vous pouvez bannir cette carte depuis votre Cimetière, puis ciblez 1 "Regulus, le Prince d'Endymion" ou 1 monstre qui le mentionne dans votre Cimetière ; Invoquez-le Spécialement. Vous ne pouvez utiliser chaque effet de "Flèche de Regulus" qu'une fois par tour.
  it: |-
    Se controlli "Regulus, il Principe di Endymion": attiva 1 di questi effetti;
    ● Distruggi 1 mostro controllato dal tuo avversario che ha combattuto in questo turno.
    ● Quando viene attivata una Carta Magia Normale o Rapida: annulla quell'effetto.
    Durante la tua Main Phase: puoi bandire questa carta dal tuo Cimitero, poi scegliere come bersaglio 1 "Regulus, il Principe di Endymion" o 1 mostro che lo menziona nel tuo Cimitero; Evocalo Specialmente. Puoi utilizzare ogni effetto di "Freccia di Regulus" una sola volta per turno.
  pt: |-
    Se você controlar "Regulus, o Príncipe de Endymion": ative 1 desses efeitos;
    ● Destrua 1 monstro que seu oponente controla que batalhou neste turno.
    ● Quando um Card de Magia Normal ou Rápida for ativado: negue o efeito.
    Durante sua Fase Principal: você pode banir este card do seu Cemitério e, depois, escolha 1 "Regulus, o Príncipe de Endymion" ou 1 monstro que o mencione no seu Cemitério; Invoque-o por Invocação-Especial. Você só pode usar cada efeito de "Flecha de Regulus" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分フィールドに「聖月の皇太子レグルス」が存在する場合、以下の効果から１つを選択して発動できる。
    ●このターンに戦闘を行った相手フィールドのモンスター１体を破壊する。
    ●通常・速攻魔法カードが発動した時に発動できる。その効果を無効にする。
    ②：自分メインフェイズに墓地のこのカードを除外し、自分の墓地の「聖月の皇太子レグルス」またはそのカード名が記されたモンスター１体を対象として発動できる。そのモンスターを特殊召喚する。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신 필드에 "프린스 오브 엔디미온 레굴루스"가 존재할 경우, 이하의 효과에서 1개를 선택하고 발동할 수 있다.
    ●이 턴에 전투를 실행한 상대 필드의 몬스터 1장을 파괴한다.
    ●일반 / 속공 마법 카드가 발동했을 때에 발동할 수 있다. 그 효과를 무효로 한다.
    ②: 자신 메인 페이즈에 묘지의 이 카드를 제외하고, 자신 묘지의 "프린스 오브 엔디미온 레굴루스" 또는 그 카드명이 쓰여진 몬스터 1장을 대상으로 하여 발동할 수 있다. 그 몬스터를 특수 소환한다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：自己场上存在“恩底弥翁之圣月皇太子 雷格鲁斯”的情况下，可从以下效果中选择1个发动。
    ●将在此回合进行过战斗的对手场上的1只怪兽破坏。
    ●通常・速攻魔法卡发动时可以发动。将该效果无效。
    ②：在自己的主要阶段将墓地的此卡除外，以自己墓地的1只“恩底弥翁之圣月皇太子 雷格鲁斯”或记载有该卡名的怪兽为对象可以发动。将该怪兽特殊召唤。
