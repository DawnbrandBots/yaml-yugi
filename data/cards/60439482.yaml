name:
  en: Arrow of Regulus
  de: Pfeil von Regulus
  es: Flecha de Regulus
  fr: Flèche de Regulus
  it: Freccia di Regulus
  pt: Flecha de Regulus
  ja: レグルスの<ruby>矢<rt>や</rt></ruby>
  ja_romaji: Regurusu no Ya
