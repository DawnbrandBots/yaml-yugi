text:
  en: |-
    If your opponent Special Summons a monster(s) from the Extra Deck (except during the Damage Step): You can target 1 face-up monster you control; Special Summon this card from your hand, then immediately after this effect resolves, Xyz Summon using only this card and the targeted monster. When you do, treat this card's Level as the same as the targeted monster's. If this card is detached from an Xyz Monster to activate that monster's effect: You can change the ATK of 1 face-up monster your opponent controls to 0. You can only use each effect of "Gagaga Girl - Cell Phone Subtraction" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：相手がＥＸデッキからモンスターを特殊召喚した場合、自分フィールドの表側表示モンスター１体を対象として発動できる。このカードを手札から特殊召喚する。その後、このカードと対象のモンスターのみを素材としてＸ召喚を行う。その際、このカードのレベルは、対象のモンスターと同じレベルとして扱う。②：Ｘ素材のこのカードがＸモンスターの効果を発動するために取り除かれた場合に発動できる。相手フィールドの表側表示モンスター１体の攻撃力を０にする。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 상대가 엑스트라 덱에서 몬스터를 특수 소환했을 경우, 자신 필드의 앞면 표시 몬스터 1장을 대상으로 하고 발동할 수 있다. 이 카드를 패에서 특수 소환한다. 그 후, 이 카드와 대상 몬스터만을 소재로서 엑시즈 소환을 실행한다. 그 시기에, 이 카드의 레벨은, 대상 몬스터와 같은 레벨로 취급한다. ②: 엑시즈 소재인 이 카드가 엑시즈 몬스터의 효과를 발동하기 위해 제거되었을 경우에 발동할 수 있다. 상대 필드의 앞면 표시 몬스터 1장의 공격력을 0 으로 한다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：对手从额外牌组将怪兽特殊召唤的情况下，以自己场上的1只表侧表示怪兽为对象可以发动。从手牌将此卡特殊召唤。然后，仅以此卡和对象怪兽作为素材进行超量召唤。在此之际，此卡的等级视为与对象怪兽的等级相同。②：作为超量素材的此卡为发动超量怪兽的效果被去除的情况下可以发动。将对手场上的1只表侧表示怪兽的攻击力改成0。
