name:
  en: S-Force World Sorting
  de: S-Kraft-Weltsortierung
  es: Orden de los Mundos Fuerza-S
  fr: Triage de Monde de la Force-S
  it: Ordinamento del Mondo S-Forza
  pt: Classificação Mundial Força-S
  ja: <ruby>Ｓ－Ｆｏｒｃｅ<rt>セキュリティ・フォース</rt></ruby> ソート・ワールド
  ja_romaji: Sekyuriti Fōsu Sōto Wārudo
  ko:
  ko_rr:
  zh-TW:
  zh-CN: 超元特防队 理序世界
text:
  en: |-
    If an "S-Force" monster you control would banish a card(s) from your hand to activate its effect, you can send 1 "S-Force" card from your Deck to the GY instead, except "S-Force World Sorting". If another card(s) is banished (except during the Damage Step): You can target 1 card in your opponent's field or GY; banish it, then you can move 1 "S-Force" monster you control to another of your Main Monster Zones. You can only use each effect of "S-Force World Sorting" once per turn.
  de: |-
    Falls eine oder mehr Karten von deiner Hand verbannt würden, um den Effekt eines „S-Kraft“-Monsters, das du kontrollierst, zu aktivieren, kannst du stattdessen 1 „S-Kraft“-Karte von deinem Deck auf den Friedhof legen, außer „S-Kraft-Weltsortierung“. Falls eine oder mehr andere Karten verbannt werden (außer während des Damage Steps): Du kannst 1 Karte auf der Spielfeldseite oder im Friedhof deines Gegners wählen; verbanne sie, dann kannst du 1 „S-Kraft“-Monster, das du kontrollierst, in eine andere deiner Main-Monsterzonen bewegen. Du kannst jeden Effekt von „S-Kraft-Weltsortierung“ nur einmal pro Spielzug verwenden.
  es: |-
    Si un monstruo "Fuerza-S" que controlas fuera a desterrar una o más cartas en tu mano para activar su efecto, puedes mandar al Cementerio 1 carta "Fuerza-S" en tu Deck en su lugar, excepto "Orden de los Mundos Fuerza-S". Si otra u otras cartas son desterradas (excepto durante el Damage Step): puedes seleccionar 1 carta en el Campo o Cementerio de tu adversario; destiérrala, y después puedes mover 1 monstruo "Fuerza-S" que controles a otra de tus Zonas de Monstruos Principales. Sólo puedes usar cada efecto de "Orden de los Mundos Fuerza-S" una vez por turno.
  fr: |-
    Si un monstre "Force-S" que vous contrôlez va bannir une ou plusieurs cartes depuis votre main pour activer son effet, vous pouvez envoyer 1 carte "Force-S" ("Triage de Monde de la Force-S" exclu) depuis votre Deck au Cimetière à la place. Si une ou plusieurs autres cartes sont bannies (sauf durant la Damage Step) : vous pouvez cibler 1 carte dans le Terrain ou Cimetière de votre adversaire ; bannissez-la, puis vous pouvez déplacer 1 monstre "Force-S" que vous contrôlez dans une autre de vos Zones Monstre Main. Vous ne pouvez utiliser chaque effet de "Triage de Monde de la Force-S" qu'une fois par tour.
  it: |-
    Se un mostro "S-Forza" che controlli sta per bandire una o più carte dalla tua mano per attivare il suo effetto, puoi invece mandare 1 carta "S-Forza" dal tuo Deck al Cimitero, eccetto "Ordinamento del Mondo S-Forza". Se una o più altre carte vengono bandite (eccetto durante il Damage Step): puoi scegliere come bersaglio 1 carta nel Terreno o Cimitero del tuo avversario; bandiscila, poi puoi spostare 1 mostro "S-Forza" che controlli in un'altra delle tue Zone Mostri Main. Puoi utilizzare ogni effetto di "Ordinamento del Mondo S-Forza" una sola volta per turno.
  pt: |-
    Se um monstro "Força-S" que você controla baniria um ou mais cards da sua mão para ativar seu efeito, em vez disso, você pode enviar 1 card "Força-S" do seu Deck para o Cemitério, exceto "Classificação Mundial Força-S". Se um ou mais outros cards forem banidos (exceto durante a Etapa de Dano): você pode escolher 1 card no campo ou Cemitério do seu oponente; bana-o e, depois, você pode mover 1 monstro "Força-S" que você controla para outra das suas Zonas de Monstros Principais. Você só pode usar cada efeito de "Classificação Mundial Força-S" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分フィールドの「Ｓ－Ｆｏｒｃｅ」モンスターの効果を発動するために手札を除外する場合、代わりにデッキから「Ｓ－Ｆｏｒｃｅ ソート・ワールド」以外の「Ｓ－Ｆｏｒｃｅ」カード１枚を墓地へ送る事ができる。②：他のカードが除外された場合、相手のフィールド・墓地のカード１枚を対象として発動できる。そのカードを除外する。その後、自分フィールドの「Ｓ－Ｆｏｒｃｅ」モンスター１体の位置を他の自分のメインモンスターゾーンに移動できる。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：为发动自己场上的“超元特防队”怪兽的效果而要将手牌除外的情况下，作为代替可从牌组将1张“超元特防队 理序世界”以外的“超元特防队”卡送至墓地。②：其他卡被除外的情况下，以对手场上・墓地的1张卡为对象可以发动。将该卡除外。然后，可将自己场上的1只“超元特防队”怪兽的位置移动至自己的其他主要怪兽区域。
