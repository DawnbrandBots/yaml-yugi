text:
  en: |-
    1 Fusion Monster + 1 face-up monster on the field
    (This card is always treated as an "Elemental HERO" card.)
    If this card is Special Summoned from the Extra Deck: You can shuffle 5 monsters from your GY into the Deck, then draw 2 cards, and if you do, this card gains 1000 ATK. You can only use this effect of "Favorite HERO Shining Flare Wingman" once per turn. If this card destroys a monster by battle: Inflict damage to your opponent equal to that monster's original ATK.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    融合モンスター＋フィールドの表側表示モンスター
    このカード名はルール上「Ｅ・ＨＥＲＯ」カードとしても扱う。このカード名の①の効果は１ターンに１度しか使用できない。①：このカードがＥＸデッキから特殊召喚した場合に発動できる。自分の墓地からモンスター５体をデッキに戻す。その後、自分は２枚ドローし、このカードの攻撃力は１０００アップする。②：このカードが戦闘でモンスターを破壊した場合に発動する。そのモンスターの元々の攻撃力分のダメージを相手に与える。
  ko: |-
    융합 몬스터 ＋ 필드의 앞면 표시 몬스터
    이 카드명은 룰상 "엘리멘틀 히어로" 카드로도 취급한다. 이 카드명의 ①의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 이 카드를 엑스트라 덱에서 특수 소환했을 경우에 발동할 수 있다. 자신 묘지에서 몬스터 5장을 덱으로 되돌린다. 그 후, 자신은 2장 드로우하고, 이 카드의 공격력은 1000 올린다. ②: 이 카드가 전투로 몬스터를 파괴했을 경우에 발동한다. 그 몬스터의 원래 공격력만큼의 데미지를 상대에게 준다.
  zh-TW:
  zh-CN: |-
    融合怪兽＋场上表侧表示的怪兽
    此卡名在规则上也视为“元素－英雄”卡。此卡名的①效果1回合仅可使用1次。①：此卡从额外牌组特殊召唤的情况下可以发动。从自己墓地将5只怪兽放回牌组。然后，自己抽2张，此卡的攻击力上升1000。②：此卡战斗破坏怪兽的情况下发动。给予对手相当于该怪兽的原本攻击力数值的伤害。
