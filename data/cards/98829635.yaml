text:
  en: |-
    Apply these effects to 1 face-up monster on the field, until the end of this turn.
    в—Ҹ Negate its effects.
    в—Ҹ Cannot attack.
    в—Ҹ Cannot be destroyed by battle or card effects.
    в—Ҹ Unaffected by activated card effects, except its own.
    в—Ҹ Cannot be Tributed.
    в—Ҹ Cannot be used as material for a Fusion, Synchro, Xyz, or Link Summon.
    Neither player can activate monster effects in response to this card's activation. You can only activate 1 "Forbidden Crown" per turn.
