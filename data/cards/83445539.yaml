name:
  en: Darkness Resonator
  de: Finsternis-Resonator
  es: Resonador de Oscuridad
  fr: Diapason des Ténèbres Obscures
  it: Diapason Oscurità
  pt: Ressonador das Trevas
  ja: ダークネス・リゾネーター
  ja_romaji: Dākunesu Rizonētā
  ko: 다크니스 레조네이터
  ko_rr:
  zh-TW:
  zh-CN: 暗冥共鸣者
text:
  en: |-
    You can reveal 1 "Red Dragon Archfiend" in your Extra Deck; Special Summon this card from your hand, also you cannot Special Summon from the Extra Deck for the rest of this turn, except Synchro Monsters. If this card is Special Summoned: You can activate this effect; during your Main Phase this turn, you can Normal Summon 1 "Resonator" monster, in addition to your Normal Summon/Set (you can only gain this effect once per turn). You can target any number of Tuners you control; change their Levels to 1. You can only use each effect of "Darkness Resonator" once per turn.
  de: |-
    Du kannst 1 „Rotdrachen-Erzunterweltler“ in deinem Extra Deck vorzeigen; beschwöre diese Karte als Spezialbeschwörung von deiner Hand, zusätzlich kannst du für den Rest dieses Spielzugs keine Spezialbeschwörungen vom Extra Deck durchführen, außer von Synchromonstern. Falls diese Karte als Spezialbeschwörung beschworen wird: Du kannst diesen Effekt aktivieren; während deiner Main Phase dieses Spielzugs kannst du zusätzlich zu deiner Normalbeschwörung / deinem Setzen 1 „Resonator“-Monster als Normalbeschwörung beschwören (du kannst diesen Effekt nur einmal pro Spielzug erhalten). Du kannst eine beliebige Anzahl Empfänger wählen, die du kontrollierst; ändere ihre Stufen zu 1. Du kannst jeden Effekt von „Finsternis-Resonator“ nur einmal pro Spielzug verwenden.
  es: |-
    Puedes mostrar 1 "Dragón Rojo Archidemonio" en tu Deck Extra; Invoca esta carta de Modo Especial desde tu mano, y además no puedes Invocar de Modo Especial desde el Deck Extra por el resto de este turno, excepto Monstruos de Sincronía. Si esta carta es Invocada de Modo Especial: puedes activar este efecto; durante tu Main Phase este turno, puedes Invocar de Modo Normal 1 monstruo "Resonador", además de tu Invocación Normal/Colocación (sólo puedes ganar este efecto una vez por turno). Puedes seleccionar cualquier número de Cantantes que controles; cambia sus Niveles a 1. Sólo puedes usar cada efecto de "Resonador de Oscuridad" una vez por turno.
  fr: |-
    Vous pouvez révéler 1 "Dragon Rouge Archdémon" dans votre Extra Deck ; Invoquez Spécialement cette carte depuis votre main, et aussi, vous ne pouvez pas Invoquer Spécialement (Monstres Synchro exclus) depuis l'Extra Deck le reste de ce tour. Si cette carte est Invoquée Spécialement : vous pouvez activer cet effet ; durant votre Main Phase ce tour, vous pouvez Invoquer Normalement 1 monstre "Diapason", en plus de votre Invocation/Pose Normale (vous ne pouvez gagner cet effet qu'une fois par tour). Vous pouvez cibler un nombre de votre choix de Syntoniseurs que vous contrôlez ; changez leur Niveau à 1. Vous ne pouvez utiliser chaque effet de "Diapason des Ténèbres Obscures" qu'une fois par tour.
  it: |-
    Puoi rivelare 1 "Arcidemone Drago Rosso" nel tuo Extra Deck; Evoca Specialmente questa carta dalla tua mano, inoltre non puoi Evocare Specialmente dall'Extra Deck per il resto di questo turno, eccetto Mostri Synchro. Se questa carta viene Evocata Specialmente: puoi attivare questo effetto; durante la tua Main Phase in questo turno, puoi Evocare Normalmente 1 mostro "Diapason", in aggiunta alla tua Evocazione Normale/Posizionamento (puoi guadagnare questo effetto una sola volta per turno). Puoi scegliere come bersaglio un qualsiasi numero di Tuner che controlli; cambia i loro Livelli a 1. Puoi utilizzare ogni effetto di "Diapason Oscurità" una sola volta per turno.
  pt: |-
    Você pode revelar 1 "Dragão Vermelho Arquidemônio" no seu Deck Adicional; Invoque este card por Invocação-Especial da sua mão e, além disso, você não pode Invocar por Invocação-Especial do Deck Adicional pelo resto deste turno, exceto Monstros Sincro. Se este card for Invocado por Invocação-Especial: você pode ativar este efeito; durante sua Fase Principal neste turno, você pode Invocar por Invocação-Normal 1 monstro "Ressonador", em adição à sua Invocação-Normal/Baixar (padrão) (você só pode se aproveitar deste efeito uma vez por turno). Você pode escolher qualquer número de Reguladores que você controla; mude o Nível deles para 1. Você só pode usar cada efeito de "Ressonador das Trevas" uma vez por turno.
  ja: |-
    このカード名の①②③の効果はそれぞれ１ターンに１度しか使用できない。①：ＥＸデッキの「レッド・デーモンズ・ドラゴン」１体を相手に見せて発動できる。このカードを手札から特殊召喚する。このターン、自分はＳモンスターしかＥＸデッキから特殊召喚できない。②：このカードが特殊召喚した場合に発動できる。このターン、自分は通常召喚に加えて１度だけ、自分メインフェイズに「リゾネーター」モンスター１体を召喚できる。③：自分フィールドのチューナーを任意の数だけ対象として発動できる。そのモンスターのレベルを１にする。
  ko: |-
    이 카드명의 ①②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 엑스트라 덱의 "레드 데몬즈 드래곤" 1장을 상대에게 보여주고 발동할 수 있다. 이 카드를 패에서 특수 소환한다. 이 턴에, 자신은 싱크로 몬스터밖에 엑스트라 덱에서 특수 소환할 수 없다. ②: 이 카드를 특수 소환했을 경우에 발동할 수 있다. 이 턴에, 자신은 통상 소환 외에도 1번만, 자신 메인 페이즈에 "레조네이터" 몬스터 1장을 일반 소환할 수 있다. ③: 자신 필드의 튜너를 임의의 수만큼 대상으로 하고 발동할 수 있다. 그 몬스터의 레벨을 1 로 한다.
  zh-TW:
  zh-CN: |-
    此卡名的①②③效果1回合仅可各使用1次。①：向对手出示额外牌组的1只“暗红恶魔龙”可以发动。从手牌将此卡特殊召唤。此回合，自己从额外牌组仅可特殊召唤同步怪兽。②：此卡特殊召唤的情况下可以发动。此回合，自己在通常召唤之外，可在自己的主要阶段追加1次召唤1只“共鸣者”怪兽。③：以自己场上任意数量的协调为对象可以发动。将该怪兽的等级改成1。
