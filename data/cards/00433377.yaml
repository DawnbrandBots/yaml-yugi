name:
  en: Blitzclique - Steppleader
  de: Blitzclique - Leitblitz
  es: Blitzclique - Líder Escalonado
  fr: Blitzclique - Précurseur
  it: Blitzclique - Guidascarica
  pt: Blitzclique - Líder Escalonado
  ja: <ruby>雷盟<rt>ブリッツクリーク</rt></ruby>－ステップリーダ
  ja_romaji: Burittsukurīku - Suteppu Rīda
  ko:
  ko_rr:
  zh-TW:
  zh-CN: 雷盟－先导云步
text:
  en: |-
    If a card(s) is destroyed by your "Blitzclique" card's effect (except during the Damage Step): You can target 1 Thunder monster in your GY; add it to your hand. During your Main Phase: You can Special Summon 1 Thunder monster from your hand, then destroy this card. If a card(s) is destroyed by your "Blitzclique" card's effect, while this card is in your GY (except during the Damage Step): You can add this card to your hand. You can only use each effect of "Blitzclique - Steppleader" once per turn.
  de: |-
    Falls eine oder mehr Karten durch einen Effekt deiner „Blitzclique“-Karte zerstört werden (außer während des Damage Steps): Du kannst 1 Donner-Monster in deinem Friedhof wählen; füge es deiner Hand hinzu. Während deiner Main Phase: Du kannst 1 Donner-Monster als Spezialbeschwörung von deiner Hand beschwören, dann zerstöre diese Karte. Falls eine oder mehr Karten durch einen Effekt deiner „Blitzclique“-Karte zerstört werden, solange sich diese Karte in deinem Friedhof befindet (außer während des Damage Steps): Du kannst diese Karte deiner Hand hinzufügen. Du kannst jeden Effekt von „Blitzclique - Leitblitz“ nur einmal pro Spielzug verwenden.
  es: |-
    Si una o más cartas son destruidas por el efecto de tu carta "Blitzclique" (excepto durante el Damage Step): puedes seleccionar 1 monstruo Trueno en tu Cementerio; añádelo a tu mano. Durante tu Main Phase: puedes Invocar de Modo Especial 1 monstruo Trueno desde tu mano, y después destruye esta carta. Si una o más cartas son destruidas por el efecto de tu carta "Blitzclique", mientras esta carta está en tu Cementerio (excepto durante el Damage Step): puedes añadir esta carta a tu mano. Sólo puedes usar cada efecto de "Blitzclique - Líder Escalonado" una vez por turno.
  fr: |-
    Si une ou plusieurs cartes sont détruites par un effet de votre carte "Blitzclique" (sauf durant la Damage Step) : vous pouvez cibler 1 monstre Tonnerre dans votre Cimetière ; ajoutez-le à votre main. Durant votre Main Phase : vous pouvez Invoquer Spécialement 1 monstre Tonnerre depuis votre main, puis détruisez cette carte. Si une ou plusieurs cartes sont détruites par un effet de votre carte "Blitzclique", tant que cette carte est dans votre Cimetière (sauf durant la Damage Step) : vous pouvez ajouter cette carte à votre main. Vous ne pouvez utiliser chaque effet de "Blitzclique - Précurseur" qu'une fois par tour.
  it: |-
    Se una o più carte vengono distrutte dall'effetto di una tua carta "Blitzclique" (eccetto durante il Damage Step): puoi scegliere come bersaglio 1 mostro Tuono nel tuo Cimitero; aggiungilo alla tua mano. Durante la tua Main Phase: puoi Evocare Specialmente 1 mostro Tuono dalla tua mano, poi distruggere questa carta. Se una o più carte vengono distrutte dall'effetto di una tua carta "Blitzclique", mentre questa carta è nel tuo Cimitero (eccetto durante il Damage Step): puoi aggiungere questa carta alla tua mano. Puoi utilizzare ogni effetto di "Blitzclique - Guidascarica" una sola volta per turno.
  pt: |-
    Se um ou mais cards forem destruídos por um efeito de card "Blitzclique" seu (exceto durante a Etapa de Dano): você pode escolher 1 monstro Trovão no seu Cemitério; adicione-o à sua mão. Durante sua Fase Principal: você pode Invocar por Invocação-Especial 1 monstro Trovão da sua mão e, depois, destrua este card. Se um ou mais cards forem destruídos por um efeito de card "Blitzclique" seu, enquanto este card estiver no seu Cemitério (exceto durante a Etapa de Dano): você pode adicionar este card à sua mão. Você só pode usar cada efeito de "Blitzclique - Líder Escalonado" uma vez por turno.
  ja: |-
    このカード名の①②③の効果はそれぞれ１ターンに１度しか使用できない。①：自分の「ブリッツクリーク」カードの効果でカードを破壊した場合、自分の墓地の雷族モンスター１体を対象として発動できる。そのモンスターを手札に加える。②：自分メインフェイズに発動できる。手札から雷族モンスター１体を特殊召喚する。その後、このカードを破壊する。③：このカードが墓地に存在する状態で、自分の「ブリッツクリーク」カードの効果でカードを破壊した場合に発動できる。このカードを手札に加える。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②③效果1回合仅可各使用1次。①：以自己的“雷盟”卡的效果破坏了卡的情况下，以自己墓地的1只雷族怪兽为对象可以发动。将该怪兽加入手牌。②：在自己的主要阶段可以发动。从手牌将1只雷族怪兽特殊召唤。然后，将此卡破坏。③：此卡存在于墓地的状态下，以自己的“雷盟”卡的效果破坏了卡的情况下可以发动。将此卡加入手牌。
