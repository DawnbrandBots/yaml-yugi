text:
  en: |-
    You can reveal this card in your hand, then target 1 Spell/Trap on the field; destroy it, and if you do, Special Summon 1 Thunder monster from your hand, also for the rest of this turn, you cannot Special Summon Effect Monsters, except from the hand. If another card(s) is destroyed by card effect, while this card is in the Monster Zone (except during the Damage Step): You can add 1 "Blitzclique" Spell or 1 "Hideout in the Sky, Coulomb" from your Deck to your hand. You can only use each effect of "Grain Blitzclique" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：手札のこのカードを相手に見せ、フィールドの魔法・罠カード１枚を対象として発動できる。そのカードを破壊し、手札から雷族モンスター１体を特殊召喚する。このターン、自分は手札からしか効果モンスターを特殊召喚できない。②：このカードがモンスターゾーンに存在する状態で、このカード以外のカードが効果で破壊された場合に発動できる。デッキから「ブリッツクリーク」魔法カードか「天空城塞クーロン」１枚を手札に加える。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：向对手出示手牌的此卡，以场上的1张魔法・陷阱卡为对象可以发动。将该卡破坏，从手牌将1只雷族怪兽特殊召唤。此回合，自己不可从手牌以外的地方特殊召唤效果怪兽。②：此卡存在于怪兽区域的状态下，此卡以外的卡因效果被破坏的情况下可以发动。从牌组将1张“雷盟”魔法卡或“天空城塞 库龙”加入手牌。
