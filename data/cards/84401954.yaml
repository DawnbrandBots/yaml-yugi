text:
  en: |-
    You can reveal this card in your hand, then target 1 Spell/Trap on the field; destroy it, and if you do, Special Summon 1 Thunder monster from your hand, also for the rest of this turn, you cannot Special Summon Effect Monsters, except from the hand. If another card(s) is destroyed by card effect, while this card is in the Monster Zone (except during the Damage Step): You can add 1 "Blitzclique" Spell or 1 "Hideout in the Sky, Coulomb" from your Deck to your hand. You can only use each effect of "Grain Blitzclique" once per turn.
  de: |-
    Du kannst diese Karte in deiner Hand vorzeigen und dann 1 Zauber/Falle auf dem Spielfeld wählen; zerstöre ihn oder sie und falls du dies tust, beschwöre 1 Donner-Monster als Spezialbeschwörung von deiner Hand, zusätzlich kannst du für den Rest dieses Spielzugs keine Effektmonster als Spezialbeschwörung beschwören, außer von der Hand. Falls eine oder mehr andere Karten durch einen Karteneffekt zerstört werden, solange sich diese Karte in der Monsterzone befindet (außer während des Damage Steps): Du kannst deiner Hand 1 „Blitzclique“-Zauber oder 1 „Versteck im Himmel, Coulomb“ von deinem Deck hinzufügen. Du kannst jeden Effekt von „Korn Blitzclique“ nur einmal pro Spielzug verwenden.
  es: |-
    Puedes mostrar esta carta en tu mano, y después selecciona 1 Mágica/Trampa en el Campo; destrúyela y, si lo haces, Invoca de Modo Especial 1 monstruo Trueno desde tu mano, y además por el resto de este turno, no puedes Invocar de Modo Especial Monstruos de Efecto, excepto desde la mano. Si otra u otras cartas son destruidas por el efecto de una carta, mientras esta carta está en la Zona de Monstruos (excepto durante el Damage Step): puedes añadir a tu mano 1 Mágica "Blitzclique" o 1 "Guarida en el Cielo, Coulomb" en tu Deck. Sólo puedes usar cada efecto de "Migra Blitzclique" una vez por turno.
  fr: |-
    Vous pouvez révéler cette carte dans votre main, puis ciblez 1 Magie/Piège sur le Terrain ; détruisez-le, et si vous le faites, Invoquez Spécialement 1 monstre Tonnerre depuis votre main, et aussi, vous ne pouvez pas Invoquer Spécialement de Monstres à Effet, sauf depuis la main, le reste de ce tour. Si une ou plusieurs autres cartes sont détruites par un effet de carte, tant que cette carte est dans la Zone Monstre (sauf durant la Damage Step) : vous pouvez ajouter 1 Magie "Blitzclique" ou 1 "Planque dans le Ciel, Coulomb" depuis votre Deck à votre main. Vous ne pouvez utiliser chaque effet de "Grain Blitzclique" qu'une fois par tour.
  it: |-
    Puoi rivelare questa carta nella tua mano, poi scegliere come bersaglio 1 Magia/Trappola sul Terreno; distruggila e, se lo fai, Evoca Specialmente 1 mostro Tuono dalla tua mano, inoltre per il resto di questo turno, non puoi Evocare Specialmente Mostri con Effetto, eccetto dalla mano. Se una o più altre carte vengono distrutte dall'effetto di una carta, mentre questa carta è nella Zona Mostri (eccetto durante il Damage Step): puoi aggiungere 1 Magia "Blitzclique" o 1 "Rifugio nel Cielo, Coulomb" dal tuo Deck alla tua mano. Puoi utilizzare ogni effetto di "Grain Blitzclique" una sola volta per turno.
  pt: |-
    Você pode revelar este card na sua mão e, depois, escolha 1 Magia/Armadilha no campo; destrua-a e, se isso acontecer, Invoque por Invocação-Especial 1 monstro Trovão da sua mão e, além disso, pelo resto deste turno, você não pode Invocar Monstros de Efeito por Invocação-Especial, exceto da mão. Se um ou mais outros cards forem destruídos por um efeito de card, enquanto este card estiver na Zona de Monstros (exceto durante a Etapa de Dano): você pode adicionar 1 Magia "Blitzclique" ou 1 "Esconderijo no Céu, Coulomb" do seu Deck à sua mão. Você só pode usar cada efeito de "Grão Blitzclique" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：手札のこのカードを相手に見せ、フィールドの魔法・罠カード１枚を対象として発動できる。そのカードを破壊し、手札から雷族モンスター１体を特殊召喚する。このターン、自分は手札からしか効果モンスターを特殊召喚できない。②：このカードがモンスターゾーンに存在する状態で、このカード以外のカードが効果で破壊された場合に発動できる。デッキから「ブリッツクリーク」魔法カードか「天空城塞クーロン」１枚を手札に加える。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：向对手出示手牌的此卡，以场上的1张魔法・陷阱卡为对象可以发动。将该卡破坏，从手牌将1只雷族怪兽特殊召唤。此回合，自己不可从手牌以外的地方特殊召唤效果怪兽。②：此卡存在于怪兽区域的状态下，此卡以外的卡因效果被破坏的情况下可以发动。从牌组将1张“雷盟”魔法卡或“天空城塞 库龙”加入手牌。
