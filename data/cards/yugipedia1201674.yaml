text:
  en: |-
    This card's name becomes "Umi" while in the Monster Zone. You can only use each of the following effects of "Atlantis Dragon Lord - Daedalus" once per turn. If you control "Atlantis, the Dragon City" or "Umi": You can Special Summon this card from your hand. You can send up to 3 face-up "Umi" you control to the GY; add that many cards that mention "Atlantis, the Dragon City" from your Deck to your hand, except Level 7 monsters, then you can send 1 card on the field to the GY.
