    此卡名的①③效果1回合仅可各使用1次。①：自己场上存在“龙都 亚特兰蒂斯”或“海”的情况下可以发动。从手牌将此卡特殊召唤。②：此卡只要存在于怪兽区域，卡名视为“海”。③：将自己场上的最多3张表侧表示的“海”送至墓地可以发动。依其数量，从牌组将除等级7怪兽以外的、记载有“龙都 亚特兰蒂斯”卡名的卡加入手牌。然后，可将场上的1张卡送至墓地。
