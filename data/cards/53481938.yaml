text:
  en: |-
    You can send 1 DARK Dragon monster from your Deck to the GY, except a Level 5 monster; Special Summon this card from your hand, also you cannot Special Summon from the Extra Deck for the rest of this turn, except DARK monsters. When a Link Monster's effect is activated that targets this card on the field (Quick Effect): You can destroy this card, then Special Summon up to 1 "Rokket" monster each from your hand, Deck, GY, and/or banishment, except "Rokket Barrage". You can only use each effect of "Rokket Barrage" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：デッキからレベル５以外のドラゴン族・闇属性モンスター１体を墓地へ送って発動できる。このカードを手札から特殊召喚する。このターン、自分は闇属性モンスターしかＥＸデッキから特殊召喚できない。②：フィールドのこのカードを対象とするＬモンスターの効果が発動した時に発動できる。このカードを破壊する。その後、自分の手札・デッキ・墓地・除外状態からそれぞれ１体まで、「ヴァレット・バラージュ」以外の「ヴァレット」モンスターを特殊召喚する。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 덱에서 레벨 5 이외의 드래곤족 / 어둠 속성 몬스터 1장을 묘지로 보내고 발동할 수 있다. 이 카드를 패에서 특수 소환한다. 이 턴에, 자신은 어둠 속성 몬스터밖에 엑스트라 덱에서 특수 소환할 수 없다. ②: 필드의 이 카드를 대상으로 하는 링크 몬스터의 효과가 발동했을 때에 발동할 수 있다. 이 카드를 파괴한다. 그 후, 자신의 패 / 덱 / 묘지 / 제외 상태에서 각각 1장까지, "바렛 버라지" 이외의 "바렛" 몬스터를 특수 소환한다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：从牌组将1只等级5以外的龙族・暗属性怪兽送至墓地可以发动。从手牌将此卡特殊召唤。此回合，自己从额外牌组仅可特殊召唤暗属性怪兽。②：以场上的此卡为对象的、连接怪兽的效果发动时可以发动。将此卡破坏。然后，从自己手牌・牌组・墓地・除外状态各将最多1只、“枪弹网幕”以外的“枪弹”怪兽特殊召唤。
