text:
  en: |-
    Target 1 face-up monster you control; equip this card to it as an Equip Card with this effect.
    ● Once per battle, during the Battle Step, if the equipped monster battles an opponent's monster: You can destroy that opponent's monster.
    If this card is destroyed: You can add 1 "Armament Reincarnation" from your Deck to your hand. You can only use this effect of "Mirror Barrier" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の②の効果は１ターンに１度しか使用できない。①：自分フィールドの表側表示モンスター１体を対象としてこのカードを発動できる。このカードを以下の効果を持つ装備カード扱いでそのモンスターに装備する。●装備モンスターが相手モンスターと戦闘を行うバトルステップに１度、発動できる。その相手モンスターを破壊する。②：このカードが破壊された場合に発動できる。デッキから「武装転生」１枚を手札に加える。
  ko: |-
    이 카드명의 ②의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 자신 필드의 앞면 표시 몬스터 1장을 대상으로 하고 이 카드를 발동할 수 있다. 이 카드를 이하의 효과를 가지는 장착 카드로 취급하고 그 몬스터에 장착한다. ●장착 몬스터가 상대 몬스터와 전투를 실행하는 배틀 스텝에 1번, 발동할 수 있다. 그 상대 몬스터를 파괴한다. ②: 이 카드가 파괴되었을 경우에 발동할 수 있다. 덱에서 "무장전생" 1장을 패에 넣는다.
  zh-TW:
  zh-CN: |-
    此卡名的②效果1回合仅可使用1次。①：以自己场上的1只表侧表示怪兽为对象可以发动此卡。将此卡视为拥有以下效果的装备卡，装备于该怪兽。
    ●每次装备怪兽与对手怪兽进行战斗的战斗步骤可以发动1次。将该对手怪兽破坏。
    ②：此卡被破坏的情况下可以发动。从牌组将1张“武装转生”加入手牌。
