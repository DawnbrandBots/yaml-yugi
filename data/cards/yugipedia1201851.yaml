text:
  en: |-
    You can Special Summon this card (from your hand) by revealing 1 face-down card you control and returning it to the hand/Extra Deck. You can only Special Summon "Akasuna the Golden Deity Asutra" once per turn this way. You can only use each of the following effects of "Akasuna the Golden Deity Asutra" once per turn. During the Main Phase (Quick Effect): You can send 1 Trap from your hand or face-down field to the GY; change all face-up monsters your opponent controls to face-down Defense Position. During your End Phase: You can Set 1 "Asutra" Trap from your Deck.
