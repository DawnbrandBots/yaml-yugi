  zh-CN: |-
    此卡名以①方法的特殊召唤1回合仅可进行1次，且②③效果1回合仅可各使用1次。①：此卡可通过将自己场上的1张里侧表示卡出示给对手并放回手牌・额外牌组，来从手牌特殊召唤。②：在自己・对手的主要阶段，从自己手牌・场上（里侧表示）将1张陷阱卡送至墓地可以发动。将对手场上的表侧表示怪兽全部改成里侧守备表示。③：在自己的结束阶段可以发动。从牌组将1张“艮鬼”陷阱卡放置在自己场上。
