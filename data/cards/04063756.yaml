  ja: |-
    融合・Ｓ・Ｘ・Ｌモンスターを含むモンスター２体以上
    ①：このカードのリンク先のモンスターの数によって、このカードは以下の効果を得る。●１体以上：１ターンに１度、自分メインフェイズに発動できる。相手フィールドの全ての表側表示モンスターの効果は無効化され、その攻撃力はターン終了時まで半分になる。●２体以上：このカードは相手が発動した効果を受けない。●３体：相手ターンに１度、発動できる。このカード及び相手フィールドのカードを全て除外する。
