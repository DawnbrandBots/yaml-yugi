name:
  en: R.B. Lambda Cannon
  de: R.B. Lambda Kanone
  es: R.B. Cañón Lambda
  fr: Canon Lambda R.B.
  it: R.B. Lambda Cannone
  pt: Canhão Lambda R.B.
  ja: <ruby>Ｒ．Ｂ．<rt>リボルボット</rt></ruby>ラムダキャノン
  ja_romaji: Riborubotto Ramuda Kyanon
  ko: R.B.람다캐논
  ko_rr:
  zh-TW: R.B.拉姆達加農砲
  zh-CN: R.B.拉姆达加农
text:
  en: |-
    If this card is Normal or Special Summoned: You can target 1 "R.B." monster in your GY, except "R.B. Lambda Cannon"; add it to your hand. While this card is linked to an "R.B." Link Monster: You can pay 1200 LP; destroy this card, and if you do, look at your opponent's hand, then you can Special Summon 1 monster from it to their field, but negate its effects. You can only use each effect of "R.B. Lambda Cannon" once per turn.
  de: |-
    Falls diese Karte als Normal- oder Spezialbeschwörung beschworen wird: Du kannst 1 „R.B.“-Monster in deinem Friedhof wählen, außer „R.B. Lambda Kanone“; füge es deiner Hand hinzu. Solange diese Karte mit einem „R.B.“-Linkmonster verlinkt ist: Du kannst 1200 LP zahlen; zerstöre diese Karte und falls du dies tust, sieh dir die Hand deines Gegners an, dann kannst du 1 Monster davon als Spezialbeschwörung auf seine Spielfeldseite beschwören, aber annulliere seine Effekte. Du kannst jeden Effekt von „R.B. Lambda Kanone“ nur einmal pro Spielzug verwenden.
  es: |-
    Si esta carta es Invocada de Modo Normal o Especial: puedes seleccionar 1 monstruo "R.B." en tu Cementerio, excepto "R.B. Cañón Lambda"; añádelo a tu mano. Mientras esta carta está enlazada a un Monstruo de Enlace "R.B.": puedes pagar 1200 LP; destruye esta carta y, si lo haces, mira la mano de tu adversario, y después puedes Invocar de Modo Especial 1 monstruo desde ella a su Campo, pero niega sus efectos. Sólo puedes usar cada efecto de "R.B. Cañón Lambda" una vez por turno.
  fr: |-
    Si cette carte est Invoquée Normalement ou Spécialement : vous pouvez cibler 1 monstre "R.B." ("Canon Lambda R.B." exclu) dans votre Cimetière ; ajoutez-le à votre main. Tant que cette carte est liée à un Monstre Lien "R.B." : vous pouvez payer 1200 LP ; détruisez cette carte, et si vous le faites, regardez la main de votre adversaire, puis vous pouvez en Invoquer Spécialement 1 monstre sur son Terrain, mais annulez ses effets. Vous ne pouvez utiliser chaque effet de "Canon Lambda R.B." qu'une fois par tour.
  it: |-
    Se questa carta viene Evocata Normalmente o Specialmente: puoi scegliere come bersaglio 1 mostro "R.B." nel tuo Cimitero, eccetto "R.B. Lambda Cannone"; aggiungilo alla tua mano. Mentre questa carta è linkata a un Mostro Link "R.B.": puoi pagare 1200 LP; distruggi questa carta e, se lo fai, guarda la mano del tuo avversario, poi puoi Evocare Specialmente 1 mostro da essa sul suo Terreno, ma annulla i suoi effetti. Puoi utilizzare ogni effetto di "R.B. Lambda Cannone" una sola volta per turno.
  pt: |-
    Se este card for Invocado por Invocação-Normal ou Especial: você pode escolher 1 monstro "R.B." no seu Cemitério, exceto "Canhão Lambda R.B."; adicione-o à sua mão. Enquanto este card estiver linkado a um Monstro Link "R.B.": você pode pagar 1200 PV; destrua este card e, se isso acontecer, olhe a mão do seu oponente e, depois, você pode Invocar por Invocação-Especial 1 monstro dela no campo dele, mas negue seus efeitos. Você só pode usar cada efeito de "Canhão Lambda R.B." uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが召喚・特殊召喚した場合、「Ｒ．Ｂ．ラムダキャノン」以外の自分の墓地の「Ｒ．Ｂ．」モンスター１体を対象として発動できる。そのモンスターを手札に加える。②：このカードが「Ｒ．Ｂ．」Ｌモンスターとリンク状態の場合、１２００ＬＰを払って発動できる。このカードを破壊し、相手の手札を全て確認する。その後、その内のモンスター１体を選んで相手フィールドに特殊召喚できる。この効果で特殊召喚したモンスターの効果は無効化される。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：此卡召唤・特殊召唤的情况下，以“R.B.拉姆达加农”以外的、自己墓地的1只“R.B.”怪兽为对象可以发动。将该怪兽加入手牌。②：此卡和“R.B.”连接怪兽为连接状态的情况下，支付1200LP可以发动。将此卡破坏，确认对手的所有手牌。然后，可挑选其中的1只怪兽特殊召唤至对手场上。以此效果特殊召唤的怪兽的效果无效化。
