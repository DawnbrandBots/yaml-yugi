name:
  en: Melffy Playtime Surprise
  de: Melffy-Spielzeit-Überraschung
  es: Sorpresa en los Juegos Melffy
  fr: Surprise pour la Pause Melffy
  it: Sorpresa Ricreazione Melffy
  pt: Recreação Surpresa dos Melffy
  ja: どきどきメルフィータイム
  ja_romaji: Dokidoki Merufī Taimu
  ko:
  ko_rr:
  zh-TW:
  zh-CN: 扑通通梅尔菲时间
text:
  en: |-
    Target 1 "Melffy" monster in your field or GY; return it to the hand, then you can Fusion Summon 1 Beast Fusion Monster from your Extra Deck, using monsters from your hand or field. If you control a "Melffy" Xyz Monster: You can banish this card from your GY; for the rest of this turn, "Melffy" monsters you control that are Special Summoned from the Extra Deck are unaffected by your opponent's activated effects. You can only use each effect of "Melffy Playtime Surprise" once per turn.
  de: |-
    Wähle 1 „Melffy“-Monster auf deiner Spielfeldseite oder in deinem Friedhof; gib es auf die Hand zurück, dann kannst du 1 Ungeheuer-Fusionsmonster als Fusionsbeschwörung von deinem Extra Deck beschwören, indem du Monster von deiner Hand oder Spielfeldseite verwendest. Falls du ein „Melffy“-Xyz-Monster kontrollierst: Du kannst diese Karte von deinem Friedhof verbannen; für den Rest dieses Spielzugs bleiben „Melffy“-Monster, die du kontrollierst und die als Spezialbeschwörung vom Extra Deck beschworen werden, von aktivierten Effekten deines Gegners unberührt. Du kannst jeden Effekt von „Melffy-Spielzeit-Überraschung“ nur einmal pro Spielzug verwenden.
  es: |-
    Selecciona 1 monstruo "Melffy" en tu Campo o Cementerio; devuélvelo a la mano, y después puedes Invocar por Fusión 1 Monstruo de Fusión Bestia desde tu Deck Extra, usando monstruos en tu mano o Campo. Si controlas un Monstruo Xyz "Melffy": puedes desterrar esta carta en tu Cementerio; por el resto de este turno, los monstruos "Melffy" que controlas que sean Invocados de Modo Especial desde el Deck Extra no son afectados por los efectos activados de tu adversario. Sólo puedes usar cada efecto de "Sorpresa en los Juegos Melffy" una vez por turno.
  fr: |-
    Ciblez 1 monstre "Melffy" dans votre Terrain ou Cimetière ; renvoyez-le à la main, puis vous pouvez Invoquer par Fusion 1 Monstre Fusion Bête depuis votre Extra Deck, en utilisant des monstres depuis votre main ou Terrain. Si vous contrôlez un Monstre Xyz "Melffy" : vous pouvez bannir cette carte depuis votre Cimetière ; le reste de ce tour, les monstres "Melffy" que vous contrôlez qui ont été Invoqués Spécialement depuis l'Extra Deck ne sont pas affectés par les effets activés de votre adversaire. Vous ne pouvez utiliser chaque effet de "Surprise pour la Pause Melffy" qu'une fois par tour.
  it: |-
    Scegli come bersaglio 1 mostro "Melffy" nel tuo Terreno o Cimitero; fallo ritornare nella mano, poi puoi Evocare tramite Fusione 1 Mostro Fusione Bestia dal tuo Extra Deck, utilizzando mostri dalla tua mano o Terreno. Se controlli un Mostro Xyz "Melffy": puoi bandire questa carta dal tuo Cimitero; per il resto di questo turno, i mostri "Melffy" che controlli che sono stati Evocati Specialmente dall'Extra Deck sono immuni agli effetti attivati del tuo avversario. Puoi utilizzare ogni effetto di "Sorpresa Ricreazione Melffy" una sola volta per turno.
  pt: |-
    Escolha 1 monstro "Melffy" no seu campo ou Cemitério; devolva-o para a mão e, depois, você pode Invocar por Invocação-Fusão 1 Monstro de Fusão Besta do seu Deck Adicional, usando monstros da sua mão ou do campo. Se você controlar um Monstro Xyz "Melffy": você pode banir este card do seu Cemitério; pelo resto deste turno, monstros "Melffy" que você controla que forem Invocados por Invocação-Especial do Deck Adicional não são afetados pelos efeitos ativados do seu oponente. Você só pode usar cada efeito de "Recreação Surpresa dos Melffy" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分のフィールド・墓地の「メルフィー」モンスター１体を対象として発動できる。そのモンスターを手札に戻す。その後、自分の手札・フィールドのモンスターを融合素材とし、獣族の融合モンスター１体を融合召喚できる。②：自分フィールドに「メルフィー」Ｘモンスターが存在する場合、墓地のこのカードを除外して発動できる。このターン中、ＥＸデッキから特殊召喚された自分フィールドの「メルフィー」モンスターは相手が発動した効果を受けない。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：以自己场上・墓地的1只“梅尔菲”怪兽为对象可以发动。将该怪兽放回手牌。然后，可将自己手牌・场上的怪兽作为融合素材，将1只兽族融合怪兽融合召唤。②：自己场上存在“梅尔菲”超量怪兽的情况下，将墓地的此卡除外可以发动。在此回合中，被从额外牌组特殊召唤的、自己场上的“梅尔菲”怪兽不受对手发动的效果影响。
