text:
  en: |-
    Target 1 "Melffy" monster in your field or GY; return it to the hand, then you can Fusion Summon 1 Beast Fusion Monster from your Extra Deck, using monsters from your hand or field. If you control a "Melffy" Xyz Monster: You can banish this card from your GY; "Melffy" monsters you control that were Special Summoned from the Extra Deck are unaffected by your opponent's activated effects this turn. You can only use each effect of "Exciting Melffy Time" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分のフィールド・墓地の「メルフィー」モンスター１体を対象として発動できる。そのモンスターを手札に戻す。その後、自分の手札・フィールドのモンスターを融合素材とし、獣族の融合モンスター１体を融合召喚できる。②：自分フィールドに「メルフィー」Ｘモンスターが存在する場合、墓地のこのカードを除外して発動できる。このターン中、ＥＸデッキから特殊召喚された自分フィールドの「メルフィー」モンスターは相手が発動した効果を受けない。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：以自己场上・墓地的1只“梅尔菲”怪兽为对象可以发动。将该怪兽放回手牌。然后，可将自己手牌・场上的怪兽作为融合素材，将1只兽族融合怪兽融合召唤。②：自己场上存在“梅尔菲”超量怪兽的情况下，将墓地的此卡除外可以发动。在此回合中，被从额外牌组特殊召唤的、自己场上的“梅尔菲”怪兽不受对手发动的效果影响。
