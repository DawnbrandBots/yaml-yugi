name:
  en: Once Upon a Fairy Tail
  de: Es war einmal ein Märchenschweif
  es: Érase una Vez un Colacuento
  fr: Il Était un Animal Féérique
  it: C'Era una Codafavola
  pt: Era uma Vez a Cauda de Fadas
  ja: <ruby>妖精伝姫<rt>フェアリーテイル</rt></ruby>のはじまりはじまり
  ja_romaji: Fearī Teiru no Hajimari Hajimari
  ko: 페어리테일의 옛날옛적에
  ko_rr:
  zh-TW:
  zh-CN: 妖精传姬要开始啰要开始啰
text:
  en: |-
    Special Summon up to 1 LIGHT "Fairy Tail" monster each from your hand, GY, and banishment, with different names, also you cannot Special Summon for the rest of this turn, except Spellcaster monsters. If this card is banished, or sent to the GY except from the field: You can Set this card, but it cannot be activated unless you control a "Fairy Tail" monster. You can only use each effect of "Once Upon a Fairy Tail" once per turn.
  de: |-
    Beschwöre bis zu je 1 LICHT „Märchenschweif“-Monster mit unterschiedlichen Namen als Spezialbeschwörung von deiner Hand, deinem Friedhof und deinen verbannten Karten, zusätzlich kannst du für den Rest dieses Spielzugs keine Spezialbeschwörungen durchführen, außer von Hexer-Monstern. Falls diese Karte verbannt oder auf den Friedhof gelegt wird, außer vom Spielfeld: Du kannst diese Karte setzen, aber sie kann nicht aktiviert werden, es sei denn, du kontrollierst ein „Märchenschweif“-Monster. Du kannst jeden Effekt von „Es war einmal ein Märchenschweif“ nur einmal pro Spielzug verwenden.
  es: |-
    Invoca de Modo Especial hasta 1 monstruo "Colacuento" de LUZ desde tu mano, Cementerio y destierro, cada uno con nombres diferentes, y además no puedes Invocar de Modo Especial por el resto de este turno, excepto monstruos Lanzador de Conjuros. Si esta carta es desterrada, o mandada al Cementerio excepto desde el Campo: puedes Colocar esta carta, pero no puede ser activada a menos que controles un monstruo "Colacuento". Sólo puedes usar cada efecto de "Érase una Vez un Colacuento" una vez por turno.
  fr: |-
    Invoquez Spécialement max. 1 monstre "Animal Féérique" LUMIÈRE depuis votre main, max. 1 depuis votre Cimetière et max. 1 depuis votre bannissement, de noms différents, et aussi, vous ne pouvez pas Invoquer Spécialement (monstres Magicien exclus) le reste de ce tour. Si cette carte est bannie, ou envoyée au Cimetière sauf depuis le Terrain : vous pouvez Poser cette carte, mais elle ne peut pas être activée sauf si vous contrôlez un monstre "Animal Féérique". Vous ne pouvez utiliser chaque effet de "Il Était un Animal Féérique" qu'une fois par tour.
  it: |-
    Evoca Specialmente fino a 1 mostro LUCE "Codafavola" ciascuno dalla tua mano, Cimitero e carte bandite, con nomi diversi, inoltre non puoi Evocare Specialmente per il resto di questo turno, eccetto mostri Incantatore. Se questa carta viene bandita, o mandata al Cimitero eccetto dal Terreno: puoi Posizionare questa carta, ma essa non può essere attivata a meno che tu controlli un mostro "Codafavola". Puoi utilizzare ogni effetto di "C'Era una Codafavola" una sola volta per turno.
  pt: |-
    Invoque por Invocação-Especial até 1 monstro "Cauda de Fadas" de LUZ cada da sua mão, do Cemitério e do banimento, com nomes diferentes e, além disso, você não pode Invocar por Invocação-Especial pelo resto deste turno, exceto monstros Mago. Se este card for banido, ou enviado para o Cemitério exceto do campo: você pode Baixar este card, mas ele não pode ser ativado a não ser que você controle um monstro "Cauda de Fadas". Você só pode usar cada efeito de "Era uma Vez a Cauda de Fadas" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分の手札・墓地・除外状態からそれぞれ１体まで、光属性の「妖精伝姫」モンスターを特殊召喚する（同名カードは１枚まで）。このターン、自分は魔法使い族モンスターしか特殊召喚できない。②：このカードが除外された場合、またはフィールド以外から墓地へ送られた場合に発動できる。このカードを自分フィールドにセットする。この効果でセットしたこのカードは、自分フィールドに「妖精伝姫」モンスターが存在しない場合には発動できない。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신의 패 / 묘지 / 제외 상태에서 각각 1장까지, 빛 속성의 "페어리테일" 몬스터를 특수 소환한다(같은 이름의 카드는 1장까지). 이 턴에, 자신은 마법사족 몬스터밖에 특수 소환할 수 없다. ②: 이 카드가 제외되었을 경우, 또는 필드 이외에서 묘지로 보내졌을 경우에 발동할 수 있다. 이 카드를 자신 필드에 세트한다. 이 효과로 세트한 이 카드는, 자신 필드에 "페어리테일" 몬스터가 존재하지 않을 경우에는 발동할 수 없다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：从自己手牌・墓地・除外状态各将最多1只光属性的“妖精传姬”怪兽特殊召唤（同名卡最多1张）。此回合，自己仅可特殊召唤魔法师族怪兽。②：此卡被除外的情况下，或从场上以外的地方被送至墓地的情况下可以发动。将此卡放置在自己场上。以此效果放置的此卡，在自己场上不存在“妖精传姬”怪兽的情况下就不可发动。
