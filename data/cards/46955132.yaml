name:
  en: Melffy Rabbys
  de: Melffy-Kanis
  es: Conejis Melffy
  fr: Lappys Melffy
  it: Melffy Rabbys
  pt: Melffy Rabbys
  ja: メルフィー・ラビィーズ
  ja_romaji: Merufī Rabyīzu
  ko: 메르피 래비즈
  ko_rr:
  zh-TW:
  zh-CN: 梅尔菲・拉比好朋友
text:
  en: |-
    If your opponent Normal or Special Summons a monster(s) (except during the Damage Step): You can Special Summon this card from your hand, then you can Fusion Summon 1 "Melffy" Fusion Monster from your Extra Deck, using monsters from your hand or field. If this card is Normal or Special Summoned: You can add 1 "Melffy" monster from your Deck to your hand, then if you added a Normal Monster, you can Special Summon any number of Beast monsters from your hand. You can only use 1 "Melffy Rabbys" effect per turn, and only once that turn.
  de: |-
    Falls dein Gegner ein oder mehr Monster als Normal- oder Spezialbeschwörung beschwört (außer während des Damage Steps): Du kannst diese Karte als Spezialbeschwörung von deiner Hand beschwören, dann kannst du 1 „Melffy“-Fusionsmonster als Fusionsbeschwörung von deinem Extra Deck beschwören, indem du Monster von deiner Hand oder Spielfeldseite verwendest. Falls diese Karte als Normal- oder Spezialbeschwörung beschworen wird: Du kannst deiner Hand 1 „Melffy“-Monster von deinem Deck hinzufügen, dann, falls du ein Normales Monster hinzugefügt hast, kannst du eine beliebige Anzahl Ungeheuer-Monster als Spezialbeschwörung von deiner Hand beschwören. Du kannst nur 1 Effekt von „Melffy-Kanis“ pro Spielzug verwenden und in jenem Spielzug nur einmal.
  es: |-
    Si tu adversario Invoca de Modo Normal o Especial uno o más monstruos (excepto durante el Damage Step): puedes Invocar esta carta de Modo Especial desde tu mano, y después puedes Invocar por Fusión 1 Monstruo de Fusión "Melffy" desde tu Deck Extra, usando monstruos en tu mano o Campo. Si esta carta es Invocada de Modo Normal o Especial: puedes añadir a tu mano 1 monstruo "Melffy" en tu Deck y después, si añadiste un Monstruo Normal, puedes Invocar de Modo Especial cualquier número de monstruos Bestia desde tu mano. Sólo puedes usar 1 efecto de "Conejis Melffy" por turno, y sólo una vez ese turno.
  fr: |-
    Si votre adversaire Invoque Normalement ou Spécialement un ou plusieurs monstres (sauf durant la Damage Step) : vous pouvez Invoquer Spécialement cette carte depuis votre main, puis vous pouvez Invoquer par Fusion 1 Monstre Fusion "Melffy" depuis votre Extra Deck, en utilisant des monstres depuis votre main ou Terrain. Si cette carte est Invoquée Normalement ou Spécialement : vous pouvez ajouter 1 monstre "Melffy" depuis votre Deck à votre main, puis si vous avez ajouté un Monstre Normal, vous pouvez Invoquer Spécialement un nombre de votre choix de monstres Bête depuis votre main. Vous ne pouvez utiliser qu'1 effet de "Lappys Melffy" par tour, et uniquement une fois le tour.
  it: |-
    Se il tuo avversario Evoca Normalmente o Specialmente uno o più mostri (eccetto durante il Damage Step): puoi Evocare Specialmente questa carta dalla tua mano, poi puoi Evocare tramite Fusione 1 Mostro Fusione "Melffy" dal tuo Extra Deck, utilizzando mostri dalla tua mano o Terreno. Se questa carta viene Evocata Normalmente o Specialmente: puoi aggiungere 1 mostro "Melffy" dal tuo Deck alla tua mano, poi se hai aggiunto un Mostro Normale, puoi Evocare Specialmente un qualsiasi numero di mostri Bestia dalla tua mano. Puoi utilizzare solo 1 effetto di "Melffy Rabbys" per turno, e solo una volta in quel turno.
  pt: |-
    Se seu oponente Invocar um ou mais monstros por Invocação-Normal ou Especial (exceto durante a Etapa de Dano): você pode Invocar este card por Invocação-Especial da sua mão e, depois, você pode Invocar por Invocação-Fusão 1 Monstro de Fusão "Melffy" do seu Deck Adicional, usando monstros da sua mão ou do campo. Se este card for Invocado por Invocação-Normal ou Especial: você pode adicionar 1 monstro "Melffy" do seu Deck à sua mão e, depois, se você adicionou um Monstro Normal, você pode Invocar por Invocação-Especial qualquer número de monstros Besta da sua mão. Você só pode usar 1 efeito de "Melffy Rabbys" por turno e apenas uma vez por turno.
  ja: |-
    このカード名の①②の効果は１ターンに１度、いずれか１つしか使用できない。①：相手がモンスターを召喚・特殊召喚した場合に発動できる。このカードを手札から特殊召喚する。その後、自分の手札・フィールドのモンスターを融合素材とし、「メルフィー」融合モンスター１体を融合召喚できる。②：このカードが召喚・特殊召喚した場合に発動できる。デッキから「メルフィー」モンスター１体を手札に加える。この効果で通常モンスターを手札に加えた場合、さらに手札から獣族モンスターを任意の数だけ特殊召喚できる。
  ko: |-
    이 카드명의 ①②의 효과는 1턴에 1번, 어느 쪽이든 1개밖에 사용할 수 없다. ①: 상대가 몬스터를 일반 소환 / 특수 소환했을 경우에 발동할 수 있다. 이 카드를 패에서 특수 소환한다. 그 후, 자신의 패 / 필드의 몬스터를 융합 소재로 하고, "메르피" 융합 몬스터 1장을 융합 소환할 수 있다. ②: 이 카드를 일반 소환 / 특수 소환했을 경우에 발동할 수 있다. 덱에서 "메르피" 몬스터 1장을 패에 넣는다. 이 효과로 일반 몬스터를 패에 넣었을 경우, 추가로 패에서 야수족 몬스터를 임의의 수만큼 특수 소환할 수 있다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合1次，仅可使用其中1个。①：对手将怪兽召唤・特殊召唤的情况下可以发动。从手牌将此卡特殊召唤。然后，可将自己手牌・场上的怪兽作为融合素材，将1只“梅尔菲”融合怪兽融合召唤。②：此卡召唤・特殊召唤的情况下可以发动。从牌组将1只“梅尔菲”怪兽加入手牌。以此效果将通常怪兽加入了手牌的情况下，进而可从手牌将任意数量的兽族怪兽特殊召唤。
