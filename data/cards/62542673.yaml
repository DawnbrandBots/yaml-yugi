text:
  en: |-
    If this card is Normal or Special Summoned: You can target 1 monster your opponent controls; banish it until the next Standby Phase. You can send 1 "Destiny HERO" monster from your Deck to the GY; add 1 "Clock Tower Prison" or "Dark City at Midnight" from your Deck or GY to your hand, also you cannot Special Summon for the rest of this turn, except DARK "HERO" monsters. You can only use each effect of "Destiny HERO - Doom Overlord" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが召喚・特殊召喚した場合、相手フィールドのモンスター１体を対象として発動できる。そのモンスターを次のスタンバイフェイズまで除外する。②：デッキから「Ｄ－ＨＥＲＯ」モンスター１体を墓地へ送って発動できる。自分のデッキ・墓地から「幽獄の時計塔」か「幽獄の時計都市－ダーク・シティ」１枚を手札に加える。この効果の発動後、ターン終了時まで自分は闇属性の「ＨＥＲＯ」モンスターしか特殊召喚できない。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：此卡召唤・特殊召唤的情况下，以对手场上的1只怪兽为对象可以发动。将该怪兽直至下个准备阶段为止除外。②：从牌组将1只“命运－英雄”怪兽送至墓地可以发动。从自己牌组・墓地将1张“幽狱时钟塔”或“幽狱时钟都市－黑暗城市”加入手牌。此效果发动后，直至回合结束时为止，自己仅可特殊召唤暗属性的“－英雄”怪兽。
