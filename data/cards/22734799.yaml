name:
  en: Summoner of the Sacred Beasts
  de: Beschwörer der heiligen Ungeheuer
  es: Invocador de las Bestias Sagradas
  fr: Invocateur des Bêtes Sacrées
  it: Evocatore delle Bestie Sacre
  pt: Invocador das Bestas Sagradas
  ja: <ruby>三<rt>さん</rt></ruby><ruby>幻<rt>げん</rt></ruby><ruby>魔<rt>ま</rt></ruby>の<ruby>操<rt>そう</rt></ruby><ruby>世<rt>せい</rt></ruby><ruby>者<rt>しゃ</rt></ruby>
  ja_romaji: Sangenma no Sōseisha
  ko:
  ko_rr:
  zh-TW:
  zh-CN: 三幻魔操世者
text:
  en: |-
    You can reveal this card in your hand; discard 1 card, and if you do, Special Summon 1 "Sacred Beast" monster from your hand in Defense Position, except a Level 8 monster. You can discard 1 card; Special Summon 1 "Sacred Beast" monster from your hand or GY in Defense Position, except a Level 8 monster or the discarded card. You can banish this card from your GY; Special Summon 1 "Sacred Beast" monster from your GY in Defense Position, except a Level 8 monster. You can only use each effect of "Summoner of the Sacred Beasts" once per turn.
  de: |-
    Du kannst diese Karte in deiner Hand vorzeigen; wirf 1 Karte ab und falls du dies tust, beschwöre 1 „Heiligen Ungeheuer“-Monster als Spezialbeschwörung von deiner Hand in die Verteidigungsposition, außer einem Monster der Stufe 8. Du kannst 1 Karte abwerfen; beschwöre 1 „Heiligen Ungeheuer“-Monster als Spezialbeschwörung von deiner Hand oder deinem Friedhof in die Verteidigungsposition, außer einem Monster der Stufe 8 und der abgeworfenen Karte. Du kannst diese Karte von deinem Friedhof verbannen; beschwöre 1 „Heiligen Ungeheuer“-Monster als Spezialbeschwörung von deinem Friedhof in die Verteidigungsposition, außer einem Monster der Stufe 8. Du kannst jeden Effekt von „Beschwörer der heiligen Ungeheuer“ nur einmal pro Spielzug verwenden.
  es: |-
    Puedes mostrar esta carta en tu mano; descarta 1 carta y, si lo haces, Invoca de Modo Especial 1 monstruo "Bestias Sagradas" desde tu mano en Posición de Defensa, excepto un monstruo de Nivel 8. Puedes descartar 1 carta; Invoca de Modo Especial 1 monstruo "Bestias Sagradas" desde tu mano o Cementerio en Posición de Defensa, excepto un monstruo de Nivel 8 o la carta descartada. Puedes desterrar esta carta en tu Cementerio; Invoca de Modo Especial 1 monstruo "Bestias Sagradas" desde tu Cementerio en Posición de Defensa, excepto un monstruo de Nivel 8. Sólo puedes usar cada efecto de "Invocador de las Bestias Sagradas" una vez por turno.
  fr: |-
    Vous pouvez révéler cette carte dans votre main ; défaussez 1 carte, et si vous le faites, Invoquez Spécialement 1 monstre "Bêtes Sacrées" (monstres de Niveau 8 exclus) depuis votre main en Position de Défense. Vous pouvez défausser 1 carte ; Invoquez Spécialement 1 monstre "Bêtes Sacrées" (monstres de Niveau 8 et la carte défaussée exclus) depuis votre main ou Cimetière en Position de Défense. Vous pouvez bannir cette carte depuis votre Cimetière ; Invoquez Spécialement 1 monstre "Bêtes Sacrées" (monstres de Niveau 8 exclus) depuis votre Cimetière en Position de Défense. Vous ne pouvez utiliser chaque effet de "Invocateur des Bêtes Sacrées" qu'une fois par tour.
  it: |-
    Puoi rivelare questa carta nella tua mano; scarta 1 carta e, se lo fai, Evoca Specialmente 1 mostro "Bestia Sacra" dalla tua mano in Posizione di Difesa, eccetto un mostro di Livello 8. Puoi scartare 1 carta; Evoca Specialmente 1 mostro "Bestia Sacra" dalla tua mano o Cimitero in Posizione di Difesa, eccetto un mostro di Livello 8 o la carta scartata. Puoi bandire questa carta dal tuo Cimitero; Evoca Specialmente 1 mostro "Bestia Sacra" dal tuo Cimitero in Posizione di Difesa, eccetto un mostro di Livello 8. Puoi utilizzare ogni effetto di "Evocatore delle Bestie Sacre" una sola volta per turno.
  pt: |-
    Você pode revelar este card na sua mão; descarte 1 card e, se isso acontecer, Invoque por Invocação-Especial 1 monstro "Bestas Sagradas" da sua mão em Posição de Defesa, exceto um monstro de Nível 8. Você pode descartar 1 card; Invoque por Invocação-Especial 1 monstro "Bestas Sagradas" da sua mão ou do Cemitério, em Posição de Defesa, exceto um monstro de Nível 8 ou o card descartado. Você pode banir este card do seu Cemitério; Invoque por Invocação-Especial 1 monstro "Bestas Sagradas" do seu Cemitério em Posição de Defesa, exceto um monstro de Nível 8. Você só pode usar cada efeito de "Invocador das Bestas Sagradas" uma vez por turno.
  ja: |-
    このカード名の①②③の効果はそれぞれ１ターンに１度しか使用できない。①：手札のこのカードを相手に見せて発動できる。自分の手札を１枚選んで捨て、手札からレベル８以外の「三幻魔」モンスター１体を守備表示で特殊召喚する。②：手札を１枚捨てて発動できる。捨てたカードを除く、レベル８以外の「三幻魔」モンスター１体を自分の手札・墓地から守備表示で特殊召喚する。③：墓地のこのカードを除外して発動できる。自分の墓地からレベル８以外の「三幻魔」モンスター１体を守備表示で特殊召喚する。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②③效果1回合仅可各使用1次。①：向对手出示手牌的此卡可以发动。挑选自己的1张手牌舍弃，从手牌将1只等级8以外的“三幻魔”怪兽以守备表示特殊召唤。②：舍弃1张手牌可以发动。从自己手牌・墓地将除所舍弃的卡以外的、1只等级8以外的“三幻魔”怪兽以守备表示特殊召唤。③：将墓地的此卡除外可以发动。从自己墓地将1只等级8以外的“三幻魔”怪兽以守备表示特殊召唤。
