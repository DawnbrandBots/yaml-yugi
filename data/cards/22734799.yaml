text:
  en: |-
    You can reveal this card in your hand; discard 1 card, and if you do, Special Summon 1 "Sacred Beast" monster from your hand in Defense Position, except a Level 8 monster. You can discard 1 card; Special Summon 1 "Sacred Beast" monster from your hand or GY in Defense Position, except a Level 8 monster or the discarded card. You can banish this card from your GY; Special Summon 1 "Sacred Beast" monster from your GY in Defense Position, except a Level 8 monster. You can only use each effect of "The Orchestrator of the Sacred Beasts" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②③の効果はそれぞれ１ターンに１度しか使用できない。①：手札のこのカードを相手に見せて発動できる。自分の手札を１枚選んで捨て、手札からレベル８以外の「三幻魔」モンスター１体を守備表示で特殊召喚する。②：手札を１枚捨てて発動できる。捨てたカードを除く、レベル８以外の「三幻魔」モンスター１体を自分の手札・墓地から守備表示で特殊召喚する。③：墓地のこのカードを除外して発動できる。自分の墓地からレベル８以外の「三幻魔」モンスター１体を守備表示で特殊召喚する。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②③效果1回合仅可各使用1次。①：向对手出示手牌的此卡可以发动。挑选自己的1张手牌舍弃，从手牌将1只等级8以外的“三幻魔”怪兽以守备表示特殊召唤。②：舍弃1张手牌可以发动。从自己手牌・墓地将除所舍弃的卡以外的、1只等级8以外的“三幻魔”怪兽以守备表示特殊召唤。③：将墓地的此卡除外可以发动。从自己墓地将1只等级8以外的“三幻魔”怪兽以守备表示特殊召唤。
