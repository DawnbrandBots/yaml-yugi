  pt:
  ja: |-
    このカード名の、①の方法による特殊召喚は１ターンに１度しかできず、②の効果は１ターンに１度しか使用できない。①：このカードは、自分フィールドのモンスターを含む自分・相手フィールドの攻撃力２０００以上の表側表示モンスター２体をリリースして手札から特殊召喚できる。②：自分・相手のメインフェイズに、フィールドのこのカードを除外して発動できる。自分のデッキ・墓地から「銀河眼の光子竜」１体を特殊召喚する。その後、ＥＸデッキから特殊召喚された相手フィールドのモンスター１体をエンドフェイズまで除外できる。
