text:
  en: |-
    You can Special Summon this card (from your hand) by Tributing 2 face-up monsters on either field with 2000 or more ATK, including a monster you control. You can only Special Summon "Galaxy-Eyes Photon Change Dragon" once per turn this way. During the Main Phase (Quick Effect): You can banish this card you control; Special Summon 1 "Galaxy-Eyes Photon Dragon" from your Deck or GY, then you can banish 1 monster your opponent controls that was Special Summoned from the Extra Deck until the End Phase. You can only use this effect of "Galaxy-Eyes Photon Change Dragon" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の、①の方法による特殊召喚は１ターンに１度しかできず、②の効果は１ターンに１度しか使用できない。①：このカードは、自分フィールドのモンスターを含む自分・相手フィールドの攻撃力２０００以上の表側表示モンスター２体をリリースして手札から特殊召喚できる。②：自分・相手のメインフェイズに、フィールドのこのカードを除外して発動できる。自分のデッキ・墓地から「銀河眼の光子竜」１体を特殊召喚する。その後、ＥＸデッキから特殊召喚された相手フィールドのモンスター１体をエンドフェイズまで除外できる。
  ko: |-
    이 카드명의, ①의 방법에 의한 특수 소환은 1턴에 1번밖에 할 수 없으며, ②의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 이 카드는, 자신 필드의 몬스터를 포함하는 자신 / 상대 필드의 공격력 2000 이상인 앞면 표시 몬스터 2장을 릴리스하고 패에서 특수 소환할 수 있다. ②: 자신 / 상대의 메인 페이즈에, 필드의 이 카드를 제외하고 발동할 수 있다. 자신의 덱 / 묘지에서 "갤럭시아이즈 포톤 드래곤" 1장을 특수 소환한다. 그 후, 엑스트라 덱에서 특수 소환된 상대 필드의 몬스터 1장을 엔드 페이즈까지 제외할 수 있다.
  zh-TW:
  zh-CN: |-
    此卡名以①方法的特殊召唤1回合仅可进行1次，且②效果1回合仅可使用1次。①：此卡可解放包含自己场上的怪兽在内的、自己・对手场上的2只攻击力2000以上的表侧表示怪兽来从手牌特殊召唤。②：在自己・对手的主要阶段，将场上的此卡除外可以发动。从自己牌组・墓地将1只“银河眼光子龙”特殊召唤。然后，可将对手场上的1只被从额外牌组特殊召唤的怪兽直至结束阶段为止除外。
