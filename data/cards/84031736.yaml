name:
  en: Clown Crew Finale
  de: Clowntrupp-Finale
  es: Finale de la Compañía de Payasos
  fr: Final de la Troupe des Clowns
  it: Finale Compagnia di Clown
  pt: Final da Companhia de Palhaços
  ja: <ruby>道化の一座<rt>クラウン・クラン</rt></ruby>『<ruby>終演<rt>フィナーレ</rt></ruby>』
  ja_romaji: Kuraun Kuran "Fināre"
  ko:
  ko_rr:
  zh-TW:
  zh-CN: 小丑戏帮《终演》
text:
  en: |-
    If you control a Tribute Summoned monster: Discard any number of cards, then target that many face-up cards on the field; destroy them. You can banish this card from your GY, and Tribute 1 Ritual, Fusion, Synchro, Xyz, Pendulum, or Link Monster from your hand or field; add 1 "Clown Crew" monster with a different original Level/Rank/Link Rating from your Deck or GY to your hand. You can only use each effect of "Clown Crew Finale" once per turn.
  de: |-
    Falls du ein als Tributbeschwörung beschworenes Monster kontrollierst: Wirf eine beliebige Anzahl Karten ab und wähle dann ebenso viele offene Karten auf dem Spielfeld; zerstöre sie. Du kannst diese Karte von deinem Friedhof verbannen und 1 Ritual-, Fusions-, Synchro-, Xyz-, Pendel- oder Linkmonster von deiner Hand oder Spielfeldseite als Tribut anbieten; füge deiner Hand 1 „Clowntrupp“-Monster mit einer/einem unterschiedlichen Grund-Stufe/-Rang/-Linkzahl von deinem Deck oder Friedhof hinzu. Du kannst jeden Effekt von „Clowntrupp-Finale“ nur einmal pro Spielzug verwenden.
  es: |-
    Si controlas un monstruo Invocado por Sacrificio: descarta cualquier número de cartas, y después selecciona ese número de cartas boca arriba en el Campo; destrúyelas. Puedes desterrar esta carta en tu Cementerio, y Sacrifica 1 Monstruo de Ritual, Fusión, Sincronía, Xyz, Péndulo o Enlace en tu mano o Campo; añade a tu mano 1 monstruo "Compañía de Payasos" con un Nivel/Rango/Rating de Enlace original diferente en tu Deck o Cementerio. Sólo puedes usar cada efecto de "Finale de la Compañía de Payasos" una vez por turno.
  fr: |-
    Si vous contrôlez un monstre Invoqué par Sacrifice : défaussez un nombre de votre choix de cartes, puis ciblez autant de cartes face recto sur le Terrain ; détruisez-les. Vous pouvez bannir cette carte depuis votre Cimetière, et Sacrifiez 1 Monstre Rituel, Fusion, Synchro, Xyz, Pendule ou Lien depuis votre main ou Terrain ; ajoutez 1 monstre "Troupe des Clowns" de Niveau/Rang/Classification Lien d'origine différent depuis votre Deck ou Cimetière à votre main. Vous ne pouvez utiliser chaque effet de "Final de la Troupe des Clowns" qu'une fois par tour.
  it: |-
    Se controlli un mostro Evocato tramite Tributo: scarta un qualsiasi numero di carte, poi scegli come bersaglio quel numero di carte scoperte sul Terreno; distruggile. Puoi bandire questa carta dal tuo Cimitero e offrire come Tributo 1 Mostro Rituale, Fusione, Synchro, Xyz, Pendulum o Link dalla tua mano o Terreno; aggiungi 1 mostro "Compagnia di Clown" con un Livello/Rango/Classificazione Link originale diverso dal tuo Deck o Cimitero alla tua mano. Puoi utilizzare ogni effetto di "Finale Compagnia di Clown" una sola volta per turno.
  pt: |-
    Se você controlar um monstro Invocado por Invocação-Tributo: descarte qualquer número de cards e, depois, escolha esse número de cards com a face para cima no campo; destrua-os. Você pode banir este card do seu Cemitério e, oferecer como Tributo 1 Monstro de Ritual, de Fusão, Sincro, Xyz, Pêndulo ou Link da sua mão ou do campo; adicione 1 monstro "Companhia de Palhaços" com um Nível/Classe/Valor Link original diferente, do seu Deck ou Cemitério à sua mão. Você só pode usar cada efeito de "Final da Companhia de Palhaços" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：Ａ召喚したモンスターが自分フィールドに存在する場合、手札を任意の数だけ捨て、その数だけフィールドの表側表示カードを対象として発動できる。そのカードを破壊する。②：墓地のこのカードを除外し、自分の手札・フィールドの儀式・融合・Ｓ・Ｘ・Ｐ・Ｌモンスター１体をリリースして発動できる。そのモンスターとは元々のレベル・ランク・リンクの数値が異なる「道化の一座」モンスター１体を自分のデッキ・墓地から手札に加える。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：自己场上存在上级召唤的怪兽的情况下，舍弃任意数量的手牌，依其数量以场上的表侧表示卡为对象可以发动。将该卡破坏。②：将墓地的此卡除外，解放自己手牌・场上的1只仪式・融合・同步・超量・灵摆・连接怪兽可以发动。从自己牌组・墓地将1只与该怪兽原本等级・阶级・连接数值不同的“小丑戏帮”怪兽加入手牌。
