name:
  en: Clown Crew New Face
  de: Clowntrupp-Neuschminkung
  es: Nueva Imagen de la Compañía de Payasos
  fr: Nouveau Visage de la Troupe des Clowns
  it: Nuova Faccia Compagnia di Clown
  pt: Cara Nova da Companhia de Palhaços
  ja: <ruby>道化の一座<rt>クラウン・クラン</rt></ruby>『<ruby>新加入<rt>ニューフェイス</rt></ruby>』
  ja_romaji: Kuraun Kuran "Nyū Feisu"
  ko: 크라운 클랜 『뉴페이스』
  ko_rr:
  zh-TW:
  zh-CN: 小丑戏帮《新加入》
text:
  en: |-
    During the Standby Phase: You can shuffle 3 "Clown Crew" cards from your GY and/or banishment into the Deck, then draw 1 card. If you Tribute Summon a monster: You can target other Spells/Traps on the field up to the number of monsters Tributed for its Tribute Summon; destroy them. If this card is sent to the GY, except from the field: You can place it face-up on your field. You can only use each effect of "Clown Crew New Face" once per turn.
  de: |-
    Während der Standby Phase: Du kannst 3 „Clowntrupp“-Karten von deinem Friedhof und/oder deinen verbannten Karten ins Deck mischen, dann ziehe 1 Karte. Falls du ein Monster als Tributbeschwörung beschwörst: Du kannst andere Zauber/Fallen auf dem Spielfeld bis zur Anzahl der Monster wählen, die für seine Tributbeschwörung als Tribut angeboten wurden; zerstöre sie. Falls diese Karte auf den Friedhof gelegt wird, außer vom Spielfeld: Du kannst sie offen auf deine Spielfeldseite legen. Du kannst jeden Effekt von „Clowntrupp-Neuschminkung“ nur einmal pro Spielzug verwenden.
  es: |-
    Durante la Standby Phase: puedes barajar al Deck 3 cartas "Compañía de Payasos" en tu Cementerio y/o destierro, y después roba 1 carta. Si Invocas un monstruo por Sacrificio: puedes seleccionar otras Mágicas/Trampas en el Campo hasta el número de monstruos Sacrificados para su Invocación por Sacrificio; destrúyelas. Si esta carta es mandada al Cementerio, excepto desde el Campo: puedes ponerla boca arriba en tu Campo. Sólo puedes usar cada efecto de "Nueva Imagen de la Compañía de Payasos" una vez por turno.
  fr:
  it: |-
    Durante la Standby Phase: puoi mischiare 3 carte "Compagnia di Clown" dal tuo Cimitero e/o carte bandite nel Deck, poi pescare 1 carta. Se Evochi tramite Tributo un mostro: puoi scegliere come bersaglio altre Magie/Trappole sul Terreno fino al numero di mostri offerti come Tributo per la sua Evocazione tramite Tributo; distruggile. Se questa carta viene mandata al Cimitero, eccetto dal Terreno: puoi metterla scoperta sul tuo Terreno. Puoi utilizzare ogni effetto di "Nuova Faccia Compagnia di Clown" una sola volta per turno.
  pt: |-
    Durante a Fase de Apoio: você pode embaralhar no Deck 3 cards "Companhia de Palhaços" do seu Cemitério e/ou banimento e, depois, compre 1 card. Se você Invocar um monstro por Invocação-Tributo: você pode escolher outras Magias/Armadilhas no campo até o número de monstros oferecidos como Tributo para sua Invocação-Tributo; destrua-as. Se este card for enviado para o Cemitério, exceto do campo: você pode colocá-lo com a face para cima no seu campo. Você só pode usar cada efeito de "Cara Nova da Companhia de Palhaços" uma vez por turno.
  ja: |-
    このカード名の①②③の効果はそれぞれ１ターンに１度しか使用できない。①：自分・相手のスタンバイフェイズに発動できる。自分の墓地・除外状態の「道化の一座」カード３枚をデッキに戻す。その後、自分は１枚ドローする。②：自分がモンスターをＡ召喚した場合、そのＡ召喚のためにリリースしたモンスターの数まで、フィールドの他の魔法・罠カードを対象として発動できる。そのカードを破壊する。③：このカードがフィールド以外から墓地へ送られた場合に発動できる。このカードを自分フィールドに表側表示で置く。
  ko: |-
    이 카드명의 ①②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신 / 상대의 스탠바이 페이즈에 발동할 수 있다. 자신의 묘지 / 제외 상태인 "크라운 클랜" 카드 3장을 덱으로 되돌린다. 그 후, 자신은 1장 드로우한다. ②: 자신이 몬스터를 어드밴스 소환했을 경우, 그 어드밴스 소환을 위해 릴리스한 몬스터의 수까지, 필드의 다른 마법 / 함정 카드를 대상으로 하고 발동할 수 있다. 그 카드를 파괴한다. ③: 이 카드가 필드 이외에서 묘지로 보내졌을 경우에 발동할 수 있다. 이 카드를 자신 필드에 앞면 표시로 놓는다.
  zh-TW:
  zh-CN: |-
    此卡名的①②③效果1回合仅可各使用1次。①：在自己・对手的准备阶段可以发动。将自己墓地・除外状态的3张“小丑戏帮”卡放回牌组。然后，自己抽1张。②：自己将怪兽上级召唤的情况下，以为该上级召唤而解放的怪兽数量为上限，以场上的其他魔法・陷阱卡为对象可以发动。将该卡破坏。③：此卡从场上以外的地方被送至墓地的情况下可以发动。将此卡以表侧表示放在自己场上。
