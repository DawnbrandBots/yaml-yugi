  en: |-
    If this card is in your hand: You can place 1 other "Adamancipator" card from your hand on top of the Deck; Special Summon this card. During your Main Phase: You can excavate the top 5 cards of your Deck, and if you do, you can Special Summon 1 excavated Level 4 or lower Rock monster, also place the rest on the bottom of the Deck in any order. You can only use each effect of "Adamancipator Conductor" once per turn.
