    此卡名的①②效果1回合仅可各使用1次。①：此卡存在于手牌的情况下，从手牌将1张其他的“魔救”卡放回牌组最上面可以发动。将此卡特殊召唤。②：在自己的主要阶段可以发动。从自己牌组上面翻开5张卡。可从其中挑选1只等级4以下的岩石族怪兽特殊召唤。将剩余的以喜欢的顺序放回牌组下面。
