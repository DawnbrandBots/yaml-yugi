  ja: |-
    このカード名はルール上「アルトメギア」、「ドゥームズ」、「エルフェンノーツ」カードとしても扱う。このカード名の②の効果は１ターンに１度しか使用できない。①：自分フィールドに「獄神」Ｌモンスターが存在する限り、元々のカード名に「アルス＝マグナ」を含む、自分フィールドのモンスターが発動する効果は、相手ターンでも発動できる効果になる。②：このカードが表側表示で存在する限り１度だけ、自分メインフェイズに発動できる。デッキから「メディウス」モンスターか「アルス＝マグナ」モンスター１体を手札に加える。
