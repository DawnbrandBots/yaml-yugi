text:
  en: |-
    Once per Chain, if an Effect Monster(s) is Special Summoned (except during the Damage Step): You can target 1 of them; Special Summon 1 "Shinsen Token" (Aqua/WATER/Level 3/ATK 0/DEF 0) to its controller's opponent's field in Defense Position. Once per Battle Phase, at the start of the Battle Phase: You can destroy both this card and as many Tokens on the field as possible, and if you do, Special Summon 1 "Ebisu Token" (Fairy/WATER/Level 7/ATK ?/DEF ?). This Token's ATK/DEF become the number of Tokens destroyed by this effect x 700.
  de: |-
    Einmal pro Kette, falls ein oder mehr Effektmonster als Spezialbeschwörung beschworen werden (außer während des Damage Steps): Du kannst 1 von ihnen wählen; beschwöre 1 „Shinsen-Spielmarke“ (Aqua/WASSER/Stufe 3/ATK 0/DEF 0) als Spezialbeschwörung auf die Spielfeldseite des Gegners seines Beherrschers in die Verteidigungsposition. Einmal pro Battle Phase, am Beginn der Battle Phase: Du kannst sowohl diese Karte als auch so viele Spielmarken auf dem Spielfeld wie möglich zerstören und falls du dies tust, beschwöre 1 „Ebisu-Spielmarke“ (Fee/WASSER/Stufe 7/ATK ?/DEF ?) als Spezialbeschwörung. Die ATK/DEF dieser Spielmarke werden gleich der Anzahl der durch diesen Effekt zerstörten Spielmarken x 700.
  es: |-
    Una vez por Cadena, si uno o más Monstruos de Efecto son Invocados de Modo Especial (excepto durante el Damage Step): puedes seleccionar 1 de ellos; Invoca de Modo Especial 1 "Ficha Shinsen" (Aqua/AGUA/Nivel 3/ATK 0/DEF 0) al Campo del adversario de su controlador en Posición de Defensa. Una vez por Battle Phase, al comienzo de la Battle Phase: puedes destruir tanto esta carta como tantas Fichas en el Campo como sea posible y, si lo haces, Invoca de Modo Especial 1 "Ficha Ebisu" (Hada/AGUA/Nivel 7/ATK ?/DEF ?). El ATK/DEF de esta Ficha se convierten en el número de Fichas destruidas por este efecto x 700.
  fr: |-
    Une fois par Chaîne, si un ou plusieurs Monstres à Effet sont Invoqués Spécialement (sauf durant la Damage Step) : vous pouvez en cibler 1 ; Invoquez Spécialement 1 "Jeton Shinsen" (Aqua/EAU/Niveau 3/ATK 0/DEF 0) sur le Terrain de l'adversaire de son contrôleur en Position de Défense. Une fois par Battle Phase, au début de la Battle Phase : vous pouvez détruire cette carte ainsi qu'autant de Jetons sur le Terrain que possible, et si vous le faites, Invoquez Spécialement 1 "Jeton Ebisu" (Elfe/EAU/Niveau 7/ATK ?/DEF ?). L'ATK/DEF de ce Jeton deviennent le nombre de Jetons détruits par cet effet x 700.
  it: |-
    Una volta per Catena, se uno o più Mostri con Effetto vengono Evocati Specialmente (eccetto durante il Damage Step): puoi scegliere 1 di essi come bersaglio; Evoca Specialmente 1 "Segna-Shinsen" (Acqua/ACQUA/Livello 3/ATK 0/DEF 0) sul Terreno dell'avversario del suo controllore in Posizione di Difesa. Una volta per Battle Phase, all'inizio della Battle Phase: puoi distruggere sia questa carta che tanti Segna-Mostro sul Terreno quanti possibile e, se lo fai, Evoca Specialmente 1 "Segna-Ebisu" (Fata/ACQUA/Livello 7/ATK ?/DEF ?). Gli ATK/DEF di questo Segna-Mostro diventano il numero di Segna-Mostro distrutti da questo effetto x 700.
  pt: |-
    Uma vez por Corrente, se um ou mais Monstros de Efeito forem Invocados por Invocação-Especial (exceto durante a Etapa de Dano): você pode escolher 1 deles; Invoque por Invocação-Especial 1 "Ficha de Shinsen" (Aqua/ÁGUA/Nível 3/ATK 0/DEF 0) no campo do oponente do seu controlador em Posição de Defesa. Uma vez por Fase de Batalha, no começo da Fase de Batalha: você pode destruir tanto este card e tantas Fichas no campo quanto possível e, se isso acontecer, Invoque por Invocação-Especial 1 "Ficha de Ebisu" (Fada/ÁGUA/Nível 7/ATK ?/DEF ?). O ATK/DEF desta Ficha se tornam o número de Fichas destruídas por este efeito x 700.
  ja: |-
    ①：効果モンスターが特殊召喚された場合、その内の１体を対象として発動できる（同一チェーン上では１度まで）。そのモンスターのコントローラーから見て相手のフィールドに「神鮮トークン」（水族・水・星３・攻／守０）１体を守備表示で特殊召喚する。②：自分・相手のバトルフェイズ開始時に１度、発動できる。このカードとフィールドのトークンを全て破壊し、自分フィールドに「海老須トークン」（天使族・水・星７・攻／守？）１体を特殊召喚する。このトークンの攻撃力・守備力は、この効果で破壊したトークンの数×７００になる。
