text:
  en: |-
    You can reveal this card in your hand and pay half your LP; add 1 "Polymerization" Spell or "Fusion" Spell from your Deck to your hand, and if you do, shuffle this card into the Deck, also you cannot Special Summon from the Extra Deck for the rest of this turn, except "HERO" monsters. During your opponent's turn, if your LP are 1000 or less (Quick Effect): You can Special Summon this card from your hand, then you can inflict damage to your opponent equal to the highest ATK among the monsters they control (your choice, if tied). You can only use each effect of "Winged Kuriboh Sabatiel LV10" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：手札のこのカードを相手に見せ、ＬＰを半分払って発動できる。デッキから「融合」魔法カードか「フュージョン」魔法カード１枚を手札に加え、このカードをデッキに戻す。このターン、自分は「ＨＥＲＯ」モンスターしかＥＸデッキから特殊召喚できない。②：相手ターンに、自分のＬＰが１０００以下の場合に発動できる。このカードを手札から特殊召喚する。その後、相手フィールドのモンスターの一番高い攻撃力分のダメージを相手に与える事ができる。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 패의 이 카드를 상대에게 보여주고, LP를 절반 지불하여 발동할 수 있다. 덱에서 "융합" 마법 카드나 "퓨전" 마법 카드 1장을 패에 넣고, 이 카드를 덱으로 되돌린다. 이 턴에, 자신은 "히어로" 몬스터밖에 엑스트라 덱에서 특수 소환할 수 없다. ②: 상대 턴에, 자신의 LP가 1000 이하일 경우에 발동할 수 있다. 이 카드를 패에서 특수 소환한다. 그 후, 상대 필드의 몬스터의 가장 높은 공격력만큼의 데미지를 상대에게 줄 수 있다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：向对手出示手牌的此卡，支付一半LP可以发动。从牌组将1张“融合”魔法卡或“结合”魔法卡加入手牌，将此卡放回牌组。此回合，自己从额外牌组仅可特殊召唤“－英雄”怪兽。②：在对手回合中，自己的LP在1000以下的情况下可以发动。从手牌将此卡特殊召唤。然后，可给予对手相当于对手场上的怪兽中最高攻击力数值的伤害。
