  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：手札のこのカードを相手に見せ、ＬＰを半分払って発動できる。デッキから「融合」魔法カードか「フュージョン」魔法カード１枚を手札に加え、このカードをデッキに戻す。このターン、自分は「ＨＥＲＯ」モンスターしかＥＸデッキから特殊召喚できない。②：相手ターンに、自分のＬＰが１０００以下の場合に発動できる。このカードを手札から特殊召喚する。その後、相手フィールドのモンスターの一番高い攻撃力分のダメージを相手に与える事ができる。
