text:
  en: |-
    Can attack directly. You can only use each of the following effects of "Alligator's Dragon Knight" once per turn. If this card is in your hand: You can reveal 1 other card in your hand that mentions "Dark Time Wizard"; Special Summon this card. If this card is Normal or Special Summoned: You can add up to 2 Spells/Traps with different names from each other that mention "Dark Time Wizard" from your Deck to your hand, then discard 1 card.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが手札に存在する場合、このカード以外の「時の黒魔術師」のカード名が記された手札のカード１枚を相手に見せて発動できる。このカードを特殊召喚する。②：このカードが召喚・特殊召喚した場合に発動できる。デッキから「時の黒魔術師」のカード名が記された魔法・罠カードを２枚まで手札に加える（同名カードは１枚まで）。その後、自分の手札を１枚選んで捨てる。③：このカードは直接攻撃できる。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：此卡存在于手牌的情况下，向对手出示此卡以外的、手牌的1张记载有“时间黑魔术师”卡名的卡可以发动。将此卡特殊召唤。②：此卡召唤・特殊召唤的情况下可以发动。从牌组将最多2张记载有“时间黑魔术师”卡名的魔法・陷阱卡加入手牌（同名卡最多1张）。然后，挑选自己的1张手牌舍弃。③：此卡可直接攻击。
