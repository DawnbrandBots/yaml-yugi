text:
  en: |-
    When this card is activated: You can add 1 "Fairy Tail" monster or 1 "Fairy Tale Tails" from your Deck or banishment to your hand. Your "Fairy Tail" monsters can attack directly. Once per turn, if your opponent Special Summons a monster(s) and you control a "Fairy Tail" monster (except during the Damage Step): You can target 1 Effect Monster your opponent controls; negate its effects, also its name becomes "Prince of Fairies". You can only activate 1 "Fairy Tail Ball" per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名のカードは１ターンに１枚しか発動できない。①：このカードの発動時の効果処理として、自分のデッキ・除外状態の「妖精伝姫」モンスター１体か「妖精の伝姫」１枚を手札に加える事ができる。②：自分の「妖精伝姫」モンスターは直接攻撃できる。③：１ターンに１度、相手がモンスターを特殊召喚した場合、自分フィールドに「妖精伝姫」モンスターが存在していれば、相手フィールドの効果モンスター１体を対象として発動できる。そのモンスターの効果は無効化され、カード名を「妖精の王子様」として扱う。
  ko: |-
    이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다. ①: 이 카드의 발동시의 효과 처리로서, 자신의 덱 / 제외 상태인 "페어리테일" 몬스터 1장이나 "페어리 테일" 1장을 패에 넣을 수 있다. ②: 자신의 "페어리테일" 몬스터는 직접 공격할 수 있다. ③: 1턴에 1번, 상대가 몬스터를 특수 소환했을 경우, 자신 필드에 "페어리테일" 몬스터가 존재하고 있으면, 상대 필드의 효과 몬스터 1장을 대상으로 하고 발동할 수 있다. 그 몬스터의 효과는 무효화되고, 카드명을 "요정의 왕자님"으로 취급한다.
  zh-TW:
  zh-CN: |-
    此卡名的卡1回合仅可发动1张。①：作为此卡发动时的效果处理，可将自己牌组・除外状态的1只“妖精传姬”怪兽或1张“妖精之传姬”加入手牌。②：自己的“妖精传姬”怪兽可直接攻击。③：1回合1次，对手将怪兽特殊召唤的情况下，如果自己场上存在“妖精传姬”怪兽，则以对手场上的1只效果怪兽为对象可以发动。将该怪兽的效果无效化，卡名视为“妖精的王子大人”。
