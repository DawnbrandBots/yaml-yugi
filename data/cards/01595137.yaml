  zh-CN: |-
    “新世龙 达尼安”＋恐龙族怪兽
    此卡名的①效果1回合仅可使用1次。①：此卡特殊召唤的情况下可以发动。从牌组将1张“GMX”卡加入手牌。②：自己因“GMX”卡的效果将牌组的卡翻开的情况下，根据此卡存在于何处可以发动以下效果（此卡名的以下效果1回合仅可各使用1次）。●场上：自己恢复1500LP。●墓地：将此卡特殊召唤。
