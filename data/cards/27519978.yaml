  fr: Quatuor de la Charmeuse en Fleur
  it: Quartetto di Ammaliatrici in Fioritura
  pt: Quarteto Encantador Florescendo
  ja: <ruby>四<rt>し</rt></ruby><ruby>花<rt>か</rt></ruby><ruby>繚<rt>りょう</rt></ruby><ruby>乱<rt>らん</rt></ruby>の<ruby>霊<rt>れい</rt></ruby><ruby>使<rt>つか</rt></ruby>い
