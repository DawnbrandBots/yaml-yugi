text:
  en: |-
    You can discard 1 card; Special Summon 1 Level 4 or lower Dragon monster from your hand or Deck, except "Dragonic Warrior", but negate its effects. You can only use this effect of "Dragonic Warrior" once per turn.
  de: |-
    Du kannst 1 Karte abwerfen; beschwöre 1 Drache-Monster der Stufe 4 oder niedriger als Spezialbeschwörung von deiner Hand oder deinem Deck, außer „Drachenkrieger“, aber annulliere seine Effekte. Du kannst diesen Effekt von „Drachenkrieger“ nur einmal pro Spielzug verwenden.
  es: |-
    Puedes descartar 1 carta; Invoca de Modo Especial, desde tu mano o Deck, 1 monstruo Dragón de Nivel 4 o menor, excepto "Guerrero Dracónico", pero niega sus efectos. Sólo puedes usar este efecto de "Guerrero Dracónico" una vez por turno.
  fr: |-
    Vous pouvez défausser 1 carte ; Invoquez Spécialement 1 monstre Dragon de max. Niveau 4 ("Guerrier Dragonique" exclu) depuis votre main ou Deck, mais annulez ses effets. Vous ne pouvez utiliser cet effet de "Guerrier Dragonique" qu'une fois par tour.
  it: |-
    Puoi scartare 1 carta; Evoca Specialmente 1 mostro Drago di Livello 4 o inferiore dalla tua mano o Deck, eccetto "Guerriero Dragonico", ma annulla i suoi effetti. Puoi utilizzare questo effetto di "Guerriero Dragonico" una sola volta per turno.
  pt: |-
    Você pode descartar 1 card; Invoque por Invocação-Especial 1 monstro Dragão de Nível 4 ou menos da sua mão ou do Deck, exceto "Guerreiro Dragônico", mas negue seus efeitos. Você só pode usar este efeito de "Guerreiro Dragônico" uma vez por turno.
  ja: |-
    このカード名の効果は１ターンに１度しか使用できない。①：手札を１枚捨てて発動できる。「契約を結びし竜の戦士」を除く、レベル４以下のドラゴン族モンスター１体を手札・デッキから特殊召喚する。この効果で特殊召喚したモンスターの効果は無効化される。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的效果1回合仅可使用1次。①：舍弃1张手牌可以发动。从手牌・牌组将除“缔结契约的龙之战士”以外的1只等级4以下的龙族怪兽特殊召唤。以此效果特殊召唤的怪兽的效果无效化。
