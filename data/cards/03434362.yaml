text:
  en: |-
    If this card is in your hand: You can banish Machine Link Monsters from your Extra Deck whose combined Link Ratings equal exactly 5; Special Summon this card. You can target 1 card you control and 1 card your opponent controls; return them to the hand. This is a Quick Effect if this card is linked to a Link-3 or higher Machine Link Monster. You can only use each effect of "Rustin Mammoth" once per turn.
  de: |-
    Falls sich diese Karte in deiner Hand befindet: Du kannst Maschine-Linkmonster, deren kombinierte Linkzahlen genau 5 entsprechen, von deinem Extra Deck verbannen; beschwöre diese Karte als Spezialbeschwörung. Du kannst 1 Karte, die du kontrollierst, und 1 Karte, die dein Gegner kontrolliert, wählen; gib sie auf die Hand zurück. Dies ist ein Schnelleffekt, falls diese Karte mit einem Maschine-Linkmonster mit Link-3 oder höher verlinkt ist. Du kannst jeden Effekt von „Rostendes Mammut“ nur einmal pro Spielzug verwenden.
  es: |-
    Si esta carta está en tu mano: puedes desterrar Monstruos de Enlace Máquina en tu Deck Extra cuyos Ratings de Enlace combinados sean exactamente iguales a 5; Invoca esta carta de Modo Especial. Puedes seleccionar 1 carta que controles y 1 carta que controle tu adversario; devuélvelas a la mano. Esto es un Efecto Rápido si esta carta está enlazada a un Monstruo de Enlace Máquina Link-3 o mayor. Sólo puedes usar cada efecto de "Mamut Oxidado" una vez por turno.
  fr: |-
    Si cette carte est dans votre main : vous pouvez bannir un nombre de Monstres Lien Machine depuis votre Extra Deck dont la somme des Classifications Lien est égale à exactement 5 ; Invoquez Spécialement cette carte. Vous pouvez cibler 1 carte que vous contrôlez et 1 carte contrôlée par votre adversaire ; renvoyez-les à la main. Ceci est un Effet Rapide si cette carte est liée à un Monstre Lien Machine de min. Link-3. Vous ne pouvez utiliser chaque effet de "Mammouth Rouilletainrable" qu'une fois par tour.
  it: |-
    Se questa carta è nella tua mano: puoi bandire dal tuo Extra Deck Mostri Link Macchina la cui somma delle Classificazioni Link è esattamente pari a 5; Evoca Specialmente questa carta. Puoi scegliere come bersaglio 1 carta che controlli e 1 carta controllata dal tuo avversario; falle ritornare nella mano. Questo è un Effetto Rapido se questa carta è linkata a un Mostro Link Macchina Link-3 o superiore. Puoi utilizzare ogni effetto di "Mammut Arrugginito" una sola volta per turno.
  pt: |-
    Se este card estiver na sua mão: você pode banir Monstros Link Máquina do seu Deck Adicional cuja soma dos Valores Link seja exatamente igual a 5; Invoque este card por Invocação-Especial. Você pode escolher 1 card que você controla e 1 card que seu oponente controla; devolva-os para a mão. Este é um Efeito Rápido se este card estiver linkado a um Monstro Link Máquina de Link-3 ou mais. Você só pode usar cada efeito de "Mamute Ferrugem" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが手札に存在する場合、リンクマーカーの合計が５になるようにＥＸデッキから機械族Ｌモンスターを除外して発動できる。このカードを特殊召喚する。②：自分及び相手フィールドのカードを１枚ずつ対象として発動できる（このカードがリンク３以上の機械族Ｌモンスターとリンク状態の場合、この効果は相手ターンでも発動できる）。そのカードを手札に戻す。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：此卡存在于手牌的情况下，从额外牌组将连接标记合计为5的机械族连接怪兽除外可以发动。将此卡特殊召唤。②：以自己及对手场上的各1张卡为对象可以发动（此卡和连接3以上的机械族连接怪兽为连接状态的情况下，此效果在对手回合也可以发动）。将该卡放回手牌。
