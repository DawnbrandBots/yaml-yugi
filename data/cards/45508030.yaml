name:
  en: Possessed Destiny
  de: Besessenes Schicksal
  es: Destino del Poseído
  fr: Destinée des Possédées
  it: Destino Posseduto
  pt: Destino dos Possuídos
  ja: <ruby>憑<rt>ひょう</rt></ruby><ruby>依<rt>い</rt></ruby><ruby>共<rt>きょう</rt></ruby><ruby>鳴<rt>めい</rt></ruby>
  ja_romaji: Hyōikyōmei
  ko: 빙의공명
  ko_rr:
  zh-TW:
  zh-CN: 凭依共鸣
text:
  en: |-
    Target 1 face-up monster on the field; Special Summon 1 "Charmer" or "Familiar-Possessed" monster with the same Attribute from your hand, Deck, or GY in face-up Attack Position or face-down Defense Position, then you can change that target to face-down Defense Position. You can banish this card from your GY, then target 1 monster you control; change its battle position. You can only use each effect of "Possessed Destiny" once per turn.
  de: |-
    Wähle 1 offenes Monster auf dem Spielfeld; beschwöre 1 „Verzaubererin“- oder „Vertrauten“-Monster mit derselben Eigenschaft als Spezialbeschwörung von deiner Hand, deinem Deck oder deinem Friedhof in die offene Angriffsposition oder die verdeckte Verteidigungsposition, dann kannst du jenes gewählte Ziel in die verdeckte Verteidigungsposition ändern. Du kannst diese Karte von deinem Friedhof verbannen und dann 1 Monster wählen, das du kontrollierst; ändere seine Kampfposition. Du kannst jeden Effekt von „Besessenes Schicksal“ nur einmal pro Spielzug verwenden.
  es: |-
    Selecciona 1 monstruo boca arriba en el Campo; Invoca de Modo Especial, desde tu mano, Deck o Cementerio, 1 monstruo "el/la Encantador/a" o "Familiar Poseído" con el mismo Atributo, en Posición de Ataque boca arriba o Posición de Defensa boca abajo, y después puedes cambiar ese objetivo a Posición de Defensa boca abajo. Puedes desterrar esta carta en tu Cementerio, y después selecciona 1 monstruo que controles; cambia su posición de batalla. Sólo puedes usar cada efecto de "Destino del Poseído" una vez por turno.
  fr: |-
    Ciblez 1 monstre face recto sur le Terrain ; Invoquez Spécialement 1 monstre "la Charmeuse" ou "Familier Possédé" du même Attribut depuis votre main, Deck ou Cimetière en Position d'Attaque face recto ou Position de Défense face verso, puis vous pouvez changer la cible en Position de Défense face verso. Vous pouvez bannir cette carte depuis votre Cimetière, puis ciblez 1 monstre que vous contrôlez ; changez sa position de combat. Vous ne pouvez utiliser chaque effet de "Destinée des Possédées" qu'une fois par tour.
  it: |-
    Scegli come bersaglio 1 mostro scoperto sul Terreno; Evoca Specialmente 1 mostro "Ammaliatore/Ammaliatrice" o "Posseduto dal Famiglio" con lo stesso Attributo dalla tua mano, Deck o Cimitero scoperto in Posizione di Attacco o coperto in Posizione di Difesa, poi puoi mettere quel bersaglio coperto in Posizione di Difesa. Puoi bandire questa carta dal tuo Cimitero, poi scegliere come bersaglio 1 mostro che controlli; cambia la sua posizione. Puoi utilizzare ogni effetto di "Destino Posseduto" una sola volta per turno.
  pt: |-
    Escolha 1 monstro com a face para cima no campo; Invoque por Invocação-Especial 1 monstro "Encantador(a)" ou "Espírito-Possuído" com o mesmo Atributo da sua mão, do Deck ou do Cemitério, com a face para cima em Posição de Ataque ou com a face para baixo em Posição de Defesa e, depois, você pode colocar o alvo com a face para baixo em Posição de Defesa. Você pode banir este card do seu Cemitério e, depois, escolha 1 monstro que você controla; mude sua posição de batalha. Você só pode usar cada efeito de "Destino dos Possuídos" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：フィールドの表側表示モンスター１体を対象として発動できる。属性がそのモンスターと同じ、「霊使い」モンスターか「憑依装着」モンスター１体を自分の手札・デッキ・墓地から表側攻撃表示か裏側守備表示で特殊召喚する。その後、対象のモンスターを裏側守備表示にできる。②：墓地のこのカードを除外し、自分フィールドのモンスター１体を対象として発動できる。そのモンスターの表示形式を変更する。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 필드의 앞면 표시 몬스터 1장을 대상으로 하고 발동할 수 있다. 속성이 그 몬스터와 같은, "령사" 몬스터나 "빙의장착" 몬스터 1장을 자신의 패 / 덱 / 묘지에서 앞면 공격 표시나 뒷면 수비 표시로 특수 소환한다. 그 후, 대상 몬스터를 뒷면 수비 표시로 할 수 있다. ②: 묘지의 이 카드를 제외하고, 자신 필드의 몬스터 1장을 대상으로 하여 발동할 수 있다. 그 몬스터의 표시 형식을 변경한다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：以场上的1只表侧表示怪兽为对象可以发动。从自己手牌・牌组・墓地将属性与该怪兽相同的、1只“灵使”怪兽或“凭依装着”怪兽以表侧攻击表示或里侧守备表示特殊召唤。然后，可将对象怪兽改成里侧守备表示。②：将墓地的此卡除外，以自己场上的1只怪兽为对象可以发动。变更该怪兽的表示形式。
