name:
  en: Call of the Forgotten
  de: Ruf der Vergessenen
  es: Llamada de los Olvidados
  fr: Appel de l'Oublié
  it: Richiamo del Dimenticato
  pt: Chamado dos Esquecidos
  ja: <ruby>生<rt>い</rt></ruby>ける<ruby>屍<rt>しかばね</rt></ruby>の<ruby>呼<rt>よ</rt></ruby>び<ruby>声<rt>ごえ</rt></ruby>
