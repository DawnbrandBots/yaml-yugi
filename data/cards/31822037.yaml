text:
  en: |-
    2 non-Link Monsters
    If this card is Link Summoned and you have a "Power Patron" monster in your GY: You can add 1 "Theorealize" card from your Deck to your hand. During the Main Phase, if you control another DARK Fairy monster, you can (Quick Effect): Immediately after this effect resolves, Link Summon using materials you control, including this card. You can only use each effect of "Power Patron Envoy of Pure Prayers" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    Ｌモンスター以外のモンスター２体
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードがＬ召喚した場合、自分の墓地に「獄神」モンスターが存在していれば発動できる。デッキから「テオリアライズ」カード１枚を手札に加える。②：自分・相手のメインフェイズに、自分フィールドに他の天使族・闇属性モンスターが存在する場合に発動できる。このカードを含む自分フィールドのモンスターを素材としてＬ召喚を行う。
  ko:
  zh-TW:
  zh-CN: |-
    连接怪兽以外的怪兽2只
    此卡名的①②效果1回合仅可各使用1次。①：此卡连接召唤的情况下，如果自己墓地存在“狱神”怪兽则可以发动。从牌组将1张“预幻”卡加入手牌。②：在自己・对手的主要阶段，自己场上存在其他天使族・暗属性怪兽的情况下可以发动。将包含此卡在内的、自己场上的怪兽作为素材进行连接召唤。
