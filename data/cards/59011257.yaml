text:
  en: |-
    Cannot be Tributed, nor used as material for a Fusion, Synchro, Xyz, or Link Summon, while face-up on the field. If a monster(s) is Special Summoned to your opponent's field, while this card is in your Monster Zone: Target 1 of them; give control of this card to that monster's controller, also that monster cannot be Tributed nor used as material for a Fusion, Synchro, Xyz or Link Summon while this monster is face-up on the field.
  de: |-
    Diese Karte kann weder als Tribut angeboten noch als Material für eine Fusions-, Synchro-, Xyz- oder Linkbeschwörung verwendet werden, solange sie offen auf dem Spielfeld liegt. Falls ein oder mehr Monster als Spezialbeschwörung auf die Spielfeldseite deines Gegners beschworen werden, solange diese Karte in deiner Monsterzone liegt: Wähle 1 von ihnen; übergib die Kontrolle über diese Karte an den Beherrscher jenes Monsters, zusätzlich kann jenes Monster weder als Tribut angeboten noch als Material für eine Fusions-, Synchro-, Xyz- oder Linkbeschwörung verwendet werden, solange dieses Monster offen auf dem Spielfeld liegt.
  es: |-
    No puede ser Sacrificado, ni usado como material para una Invocación por Fusión, Sincronía, Xyz o Enlace, mientras esté boca arriba en el Campo. Si uno o más monstruos son Invocados de Modo Especial al Campo de tu adversario, mientras esta carta esté en tu Zona de Monstruos: selecciona 1 de ellos; dale el control de esta carta al controlador de ese monstruo, y además ese monstruo no puede ser Sacrificado, ni usado como material para una Invocación por Fusión, Sincronía, Xyz o Enlace, mientras este monstruo esté boca arriba en el Campo.
  fr: |-
    Ni Sacrifiable ni utilisable comme Matériel pour une Invocation Fusion, Synchro, Xyz ou Lien, tant qu'elle est face recto sur le Terrain. Si un ou plusieurs monstres sont Invoqués Spécialement sur le Terrain de votre adversaire, tant que cette carte est dans votre Zone Monstre : ciblez-en 1 ; donnez le contrôle de cette carte au contrôleur du monstre, et aussi, le monstre ne peut être ni Sacrifié ni utilisé comme Matériel pour une Invocation Fusion, Synchro, Xyz ou Lien tant que ce monstre est face recto sur le Terrain.
  it: |-
    Non può essere offerto come Tributo, né utilizzato come materiale per un'Evocazione tramite Fusione, Synchro, Xyz o Link, mentre è scoperto sul Terreno. Se uno o più mostri vengono Evocati Specialmente sul Terreno del tuo avversario, mentre questa carta è nella tua Zona Mostri: scegli 1 di essi come bersaglio; dai il controllo di questa carta al controllore di quel mostro, inoltre quel mostro non può essere offerto come Tributo né utilizzato come materiale per un'Evocazione tramite Fusione, Synchro, Xyz o Link mentre questo mostro è scoperto sul Terreno.
  pt: |-
    Não pode ser oferecido como Tributo, nem usado como matéria para uma Invocação-Fusão, Sincro, Xyz ou Link, enquanto estiver com a face para cima no campo. Se um ou mais monstros forem Invocados por Invocação-Especial no campo do seu oponente, enquanto este card estiver na sua Zona de Monstros: escolha 1 deles; conceda o controle deste card ao controlador desse monstro e, além disso, esse monstro não pode ser oferecido como Tributo nem usado como matéria para uma Invocação-Fusão, Sincro, Xyz ou Link enquanto este monstro estiver com a face para cima no campo.
  ja: |-
    ①：このカードはモンスターゾーンに存在する限り、リリースできず、融合・Ｓ・Ｘ・Ｌ召喚の素材にもできない。②：このカードがモンスターゾーンに存在する状態で、相手フィールドにモンスターが特殊召喚された場合、その内の１体を対象として発動する。このカードのコントロールを対象のモンスターのコントローラーに移す。このモンスターが表側表示で存在する間、対象のモンスターはリリースできず、融合・Ｓ・Ｘ・Ｌ召喚の素材にもできない。
