text:
  en: |-
    Reveal 1 Ritual Spell in your hand or Deck, and add 1 monster that mentions it from your Deck to your hand. If a face-up Ritual Monster(s) you control leaves the field by card effect while this card is in your GY, and you control no face-up non-Ritual Monsters (except during the Damage Step): You can add this card to your hand. You can only use each effect of "Corrupted Ritual Records" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：手札・デッキから儀式魔法カード１枚を相手に見せ、そのカード名が記されたモンスター１体をデッキから手札に加える。②：このカードが墓地に存在する状態で、自分フィールドの表側表示の儀式モンスターが効果でフィールドから離れた場合、自分フィールドに儀式モンスター以外の表側表示モンスターが存在しなければ発動できる。このカードを手札に加える。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：从手牌・牌组将1张仪式魔法卡出示给对手，从牌组将1只记载有该卡名的怪兽加入手牌。②：此卡存在于墓地的状态下，自己场上有表侧表示的仪式怪兽因效果从场上离开的情况下，如果自己场上不存在仪式怪兽以外的表侧表示怪兽则可以发动。将此卡加入手牌。
