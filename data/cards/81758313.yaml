  en: |-
    Once per turn, during the End Phase: You can pay 100 LP; place 1 Myriad Counter on this card. Once per turn, during your Main Phase: You can place 1 Myriad Counter on this card for every 1000 points difference between your LP and your opponent's. Gains 10,000 ATK/DEF while it has 10 or more Myriad Counters. If this card would be destroyed by battle or card effect, remove 1 Myriad Counter from it instead.
