  ja: |-
    ①：自分・相手のエンドフェイズに、１００ＬＰを払って発動できる。このカードに万倍カウンターを１つ置く。②：１ターンに１度、自分メインフェイズに発動できる。お互いのＬＰの差１０００につき１つ、このカードに万倍カウンターを置く。③：このカードの万倍カウンターの数が１０以上である限り、このカードの攻撃力・守備力は１００００アップする。④：このカードが戦闘・効果で破壊される場合、代わりにこのカードの万倍カウンターを１つ取り除く。
  ko:
  zh-TW:
  zh-CN: |-
    ①：在自己・对手的结束阶段，支付100LP可以发动。在此卡上放1个万倍计数物。②：1回合1次，在自己的主要阶段可以发动。双方的LP之差每有1000，就在此卡上放1个万倍计数物。③：只要此卡的万倍计数物的数量在10以上，此卡的攻击力・守备力上升10000。④：此卡将被战斗・效果破坏的情况下，作为代替去除此卡的1个万倍计数物。
