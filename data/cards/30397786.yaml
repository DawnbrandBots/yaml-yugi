  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードがデッキから手札に加わった時、または自分のモンスターが戦闘で破壊された時、手札のこのカードを相手に見せて発動できる。このカードを特殊召喚する。②：このカードが手札・デッキから特殊召喚した場合に発動できる。相手フィールドのモンスターを全て破壊する。このターン、自分は「ブルーアイズ」モンスターでしか直接攻撃できない。③：フィールドのこのカードを対象とする効果が発動した時、手札を１枚捨てて発動できる。その効果を無効にする。
