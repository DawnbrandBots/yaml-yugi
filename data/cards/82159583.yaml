  ja: |-
    このカードは儀式・融合・Ｓ・Ｘ・Ｐ・Ｌモンスター１体をリリースして表側表示でＡ召喚できる。①：このカードがＡ召喚した場合、以下の効果から１つを選択して発動できる（このカード名の以下の効果はそれぞれ１ターンに１度しか選択できない）。●このカードのＡ召喚のためにリリースしたモンスターの数だけ、自分はドローする。●このカードのＡ召喚のためにリリースしたモンスターの数だけ、相手フィールドの表側表示カードの効果を無効にする。②：１ターンに１度、相手メインフェイズに発動できる。モンスター１体のＡ召喚を行う。
  ko: |-
    이 카드는 의식 / 융합 / 싱크로 / 엑시즈 / 펜듈럼 / 링크 몬스터 1장을 릴리스하고 앞면 표시로 어드밴스 소환할 수 있다. ①: 이 카드를 어드밴스 소환했을 경우, 이하의 효과에서 1개를 선택하고 발동할 수 있다(이 카드명의 이하의 효과는 각각 1턴에 1번밖에 선택할 수 없다). ●이 카드의 어드밴스 소환을 위해 릴리스한 몬스터의 수만큼, 자신은 드로우한다. ●이 카드의 어드밴스 소환을 위해 릴리스한 몬스터의 수만큼, 상대 필드의 앞면 표시 카드의 효과를 무효로 한다. ②: 1턴에 1번, 상대 메인 페이즈에 발동할 수 있다. 몬스터 1장의 어드밴스 소환을 실행한다.
  zh-TW:
  zh-CN: |-
    此卡可通过解放1只仪式・融合・同步・超量・灵摆・连接怪兽来以表侧表示上级召唤。①：此卡上级召唤的情况下，可从以下效果中选择1个发动（此卡名的以下效果1回合仅可各选择1次）。●依为上级召唤此卡而解放的怪兽的数量，自己抽牌。●依为上级召唤此卡而解放的怪兽的数量，将对手场上的表侧表示卡的效果无效。②：1回合1次，在对手的主要阶段可以发动。进行1只怪兽的上级召唤。
