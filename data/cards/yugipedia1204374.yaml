  zh-CN: |-
    ①：以双方墓地的陷阱卡的种类的数量＋1张为上限，从自己牌组上面将卡送至墓地（最多4张）。然后，可从以下效果中挑选1个适用。
    ●从送至了墓地的卡中将1只怪兽特殊召唤。
    ●从送至了墓地的卡中将“贩卖亡骸的乌鸦”以外的1张魔法・陷阱卡放置在自己场上。放置了速攻魔法・陷阱卡的情况下，该卡在放置的回合也可以发动。
