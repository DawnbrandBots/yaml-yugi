text:
  en: |-
    Each time you Special Summon a Level 8 or higher "Destiny HERO" monster(s): All Warrior monsters you currently control gain 300 ATK. You can only use each of the following effects of "Clock Tower Prison City - Dark City" once per turn. During your Main Phase, if this card was activated this turn: You can add 1 "Destiny HERO" monster, or 1 card that mentions a "Destiny HERO" monster's card name, from your Deck to your hand. If this card is destroyed: You can Special Summon 1 "Destiny HERO" monster from your Deck (this is treated as a Special Summon with "Clock Tower Prison").
