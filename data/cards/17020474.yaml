  ja: |-
    チューナー＋チューナー以外のモンスター１体以上
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードがＳ召喚した場合、自分の墓地から罠カードを任意の数だけ除外して発動できる。その数だけフィールドのカードを除外する。②：自分・相手のエンドフェイズに、自分の墓地・除外状態の「アシュトラ」モンスター・罠カードを２枚まで対象として発動できる。そのカードをそれぞれ手札に加えるか自分フィールドにセットする。カード２枚を対象として発動した場合、さらにこのカードをＥＸデッキに戻す。
  ko:
  zh-TW:
  zh-CN: |-
    协调＋协调以外的怪兽1只以上
    此卡名的①②效果1回合仅可各使用1次。①：此卡同步召唤的情况下，从自己墓地将任意数量的陷阱卡除外可以发动。依其数量将场上的卡除外。②：在自己・对手的结束阶段，以自己墓地・除外状态的最多2张“艮鬼”怪兽・陷阱卡为对象可以发动。将该卡分别加入手牌或放置在自己场上。以2张卡为对象来发动的情况下，进而将此卡放回额外牌组。
