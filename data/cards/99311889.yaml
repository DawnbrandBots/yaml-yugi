name:
  en: Prohibitive Power Patron Purview - Vilaea
  de: Ausschließlicher Machtpatron-Bereich - Vilaea
  es: Ámbito del Modelo de Poder Prohibitivo - Vilaea
  fr: Portée Prohibitive du Mécène du Pouvoir - Vilaéa
  it: Giurisdizione Patrono Potente Proibitivo - Vilaea
  pt: Limite Proibitivo do Patrono do Poder - Vilaea
  ja: <ruby>絶<rt>ぜっ</rt></ruby><ruby>境<rt>きょう</rt></ruby>なる<ruby>獄<rt>ごく</rt></ruby><ruby>神<rt>しん</rt></ruby><ruby>域<rt>いき</rt></ruby>－ヴィライア
  ja_romaji: Zekkyōnaru Gokushin'iki - Viraia
  ko: 절경한 감옥신역－비라이아
  ko_rr:
  zh-TW:
  zh-CN: 绝境狱神域－皮莱亚
text:
  en: |-
    Show 1 "Nerva the Power Patron of Creation", 1 "Jupiter the Power Patron of Destruction", and 1 "Junora the Power Patron of Tuning" from your Extra Deck, face-up Monster Zone, and/or GY, and if you do, your opponent cannot activate cards or effects in response to the activation of your "Power Patron" monster effects this turn. If you would banish the top card(s) of your Deck to activate the effect of a "Power Patron" monster you control, you can banish this card from your GY instead. You can only use each effect of "Prohibitive Power Patron Purview - Vilaea" once per turn.
  de: |-
    Zeige 1 „Nerva die Machtpatronin der Schöpfung“, 1 „Jupiter der Machtpatron der Zerstörung“ und 1 „Junora der Machtpatron der Abstimmung“ von deinem Extra Deck, offen von deiner Monsterzone und/oder von deinem Friedhof und falls du dies tust, kann dein Gegner in diesem Spielzug weder Karten noch Effekte als Reaktion auf die Aktivierung deiner „Machtpatron“-Monstereffekte aktivieren. Falls du die oberste/n Karte/n deines Decks verbannen würdest, um den Effekt eines „Machtpatron“-Monsters zu aktivieren, das du kontrollierst, kannst du stattdessen diese Karte von deinem Friedhof verbannen. Du kannst jeden Effekt von „Ausschließlicher Machtpatron-Bereich - Vilaea“ nur einmal pro Spielzug verwenden.
  es: |-
    Enseña 1 "Nerva la Modelo de Poder de Creación", 1 "Júpiter el Modelo de Poder de Destrucción" y 1 "Junora el Modelo de Poder de Afinación" en tu Deck Extra, Zona de Monstruos boca arriba y/o Cementerio y, si lo haces, tu adversario no puede activar cartas o efectos en respuesta a la activación de los efectos de tus monstruos "Modelo de Poder" este turno. Si fueras a desterrar una o más cartas de la parte superior de tu Deck para activar el efecto de un monstruo "Modelo de Poder" que controlas, puedes desterrar esta carta en tu Cementerio en su lugar. Sólo puedes usar cada efecto de "Ámbito del Modelo de Poder Prohibitivo - Vilaea" una vez por turno.
  fr: |-
    Montrez 1 "Nerva la Mécène du Pouvoir de la Création", 1 "Jupiter le Mécène du Pouvoir de la Destruction" et 1 "Junora le Mécène du Pouvoir de l'Accordage" depuis votre Extra Deck, Zone Monstre face recto et/ou Cimetière, et si vous le faites, votre adversaire ne peut activer ni de cartes ni d'effets en réponse à l'activation de vos effets de monstre "Mécène du Pouvoir" ce tour. Si vous allez bannir une ou plusieurs cartes du dessus de votre Deck pour activer l'effet d'un monstre "Mécène du Pouvoir" que vous contrôlez, vous pouvez bannir cette carte depuis votre Cimetière à la place. Vous ne pouvez utiliser chaque effet de "Portée Prohibitive du Mécène du Pouvoir - Vilaéa" qu'une fois par tour.
  it: |-
    Mostra 1 "Nerva la Patrona Potente della Creazione", 1 "Jupiter il Patrono Potente della Distruzione" e 1 "Junora il Patrono Potente della Sintonizzazione" dal tuo Extra Deck, Zona Mostri scoperta e/o Cimitero e, se lo fai, il tuo avversario non può attivare carte o effetti in risposta all'attivazione degli effetti dei tuoi mostri "Patrono Potente" in questo turno. Se stai per bandire una o più carte dalla cima del tuo Deck per attivare l'effetto di un mostro "Patrono Potente" che controlli, puoi invece bandire questa carta dal tuo Cimitero. Puoi utilizzare ogni effetto di "Giurisdizione Patrono Potente Proibitivo - Vilaea" una sola volta per turno.
  pt: |-
    Mostre 1 "Nerva, a Patrona do Poder da Criação", 1 "Júpiter, o Patrono do Poder da Destruição" e 1 "Junora, o Patrono do Poder da Afinação" do seu Deck Adicional, Zona de Monstros com a face para cima e/ou Cemitério e, se isso acontecer, seu oponente não pode ativar cards ou efeitos em resposta à ativação dos seus efeitos de monstro "Patrono(a) do Poder" neste turno. Se você fosse banir o(s) card(s) do topo do seu Deck para ativar o efeito de um monstro "Patrono(a) do Poder" que você controla, em vez disso, você pode banir este card do seu Cemitério. Você só pode usar cada efeito de "Limite Proibitivo do Patrono do Poder - Vilaea" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：「創獄神ネルヴァ」「壊獄神ユピテル」「調獄神ジュノーラ」を１体ずつ、自分のＥＸデッキ・フィールド（表側表示）・墓地から選んでお互いに確認し、このターン、自分の「獄神」モンスターの効果の発動に対して相手は効果を発動できない。②：自分フィールドの「獄神」モンスターの効果を発動するためにデッキの上からカードを除外する場合、代わりに墓地のこのカードを除外できる。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: "창감옥신 네르바" "괴감옥신 유피테르" "조감옥신 쥬노라"를 1장씩, 자신의 엑스트라 덱 / 필드(앞면 표시) / 묘지에서 골라 서로 확인하고, 이 턴에, 자신의 "감옥신" 몬스터의 효과 발동에 대하여 상대는 효과를 발동할 수 없다. ②: 자신 필드의 "감옥신" 몬스터의 효과를 발동하기 위해 덱 위에서 카드를 제외할 경우, 대신에 묘지의 이 카드를 제외할 수 있다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：从自己额外牌组・场上（表侧表示）・墓地挑选“创狱神 涅瓦”、“坏狱神 朱庇特”、“调狱神 朱诺拉”各1只给双方确认，此回合，应对自己的“狱神”怪兽的效果的发动，对手不可发动效果。②：为发动自己场上的“狱神”怪兽的效果而要从牌组上面将卡除外的情况下，作为代替可将墓地的此卡除外。
