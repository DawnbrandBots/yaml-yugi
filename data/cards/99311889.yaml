text:
  en: |-
    Show 1 "Nerva the Power Patron of Creation", 1 "Jupiter the Power Patron of Destruction", and 1 "Junora the Power Patron of Tuning" from your Extra Deck, face-up field, and/or GY, and if you do, your opponent cannot activate cards or effects in response to the activation of your "Power Patron" monsters' effects this turn. If you would banish the top card(s) of your Deck to activate the effect of a "Power Patron" monster you control, you can banish this card from your GY instead. You can only use each effect of "Dead-End Power Patron Realm - Viraia" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：「創獄神ネルヴァ」「壊獄神ユピテル」「調獄神ジュノーラ」を１体ずつ、自分のＥＸデッキ・フィールド（表側表示）・墓地から選んでお互いに確認し、このターン、自分の「獄神」モンスターの効果の発動に対して相手は効果を発動できない。②：自分フィールドの「獄神」モンスターの効果を発動するためにデッキの上からカードを除外する場合、代わりに墓地のこのカードを除外できる。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：从自己额外牌组・场上（表侧表示）・墓地挑选“创狱神 涅瓦”、“坏狱神 朱庇特”、“调狱神 朱诺拉”各1只给双方确认，此回合，应对自己的“狱神”怪兽的效果的发动，对手不可发动效果。②：为发动自己场上的“狱神”怪兽的效果而要从牌组上面将卡除外的情况下，作为代替可将墓地的此卡除外。
