  ja: |-
    このカード名のＰ効果は１ターンに１度しか使用できない。①：自分メインフェイズに発動できる。このカードを破壊し、手札・デッキから「星霜の魔術師－アストログラフ・マジシャン」以外のＰスケールが１のＰモンスター１体を自分のＰゾーンに置く。この効果で置いたカードのＰ効果はこのターン発動できない。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的灵摆效果1回合仅可使用1次。①：在自己的主要阶段可以发动。将此卡破坏，从手牌・牌组将“星霜的魔术师－宙读阵魔术士”以外的、1只灵摆刻度为1的灵摆怪兽放在自己的灵摆区域。以此效果所放的卡的灵摆效果此回合不可发动。
