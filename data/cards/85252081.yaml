  pt: Besta Mech Super Quantal Pulso Orca
  ja: <ruby>超<rt>ちょう</rt></ruby><ruby>量<rt>りょう</rt></ruby><ruby>機<rt>き</rt></ruby><ruby>獣<rt>じゅう</rt></ruby>グランパルス
  ja_romaji: Chōryōkijū Guranparusu
  ko: 초량기수 그랜펄스
  ko_rr:
  zh-TW: 超級量子機獸 脈衝虎鯨
  zh-CN: 超级量子机兽 惊涛虎鲸
text:
  en: |-
    2 Level 3 monsters
    Cannot attack unless it has material. Once per turn: You can detach 1 material from this card, then target 1 Spell/Trap on the field; destroy it. This is a Quick Effect if this card has "Super Quantum Blue Layer" as material. Once per turn: You can attach 1 "Super Quantum" monster from your hand or field to this card.
  de: |-
    2 Monster der Stufe 3
    Diese Karte kann nicht angreifen, es sei denn, sie hat Material. Einmal pro Spielzug: Du kannst 1 Material von dieser Karte abhängen und dann 1 Zauber/Falle auf dem Spielfeld wählen; zerstöre ihn oder sie. Dies ist ein Schnelleffekt, falls diese Karte „Superquantum Blaue Schicht“ als Material hat. Einmal pro Spielzug: Du kannst 1 „Superquantum“-Monster von deiner Hand oder Spielfeldseite an diese Karte anhängen.
  es: |-
    2 monstruos de Nivel 3
    No puede atacar a menos que tenga material. Una vez por turno: puedes desacoplar 1 material de esta carta, y después selecciona 1 Mágica/Trampa en el Campo; destrúyela. Esto es un Efecto Rápido si esta carta tiene como material "Súper Cuantio Capa Azul". Una vez por turno: puedes acoplar a esta carta 1 monstruo "Súper Cuantio" en tu mano o Campo.
  fr: |-
    2 monstres de Niveau 3
    Ne peut pas attaquer sauf si elle a du Matériel. Une fois par tour : vous pouvez détacher 1 Matériel de cette carte, puis ciblez 1 Magie/Piège sur le Terrain ; détruisez-le. Ceci est un Effet Rapide si cette carte a "Force Blue Super Quantum" comme Matériel. Une fois par tour : vous pouvez attacher 1 monstre "Super Quantum" depuis votre main ou Terrain à cette carte.
  it: |-
    2 mostri di Livello 3
    Non può attaccare a meno che abbia materiale. Una volta per turno: puoi staccare 1 materiale da questa carta, poi scegliere come bersaglio 1 Magia/Trappola sul Terreno; distruggila. Questo effetto è un Effetto Rapido se questa carta ha "Super Quantum Strato Blu" come materiale. Una volta per turno: puoi attaccare 1 mostro "Super Quantum" dalla tua mano o Terreno a questa carta.
  pt: |-
    2 monstros de Nível 3
    Não pode atacar a não ser que tenha matéria. Uma vez por turno: você pode desassociar 1 matéria deste card e, depois, escolha 1 Magia/Armadilha no campo; destrua-a. Este é um Efeito Rápido se este card tiver "Camada Azul Super Quantum" como matéria. Uma vez por turno: você pode associar 1 monstro "Super Quantum" da sua mão ou do campo a este card.
  ja: |-
    レベル３モンスター×２
    ①：<ruby>Ｘ<rt>エクシーズ</rt></ruby>素材が無いこのカードは攻撃できない。②：１ターンに１度、このカードの<ruby>Ｘ<rt>エクシーズ</rt></ruby>素材を１つ取り除き、フィールドの魔法・罠カード１枚を対象として発動できる。そのカードを破壊する。このカードが「超量士ブルーレイヤー」を<ruby>Ｘ<rt>エクシーズ</rt></ruby>素材としている場合、この効果は相手ターンでも発動できる。③：１ターンに１度、自分メインフェイズに発動できる。自分の手札・フィールドの「超量士」モンスター１体を選び、このカードの下に重ねて<ruby>Ｘ<rt>エクシーズ</rt></ruby>素材とする。
  ko: |-
    레벨 3 몬스터 × 2
    ①: 엑시즈 소재가 없는 이 카드는 공격할 수 없다. ②: 1턴에 1번, 이 카드의 엑시즈 소재를 1개 제거하고, 필드의 마법 / 함정 카드 1장을 대상으로 하여 발동할 수 있다. 그 카드를 파괴한다. 이 카드가 "초량사 블루레이어"를 엑시즈 소재로 하고 있을 경우, 이 효과는 상대 턴에도 발동할 수 있다. ③: 1턴에 1번, 자신 메인 페이즈에 발동할 수 있다. 자신의 패 / 필드의 "초량사" 몬스터 1장을 고르고, 이 카드의 아래에 겹쳐 엑시즈 소재로 한다.
  zh-TW:
  zh-CN: |-
    等级3怪兽×2
    ①：没有超量素材的此卡不可攻击。②：1回合1次，去除此卡的1个超量素材，以场上的1张魔法・陷阱卡为对象可以发动（此卡持有“超级量子士 蓝层”作为超量素材的情况下，此效果在对手回合中也可以发动）。将该卡破坏。③：1回合1次，在自己的主要阶段可以发动。从自己手牌・场上（表侧表示）将1只“超级量子士”怪兽作为此卡的超量素材。
