name:
  en: Celtic Mystic
  de: Keltenmystiker
  es: Místico Céltico
  fr: Sage Mystique
  it: Mistico Celtista
  pt: Místico Céltica
  ja: エルフの<ruby>聖<rt>せい</rt></ruby><ruby>賢<rt>けん</rt></ruby><ruby>者<rt>じゃ</rt></ruby>
  ja_romaji: Erufu no Seikenja
  ko: 엘프의 성현자
  ko_rr:
  zh-TW:
  zh-CN: 精灵圣贤者
text:
  en: |-
    If this card is Normal or Special Summoned: You can reveal your entire hand, and if you revealed a card that mentions "Light and Darkness Ritual", you can draw 3 cards, then discard 2 cards, also for the rest of this turn, you can only Special Summon once from the Extra Deck. You can Tribute this card; Special Summon 1 Ritual Monster that mentions "Light and Darkness Ritual" from your hand. You can only use each effect of "Celtic Mystic" once per turn.
  de: |-
    Falls diese Karte als Normal- oder Spezialbeschwörung beschworen wird: Du kannst deine gesamte Hand vorzeigen und falls du eine Karte vorgezeigt hast, die „Ritual von Licht und Finsternis“ erwähnt, kannst du 3 Karten ziehen, dann wirf 2 Karten ab, zusätzlich kannst du für den Rest dieses Spielzugs nur eine Spezialbeschwörung vom Extra Deck durchführen. Du kannst diese Karte als Tribut anbieten; beschwöre 1 Ritualmonster, das „Ritual von Licht und Finsternis“ erwähnt, als Spezialbeschwörung von deiner Hand. Du kannst jeden Effekt von „Keltenmystiker“ nur einmal pro Spielzug verwenden.
  es: |-
    Si esta carta es Invocada de Modo Normal o Especial: puedes mostrar toda tu mano y, si mostraste una carta que mencione "Ritual de la Luz y la Oscuridad", puedes robar 3 cartas, y después descarta 2 cartas y además, por el resto de este turno, sólo puedes Invocar de Modo Especial una vez desde el Deck Extra. Puedes Sacrificar esta carta; Invoca de Modo Especial 1 Monstruo de Ritual que mencione "Ritual de la Luz y la Oscuridad" desde tu mano. Sólo puedes usar cada efecto de "Místico Céltico" una vez por turno.
  fr: |-
    Si cette carte est Invoquée Normalement ou Spécialement : vous pouvez révéler toute votre main, et si vous avez révélé une carte qui mentionne "Rituel de la Lumière et des Ténèbres", vous pouvez piocher 3 cartes, puis défaussez 2 cartes, et aussi, vous ne pouvez Invoquer Spécialement qu'une fois depuis l'Extra Deck le reste de ce tour. Vous pouvez Sacrifier cette carte ; Invoquez Spécialement 1 Monstre Rituel qui mentionne "Rituel de la Lumière et des Ténèbres" depuis votre main. Vous ne pouvez utiliser chaque effet de "Sage Mystique" qu'une fois par tour.
  it: |-
    Se questa carta viene Evocata Normalmente o Specialmente: puoi rivelare tutta la tua mano e, se hai rivelato una carta che menziona "Rituale di Luce e Oscurità", puoi pescare 3 carte, poi scartare 2 carte, inoltre per il resto di questo turno, puoi Evocare Specialmente dall'Extra Deck una sola volta. Puoi offrire come Tributo questa carta; Evoca Specialmente 1 Mostro Rituale che menziona "Rituale di Luce e Oscurità" dalla tua mano. Puoi utilizzare ogni effetto di "Mistico Celtista" una sola volta per turno.
  pt: |-
    Se este card for Invocado por Invocação-Normal ou Especial: você pode revelar toda a sua mão, e se revelar um card que mencione "Ritual da Luz e das Trevas", você pode comprar 3 cards e, depois, descarte 2 cards e, além disso, pelo resto deste turno, você só pode Invocar por Invocação-Especial uma vez do Deck Adicional. Você pode oferecer este card como Tributo; Invoque por Invocação-Especial da sua mão, 1 Monstro de Ritual que mencione "Ritual da Luz e das Trevas". Você só pode usar cada efeito de "Místico Céltica" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが召喚・特殊召喚した場合に発動できる。自分の手札を全て相手に見せる。その中に「光と闇の儀式」のカード名が記されたカードがあった場合、自分は３枚ドローできる。ドローした場合、さらに自分の手札を２枚選んで捨てる。この効果の発動後、ターン終了時まで自分は１回しかＥＸデッキからモンスターを特殊召喚できない。②：このカードをリリースして発動できる。手札から「光と闇の儀式」のカード名が記された儀式モンスター１体を特殊召喚する。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드를 일반 소환 / 특수 소환했을 경우에 발동할 수 있다. 자신의 패를 전부 상대에게 보여준다. 그 중에 "빛과 어둠의 의식"의 카드명이 쓰여진 카드가 있었을 경우, 자신은 3장 드로우할 수 있다. 드로우했을 경우, 추가로 자신의 패를 2장 고르고 버린다. 이 효과의 발동 후, 턴 종료시까지 자신은 1회밖에 엑스트라 덱에서 몬스터를 특수 소환할 수 없다. ②: 이 카드를 릴리스하고 발동할 수 있다. 패에서 "빛과 어둠의 의식"의 카드명이 쓰여진 의식 몬스터 1장을 특수 소환한다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：此卡召唤・特殊召唤的情况下可以发动。向对手出示自己的所有手牌。其中有记载有“光与暗的仪式”卡名的卡的情况下，自己可抽3张。抽了牌的情况下，进而挑选自己的2张手牌舍弃。此效果发动后，直至回合结束时为止，自己从额外牌组仅可特殊召唤怪兽1次。②：解放此卡可以发动。从手牌将1只记载有“光与暗的仪式”卡名的仪式怪兽特殊召唤。
