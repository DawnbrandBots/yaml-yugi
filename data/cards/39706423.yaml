text:
  en: |-
    If this card is in your hand and you control a "GMX" monster or a Dinosaur monster: You can Special Summon this card. You can target 1 face-up monster on the field; excavate the top cards of your Deck until you excavate a Dinosaur monster, send that Dinosaur monster to the GY, and if you do, the targeted monster becomes a Dinosaur monster (until the end of this turn), also shuffle the rest into the Deck. You can only use each effect of "GMX Suppression Squad" once per turn.
  de: |-
    Falls sich diese Karte in deiner Hand befindet und du ein „GMX“-Monster oder ein Dinosaurier-Monster kontrollierst: Du kannst diese Karte als Spezialbeschwörung beschwören. Du kannst 1 offenes Monster auf dem Spielfeld wählen; grabe die obersten Karten deines Decks aus, bis du ein Dinosaurier-Monster ausgräbst, lege jenes Dinosaurier-Monster auf den Friedhof und falls du dies tust, wird das als Ziel gewählte Monster (bis zum Ende dieses Spielzugs) zu einem Dinosaurier-Monster, zusätzlich mische die restlichen ins Deck. Du kannst jeden Effekt von „GMX-Kampftrupp“ nur einmal pro Spielzug verwenden.
  es: |-
    Si esta carta está en tu mano y controlas un monstruo "GMX" o un monstruo Dinosaurio: puedes Invocar esta carta de Modo Especial. Puedes seleccionar 1 monstruo boca arriba en el Campo; excava las cartas de la parte superior de tu Deck hasta que excaves un monstruo Dinosaurio, manda al Cementerio ese monstruo Dinosaurio y, si lo haces, el monstruo seleccionado se convierte en un monstruo Dinosaurio (hasta el final de este turno), y además baraja el resto al Deck. Sólo puedes usar cada efecto de "Escuadrón de Supresión de GMX" una vez por turno.
  fr: |-
    Si cette carte est dans votre main et que vous contrôlez un monstre "GMX" ou un monstre Dinosaure : vous pouvez Invoquer Spécialement cette carte. Vous pouvez cibler 1 monstre face recto sur le Terrain ; dévoilez les cartes du dessus de votre Deck jusqu'à dévoiler un monstre Dinosaure, envoyez le monstre Dinosaure au Cimetière, et si vous le faites, le monstre ciblé devient un monstre Dinosaure (jusqu'à la fin de ce tour), et aussi, mélangez les cartes restantes dans le Deck. Vous ne pouvez utiliser chaque effet de "Escouade de Dissimulation GMX" qu'une fois par tour.
  it: |-
    Se questa carta è nella tua mano e tu controlli un mostro "GMX" o un mostro Dinosauro: puoi Evocare Specialmente questa carta. Puoi scegliere come bersaglio 1 mostro scoperto sul Terreno; dissotterra carte dalla cima del tuo Deck fino a quando dissotterri un mostro Dinosauro, manda quel mostro Dinosauro al Cimitero e, se lo fai, il mostro scelto come bersaglio diventa un mostro Dinosauro (fino alla fine di questo turno), inoltre mischia il resto nel Deck. Puoi utilizzare ogni effetto di "GMX Squadra di Soppressione" una sola volta per turno.
  pt: |-
    Se este card estiver na sua mão e você controlar um monstro "GMX" ou um monstro Dinossauro: você pode Invocar este card por Invocação-Especial. Você pode escolher 1 monstro com a face para cima no campo; escave cards do topo do seu Deck até escavar um monstro Dinossauro, envie esse monstro Dinossauro para o Cemitério e, se isso acontecer, o monstro alvo se torna um monstro Dinossauro (até o final deste turno) e, além disso, embaralhe o resto no Deck. Você só pode usar cada efeito de "Esquadrão de Supressão da GMX" uma vez por turno.
