text:
  en: |-
    You can reveal 1 other "The Phantom Knights" card in your hand; Special Summon this card from your hand. If this card is Normal or Special Summoned: You can add 1 "The Phantom Knights" monster from your Deck to your hand. You can banish this card from your GY, then target 1 Xyz Monster you control; this turn, you can use it as material for an Xyz Summon using its Rank as if it were a Level. You can only use each effect of "The Phantom Knights of Decayed Cloak" once per turn.
