name:
  en: The Phantom Knights of Decayed Cloak
  de: Die Phantomritter des Verwesten Umhangs
  es: Los Caballeros Fantasma de la Capa Andrajosa
  fr: Les Chevaliers Fantômes de la Cape Décomposée
  it: I Cavalieri Fantasma del Logoro Mantello
  pt: Os Cavaleiros Fantasmas do Manto Decadente
  ja: <ruby>幻影騎士団<rt>ファントム・ナイツ</rt></ruby>ディケイクローク
  ja_romaji: Fantomu Naitsu Dikei Kurōku
  ko: 팬텀 나이츠 디케이클로크
  ko_rr:
  zh-TW:
  zh-CN: 魅影骑士团衰朽斗篷
text:
  en: |-
    If this card is in your hand: You can reveal 1 other "The Phantom Knights" card in your hand; Special Summon this card. If this card is Normal or Special Summoned: You can add 1 "The Phantom Knights" monster from your Deck to your hand. You can banish this card from your GY, then target 1 Xyz Monster you control; this turn, you can use that face-up Xyz Monster as material for an Xyz Summon using its Rank as if it were a Level. You can only use each effect of "The Phantom Knights of Decayed Cloak" once per turn.
  de: |-
    Falls sich diese Karte in deiner Hand befindet: Du kannst 1 andere „Die Phantomritter“-Karte in deiner Hand vorzeigen; beschwöre diese Karte als Spezialbeschwörung. Falls diese Karte als Normal- oder Spezialbeschwörung beschworen wird: Du kannst deiner Hand 1 „Die Phantomritter“-Monster von deinem Deck hinzufügen. Du kannst diese Karte von deinem Friedhof verbannen und dann 1 Xyz-Monster wählen, das du kontrollierst; in diesem Spielzug kannst du jenes offene Xyz-Monster als Material für eine Xyz-Beschwörung verwenden, indem du seinen Rang verwendest, als ob er eine Stufe wäre. Du kannst jeden Effekt von „Die Phantomritter des Verwesten Umhangs“ nur einmal pro Spielzug verwenden.
  es: |-
    Si esta carta está en tu mano: puedes mostrar otra carta "Los Caballeros Fantasma" en tu mano; Invoca esta carta de Modo Especial. Si esta carta es Invocada de Modo Normal o Especial: puedes añadir a tu mano 1 monstruo "Los Caballeros Fantasma" en tu Deck. Puedes desterrar esta carta en tu Cementerio, y después selecciona 1 Monstruo Xyz que controles; este turno, puedes usar ese Monstruo Xyz boca arriba como material para una Invocación Xyz usando su Rango como si fuera un Nivel. Sólo puedes usar cada efecto de "Los Caballeros Fantasma de la Capa Andrajosa" una vez por turno.
  fr: |-
    Si cette carte est dans votre main : vous pouvez révéler 1 autre carte "Les Chevaliers Fantômes" dans votre main ; Invoquez Spécialement cette carte. Si cette carte est Invoquée Normalement ou Spécialement : vous pouvez ajouter 1 monstre "Les Chevaliers Fantômes" depuis votre Deck à votre main. Vous pouvez bannir cette carte depuis votre Cimetière, puis ciblez 1 Monstre Xyz que vous contrôlez ; ce tour, vous pouvez utiliser le Monstre Xyz face recto comme Matériel pour une Invocation Xyz en utilisant son Rang comme Niveau. Vous ne pouvez utiliser chaque effet de "Les Chevaliers Fantômes de la Cape Décomposée" qu'une fois par tour.
  it: |-
    Se questa carta è nella tua mano: puoi rivelare 1 altra carta "I Cavalieri Fantasma" nella tua mano; Evoca Specialmente questa carta. Se questa carta viene Evocata Normalmente o Specialmente: puoi aggiungere 1 mostro "I Cavalieri Fantasma" dal tuo Deck alla tua mano. Puoi bandire questa carta dal tuo Cimitero, poi scegliere come bersaglio 1 Mostro Xyz che controlli; in questo turno, puoi utilizzare quel Mostro Xyz scoperto come materiale per un'Evocazione Xyz utilizzando il suo Rango come se fosse un Livello. Puoi utilizzare ogni effetto di "I Cavalieri Fantasma del Logoro Mantello" una sola volta per turno.
  pt: |-
    Se este card estiver na sua mão: você pode revelar 1 outro card "Os Cavaleiros Fantasmas" na sua mão; Invoque este card por Invocação-Especial. Se este card for Invocado por Invocação-Normal ou Especial: você pode adicionar 1 monstro "Os Cavaleiros Fantasmas" do seu Deck à sua mão. Você pode banir este card do seu Cemitério e, depois, escolha 1 Monstro Xyz que você controla; neste turno, você pode usar esse Monstro Xyz com a face para cima como matéria para uma Invocação-Xyz usando sua Classe como se fosse um Nível. Você só pode usar cada efeito de "Os Cavaleiros Fantasmas do Manto Decadente" uma vez por turno.
  ja: |-
    このカード名の①②③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが手札に存在する場合、手札の他の「幻影騎士団」カード１枚を相手に見せて発動できる。このカードを特殊召喚する。②：このカードが召喚・特殊召喚した場合に発動できる。デッキから「幻影騎士団」モンスター１体を手札に加える。③：墓地のこのカードを除外し、自分フィールドのＸモンスター１体を対象として発動できる。そのＸモンスターはこのターン、自身のランクと同じ数値のレベルのモンスターとしてＸ召喚の素材にできる。
  ko: |-
    이 카드명의 ①②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드가 패에 존재할 경우, 패의 다른 "팬텀 나이츠" 카드 1장을 상대에게 보여주고 발동할 수 있다. 이 카드를 특수 소환한다. ②: 이 카드를 일반 소환 / 특수 소환했을 경우에 발동할 수 있다. 덱에서 "팬텀 나이츠" 몬스터 1장을 패에 넣는다. ③: 묘지의 이 카드를 제외하고, 자신 필드의 엑시즈 몬스터 1장을 대상으로 하여 발동할 수 있다. 그 엑시즈 몬스터는 이 턴에, 자신의 랭크와 같은 수치의 레벨의 몬스터로서 엑시즈 소환의 소재로 할 수 있다.
  zh-TW:
  zh-CN: |-
    此卡名的①②③效果1回合仅可各使用1次。①：此卡存在于手牌的情况下，向对手出示手牌的1张其他“魅影骑士团”卡可以发动。将此卡特殊召唤。②：此卡召唤・特殊召唤的情况下可以发动。从牌组将1只“魅影骑士团”怪兽加入手牌。③：将墓地的此卡除外，以自己场上的1只超量怪兽为对象可以发动。该超量怪兽在此回合，可当成与自身阶级的数值相同等级的怪兽，来作为超量召唤的素材。
