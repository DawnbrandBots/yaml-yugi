text:
  en: |-
    Add up to 4 "Melffy" monsters with different names from your Deck to your hand, then it becomes the End Phase of this turn. You can banish this card from your GY, then target 2 "Melffy" cards in your GY, except "Melffy Statues Game"; add 1 of them to your hand, and if you do, place the other on the bottom of the Deck. You can only use this effect of "Melffy Statues Game" once per turn. You cannot Special Summon the turn you activate this card, except "Melffy" monsters.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカードを発動するターン、自分は「メルフィー」モンスターしか特殊召喚できない。このカード名の②の効果は１ターンに１度しか使用できない。①：デッキから「メルフィー」モンスターを４体まで手札に加える（同名カードは１枚まで）。その後、このターンのエンドフェイズになる。②：墓地のこのカードを除外し、「メルフィーがころんだ」以外の自分の墓地の「メルフィー」カード２枚を対象として発動できる。その内の１枚を手札に加え、もう１枚をデッキの一番下に戻す。
  ko:
  zh-TW:
  zh-CN: |-
    发动此卡的回合中，自己仅可特殊召唤“梅尔菲”怪兽。此卡名的②效果1回合仅可使用1次。①：从牌组将最多4只“梅尔菲”怪兽加入手牌（同名卡最多1张）。然后，直接变为此回合的结束阶段。②：将墓地的此卡除外，以“梅尔菲摔倒倒”以外的、自己墓地的2张“梅尔菲”卡为对象可以发动。将其中1张加入手牌，另1张放回牌组最下面。
