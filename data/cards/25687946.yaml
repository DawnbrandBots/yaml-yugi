name:
  en: Melffy Footsteps
  de: Melffy am Berg
  es: Pasitos Melffy
  fr: Un, Deux, Trois, Melffy
  it: Passi Melffy
  pt: Estátua Melffy
  ja: メルフィーがころんだ
  ja_romaji: Merufī ga Koronda
  ko: 메르피 꽃이 피었습니다
  ko_rr:
  zh-TW:
  zh-CN: 梅尔菲摔倒倒
text:
  en: |-
    Add up to 4 "Melffy" monsters with different names from your Deck to your hand, then it becomes the End Phase of this turn. You can banish this card from your GY, then target 2 "Melffy" cards in your GY, except "Melffy Footsteps"; add 1 of them to your hand, and if you do, place the other on the bottom of your Deck. You can only use this effect of "Melffy Footsteps" once per turn. You cannot Special Summon the turn you activate this card, except "Melffy" monsters.
  de: |-
    Füge deiner Hand bis zu 4 „Melffy“-Monster mit unterschiedlichen Namen von deinem Deck hinzu, dann beginnt die End Phase dieses Spielzugs. Du kannst diese Karte von deinem Friedhof verbannen und dann 2 „Melffy“-Karten in deinem Friedhof wählen, außer „Melffy am Berg“; füge 1 von ihnen deiner Hand hinzu und falls du dies tust, lege die andere unter dein Deck. Du kannst diesen Effekt von „Melffy am Berg“ nur einmal pro Spielzug verwenden. Du kannst in dem Spielzug, in dem du diese Karte aktivierst, keine Spezialbeschwörungen durchführen, außer von „Melffy“-Monstern.
  es: |-
    Añade a tu mano hasta 4 monstruos "Melffy" con nombres diferentes en tu Deck, y después pasa a la End Phase de este turno. Puedes desterrar esta carta en tu Cementerio, y después selecciona 2 cartas "Melffy" en tu Cementerio, excepto "Pasitos Melffy"; añade 1 de ellas a tu mano y, si lo haces, pon la otra en la parte inferior de tu Deck. Sólo puedes usar este efecto de "Pasitos Melffy" una vez por turno. No puedes Invocar de Modo Especial el turno en el que activas esta carta, excepto monstruos "Melffy".
  fr: |-
    Ajoutez max. 4 monstres "Melffy" de noms différents depuis votre Deck à votre main, puis passez à la End Phase de ce tour. Vous pouvez bannir cette carte depuis votre Cimetière, puis ciblez 2 cartes "Melffy" ("Un, Deux, Trois, Melffy" exclu) dans votre Cimetière ; ajoutez-en 1 à votre main, et si vous le faites, placez l'autre au-dessous de votre Deck. Vous ne pouvez utiliser cet effet de "Un, Deux, Trois, Melffy" qu'une fois par tour. Vous ne pouvez pas Invoquer Spécialement (monstres "Melffy" exclus) le tour où vous activez cette carte.
  it: |-
    Aggiungi fino a 4 mostri "Melffy" con nomi diversi dal tuo Deck alla tua mano, poi passa alla End Phase di questo turno. Puoi bandire questa carta dal tuo Cimitero, poi scegliere come bersaglio 2 carte "Melffy" nel tuo Cimitero, eccetto "Passi Melffy"; aggiungi 1 di esse alla tua mano e, se lo fai, metti l'altra in fondo al tuo Deck. Puoi utilizzare questo effetto di "Passi Melffy" una sola volta per turno. Non puoi Evocare Specialmente nel turno in cui attivi questa carta, eccetto mostri "Melffy".
  pt: |-
    Adicione até 4 monstros "Melffy" com nomes diferentes do seu Deck à sua mão e, depois, essa se torna a Fase Final deste turno. Você pode banir este card do seu Cemitério e, depois, escolha 2 cards "Melffy" no seu Cemitério, exceto "Estátua Melffy"; adicione 1 deles à sua mão e, se isso acontecer, coloque o outro no fundo do seu Deck. Você só pode usar este efeito de "Estátua Melffy" uma vez por turno. Você não pode Invocar por Invocação-Especial no turno em que ativar este card, exceto monstros "Melffy".
  ja: |-
    このカードを発動するターン、自分は「メルフィー」モンスターしか特殊召喚できない。このカード名の②の効果は１ターンに１度しか使用できない。①：デッキから「メルフィー」モンスターを４体まで手札に加える（同名カードは１枚まで）。その後、このターンのエンドフェイズになる。②：墓地のこのカードを除外し、「メルフィーがころんだ」以外の自分の墓地の「メルフィー」カード２枚を対象として発動できる。その内の１枚を手札に加え、もう１枚をデッキの一番下に戻す。
  ko: |-
    이 카드를 발동하는 턴에, 자신은 "메르피" 몬스터밖에 특수 소환할 수 없다. 이 카드명의 ②의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 덱에서 "메르피" 몬스터를 4장까지 패에 넣는다(같은 이름의 카드는 1장까지). 그 후, 이 턴의 엔드 페이즈가 된다. ②: 묘지의 이 카드를 제외하고, "메르피 꽃이 피었습니다" 이외의 자신 묘지의 "메르피" 카드 2장을 대상으로 하고 발동할 수 있다. 그 중의 1장을 패에 넣고, 나머지 1장을 덱 맨 아래로 되돌린다.
  zh-TW:
  zh-CN: |-
    发动此卡的回合中，自己仅可特殊召唤“梅尔菲”怪兽。此卡名的②效果1回合仅可使用1次。①：从牌组将最多4只“梅尔菲”怪兽加入手牌（同名卡最多1张）。然后，直接变为此回合的结束阶段。②：将墓地的此卡除外，以“梅尔菲摔倒倒”以外的、自己墓地的2张“梅尔菲”卡为对象可以发动。将其中1张加入手牌，另1张放回牌组最下面。
