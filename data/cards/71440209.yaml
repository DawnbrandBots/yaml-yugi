  ja: <ruby>黒<rt>くろ</rt></ruby><ruby>魔<rt>ま</rt></ruby><ruby>術<rt>じゅつ</rt></ruby>の<ruby>護<rt>ご</rt></ruby><ruby>符<rt>ふ</rt></ruby>
  ja_romaji: Kuromajutsu no Gofu
