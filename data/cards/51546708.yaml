text:
  en: |-
    You can reveal this card in your hand; immediately after this effect resolves, Normal Summon 1 "Dark Tuner" monster. You can only use this effect of "Dark Tuner Nightmare Hand" once per turn. If this card is Normal Summoned: You can Special Summon 1 Level 2 or lower monster from your hand. Once per turn, if you control this Normal Summoned/Set card: You can Tribute both this face-up card and 1 face-up non-Tuner with a lower Level, and if you do, Special Summon 1 Synchro Monster from your Extra Deck with a Level equal to the difference in Levels of those monsters (this is treated as a Synchro Summon).
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①の効果は１ターンに１度しか使用できない。①：手札のこのカードを相手に見せて発動できる。「ＤＴ」モンスター１体の召喚を行う。②：このカードが召喚した場合に発動できる。手札からレベル２以下のモンスター１体を特殊召喚する。③：１ターンに１度、このカードが通常召喚されている場合に発動できる。自分フィールドの表側表示の、このカードより低いレベルを持つチューナー以外のモンスター１体とこのカードをリリースし、そのレベルの差と同じレベルのＳモンスター１体をＳ召喚扱いでＥＸデッキから特殊召喚する。
  ko: |-
    이 카드명의 ①의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 패의 이 카드를 상대에게 보여주고 발동할 수 있다. "DT(다크튜너)" 몬스터 1장의 일반 소환을 실행한다. ②: 이 카드를 일반 소환했을 경우에 발동할 수 있다. 패에서 레벨 2 이하의 몬스터 1장을 특수 소환한다. ③: 1턴에 1번, 이 카드가 통상 소환되어 있을 경우에 발동할 수 있다. 자신 필드의 앞면 표시의, 이 카드보다 낮은 레벨을 가지는 튜너 이외의 몬스터 1장과 이 카드를 릴리스하고, 그 레벨의 차와 같은 레벨의 싱크로 몬스터 1장을 싱크로 소환으로 취급하여 엑스트라 덱에서 특수 소환한다.
  zh-TW:
  zh-CN: |-
    此卡名的①效果1回合仅可使用1次。①：向对手出示手牌的此卡可以发动。进行1只“黑暗协调”怪兽的召唤。②：此卡召唤的情况下可以发动。从手牌将1只等级2以下的怪兽特殊召唤。③：1回合1次，此卡是被通常召唤的情况下可以发动。解放自己场上的此卡，和1只表侧表示的、等级低于此卡的协调以外的怪兽，根据其等级之差的数值，从额外牌组将1只相同等级的同步怪兽视为同步召唤特殊召唤。
