  zh-CN: 血树龙姬 朵拉塞蕾尔
text:
  en: |-
    You can send 1 Level 4 or lower Plant monster from your Deck to the GY, except "Princess Dracaena, the Thirsting Tree"; Special Summon this card from your hand, and if you do, it becomes that sent monster's Level. You can banish 1 Plant monster and this card from your GY; Special Summon 1 Dragon monster from your hand or GY. You can only use each effect of "Princess Dracaena, the Thirsting Tree" once per turn, also you cannot Special Summon the turn you activate either of this card's effects, except Dragon or Plant monsters.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できず、この効果を発動するターン、自分はドラゴン族・植物族モンスターしか特殊召喚できない。①：「血樹竜姫ドラセレア」を除く、レベル４以下の植物族モンスター１体をデッキから墓地へ送って発動できる。このカードを手札から特殊召喚する。この効果で特殊召喚したこのカードのレベルは、墓地へ送ったモンスターと同じになる。②：自分の墓地からこのカードと植物族モンスター１体を除外して発動できる。自分の手札・墓地からドラゴン族モンスター１体を特殊召喚する。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없으며, 이 효과를 발동하는 턴에, 자신은 드래곤족 / 식물족 몬스터밖에 특수 소환할 수 없다. ①: "혈수용희 드라세레아"가 아닌, 레벨 4 이하의 식물족 몬스터 1장을 덱에서 묘지로 보내고 발동할 수 있다. 이 카드를 패에서 특수 소환한다. 이 효과로 특수 소환한 이 카드의 레벨은, 묘지로 보낸 몬스터와 같아진다. ②: 자신 묘지에서 이 카드와 식물족 몬스터 1장을 제외하고 발동할 수 있다. 자신의 패 / 묘지에서 드래곤족 몬스터 1장을 특수 소환한다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次，发动此效果的回合中，自己仅可特殊召唤龙族・植物族怪兽。①：从牌组将除“血树龙姬 朵拉塞蕾尔”以外的1只等级4以下的植物族怪兽送至墓地可以发动。从手牌将此卡特殊召唤。以此效果特殊召唤的此卡的等级变为与送至墓地的怪兽相同。②：从自己墓地将此卡与1只植物族怪兽除外可以发动。从自己手牌・墓地将1只龙族怪兽特殊召唤。
