name:
  en: Princess Dracaena, the Thirsting Tree
  de: Prinzessin Dracaena, der dürstende Baum
  es: Princesa Dracaena, el Árbol Sediento
  fr: Princesse Dracaena, l'Arbre Assoiffé
  it: Principessa Dracaena, l'Albero Assetato
  pt: Princesa Dracaena, a Árvore Sedenta
  ja: <ruby>血<rt>けっ</rt></ruby><ruby>樹<rt>き</rt></ruby><ruby>竜<rt>りゅう</rt></ruby><ruby>姫<rt>き</rt></ruby>ドラセレア
  ja_romaji: Kekkiryūki Doraserea
  ko: 혈수용희 드라세레아
  ko_rr:
  zh-TW:
  zh-CN: 血树龙姬 朵拉塞蕾尔
text:
  en: |-
    You can send 1 Level 4 or lower Plant monster from your Deck to the GY, except "Princess Dracaena, the Thirsting Tree"; Special Summon this card from your hand, and if you do, it becomes that sent monster's Level. You can banish 1 Plant monster and this card from your GY; Special Summon 1 Dragon monster from your hand or GY. You can only use each effect of "Princess Dracaena, the Thirsting Tree" once per turn, also you cannot Special Summon the turn you activate either of this card's effects, except Dragon or Plant monsters.
  de: |-
    Du kannst 1 Pflanze-Monster der Stufe 4 oder niedriger von deinem Deck auf den Friedhof legen, außer „Prinzessin Dracaena, der dürstende Baum“; beschwöre diese Karte als Spezialbeschwörung von deiner Hand und falls du dies tust, wird ihre Stufe gleich der Stufe jenes gelegten Monsters. Du kannst 1 Pflanze-Monster und diese Karte von deinem Friedhof verbannen; beschwöre 1 Drache-Monster als Spezialbeschwörung von deiner Hand oder deinem Friedhof. Du kannst jeden Effekt von „Prinzessin Dracaena, der dürstende Baum“ nur einmal pro Spielzug verwenden, zusätzlich kannst du in dem Spielzug, in dem du einen Effekt dieser Karte aktivierst, keine Spezialbeschwörungen durchführen, außer von Drache- oder Pflanze-Monstern.
  es: |-
    Puedes mandar al Cementerio 1 monstruo Planta de Nivel 4 o menor en tu Deck, excepto "Princesa Dracaena, el Árbol Sediento"; Invoca esta carta de Modo Especial desde tu mano y, si lo haces, ésta se convierte en el Nivel de ese monstruo mandado. Puedes desterrar 1 monstruo Planta y esta carta en tu Cementerio; Invoca de Modo Especial 1 monstruo Dragón desde tu mano o Cementerio. Sólo puedes usar cada efecto de "Princesa Dracaena, el Árbol Sediento" una vez por turno, y además no puedes Invocar de Modo Especial el turno en el que activas cualquiera de los efectos de esta carta, excepto monstruos Dragón o Planta.
  fr: |-
    Vous pouvez envoyer 1 monstre Plante de max. Niveau 4 ("Princesse Dracaena, l'Arbre Assoiffé" exclu) depuis votre Deck au Cimetière ; Invoquez Spécialement cette carte depuis votre main, et si vous le faites, elle devient le Niveau du monstre envoyé. Vous pouvez bannir 1 monstre Plante et cette carte depuis votre Cimetière ; Invoquez Spécialement 1 monstre Dragon depuis votre main ou Cimetière. Vous ne pouvez utiliser chaque effet de "Princesse Dracaena, l'Arbre Assoiffé" qu'une fois par tour, et aussi, vous ne pouvez pas Invoquer Spécialement (monstres Dragon ou Plante exclus) le tour où vous activez un effet de cette carte.
  it: |-
    Puoi mandare 1 mostro Pianta di Livello 4 o inferiore dal tuo Deck al Cimitero, eccetto "Principessa Dracaena, l'Albero Assetato"; Evoca Specialmente questa carta dalla tua mano e, se lo fai, essa diventa del Livello di quel mostro mandato. Puoi bandire 1 mostro Pianta e questa carta dal tuo Cimitero; Evoca Specialmente 1 mostro Drago dalla tua mano o Cimitero. Puoi utilizzare ogni effetto di "Principessa Dracaena, l'Albero Assetato" una sola volta per turno, inoltre non puoi Evocare Specialmente nel turno in cui attivi qualsiasi degli effetti di questa carta, eccetto mostri Drago o Pianta.
  pt: |-
    Você pode enviar 1 monstro Planta de Nível 4 ou menos do seu Deck para o Cemitério, exceto "Princesa Dracaena, a Árvore Sedenta"; Invoque este card por Invocação-Especial da sua mão e, se isso acontecer, ele se torna do Nível desse monstro enviado. Você pode banir 1 monstro Planta e este card do seu Cemitério; Invoque por Invocação-Especial 1 monstro Dragão da sua mão ou do Cemitério. Você só pode usar cada efeito de "Princesa Dracaena, a Árvore Sedenta" uma vez por turno e, além disso, você não pode Invocar por Invocação-Especial no turno em que ativar qualquer um dos efeitos deste card, exceto monstros Dragão ou Planta.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できず、この効果を発動するターン、自分はドラゴン族・植物族モンスターしか特殊召喚できない。①：「血樹竜姫ドラセレア」を除く、レベル４以下の植物族モンスター１体をデッキから墓地へ送って発動できる。このカードを手札から特殊召喚する。この効果で特殊召喚したこのカードのレベルは、墓地へ送ったモンスターと同じになる。②：自分の墓地からこのカードと植物族モンスター１体を除外して発動できる。自分の手札・墓地からドラゴン族モンスター１体を特殊召喚する。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없으며, 이 효과를 발동하는 턴에, 자신은 드래곤족 / 식물족 몬스터밖에 특수 소환할 수 없다. ①: "혈수용희 드라세레아"가 아닌, 레벨 4 이하의 식물족 몬스터 1장을 덱에서 묘지로 보내고 발동할 수 있다. 이 카드를 패에서 특수 소환한다. 이 효과로 특수 소환한 이 카드의 레벨은, 묘지로 보낸 몬스터와 같아진다. ②: 자신 묘지에서 이 카드와 식물족 몬스터 1장을 제외하고 발동할 수 있다. 자신의 패 / 묘지에서 드래곤족 몬스터 1장을 특수 소환한다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次，发动此效果的回合中，自己仅可特殊召唤龙族・植物族怪兽。①：从牌组将除“血树龙姬 朵拉塞蕾尔”以外的1只等级4以下的植物族怪兽送至墓地可以发动。从手牌将此卡特殊召唤。以此效果特殊召唤的此卡的等级变为与送至墓地的怪兽相同。②：从自己墓地将此卡与1只植物族怪兽除外可以发动。从自己手牌・墓地将1只龙族怪兽特殊召唤。
