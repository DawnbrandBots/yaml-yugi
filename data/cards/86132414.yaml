text:
  en: |-
    You can send 3 face-up "Abyss of the Sacred Beasts" you control to the GY, including this card, then target 1 face-up monster your opponent controls; change it to face-down Defense Position. You can only use each of the following effects of "Abyss of the Sacred Beasts" once per turn. During the Main Phase: You can place 2 "Abyss of the Sacred Beasts" from your hand, Deck, and/or GY, face-up on your field. During your opponent's End Phase, if this card is in your GY: You can place this card on the bottom of the Deck.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①③の効果はそれぞれ１ターンに１度しか使用できない。①：自分・相手のメインフェイズに発動できる。自分の手札・デッキ・墓地から「三幻魔の神淵」２枚を自分フィールドに表側表示で置く。②：このカードを含む自分フィールドの表側表示の「三幻魔の神淵」３枚を墓地へ送り、相手フィールドの表側表示モンスター１体を対象として発動できる。そのモンスターを裏側守備表示にする。③：このカードが墓地に存在する場合、相手エンドフェイズに発動できる。このカードをデッキの一番下に戻す。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①③效果1回合仅可各使用1次。①：在自己・对手的主要阶段可以发动。从自己手牌・牌组・墓地将2张“三幻魔之神渊”以表侧表示放在自己场上。②：将自己场上包含此卡在内的3张表侧表示的“三幻魔之神渊”送至墓地，以对手场上的1只表侧表示怪兽为对象可以发动。将该怪兽改成里侧守备表示。③：此卡存在于墓地的情况下，在对手的结束阶段可以发动。将此卡放回牌组最下面。
