name:
  en: Abyss of the Sacred Beasts
  de: Abgrund der heiligen Ungeheuer
  es: Abismo de las Bestias Sagradas
  fr: Abysses des Bêtes Sacrées
  it: Abisso delle Bestie Sacre
  pt: Abismo das Bestas Sagradas
  ja: <ruby>三<rt>さん</rt></ruby><ruby>幻<rt>げん</rt></ruby><ruby>魔<rt>ま</rt></ruby>の<ruby>神<rt>しん</rt></ruby><ruby>淵<rt>えん</rt></ruby>
  ja_romaji: Sangenma no Shin'en
  ko:
