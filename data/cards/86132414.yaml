  zh-TW:
  zh-CN: 三幻魔之神渊
text:
  en: |-
    You can send 3 face-up "Abyss of the Sacred Beasts" you control to the GY, including this card, then target 1 face-up monster your opponent controls; change it to face-down Defense Position. You can only use each of the following effects of "Abyss of the Sacred Beasts" once per turn. During the Main Phase: You can place 2 "Abyss of the Sacred Beasts" from your hand, Deck, and/or GY, face-up on your field. During your opponent's End Phase, if this card is in your GY: You can place this card on the bottom of the Deck.
  de: |-
    Du kannst 3 offene „Abgrund der heiligen Ungeheuer“, die du kontrollierst, auf den Friedhof legen, darunter diese Karte, und dann 1 offenes Monster wählen, das dein Gegner kontrolliert; ändere es in die verdeckte Verteidigungsposition. Du kannst jeden der folgenden Effekte von „Abgrund der heiligen Ungeheuer“ nur einmal pro Spielzug verwenden. Während der Main Phase: Du kannst 2 „Abgrund der heiligen Ungeheuer“ von deiner Hand, deinem Deck und/oder deinem Friedhof offen auf deine Spielfeldseite legen. Während der End Phase deines Gegners, falls sich diese Karte in deinem Friedhof befindet: Du kannst diese Karte unters Deck legen.
  es: |-
    Puedes mandar al Cementerio 3 "Abismo de las Bestias Sagradas" boca arriba que controles, incluyendo esta carta, y después selecciona 1 monstruo boca arriba que controle tu adversario; cámbialo a Posición de Defensa boca abajo. Sólo puedes usar cada uno de los siguientes efectos de "Abismo de las Bestias Sagradas" una vez por turno. Durante la Main Phase: puedes poner boca arriba en tu Campo 2 "Abismo de las Bestias Sagradas" en tu mano, Deck y/o Cementerio. Durante la End Phase de tu adversario, si esta carta está en tu Cementerio: puedes poner esta carta en la parte inferior del Deck.
  fr: |-
    Vous pouvez envoyer 3 "Abysses des Bêtes Sacrées" face recto que vous contrôlez (cette carte incluse) au Cimetière, puis ciblez 1 monstre face recto contrôlé par votre adversaire ; changez-le en Position de Défense face verso. Vous ne pouvez utiliser chacun des effets suivants de "Abysses des Bêtes Sacrées" qu'une fois par tour. Durant la Main Phase : vous pouvez placer face recto 2 "Abysses des Bêtes Sacrées" depuis votre main, Deck et/ou Cimetière sur votre Terrain. Durant la End Phase de votre adversaire, si cette carte est dans votre Cimetière : vous pouvez placer cette carte au-dessous du Deck.
  it: |-
    Puoi mandare 3 "Abisso delle Bestie Sacre" scoperti che controlli al Cimitero, compresa questa carta, poi scegliere come bersaglio 1 mostro scoperto controllato dal tuo avversario; mettilo coperto in Posizione di Difesa. Puoi utilizzare ognuno dei seguenti effetti di "Abisso delle Bestie Sacre" una sola volta per turno. Durante la Main Phase: puoi mettere 2 "Abisso delle Bestie Sacre" dalla tua mano, Deck e/o Cimitero, scoperti sul tuo Terreno. Durante la End Phase del tuo avversario, se questa carta è nel tuo Cimitero: puoi mettere questa carta in fondo al Deck.
  pt: |-
    Você pode enviar 3 "Abismo das Bestas Sagradas" com a face para cima que você controla para o Cemitério, incluindo este card e, depois, escolha 1 monstro com a face para cima que seu oponente controla; coloque-o com a face para baixo em Posição de Defesa. Você só pode usar cada um dos seguintes efeitos de "Abismo das Bestas Sagradas" uma vez por turno. Durante a Fase Principal: você pode colocar 2 "Abismo das Bestas Sagradas" da sua mão, do Deck e/ou do Cemitério, com a face para cima no seu campo. Durante a Fase Final do seu oponente, se este card estiver no seu Cemitério: você pode colocar este card no fundo do Deck.
  ja: |-
    このカード名の①③の効果はそれぞれ１ターンに１度しか使用できない。①：自分・相手のメインフェイズに発動できる。自分の手札・デッキ・墓地から「三幻魔の神淵」２枚を自分フィールドに表側表示で置く。②：このカードを含む自分フィールドの表側表示の「三幻魔の神淵」３枚を墓地へ送り、相手フィールドの表側表示モンスター１体を対象として発動できる。そのモンスターを裏側守備表示にする。③：このカードが墓地に存在する場合、相手エンドフェイズに発動できる。このカードをデッキの一番下に戻す。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①③效果1回合仅可各使用1次。①：在自己・对手的主要阶段可以发动。从自己手牌・牌组・墓地将2张“三幻魔之神渊”以表侧表示放在自己场上。②：将自己场上包含此卡在内的3张表侧表示的“三幻魔之神渊”送至墓地，以对手场上的1只表侧表示怪兽为对象可以发动。将该怪兽改成里侧守备表示。③：此卡存在于墓地的情况下，在对手的结束阶段可以发动。将此卡放回牌组最下面。
