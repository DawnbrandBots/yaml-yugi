    Special Summon 1 "Umbral Horror" monster or "Masquerade" Xyz Monster from your hand or GY, then you can make the Levels of all "Umbral Horror" monsters you control become the Level of 1 "Umbral Horror" monster in your field or GY. You can banish this card from your GY, then target 1 Xyz Monster you control; attach 1 "Number" Xyz Monster from your Extra Deck or GY to it. You can only use each effect of "Barian's Hope" once per turn.
