  zh-CN: 原初之神 法拉
text:
  en: |-
    You can reveal this card and 1 Spell/Trap in your hand; until the end of the next turn, neither player can activate cards or effects in response to the activation of cards, or effects of cards, with the revealed Spell/Trap's name. If this card is sent from the hand or field to the GY by a Spell/Trap effect: You can Special Summon this card. If this card is Special Summoned from the GY: You can take control of 1 monster your opponent controls with the highest ATK (your choice, if tied). You can only use each effect of "Phara the Primordial Goddess" once per turn.
  de: |-
    Du kannst diese Karte und 1 Zauber/Falle in deiner Hand vorzeigen; bis zum Ende des nächsten Spielzugs kann kein Spieler Karten oder Effekte als Reaktion auf die Aktivierung von Karten oder Effekten von Karten mit dem Namen des/der vorgezeigten Zaubers/Falle aktivieren. Falls diese Karte durch einen Zauber-/Falleneffekt von der Hand oder dem Spielfeld auf den Friedhof gelegt wird: Du kannst diese Karte als Spezialbeschwörung beschwören. Falls diese Karte als Spezialbeschwörung vom Friedhof beschworen wird: Du kannst die Kontrolle über 1 Monster mit den höchsten ATK übernehmen, das dein Gegner kontrolliert (bei Gleichstand bestimmst du). Du kannst jeden Effekt von „Phara die Urgöttin“ nur einmal pro Spielzug verwenden.
  es: |-
    Puedes mostrar esta carta y 1 Mágica/Trampa en tu mano; hasta el final del próximo turno, ningún jugador puede activar cartas o efectos en respuesta a la activación de cartas, o efectos de cartas, con el nombre de la Mágica/Trampa mostrada. Si esta carta es mandada de la mano o Campo al Cementerio por un efecto de Mágica/Trampa: puedes Invocar esta carta de Modo Especial. Si esta carta es Invocada de Modo Especial desde el Cementerio: puedes tomar el control de 1 monstruo que controle tu adversario con el mayor ATK (si hay empate, eliges tú). Sólo puedes usar cada efecto de "Phara la Diosa Primordial" una vez por turno.
  fr: |-
    Vous pouvez révéler cette carte et 1 Magie/Piège dans votre main ; jusqu'à la fin du prochain tour, aucun joueur ne peut activer ni de cartes ni d'effets en réponse à l'activation de cartes ou d'effets de cartes du nom du Magie/Piège révélé. Si cette carte est envoyée depuis la main ou Terrain au Cimetière par un effet de Magie/Piège : vous pouvez Invoquer Spécialement cette carte. Si cette carte est Invoquée Spécialement depuis le Cimetière : vous pouvez prendre le contrôle d'1 monstre contrôlé par votre adversaire avec la plus haute ATK (en cas d'égalité, vous choisissez). Vous ne pouvez utiliser chaque effet de "Phara la Déesse Primordiale" qu'une fois par tour.
  it: |-
    Puoi rivelare questa carta e 1 Magia/Trappola nella tua mano; fino alla fine del prossimo turno, nessun giocatore può attivare carte o effetti in risposta all'attivazione di carte, o effetti di carte, con il nome della Magia/Trappola rivelata. Se questa carta viene mandata dalla mano o Terreno al Cimitero dall'effetto di una Magia/Trappola: puoi Evocare Specialmente questa carta. Se questa carta viene Evocata Specialmente dal Cimitero: puoi prendere il controllo di 1 mostro controllato dal tuo avversario con l'ATK più alto (in caso di parità, scegli tu). Puoi utilizzare ogni effetto di "Phara la Dea Primordiale" una sola volta per turno.
  pt: |-
    Você pode revelar este card e 1 Magia/Armadilha na sua mão; até o final do próximo turno, nenhum duelista pode ativar cards ou efeitos em resposta à ativação de cards, ou efeitos de cards, com o nome da Magia/Armadilha revelada. Se este card for enviado da mão ou do campo para o Cemitério por um efeito de Magia/Armadilha: você pode Invocar este card por Invocação-Especial. Se este card for Invocado por Invocação-Especial do Cemitério: você pode tomar o controle de 1 monstro que seu oponente controla com o maior ATK (em caso de empate, você seleciona). Você só pode usar cada efeito de "Phara, a Deusa Primordial" uma vez por turno.
  ja: |-
    このカード名の①②③の効果はそれぞれ１ターンに１度しか使用できない。①：手札のこのカードと手札の魔法・罠カード１枚を相手に見せて発動できる。次のターンの終了時まで、見せた魔法・罠カード及びその同名カードの効果の発動に対してお互いは効果を発動できない。②：このカードが魔法・罠カードの効果で手札・フィールドから墓地へ送られた場合に発動できる。このカードを特殊召喚する。③：このカードが墓地から特殊召喚した場合に発動できる。相手フィールドの攻撃力が一番高いモンスター１体のコントロールを得る。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②③效果1回合仅可各使用1次。①：向对手出示手牌的此卡与手牌的1张魔法・陷阱卡可以发动。直至下个回合结束时为止，应对所出示的魔法・陷阱卡及其同名卡的效果的发动，双方不可发动效果。②：此卡因魔法・陷阱卡的效果从手牌・场上被送至墓地的情况下可以发动。将此卡特殊召唤。③：此卡从墓地特殊召唤的情况下可以发动。获得对手场上攻击力最高的1只怪兽的控制权。
