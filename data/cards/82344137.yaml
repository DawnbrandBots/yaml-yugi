name:
  en: Phara the Primordial Goddess
  de: Phara die Urgöttin
  es: Phara la Diosa Primordial
  fr: Phara la Déesse Primordiale
  it: Phara la Dea Primordiale
  pt: Phara, a Deusa Primordial
  ja: <ruby>始<rt>はじ</rt></ruby>まりの<ruby>神<rt>かみ</rt></ruby>ファーラ
