attribute: DARK
level: 10
atk: 300
def: 200
pendulum_scale: 1
pendulum_effect:
  en: |-
    If a "Power Patron" or "Elfnote" monster(s) is Special Summoned to your field, while this card is in your Pendulum Zone (except during the Damage Step): You can destroy this card, and if you do, draw 2 cards, then discard 1 card. You can only use this effect of "Junoldo the Shadespirit Power Patron" once per turn.
  de: |-
    Falls ein oder mehr „Machtpatron“- oder „Elfnote“-Monster als Spezialbeschwörung auf deine Spielfeldseite beschworen werden, solange diese Karte in deiner Pendelzone liegt (außer während des Damage Steps): Du kannst diese Karte zerstören und falls du dies tust, ziehe 2 Karten, dann wirf 1 Karte ab. Du kannst diesen Effekt von „Junoldo der Schattengeist-Machtpatron“ nur einmal pro Spielzug verwenden.
  es: |-
    Si uno o más monstruos "Modelo de Poder" o "Elfnota" son Invocados de Modo Especial a tu Campo, mientras esta carta está en tu Zona de Péndulo (excepto durante el Damage Step): puedes destruir esta carta y, si lo haces, roba 2 cartas, y después descarta 1 carta. Sólo puedes usar este efecto de "Junoldo el Espíritu Sombra Modelo de Poder" una vez por turno.
  fr: |-
    Si un ou plusieurs monstres "Mécène du Pouvoir" ou "Notes Elfiques" sont Invoqués Spécialement sur votre Terrain, tant que cette carte est dans votre Zone Pendule (sauf durant la Damage Step) : vous pouvez détruire cette carte, et si vous le faites, piochez 2 cartes, puis défaussez 1 carte. Vous ne pouvez utiliser cet effet de "Junoldo le Mécène du Pouvoir de l'Esprit Obscur" qu'une fois par tour.
  it: |-
    Se uno o più mostri "Patrono Potente" o "Elfnote" vengono Evocati Specialmente sul tuo Terreno, mentre questa carta è nella tua Zona Pendulum (eccetto durante il Damage Step): puoi distruggere questa carta e, se lo fai, pesca 2 carte, poi scarta 1 carta. Puoi utilizzare questo effetto di "Junoldo l'Ombraspirito Patrono Potente" una sola volta per turno.
  pt: |-
    Se um ou mais monstros "Patrono(a) do Poder" ou "Elfnota" forem Invocados por Invocação-Especial no seu campo, enquanto este card estiver na sua Zona de Pêndulo (exceto durante a Etapa de Dano): você pode destruir este card e, se isso acontecer, compre 2 cards e, depois, descarte 1 card. Você só pode usar este efeito de "Junoldo, o Patrono do Poder Espírito Sombrio" uma vez por turno.
  ja: |-
    このカード名のＰ効果は１ターンに１度しか使用できない。①：このカードがＰゾーンに存在する状態で、自分フィールドに「獄神」モンスターか「エルフェンノーツ」モンスターが特殊召喚された場合に発動できる。このカードを破壊し、自分は２枚ドローする。その後、自分の手札を１枚選んで捨てる。
  ko: |-
    이 카드명의 펜듈럼 효과는 1턴에 1번밖에 사용할 수 없다. ①: 이 카드가 펜듈럼 존에 존재하는 상태에서, 자신 필드에 "감옥신" 몬스터나 "엘펜노츠" 몬스터가 특수 소환되었을 경우에 발동할 수 있다. 이 카드를 파괴하고, 자신은 2장 드로우한다. 그 후, 자신의 패를 1장 고르고 버린다.
  zh-TW:
  zh-CN: |-
    此卡名的灵摆效果1回合仅可使用1次。①：此卡存在于灵摆区域的状态下，有“狱神”怪兽或“耀圣”怪兽被特殊召唤至自己场上的情况下可以发动。将此卡破坏，自己抽2张。然后，挑选自己的1张手牌舍弃。
