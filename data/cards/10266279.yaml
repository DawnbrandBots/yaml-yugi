text:
  en: |-
    (This card is always treated as an "Elfnote" card.)
    You can banish the top 3 cards of your Deck, face-down; destroy this card, and if you do, Special Summon 1 "Junora the Power Patron of Tuning" from your Extra Deck (this is treated as a Synchro Summon). If this card is added to your Extra Deck face-up: You can add 1 "Power Patron" or "Elfnote" card from your face-up Extra Deck or GY to your hand, except "Junoldo the Shadespirit Power Patron". You can only use each effect of "Junoldo the Shadespirit Power Patron" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名はルール上「エルフェンノーツ」カードとしても扱う。このカード名の①②のモンスター効果はそれぞれ１ターンに１度しか使用できない。①：デッキの上からカード３枚を裏側で除外して発動できる。このカードを破壊し、ＥＸデッキから「調獄神ジュノーラ」１体をＳ召喚扱いで特殊召喚する。②：このカードがＥＸデッキに表側で加わった場合に発動できる。「獄神影精－ジュノルド」を除く、「獄神」カードか「エルフェンノーツ」カード１枚を自分のＥＸデッキ（表側）・墓地から手札に加える。
  ko: |-
    이 카드명은 룰상 "엘펜노츠" 카드로도 취급한다. 이 카드명의 ①②의 몬스터 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 덱 위에서 카드 3장을 뒷면으로 제외하고 발동할 수 있다. 이 카드를 파괴하고, 엑스트라 덱에서 "조감옥신 쥬노라" 1장을 싱크로 소환으로 취급하여 특수 소환한다. ②: 이 카드가 엑스트라 덱에 앞면으로 넣어졌을 경우에 발동할 수 있다. "감옥신영정－쥬노르도"가 아닌, "감옥신" 카드나 "엘펜노츠" 카드 1장을 자신의 엑스트라 덱(앞면) / 묘지에서 패에 넣는다.
  zh-TW:
  zh-CN: |-
    此卡名在规则上也视为“耀圣”卡。此卡名的①②怪兽效果1回合仅可各使用1次。①：从牌组上面将3张卡以里侧除外可以发动。将此卡破坏，从额外牌组将1只“调狱神 朱诺拉”视为同步召唤特殊召唤。②：此卡以表侧加入额外牌组的情况下可以发动。从自己额外牌组（表侧）・墓地将除“狱神影精－朱诺璐多”以外的1张“狱神”卡或“耀圣”卡加入手牌。
card_type: Monster
monster_type_line: Fiend / Pendulum / Effect
attribute: DARK
level: 10
atk: 300
def: 200
pendulum_scale: 1
pendulum_effect:
  en: |-
    If a "Power Patron" or "Elfnote" monster(s) is Special Summoned to your field, while this card is in your Pendulum Zone (except during the Damage Step): You can destroy this card, and if you do, draw 2 cards, then discard 1 card. You can only use this effect of "Junoldo the Shadespirit Power Patron" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名のＰ効果は１ターンに１度しか使用できない。①：このカードがＰゾーンに存在する状態で、自分フィールドに「獄神」モンスターか「エルフェンノーツ」モンスターが特殊召喚された場合に発動できる。このカードを破壊し、自分は２枚ドローする。その後、自分の手札を１枚選んで捨てる。
  ko: |-
    이 카드명의 펜듈럼 효과는 1턴에 1번밖에 사용할 수 없다. ①: 이 카드가 펜듈럼 존에 존재하는 상태에서, 자신 필드에 "감옥신" 몬스터나 "엘펜노츠" 몬스터가 특수 소환되었을 경우에 발동할 수 있다. 이 카드를 파괴하고, 자신은 2장 드로우한다. 그 후, 자신의 패를 1장 고르고 버린다.
  zh-TW:
  zh-CN: |-
    此卡名的灵摆效果1回合仅可使用1次。①：此卡存在于灵摆区域的状态下，有“狱神”怪兽或“耀圣”怪兽被特殊召唤至自己场上的情况下可以发动。将此卡破坏，自己抽2张。然后，挑选自己的1张手牌舍弃。
