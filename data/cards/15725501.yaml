  en: |-
    (This card is always treated as an "Archfiend" card.)
    Target 1 "Archfiend" monster you control; it gains 600 ATK, then you can destroy all monsters your opponent controls with lower original ATK than that monster's ATK. During your Main Phase: You can banish this card from your GY, then target 1 Level 6 Fiend monster with 2500 ATK in your GY; add it to your hand. You can only use each effect of "Makourai, the Lightning Strike" once per turn.
