    此卡名的①②效果1回合仅可各使用1次。①：此卡存在于手牌的情况下，以“魔女工艺・陶俑魔像”以外的、自己墓地的1张“魔女工艺”卡为对象可以发动。将该卡加入手牌，将此卡特殊召唤。此回合，自己从额外牌组仅可特殊召唤“魔女工艺”怪兽。②：在自己的主要阶段可以发动。将自己手牌・场上的怪兽作为融合素材，将1只“魔女工艺”融合怪兽融合召唤。
