text:
  en: |-
    FLIP: You can target 1 non-Rock "Shaddoll" monster in your GY; apply its effect that activates when it is flipped face-up.
    If this card is sent to the GY by card effect (except during the Damage Step): You can Fusion Summon 1 "Shaddoll" Fusion Monster from your Extra Deck, by banishing its materials from your hand, field, and/or GY. You cannot Special Summon from the Extra Deck the turn you activate this effect, except "Shaddoll" monsters. You can only use 1 "Tohushaddoll Grysta" effect per turn, and only once that turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②の効果は１ターンに１度、いずれか１つしか使用できない。①：このカードがリバースした場合、岩石族以外の自分の墓地の「シャドール」モンスター１体を対象として発動できる。そのモンスターのリバースした場合に発動する効果を適用する。②：このカードが効果で墓地へ送られた場合に発動できる（この効果を発動するターン、自分は「シャドール」モンスターしかＥＸデッキから特殊召喚できない）。自分の手札・フィールド・墓地のモンスターを融合素材として除外し、「シャドール」融合モンスター１体を融合召喚する。
  ko: |-
    이 카드명의 ①②의 효과는 1턴에 1번, 어느 쪽이든 1개밖에 사용할 수 없다. ①: 이 카드가 리버스했을 경우, 암석족 이외의 자신 묘지의 "섀도르" 몬스터 1장을 대상으로 하고 발동할 수 있다. 그 몬스터의 리버스했을 경우에 발동하는 효과를 적용한다. ②: 이 카드가 효과로 묘지로 보내졌을 경우에 발동할 수 있다(이 효과를 발동하는 턴에, 자신은 "섀도르" 몬스터밖에 엑스트라 덱에서 특수 소환할 수 없다). 자신의 패 / 필드 / 묘지의 몬스터를 융합 소재로서 제외하고, "섀도르" 융합 몬스터 1장을 융합 소환한다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合1次，仅可使用其中1个。①：此卡反转的情况下，以岩石族以外的、自己墓地的1只“影依”怪兽为对象可以发动。适用该怪兽反转的情况下发动的效果。②：此卡因效果被送至墓地的情况下可以发动（发动此效果的回合中，自己从额外牌组仅可特殊召唤“影依”怪兽）。将自己的手牌・场上・墓地的怪兽作为融合素材除外，将1只“影依”融合怪兽融合召唤。
