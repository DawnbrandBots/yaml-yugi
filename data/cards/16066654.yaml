  es: R.B. Test Operación
  fr: Test Opérationnel R.B.
  it: Operazione Test R.B.
  pt: Teste de Operação R.B.
  ja: <ruby>Ｒ．Ｂ．<rt>リボルボット</rt></ruby>オペレーション・テスト
  ja_romaji: Riborubotto Operēshon Tesuto
  ko: R.B.오퍼레이션 테스트
  ko_rr:
  zh-TW: R.B.操作測試
  zh-CN: R.B.操作测试
text:
  en: |-
    When this card is activated: You can target 1 Level 3 or higher "R.B." monster in your GY; Special Summon it. You can target any number of "R.B." monsters you control; gain LP equal to their combined original ATK, and if you do, return them to the hand/Extra Deck, then you can Special Summon 1 "R.B." monster from your hand. You can only use this effect of "R.B. Operation Test" once per turn. You can only activate 1 "R.B. Operation Test" per turn.
  de: |-
    Wenn diese Karte aktiviert wird: Du kannst 1 „R.B.“-Monster der Stufe 3 oder höher in deinem Friedhof wählen; beschwöre es als Spezialbeschwörung. Du kannst eine beliebige Anzahl „R.B.“-Monster wählen, die du kontrollierst; du erhältst LP in Höhe ihrer kombinierten Grund-ATK und falls du dies tust, gib sie auf die Hand / ins Extra Deck zurück, dann kannst du 1 „R.B.“-Monster als Spezialbeschwörung von deiner Hand beschwören. Du kannst diesen Effekt von „R.B.-Operationstest“ nur einmal pro Spielzug verwenden. Du kannst nur 1 „R.B.-Operationstest“ pro Spielzug aktivieren.
  es: |-
    Cuando esta carta es activada: puedes seleccionar 1 monstruo "R.B." de Nivel 3 o mayor en tu Cementerio; Invócalo de Modo Especial. Puedes seleccionar cualquier número de monstruos "R.B." que controles; gana LP iguales a sus ATK originales combinados y, si lo haces, devuélvelos a la mano/Deck Extra, y después puedes Invocar de Modo Especial 1 monstruo "R.B." desde tu mano. Sólo puedes usar este efecto de "R.B. Test Operación" una vez por turno. Sólo puedes activar 1 "R.B. Test Operación" por turno.
  fr: |-
    Lorsque cette carte est activée : vous pouvez cibler 1 monstre "R.B." de min. Niveau 3 dans votre Cimetière ; Invoquez-le Spécialement. Vous pouvez cibler un nombre de votre choix de monstres "R.B." que vous contrôlez ; gagnez des LP égaux à la somme de leur ATK d'origine, et si vous le faites, renvoyez-les à la main/Extra Deck, puis vous pouvez Invoquer Spécialement 1 monstre "R.B." depuis votre main. Vous ne pouvez utiliser cet effet de "Test Opérationnel R.B." qu'une fois par tour. Vous ne pouvez activer qu'1 "Test Opérationnel R.B." par tour.
  it: |-
    Quando questa carta viene attivata: puoi scegliere come bersaglio 1 mostro "R.B." di Livello 3 o superiore nel tuo Cimitero; Evocalo Specialmente. Puoi scegliere come bersaglio un qualsiasi numero di mostri "R.B." che controlli; guadagni LP pari alla somma dei loro ATK originali e, se lo fai, falli ritornare nella mano/Extra Deck, poi puoi Evocare Specialmente 1 mostro "R.B." dalla tua mano. Puoi utilizzare questo effetto di "Operazione Test R.B." una sola volta per turno. Puoi attivare solo 1 "Operazione Test R.B." per turno.
  pt: |-
    Quando este card for ativado: você pode escolher 1 monstro "R.B." de Nível 3 ou mais no seu Cemitério; Invoque-o por Invocação-Especial. Você pode escolher qualquer número de monstros "R.B." que você controla; ganhe PV igual ao ATK original combinado deles e, se isso acontecer, devolva-os para a mão/o Deck Adicional e, depois, você pode Invocar por Invocação-Especial 1 monstro "R.B." da sua mão. Você só pode usar este efeito de "Teste de Operação R.B." uma vez por turno. Você só pode ativar 1 "Teste de Operação R.B." por turno.
  ja: |-
    このカード名のカードは１ターンに１枚しか発動できず、このカード名の②の効果は１ターンに１度しか使用できない。①：このカードの発動時に、自分の墓地のレベル３以上の「Ｒ．Ｂ．」モンスター１体を対象にできる。その場合、そのモンスターを特殊召喚する。②：自分フィールドの「Ｒ．Ｂ．」モンスターを任意の数だけ対象として発動できる。そのモンスターの元々の攻撃力の合計分だけ自分のＬＰを回復し、そのモンスターを手札・ＥＸデッキに戻す。その後、手札から「Ｒ．Ｂ．」モンスター１体を特殊召喚できる。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的卡1回合仅可发动1张，此卡名的②效果1回合仅可使用1次。①：此卡发动时，可将自己墓地1只等级3以上的“R.B.”怪兽作为对象。该情况下，将该怪兽特殊召唤。②：以自己场上任意数量的“R.B.”怪兽为对象可以发动。依该怪兽的原本攻击力的合计数值恢复自己的LP，将该怪兽放回手牌・额外牌组。然后，可从手牌将1只“R.B.”怪兽特殊召唤。
