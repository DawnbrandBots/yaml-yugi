name:
  en: First Striker Advantage
  de: Vorteil des Erstschlags
  es: Ventaja de Quien Golpea Primero
  fr: Avantage de l'Initiative
  it: Vantaggio del Primo Colpo
  pt: Vantagem do Primeiro Atacante
  ja: <ruby>先<rt>せん</rt></ruby><ruby>手<rt>て</rt></ruby><ruby>必<rt>ひっ</rt></ruby><ruby>掌<rt>しょう</rt></ruby>
