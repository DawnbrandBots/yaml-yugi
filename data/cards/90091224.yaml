text:
  en: |-
    2 Level 4 DARK monsters
    (This card is always treated as a "The Phantom Knights" card.)
    If this card is Special Summoned: You can target an equal number of cards on each field; destroy them. When your opponent activates a card or effect (Quick Effect): You can detach 1 material from this card; Special Summon 1 Rank 4 DARK Xyz Monster from your Extra Deck, using this card you control (this is treated as an Xyz Summon, transfer this card's materials). You can only use each effect of "Dark Rebellion Xyz Dragon, Four Heavenly Dragons" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    闇属性レベル４モンスター×２
    このカード名はルール上「幻影騎士団」カードとしても扱う。このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが特殊召喚した場合、自分及び相手フィールドのカードをそれぞれ同じ数だけ対象として発動できる。そのカードを破壊する。②：相手が効果を発動した時、このカードのＸ素材を１つ取り除いて発動できる。闇属性・ランク４のＸモンスター１体を自分フィールドのこのカードの上に重ねてＸ召喚扱いでＥＸデッキから特殊召喚する。
  ko:
  zh-TW:
  zh-CN: |-
    暗属性等级4怪兽×2
    此卡名在规则上也视为“魅影骑士团”卡。此卡名的①②效果1回合仅可各使用1次。①：此卡特殊召唤的情况下，以相同数量的自己及对手场上的卡为对象可以发动。将该卡破坏。②：对手发动效果时，去除此卡的1个超量素材可以发动。从额外牌组将1只暗属性・阶级4的超量怪兽重叠在自己场上的此卡上面，视为超量召唤特殊召唤。
