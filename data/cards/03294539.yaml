name:
  en: Crimson Blade Dragon
  de: Blutroter Klingendrache
  es: Dragón Blader Carmesí
  fr: Dragon aux Épées Cramoisi
  it: Drago Spada Cremisi
  pt: Dragão da Lâmina Carmesim
  ja: クリムゾン・ブレード・ドラゴン
  ja_romaji: Kurimuzon Burēdo Doragon
  ko: 크림즌 블레이드 드래곤
  ko_rr:
  zh-TW:
  zh-CN: 深红剑龙
text:
  en: |-
    1 "Resonator" Tuner + 1+ non-Tuners
    (This card is always treated as "Crimson Blader".)
    If this card is Synchro Summoned: You can take 1 Level 8 or higher monster that cannot be Normal Summoned/Set from your Deck or GY, and either add it to your hand or Special Summon it, but negate its effects. You can only use this effect of "Crimson Blade Dragon" once per turn. At the start of the Damage Step, if this card battles a Level 5 or higher monster: You can destroy that monster.
  de: |-
    1 „Resonator“-Empfänger + 1+ Nicht-Empfänger
    (Diese Karte wird immer als „Blutroter Klingenkämpfer“ behandelt.)
    Falls diese Karte als Synchrobeschwörung beschworen wird: Du kannst 1 Monster der Stufe 8 oder höher, das nicht als Normalbeschwörung beschworen/gesetzt werden kann, von deinem Deck oder Friedhof nehmen und entweder deiner Hand hinzufügen oder als Spezialbeschwörung beschwören, aber annulliere seine Effekte. Du kannst diesen Effekt von „Blutroter Klingendrache“ nur einmal pro Spielzug verwenden. Am Beginn des Damage Steps, falls diese Karte gegen ein Monster der Stufe 5 oder höher kämpft: Du kannst jenes Monster zerstören.
  es: |-
    1 Cantante "Resonador" + 1+ no Cantantes
    (Esta carta se trata siempre como "Blader Carmesí").
    Si esta carta es Invocada por Sincronía: puedes tomar 1 monstruo de Nivel 8 o mayor que no pueda ser Invocado de Modo Normal/Colocado en tu Deck o Cementerio, y ya sea añádelo a tu mano o Invócalo de Modo Especial, pero niega sus efectos. Sólo puedes usar este efecto de "Dragón Blader Carmesí" una vez por turno. Al comienzo del Damage Step, si esta carta batalla con un monstruo de Nivel 5 o mayor: puedes destruir ese monstruo.
  fr: |-
    1 Syntoniseur "Diapason" + 1+ non-Syntoniseur
    (Cette carte est toujours traitée comme "Épéiste Cramoisi".)
    Si cette carte est Invoquée par Synchronisation : vous pouvez prendre 1 monstre de min. Niveau 8 qui ne peut pas être Invoqué/Posé Normalement depuis votre Deck ou Cimetière, et soit ajoutez-le à votre main soit Invoquez-le Spécialement, mais annulez ses effets. Vous ne pouvez utiliser cet effet de "Dragon aux Épées Cramoisi" qu'une fois par tour. Au début de la Damage Step, si cette carte combat un monstre de min. Niveau 5 : vous pouvez détruire le monstre.
  it: |-
    1 Tuner "Diapason" + 1+ non-Tuner
    (Questa carta viene sempre considerata come "Spadaccino Cremisi".)
    Se questa carta viene Synchro Evocata: puoi prendere 1 mostro di Livello 8 o superiore che non può essere Evocato Normalmente/Posizionato dal tuo Deck o Cimitero e aggiungerlo alla tua mano oppure Evocarlo Specialmente, ma annulla i suoi effetti. Puoi utilizzare questo effetto di "Drago Spada Cremisi" una sola volta per turno. All'inizio del Damage Step, se questa carta combatte con un mostro di Livello 5 o superiore: puoi distruggere quel mostro.
  pt: |-
    1 Regulador "Ressonador" + 1+ não-Reguladores
    (Este card deve ser sempre considerado como "Laminador Carmesim".)
    Se este card for Invocado por Invocação-Sincro: você pode pegar 1 monstro de Nível 8 ou mais que não possa ser Invocado por Invocação-Normal/Baixado do seu Deck ou Cemitério e adicione-o à sua mão ou Invoque-o por Invocação-Especial, mas negue seus efeitos. Você só pode usar este efeito de "Dragão da Lâmina Carmesim" uma vez por turno. No começo da Etapa de Dano, se este card batalhar um monstro de Nível 5 ou mais: você pode destruir esse monstro.
  ja: |-
    「リゾネーター」チューナー＋チューナー以外のモンスター１体以上
    このカード名はルール上「クリムゾン・ブレーダー」として扱う。このカード名の①の効果は１ターンに１度しか使用できない。①：このカードがＳ召喚した場合に発動できる。自分のデッキ・墓地からレベル８以上の通常召喚できないモンスター１体を選び、手札に加えるか効果を無効にして特殊召喚する。②：このカードがレベル５以上のモンスターと戦闘を行うダメージステップ開始時に発動できる。そのモンスターを破壊する。
  ko: |-
    "레조네이터" 튜너 ＋ 튜너 이외의 몬스터 1장 이상
    이 카드명은 룰상 "크림즌 블레이더"로 취급한다. 이 카드명의 ①의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 이 카드를 싱크로 소환했을 경우에 발동할 수 있다. 자신의 덱 / 묘지에서 레벨 8 이상의 통상 소환할 수 없는 몬스터 1장을 고르고, 패에 넣거나 효과를 무효로 하여 특수 소환한다. ②: 이 카드가 레벨 5 이상의 몬스터와 전투를 실행하는 데미지 스텝 개시시에 발동할 수 있다. 그 몬스터를 파괴한다.
  zh-TW:
  zh-CN: |-
    “共鸣者”协调＋协调以外的怪兽1只以上
    此卡名在规则上视为“深红剑士”。此卡名的①效果1回合仅可使用1次。①：此卡同步召唤的情况下可以发动。从自己牌组・墓地挑选1只等级8以上的不可通常召唤的怪兽，加入手牌或将其效果无效并特殊召唤。②：此卡与等级5以上的怪兽进行战斗的伤害步骤开始时可以发动。将该怪兽破坏。
