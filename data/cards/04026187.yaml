name:
  en: Teller of Fairy Tails
  de: Erzählerin der Märchenschweife
  es: Cuentacuentos de Colacuentos
  fr: Conteuse de l'Animal Féérique
  it: Narratrice di Codafavola
  pt: Contadora de Cauda de Fadas
  ja: <ruby>妖精伝姫<rt>フェアリーテイル</rt></ruby>を<ruby>語<rt>かた</rt></ruby>る<ruby>者<rt>もの</rt></ruby>
