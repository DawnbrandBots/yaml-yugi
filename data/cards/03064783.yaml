text:
  en: |-
    If you Normal or Special Summon an "Umbral Horror" monster(s) and/or a "Masquerade" Xyz Monster(s) (except during the Damage Step): You can Special Summon this card from your hand, and if you do, draw 1 card, then if you drew an "Umbral Horror" monster, you can Special Summon it. Can be treated as 2 materials for the Xyz Summon of a "Number" Xyz Monster that requires 3 or more materials. You can only use each effect of "Shining Umbral Horror" once per turn.
