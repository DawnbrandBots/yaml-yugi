  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分が「アンブラル」モンスターか「仮面魔踏士」Ｘモンスターを召喚・特殊召喚した場合に発動できる。このカードを手札から特殊召喚し、自分は１枚ドローする。そのドローしたカードが「アンブラル」モンスターだった場合、さらにそのモンスターを特殊召喚できる。②：モンスター３体以上を素材とする「Ｎｏ．」ＸモンスターをＸ召喚する場合、このカードは２体分のＸ素材にできる。
