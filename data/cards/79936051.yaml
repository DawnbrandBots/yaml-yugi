name:
  en: Northern Crossfire
  de: Kreuzfeuer des Nordens
  es: Fuego Cruzado del Norte
  fr: Feu de la Croix du Nord
  it: Fuoco Incrociato del Nord
  pt: Fogo Cruzado do Norte
  ja: ノーザンクロスファイア
  ja_romaji: Nōzan Kurosufaia
  ko: 노던크로스파이어
  ko_rr:
  zh-TW: 北十字砲擊
  zh-CN: 北十字炮击
text:
  en: |-
    If the total Levels of monsters you control are 10 or higher: Add to your hand or Special Summon 1 Level 10 monster from your hand or Deck. If the total Levels of monsters your opponent controls are 10 or higher: You can banish this card and 1 Level 10 monster from your GY, then target 1 card your opponent controls; banish it. You can only use 1 "Northern Crossfire" effect per turn, and only once that turn.
  de: |-
    Falls die Summe der Stufen der Monster, die du kontrollierst, 10 oder höher ist: Füge deiner Hand 1 Monster der Stufe 10 von deiner Hand oder deinem Deck hinzu oder beschwöre es als Spezialbeschwörung. Falls die Summe der Stufen der Monster, die dein Gegner kontrolliert, 10 oder höher ist: Du kannst diese Karte und 1 Monster der Stufe 10 von deinem Friedhof verbannen und dann 1 Karte wählen, die dein Gegner kontrolliert; verbanne sie. Du kannst nur 1 Effekt von „Kreuzfeuer des Nordens“ pro Spielzug verwenden und in jenem Spielzug nur einmal.
  es: |-
    Si los Niveles totales de los monstruos que controlas son 10 o más: añade a tu mano o Invoca de Modo Especial 1 monstruo de Nivel 10 desde tu mano o Deck. Si los Niveles totales de los monstruos que controla tu adversario son 10 o más: puedes desterrar esta carta y 1 monstruo de Nivel 10 en tu Cementerio, y después selecciona 1 carta que controle tu adversario; destiérrala. Sólo puedes usar 1 efecto de "Fuego Cruzado del Norte" por turno, y sólo una vez ese turno.
  fr: |-
    Si la somme des Niveaux des monstres que vous contrôlez est min. 10 : ajoutez à votre main ou Invoquez Spécialement 1 monstre de Niveau 10 depuis votre main ou Deck. Si la somme des Niveaux des monstres contrôlés par votre adversaire est min. 10 : vous pouvez bannir cette carte et 1 monstre de Niveau 10 depuis votre Cimetière, puis ciblez 1 carte contrôlée par votre adversaire ; bannissez-la. Vous ne pouvez utiliser qu'1 effet de "Feu de la Croix du Nord" par tour, et uniquement une fois le tour.
  it: |-
    Se la somma dei Livelli dei mostri che controlli è 10 o superiore: aggiungi alla tua mano o Evoca Specialmente 1 mostro di Livello 10 dalla tua mano o Deck. Se la somma dei Livelli dei mostri controllati dal tuo avversario è 10 o superiore: puoi bandire questa carta e 1 mostro di Livello 10 dal tuo Cimitero, poi scegliere come bersaglio 1 carta controllata dal tuo avversario; bandiscila. Puoi utilizzare solo 1 effetto di "Fuoco Incrociato del Nord" per turno, e solo una volta in quel turno.
  pt: |-
    Se a soma dos Níveis dos monstros que você controla for 10 ou mais: adicione à sua mão ou Invoque por Invocação-Especial 1 monstro de Nível 10 da sua mão ou do Deck. Se a soma dos Níveis dos monstros que seu oponente controla for 10 ou mais: você pode banir este card e 1 monstro de Nível 10 do seu Cemitério e, depois, escolha 1 card que seu oponente controla; bana-o. Você só pode usar 1 efeito de "Fogo Cruzado do Norte" por turno e apenas uma vez por turno.
  ja: |-
    このカード名の①②の効果は１ターンに１度、いずれか１つしか使用できない。①：自分フィールドのモンスターのレベルの合計が１０以上の場合に発動できる。手札・デッキからレベル１０モンスター１体を選び、手札に加えるか特殊召喚する。②：相手フィールドのモンスターのレベルの合計が１０以上の場合、自分の墓地からこのカードとレベル１０モンスター１体を除外し、相手フィールドのカード１枚を対象として発動できる。そのカードを除外する。
  ko: |-
    이 카드명의 ①②의 효과는 1턴에 1번, 어느 쪽이든 1개밖에 사용할 수 없다. ①: 자신 필드의 몬스터의 레벨의 합계가 10 이상일 경우에 발동할 수 있다. 패 / 덱에서 레벨 10 몬스터 1장을 고르고, 패에 넣거나 특수 소환한다. ②: 상대 필드의 몬스터의 레벨의 합계가 10 이상일 경우, 자신 묘지에서 이 카드와 레벨 10 몬스터 1장을 제외하고, 상대 필드의 카드 1장을 대상으로 하여 발동할 수 있다. 그 카드를 제외한다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合1次，仅可使用其中1个。①：自己场上怪兽的合计等级为10以上的情况下可以发动。从手牌・牌组挑选1只等级10怪兽，加入手牌或特殊召唤。②：对手场上怪兽的合计等级为10以上的情况下，从自己墓地将此卡与1只等级10怪兽除外，以对手场上的1张卡为对象可以发动。将该卡除外。
