text:
  en: |-
    You can Ritual Summon this card with any "Sennet" card. This card equipped with an Equip Card cannot be destroyed by card effects. You can only use each of the following effects of "Tausennet Wadjet" once per turn. You can discard this card; send 1 "Sennet" card from your Deck to the GY, except "Tausennet Wadjet". (Quick Effect): You can send up to 3 face-up Normal Monster Cards you control to the GY, then target that many cards your opponent controls; return them to the hand, then you can Special Summon 1 Normal Monster from your GY.
