name:
  en: 'Elfnotes: Quatrain of Succession'
  de: 'Elfnoten: Vierzeiler der Abfolge'
  es: 'Elfnotas: Cuarteto de Sucesión'
  fr: 'Notes Elfiques : Quatrain de Succession'
  it: 'Elfnote: Quartina della Successione'
  pt: 'Elfnotas: Quarteto de Sucessão'
  ja: エルフェンノーツ～<ruby>継<rt>けい</rt></ruby><ruby>唱<rt>しょう</rt></ruby>のクウォートレイン～
  ja_romaji: Erufennōtsu ~Keishō no Kuwōtorein~
  ko: 엘펜노츠~계창의 쿼트레인~
  ko_rr:
  zh-TW:
  zh-CN: 耀圣诗章～继唱之四重奏～
text:
  en: |-
    The monster in your center Main Monster Zone cannot be banished by your opponent's card effects. You can send 1 other Spell/Trap from your hand or field to the GY, then declare a Level from 1 to 4; Special Summon 1 "Elfnote Seraphim Token" (Plant/Tuner/FIRE/ATK 0/DEF 0) with the declared Level. While that Token is in the Monster Zone, the player who Summoned it cannot Special Summon from the Extra Deck, except "Elfnote" monsters. You can only use this effect of "Elfnotes: Quatrain of Succession" once per turn.
  de: |-
    Das Monster in deiner mittleren Main-Monsterzone kann nicht durch Karteneffekte deines Gegners verbannt werden. Du kannst 1 andere/n Zauber/Falle von deiner Hand oder Spielfeldseite auf den Friedhof legen und dann eine Stufe von 1 bis 4 deklarieren; beschwöre 1 „Elfnote-Seraph-Spielmarke“ (Pflanze/Empfänger/FEUER/ATK 0/DEF 0) mit der deklarierten Stufe als Spezialbeschwörung. Solange jene Spielmarke in der Monsterzone liegt, kann der Spieler, der sie beschworen hat, keine Spezialbeschwörungen vom Extra Deck durchführen, außer von „Elfnote“-Monstern. Du kannst diesen Effekt von „Elfnoten: Vierzeiler der Abfolge“ nur einmal pro Spielzug verwenden.
  es: |-
    El monstruo en tu Zona de Monstruos Principal central no puede ser desterrado por efectos de cartas de tu adversario. Puedes mandar al Cementerio otra Mágica/Trampa en tu mano o Campo, y después declara un Nivel de 1 a 4; Invoca de Modo Especial 1 "Ficha Elfnota Serafín" (Planta/Cantante/FUEGO/ATK 0/DEF 0) con el Nivel declarado. Mientras esa Ficha está en la Zona de Monstruos, el jugador que la Invocó no puede Invocar de Modo Especial desde el Deck Extra, excepto monstruos "Elfnota". Sólo puedes usar este efecto de "Elfnotas: Cuarteto de Sucesión" una vez por turno.
  fr: |-
    Le monstre dans votre Zone Monstre Main centrale ne peut pas être banni par des effets de carte de votre adversaire. Vous pouvez envoyer 1 autre Magie/Piège depuis votre main ou Terrain au Cimetière, puis déclarez un Niveau de 1 à 4 ; Invoquez Spécialement 1 "Jeton Séraphin des Notes Elfiques" (Plante/Syntoniseur/FEU/ATK 0/DEF 0) du Niveau déclaré. Tant que le Jeton est dans la Zone Monstre, le joueur qui l'a Invoqué ne peut pas Invoquer Spécialement (monstres "Notes Elfiques" exclus) depuis l'Extra Deck. Vous ne pouvez utiliser cet effet de "Notes Elfiques : Quatrain de Succession" qu'une fois par tour.
  it: |-
    Il mostro nella tua Zona Mostri Main centrale non può essere bandito dagli effetti delle carte del tuo avversario. Puoi mandare 1 altra Magia/Trappola dalla tua mano o Terreno al Cimitero, poi dichiarare un Livello tra 1 e 4; Evoca Specialmente 1 "Segna-Elfnote Serafino" (Pianta/Tuner/FUOCO/ATK 0/DEF 0) con il Livello dichiarato. Mentre quel Segna-Mostro è nella Zona Mostri, il giocatore che l'ha Evocato non può Evocare Specialmente dall'Extra Deck, eccetto mostri "Elfnote". Puoi utilizzare questo effetto di "Elfnote: Quartina della Successione" una sola volta per turno.
  pt: |-
    O monstro na sua Zona de Monstros Principal central não pode ser banido pelos efeitos de card do seu oponente. Você pode enviar 1 outra Magia/Armadilha da sua mão ou do campo para o Cemitério e, depois, declare um Nível de 1 a 4; Invoque por Invocação-Especial 1 "Ficha de Serafim Elfnota" (Planta/Regulador/FOGO/ATK 0/DEF 0) com o Nível declarado. Enquanto essa Ficha estiver na Zona de Monstros, o duelista que a Invocou não pode Invocar por Invocação-Especial do Deck Adicional, exceto monstros "Elfnota". Você só pode usar este efeito de "Elfnotas: Quarteto de Sucessão" uma vez por turno.
  ja: |-
    このカード名の②の効果は１ターンに１度しか使用できない。①：自分の中央のメインモンスターゾーンのモンスターは相手の効果では除外できない。②：自分の手札・フィールドからこのカード以外の魔法・罠カード１枚を墓地へ送り、１～４までの任意のレベルを宣言して発動できる。宣言したレベルを持つ「極花の大耀聖トークン」（植物族・チューナー・炎・攻／守０）１体を自分フィールドに特殊召喚する。この効果で特殊召喚したトークンが存在する限り、自分は「エルフェンノーツ」モンスターしかＥＸデッキから特殊召喚できない。
  ko: |-
    이 카드명의 ②의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 자신의 중앙 메인 몬스터 존의 몬스터는 상대의 효과로는 제외할 수 없다. ②: 자신의 패 / 필드에서 이 카드 이외의 마법 / 함정 카드 1장을 묘지로 보내고, 1~4 까지의 임의의 레벨을 선언하여 발동할 수 있다. 선언한 레벨을 가지는 "엘펜노츠 세라핌 토큰"(식물족 / 튜너 / 화염 / 공 0 / 수 0) 1장을 자신 필드에 특수 소환한다. 이 효과로 특수 소환한 토큰이 존재하는 한, 자신은 "엘펜노츠" 몬스터밖에 엑스트라 덱에서 특수 소환할 수 없다.
  zh-TW:
  zh-CN: |-
    此卡名的②效果1回合仅可使用1次。①：自己中央的主要怪兽区域的怪兽不可因对手的效果除外。②：从自己手牌・场上将此卡以外的1张魔法・陷阱卡送至墓地，宣言1～4的任意等级可以发动。将1只拥有所宣言等级的“极花之大耀圣衍生物”（植物族・协调・炎・攻/守0）特殊召唤至自己场上。只要以此效果特殊召唤的衍生物存在，自己从额外牌组仅可特殊召唤“耀圣”怪兽。
