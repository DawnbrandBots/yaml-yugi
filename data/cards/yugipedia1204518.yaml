    此卡不可通常召唤。仅可在自己墓地的暗属性怪兽为3只的情况下特殊召唤。此卡名的①②效果1回合仅可各使用1次。①：向对手出示手牌的此卡可以发动。从手牌将1只等级6以下的暗属性怪兽特殊召唤。此回合，自己仅可特殊召唤暗属性怪兽。②：在自己・对手的主要阶段，从自己墓地将最多3只暗属性怪兽除外，依其数量以场上的卡为对象可以发动。将该卡破坏。
