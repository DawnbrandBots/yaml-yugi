text:
  en: |-
    If this card is Normal or Special Summoned: You can banish (face-up) 1 Beast monster from your hand or face-up field until the End Phase; Special Summon 1 EARTH Beast monster from your Deck or GY, with an equal or lower Level than that monster's original Level, then your opponent can Special Summon 1 monster from their hand. You can only use this effect of "Cerynemesia, Mystical Beast of the Forest" once per turn. Your opponent's monsters that can attack must attack the monster you control with the highest ATK (their choice, if tied).
  de: |-
    Falls diese Karte als Normal- oder Spezialbeschwörung beschworen wird: Du kannst 1 Ungeheuer-Monster von deiner Hand oder offen von deiner Spielfeldseite bis zur End Phase (offen) verbannen; beschwöre 1 ERDE Ungeheuer-Monster, dessen Stufe kleiner oder gleich der Grund-Stufe jenes Monsters ist, als Spezialbeschwörung von deinem Deck oder Friedhof, dann kann dein Gegner 1 Monster als Spezialbeschwörung von seiner Hand beschwören. Du kannst diesen Effekt von „Cerynemesia, mystisches Ungeheuer des Waldes“ nur einmal pro Spielzug verwenden. Monster deines Gegners, die angreifen können, müssen das Monster mit den höchsten ATK angreifen, das du kontrollierst (bei Gleichstand bestimmt er).
  es: |-
    Si esta carta es Invocada de Modo Normal o Especial: puedes desterrar (boca arriba) 1 monstruo Bestia en tu mano o Campo boca arriba hasta la End Phase; Invoca de Modo Especial, desde tu Deck o Cementerio, 1 monstruo Bestia de TIERRA, con un Nivel igual o menor al Nivel original de ese monstruo, y después tu adversario puede Invocar de Modo Especial 1 monstruo desde su mano. Sólo puedes usar este efecto de "Cerynemesia, Bestia Mística del Bosque" una vez por turno. Los monstruos de tu adversario que puedan atacar deben atacar al monstruo que controles con mayor ATK (si hay empate, elige él).
  fr: |-
    Si cette carte est Invoquée Normalement ou Spécialement : jusqu'à la End Phase, vous pouvez bannir (face recto) 1 monstre Bête depuis votre main ou Terrain face recto ; Invoquez Spécialement 1 monstre TERRE Bête depuis votre Deck ou Cimetière, d'un Niveau inférieur ou égal au Niveau d'origine du monstre, puis votre adversaire peut Invoquer Spécialement 1 monstre depuis sa main. Vous ne pouvez utiliser cet effet de "Cerynemesia, Bête Mystique de la Forêt" qu'une fois par tour. Les monstres de votre adversaire qui peuvent attaquer doivent attaquer le monstre que vous contrôlez avec la plus haute ATK (en cas d'égalité, il choisit).
  it: |-
    Se questa carta viene Evocata Normalmente o Specialmente: puoi bandire (scoperto) 1 mostro Bestia dalla tua mano o Terreno scoperto fino alla End Phase; Evoca Specialmente dal tuo Deck o Cimitero 1 mostro TERRA Bestia con Livello pari o inferiore al Livello originale di quel mostro, poi il tuo avversario può Evocare Specialmente 1 mostro dalla sua mano. Puoi utilizzare questo effetto di "Cerynemesia, Bestia Mistica della Foresta" una sola volta per turno. I mostri del tuo avversario che possono attaccare devono attaccare il mostro che controlli con l'ATK più alto (in caso di parità, sceglie lui).
  pt: |-
    Se este card for Invocado por Invocação-Normal ou Especial: você pode banir (com a face para cima) 1 monstro Besta da sua mão ou do campo com a face para cima até a Fase Final; Invoque por Invocação-Especial do seu Deck ou Cemitério 1 monstro Besta de TERRA, com um Nível igual ou menor que o Nível original desse monstro e, depois, seu oponente pode Invocar por Invocação-Especial 1 monstro da mão dele. Você só pode usar este efeito de "Cerynemesia, Besta Mística da Floresta" uma vez por turno. Os monstros do seu oponente que podem atacar devem atacar o monstro que você controla com o maior ATK (em caso de empate, ele seleciona).
