  ja: |-
    恐竜族モンスターを含むモンスター２体
    このカード名の②の効果は１ターンに１度しか使用できない。①：このカードがＬ召喚した場合に発動できる。このカードの攻撃力は、そのＬ素材とした恐竜族モンスターの元々の攻撃力を合計した数値の半分だけアップする。②：自分メインフェイズに発動できる。自分のフィールド・墓地のモンスターを融合素材として除外し、恐竜族の融合モンスター１体を融合召喚する。この効果の発動後、ターン終了時まで自分は恐竜族モンスターしかＥＸデッキから特殊召喚できない。
  ko:
  zh-TW:
  zh-CN: |-
    包含恐龙族怪兽在内的怪兽2只
    此卡名的②效果1回合仅可使用1次。①：此卡连接召唤的情况下可以发动。此卡的攻击力上升相当于作为其连接素材的、恐龙族怪兽的原本攻击力的合计数值的一半。②：在自己的主要阶段可以发动。将自己场上・墓地的怪兽作为融合素材除外，将1只恐龙族融合怪兽融合召唤。此效果发动后，直至回合结束时为止，自己从额外牌组仅可特殊召唤恐龙族怪兽。
