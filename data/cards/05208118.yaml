text:
  en: |-
    Once per turn, during the Standby Phase: Place 1 T Counter on this card. Once per turn: You can target 1 Pendulum Monster in your Main Monster Zone; move that Pendulum Monster to an unused adjacent Main Monster Zone a number of times equal to the number of T Counters on this card, then if your opponent controls in the targeted monster's column a Fusion and/or Xyz Monster(s) with a Level/Rank equal to or lower than the targeted monster's Pendulum Scale, destroy as many of them as possible, and if you do, inflict damage to your opponent equal to the total ATK the destroyed monsters had on the field.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    ①：自分・相手のスタンバイフェイズに発動する。このカードにＴカウンターを１つ置く。②：１ターンに１度、自分のメインモンスターゾーンのＰモンスター１体を対象として発動できる。「対象のＰモンスターの位置をその隣のモンスターゾーンに移動する」処理をこのカードのＴカウンターの数だけ繰り返す。その後、対象のモンスターのＰスケールの数値以下のレベル・ランクを持つ融合・Ｘモンスターが、対象のモンスターと同じ縦列の相手フィールドに存在する場合、それらを全て破壊し、その攻撃力の合計分のダメージを相手に与える。
  ko: |-
    ①: 자신 / 상대의 스탠바이 페이즈에 발동한다. 이 카드에 T(티) 카운터를 1개 놓는다. ②: 1턴에 1번, 자신 메인 몬스터 존의 펜듈럼 몬스터 1장을 대상으로 하고 발동할 수 있다. "대상의 펜듈럼 몬스터의 위치를 그 옆의 몬스터 존으로 이동한다" 처리를 이 카드의 T(티) 카운터의 수만큼 반복한다. 그 후, 대상 몬스터의 펜듈럼 스케일의 수치 이하의 레벨 / 랭크를 가지는 융합 / 엑시즈 몬스터가, 대상 몬스터와 같은 세로열의 상대 필드에 존재할 경우, 그 카드들을 전부 파괴하고, 그 공격력의 합계만큼의 데미지를 상대에게 준다.
  zh-TW:
  zh-CN: |-
    ①：在自己・对手的准备阶段发动。在此卡上放1个T计数物。②：1回合1次，以自己主要怪兽区域的1只灵摆怪兽为对象可以发动。依此卡的T计数物的数量，重复“将对象灵摆怪兽的位置移动至其相邻的怪兽区域”的处理。然后，与对象怪兽同一纵列的对手场上，存在等级・阶级在对象怪兽的灵摆刻度数值以下的融合・超量怪兽的情况下，将那些怪兽全部破坏，给予对手相当于其攻击力合计数值的伤害。
