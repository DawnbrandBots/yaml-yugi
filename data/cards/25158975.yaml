text:
  en: |-
    Cannot be Normal Summoned/Set. Must be Special Summoned (from your hand or GY) by banishing 3 Warrior and/or DARK monsters from your GY. You can only Special Summon "Destiny HERO - Destro-Dogma" once per turn this way. If Summoned this way: You can activate this effect; inflict 2000 damage to your opponent during the next Standby Phase. Once per turn, when your opponent activates a card or effect (Quick Effect): You can Fusion Summon 1 DARK or Warrior Fusion Monster from your Extra Deck, by shuffling its materials from your hand, field, and/or GY into the Deck.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカードは通常召喚できない。「Ｄ－ＨＥＲＯ デスドグマガイ」は１ターンに１度、戦士族か闇属性のモンスターを合計３体、自分の墓地から除外した場合のみ手札・墓地から特殊召喚できる。①：この方法でこのカードが特殊召喚した場合に発動できる。次のスタンバイフェイズに相手に２０００ダメージを与える。②：１ターンに１度、相手が効果を発動した時に発動できる。自分の手札・フィールド・墓地のモンスターを融合素材としてデッキに戻し、戦士族か闇属性の融合モンスター１体を融合召喚する。
  ko:
  zh-TW:
  zh-CN: |-
    此卡不可通常召唤。“命运－英雄 死亡教义魔侠”1回合1次，仅可在从自己墓地将合计3只战士族或暗属性怪兽除外的情况下，从手牌・墓地特殊召唤。①：此卡以此方法特殊召唤的情况下可以发动。在下个准备阶段给予对手2000伤害。②：1回合1次，对手发动效果时可以发动。将自己手牌・场上・墓地的怪兽作为融合素材放回牌组，将1只战士族或暗属性的融合怪兽融合召唤。
