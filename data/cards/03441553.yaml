  ja: |-
    このカード名のカードは１ターンに１枚しか発動できない。①：以下の効果から１つを選択して発動できる。
    ●自分の「三幻魔」モンスターの効果の発動にチェーンして、相手が効果を発動した時に発動できる。その相手の効果を無効にする。
    ●手札のレベル１０の「三幻魔」モンスター１体を相手に見せて発動できる。自分の手札を１枚選んで捨て、デッキから「幻魔の扉」１枚を手札に加える。
    ●自分の墓地・除外状態の「三幻魔」罠カード３枚をデッキに戻し、相手フィールドのカード１枚を対象として発動できる。そのカードを破壊する。
