text:
  en: |-
    You can discard this card; add 1 "Call of the Haunted" or 1 Spell/Trap that mentions it from your Deck to your hand. If this card is Special Summoned: You can target 1 Attack Position monster your opponent controls; that face-up monster cannot attack, its effects are negated, also it cannot be used as material for a Fusion, Synchro, Xyz, or Link Summon. You can only use each effect of "Stare of the Snake Hair" once per turn.
  de: |-
    Du kannst diese Karte abwerfen; füge deiner Hand 1 „Ruf der Gejagten“ oder 1 Zauber/Falle, der oder die ihn erwähnt, von deinem Deck hinzu. Falls diese Karte als Spezialbeschwörung beschworen wird: Du kannst 1 Monster in Angriffsposition wählen, das dein Gegner kontrolliert; jenes offene Monster kann nicht angreifen, seine Effekte werden annulliert, zusätzlich kann es nicht als Material für eine Fusions-, Synchro-, Xyz- oder Linkbeschwörung verwendet werden. Du kannst jeden Effekt von „Blick der Schlangenhaare“ nur einmal pro Spielzug verwenden.
  es: |-
    Puedes descartar esta carta; añade a tu mano 1 "Llamada de los Condenados" o 1 Mágica/Trampa que la mencione en tu Deck. Si esta carta es Invocada de Modo Especial: puedes seleccionar 1 monstruo en Posición de Ataque que controle tu adversario; ese monstruo boca arriba no puede atacar, sus efectos son negados y además no puede ser usado como material para una Invocación por Fusión, Sincronía, Xyz o Enlace. Sólo puedes usar cada efecto de "Mirada del Pelo de Serpiente" una vez por turno.
  fr: |-
    Vous pouvez défausser cette carte ; ajoutez 1 "Appel de l'Être Hanté" ou 1 Magie/Piège qui le mentionne depuis votre Deck à votre main. Si cette carte est Invoquée Spécialement : vous pouvez cibler 1 monstre en Position d'Attaque contrôlé par votre adversaire ; le monstre face recto ne peut pas attaquer, ses effets sont annulés, et aussi, il ne peut pas être utilisé comme Matériel pour une Invocation Fusion, Synchro, Xyz ou Lien. Vous ne pouvez utiliser chaque effet de "Regard de la Tête Cheveux Serpent" qu'une fois par tour.
  it: |-
    Puoi scartare questa carta; aggiungi 1 "Richiamo del Posseduto" o 1 Magia/Trappola che lo menziona dal tuo Deck alla tua mano. Se questa carta viene Evocata Specialmente: puoi scegliere come bersaglio 1 mostro in Posizione di Attacco controllato dal tuo avversario; quel mostro scoperto non può attaccare, i suoi effetti sono annullati, inoltre esso non può essere utilizzato come materiale per un'Evocazione tramite Fusione, Synchro, Xyz o Link. Puoi utilizzare ogni effetto di "Sguardo della Capelli di Serpente" una sola volta per turno.
  pt: |-
    Você pode descartar este card; adicione 1 "Chamado dos Assombrados" ou 1 Magia/Armadilha que o mencione do seu Deck à sua mão. Se este card for Invocado por Invocação-Especial: você pode escolher 1 monstro em Posição de Ataque que seu oponente controla; esse monstro com a face para cima não pode atacar, seus efeitos são negados e, além disso, ele não pode ser usado como matéria para uma Invocação-Fusão, Sincro, Xyz ou Link. Você só pode usar cada efeito de "Olhar dos Cabelos de Cobras" uma vez por turno.
