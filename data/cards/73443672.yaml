text:
  en: |-
    Activate this card if both players have 5 or more monsters in their GYs; destroy as many monsters on the field as possible, then each player banishes (face-down) all monsters from their Deck, then you can Special Summon 1 Normal Monster from your GY. Once per turn, during the Standby Phase: Activate this effect; each player can Special Summon 1 monster from their GY, ignoring its Summoning conditions, but banish it when it leaves the field. You can only activate 1 "Underworld Circle" per Duel.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名のカードはデュエル中に１枚しか発動できない。①：お互いの墓地のモンスターがそれぞれ５体以上の場合にこのカードを発動できる。フィールドのモンスターを全て破壊する。その後、お互いは自身のデッキのモンスターを全て裏側で除外する。さらに自分は自身の墓地から通常モンスター１体を特殊召喚できる。②：自分・相手のスタンバイフェイズに発動する。お互いはそれぞれ自身の墓地からモンスター１体を召喚条件を無視して特殊召喚できる。この効果で特殊召喚したモンスターは、フィールドから離れた場合に除外される。
  ko: |-
    이 카드명의 카드는 듀얼 중에 1장밖에 발동할 수 없다. ①: 서로의 묘지의 몬스터가 각각 5장 이상일 경우에 이 카드를 발동할 수 있다. 필드의 몬스터를 전부 파괴한다. 그 후, 양쪽 플레이어는 자신 덱의 몬스터를 전부 뒷면으로 제외한다. 추가로 자신은 자신 묘지에서 일반 몬스터 1장을 특수 소환할 수 있다. ②: 자신 / 상대의 스탠바이 페이즈에 발동한다. 양쪽 플레이어는 각각 자신 묘지에서 몬스터 1장을 소환 조건을 무시하고 특수 소환할 수 있다. 이 효과로 특수 소환한 몬스터는, 필드에서 벗어났을 경우에 제외된다.
  zh-TW:
  zh-CN: |-
    此卡名的卡在决斗中仅可发动1张。①：双方墓地的怪兽各有5只以上的情况下可以发动此卡。将场上的怪兽全部破坏。然后，双方将自身牌组的怪兽全部以里侧除外。自己进而可从自身墓地将1只通常怪兽特殊召唤。②：在自己・对手的准备阶段发动。双方可各从自身墓地将1只怪兽无视召唤条件特殊召唤。以此效果特殊召唤的怪兽从场上离开的情况下，将其除外。
