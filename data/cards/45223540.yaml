text:
  en: |-
    If this card is in your hand: You can reveal 1 Fusion Monster in your Extra Deck and banish 1 material whose name is mentioned on it from your Deck, then Special Summon this card, and if you do, this card's name can be treated as the banished monster's, if used as Fusion Material this turn. You can only use this effect of "Sorcerer of the Swamp" once per turn.
  de: |-
    Falls sich diese Karte in deiner Hand befindet: Du kannst 1 Fusionsmonster in deinem Extra Deck vorzeigen und 1 Material, dessen Name darauf erwähnt ist, von deinem Deck verbannen, dann beschwöre diese Karte als Spezialbeschwörung und falls du dies tust, kann der Name dieser Karte in diesem Spielzug als der des verbannten Monsters behandelt werden, falls sie als Fusionsmaterial verwendet wird. Du kannst diesen Effekt von „Zauberer aus dem Sumpf“ nur einmal pro Spielzug verwenden.
  es: |-
    Si esta carta está en tu mano: puedes mostrar 1 Monstruo de Fusión en tu Deck Extra y destierra 1 material en tu Deck cuyo nombre sea mencionado en él, y después Invoca esta carta de Modo Especial y, si lo haces, el nombre de esta carta puede ser tratado como el nombre del monstruo desterrado, si es usado como Material de Fusión este turno. Sólo puedes usar este efecto de "Hechicero del Pantano" una vez por turno.
  fr: |-
    Si cette carte est dans votre main : vous pouvez révéler 1 Monstre Fusion dans votre Extra Deck, et bannissez 1 Matériel dont le nom est mentionné sur celui-ci depuis votre Deck, puis Invoquez Spécialement cette carte, et si vous le faites, le nom de cette carte peut être traité comme celui du monstre banni s'il est utilisé comme Matériel Fusion ce tour. Vous ne pouvez utiliser cet effet de "Sorcier des Marais" qu'une fois par tour.
  it: |-
    Se questa carta è nella tua mano: puoi rivelare 1 Mostro Fusione nel tuo Extra Deck e bandire 1 materiale il cui nome è menzionato su di esso dal tuo Deck, poi Evocare Specialmente questa carta e, se lo fai, il nome di questa carta può essere considerato come quello del mostro bandito, se utilizzato come Materiale da Fusione in questo turno. Puoi utilizzare questo effetto di "Stregone delle Paludi" una sola volta per turno.
  pt: |-
    Se este card estiver na sua mão: você pode revelar 1 Monstro de Fusão no seu Deck Adicional e banir do seu Deck 1 matéria cujo nome seja mencionado nele e, depois, Invoque este card por Invocação-Especial e, se isso acontecer, o nome deste card pode ser considerado como o do monstro banido, se usado como Matéria de Fusão neste turno. Você só pode usar este efeito de "Feiticeiro do Pântano" uma vez por turno.
  ja: |-
    このカード名の効果は１ターンに１度しか使用できない。①：このカードが手札に存在する場合に発動できる。ＥＸデッキの融合モンスター１体を相手に見せ、そのモンスターにカード名が記された融合素材モンスター１体をデッキから除外する。その後、このカードを特殊召喚する。このターン、この効果で特殊召喚したこのカードを融合素材とする場合、この効果で除外したモンスターの同名カードとして扱う事ができる。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的效果1回合仅可使用1次。①：此卡存在于手牌的情况下可以发动。向对手出示额外牌组的1只融合怪兽，从牌组将1只卡名记载于该怪兽的融合素材怪兽除外。然后，将此卡特殊召唤。此回合，要将以此效果特殊召唤的此卡作为融合素材的情况下，可视为以此效果所除外的怪兽的同名卡。
