    此卡名的效果1回合仅可使用1次。①：此卡存在于手牌的情况下可以发动。向对手出示额外牌组的1只融合怪兽，从牌组将1只卡名记载于该怪兽的融合素材怪兽除外。然后，将此卡特殊召唤。此回合，要将以此效果特殊召唤的此卡作为融合素材的情况下，可视为以此效果所除外的怪兽的同名卡。
