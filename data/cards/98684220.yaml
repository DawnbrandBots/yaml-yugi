text:
  en: |-
    Cannot be Normal Summoned/Set. Must be Special Summoned (from your hand) by shuffling 1 Ritual Monster (Spellcaster or Warrior) from your hand or GY into the Deck. You can only Special Summon "Black Chaos the Ultimate Magical Swordsman" once per turn this way. You can discard this card; place 1 Continuous Trap that mentions "Ritual of Light and Darkness" from your Deck or GY, face-up on your field. Unaffected by your opponent's activated effects while you have a Ritual Spell in your GY. Once per turn: You can banish 2 cards your opponent controls.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカードは通常召喚できない。「超魔剣士ブラック・カオス」は１ターンに１度、自分の手札・墓地から魔法使い族・戦士族の儀式モンスター１体をデッキに戻した場合のみ特殊召喚できる。①：このカードを手札から捨てて発動できる。自分のデッキ・墓地から「光と闇の儀式」のカード名が記された永続罠カード１枚を自分フィールドに表側表示で置く。②：自分の墓地に儀式魔法カードが存在する限り、このカードは相手が発動した効果を受けない。③：１ターンに１度、自分メインフェイズに発動できる。相手フィールドのカード２枚を除外する。
  ko:
  zh-TW:
  zh-CN: |-
    此卡不可通常召唤。“超魔剑士 黑暗混沌”1回合1次，仅可在从自己手牌・墓地将1只魔法师族・战士族的仪式怪兽放回牌组的情况下特殊召唤。①：从手牌将此卡舍弃可以发动。从自己牌组・墓地将1张记载有“光与暗的仪式”卡名的永续陷阱卡以表侧表示放在自己场上。②：只要自己墓地存在仪式魔法卡，此卡不受对手发动的效果影响。③：1回合1次，在自己的主要阶段可以发动。将对手场上的2张卡除外。
