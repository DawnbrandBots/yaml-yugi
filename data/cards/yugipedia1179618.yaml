  en: |-
    Monsters you control that were Normal or Special Summoned from the hand gain 500 ATK/DEF. You can only use each of the following effects of "Kowloon, Citadel of the Sky" once per turn. During your Main Phase: You can Special Summon 1 "Mechbeast Token" (Machine/EARTH/Level 6/ATK 2000/DEF 2000) to your opponent's field, and if you do, add 1 "Blitzclique" monster from your Deck to your hand. If a card(s) is destroyed by your "Blitzclique" card’s effect, while this card is in your GY: You can add this card to your hand.
