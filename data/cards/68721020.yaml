  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：フィールドの表側表示モンスター１体を対象としてこのカードを発動できる。このカードを以下の効果を持つ装備カード扱いでそのモンスターに装備する。
    ●装備モンスターは魔法カードの効果を受けない。
    ●１ターンに１度、発動できる。このカードを破壊し、デッキから「Ｓｉｎ」カード１枚を手札に加える。
    ②：フィールドゾーンにカードが存在する場合、自分の墓地からこのカードと「Ｓｉｎ」カード１枚を除外して発動できる。フィールドのモンスターを全て破壊する。
