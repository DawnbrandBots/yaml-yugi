text:
  en: |-
    FLIP: You can target 1 other face-up monster on the field; change it to face-down Defense Position.
    You can reveal this card in your hand; add 1 WIND Flip monster from your Deck to your hand, except "WAKE CUP! Kuro", then discard 1 card. (Quick Effect): You can target 1 face-down Defense Position monster on the field; change it to face-up Defense Position. You can only use each effect of "WAKE CUP! Kuro" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②③の効果はそれぞれ１ターンに１度しか使用できない。①：手札のこのカードを相手に見せて発動できる。デッキから「ＷＡＫＥ ＣＵＰ！ クロ」以外の風属性リバースモンスター１体を手札に加える。その後、自分の手札を１枚選んで捨てる。②：このカードがリバースした場合、フィールドの他の表側表示モンスター１体を対象として発動できる。そのモンスターを裏側守備表示にする。③：自分・相手ターンに、フィールドの裏側守備表示モンスター１体を対象として発動できる。そのモンスターを表側守備表示にする。
  ko: |-
    이 카드명의 ①②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 패의 이 카드를 상대에게 보여주고 발동할 수 있다. 덱에서 "WAKE CUP(웨이컵)! 쿠로" 이외의 바람 속성 리버스 몬스터 1장을 패에 넣는다. 그 후, 자신의 패를 1장 고르고 버린다. ②: 이 카드가 리버스했을 경우, 필드의 다른 앞면 표시 몬스터 1장을 대상으로 하고 발동할 수 있다. 그 몬스터를 뒷면 수비 표시로 한다. ③: 자신 / 상대 턴에, 필드의 뒷면 수비 표시 몬스터 1장을 대상으로 하고 발동할 수 있다. 그 몬스터를 앞면 수비 표시로 한다.
  zh-TW:
  zh-CN: |-
    此卡名的①②③效果1回合仅可各使用1次。①：向对手出示手牌的此卡可以发动。从牌组将“威咖杯！玉露”以外的1只风属性反转怪兽加入手牌。然后，挑选自己的1张手牌舍弃。②：此卡反转的情况下，以场上的1只其他的表侧表示怪兽为对象可以发动。将该怪兽改成里侧守备表示。③：在自己・对手回合中，以场上的1只里侧守备表示怪兽为对象可以发动。将该怪兽改成表侧守备表示。
