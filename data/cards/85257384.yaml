text:
  en: |-
    If you have a "The Phantom Knights" monster in your field or GY, you can activate this card the turn it was Set. Special Summon this card in Defense Position as a Normal Monster (Warrior/DARK/Level 3/ATK 0/DEF 300) (this card is NOT treated as a Trap), then you can change 1 Attack Position monster your opponent controls to Defense Position. You can banish this card from your GY; immediately after this effect resolves, Xyz Summon 1 DARK Xyz Monster. You can only use each effect of "The Phantom Knights of Umbrage Veil" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。自分のフィールドか墓地に「幻影騎士団」モンスターが存在する場合、このカードはセットしたターンでも発動できる。①：このカードは発動後、通常モンスター（戦士族・闇・星３・攻０／守３００）となり、モンスターゾーンに守備表示で特殊召喚する（罠カードとしては扱わない）。その後、相手フィールドの攻撃表示モンスター１体を守備表示にできる。②：墓地のこのカードを除外して発動できる。闇属性Ｘモンスター１体のＸ召喚を行う。
