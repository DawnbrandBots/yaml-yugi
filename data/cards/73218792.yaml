name:
  en: Junk Meister
  de: Gerümpelmeister
  es: Maestro de Basura
  fr: Robot Meister
  it: Padrone Rottame
  pt: Meister Sucata
  ja: ジャンク・マイスター
  ja_romaji: Janku Maisutā
  ko: 정크 마이스터
  ko_rr:
  zh-TW: 廢品大師
  zh-CN: 废品大师
text:
  en: |-
    If this card is in your hand: You can reveal 1 "Warrior" or "Stardust" Synchro Monster in your Extra Deck; Special Summon this card, also you cannot Special Summon from the Extra Deck for the rest of this turn, except Synchro Monsters. If this card is Normal or Special Summoned: You can add 1 "Junk" card from your Deck to your hand, except "Junk Meister". You can target 1 "Junk" monster you control; reduce its Level by up to 2. You can only use each effect of "Junk Meister" once per turn.
  de: |-
    Falls sich diese Karte in deiner Hand befindet: Du kannst 1 „Krieger“- oder „Sternenstaub“-Synchromonster in deinem Extra Deck vorzeigen; beschwöre diese Karte als Spezialbeschwörung, zusätzlich kannst du für den Rest dieses Spielzugs keine Spezialbeschwörungen vom Extra Deck durchführen, außer von Synchromonstern. Falls diese Karte als Normal- oder Spezialbeschwörung beschworen wird: Du kannst deiner Hand 1 „Gerümpel“-Karte von deinem Deck hinzufügen, außer „Gerümpelmeister“. Du kannst 1 „Gerümpel“-Monster wählen, das du kontrollierst; verringere seine Stufe um bis zu 2. Du kannst jeden Effekt von „Gerümpelmeister“ nur einmal pro Spielzug verwenden.
  es: |-
    Si esta carta está en tu mano: puedes mostrar 1 Monstruo de Sincronía "Guerrero/a" o "Polvo de Estrellas" en tu Deck Extra; Invoca esta carta de Modo Especial, y además no puedes Invocar de Modo Especial desde el Deck Extra por el resto de este turno, excepto Monstruos de Sincronía. Si esta carta es Invocada de Modo Normal o Especial: puedes añadir a tu mano 1 carta "Basura" en tu Deck, excepto "Maestro de Basura". Puedes seleccionar 1 monstruo "Basura" que controles; reduce su Nivel hasta en 2. Sólo puedes usar cada efecto de "Maestro de Basura" una vez por turno.
  fr: |-
    Si cette carte est dans votre main : vous pouvez révéler 1 Monstre Synchro "Guerrier" ou "Poussière d'Étoile" dans votre Extra Deck ; Invoquez Spécialement cette carte, et aussi, vous ne pouvez pas Invoquer Spécialement (Monstres Synchro exclus) depuis l'Extra Deck le reste de ce tour. Si cette carte est Invoquée Normalement ou Spécialement : vous pouvez ajouter 1 carte "Robot" ("Robot Meister" exclu) depuis votre Deck à votre main. Vous pouvez cibler 1 monstre "Robot" que vous contrôlez ; réduisez son Niveau de max. 2. Vous ne pouvez utiliser chaque effet de "Robot Meister" qu'une fois par tour.
  it: |-
    Se questa carta è nella tua mano: puoi rivelare 1 Mostro Synchro "Guerriero" o "Polvere di Stelle" nel tuo Extra Deck; Evoca Specialmente questa carta, inoltre non puoi Evocare Specialmente dall'Extra Deck per il resto di questo turno, eccetto Mostri Synchro. Se questa carta viene Evocata Normalmente o Specialmente: puoi aggiungere 1 carta "Rottame" dal tuo Deck alla tua mano, eccetto "Padrone Rottame". Puoi scegliere come bersaglio 1 mostro "Rottame" che controlli; riduci il suo Livello di fino a 2. Puoi utilizzare ogni effetto di "Padrone Rottame" una sola volta per turno.
  pt: |-
    Se este card estiver na sua mão: você pode revelar 1 Monstro Sincro "Guerreiro(a)" ou "Poeira Estelar" no seu Deck Adicional; Invoque este card por Invocação-Especial e, além disso, você não pode Invocar por Invocação-Especial do Deck Adicional pelo resto deste turno, exceto Monstros Sincro. Se este card for Invocado por Invocação-Normal ou Especial: você pode adicionar 1 card "Sucata" do seu Deck à sua mão, exceto "Meister Sucata". Você pode escolher 1 monstro "Sucata" que você controla; reduza o Nível dele em até 2. Você só pode usar cada efeito de "Meister Sucata" uma vez por turno.
  ja: |-
    このカード名の①②③の効果はそれぞれ１ターンに１度しか使用できない。①：ＥＸデッキの「ウォリアー」、「スターダスト」Ｓモンスター１体を相手に見せて発動できる。このカードを手札から特殊召喚する。このターン、自分はＳモンスターしかＥＸデッキから特殊召喚できない。②：このカードが召喚・特殊召喚した場合に発動できる。デッキから「ジャンク・マイスター」以外の「ジャンク」カード１枚を手札に加える。③：自分フィールドの「ジャンク」モンスター１体を対象として発動できる。そのモンスターのレベルを２つまで下げる。
  ko: |-
    이 카드명의 ①②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 엑스트라 덱의 "워리어", "스타더스트" 싱크로 몬스터 1장을 상대에게 보여주고 발동할 수 있다. 이 카드를 패에서 특수 소환한다. 이 턴에, 자신은 싱크로 몬스터밖에 엑스트라 덱에서 특수 소환할 수 없다. ②: 이 카드를 일반 소환 / 특수 소환했을 경우에 발동할 수 있다. 덱에서 "정크 마이스터" 이외의 "정크" 카드 1장을 패에 넣는다. ③: 자신 필드의 "정크" 몬스터 1장을 대상으로 하고 발동할 수 있다. 그 몬스터의 레벨을 2개까지 내린다.
  zh-TW:
  zh-CN: |-
    此卡名的①②③效果1回合仅可各使用1次。①：向对手出示额外牌组的1只“战士”、“星尘”同步怪兽可以发动。从手牌将此卡特殊召唤。此回合，自己从额外牌组仅可特殊召唤同步怪兽。②：此卡召唤・特殊召唤的情况下可以发动。从牌组将“废品大师”以外的1张“废品”卡加入手牌。③：以自己场上的1只“废品”怪兽为对象可以发动。该怪兽的等级下降最多2。
