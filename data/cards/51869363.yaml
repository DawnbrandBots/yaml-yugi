name:
  en: Superconductive Plasma Blast
  de: Superleitender Plasmaknall
  es: Estallido de Plasma Superconductivo
  fr: Choc Plasma Supraconducteur
  it: Esplosione di Plasma Superconduttivo
  pt: Explosão de Plasma Supercondutor
  ja: <ruby>超<rt>ちょう</rt></ruby><ruby>電<rt>でん</rt></ruby><ruby>導<rt>どう</rt></ruby><ruby>閃<rt>せん</rt></ruby><ruby>輝<rt>き</rt></ruby>プラズマ・ブラスト
