name:
  en: Martyr of the Sacred Beasts
  de: Märtyrer der heiligen Ungeheuer
  es: Mártir de las Bestias Sagradas
  fr: Martyr des Bêtes Sacrées
  it: Martire delle Bestie Sacre
  pt: Mártir das Bestas Sagradas
  ja: <ruby>三<rt>さん</rt></ruby><ruby>幻<rt>げん</rt></ruby><ruby>魔<rt>ま</rt></ruby>の<ruby>殉<rt>じゅん</rt></ruby><ruby>教<rt>きょう</rt></ruby><ruby>者<rt>しゃ</rt></ruby>
  ja_romaji: Sangenma no Junkyōsha
  ko:
  ko_rr:
  zh-TW:
  zh-CN: 三幻魔殉教者
text:
  en: |-
    If this card is Normal or Special Summoned: You can place 1 "Sacred Beast" Field Spell or 1 "Sacred Beast" Continuous Spell/Trap from your Deck, face-up on your field. If you control another "Sacred Beast" monster: You can Special Summon 2 "Martyr of the Sacred Beasts" from your hand, Deck, and/or GY. During your opponent's End Phase, if you have this card and a Level 10 "Sacred Beast" monster in your GY: You can add this card to your hand. You can only use each effect of "Martyr of the Sacred Beasts" once per turn.
  de: |-
    Falls diese Karte als Normal- oder Spezialbeschwörung beschworen wird: Du kannst 1 „Heiligen Ungeheuer“-Spielfeldzauber oder 1 Permanente/n „Heiligen Ungeheuer“-Zauber/Falle von deinem Deck offen auf deine Spielfeldseite legen. Falls du ein anderes „Heiligen Ungeheuer“-Monster kontrollierst: Du kannst 2 „Märtyrer der heiligen Ungeheuer“ als Spezialbeschwörung von deiner Hand, deinem Deck und/oder deinem Friedhof beschwören. Während der End Phase deines Gegners, falls du diese Karte und ein „Heiligen Ungeheuer“-Monster der Stufe 10 in deinem Friedhof hast: Du kannst diese Karte deiner Hand hinzufügen. Du kannst jeden Effekt von „Märtyrer der heiligen Ungeheuer“ nur einmal pro Spielzug verwenden.
  es: |-
    Si esta carta es Invocada de Modo Normal o Especial: puedes poner boca arriba en tu Campo 1 Mágica de Campo "Bestias Sagradas" o 1 Mágica/Trampa Continua "Bestias Sagradas" en tu Deck. Si controlas otro monstruo "Bestias Sagradas": puedes Invocar de Modo Especial 2 "Mártir de las Bestias Sagradas" desde tu mano, Deck y/o Cementerio. Durante la End Phase de tu adversario, si tienes esta carta y un monstruo "Bestias Sagradas" de Nivel 10 en tu Cementerio: puedes añadir esta carta a tu mano. Sólo puedes usar cada efecto de "Mártir de las Bestias Sagradas" una vez por turno.
  fr: |-
    Si cette carte est Invoquée Normalement ou Spécialement : vous pouvez placer face recto 1 Magie de Terrain "Bêtes Sacrées" ou 1 Magie Continue/Piège Continu "Bêtes Sacrées" depuis votre Deck sur votre Terrain. Si vous contrôlez un autre monstre "Bêtes Sacrées" : vous pouvez Invoquer Spécialement 2 "Martyr des Bêtes Sacrées" depuis votre main, Deck et/ou Cimetière. Durant la End Phase de votre adversaire, si vous avez cette carte et un monstre "Bêtes Sacrées" de Niveau 10 dans votre Cimetière : vous pouvez ajouter cette carte à votre main. Vous ne pouvez utiliser chaque effet de "Martyr des Bêtes Sacrées" qu'une fois par tour.
  it: |-
    Se questa carta viene Evocata Normalmente o Specialmente: puoi mettere 1 Magia Terreno "Bestia Sacra" o 1 Magia/Trappola Continua "Bestia Sacra" dal tuo Deck, scoperta sul tuo Terreno. Se controlli un altro mostro "Bestia Sacra": puoi Evocare Specialmente 2 "Martire delle Bestie Sacre" dalla tua mano, Deck e/o Cimitero. Durante la End Phase del tuo avversario, se hai questa carta e un mostro "Bestia Sacra" di Livello 10 nel tuo Cimitero: puoi aggiungere questa carta alla tua mano. Puoi utilizzare ogni effetto di "Martire delle Bestie Sacre" una sola volta per turno.
  pt: |-
    Se este card for Invocado por Invocação-Normal ou Especial: você pode colocar 1 Magia de Campo "Bestas Sagradas" ou 1 Magia/Armadilha Contínua "Bestas Sagradas" do seu Deck, com a face para cima no seu campo. Se você controlar outro monstro "Bestas Sagradas": você pode Invocar por Invocação-Especial 2 "Mártir das Bestas Sagradas" da sua mão, do Deck e/ou do Cemitério. Durante a Fase Final do seu oponente, se você tiver este card e um monstro "Bestas Sagradas" de Nível 10 no seu Cemitério: você pode adicionar este card à sua mão. Você só pode usar cada efeito de "Mártir das Bestas Sagradas" uma vez por turno.
  ja: |-
    このカード名の①②③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが召喚・特殊召喚した場合に発動できる。デッキから「三幻魔」フィールド魔法・永続魔法・永続罠カード１枚を自分フィールドに表側表示で置く。②：自分フィールドに他の「三幻魔」モンスターが存在する場合に発動できる。自分の手札・デッキ・墓地から「三幻魔の殉教者」２体を特殊召喚する。③：相手エンドフェイズに、自分の墓地にこのカードとレベル１０の「三幻魔」モンスターが存在する場合に発動できる。このカードを手札に加える。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②③效果1回合仅可各使用1次。①：此卡召唤・特殊召唤的情况下可以发动。从牌组将1张“三幻魔”场地魔法・永续魔法・永续陷阱卡以表侧表示放在自己场上。②：自己场上存在其他“三幻魔”怪兽的情况下可以发动。从自己手牌・牌组・墓地将2只“三幻魔殉教者”特殊召唤。③：在对手的结束阶段，自己墓地存在此卡与等级10的“三幻魔”怪兽的情况下可以发动。将此卡加入手牌。
