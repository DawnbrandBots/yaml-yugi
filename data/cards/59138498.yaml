text:
  en: |-
    If this card is Normal or Special Summoned: You can place 1 "Sacred Beast" Field Spell or 1 "Sacred Beast" Continuous Spell/Trap from your Deck, face-up on your field. If you control another "Sacred Beast" monster: You can Special Summon 2 "Martyr of the Sacred Beasts" from your hand, Deck, and/or GY. During your opponent's End Phase, if you have this card and a Level 10 "Sacred Beast" monster in your GY: You can add this card to your hand. You can only use each effect of "Martyr of the Sacred Beasts" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが召喚・特殊召喚した場合に発動できる。デッキから「三幻魔」フィールド魔法・永続魔法・永続罠カード１枚を自分フィールドに表側表示で置く。②：自分フィールドに他の「三幻魔」モンスターが存在する場合に発動できる。自分の手札・デッキ・墓地から「三幻魔の殉教者」２体を特殊召喚する。③：相手エンドフェイズに、自分の墓地にこのカードとレベル１０の「三幻魔」モンスターが存在する場合に発動できる。このカードを手札に加える。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②③效果1回合仅可各使用1次。①：此卡召唤・特殊召唤的情况下可以发动。从牌组将1张“三幻魔”场地魔法・永续魔法・永续陷阱卡以表侧表示放在自己场上。②：自己场上存在其他“三幻魔”怪兽的情况下可以发动。从自己手牌・牌组・墓地将2只“三幻魔殉教者”特殊召唤。③：在对手的结束阶段，自己墓地存在此卡与等级10的“三幻魔”怪兽的情况下可以发动。将此卡加入手牌。
