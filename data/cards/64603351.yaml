text:
  en: |-
    This card's name becomes "Umi" while in the Monster Zone. You can only use each of the following effects of "Leviathan of Atlantis - Daedalus" once per turn. If you control "Atlantis, City of the Sea Dragon" or "Umi": You can Special Summon this card from your hand. You can send up to 3 face-up "Umi" you control to the GY; add that many cards that mention "Atlantis, City of the Sea Dragon" from your Deck to your hand, except Level 7 monsters, then you can send 1 card on the field to the GY.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①③の効果はそれぞれ１ターンに１度しか使用できない。①：自分フィールドに「竜都アトランティス」か「海」が存在する場合に発動できる。このカードを手札から特殊召喚する。②：このカードはモンスターゾーンに存在する限り、カード名を「海」として扱う。③：自分フィールドの表側表示の「海」を３枚まで墓地へ送って発動できる。その数だけ、レベル７モンスターを除く、「竜都アトランティス」のカード名が記されたカードをデッキから手札に加える。その後、フィールドのカード１枚を墓地へ送る事ができる。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①③效果1回合仅可各使用1次。①：自己场上存在“龙都 亚特兰蒂斯”或“海”的情况下可以发动。从手牌将此卡特殊召唤。②：此卡只要存在于怪兽区域，卡名视为“海”。③：将自己场上的最多3张表侧表示的“海”送至墓地可以发动。依其数量，从牌组将除等级7怪兽以外的、记载有“龙都 亚特兰蒂斯”卡名的卡加入手牌。然后，可将场上的1张卡送至墓地。
