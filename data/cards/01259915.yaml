name:
  en: Sacred Beasts Thunderclap
  de: Donnerschlag der heiligen Ungeheuer
  es: Trueno de las Bestias Sagradas
  fr: Coup de Tonnerre des Bêtes Sacrées
  it: Rombo di Tuono Bestie Sacre
  pt: Trovão das Bestas Sagradas
  ja: <ruby>三<rt>さん</rt></ruby><ruby>幻<rt>げん</rt></ruby><ruby>魔<rt>ま</rt></ruby>の<ruby>霹<rt>へき</rt></ruby><ruby>靂<rt>れき</rt></ruby>
  ja_romaji: Sangenma no Hekireki
  ko:
  ko_rr:
  zh-TW:
  zh-CN: 三幻魔之霹雳
text:
  en: |-
    During your Main Phase: You can place 2 "Sacred Beasts Thunderclap" from your hand, Deck, and/or GY, face-up on your field, then you can reveal 1 Level 10 "Sacred Beast" monster in your hand, then place 1 "Fallen Paradise of the Sacred Beasts" from your Deck, face-up in your Field Zone. During your opponent's End Phase, if this card is in your GY: You can add this card to your hand. You can only use each effect of "Sacred Beasts Thunderclap" once per turn.
  de: |-
    Während deiner Main Phase: Du kannst 2 „Donnerschlag der heiligen Ungeheuer“ von deiner Hand, deinem Deck und/oder deinem Friedhof offen auf deine Spielfeldseite legen, dann kannst du 1 „Heiligen Ungeheuer“-Monster der Stufe 10 in deiner Hand vorzeigen, dann lege 1 „Verlorenes Paradies der heiligen Ungeheuer“ von deinem Deck offen in deine Spielfeldzone. Während der End Phase deines Gegners, falls sich diese Karte in deinem Friedhof befindet: Du kannst diese Karte deiner Hand hinzufügen. Du kannst jeden Effekt von „Donnerschlag der heiligen Ungeheuer“ nur einmal pro Spielzug verwenden.
  es: |-
    Durante tu Main Phase: puedes poner boca arriba en tu Campo 2 "Trueno de las Bestias Sagradas" en tu mano, Deck y/o Cementerio, y después puedes mostrar 1 monstruo "Bestias Sagradas" de Nivel 10 en tu mano, y después pon boca arriba en tu Zona del Campo 1 "Paraíso Perdido de las Bestias Sagradas" en tu Deck. Durante la End Phase de tu adversario, si esta carta está en tu Cementerio: puedes añadir esta carta a tu mano. Sólo puedes usar cada efecto de "Trueno de las Bestias Sagradas" una vez por turno.
  fr: |-
    Durant votre Main Phase : vous pouvez placer face recto 2 "Coup de Tonnerre des Bêtes Sacrées" depuis votre main, Deck et/ou Cimetière sur votre Terrain, puis vous pouvez révéler 1 monstre "Bêtes Sacrées" de Niveau 10 dans votre main, puis placez face recto 1 "Paradis Perdu des Bêtes Sacrées" depuis votre Deck dans votre Zone Terrain. Durant la End Phase de votre adversaire, si cette carte est dans votre Cimetière : vous pouvez ajouter cette carte à votre main. Vous ne pouvez utiliser chaque effet de "Coup de Tonnerre des Bêtes Sacrées" qu'une fois par tour.
  it: |-
    Durante la tua Main Phase: puoi mettere 2 "Rombo di Tuono Bestie Sacre" dalla tua mano, Deck e/o Cimitero, scoperte sul tuo Terreno, poi puoi rivelare 1 mostro "Bestia Sacra" di Livello 10 nella tua mano, poi mettere 1 "Paradiso Perduto delle Bestie Sacre" dal tuo Deck, scoperto nella tua Zona Terreno. Durante la End Phase del tuo avversario, se questa carta è nel tuo Cimitero: puoi aggiungere questa carta alla tua mano. Puoi utilizzare ogni effetto di "Rombo di Tuono Bestie Sacre" una sola volta per turno.
  pt: |-
    Durante sua Fase Principal: você pode colocar 2 "Trovão das Bestas Sagradas" da sua mão, do Deck e/ou do Cemitério, com a face para cima no seu campo e, depois, você pode revelar 1 monstro "Bestas Sagradas" de Nível 10 na sua mão e, depois, coloque 1 "Paraíso Caído das Bestas Sagradas" do seu Deck, com a face para cima na sua Zona do Campo. Durante a Fase Final do seu oponente, se este card estiver no seu Cemitério: você pode adicionar este card à sua mão. Você só pode usar cada efeito de "Trovão das Bestas Sagradas" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分メインフェイズに発動できる。自分の手札・デッキ・墓地から「三幻魔の霹靂」２枚を自分フィールドに表側表示で置く。その後、手札のレベル１０の「三幻魔」モンスター１体を相手に見せる事ができる。見せた場合、さらにデッキから「三幻魔の失楽園」１枚を自分のフィールドゾーンに表側表示で置く。②：このカードが墓地に存在する場合、相手エンドフェイズに発動できる。このカードを手札に加える。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：在自己的主要阶段可以发动。从自己手牌・牌组・墓地将2张“三幻魔之霹雳”以表侧表示放在自己场上。然后，可向对手出示手牌的1只等级10的“三幻魔”怪兽。出示的情况下，进而再从牌组将1张“三幻魔之失乐园”以表侧表示放在自己的场地区域。②：此卡存在于墓地的情况下，在对手的结束阶段可以发动。将此卡加入手牌。
