text:
  en: |-
    During your Main Phase: You can place 2 "Skyfire of the Sacred Beast" from your hand, Deck, and/or GY face-up on your field, then you can reveal 1 Level 10 "Sacred Beast" monster in your hand, then place 1 "Fallen Paradise of the Sacred Beasts" from your Deck face-up in your Field Zone. During your opponent's End Phase, if this card is in your GY: You can add it to your hand. You can only use each effect of "Skyfire of the Sacred Beast" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分メインフェイズに発動できる。自分の手札・デッキ・墓地から「三幻魔の霹靂」２枚を自分フィールドに表側表示で置く。その後、手札のレベル１０の「三幻魔」モンスター１体を相手に見せる事ができる。見せた場合、さらにデッキから「三幻魔の失楽園」１枚を自分のフィールドゾーンに表側表示で置く。②：このカードが墓地に存在する場合、相手エンドフェイズに発動できる。このカードを手札に加える。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：在自己的主要阶段可以发动。从自己手牌・牌组・墓地将2张“三幻魔之霹雳”以表侧表示放在自己场上。然后，可向对手出示手牌的1只等级10的“三幻魔”怪兽。出示的情况下，进而再从牌组将1张“三幻魔之失乐园”以表侧表示放在自己的场地区域。②：此卡存在于墓地的情况下，在对手的结束阶段可以发动。将此卡加入手牌。
