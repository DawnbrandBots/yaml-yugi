  ja: |-
    ①：以下の効果から１つを選択して発動できる（このカード名の以下の効果はそれぞれ１ターンに１度しか選択できない）。●自分の墓地からドラゴン族モンスター１体をデッキに戻す。その後、戻したモンスターとはカード名が異なる「ヴァレット」モンスター１体をデッキから特殊召喚できる。●自分の墓地からドラゴン族モンスター２体をデッキに戻す。その後、自分の墓地からフィールド魔法カード１枚を手札に加える。●自分の墓地からドラゴン族モンスター３体をデッキに戻す。その後、相手の墓地からモンスターを３体までデッキに戻す。
