text:
  en: |-
    When this card is destroyed by battle and sent to the GY: You can Special Summon 1 Level 4 monster with 1400 ATK from your Deck, or if you have 2 or more Level 4 monsters with 1400 ATK in your GY, you can Special Summon 1 Normal Monster instead. When your opponent activates a monster effect and you control a face-up non-Effect Monster (Quick Effect): You can banish this card from your GY; negate the activation, and if you do, destroy that monster. You can only use this effect of "Father Grizzly" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の②の効果は１ターンに１度しか使用できない。①：このカードが戦闘で破壊され墓地へ送られた時に発動できる。デッキから攻撃力１４００のレベル４モンスター１体を特殊召喚する。自分の墓地に攻撃力１４００のレベル４モンスターが２体以上存在する場合、代わりに通常モンスター１体を特殊召喚する事もできる。②：自分フィールドに効果モンスター以外の表側表示モンスターが存在し、相手がモンスターの効果を発動した時、墓地のこのカードを除外して発動できる。その発動を無効にし破壊する。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的②效果1回合仅可使用1次。①：此卡因战斗被破坏并被送至墓地时可以发动。从牌组将1只攻击力1400的等级4怪兽特殊召唤。自己墓地存在2只以上攻击力1400的等级4怪兽的情况下，作为代替也可将1只通常怪兽特殊召唤。②：自己场上存在效果怪兽以外的表侧表示怪兽，且对手发动怪兽的效果时，将墓地的此卡除外可以发动。将该发动无效并破坏。
