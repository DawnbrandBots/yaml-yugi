name:
  en: Diabrocken the Ominous Specter
  de: Diabrocken das unheilvolle Gespenst
  es: Diabrocken el Espectro Siniestro
  fr: Diabrocken le Spectre Menaçant
  it: Diabrocken lo Spettro Minaccioso
  pt: Diabrocken, o Espectro Sinistro
  ja: <ruby>妖<rt>よう</rt></ruby><ruby>光<rt>こう</rt></ruby>のディアーブロッケン
  ja_romaji: Yōkō no Diāburokken
  ko: 요광의 디아브로켄
  ko_rr:
  zh-TW:
  zh-CN: 妖光之迪亚布罗肯
text:
  en: |-
    If this card is in your hand (Quick Effect): You can banish 1 FIRE monster from your face-up field or GY; Special Summon this card. If this card is Special Summoned: You can target 1 face-up card on the field; negate its effects until the end of this turn. If this card is sent to the GY as Link Material: You can Set 1 Quick-Play Spell or Normal Trap from your GY that was sent there this turn. You can only use each effect of "Diabrocken the Ominous Specter" once per turn.
  de: |-
    Falls sich diese Karte in deiner Hand befindet (Schnelleffekt): Du kannst 1 FEUER Monster offen von deiner Spielfeldseite oder von deinem Friedhof verbannen; beschwöre diese Karte als Spezialbeschwörung. Falls diese Karte als Spezialbeschwörung beschworen wird: Du kannst 1 offene Karte auf dem Spielfeld wählen; annulliere bis zum Ende dieses Spielzugs ihre Effekte. Falls diese Karte als Linkmaterial auf den Friedhof gelegt wird: Du kannst 1 Schnellzauber oder Normale Falle von deinem Friedhof setzen, der oder die in diesem Spielzug dorthin gelegt wurde. Du kannst jeden Effekt von „Diabrocken das unheilvolle Gespenst“ nur einmal pro Spielzug verwenden.
  es: |-
    Si esta carta está en tu mano (Efecto Rápido): puedes desterrar 1 monstruo de FUEGO en tu Campo boca arriba o Cementerio; Invoca esta carta de Modo Especial. Si esta carta es Invocada de Modo Especial: puedes seleccionar 1 carta boca arriba en el Campo; niega sus efectos hasta el final de este turno. Si esta carta es mandada al Cementerio como Material de Enlace: puedes Colocar 1 Mágica de Juego Rápido o Trampa Normal desde tu Cementerio que fue mandada allí este turno. Sólo puedes usar cada efecto de "Diabrocken el Espectro Siniestro" una vez por turno.
  fr: |-
    Si cette carte est dans votre main (Effet Rapide) : vous pouvez bannir 1 monstre FEU depuis votre Terrain face recto ou Cimetière ; Invoquez Spécialement cette carte. Si cette carte est Invoquée Spécialement : vous pouvez cibler 1 carte face recto sur le Terrain ; jusqu'à la fin de ce tour, annulez ses effets. Si cette carte est envoyée au Cimetière comme Matériel Lien : vous pouvez Poser 1 Magie Jeu-Rapide ou Piège Normal depuis votre Cimetière qui y a été envoyé ce tour. Vous ne pouvez utiliser chaque effet de "Diabrocken le Spectre Menaçant" qu'une fois par tour.
  it: |-
    Se questa carta è nella tua mano (Effetto Rapido): puoi bandire 1 mostro FUOCO dal tuo Terreno scoperto o Cimitero; Evoca Specialmente questa carta. Se questa carta viene Evocata Specialmente: puoi scegliere come bersaglio 1 carta scoperta sul Terreno; annulla i suoi effetti fino alla fine di questo turno. Se questa carta viene mandata al Cimitero come Materiale Link: puoi Posizionare dal tuo Cimitero 1 Magia Rapida o Trappola Normale che è stata mandata lì in questo turno. Puoi utilizzare ogni effetto di "Diabrocken lo Spettro Minaccioso" una sola volta per turno.
  pt: |-
    Se este card estiver na sua mão (Efeito Rápido): você pode banir 1 monstro de FOGO do seu campo com a face para cima ou Cemitério; Invoque este card por Invocação-Especial. Se este card for Invocado por Invocação-Especial: você pode escolher 1 card com a face para cima no campo; negue seus efeitos até o final deste turno. Se este card for enviado para o Cemitério como Matéria Link: você pode Baixar 1 Magia Rápida ou Armadilha Normal do seu Cemitério que foi enviada para lá neste turno. Você só pode usar cada efeito de "Diabrocken, o Espectro Sinistro" uma vez por turno.
  ja: |-
    このカード名の①②③の効果はそれぞれ１ターンに１度しか使用できない。①：自分・相手ターンに、自分のフィールド（表側表示）・墓地から炎属性モンスター１体を除外して発動できる。このカードを手札から特殊召喚する。②：このカードが特殊召喚した場合、フィールドの表側表示カード１枚を対象として発動できる。そのカードの効果をターン終了時まで無効にする。③：このカードがＬ素材として墓地へ送られた場合に発動できる。このターンに自分の墓地へ送られた速攻魔法・通常罠カード１枚を墓地から自分フィールドにセットする。
  ko: |-
    이 카드명의 ①②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신 / 상대 턴에, 자신의 필드(앞면 표시) / 묘지에서 화염 속성 몬스터 1장을 제외하고 발동할 수 있다. 이 카드를 패에서 특수 소환한다. ②: 이 카드를 특수 소환했을 경우, 필드의 앞면 표시 카드 1장을 대상으로 하고 발동할 수 있다. 그 카드의 효과를 턴 종료시까지 무효로 한다. ③: 이 카드가 링크 소재로서 묘지로 보내졌을 경우에 발동할 수 있다. 이 턴에 자신 묘지로 보내진 속공 마법 / 일반 함정 카드 1장을 묘지에서 자신 필드에 세트한다.
  zh-TW:
  zh-CN: |-
    此卡名的①②③效果1回合仅可各使用1次。①：在自己・对手回合中，从自己场上（表侧表示）・墓地将1只炎属性怪兽除外可以发动。从手牌将此卡特殊召唤。②：此卡特殊召唤的情况下，以场上表侧表示的1张卡为对象可以发动。将该卡的效果直至回合结束时为止无效。③：此卡作为连接素材被送至墓地的情况下可以发动。从墓地将1张在此回合中被送至自己墓地的速攻魔法・通常陷阱卡放置在自己场上。
