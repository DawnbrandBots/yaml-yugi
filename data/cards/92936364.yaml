  ja: |-
    このカード名のカードは１ターンに１枚しか発動できない。このカードはＥＸデッキの「レッド・デーモンズ・ドラゴン」１体を相手に見せ、セットしたターンに発動する事もできる。①：手札のモンスターを任意の数だけ相手に見せ、その内のチューナーの数＋１体だけ相手フィールドの効果モンスターを対象としてこのカードを発動できる。このカードが魔法＆罠ゾーンに存在する限り、対象のモンスターの攻撃力は手札から見せた数×１００ダウンし、効果は無効化される。対象のモンスターがフィールドに存在しない場合にこのカードは破壊される。
