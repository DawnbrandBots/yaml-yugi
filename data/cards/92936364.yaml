text:
  en: |-
    You can activate this card the turn it was Set, by revealing 1 "Red Dragon Archfiend" in your Extra Deck. Activate this card by revealing any number of monsters in your hand, then target Effect Monsters your opponent controls equal to the number of Tuners revealed +1; they lose 100 ATK for each card you revealed in the hand to activate this card, also their effects are negated. If the last of those monsters is not on the field, destroy this card. You can only activate 1 "Red Dragon Archfiend's Chain" per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名のカードは１ターンに１枚しか発動できない。このカードはＥＸデッキの「レッド・デーモンズ・ドラゴン」１体を相手に見せ、セットしたターンに発動する事もできる。①：手札のモンスターを任意の数だけ相手に見せ、その内のチューナーの数＋１体だけ相手フィールドの効果モンスターを対象としてこのカードを発動できる。このカードが魔法＆罠ゾーンに存在する限り、対象のモンスターの攻撃力は手札から見せた数×１００ダウンし、効果は無効化される。対象のモンスターがフィールドに存在しない場合にこのカードは破壊される。
  ko: |-
    이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다. 이 카드는 엑스트라 덱의 "레드 데몬즈 드래곤" 1장을 상대에게 보여주고, 세트한 턴에 발동할 수도 있다. ①: 패의 몬스터를 임의의 수만큼 상대에게 보여주고, 그 중의 튜너의 수 ＋ 1장만 상대 필드의 효과 몬스터를 대상으로 하여 이 카드를 발동할 수 있다. 이 카드가 마법 & 함정 존에 존재하는 한, 대상 몬스터의 공격력은 패에서 보여준 수 × 100 내리고, 효과는 무효화된다. 대상 몬스터가 필드에 존재하지 않을 경우에 이 카드는 파괴된다.
  zh-TW:
  zh-CN: |-
    此卡名的卡1回合仅可发动1张。此卡也可通过向对手出示额外牌组的1只“暗红恶魔龙”，来在放置的回合发动。①：向对手出示手牌任意数量的怪兽，依其中协调的数量＋1只，以对手场上的效果怪兽为对象可以发动此卡。只要此卡存在于魔法与陷阱区域，对象怪兽的攻击力下降从手牌出示的数量×100的数值，效果无效化。对象怪兽不存在场上的情况下，此卡将被破坏。
