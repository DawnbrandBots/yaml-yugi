pendulum_effect:
  en: |-
    You can target 1 "Archfiend" Spell/Trap in your GY or banishment; destroy this card, and if you do, add that target to your hand. You can only use this effect of "Archfiend Matriarch" once per turn.
  de: |-
    Du kannst 1 „Erzunterweltler“-Zauber/Falle in deinem Friedhof oder von deinen verbannten Karten wählen; zerstöre diese Karte und falls du dies tust, füge jenes gewählte Ziel deiner Hand hinzu. Du kannst diesen Effekt von „Matriarchin der Erzunterweltler“ nur einmal pro Spielzug verwenden.
  es: |-
    Puedes seleccionar 1 Mágica/Trampa "Archidemonio" en tu Cementerio o destierro; destruye esta carta y, si lo haces, añade ese objetivo a tu mano. Sólo puedes usar este efecto de "Matriarca Archidemonio" una vez por turno.
  fr: |-
    Vous pouvez cibler 1 Magie/Piège "Archdémon" dans votre Cimetière ou bannissement ; détruisez cette carte, et si vous le faites, ajoutez la cible à votre main. Vous ne pouvez utiliser cet effet de "Matriarche Archdémon" qu'une fois par tour.
  it: |-
    Puoi scegliere come bersaglio 1 Magia/Trappola "Arcidemone" nel tuo Cimitero o carte bandite; distruggi questa carta e, se lo fai, aggiungi quel bersaglio alla tua mano. Puoi utilizzare questo effetto di "Matriarca Arcidemone" una sola volta per turno.
  pt: |-
    Você pode escolher 1 Magia/Armadilha "Arquidemônio" no seu Cemitério ou banimento; destrua este card e, se isso acontecer, adicione o alvo à sua mão. Você só pode usar este efeito de "Matriarca Arquidemônio" uma vez por turno.
  ja: |-
    このカード名のＰ効果は１ターンに１度しか使用できない。①：自分の墓地・除外状態の「デーモン」魔法・罠カード１枚を対象として発動できる。このカードを破壊し、対象のカードを手札に加える。
  ko: |-
    이 카드명의 펜듈럼 효과는 1턴에 1번밖에 사용할 수 없다. ①: 자신의 묘지 / 제외 상태인 "데몬" 마법 / 함정 카드 1장을 대상으로 하고 발동할 수 있다. 이 카드를 파괴하고, 대상의 카드를 패에 넣는다.
  zh-TW:
  zh-CN: |-
    此卡名的灵摆效果1回合仅可使用1次。①：以自己墓地・除外状态的1张“恶魔”魔法・陷阱卡为对象可以发动。将此卡破坏，将对象卡加入手牌。
