name:
  en: Archfiend Matriarch
  de: Matriarchin der Erzunterweltler
  es: Matriarca Archidemonio
  fr: Matriarche Archdémon
  it: Matriarca Arcidemone
  pt: Matriarca Arquidemônio
  ja: デス・レジーナ・デーモン
  ja_romaji: Desu Rejīna Dēmon
  ko: 데스 레지나 데몬
  ko_rr:
  zh-TW:
  zh-CN: 死亡女后恶魔
text:
  en: |-
    You can Ritual Summon this card with "Throne of the Archfiends". Must be Ritual Summoned. Unaffected by other monsters' effects while in the Extra Monster Zone. If this card is Ritual Summoned: You can destroy as many Spells/Traps your opponent controls as possible, then if this card is in the Extra Monster Zone, you can banish all Spells/Traps from your opponent's GY. You can only use this effect of "Archfiend Matriarch" once per turn.
  de: |-
    Du kannst diese Karte mit „Thron der Erzunterweltler“ als Ritualbeschwörung beschwören. Muss als Ritualbeschwörung beschworen werden. Diese Karte bleibt von den Effekten anderer Monster unberührt, solange sie in der Extra-Monsterzone liegt. Falls diese Karte als Ritualbeschwörung beschworen wird: Du kannst so viele Zauber/Fallen, die dein Gegner kontrolliert, zerstören wie möglich, dann, falls diese Karte in der Extra-Monsterzone liegt, kannst du alle Zauber/Fallen vom Friedhof deines Gegners verbannen. Du kannst diesen Effekt von „Matriarchin der Erzunterweltler“ nur einmal pro Spielzug verwenden.
  es: |-
    Puedes Invocar esta carta por Ritual con "Trono de los Archidemonios". Debe ser Invocada por Ritual. No es afectada por los efectos de otros monstruos mientras esté en la Zona de Monstruos Extra. Si esta carta es Invocada por Ritual: puedes destruir tantas Mágicas/Trampas que controle tu adversario como sea posible y después, si esta carta está en la Zona de Monstruos Extra, puedes desterrar todas las Mágicas/Trampas en el Cementerio de tu adversario. Sólo puedes usar este efecto de "Matriarca Archidemonio" una vez por turno.
  fr: |-
    Vous pouvez Invoquer Rituellement cette carte avec "Trône des Archdémons". Uniquement Invocable Rituellement. Non affectée par les effets d'autres monstres tant qu'elle est dans la Zone Monstre Extra. Si cette carte est Invoquée Rituellement : vous pouvez détruire autant de Magies/Pièges contrôlés par votre adversaire que possible, puis si cette carte est dans la Zone Monstre Extra, vous pouvez bannir tous les Magies/Pièges depuis le Cimetière de votre adversaire. Vous ne pouvez utiliser cet effet de "Matriarche Archdémon" qu'une fois par tour.
  it: |-
    Puoi Evocare tramite Rituale questa carta con "Trono degli Arcidemoni". Deve essere Evocato tramite Rituale. È immune agli effetti degli altri mostri mentre è nella Zona Mostri Extra. Se questa carta viene Evocata tramite Rituale: puoi distruggere tante Magie/Trappole controllate dal tuo avversario quante possibile, poi se questa carta è nella Zona Mostri Extra, puoi bandire tutte le Magie/Trappole dal Cimitero del tuo avversario. Puoi utilizzare questo effetto di "Matriarca Arcidemone" una sola volta per turno.
  pt: |-
    Você pode Invocar este card por Invocação-Ritual com "Trono dos Arquidemônios". Deve ser Invocado por Invocação-Ritual. Não é afetado por outros efeitos de monstro enquanto estiver na Zona de Monstros Adicional. Se este card for Invocado por Invocação-Ritual: você pode destruir tantas Magias/Armadilhas que seu oponente controla quanto possível e, depois, se este card estiver na Zona de Monstros Adicional, você pode banir todas as Magias/Armadilhas do Cemitério do seu oponente. Você só pode usar este efeito de "Matriarca Arquidemônio" uma vez por turno.
  ja: |-
    「スローン・オブ・デーモンズ」により降臨
    このカードは儀式召喚でしか特殊召喚できない。このカード名の①のモンスター効果は１ターンに１度しか使用できない。①：このカードが儀式召喚した場合に発動できる。相手フィールドの魔法・罠カードを全て破壊する。このカードがＥＸモンスターゾーンに存在する場合、さらに相手の墓地の魔法・罠カードを全て除外できる。②：ＥＸモンスターゾーンのこのカードは他のモンスターの効果を受けない。
  ko: |-
    "쓰론 오브 데몬즈"에 의해 의식 소환
    이 카드는 의식 소환으로밖에 특수 소환할 수 없다. 이 카드명의 ①의 몬스터 효과는 1턴에 1번밖에 사용할 수 없다. ①: 이 카드를 의식 소환했을 경우에 발동할 수 있다. 상대 필드의 마법 / 함정 카드를 전부 파괴한다. 이 카드가 엑스트라 몬스터 존에 존재할 경우, 추가로 상대 묘지의 마법 / 함정 카드를 전부 제외할 수 있다. ②: 엑스트라 몬스터 존의 이 카드는 다른 몬스터의 효과를 받지 않는다.
  zh-TW:
  zh-CN: |-
    以“恶魔王座”降临
    此卡仅可通过仪式召唤方式特殊召唤。此卡名的①怪兽效果1回合仅可使用1次。①：此卡仪式召唤的情况下可以发动。将对手场上的魔法・陷阱卡全部破坏。此卡存在于额外怪兽区域的情况下，进而可将对手墓地的魔法・陷阱卡全部除外。②：额外怪兽区域的此卡不受其他怪兽的效果影响。
