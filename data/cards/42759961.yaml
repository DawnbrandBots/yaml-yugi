text:
  en: |-
    You can Ritual Summon this card with a "Clown Clan" card. You can reveal this card in your hand; add 1 "Clown Clan" card from your Deck to your hand, except a Ritual Monster, then discard 1 card. You can only use this effect of "Clown Clan Flair" once per turn. If this card is Tributed: You can activate 1 of these effects (but you can only use each of these effects of "Clown Clan Flair" once per turn);
    ● Shuffle all Ritual Monsters on the field and in the GYs into the Deck.
    ● Change 1 Effect Monster on the field to face-down Defense Position.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    「道化の一座」カードにより降臨
    このカード名の①の効果は１ターンに１度しか使用できない。①：手札のこのカードを相手に見せて発動できる。デッキから儀式モンスター以外の「道化の一座」カード１枚を手札に加える。その後、自分の手札を１枚選んで捨てる。②：このカードがリリースされた場合、以下の効果から１つを選択して発動できる（このカード名の以下の効果はそれぞれ１ターンに１度しか選択できない）。●お互いのフィールド・墓地の儀式モンスターを全てデッキに戻す。●フィールドの効果モンスター１体を裏側守備表示にする。
  ko: |-
    "크라운 클랜" 카드에 의해 의식 소환
    이 카드명의 ①의 효과는 1턴에 1번밖에 사용할 수 없다. ①: 패의 이 카드를 상대에게 보여주고 발동할 수 있다. 덱에서 의식 몬스터 이외의 "크라운 클랜" 카드 1장을 패에 넣는다. 그 후, 자신의 패를 1장 고르고 버린다. ②: 이 카드가 릴리스되었을 경우, 이하의 효과에서 1개를 선택하고 발동할 수 있다(이 카드명의 이하의 효과는 각각 1턴에 1번밖에 선택할 수 없다). ●서로의 필드 / 묘지의 의식 몬스터를 전부 덱으로 되돌린다. ●필드의 효과 몬스터 1장을 뒷면 수비 표시로 한다.
  zh-TW:
  zh-CN: |-
    以“小丑戏帮”卡降临
    此卡名的①效果1回合仅可使用1次。①：向对手出示手牌的此卡可以发动。从牌组将仪式怪兽以外的1张“小丑戏帮”卡加入手牌。然后，挑选自己的1张手牌舍弃。②：此卡被解放的情况下，可从以下效果中选择1个发动（此卡名的以下效果1回合仅可各选择1次）。●将双方场上・墓地的仪式怪兽全部放回牌组。●将场上的1只效果怪兽改成里侧守备表示。
