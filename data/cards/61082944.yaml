  ja: |-
    このカード名はルール上「憑依」カードとしても扱う。このカード名の①②の効果は１ターンに１度、いずれか１つしか使用できない。①：自分の墓地の魔法使い族モンスター及び魔法カードの中から任意の数だけ除外して発動できる。自分フィールドの全てのモンスターの攻撃力は除外した数×２００アップし、自分は除外した数×４００ＬＰ回復する。②：自分メインフェイズに墓地のこのカードを除外して発動できる。手札から魔法使い族モンスターを任意の数だけ特殊召喚する（同じ属性は１体まで）。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名在规则上也视为“凭依”卡。此卡名的①②效果1回合1次，仅可使用其中1个。①：将自己墓地任意数量的魔法师族怪兽及魔法卡除外可以发动。自己场上的所有怪兽的攻击力上升所除外数量×200的数值，自己恢复所除外数量×400LP。②：在自己的主要阶段，将墓地的此卡除外可以发动。从手牌将任意数量的魔法师族怪兽特殊召唤（相同属性最多1只）。
