name:
  en: Masked HERO Fountain
  de: Maskierter HELD Fountain
  es: HÉROE Enmascarado Fountain
  fr: Fountain, HÉROS Masqué
  it: Fountain EROE Mascherato
  pt: Fountain, o HERÓI Mascarado
  ja: <ruby>Ｍ・ＨＥＲＯ<rt>マスクドヒーロー</rt></ruby> ファウンティン
  ja_romaji: Masukudo Hīrō Fauntin
  ko: 마스크드 히어로 파운틴
  ko_rr:
  zh-TW: 假面－英雄 噴泉
  zh-CN: 假面－英雄 喷泉
text:
  en: |-
    You can reveal this card in your hand; Special Summon 1 "HERO" monster from your hand in Defense Position. If this card is sent to the GY by card effect, or to activate a card effect: You can Set 1 "Mask Change" from your Deck or GY. You can only use each effect of "Masked HERO Fountain" once per turn.
  de: |-
    Du kannst diese Karte in deiner Hand vorzeigen; beschwöre 1 „HELD“-Monster als Spezialbeschwörung von deiner Hand in die Verteidigungsposition. Falls diese Karte durch einen Karteneffekt oder um einen Karteneffekt zu aktivieren auf den Friedhof gelegt wird: Du kannst 1 „Maskenwechsel“ von deinem Deck oder Friedhof setzen. Du kannst jeden Effekt von „Maskierter HELD Fountain“ nur einmal pro Spielzug verwenden.
  es: |-
    Puedes mostrar esta carta en tu mano; Invoca de Modo Especial 1 monstruo "HÉROE" desde tu mano en Posición de Defensa. Si esta carta es mandada al Cementerio por el efecto de una carta, o para activar un efecto de carta: puedes Colocar 1 "Cambio de Máscara" desde tu Deck o Cementerio. Sólo puedes usar cada efecto de "HÉROE Enmascarado Fountain" una vez por turno.
  fr: |-
    Vous pouvez révéler cette carte dans votre main ; Invoquez Spécialement 1 monstre "HÉROS" depuis votre main en Position de Défense. Si cette carte est envoyée au Cimetière par un effet de carte ou pour activer un effet de carte : vous pouvez Poser 1 "Changement de Masque" depuis votre Deck ou Cimetière. Vous ne pouvez utiliser chaque effet de "Fountain, HÉROS Masqué" qu'une fois par tour.
  it: |-
    Puoi rivelare questa carta nella tua mano; Evoca Specialmente 1 mostro "EROE" dalla tua mano in Posizione di Difesa. Se questa carta viene mandata al Cimitero dall'effetto di una carta, o per attivare l'effetto di una carta: puoi Posizionare 1 "Cambio di Maschera" dal tuo Deck o Cimitero. Puoi utilizzare ogni effetto di "Fountain EROE Mascherato" una sola volta per turno.
  pt: |-
    Você pode revelar este card na sua mão; Invoque por Invocação-Especial 1 monstro "HERÓI" da sua mão em Posição de Defesa. Se este card for enviado para o Cemitério por um efeito de card, ou para ativar um efeito de card: você pode Baixar 1 "Mudar a Máscara" do seu Deck ou Cemitério. Você só pode usar cada efeito de "Fountain, o HERÓI Mascarado" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：手札のこのカードを相手に見せて発動できる。手札から「ＨＥＲＯ」モンスター１体を守備表示で特殊召喚する。②：このカードがカードの効果を発動するために墓地へ送られた場合、または効果で墓地へ送られた場合に発動できる。自分のデッキ・墓地から「マスク・チェンジ」１枚を自分フィールドにセットする。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 패의 이 카드를 상대에게 보여주고 발동할 수 있다. 패에서 "히어로" 몬스터 1장을 수비 표시로 특수 소환한다. ②: 이 카드가 카드의 효과를 발동하기 위해 묘지로 보내졌을 경우, 또는 효과로 묘지로 보내졌을 경우에 발동할 수 있다. 자신의 덱 / 묘지에서 "마스크 체인지" 1장을 자신 필드에 세트한다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：向对手出示手牌的此卡可以发动。从手牌将1只“－英雄”怪兽以守备表示特殊召唤。②：此卡为发动卡的效果被送至墓地的情况下，或因效果被送至墓地的情况下可以发动。从自己牌组・墓地将1张“假面变换”放置在自己场上。
