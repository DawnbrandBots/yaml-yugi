name:
  en: Elfnote Regina
  de: Elfnote Regina
  es: Elfnota Regina
  fr: Regina des Notes Elfiques
  it: Elfnote Regina
  pt: Regina de Elfnota
  ja: <ruby>耀聖の風詩<rt>エルフェンノーツ</rt></ruby>レギナ
  ja_romaji: Erufennōtsu Regina
  ko: 엘펜노츠 레기나
  ko_rr:
  zh-TW: 耀聖之風詩 蕾綺娜
  zh-CN: 耀圣之风诗 蕾绮娜
text:
  en: |-
    If this card is in your hand (Quick Effect): You can send 1 other "Elfnote" card from your hand or face-up field to the GY; Special Summon this card. If this card is Normal or Special Summoned to the center Main Monster Zone: You can Special Summon 1 "Elfnote" monster from your Deck, except "Elfnote Regina". If this card is sent to the GY as Synchro Material: You can add this card to your hand. You can only use each effect of "Elfnote Regina" once per turn.
  de: |-
    Falls sich diese Karte in deiner Hand befindet (Schnelleffekt): Du kannst 1 andere „Elfnote“-Karte von deiner Hand oder offen von deiner Spielfeldseite auf den Friedhof legen; beschwöre diese Karte als Spezialbeschwörung. Falls diese Karte als Normal- oder Spezialbeschwörung in die mittlere Main-Monsterzone beschworen wird: Du kannst 1 „Elfnote“-Monster als Spezialbeschwörung von deinem Deck beschwören, außer „Elfnote Regina“. Falls diese Karte als Synchromaterial auf den Friedhof gelegt wird: Du kannst diese Karte deiner Hand hinzufügen. Du kannst jeden Effekt von „Elfnote Regina“ nur einmal pro Spielzug verwenden.
  es: |-
    Si esta carta está en tu mano (Efecto Rápido): puedes mandar al Cementerio otra carta "Elfnota" en tu mano o Campo boca arriba; Invoca esta carta de Modo Especial. Si esta carta es Invocada de Modo Normal o Especial a la Zona de Monstruos Principal central: puedes Invocar de Modo Especial 1 monstruo "Elfnota" desde tu Deck, excepto "Elfnota Regina". Si esta carta es mandada al Cementerio como Material de Sincronía: puedes añadir esta carta a tu mano. Sólo puedes usar cada efecto de "Elfnota Regina" una vez por turno.
  fr: |-
    Si cette carte est dans votre main (Effet Rapide) : vous pouvez envoyer 1 autre carte "Notes Elfiques" depuis votre main ou Terrain face recto au Cimetière ; Invoquez Spécialement cette carte. Si cette carte est Invoquée Normalement ou Spécialement dans la Zone Monstre Main centrale : vous pouvez Invoquer Spécialement 1 monstre "Notes Elfiques" ("Regina des Notes Elfiques" exclu) depuis votre Deck. Si cette carte est envoyée au Cimetière comme Matériel Synchro : vous pouvez ajouter cette carte à votre main. Vous ne pouvez utiliser chaque effet de "Regina des Notes Elfiques" qu'une fois par tour.
  it: |-
    Se questa carta è nella tua mano (Effetto Rapido): puoi mandare 1 altra carta "Elfnote" dalla tua mano o Terreno scoperto al Cimitero; Evoca Specialmente questa carta. Se questa carta viene Evocata Normalmente o Specialmente nella Zona Mostri Main centrale: puoi Evocare Specialmente 1 mostro "Elfnote" dal tuo Deck, eccetto "Elfnote Regina". Se questa carta viene mandata al Cimitero come Materiale Synchro: puoi aggiungere questa carta alla tua mano. Puoi utilizzare ogni effetto di "Elfnote Regina" una sola volta per turno.
  pt: |-
    Se este card estiver na sua mão (Efeito Rápido): você pode enviar 1 outro card "Elfnota" da sua mão ou do campo com a face para cima para o Cemitério; Invoque este card por Invocação-Especial. Se este card for Invocado por Invocação-Normal ou Especial na Zona de Monstros Principal central: você pode Invocar por Invocação-Especial 1 monstro "Elfnota" do seu Deck, exceto "Regina de Elfnota". Se este card for enviado para o Cemitério como Matéria Sincro: você pode adicionar este card à sua mão. Você só pode usar cada efeito de "Regina de Elfnota" uma vez por turno.
  ja: |-
    このカード名の①②③の効果はそれぞれ１ターンに１度しか使用できない。①：自分・相手ターンに、自分の手札・フィールド（表側表示）からこのカード以外の「エルフェンノーツ」カード１枚を墓地へ送って発動できる。このカードを手札から特殊召喚する。②：このカードが中央のメインモンスターゾーンに召喚・特殊召喚した場合に発動できる。デッキから「耀聖の風詩レギナ」以外の「エルフェンノーツ」モンスター１体を特殊召喚する。③：このカードがＳ素材として墓地へ送られた場合に発動できる。このカードを手札に加える。
  ko: |-
    이 카드명의 ①②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신 / 상대 턴에, 자신의 패 / 필드(앞면 표시)에서 이 카드 이외의 "엘펜노츠" 카드 1장을 묘지로 보내고 발동할 수 있다. 이 카드를 패에서 특수 소환한다. ②: 이 카드를 중앙 메인 몬스터 존에 일반 소환 / 특수 소환했을 경우에 발동할 수 있다. 덱에서 "엘펜노츠 레기나" 이외의 "엘펜노츠" 몬스터 1장을 특수 소환한다. ③: 이 카드가 싱크로 소재로서 묘지로 보내졌을 경우에 발동할 수 있다. 이 카드를 패에 넣는다.
  zh-TW:
  zh-CN: |-
    此卡名的①②③效果1回合仅可各使用1次。①：在自己・对手回合中，从自己手牌・场上（表侧表示）将此卡以外的1张“耀圣”卡送至墓地可以发动。从手牌将此卡特殊召唤。②：此卡召唤・特殊召唤至中央的主要怪兽区域的情况下可以发动。从牌组将“耀圣之风诗 蕾绮娜”以外的1只“耀圣”怪兽特殊召唤。③：此卡作为同步素材被送至墓地的情况下可以发动。将此卡加入手牌。
