text:
  en: |-
    (Quick Effect): You can send 1 other "Elfnote" card from your hand or face-up field to the GY; Special Summon this card from your hand. If this card is Normal or Special Summoned to the center Main Monster Zone: You can Special Summon 1 "Elfnote" monster from your Deck, except "Elfnote Regina". If this card is sent to the GY as Synchro Material: You can add this card to your hand. You can only use each effect of "Elfnote Regina" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②③の効果はそれぞれ１ターンに１度しか使用できない。①：自分・相手ターンに、自分の手札・フィールド（表側表示）からこのカード以外の「エルフェンノーツ」カード１枚を墓地へ送って発動できる。このカードを手札から特殊召喚する。②：このカードが中央のメインモンスターゾーンに召喚・特殊召喚した場合に発動できる。デッキから「耀聖の風詩レギナ」以外の「エルフェンノーツ」モンスター１体を特殊召喚する。③：このカードがＳ素材として墓地へ送られた場合に発動できる。このカードを手札に加える。
  ko: |-
    이 카드명의 ①②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신 / 상대 턴에, 자신의 패 / 필드(앞면 표시)에서 이 카드 이외의 "엘펜노츠" 카드 1장을 묘지로 보내고 발동할 수 있다. 이 카드를 패에서 특수 소환한다. ②: 이 카드를 중앙 메인 몬스터 존에 일반 소환 / 특수 소환했을 경우에 발동할 수 있다. 덱에서 "엘펜노츠 레기나" 이외의 "엘펜노츠" 몬스터 1장을 특수 소환한다. ③: 이 카드가 싱크로 소재로서 묘지로 보내졌을 경우에 발동할 수 있다. 이 카드를 패에 넣는다.
  zh-TW:
  zh-CN: |-
    此卡名的①②③效果1回合仅可各使用1次。①：在自己・对手回合中，从自己手牌・场上（表侧表示）将此卡以外的1张“耀圣”卡送至墓地可以发动。从手牌将此卡特殊召唤。②：此卡召唤・特殊召唤至中央的主要怪兽区域的情况下可以发动。从牌组将“耀圣之风诗 蕾绮娜”以外的1只“耀圣”怪兽特殊召唤。③：此卡作为同步素材被送至墓地的情况下可以发动。将此卡加入手牌。
