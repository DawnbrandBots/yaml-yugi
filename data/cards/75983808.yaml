text:
  en: |-
    When your opponent activates a card or effect that targets another card(s) you control: Return 1 of those cards you control to the hand (if face-down, reveal it), and if you do, destroy 1 card on the field, then you can Special Summon 1 monster that mentions "Light and Darkness Ritual" from your hand, with a different name than the returned card, ignoring its Summoning conditions. If this card in its owner's possession is destroyed by an opponent's card: You can Special Summon 1 Ritual Monster that mentions "Light and Darkness Ritual" from your hand or Deck.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    ①：自分フィールドの他のカードを対象とする効果を相手が発動した時に発動できる。その自分のカードの内１枚を手札に戻し（裏側表示カードはめくって確認する）、フィールドのカード１枚を破壊する。その後、手札に戻したカードとはカード名が異なる、「光と闇の儀式」のカード名が記されたモンスター１体を手札から召喚条件を無視して特殊召喚できる。②：このカードが相手によって破壊された場合に発動できる。手札・デッキから「光と闇の儀式」のカード名が記された儀式モンスター１体を特殊召喚する。
  ko:
  zh-TW:
  zh-CN: |-
    ①：对手发动以自己场上的其他卡为对象的效果时可以发动。将该自己的卡中的1张放回手牌（里侧表示卡则翻开确认），将场上的1张卡破坏。然后，可从手牌将1只卡名与所放回手牌的卡不同的、记载有“光与暗的仪式”卡名的怪兽无视召唤条件特殊召唤。②：此卡被对手破坏的情况下可以发动。从手牌・牌组将1只记载有“光与暗的仪式”卡名的仪式怪兽特殊召唤。
