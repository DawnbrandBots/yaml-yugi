name:
  en: Chaos Mystic Box
  de: Mystische Chaosbox
  es: Caja Mística del Caos
  fr: Boîte Mystique du Chaos
  it: Scatola Magica del Chaos
  pt: Caixa Mágica do Caos
  ja: <ruby>混<rt>こん</rt></ruby><ruby>沌<rt>とん</rt></ruby>のマジック・ボックス
  ja_romaji: Konton no Majikku Bokkusu
  ko: 혼돈의 매직 박스
  ko_rr:
  zh-TW:
  zh-CN: 混沌魔术箱
text:
  en: |-
    When your opponent activates a card or effect that targets another card(s) you control: Return 1 of your targeted cards to the hand (if face-down, reveal it), and if you do, destroy 1 card on the field, then you can Special Summon 1 monster from your hand that mentions "Light and Darkness Ritual" with a different name than the card returned to the hand, ignoring its Summoning conditions. If this card in its owner's possession is destroyed by an opponent's card: You can Special Summon 1 Ritual Monster that mentions "Light and Darkness Ritual" from your hand or Deck.
  de: |-
    Wenn dein Gegner eine Karte oder einen Effekt aktiviert, die oder der eine oder mehr andere Karten, die du kontrollierst, als Ziel wählt: Gib 1 deiner als Ziel gewählten Karten auf die Hand zurück (falls verdeckt, zeige sie vor) und falls du dies tust, zerstöre 1 Karte auf dem Spielfeld, dann kannst du 1 Monster, das „Ritual von Licht und Finsternis“ erwähnt und einen unterschiedlichen Namen als die auf die Hand zurückgegebene Karte hat, als Spezialbeschwörung von deiner Hand beschwören, ungeachtet seiner Beschwörungsbedingungen. Falls diese Karte, die ihrem Besitzer gehört, durch eine Karte eines Gegners zerstört wird: Du kannst 1 Ritualmonster, das „Ritual von Licht und Finsternis“ erwähnt, als Spezialbeschwörung von deiner Hand oder deinem Deck beschwören.
  es: |-
    Cuando tu adversario activa una carta o efecto que selecciona otra u otras cartas que controlas: devuelve a la mano 1 de tus cartas seleccionadas (si está boca abajo, muéstrala) y, si lo haces, destruye 1 carta en el Campo, y después puedes Invocar de Modo Especial, desde tu mano, 1 monstruo que mencione "Ritual de la Luz y la Oscuridad" con un nombre diferente al de la carta devuelta a la mano, ignorando sus condiciones de Invocación. Si esta carta en posesión de su dueño es destruida por una carta del adversario: puedes Invocar de Modo Especial, desde tu mano o Deck, 1 Monstruo de Ritual que mencione "Ritual de la Luz y la Oscuridad".
  fr: |-
    Lorsque votre adversaire active une carte ou un effet qui cible une ou plusieurs autres cartes que vous contrôlez : renvoyez 1 de vos cartes ciblées à la main (si elle est face verso, révélez-la), et si vous le faites, détruisez 1 carte sur le Terrain, puis vous pouvez Invoquer Spécialement 1 monstre depuis votre main qui mentionne "Rituel de la Lumière et des Ténèbres" de nom différent de la carte renvoyée à la main, en ignorant ses conditions d'Invocation. Si cette carte en possession de son propriétaire est détruite par une carte de l'adversaire : vous pouvez Invoquer Spécialement 1 Monstre Rituel qui mentionne "Rituel de la Lumière et des Ténèbres" depuis votre main ou Deck.
  it: |-
    Quando il tuo avversario attiva una carta o un effetto che sceglie come bersaglio una o più altre carte che controlli: fai ritornare 1 delle tue carte scelte come bersaglio nella mano (se coperta, rivelala) e, se lo fai, distruggi 1 carta sul Terreno, poi puoi Evocare Specialmente dalla tua mano 1 mostro che menziona "Rituale di Luce e Oscurità" con un nome diverso dalla carta fatta ritornare nella mano, ignorando le sue condizioni di Evocazione. Se questa carta sotto il comando del suo proprietario viene distrutta da una carta dell'avversario: puoi Evocare Specialmente 1 Mostro Rituale che menziona "Rituale di Luce e Oscurità" dalla tua mano o Deck.
  pt: |-
    Quando seu oponente ativar um card ou efeito que escolha como alvo um ou mais outros cards que você controla: devolva 1 dos seus cards alvo para a mão (se estiver com a face para baixo, revele-o) e, se isso acontecer, destrua 1 card no campo e, depois, você pode Invocar por Invocação-Especial 1 monstro da sua mão que mencione "Ritual da Luz e das Trevas" com um nome diferente que o do card devolvido para a mão, ignorando suas condições de Invocação. Se este card em posse do seu dono for destruído por um card do oponente: você pode Invocar por Invocação-Especial 1 Monstro de Ritual que mencione "Ritual da Luz e das Trevas" da sua mão ou do Deck.
  ja: |-
    ①：自分フィールドの他のカードを対象とする効果を相手が発動した時に発動できる。その自分のカードの内１枚を手札に戻し（裏側表示カードはめくって確認する）、フィールドのカード１枚を破壊する。その後、手札に戻したカードとはカード名が異なる、「光と闇の儀式」のカード名が記されたモンスター１体を手札から召喚条件を無視して特殊召喚できる。②：このカードが相手によって破壊された場合に発動できる。手札・デッキから「光と闇の儀式」のカード名が記された儀式モンスター１体を特殊召喚する。
  ko: |-
    ①: 자신 필드의 다른 카드를 대상으로 하는 효과를 상대가 발동했을 때에 발동할 수 있다. 그 자신의 카드 중 1장을 패로 되돌리고(뒷면 표시 카드는 넘겨서 확인한다), 필드의 카드 1장을 파괴한다. 그 후, 패로 되돌린 카드와는 카드명이 다른, "빛과 어둠의 의식"의 카드명이 쓰여진 몬스터 1장을 패에서 소환 조건을 무시하고 특수 소환할 수 있다. ②: 이 카드가 상대에 의해 파괴되었을 경우에 발동할 수 있다. 패 / 덱에서 "빛과 어둠의 의식"의 카드명이 쓰여진 의식 몬스터 1장을 특수 소환한다.
  zh-TW:
  zh-CN: |-
    ①：对手发动以自己场上的其他卡为对象的效果时可以发动。将该自己的卡中的1张放回手牌（里侧表示卡则翻开确认），将场上的1张卡破坏。然后，可从手牌将1只卡名与所放回手牌的卡不同的、记载有“光与暗的仪式”卡名的怪兽无视召唤条件特殊召唤。②：此卡被对手破坏的情况下可以发动。从手牌・牌组将1只记载有“光与暗的仪式”卡名的仪式怪兽特殊召唤。
