text:
  en: |-
    While you have a "Toon" card in your field or GY, your opponent must keep their hand revealed, also you can look at their Set cards at any time. If you have a Toon monster and a "Toon" Spell in your field and/or GY: You can declare 1 card name that is not among the cards/effects activated in this Chain; negate the activated effects of cards with that original name until the end of this turn, while this card is face-up on the field. You can only use this effect of "Mind Scan" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の②の効果は１ターンに１度しか使用できない。①：自分のフィールドか墓地に「トゥーン」カードが存在する限り、相手は手札を全て公開し続け、自分は相手フィールドの裏側表示カードをいつでも確認できる。②：自分のフィールド・墓地にトゥーンモンスター及び「トゥーン」魔法カードが存在する場合、同一チェーン上で効果を発動していないカード名を１つ宣言して発動できる。このカードが表側表示で存在する間、ターン終了時まで宣言したカードと元々のカード名が同じカードが発動した効果は無効化される。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的②效果1回合仅可使用1次。①：只要自己场上或墓地存在“卡通”卡，对手持续公开所有手牌，自己可随时确认对手场上的里侧表示卡。②：自己场上・墓地存在卡通怪兽及“卡通”魔法卡的情况下，宣言1个未在同一连锁上发动效果的卡名可以发动。在此卡以表侧表示存在的期间内，直至回合结束时为止，所宣言的卡及原本卡名相同的卡所发动的效果无效化。
