text:
  en: |-
    2 Level 4 monsters
    When a Level 5 or higher monster(s) would be Special Summoned (Quick Effect): You can detach 1 material from this card; negate the Special Summon, and if you do, destroy it.
  de: |-
    2 Monster der Stufe 4
    Wenn ein oder mehr Monster der Stufe 5 oder höher als Spezialbeschwörung beschworen würden (Schnelleffekt): Du kannst 1 Material von dieser Karte abhängen; annulliere die Spezialbeschwörung und falls du dies tust, zerstöre sie.
  es: |-
    2 monstruos de Nivel 4
    Cuando uno o más monstruos de Nivel 5 o mayor fueran a ser Invocados de Modo Especial (Efecto Rápido): puedes desacoplar 1 material de esta carta; niega la Invocación Especial y, si lo haces, destrúyela.
  fr: |-
    2 monstres de Niveau 4
    Lorsqu'un ou plusieurs monstres de min. Niveau 5 vont être Invoqués Spécialement (Effet Rapide) : vous pouvez détacher 1 Matériel de cette carte ; annulez l'Invocation Spéciale, et si vous le faites, détruisez-les.
  it: |-
    2 mostri di Livello 4
    Quando uno o più mostri di Livello 5 o superiore stanno per essere Evocati Specialmente (Effetto Rapido): puoi staccare 1 materiale da questa carta; annulla l'Evocazione Speciale e, se lo fai, distruggili.
  pt: |-
    2 monstros de Nível 4
    Quando um ou mais monstros de Nível 5 ou mais seriam Invocados por Invocação-Especial (Efeito Rápido): você pode desassociar 1 matéria deste card; negue a Invocação-Especial e, se isso acontecer, destrua-o.
  ja: |-
    レベル４モンスター×２
    このカードのエクシーズ素材を１つ取り除く事で、レベル５以上のモンスターの特殊召喚を無効にし破壊する。
  ko: |-
    레벨 4 몬스터 × 2
    이 카드의 엑시즈 소재를 1개 제거하는 것으로, 레벨 5 이상의 몬스터의 특수 소환을 무효로 하고 파괴한다.
  zh-TW:
  zh-CN: |-
    等级4怪兽×2
    ①：自己或对手特殊召唤等级5以上的怪兽之际，去除此卡的1个超量素材可以发动。将该特殊召唤无效，将该怪兽破坏。
