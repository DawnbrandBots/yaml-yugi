name:
  en: Gagaga Illusion
  de: Gagaga-Illusion
  es: Ilusión Gagaga
  fr: Illusion Gagaga
  it: Illusione Gagaga
  pt: Ilusão Gagaga
  ja: ガガガイリュージョン
  ja_romaji: Gagaga Iryūjon
  ko: 가가가 일루전
  ko_rr:
  zh-TW:
  zh-CN: 我我我幻象
text:
  en: |-
    If you control a "Gagaga" monster: Target 1 monster in your GY; Special Summon it, then you can make its Level/Rank become equal to that of 1 "Gagaga" monster you control. If this card is in your GY, except the turn it was sent there: You can banish it; immediately after this effect resolves, Normal Summon 1 "Gagaga" monster. You can only use each effect of "Gagaga Illusion" once per turn.
  de: |-
    Falls du ein „Gagaga“-Monster kontrollierst: Wähle 1 Monster in deinem Friedhof; beschwöre es als Spezialbeschwörung, dann kannst du seine/n Stufe/Rang gleich jener/jenem von 1 „Gagaga“-Monster, das du kontrollierst, werden lassen. Falls sich diese Karte in deinem Friedhof befindet, außer in dem Spielzug, in dem sie dorthin gelegt wurde: Du kannst sie verbannen; sofort nachdem dieser Effekt aufgelöst wurde, beschwöre 1 „Gagaga“-Monster als Normalbeschwörung. Du kannst jeden Effekt von „Gagaga-Illusion“ nur einmal pro Spielzug verwenden.
  es: |-
    Si controlas un monstruo "Gagaga": selecciona 1 monstruo en tu Cementerio; Invócalo de Modo Especial, y después puedes hacer que su Nivel/Rango se convierta en igual al de 1 monstruo "Gagaga" que controles. Si esta carta está en tu Cementerio, excepto en el turno en el que ésta fue mandada allí: puedes desterrarla; inmediatamente después de que se resuelva este efecto, Invoca de Modo Normal 1 monstruo "Gagaga". Sólo puedes usar cada efecto de "Ilusión Gagaga" una vez por turno.
  fr: |-
    Si vous contrôlez un monstre "Gagaga" : ciblez 1 monstre dans votre Cimetière ; Invoquez-le Spécialement, puis vous pouvez faire devenir son Niveau/Rang égal à celui d'1 monstre "Gagaga" que vous contrôlez. Si cette carte est dans votre Cimetière, sauf le tour où elle y a été envoyée : vous pouvez la bannir ; immédiatement après la résolution de cet effet, Invoquez Normalement 1 monstre "Gagaga". Vous ne pouvez utiliser chaque effet de "Illusion Gagaga" qu'une fois par tour.
  it: |-
    Se controlli un mostro "Gagaga": scegli come bersaglio 1 mostro nel tuo Cimitero; Evocalo Specialmente, poi puoi far diventare il suo Livello/Rango pari a quello di 1 mostro "Gagaga" che controlli. Se questa carta è nel tuo Cimitero, eccetto nel turno in cui è stata mandata lì: puoi bandirla; immediatamente dopo che questo effetto si è risolto, Evoca Normalmente 1 mostro "Gagaga". Puoi utilizzare ogni effetto di "Illusione Gagaga" una sola volta per turno.
  pt: |-
    Se você controlar um monstro "Gagaga": escolha 1 monstro no seu Cemitério; Invoque-o por Invocação-Especial e, depois, você pode fazer com que seu Nível/Classe se torne igual ao de 1 monstro "Gagaga" que você controla. Se este card estiver no seu Cemitério, exceto no turno em que foi enviado para lá: você pode bani-lo; imediatamente depois que este efeito resolver, Invoque por Invocação-Normal 1 monstro "Gagaga". Você só pode usar cada efeito de "Ilusão Gagaga" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分フィールドに「ガガガ」モンスターが存在する場合、自分の墓地のモンスター１体を対象として発動できる。そのモンスターを特殊召喚する。その後、そのモンスターのレベル・ランクを自分フィールドの「ガガガ」モンスター１体のレベル・ランクの数値と同じにできる。②：このターンに墓地へ送られていないこのカードを墓地から除外して発動できる。「ガガガ」モンスター１体の召喚を行う。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 자신 필드에 "가가가" 몬스터가 존재할 경우, 자신 묘지의 몬스터 1장을 대상으로 하고 발동할 수 있다. 그 몬스터를 특수 소환한다. 그 후, 그 몬스터의 레벨 / 랭크를 자신 필드의 "가가가" 몬스터 1장의 레벨 / 랭크의 수치와 같게 할 수 있다. ②: 이 턴에 묘지로 보내져 있지 않은 이 카드를 묘지에서 제외하고 발동할 수 있다. "가가가" 몬스터 1장의 일반 소환을 실행한다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：自己场上存在“我我我”怪兽的情况下，以自己墓地的1只怪兽为对象可以发动。将该怪兽特殊召唤。然后，可将该怪兽的等级・阶级改成与自己场上的1只“我我我”怪兽的等级・阶级的数值相同。②：从墓地将不是在此回合被送至墓地的此卡除外可以发动。进行1只“我我我”怪兽的召唤。
