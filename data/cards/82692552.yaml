  ja: |-
    このカード名の①の効果は１ターンに１度しか使用できない。①：このカードがドロー以外の方法で手札に加わった場合、このカードと手札の水属性モンスター１体を相手に見せて発動できる。その２体を特殊召喚する。この効果の発動後、ターン終了時まで自分は水属性モンスターしか特殊召喚できない。②：自分フィールドに「海」が存在する限り、自分フィールドの水属性Ｌモンスターを相手は効果の対象にできない。
  ko:
