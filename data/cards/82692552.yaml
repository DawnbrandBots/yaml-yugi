  en: |-
    If this card is added to your hand, except by drawing it: You can reveal this card and 1 other WATER monster in your hand; Special Summon both, also you cannot Special Summon for the rest of this turn, except WATER monsters. You can only use this effect of "Coralianektes the Shimmering Shining Dragon" once per turn. While you control "Umi", your opponent cannot target WATER Link Monsters you control with card effects.
