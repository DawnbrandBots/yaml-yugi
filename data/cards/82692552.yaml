  zh-CN: |-
    此卡名的①效果1回合仅可使用1次。①：此卡以抽牌以外的方法加入手牌的情况下，将此卡和手牌的1只水属性怪兽出示给对手可以发动。将该2只特殊召唤。此效果发动后，直至回合结束时为止自己仅可特殊召唤水属性怪兽。②：只要自己场上存在“海”，对手不可将自己场上的水属性连接怪兽作为效果的对象。
