text:
  en: |-
    If you control a Fiend Tuner: You can Special Summon this card from your hand. If this card is Special Summoned: You can decrease its Level by up to 2. If this card is sent to the GY as Synchro Material for "Red Dragon Archfiend" or a monster that mentions it: You can target 1 Level 4 or lower Fiend monster in your GY; Special Summon it in Defense Position. You can only use each effect of "Fiend Piece Golem" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②③の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが手札に存在し、自分フィールドに悪魔族チューナーが存在する場合に発動できる。このカードを特殊召喚する。②：このカードが特殊召喚した場合に発動できる。このカードのレベルを２つまで下げる。③：このカードが「レッド・デーモンズ・ドラゴン」またはそのカード名が記されたＳモンスターのＳ素材として墓地へ送られた場合、自分の墓地のレベル４以下の悪魔族モンスター１体を対象として発動できる。そのモンスターを守備表示で特殊召喚する。
  ko: |-
    이 카드명의 ①②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드가 패에 존재하고, 자신 필드에 악마족 튜너가 존재할 경우에 발동할 수 있다. 이 카드를 특수 소환한다. ②: 이 카드를 특수 소환했을 경우에 발동할 수 있다. 이 카드의 레벨을 2개까지 내린다. ③: 이 카드가 "레드 데몬즈 드래곤" 또는 그 카드명이 쓰여진 싱크로 몬스터의 싱크로 소재로서 묘지로 보내졌을 경우, 자신 묘지의 레벨 4 이하의 악마족 몬스터 1장을 대상으로 하고 발동할 수 있다. 그 몬스터를 수비 표시로 특수 소환한다.
  zh-TW:
  zh-CN: |-
    此卡名的①②③效果1回合仅可各使用1次。①：此卡存在于手牌，且自己场上存在恶魔族协调的情况下可以发动。将此卡特殊召唤。②：此卡特殊召唤的情况下可以发动。此卡的等级下降最多2。③：此卡作为“暗红恶魔龙”或记载有该卡名的同步怪兽的同步素材被送至墓地的情况下，以自己墓地的1只等级4以下的恶魔族怪兽为对象可以发动。将该怪兽以守备表示特殊召唤。
