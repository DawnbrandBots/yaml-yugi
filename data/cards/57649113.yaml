text:
  en: |-
    Through brave struggles, Stinger and the Dune Defenders have repelled all approaching external threats. His sword should only be used for the defense of its people.
  de: |-
    Durch tapfere Kämpfe haben Stinger und die Dünenverteidiger alle auftauchenden Bedrohungen von außen abgewehrt. Er darf sein Schwert nur zur Verteidigung seines Volkes verwenden.
  es: |-
    Gracias a valientes esfuerzos, Stinger y los Defensores de las Dunas han repelido todas las amenazas externas que se acercaban. Su espada sólo debe ser usada para la defensa de su pueblo.
  fr: |-
    Stinger et les Défenseurs des Dunes ont à maintes reprises repoussé avec bravoure toutes les menaces qui se présentaient. Son épée ne peut être utilisée que pour défendre son peuple.
  it: |-
    Attraverso lotte coraggiose, Stinger e i Difensori delle Dune hanno respinto tutte le minacce esterne in arrivo. La sua spada dovrebbe essere utilizzata solo per la difesa del suo popolo.
  pt: |-
    Ao longo de batalhas tenazes, Stinger e os Defensores das Dunas repeliram todas as ameaças externas que se aproximavam. Sua espada deve ser usada apenas para a defesa de seu povo.
  ja: |-
    勇ましい奮闘によって、迫りくる外敵を退け続けた砂丘防衛隊の隊士。その剣は守るべき者の為だけに振るわれるはずだった。
  ko: |-
    용감히 분투하여, 습격해 온 외적을 물리쳐낸 사구 방위대의 대원. 그 검은 오직 지켜야 할 이들을 위해서만 휘둘러졌어야 했다.
  zh-TW:
  zh-CN: |-
    凭借英勇的奋战，不断击退逼近的外敌的沙丘防卫队战士。他的剑本该只为应守护之人而挥动。
