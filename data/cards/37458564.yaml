text:
  en: |-
    2 monsters with the same Type
    If this card is Link Summoned, or a monster(s) is Special Summoned to a zone(s) this card points to: You can send 1 Spell from your hand or face-up field to the GY; add 1 Ritual Monster from your Deck to your hand. You can target 1 Ritual, Fusion, Synchro, or Xyz Monster this card points to; Special Summon 1 monster from your GY with the same Type but a different card type (Ritual, Fusion, Synchro, or Xyz). You can only use each effect of "Cyberse Contract Witch" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    同じ種族のモンスター２体
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードがＬ召喚した場合、またはこのカードのリンク先にモンスターが特殊召喚された場合、自分の手札・フィールド（表側表示）から魔法カード１枚を墓地へ送って発動できる。デッキから儀式モンスター１体を手札に加える。②：このカードのリンク先の儀式・融合・Ｓ・Ｘモンスター１体を対象として発動できる。そのモンスターとは種類（儀式・融合・Ｓ・Ｘ）が異なり、種族が同じモンスター１体を自分の墓地から特殊召喚する。
  ko:
  zh-TW:
  zh-CN: |-
    相同种族的怪兽2只
    此卡名的①②效果1回合仅可各使用1次。①：此卡连接召唤的情况下，或有怪兽被特殊召唤至此卡连接端的情况下，从自己手牌・场上（表侧表示）将1张魔法卡送至墓地可以发动。从牌组将1只仪式怪兽加入手牌。②：以此卡连接端的1只仪式・融合・同步・超量怪兽为对象可以发动。从自己墓地将1只与该怪兽种类（仪式・融合・同步・超量）不同、种族相同的怪兽特殊召唤。
