  en: |-
    You can reveal this card in your hand, then target 1 monster on the field; destroy it, and if you do, Special Summon 1 Thunder monster from your hand, also you cannot Special Summon Effect Monsters for the rest of this turn, except from the hand. If another card(s) is destroyed by card effect, while this card is in the Monster Zone: You can add 1 "Blitzclique" monster from your Deck to your hand, except "Surge Blitzclique". You can only use each effect of "Surge Blitzclique" once per turn.
