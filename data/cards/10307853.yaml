text:
  en: |-
    While you have 5 cards in your Spell & Trap Zone, any battle damage a player takes is halved, also once per turn, you can activate 1 Continuous Trap Card the turn it was Set. During the Standby Phase: You can reveal 5 Continuous Traps with different names from your Deck, your opponent randomly picks 1 for you to Set on your field, also shuffle the rest into the Deck. You can only use this effect of "Protective Stone Gardenscaping" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の②の効果は１ターンに１度しか使用できない。①：自分の魔法＆罠ゾーンにカードが５枚存在する限り、お互いが受ける戦闘ダメージは半分になり、１ターンに１度、自分は永続罠カード１枚をセットしたターンに発動できる。②：自分・相手のスタンバイフェイズに発動できる。カード名が異なる永続罠カード５枚をデッキから相手に見せ、相手はその中からランダムに１枚選ぶ。自分はその１枚を自分フィールドにセットし、残りをデッキに戻す。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的②效果1回合仅可使用1次。①：只要自己的魔法与陷阱区域存在5张卡，双方受到的战斗伤害变为一半，1回合1次，自己可以将1张永续陷阱卡在放置的回合发动。②：在自己・对手的准备阶段可以发动。从牌组将卡名不同的5张永续陷阱卡出示给对手，对手从其中随机挑选1张。自己将该1张放置在自己场上，剩余的放回牌组。
