name:
  en: Garden of Talistones
  de: Garten der Talisteine
  es: Jardín de Talispiedras
  fr: Jardin des Talispierres
  it: Giardino delle Talipietre
  pt: Jardim das Pedrastalis
  ja: <ruby>護<rt>ご</rt></ruby><ruby>石<rt>せき</rt></ruby>の<ruby>作<rt>さく</rt></ruby><ruby>庭<rt>てい</rt></ruby>
