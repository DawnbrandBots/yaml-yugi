text:
  en: |-
    Once per turn, during your opponent's Main or Battle Phase, you can (Quick Effect): Immediately after this effect resolves, Synchro Summon using only EARTH monsters you control, including this card. You can only use each of the following effects of "X-Saber Bruno" once per turn. If this card is in your hand: You can banish 1 other EARTH monster from your hand, face-up field, or GY; Special Summon this card. If this card is Normal or Special Summoned: You can add 1 "Saber" Spell/Trap from your Deck or GY to your hand.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが手札に存在する場合、自分の手札・フィールド（表側表示）・墓地からこのカード以外の地属性モンスター１体を除外して発動できる。このカードを特殊召喚する。②：このカードが召喚・特殊召喚した場合に発動できる。自分のデッキ・墓地から「セイバー」魔法・罠カード１枚を手札に加える。③：１ターンに１度、相手のメインフェイズ及びバトルフェイズに発動できる。このカードを含む自分フィールドの地属性モンスターのみを素材としてＳ召喚を行う。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드가 패에 존재할 경우, 자신의 패 / 필드(앞면 표시) / 묘지에서 이 카드 이외의 땅 속성 몬스터 1장을 제외하고 발동할 수 있다. 이 카드를 특수 소환한다. ②: 이 카드를 일반 소환 / 특수 소환했을 경우에 발동할 수 있다. 자신의 덱 / 묘지에서 "세이버" 마법 / 함정 카드 1장을 패에 넣는다. ③: 1턴에 1번, 상대의 메인 페이즈 및 배틀 페이즈에 발동할 수 있다. 이 카드를 포함하는 자신 필드의 땅 속성 몬스터만을 소재로서 싱크로 소환을 실행한다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：此卡存在于手牌的情况下，从自己手牌・场上（表侧表示）・墓地将此卡以外的1只地属性怪兽除外可以发动。将此卡特殊召唤。②：此卡召唤・特殊召唤的情况下可以发动。从自己牌组・墓地将1张“军刀”魔法・陷阱卡加入手牌。③：1回合1次，在对手的主要阶段及战斗阶段可以发动。将包含此卡在内的、仅以自己场上的地属性怪兽作为素材进行同步召唤。
