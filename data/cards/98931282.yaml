text:
  en: |-
    If you control a "Destiny HERO" monster or a face-up Field Spell: You can Special Summon this card from your hand, then you can destroy 1 card you control, and if you do, add 1 "Polymerization" from your Deck to your hand. If you Special Summon a Level 8 "Destiny HERO" monster(s) (except during the Damage Step): You can banish this card from your GY, then target 1 card your opponent controls; place it on top of the Deck. You can only use each effect of "Destiny HERO - Dreadnought Servant" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分フィールドに「Ｄ－ＨＥＲＯ」モンスターかフィールド魔法カードが表側表示で存在する場合に発動できる。このカードを手札から特殊召喚する。その後、以下の効果を適用できる。●自分フィールドのカード１枚を破壊し、デッキから「融合」１枚を手札に加える。②：自分がレベル８の「Ｄ－ＨＥＲＯ」モンスターを特殊召喚した場合、墓地のこのカードを除外し、相手フィールドのカード１枚を対象として発動できる。そのカードをデッキの一番上に戻す。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：“命运－英雄”怪兽或场地魔法卡以表侧表示存在于自己场上的情况下可以发动。从手牌将此卡特殊召唤。然后，可适用以下效果。
    ●将自己场上的1张卡破坏，从牌组将1张“融合”加入手牌。
    ②：自己将等级8的“命运－英雄”怪兽特殊召唤的情况下，将墓地的此卡除外，以对手场上的1张卡为对象可以发动。将该卡放回牌组最上面。
