name:
  en: Horoscope Sorcerer, the Stargazer Magician
  de:
  es:
  fr:
  it:
  pt:
  ja: <ruby>星<rt>ほし</rt></ruby><ruby>読<rt>よ</rt></ruby>みの<ruby>魔<rt>ま</rt></ruby><ruby>術<rt>じゅつ</rt></ruby><ruby>師<rt>し</rt></ruby>－ホロスコープ・マジシャン
  ja_romaji: Hoshiyomi no Majutsushi - Horosukōpu Majishan
  ko: 별을 읽는 마술사－홀로스코프 매지션
  ko_rr:
  zh-TW:
  zh-CN: 星读的魔术师－天宫图魔术士
text:
  en: |-
    If this card is in your hand: You can discard 1 other "Magician" Pendulum Monster, "Performapal" monster, or "Odd-Eyes" monster; Special Summon this card. If this card is Special Summoned: You can add 1 Pendulum Monster with 2500 ATK from your Deck to your hand. You can target 1 Pendulum Monster Card you control; destroy it, then you can add 1 face-up Pendulum Monster from your Extra Deck to your hand. You can only use each effect of "Horoscope Sorcerer, the Stargazer Magician" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②③のモンスター効果はそれぞれ１ターンに１度しか使用できない。①：手札から他の「魔術師」Ｐモンスター、「ＥＭ」モンスター、「オッドアイズ」モンスター１体を捨てて発動できる。このカードを手札から特殊召喚する。②：このカードが特殊召喚した場合に発動できる。デッキから攻撃力２５００のＰモンスター１体を手札に加える。③：自分フィールドのＰモンスターカード１枚を対象として発動できる。そのカードを破壊する。その後、自分のＥＸデッキ（表側）からＰモンスター１体を手札に加える事ができる。
  ko: |-
    이 카드명의 ①②③의 몬스터 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 패에서 다른 "마술사" 펜듈럼 몬스터, "EM(엔터메이트)" 몬스터, "오드아이즈" 몬스터 1장을 버리고 발동할 수 있다. 이 카드를 패에서 특수 소환한다. ②: 이 카드를 특수 소환했을 경우에 발동할 수 있다. 덱에서 공격력 2500 인 펜듈럼 몬스터 1장을 패에 넣는다. ③: 자신 필드의 펜듈럼 몬스터 카드 1장을 대상으로 하고 발동할 수 있다. 그 카드를 파괴한다. 그 후, 자신의 엑스트라 덱(앞면)에서 펜듈럼 몬스터 1장을 패에 넣을 수 있다.
  zh-TW:
  zh-CN: |-
    此卡名的①②③怪兽效果1回合仅可各使用1次。①：从手牌将1只其他的“魔术师”灵摆怪兽、“娱乐伙伴”怪兽、“异色眼”怪兽舍弃可以发动。从手牌将此卡特殊召唤。②：此卡特殊召唤的情况下可以发动。从牌组将1只攻击力2500的灵摆怪兽加入手牌。③：以自己场上的1张灵摆怪兽卡为对象可以发动。将该卡破坏。然后，可从自己额外牌组（表侧）将1只灵摆怪兽加入手牌。
card_type: Monster
monster_type_line: Spellcaster / Pendulum / Effect
attribute: DARK
level: 5
atk: 1200
def: 2400
pendulum_scale: 1
pendulum_effect:
  en: |-
    When a Spell Card or effect activated by your opponent resolves, if you control a "Magician" Pendulum Monster or an "Odd-Eyes" monster, you can negate that effect, then destroy this card. You can only use this effect of "Horoscope Sorcerer, the Stargazer Magician" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名のＰ効果は１ターンに１度しか使用できない。①：相手が発動した魔法カードの効果の処理時に、自分フィールドに「魔術師」Ｐモンスターか「オッドアイズ」モンスターが存在する場合、その発動した効果を無効にできる。その後、このカードを破壊する。
  ko: |-
    이 카드명의 펜듈럼 효과는 1턴에 1번밖에 사용할 수 없다. ①: 상대가 발동한 마법 카드의 효과 처리시에, 자신 필드에 "마술사" 펜듈럼 몬스터나 "오드아이즈" 몬스터가 존재할 경우, 그 발동한 효과를 무효로 할 수 있다. 그 후, 이 카드를 파괴한다.
  zh-TW:
  zh-CN: |-
    此卡名的灵摆效果1回合仅可使用1次。①：对手发动的魔法卡的效果处理时，自己场上存在“魔术师”灵摆怪兽或“异色眼”怪兽的情况下，可将该发动的效果无效。然后，将此卡破坏。
