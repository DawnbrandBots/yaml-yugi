  zh-CN: |-
    ①：将最多4只“替身羊衍生物”（兽族・地・星1・攻/守0）以守备表示特殊召唤至自己场上。对手场上存在怪兽的情况下，进而可从牌组将1只“疾风的豹战士”特殊召唤。此回合，此衍生物不可为上级召唤而解放，自己从额外牌组仅可特殊召唤融合怪兽。记载有“时间黑魔术师”卡名的自己场上的卡将被战斗・效果破坏的情况下，作为代替可将以此效果特殊召唤的、自己场上的1只衍生物破坏。
