text:
  en: |-
    You can target any number of face-down cards you control; add "Ashtra" cards from your Deck to your hand with different names from each other, except Field Spells, equal to the number of those targeted cards that are still face-down, then send those face-down cards to the GY. If a card(s) becomes Set on the field, while you control an "Ashtra" monster and a face-down card (except during the Damage Step): You can target 1 card on the field; return it to the hand. You can only use each effect of "Ashtrashen - Gateway to the Worlds Beyond" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分フィールドの裏側表示カードを任意の数だけ対象として発動できる。その裏側表示カードの数だけ、デッキからフィールド魔法カード以外の「アシュトラ」カードを手札に加える（同名カードは１枚まで）。その後、対象の裏側表示カードを墓地へ送る。②：自分フィールドに「アシュトラ」モンスター及び裏側表示カードが存在する状態で、フィールドにカードがセットされた場合、フィールドのカード１枚を対象として発動できる。そのカードを手札に戻す。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：以自己场上任意数量的里侧表示卡为对象可以发动。依该里侧表示卡的数量，从牌组将场地魔法卡以外的“艮鬼”卡加入手牌（同名卡最多1张）。然后，将对象的里侧表示卡送至墓地。②：自己场上存在“艮鬼”怪兽及里侧表示卡的状态下，有卡被放置到场上的情况下，以场上的1张卡为对象可以发动。将该卡放回手牌。
