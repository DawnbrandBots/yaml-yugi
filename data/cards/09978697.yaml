name:
  en: X-Saber Pellina
  de: X-Säbel Pellina
  es: Sable-X Pellina
  fr: Pellina, Sabre X
  it: Sciabola-X Pellina
  pt: Sabre-X Pellina
  ja: <ruby>Ｘ<rt>エックス</rt></ruby>－セイバー ペリナ
  ja_romaji: Ekkusu-Seibā Perina
  ko: X－세이버 펠리나
  ko_rr:
  zh-TW: X－軍刀 佩利那
  zh-CN: X－军刀 佩利那
text:
  en: |-
    If this card is Normal or Special Summoned: You can send it to the GY; Special Summon 2 "X-Saber" monsters from your Deck, except "X-Saber Pellina", but destroy them during the End Phase. If this card is sent to the GY as Synchro Material for an "X-Saber" monster: You can apply 1 of these effects.
    ● That monster can make a second attack during each Battle Phase.
    ● That monster can attack directly.
    You can only use each effect of "X-Saber Pellina" once per turn.
  de: |-
    Falls diese Karte als Normal- oder Spezialbeschwörung beschworen wird: Du kannst sie auf den Friedhof legen; beschwöre 2 „X-Säbel“-Monster als Spezialbeschwörung von deinem Deck, außer „X-Säbel Pellina“, aber zerstöre sie während der End Phase. Falls diese Karte als Synchromaterial für ein „X-Säbel“-Monster auf den Friedhof gelegt wird: Du kannst 1 dieser Effekte anwenden.
    ● Jenes Monster kann während jeder Battle Phase einen zweiten Angriff durchführen.
    ● Jenes Monster kann direkt angreifen.
    Du kannst jeden Effekt von „X-Säbel Pellina“ nur einmal pro Spielzug verwenden.
  es: |-
    Si esta carta es Invocada de Modo Normal o Especial: puedes mandarla al Cementerio; Invoca de Modo Especial, desde tu Deck, 2 monstruos "Sable-X", excepto "Sable-X Pellina", pero destrúyelos durante la End Phase. Si esta carta es mandada al Cementerio como Material de Sincronía para un monstruo "Sable-X": puedes aplicar 1 de estos efectos.
    ● Ese monstruo puede hacer un segundo ataque durante cada Battle Phase.
    ● Ese monstruo puede atacar directamente.
    Sólo puedes usar cada efecto de "Sable-X Pellina" una vez por turno.
  fr: |-
    Si cette carte est Invoquée Normalement ou Spécialement : vous pouvez l'envoyer au Cimetière ; Invoquez Spécialement 2 monstres "Sabre X" ("Pellina, Sabre X" exclu) depuis votre Deck, mais détruisez-les durant la End Phase. Si cette carte est envoyée au Cimetière comme Matériel Synchro pour un monstre "Sabre X" : vous pouvez appliquer 1 de ces effets.
    ● Le monstre peut faire une seconde attaque durant chaque Battle Phase.
    ● Le monstre peut attaquer directement.
    Vous ne pouvez utiliser chaque effet de "Pellina, Sabre X" qu'une fois par tour.
  it: |-
    Se questa carta viene Evocata Normalmente o Specialmente: puoi mandarla al Cimitero; Evoca Specialmente 2 mostri "Sciabola-X" dal tuo Deck, eccetto "Sciabola-X Pellina", ma distruggili durante la End Phase. Se questa carta viene mandata al Cimitero come Materiale Synchro per un mostro "Sciabola-X": puoi applicare 1 di questi effetti.
    ● Quel mostro può effettuare un secondo attacco durante ogni Battle Phase.
    ● Quel mostro può attaccare direttamente.
    Puoi utilizzare ogni effetto di "Sciabola-X Pellina" una sola volta per turno.
  pt: |-
    Se este card for Invocado por Invocação-Normal ou Especial: você pode enviá-lo para o Cemitério; Invoque por Invocação-Especial 2 monstros "Sabre-X" do seu Deck, exceto "Sabre-X Pellina", mas destrua-os durante a Fase Final. Se este card for enviado para o Cemitério como Matéria Sincro para um monstro "Sabre-X": você pode aplicar 1 desses efeitos.
    ● Esse monstro pode realizar um segundo ataque durante cada Fase de Batalha.
    ● Esse monstro pode atacar diretamente.
    Você só pode usar cada efeito de "Sabre-X Pellina" uma vez por turno.
  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが召喚・特殊召喚した場合、このカードを墓地へ送って発動できる。デッキから「Ｘ－セイバー ペリナ」以外の「Ｘ－セイバー」モンスター２体を特殊召喚する。この効果で特殊召喚したモンスターはエンドフェイズに破壊される。②：このカードが「Ｘ－セイバー」ＳモンスターのＳ素材として墓地へ送られた場合に発動できる。以下から１つを選んで適用する。●そのモンスターは１度のバトルフェイズ中に２回攻撃できる。●そのモンスターは直接攻撃できる。
  ko: |-
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드를 일반 소환 / 특수 소환했을 경우, 이 카드를 묘지로 보내고 발동할 수 있다. 덱에서 "X－세이버 펠리나" 이외의 "X－세이버" 몬스터 2장을 특수 소환한다. 이 효과로 특수 소환한 몬스터는 엔드 페이즈에 파괴된다. ②: 이 카드가 "X－세이버" 싱크로 몬스터의 싱크로 소재로서 묘지로 보내졌을 경우에 발동할 수 있다. 이하에서 1개를 고르고 적용한다. ●그 몬스터는 1번의 배틀 페이즈 중에 2회 공격할 수 있다. ●그 몬스터는 직접 공격할 수 있다.
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：此卡召唤・特殊召唤的情况下，将此卡送至墓地可以发动。从牌组将“X－军刀 佩利那”以外的2只“X－军刀”怪兽特殊召唤。以此效果特殊召唤的怪兽将在结束阶段被破坏。②：此卡作为“X－军刀”同步怪兽的同步素材被送至墓地的情况下可以发动。从以下效果中挑选1个适用。●该怪兽在1次战斗阶段中可攻击2次。●该怪兽可直接攻击。
