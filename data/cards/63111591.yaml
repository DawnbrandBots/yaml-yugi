text:
  en: |-
    Send cards from the top of your Deck to the GY up to the number of Traps in the GYs with different names +1 (max. 4), then you can apply 1 of these effects.
    ● Special Summon 1 of the monsters sent to the GY.
    ● Set 1 of the Spells/Traps sent to the GY, except "Corpse-Seller Crow", and if you Set a Trap or Quick-Play Spell, it can be activated this turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    ①：お互いの墓地の罠カードの種類の数＋１枚まで自分のデッキの上からカードを墓地へ送る（最大４枚まで）。その後、以下の効果から１つを選んで適用できる。
    ●墓地へ送ったカードの中からモンスター１体を特殊召喚する。
    ●墓地へ送ったカードの中から「躯売りのカラス」以外の魔法・罠カード１枚を自分フィールドにセットする。速攻魔法・罠カードをセットした場合、そのカードはセットしたターンでも発動できる。
  ko:
  zh-TW:
  zh-CN: |-
    ①：以双方墓地的陷阱卡的种类的数量＋1张为上限，从自己牌组上面将卡送至墓地（最多4张）。然后，可从以下效果中挑选1个适用。
    ●从送至了墓地的卡中将1只怪兽特殊召唤。
    ●从送至了墓地的卡中将“贩卖亡骸的乌鸦”以外的1张魔法・陷阱卡放置在自己场上。放置了速攻魔法・陷阱卡的情况下，该卡在放置的回合也可以发动。
