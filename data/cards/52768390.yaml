text:
  en: |-
    You can Special Summon this card (from your hand) by Tributing 2 Fiend and/or Fairy monsters. Cannot be destroyed by battle. Once per turn: You can Special Summon as many "Dark Creator Tokens" (Fiend/DARK/Level 10/ATK 3000/DEF 1000) as possible, but they cannot attack directly or be destroyed by battle, destroy them when this card is destroyed, also you cannot Special Summon for the rest of this turn. If a monster(s) is destroyed by battle: Inflict 700 damage to your opponent.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    ①：このカードは自分フィールドの悪魔族・天使族モンスター２体をリリースして手札から特殊召喚できる。②：このカードは戦闘では破壊されない。③：１ターンに１度、発動できる。自分フィールドに「ダークゴッド・トークン」（悪魔族・闇・星１０・攻３０００／守１０００）を可能な限り特殊召喚する。このトークンは、直接攻撃できず、戦闘では破壊されず、このカードが破壊される時に破壊される。このターン、自分はモンスターを特殊召喚できない。④：モンスターが戦闘で破壊された場合に発動する。相手に７００ダメージを与える。
  ko: |-
    ①: 이 카드는 자신 필드의 악마족 / 천사족 몬스터 2장을 릴리스하고 패에서 특수 소환할 수 있다. ②: 이 카드는 전투로는 파괴되지 않는다. ③: 1턴에 1번, 발동할 수 있다. 자신 필드에 "다크갓 토큰"(악마족 / 어둠 / 레벨 10 / 공 3000 / 수 1000)을 가능한 한 특수 소환한다. 이 토큰은, 직접 공격할 수 없으며, 전투로는 파괴되지 않고, 이 카드가 파괴될 때에 파괴된다. 이 턴에, 자신은 몬스터를 특수 소환할 수 없다. ④: 몬스터가 전투로 파괴되었을 경우에 발동한다. 상대에게 700 데미지를 준다.
  zh-TW:
  zh-CN: |-
    ①：此卡可解放自己场上的2只恶魔族・天使族怪兽来从手牌特殊召唤。②：此卡不会因战斗被破坏。③：1回合1次，可以发动。将“暗之神衍生物”（恶魔族・暗・星10・攻3000/守1000）尽可能地特殊召唤至自己场上。此衍生物不可直接攻击，不会因战斗被破坏，在此卡被破坏时将被破坏。此回合，自己不可特殊召唤怪兽。
    ④：有怪兽因战斗被破坏的情况下发动。给予对手700伤害。
