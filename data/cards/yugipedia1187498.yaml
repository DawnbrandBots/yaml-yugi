text:
  en: |-
    If this card battles a monster, neither can be destroyed by that battle. You can discard this card, then activate 1 of these effects (but you can only use each of these effects of "Dark-Eyes Illusionist Faceless Mage" once per turn);
    ● Place 1 "Mind Scan" from your hand or Deck face-up on your field.
    ● Add 1 other monster from your GY to your hand that mentions "Toon World", then you can Special Summon it, ignoring its Summoning conditions.
