    ①：从手牌将此卡舍弃，可从以下效果中选择1个发动（此卡名的以下效果1回合仅可各选择1次）。
    ●从手牌・牌组将1张“心灵透视眼”以表侧表示放在自己场上。
    ●从自己墓地将除此卡以外的、1只记载有“卡通世界”卡名的怪兽加入手牌。然后，可从手牌将该怪兽无视召唤条件特殊召唤。
    ②：此卡与怪兽进行战斗的情况下，该2只不会因该战斗被破坏。
