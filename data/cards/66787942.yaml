  es: Predaplanta Bal Teah
  fr: Bal Teah Prédaplante
  it: Predapianta Bal Teah
  pt: Predaplanta Bal Teah
  ja: <ruby>捕食植物<rt>プレデター・プランツ</rt></ruby>バアル・テア
  ja_romaji: Puredetā Purantsu Baaru Tea
  ko: 프레데터 플랜츠 바알 테아
  ko_rr:
  zh-TW: 捕食植物 羊角麻蠅王
  zh-CN: 捕食植物 羊角麻蝇王
text:
  en: |-
    1 Tuner + 1+ non-Tuners
    If this card is Synchro Summoned: You can Special Summon 1 "Predaplant" or "Starving Venom" monster from your face-up Extra Deck or GY. If a monster(s) is Special Summoned to your opponent's field (except during the Damage Step): You can banish 1 "Polymerization" and this card from your GY; Fusion Summon 1 Fusion Monster from your Extra Deck, using monsters from your hand or field. You can only use each effect of "Predaplant Bal Teah" once per turn.
  de: |-
    1 Empfänger + 1+ Nicht-Empfänger
    Falls diese Karte als Synchrobeschwörung beschworen wird: Du kannst 1 „Raubpflanze“- oder „Hungergift“-Monster als Spezialbeschwörung offen von deinem Extra Deck oder von deinem Friedhof beschwören. Falls ein oder mehr Monster als Spezialbeschwörung auf die Spielfeldseite deines Gegners beschworen werden (außer während des Damage Steps): Du kannst 1 „Polymerisation“ und diese Karte von deinem Friedhof verbannen; beschwöre 1 Fusionsmonster als Fusionsbeschwörung von deinem Extra Deck, indem du Monster von deiner Hand oder Spielfeldseite verwendest. Du kannst jeden Effekt von „Raubpflanze Bal Teah“ nur einmal pro Spielzug verwenden.
  es: |-
    1 Cantante + 1+ no Cantantes
    Si esta carta es Invocada por Sincronía: puedes Invocar de Modo Especial 1 monstruo "Predaplanta" o "Hambriento Venenoso" desde tu Deck Extra boca arriba o Cementerio. Si uno o más monstruos son Invocados de Modo Especial al Campo de tu adversario (excepto durante el Damage Step): puedes desterrar 1 "Polimerización" y esta carta en tu Cementerio; Invoca por Fusión 1 Monstruo de Fusión desde tu Deck Extra, usando monstruos en tu mano o Campo. Sólo puedes usar cada efecto de "Predaplanta Bal Teah" una vez por turno.
  fr: |-
    1 Syntoniseur + 1+ non-Syntoniseur
    Si cette carte est Invoquée par Synchronisation : vous pouvez Invoquer Spécialement 1 monstre "Prédaplante" ou "Venin Affamé" depuis votre Extra Deck face recto ou Cimetière. Si un ou plusieurs monstres sont Invoqués Spécialement sur le Terrain de votre adversaire (sauf durant la Damage Step) : vous pouvez bannir 1 "Polymérisation" et cette carte depuis votre Cimetière ; Invoquez par Fusion 1 Monstre Fusion depuis votre Extra Deck, en utilisant des monstres depuis votre main ou Terrain. Vous ne pouvez utiliser chaque effet de "Bal Teah Prédaplante" qu'une fois par tour.
  it: |-
    1 Tuner + 1+ non-Tuner
    Se questa carta viene Synchro Evocata: puoi Evocare Specialmente 1 mostro "Predapianta" o "Veleno Affamato" dal tuo Extra Deck scoperto o Cimitero. Se uno o più mostri vengono Evocati Specialmente sul Terreno del tuo avversario (eccetto durante il Damage Step): puoi bandire 1 "Polimerizzazione" e questa carta dal tuo Cimitero; Evoca tramite Fusione 1 Mostro Fusione dal tuo Extra Deck, utilizzando mostri dalla tua mano o Terreno. Puoi utilizzare ogni effetto di "Predapianta Bal Teah" una sola volta per turno.
  pt: |-
    1 Regulador + 1+ não-Reguladores
    Se este card for Invocado por Invocação-Sincro: você pode Invocar por Invocação-Especial 1 monstro "Predaplanta" ou "Peçonha Insaciável" do seu Deck Adicional com a face para cima ou Cemitério. Se um ou mais monstros forem Invocados por Invocação-Especial no campo do seu oponente (exceto durante a Etapa de Dano): você pode banir 1 "Polimerização" e este card do seu Cemitério; Invoque por Invocação-Fusão 1 Monstro de Fusão do seu Deck Adicional, usando monstros da sua mão ou do campo. Você só pode usar cada efeito de "Predaplanta Bal Teah" uma vez por turno.
  ja: |-
    チューナー＋チューナー以外のモンスター１体以上
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードがＳ召喚した場合に発動できる。自分のＥＸデッキ（表側）・墓地から「捕食植物」モンスターか「スターヴ・ヴェノム」モンスター１体を特殊召喚する。②：相手フィールドにモンスターが特殊召喚された場合、自分の墓地からこのカードと「融合」１枚を除外して発動できる。自分の手札・フィールドのモンスターを融合素材とし、融合モンスター１体を融合召喚する。
  ko: |-
    튜너 ＋ 튜너 이외의 몬스터 1장 이상
    이 카드명의 ①②의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 이 카드를 싱크로 소환했을 경우에 발동할 수 있다. 자신의 엑스트라 덱(앞면) / 묘지에서 "프레데터 플랜츠" 몬스터나 "스타브 베놈" 몬스터 1장을 특수 소환한다. ②: 상대 필드에 몬스터가 특수 소환되었을 경우, 자신 묘지에서 이 카드와 "융합" 1장을 제외하고 발동할 수 있다. 자신의 패 / 필드의 몬스터를 융합 소재로 하고, 융합 몬스터 1장을 융합 소환한다.
  zh-TW:
  zh-CN: |-
    协调＋协调以外的怪兽1只以上
    此卡名的①②效果1回合仅可各使用1次。①：此卡同步召唤的情况下可以发动。从自己额外牌组（表侧）・墓地将1只“捕食植物”怪兽或“凶饿猛毒”怪兽特殊召唤。②：有怪兽被特殊召唤至对手场上的情况下，从自己墓地将此卡与1张“融合”除外可以发动。将自己手牌・场上的怪兽作为融合素材，将1只融合怪兽融合召唤。
