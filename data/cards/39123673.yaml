text:
  en: |-
    Add 1 card from your Deck or GY to your hand that mentions "Spell Counter" in its text, except "Spell Power Attainment", then if you control a Level 7 or higher "Endymion" Monster Card, you can remove any number of Spell Counters from your field, and if you do, negate the effects of that many face-up cards your opponent controls, and if you do that, destroy them. You can only activate 1 "Spell Power Attainment" per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名のカードは１ターンに１枚しか発動できない。①：「魔力到達」を除く、効果テキストに「魔力カウンター」と記されたカード１枚を自分のデッキ・墓地から手札に加える。自分フィールドにレベル７以上の「エンディミオン」モンスターカードが存在する場合、さらに以下の効果を適用できる。●自分フィールドの魔力カウンターを任意の数だけ取り除き、その数だけ相手フィールドの表側表示カードの効果を無効にし破壊する。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的卡1回合仅可发动1张。①：从自己牌组・墓地将除“魔力到达”以外的、1张效果文本记载有“魔力计数物”的卡加入手牌。自己场上存在等级7以上的“恩底弥翁”怪兽卡的情况下，进而可适用以下效果。
    ●去除自己场上任意数量的魔力计数物，依其数量将对手场上的表侧表示卡的效果无效并破坏。
