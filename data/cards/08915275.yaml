text:
  en: |-
    If you control "Toon World": You can Special Summon this card from your hand, then you can add to your hand or Set 1 "Toon" Trap from your Deck. You can only use this effect of "Evil Box" once per turn. This card is treated as a Toon monster while "Toon World" is on the field. Once per turn (Quick Effect): You can target 1 card in either GY; place it on the bottom of the Deck.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の①の効果は１ターンに１度しか使用できない。①：自分フィールドに「トゥーン・ワールド」が存在する場合に発動できる。このカードを手札から特殊召喚する。その後、以下の効果を適用できる。●デッキから「トゥーン」罠カード１枚を選び、手札に加えるか自分フィールドにセットする。②：フィールドに「トゥーン・ワールド」が存在する限り、このカードはトゥーンモンスターとして扱う。③：自分・相手ターンに１度、自分か相手の墓地のカード１枚を対象として発動できる。そのカードをデッキの一番下に戻す。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①效果1回合仅可使用1次。①：自己场上存在“卡通世界”的情况下可以发动。从手牌将此卡特殊召唤。然后，可适用以下效果。
    ●从牌组挑选1张“卡通”陷阱卡，加入手牌或放置在自己场上。
    ②：只要场上存在“卡通世界”，此卡就视为卡通怪兽。③：在每个自己・对手回合中1次，以自己或对手墓地的1张卡为对象可以发动。将该卡放回牌组最下面。
