text:
  en: |-
    While a monster that mentions "Atlantis, City of the Sea Dragon" is on the field, reduce the Levels of all monsters in both players' hands and fields by 1. If you Link Summon a "Daedalus" monster, you can reduce the material requirement listed on it by 1 and Link Summon it with 1 less material. If this card is in your GY and you control "Umi": You can place this card face-up on your field. You can only use this effect of "Atlantis, City of the Sea Dragon" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の③の効果は１ターンに１度しか使用できない。①：フィールドに「竜都アトランティス」のカード名が記されたモンスターが存在する限り、お互いの手札・フィールドのモンスターのレベルは１つ下がる。②：このカードがフィールドゾーンに存在する限り、自分が「ダイダロス」ＬモンスターをＬ召喚する場合に必要なＬ素材の数を１つ分、Ｌ素材の条件を１体分少なくできる。③：このカードが墓地に存在し、自分フィールドに「海」が存在する場合に発動できる。このカードを自分フィールドに表側表示で置く。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的③效果1回合仅可使用1次。①：只要场上存在记载有“龙都 亚特兰蒂斯”卡名的怪兽，双方手牌・场上的怪兽的等级下降1。②：只要此卡存在于场地区域，自己要连接召唤“代达罗斯”连接怪兽的情况下，所需要的连接素材的数量可减少1、记载的连接素材的条件可减少1只。③：此卡存在于墓地，且自己场上存在“海”的情况下可以发动。将此卡以表侧表示放在自己场上。
