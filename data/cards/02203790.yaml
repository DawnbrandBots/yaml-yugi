text:
  en: |-
    1 Tuner + 1+ non-Tuner "X-Saber" monsters
    When this card is Synchro Summoned: You can target up to 3 Spells/Traps on the field; destroy them.
  de: |-
    1 Empfänger + 1+ „X-Säbel“-Nicht-Empfänger-Monster
    Wenn diese Karte als Synchrobeschwörung beschworen wird: Du kannst bis zu 3 Zauber/Fallen auf dem Spielfeld wählen; zerstöre sie.
  es: |-
    1 Cantante + 1+ monstruos "Sable-X" que no sean Cantantes
    Cuando esta carta es Invocada por Sincronía: puedes seleccionar hasta 3 Mágicas/Trampas en el Campo; destrúyelas.
  fr: |-
    1 Syntoniseur + 1+ monstre non-Syntoniseur "Sabre X"
    Lorsque cette carte est Invoquée par Synchronisation : vous pouvez cibler max. 3 Magies/Pièges sur le Terrain ; détruisez-les.
  it: |-
    1 Tuner + 1+ mostri "Sciabola-X" non-Tuner
    Quando questa carta viene Synchro Evocata: puoi scegliere come bersaglio fino a 3 Magie/Trappole sul Terreno; distruggile.
  pt: |-
    1 Regulador + 1+ monstros "Sabre-X" não-Reguladores
    Quando este card for Invocado por Invocação-Sincro: você pode escolher até 3 Magias/Armadilhas no campo; destrua-as.
  ja: |-
    チューナー＋チューナー以外の「Ｘ－セイバー」モンスター１体以上
    ①：このカードがＳ召喚した時、フィールドの魔法・罠カードを３枚まで対象として発動できる。そのカードを破壊する。
  ko: |-
    튜너 ＋ 튜너 이외의 "X－세이버"라는 이름이 붙은 몬스터 1장 이상
    이 카드가 싱크로 소환에 성공했을 때, 필드 위에 존재하는 마법/함정 카드를 3장까지 선택하고 파괴할 수 있다.
  zh-TW:
  zh-CN: |-
    协调＋协调以外的“X－军刀”怪兽1只以上
    ①：此卡同步召唤时，以场上最多3张魔法・陷阱卡为对象可以发动。将该卡破坏。
