  ja: <ruby>第<rt>だい</rt></ruby>５５<ruby>次<rt>じ</rt></ruby><ruby>ＧＭＸ<rt>ジェノミクス</rt></ruby><ruby>応<rt>おう</rt></ruby><ruby>用<rt>よう</rt></ruby><ruby>試<rt>し</rt></ruby><ruby>験<rt>けん</rt></ruby>
