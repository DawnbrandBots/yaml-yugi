  en: |-
    Special Summon 1 "S-Force" monster from your hand, GY, or banishment, but banish it when it leaves the field. If another card(s) is banished while this card is in your GY: You can banish it; take 2 "S-Force" cards from your Deck, except "S-Force Origin", banish 1 of them, and send the other to the GY. You can only use each effect of "S-Force Origin" once per turn.
