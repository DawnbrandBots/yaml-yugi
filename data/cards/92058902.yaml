text:
  en: |-
    When this card is activated: Fusion Summon 1 LIGHT Machine Fusion Monster from your Extra Deck, using monsters from your Deck, including "Cyber Dragon", also for the rest of this turn after this card resolves, you cannot Special Summon, except Machine monsters, also you cannot declare attacks, except with the Summoned monster. When this card leaves the field, destroy that monster. When that monster is destroyed, destroy this card. You can only activate 1 "Future Fusion Nova" per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名のカードは１ターンに１枚しか発動できない。①：このカードの発動時の効果処理として、「サイバー・ドラゴン」を含む自分のデッキのモンスターを融合素材とし、機械族・光属性の融合モンスター１体を融合召喚する。このカードがフィールドから離れる時にそのモンスターは破壊される。そのモンスターが破壊される時にこのカードは破壊される。このカードの発動後、ターン終了時まで自分は、機械族モンスターしか特殊召喚できず、この効果で特殊召喚したモンスターでしか攻撃宣言できない。
  ko: |-
    이 카드명의 카드는 1턴에 1장밖에 발동할 수 없다. ①: 이 카드의 발동시의 효과 처리로서, "사이버 드래곤"을 포함하는 자신의 덱의 몬스터를 융합 소재로 하고, 기계족 / 빛 속성의 융합 몬스터 1장을 융합 소환한다. 이 카드가 필드에서 벗어날 때에 그 몬스터는 파괴된다. 그 몬스터가 파괴될 때에 이 카드는 파괴된다. 이 카드의 발동 후, 턴 종료시까지 자신은, 기계족 몬스터밖에 특수 소환할 수 없으며, 이 효과로 특수 소환한 몬스터로밖에 공격 선언할 수 없다.
  zh-TW:
  zh-CN: |-
    此卡名的卡1回合仅可发动1张。①：作为此卡发动时的效果处理，将包含“电子龙”在内的、自己牌组的怪兽作为融合素材，将1只机械族・光属性融合怪兽融合召唤。此卡从场上离开时该怪兽将被破坏。该怪兽被破坏时将此卡破坏。此卡发动后，直至回合结束时为止，自己仅可特殊召唤机械族怪兽，仅可用以此效果特殊召唤的怪兽攻击宣言。
