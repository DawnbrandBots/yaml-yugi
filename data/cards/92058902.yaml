  en: |-
    When this card is activated: Fusion Summon 1 LIGHT Machine Fusion Monster from your Extra Deck, using monsters from your Deck, including "Cyber Dragon", also for the rest of this turn after this card resolves, you cannot Special Summon, except Machine monsters, also you cannot declare attacks, except with the Summoned monster. When this card leaves the field, destroy that monster. When that monster is destroyed, destroy this card. You can only activate 1 "Future Fusion Nova" per turn.
