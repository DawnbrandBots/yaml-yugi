text:
  en: |-
    Cannot be Normal Summoned/Set. Must be Special Summoned (from your Extra Deck or GY) by returning 3 monsters (1 Fusion, 1 Synchro, and 1 Xyz) from your face-up field and/or GY to the Extra Deck. Unaffected by monster effects, except "Power Patron" monsters. If this card is added to your Extra Deck face-up: You can add 1 "Power Patron" card from your Deck to your hand. You can only use this effect of "Vidolium the Unstable Power Patron of Unity" once per turn. If this card is Special Summoned: Banish (face-down) all cards in the GYs.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカードは通常召喚できない。融合・Ｓ・Ｘモンスターを１体ずつ、自分のフィールド（表側表示）・墓地からＥＸデッキに戻した場合のみＥＸデッキ・墓地から特殊召喚できる。このカード名の①のモンスター効果は１ターンに１度しか使用できない。①：このカードがＥＸデッキに表側で加わった場合に発動できる。デッキから「獄神」カード１枚を手札に加える。②：このカードが特殊召喚した場合に発動する。お互いの墓地のカードを全て裏側で除外する。③：フィールドのこのカードは「獄神」モンスター以外のモンスターの効果を受けない。
  ko: |-
    이 카드는 통상 소환할 수 없다. 융합 / 싱크로 / 엑시즈 몬스터를 1장씩, 자신의 필드(앞면 표시) / 묘지에서 엑스트라 덱으로 되돌렸을 경우에만 엑스트라 덱 / 묘지에서 특수 소환할 수 있다. 이 카드명의 ①의 몬스터 효과는 1턴에 1번밖에 사용할 수 없다. ①: 이 카드가 엑스트라 덱에 앞면으로 넣어졌을 경우에 발동할 수 있다. 덱에서 "감옥신" 카드 1장을 패에 넣는다. ②: 이 카드를 특수 소환했을 경우에 발동한다. 서로의 묘지의 카드를 전부 뒷면으로 제외한다. ③: 필드의 이 카드는 "감옥신" 몬스터 이외의 몬스터의 효과를 받지 않는다.
  zh-TW:
  zh-CN: |-
    此卡不可通常召唤。仅可在从自己场上（表侧表示）・墓地将融合・同步・超量怪兽各1只放回额外牌组的情况下，从额外牌组・墓地特殊召唤。此卡名的①怪兽效果1回合仅可使用1次。①：此卡以表侧加入额外牌组的情况下可以发动。从牌组将1张“狱神”卡加入手牌。②：此卡特殊召唤的情况下发动。将双方墓地的卡全部以里侧除外。③：场上的此卡不受“狱神”怪兽以外的怪兽的效果影响。
