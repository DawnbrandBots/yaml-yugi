name:
  en: Vidolium the Unstable Power Patron of Unity
  de: Vidolium der instabile Machtpatron der Einheit
  es: Vidolium el Inestable Modelo de Poder de Unidad
  fr: Vidolium le Mécène du Pouvoir Instable de l'Unité
  it: Vidolium l'Instabile Patrono Potente dell'Unità
  pt: Vidolium, o Instável Patrono do Poder da União
  ja: <ruby>混<rt>こん</rt></ruby><ruby>絶<rt>ぜつ</rt></ruby><ruby>獄<rt>ごく</rt></ruby><ruby>神<rt>しん</rt></ruby>ヴィードリウム
  ja_romaji: Konzetsugokushin Vīdoriumu
  ko: 혼절감옥신 비도리움
  ko_rr:
  zh-TW:
  zh-CN: 混绝狱神 皮托里姆
text:
  en: |-
    Cannot be Normal Summoned/Set. Must be Special Summoned (from your Extra Deck or GY) by returning 3 monsters (1 Fusion, 1 Synchro, and 1 Xyz) from your face-up field and/or GY to the Extra Deck. Unaffected by monster effects, except "Power Patron" monsters. If this card is added to your Extra Deck face-up: You can add 1 "Power Patron" card from your Deck to your hand. You can only use this effect of "Vidolium the Unstable Power Patron of Unity" once per turn. If this card is Special Summoned: Banish (face-down) all cards in the GYs.
  de: |-
    Kann nicht als Normalbeschwörung beschworen/gesetzt werden. Muss als Spezialbeschwörung (von deinem Extra Deck oder Friedhof) beschworen werden, indem du 3 Monster (1 Fusion, 1 Synchro und 1 Xyz) offen von deiner Spielfeldseite und/oder von deinem Friedhof ins Extra Deck zurücklegst. Bleibt von Monstereffekten unberührt, außer von „Machtpatron“-Monstern. Falls diese Karte deinem Extra Deck offen hinzugefügt wird: Du kannst deiner Hand 1 „Machtpatron“-Karte von deinem Deck hinzufügen. Du kannst diesen Effekt von „Vidolium der instabile Machtpatron der Einheit“ nur einmal pro Spielzug verwenden. Falls diese Karte als Spezialbeschwörung beschworen wird: Verbanne alle Karten von den Friedhöfen (verdeckt).
  es: |-
    No puede ser Invocado de Modo Normal/Colocado. Debe ser Invocado de Modo Especial (desde tu Deck Extra o Cementerio) devolviendo al Deck Extra 3 monstruos (1 de Fusión, 1 de Sincronía y 1 Xyz) en tu Campo boca arriba y/o Cementerio. No es afectado por efectos de monstruos, excepto monstruos "Modelo de Poder". Si esta carta es añadida a tu Deck Extra boca arriba: puedes añadir a tu mano 1 carta "Modelo de Poder" en tu Deck. Sólo puedes usar este efecto de "Vidolium el Inestable Modelo de Poder de Unidad" una vez por turno. Si esta carta es Invocada de Modo Especial: destierra (boca abajo) todas las cartas en los Cementerios.
  fr: |-
    Ni Invocable Normalement ni Posable Normalement. Uniquement Invocable Spécialement (depuis votre Extra Deck ou Cimetière) en renvoyant 3 monstres (1 Fusion, 1 Synchro et 1 Xyz) depuis votre Terrain face recto et/ou Cimetière à l'Extra Deck. Non affectée par des effets de monstre (monstres "Mécène du Pouvoir" exclus). Si cette carte est ajoutée face recto à votre Extra Deck : vous pouvez ajouter 1 carte "Mécène du Pouvoir" depuis votre Deck à votre main. Vous ne pouvez utiliser cet effet de "Vidolium le Mécène du Pouvoir Instable de l'Unité" qu'une fois par tour. Si cette carte est Invoquée Spécialement : bannissez (face verso) toutes les cartes dans les Cimetières.
  it: |-
    Non può essere Evocato Normalmente/Posizionato. Deve essere Evocato Specialmente (dal tuo Extra Deck o Cimitero) facendo ritornare 3 mostri (1 Fusione, 1 Synchro e 1 Xyz) dal tuo Terreno scoperto e/o Cimitero nell'Extra Deck. Immune agli effetti dei mostri, eccetto mostri "Patrono Potente". Se questa carta viene aggiunta al tuo Extra Deck scoperta: puoi aggiungere 1 carta "Patrono Potente" dal tuo Deck alla tua mano. Puoi utilizzare questo effetto di "Vidolium l'Instabile Patrono Potente dell'Unità" una sola volta per turno. Se questa carta viene Evocata Specialmente: bandisci (coperte) tutte le carte nei Cimiteri.
  pt: |-
    Não pode ser Invocado por Invocação-Normal/Baixado. Deve ser Invocado por Invocação-Especial (do seu Deck Adicional ou Cemitério) ao devolver 3 monstros (1 de Fusão, 1 Sincro e 1 Xyz) do seu campo com a face para cima e/ou Cemitério para o Deck Adicional. Não é afetado por efeitos de monstro, exceto monstros "Patrono(a) do Poder". Se este card for adicionado ao seu Deck Adicional com a face para cima: você pode adicionar 1 card "Patrono(a) do Poder" do seu Deck à sua mão. Você só pode usar este efeito de "Vidolium, o Instável Patrono do Poder da União" uma vez por turno. Se este card for Invocado por Invocação-Especial: bana (com a face para baixo) todos os cards nos Cemitérios.
  ja: |-
    このカードは通常召喚できない。融合・Ｓ・Ｘモンスターを１体ずつ、自分のフィールド（表側表示）・墓地からＥＸデッキに戻した場合のみＥＸデッキ・墓地から特殊召喚できる。このカード名の①のモンスター効果は１ターンに１度しか使用できない。①：このカードがＥＸデッキに表側で加わった場合に発動できる。デッキから「獄神」カード１枚を手札に加える。②：このカードが特殊召喚した場合に発動する。お互いの墓地のカードを全て裏側で除外する。③：フィールドのこのカードは「獄神」モンスター以外のモンスターの効果を受けない。
  ko: |-
    이 카드는 통상 소환할 수 없다. 융합 / 싱크로 / 엑시즈 몬스터를 1장씩, 자신의 필드(앞면 표시) / 묘지에서 엑스트라 덱으로 되돌렸을 경우에만 엑스트라 덱 / 묘지에서 특수 소환할 수 있다. 이 카드명의 ①의 몬스터 효과는 1턴에 1번밖에 사용할 수 없다. ①: 이 카드가 엑스트라 덱에 앞면으로 넣어졌을 경우에 발동할 수 있다. 덱에서 "감옥신" 카드 1장을 패에 넣는다. ②: 이 카드를 특수 소환했을 경우에 발동한다. 서로의 묘지의 카드를 전부 뒷면으로 제외한다. ③: 필드의 이 카드는 "감옥신" 몬스터 이외의 몬스터의 효과를 받지 않는다.
  zh-TW:
  zh-CN: |-
    此卡不可通常召唤。仅可在从自己场上（表侧表示）・墓地将融合・同步・超量怪兽各1只放回额外牌组的情况下，从额外牌组・墓地特殊召唤。此卡名的①怪兽效果1回合仅可使用1次。①：此卡以表侧加入额外牌组的情况下可以发动。从牌组将1张“狱神”卡加入手牌。②：此卡特殊召唤的情况下发动。将双方墓地的卡全部以里侧除外。③：场上的此卡不受“狱神”怪兽以外的怪兽的效果影响。
