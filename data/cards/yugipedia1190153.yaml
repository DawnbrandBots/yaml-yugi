    此卡名的①②效果1回合仅可各使用1次。①：解放手牌・场上的此卡可以发动。从牌组将1张“魔女工艺”场地・永续魔法卡加入手牌。②：此卡存在于墓地的状态下，自己场上表侧表示的“魔女工艺”怪兽因对手的效果从场上离开的情况下可以发动。将此卡特殊召唤，将对手场上1只怪兽解放。以此效果特殊召唤的此卡从场上离开的情况下，将其除外。
