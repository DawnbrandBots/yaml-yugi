text:
  en: |-
    You can reveal this card in your hand; Special Summon 1 "GMX" monster or 1 Dinosaur monster from your hand, also you can only attack directly with "GMX" monsters for the rest of this turn. If this card is Special Summoned by a monster effect: You can Special Summon 1 Level 4 or lower "GMX" or Dinosaur monster from your hand, GY, or banishment in Defense Position. You can only use each effect of "GMX Partner Selandea" once per turn.
  de: |-
    Du kannst diese Karte in deiner Hand vorzeigen; beschwöre 1 „GMX“-Monster oder 1 Dinosaurier-Monster als Spezialbeschwörung von deiner Hand, zusätzlich kannst du für den Rest dieses Spielzugs nur mit „GMX“-Monstern direkt angreifen. Falls diese Karte durch einen Monstereffekt als Spezialbeschwörung beschworen wird: Du kannst 1 „GMX“- oder Dinosaurier-Monster der Stufe 4 oder niedriger als Spezialbeschwörung von deiner Hand, deinem Friedhof oder deinen verbannten Karten in die Verteidigungsposition beschwören. Du kannst jeden Effekt von „GMX-Gesellschafter Selandea“ nur einmal pro Spielzug verwenden.
  es: |-
    Puedes mostrar esta carta en tu mano; Invoca de Modo Especial 1 monstruo "GMX" o 1 monstruo Dinosaurio desde tu mano, y además sólo puedes atacar directamente con monstruos "GMX" por el resto de este turno. Si esta carta es Invocada de Modo Especial por un efecto de monstruo: puedes Invocar de Modo Especial, desde tu mano, Cementerio o destierro, 1 monstruo "GMX" o Dinosaurio de Nivel 4 o menor en Posición de Defensa. Sólo puedes usar cada efecto de "Selandea, Socio GMX" una vez por turno.
  fr: |-
    Vous pouvez révéler cette carte dans votre main ; Invoquez Spécialement 1 monstre "GMX" ou 1 monstre Dinosaure depuis votre main, et aussi, vous ne pouvez attaquer directement qu'avec des monstres "GMX" le reste de ce tour. Si cette carte est Invoquée Spécialement par un effet de monstre : vous pouvez Invoquer Spécialement 1 monstre "GMX" ou Dinosaure de max. Niveau 4 depuis votre main, Cimetière ou bannissement en Position de Défense. Vous ne pouvez utiliser chaque effet de "Selandea, Partenaire GMX" qu'une fois par tour.
  it: |-
    Puoi rivelare questa carta nella tua mano; Evoca Specialmente 1 mostro "GMX" o 1 mostro Dinosauro dalla tua mano, inoltre puoi attaccare direttamente solo con mostri "GMX" per il resto di questo turno. Se questa carta viene Evocata Specialmente dall'effetto di un mostro: puoi Evocare Specialmente 1 mostro "GMX" o Dinosauro di Livello 4 o inferiore dalla tua mano, Cimitero o carte bandite in Posizione di Difesa. Puoi utilizzare ogni effetto di "GMX Partner Selandea" una sola volta per turno.
  pt: |-
    Você pode revelar este card na sua mão; Invoque por Invocação-Especial 1 monstro "GMX" ou 1 monstro Dinossauro da sua mão e, além disso, você só pode atacar diretamente com monstros "GMX" pelo resto deste turno. Se este card for Invocado por Invocação-Especial por um efeito de monstro: você pode Invocar por Invocação-Especial 1 monstro "GMX" ou Dinossauro de Nível 4 ou menos da sua mão, do Cemitério ou do banimento em Posição de Defesa. Você só pode usar cada efeito de "Selandea, o Sócio da GMX" uma vez por turno.
