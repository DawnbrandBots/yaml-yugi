text:
  en: |-
    2 DARK monsters on the field
    (This card is always treated as a "Predaplant" card.)
    If this card is Special Summoned: You can target 1 other face-up monster on the field; change its ATK to 0, negate its effects, also it becomes DARK. When your opponent activates a card or effect (Quick Effect): You can Fusion Summon 1 DARK Fusion Monster from your Extra Deck, using DARK monsters on either field, including this card. You can only use each effect of "Starving Venom Fusion Dragon, Four Heavenly Dragons" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    フィールドの闇属性モンスター×２
    このカード名はルール上「捕食植物」カードとしても扱う。このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：このカードが特殊召喚した場合、フィールドの他の表側表示モンスター１体を対象として発動できる。そのモンスターの攻撃力は０になり、効果は無効化され、闇属性になる。②：相手が効果を発動した時に発動できる。このカードを含む自分・相手フィールドの闇属性モンスターを融合素材とし、闇属性の融合モンスター１体を融合召喚する。
  ko:
  zh-TW:
  zh-CN: |-
    场上的暗属性怪兽×2
    此卡名在规则上也视为“捕食植物”卡。此卡名的①②效果1回合仅可各使用1次。①：此卡特殊召唤的情况下，以场上的1只其他的表侧表示怪兽为对象可以发动。该怪兽的攻击力变为0，效果无效化，变为暗属性。②：对手发动效果时可以发动。将包含此卡在内的、自己・对手场上的暗属性怪兽作为融合素材，将1只暗属性的融合怪兽融合召唤。
