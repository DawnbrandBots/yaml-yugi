  en: |-
    2 DARK monsters on the field
    (This card is always treated as a "Predaplant" card.)
    If this card is Special Summoned: You can target 1 other face-up monster on the field; change its ATK to 0, negate its effects, also it becomes DARK. When your opponent activates a card or effect (Quick Effect): You can Fusion Summon 1 DARK Fusion Monster from your Extra Deck, using DARK monsters on either field, including this card. You can only use each effect of "Starving Venom Fusion Dragon of the Four Heavenly Dragons" once per turn.
