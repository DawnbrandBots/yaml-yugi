text:
  en: |-
    Activate 1 of these effects (but you can only use each effect of "Dark Time Wizard" once per turn);
    ● Add 1 card that mentions "Dark Time Wizard" from your Deck to your hand, except "Dark Time Wizard", also during the End Phase of this turn, add 1 "Dark Time Wizard" from your GY to your hand.
    ● Toss a coin and call it. If you call it right, destroy as many monsters your opponent controls as possible, and if you do, inflict damage to your opponent equal to half the combined original ATK of those destroyed monsters. If you call it wrong, destroy all monsters you control.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    ①：以下の効果から１つを選択して発動できる（このカード名の以下の効果はそれぞれ１ターンに１度しか選択できない）。●「時の黒魔術師」を除く、「時の黒魔術師」のカード名が記されたカード１枚をデッキから手札に加える。このターンのエンドフェイズに、自分の墓地から「時の黒魔術師」１枚を手札に加える。●コイントスを１回行い、裏表を当てる。当たった場合、相手フィールドのモンスターを全て破壊し、その元々の攻撃力を合計した数値の半分のダメージを相手に与える。ハズレの場合、自分フィールドのモンスターを全て破壊する。
  ko:
  zh-TW:
  zh-CN: |-
    ①：可从以下效果中选择1个发动（此卡名的以下效果1回合仅可各选择1次）。
    ●从牌组将除“时间黑魔术师”以外的、1张记载有“时间黑魔术师”卡名的卡加入手牌。在此回合的结束阶段，从自己墓地将1张“时间黑魔术师”加入手牌。
    ●掷1次硬币，猜正反。猜对的情况下，将对手场上的怪兽全部破坏，给予对手相当于其原本攻击力的合计数值的一半的伤害。猜错的情况下，将自己场上的怪兽全部破坏。
