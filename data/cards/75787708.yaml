text:
  en: |-
    This Pendulum Summoned card gains these effects.
    ● Gains ATK equal to the difference between the Pendulum Scales of the 2 cards in your Pendulum Zones x 300.
    ● Any battle damage your opponent takes from battles involving this card is doubled.
    If this card in the Monster Zone is destroyed by battle or card effect: You can add this card to your hand, then if it was destroyed by your opponent, you can Special Summon it. You can only use this effect of "Odd-Eyes Pendulum Dragon of the Four Heavenly Dragons" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名の②のモンスター効果は１ターンに１度しか使用できない。①：Ｐ召喚したこのカードは以下の効果を得る。●自分のＰゾーンにカードが２枚存在する限り、そのＰスケールの差×３００だけ、このカードの攻撃力はアップする。●このカードの戦闘で発生する相手への戦闘ダメージは倍になる。②：モンスターゾーンのこのカードが戦闘・効果で破壊された場合に発動できる。このカードを手札に加える。このカードが相手によって破壊されていた場合、さらにこのカードを特殊召喚できる。
  ko: |-
    이 카드명의 ②의 몬스터 효과는 1턴에 1번밖에 사용할 수 없다. ①: 펜듈럼 소환한 이 카드는 이하의 효과를 얻는다. ●자신의 펜듈럼 존에 카드가 2장 존재하는 한, 그 펜듈럼 스케일의 차 × 300 만큼, 이 카드의 공격력을 올린다. ●이 카드의 전투로 발생하는 상대에게로의 전투 데미지는 배가 된다. ②: 몬스터 존의 이 카드가 전투 / 효과로 파괴되었을 경우에 발동할 수 있다. 이 카드를 패에 넣는다. 이 카드가 상대에 의해 파괴되어 있었을 경우, 추가로 이 카드를 특수 소환할 수 있다.
  zh-TW:
  zh-CN: |-
    此卡名的②怪兽效果1回合仅可使用1次。①：灵摆召唤的此卡获得以下效果。
    ●只要自己的灵摆区域存在2张卡，此卡攻击力上升其灵摆刻度的差值×300的数值。
    ●因此卡的战斗对对手造成的战斗伤害变为两倍。
    ②：怪兽区域的此卡因战斗・效果被破坏的情况下可以发动。将此卡加入手牌。此卡是被对手破坏的情况下，进而可将此卡特殊召唤。
