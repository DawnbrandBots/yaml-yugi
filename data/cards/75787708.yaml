pendulum_effect:
  en: |-
    During your Main Phase: You can destroy this card, and if you do, add 1 Pendulum Monster with 1500 or less ATK from your Deck to your hand, also for the rest of this turn, unless you Pendulum Summon after this effect resolves, you cannot activate monster effects on the field. You can only use this effect of "Odd-Eyes Pendulum Dragon of the Four Heavenly Dragons" once per turn.
  de:
  es:
  fr:
  it:
  pt:
  ja: |-
    このカード名のＰ効果は１ターンに１度しか使用できない。①：自分メインフェイズに発動できる。このカードを破壊し、デッキから攻撃力１５００以下のＰモンスター１体を手札に加える。このターン自分はＰ召喚に成功しない限り、フィールドのモンスターの効果を発動できない。
  ko: |-
    이 카드명의 펜듈럼 효과는 1턴에 1번밖에 사용할 수 없다. ①: 자신 메인 페이즈에 발동할 수 있다. 이 카드를 파괴하고, 덱에서 공격력 1500 이하인 펜듈럼 몬스터 1장을 패에 넣는다. 이 턴에 자신은 펜듈럼 소환에 성공하지 않는 한, 필드의 몬스터의 효과를 발동할 수 없다.
  zh-TW:
  zh-CN: |-
    此卡名的灵摆效果1回合仅可使用1次。①：在自己的主要阶段可以发动。将此卡破坏，从牌组将1只攻击力1500以下的灵摆怪兽加入手牌。此回合，自己只要未灵摆召唤成功，则不可发动场上怪兽的效果。
