  ja: |-
    このカード名の①②の効果はそれぞれ１ターンに１度しか使用できない。①：自分の墓地から「アレイスター」モンスターか融合モンスター１体を除外して発動できる。ＥＸデッキから「召喚獣」モンスター１体を召喚条件を無視して特殊召喚する。この効果で特殊召喚したモンスターはエンドフェイズに除外される。②：このカードが墓地に存在する状態で、モンスターが表側で除外された場合、このカードを除外し、自分の除外状態の「召喚獣」モンスター１体を対象として発動できる。そのモンスターを特殊召喚する。
  ko:
  zh-TW:
  zh-CN: |-
    此卡名的①②效果1回合仅可各使用1次。①：从自己墓地将1只“阿莱斯特”怪兽或融合怪兽除外可以发动。从额外牌组将1只“召唤兽”怪兽无视召唤条件特殊召唤。以此效果特殊召唤的怪兽将在结束阶段被除外。②：此卡存在于墓地的状态下，有怪兽以表侧被除外的情况下，将此卡除外，以自己除外状态的1只“召唤兽”怪兽为对象可以发动。将该怪兽特殊召唤。
