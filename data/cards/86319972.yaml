text:
  en: |-
    Banish 1 "Aleister" monster or 1 Fusion Monster from your GY; Special Summon 1 "Invoked" monster from your Extra Deck, ignoring its Summoning conditions, but banish it during the End Phase. If a monster(s) is banished face-up, while this card is in your GY (except during the Damage Step): You can banish this card, then target 1 of your banished "Invoked" monsters; Special Summon it. You can only use each effect of "Magical Name - "Rosa Mundi"" once per turn.
