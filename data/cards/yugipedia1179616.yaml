text:
  en: |-
    You can reveal this card in your hand, then target 1 Spell/Trap on the field; destroy it, and if you do, Special Summon 1 Thunder monster from your hand, also you cannot Special Summon Effect Monsters for the rest of this turn, except from the hand. If another card(s) is destroyed by card effect, while this card is in the Monster Zone (except during the Damage Step): You can add 1 "Blitzclique" Spell or "Kowloon, Citadel of the Sky" from your Deck to your hand. You can only use each effect of "Grain Blitzclique" once per turn.
