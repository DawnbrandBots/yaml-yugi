  ja: <ruby>妖精伝姫<rt>フェアリーテイル</rt></ruby>－マチリル
  ja_romaji: Fearī Teiru - Machiriru
  ko: 페어리테일－매치리르
  ko_rr:
  zh-TW: 妖精傳姬－火柴莉兒
  zh-CN: 妖精传姬－火柴莉儿
text:
  en: |-
    If a Spellcaster monster with 1850 original ATK is on the field: You can Special Summon this card from your hand or GY, also you cannot Special Summon for the rest of this turn, except Spellcaster monsters. If this card is Normal or Special Summoned: You can add 1 "Fairy Tail" Spell/Trap or 1 "Fairy Tale Tails" from your Deck to your hand. You can pay 500 LP; the name of 1 Effect Monster your opponent controls becomes "Prince of Fairies". You can only use each effect of "Fairy Tail - Matchgiru" once per turn.
  de: |-
    Falls sich ein Hexer-Monster mit 1850 Grund-ATK auf dem Spielfeld befindet: Du kannst diese Karte als Spezialbeschwörung von deiner Hand oder deinem Friedhof beschwören, zusätzlich kannst du für den Rest dieses Spielzugs keine Spezialbeschwörungen durchführen, außer von Hexer-Monstern. Falls diese Karte als Normal- oder Spezialbeschwörung beschworen wird: Du kannst deiner Hand 1 „Märchenschweif“-Zauber/Falle oder 1 „Märchen-Schweife“ von deinem Deck hinzufügen. Du kannst 500 LP zahlen; der Name von 1 Effektmonster, das dein Gegner kontrolliert, wird zu „Prinz der Feen“. Du kannst jeden Effekt von „Märchenschweif - Matchgiru“ nur einmal pro Spielzug verwenden.
  es: |-
    Si un monstruo Lanzador de Conjuros con 1850 ATK original está en el Campo: puedes Invocar esta carta de Modo Especial desde tu mano o Cementerio, y además no puedes Invocar de Modo Especial por el resto de este turno, excepto monstruos Lanzador de Conjuros. Si esta carta es Invocada de Modo Normal o Especial: puedes añadir a tu mano 1 Mágica/Trampa "Colacuento" o 1 "Cuentos con Cola" en tu Deck. Puedes pagar 500 LP; el nombre de 1 Monstruo de Efecto que controla tu adversario se convierte en "Príncipe de las Hadas". Sólo puedes usar cada efecto de "Colacuento - Matchgiru" una vez por turno.
  fr: |-
    Si un monstre Magicien avec 1850 ATK d'origine est sur le Terrain : vous pouvez Invoquer Spécialement cette carte depuis votre main ou Cimetière, et aussi, vous ne pouvez pas Invoquer Spécialement (monstres Magicien exclus) le reste de ce tour. Si cette carte est Invoquée Normalement ou Spécialement : vous pouvez ajouter 1 Magie/Piège "Animal Féérique" ou 1 "Conte de Fées des Animaux" depuis votre Deck à votre main. Vous pouvez payer 500 LP ; le nom d'1 Monstre à Effet contrôlé par votre adversaire devient "Prince des Fées". Vous ne pouvez utiliser chaque effet de "Animal Féérique - Matchgiru" qu'une fois par tour.
  it: |-
    Se un mostro Incantatore con ATK originale 1850 è sul Terreno: puoi Evocare Specialmente questa carta dalla tua mano o Cimitero, inoltre non puoi Evocare Specialmente per il resto di questo turno, eccetto mostri Incantatore. Se questa carta viene Evocata Normalmente o Specialmente: puoi aggiungere 1 Magia/Trappola "Codafavola" o 1 "Code Favola" dal tuo Deck alla tua mano. Puoi pagare 500 LP; il nome di 1 Mostro con Effetto controllato dal tuo avversario diventa "Principe delle Fate". Puoi utilizzare ogni effetto di "Codafavola - Matchgiru" una sola volta per turno.
  pt: |-
    Se um monstro Mago com 1850 de ATK original estiver no campo: você pode Invocar este card por Invocação-Especial da sua mão ou do Cemitério e, além disso, você não pode Invocar por Invocação-Especial pelo resto deste turno, exceto monstros Mago. Se este card for Invocado por Invocação-Normal ou Especial: você pode adicionar 1 Magia/Armadilha "Cauda de Fadas" ou 1 "Conto de Fadas de Caudas" do seu Deck à sua mão. Você pode pagar 500 PV; o nome de 1 Monstro de Efeito que seu oponente controla se torna "Príncipe das Fadas". Você só pode usar cada efeito de "Cauda de Fadas - Matchgiru" uma vez por turno.
  ja: |-
    このカード名の①②③の効果はそれぞれ１ターンに１度しか使用できない。①：フィールドに元々の攻撃力が１８５０の魔法使い族モンスターが存在する場合に発動できる。このカードを手札・墓地から特殊召喚する。このターン、自分は魔法使い族モンスターしか特殊召喚できない。②：このカードが召喚・特殊召喚した場合に発動できる。デッキから「妖精伝姫」魔法・罠カードか「妖精の伝姫」１枚を手札に加える。③：５００ＬＰを払って発動できる。相手フィールドの効果モンスター１体のカード名を「妖精の王子様」として扱う。
  ko: |-
    이 카드명의 ①②③의 효과는 각각 1턴에 1번밖에 사용할 수 없다. ①: 필드에 원래의 공격력이 1850 인 마법사족 몬스터가 존재할 경우에 발동할 수 있다. 이 카드를 패 / 묘지에서 특수 소환한다. 이 턴에, 자신은 마법사족 몬스터밖에 특수 소환할 수 없다. ②: 이 카드를 일반 소환 / 특수 소환했을 경우에 발동할 수 있다. 덱에서 "페어리테일" 마법 / 함정 카드나 "페어리 테일" 1장을 패에 넣는다. ③: 500 LP를 지불하고 발동할 수 있다. 상대 필드의 효과 몬스터 1장의 카드명을 "요정의 왕자님"으로 취급한다.
  zh-TW:
  zh-CN: |-
    此卡名的①②③效果1回合仅可各使用1次。①：场上存在原本攻击力为1850的魔法师族怪兽的情况下可以发动。从手牌・墓地将此卡特殊召唤。此回合，自己仅可特殊召唤魔法师族怪兽。②：此卡召唤・特殊召唤的情况下可以发动。从牌组将1张“妖精传姬”魔法・陷阱卡或“妖精之传姬”加入手牌。③：支付500LP可以发动。将对手场上1只效果怪兽的卡名视为“妖精的王子大人”。
