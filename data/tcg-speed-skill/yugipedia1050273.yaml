effect:
  en: |-
    Once per turn, you can banish 1 card from your hand face-down, then place 1 Dig Counter on this Skill (max. 1). If a face-up "Fossil" Fusion Monster(s) you control is destroyed by card effect, you can place 1 Dig Counter on this Skill (max. 1). Once per turn, during your Main Phase, you can remove 1 Dig Counter from this Skill to Fusion Summon 1 "Fossil" Fusion Monster from your Extra Deck, by banishing materials mentioned on it from any GYs (except for materials with a specific GY requirement listed.) (This is treated as a Fusion Summon with "Fossil Fusion".)
  de:
  es:
  fr: |-
    Une fois par tour, vous pouvez bannir 1 carte face cachée de votre main, puis placer 1 Compteur Fouille sur cette Compétence (max. 1). Si un ou plusieurs Monstres Fusion "Fossile" face recto que vous contrôlez sont détruits par un effet de carte, vous pouvez placer 1 Compteur Fouille sur cette Compétence (max. 1). Une fois par tour, durant votre Main Phase, vous pouvez retirer 1 Compteur Fouille de cette Compétence pour Invoquer par Fusion 1 Monstre Fusion "Fossile" depuis votre Extra Deck, en bannissant les Matériaux mentionnés sur cette Compétence depuis n'importe quel Cimetière (à l'exception des Matériaux nécessitant un Cimetière spécifique). (Cette Invocation est considérée comme une Invocation Fusion avec "Fusion Fossile" .)
