effect:
  en: |-
    Apply the following Skill.
    ● If all monsters you control are "Mokey Mokey" monsters (min. 1), Effect Monsters cannot attack the turn they are Summoned.
    Once per Duel, if you control 2 or more Fairy monsters, you can place 1 "Mokey Mokey" Continuous Spell from your Deck face-up in your Spell & Trap Zone, and if you do, destroy 1 monster you control. Once per Duel, you can discard 1 card to Fusion Summon 1 "Mokey Mokey King" from your Extra Deck, using monsters from your hand or field as Fusion Material.
  de:
  es:
  fr: |-
    Appliquez la compétence suivante.
    ● Si tous les monstres que vous contrôlez sont des monstres "Mokey Mokey" (min. 1), les Monstres à Effet ne peuvent pas attaquer le tour où ils sont Invoqués.
    Une fois par Duel, si vous contrôlez au moins 2 monstres Elfe, vous pouvez placer face recto 1 Carte Magie Continue "Mokey Mokey" depuis votre Deck dans votre Zone Magie & Piège, et si vous le faites, détruisez 1 monstre que vous contrôlez. Une fois par Duel, vous pouvez défausser 1 carte pour Invoquer par Fusion 1 "Roi Mokey Mokey" depuis votre Extra Deck, en utilisant des monstres de votre main ou de votre Terrain comme Matériel de Fusion.
